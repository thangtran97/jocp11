Language().contains(\"FR\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Arrays.stream(loc)\n    .filter(x -&gt; x.toString().contains(\"FR\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Arrays.stream(loc)\n    .filter(x -&gt; x.startsWith(\"fr\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Arrays.stream(loc)\n    .filter(x -&gt; x.toString().startsWith(\"fr\"))\n    .forEach(System.out::println);</pre>"], "explanation": "<p><strong>UKOCP29079: </strong></p><p>`public static Locale[] getAvailableLocales() {...}` returns the Locale [] containing all the available locales supported by the JVM.</p><p><br></p><p>Language codes are stored in lower case, so syntax comparing upper case codes ('FR') is ruled out. </p><p><br></p><p>You are left with 3 options [working with lower case language code ('fr')]. 'x' in the lambda expression is of Locale type and Locale class doesn't have method startsWith, so `x -&gt; x.startsWith(\"fr\")` causes compilation failure. </p><p><br></p><p>`x -&gt; x.getLanguage().equals(\"fr\")` and `x -&gt; x.toString().startsWith(\"fr\")` correctly filter out expected Locale objects. </p>", "question": "<p><strong>Question ID: UKOCP29079</strong></p><p><br></p><p>Assume that proper import statements are available, and 'fr' is the language code for French language. </p><p><br></p><p>And you have the following code snippet:</p><p><code>Locale [] loc = Locale.getAvailableLocales();</code></p><p><br></p><p>Which of the following statements will print all the supported (by the JVM) French Language Locale on to the console?</p><p>Choose 2 options.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["a", "e"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP29079Assume that proper import statements are available, and 'fr' is the language code for French language. And you have the following code snippet:Locale [] loc = Locale.getAvailableLocales();Which of the following statements will print all the supported (by the JVM) French Language Locale on to the console?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526746, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["true", "false"], "explanation": "<p><strong>UKOCP21122: </strong></p><p>`NumberFormat.getIntegerInstance();` returns an integer number format for the current default FORMAT locale. The returned number format is configured to round floating point numbers to the nearest integer using half-even rounding for formatting.</p><p><br></p><p>RoundingMode.HALF_EVEN:</p><p>Rounding mode to round towards the \"nearest neighbor\" unless both neighbors are equidistant, in which case, round towards the even neighbor</p><p>1.5 will be formatted as \"2\"</p><p>2.5 will be formatted as \"2\"</p><p>-3.5 will be formatted as \"-4\"</p><p>-4.5 will be formatted as \"-4\"</p><p><br></p><p>For the given code:</p><p>nf.format(-1.5) returns \"-2\"</p><p>nf.format(-2.5) returns \"-2\"</p><p><br></p><p>Hence, output is: true</p>", "question": "<p><strong>Question ID: UKOCP21122</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\n\npublic class Test {\n    public static void main(String [] args) {\n        var nf = NumberFormat.getIntegerInstance();\n        System.out.println(nf.format(-1.5).equals(nf.format(-2.5)));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", ""]}, "correct_response": ["a"], "section": "12.3 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP21122Given code: package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\n\npublic class Test {\n    public static void main(String [] args) {\n        var nf = NumberFormat.getIntegerInstance();\n        System.out.println(nf.format(-1.5).equals(nf.format(-2.5)));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526748, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<p><code>byte value() default 5;</code> </p>", "<p><code>short value() default 5;</code> </p>", "<p><code>Integer value() default 5;</code> </p>", "<p><code>int value();</code> </p>", "<p><code>double val() default 5;</code> </p>", "<p><code>Long val() default 5;</code> </p>"], "explanation": "<p><strong>UKOCP89571: </strong></p><p>You are not supposed to make any changes in Test.java file. </p><p>For `@Rating(10)` to compile, name of the attribute is not used, hence name of the attribute must be 'value' and for `@Rating` to compile, default value of the attribute must be set.</p><p><br></p><p>Type of attribute could be of following: </p><p>primitive, String, java.lang.Class, Enum, Annotation, an array of all the previous type.</p><p><br></p><p>Let's check all the options:</p><p><code>byte value() default 5;</code></p><p>\u2713&nbsp; Type of attribute is byte (primitive), name of the attribute is 'value' and default value is also available. </p><p><br></p><p><code>short value() default 5;</code></p><p>\u2713&nbsp; Type of attribute is short (primitive), name of the attribute is 'value' and default value is also available. </p><p><br></p><p><code>Integer value() default 5;</code></p><p>\u2717&nbsp; Type of attribute is Integer, which is not a valid type.</p><p><br></p><p><code>int value();</code></p><p>\u2717&nbsp; Type of attribute is int (primitive), name of the attribute is 'value' but default value is not available.</p><p><br></p><p><code>double val() default 5;</code></p><p>\u2717&nbsp; Type of attribute is double(primitive) but name of the attribute is 'val' and not 'value'.</p><p><br></p><p><code>Long val() default 5;</code></p><p>\u2717&nbsp; Type of attribute is Long, which is not a valid type.</p>", "question": "<p><strong>Question ID: UKOCP89571</strong></p><p><br></p><p>Given code of Rating annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Target(ElementType.TYPE)\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface Rating {\n    /*INSERT*/\n}</pre><p><br></p><p>And code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\n@Rating\nclass Movie {}\n\n@Rating(10)\nclass Food {}\n\npublic class Test {\n    public static void main(String[] args) {\n        //More code\n    }\n}</pre><p><br></p><p>Which of the following can replace /*INSERT*/, such that given codes compile successfully?</p><p>Choose 2 options.</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["a", "b"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP89571Given code of Rating annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Target(ElementType.TYPE)\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface Rating {\n    /*INSERT*/\n}And code of Test.java file: package com.udayankhattry.ocp;\n\n@Rating\nclass Movie {}\n\n@Rating(10)\nclass Food {}\n\npublic class Test {\n    public static void main(String[] args) {\n        //More code\n    }\n}Which of the following can replace /*INSERT*/, such that given codes compile successfully?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526750, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error", "An exception is thrown at runtime", "It terminates successfully"], "explanation": "<p><strong>UKOCP64262: </strong></p><p>Above program produces below output: </p><p>2</p><p>2147483647</p><p>0</p><p><br></p><p>Clearly, it is not the expected output and caused bad values to be returned. </p><p><br></p><p>You may change the code of divide method to check bad floating point values:</p><pre class=\"prettyprint linenums\">public static int divide (float f1, float f2) {\n\tfloat res = f1 / f2;\n\tif(Float.isInfinite(res)) {\n\t\tthrow new ArithmeticException(\"INFINITE\");\n\t}\n\tif(Float.isNaN(res)) {\n\t\tthrow new ArithmeticException(\"NaN\");\n\t}\n\treturn (int)res;\n}</pre><p><br></p><p>Now, this method returns ArithmeticException, in case result is \"infinite\" or \"nan\". Please note Double class also provides similar functionality.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 3-9 / INJECT-9: Prevent injection of exceptional floating point values</p>", "question": "<p><strong>Question ID: UKOCP64262</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(divide(5.0f, 2.0f));\n        System.out.println(divide(1.0f, 0.0f));\n        System.out.println(divide(0.0f, 0.0f));\n    }\n\n    public static int divide (float f1, float f2) {\n        float res = f1 / f2;\n\treturn (int)res;\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", ""]}, "correct_response": ["c"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP64262Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(divide(5.0f, 2.0f));\n        System.out.println(divide(1.0f, 0.0f));\n        System.out.println(divide(0.0f, 0.0f));\n    }\n\n    public static int divide (float f1, float f2) {\n        float res = f1 / f2;\n\treturn (int)res;\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526752, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Java 7", "Java 8", "Java 9", "Java 10", "Java 11"], "explanation": "<p><strong>UKOCP66459: </strong></p><p>Modules were introduced in Java 9 under the project Jigsaw. </p><p>Access below link to know more about project Jigsaw: http://openjdk.java.net/projects/jigsaw/</p>", "question": "<p><strong>Question ID: UKOCP66459</strong></p><p><br></p><p>In which of the Java versions, JPMS (Java Platform Module System) was introduced?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP66459In which of the Java versions, JPMS (Java Platform Module System) was introduced?", "related_lectures": []}, {"_class": "assessment", "id": 71526754, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["--display-module-resolution", "--module-resolution", "--show-module-resolution", "--list-modules", "--list-module-resolution"], "explanation": "<p><strong>UKOCP17053: </strong></p><p>--show-module-resolution shows module resolution output during startup. </p><p><br></p><p>On Windows platform, if you have modular jar file (C:\\third-party\\test.jar) for 'com.udayankhattry.modularity' module and class to invoke is: com.udayankhattry.ocp.Main, </p><p>then below command shows module resolution output:</p><p>C:\\&gt;java -p third-party --show-module-resolution -m com.udayankhattry.modularity/com.udayankhattry.ocp.Main</p><p>root com.udayankhattry.modularity file:///C:/third-party/test.jar</p><p>java.base binds jdk.localedata jrt:/jdk.localedata</p><p>java.base binds jdk.security.jgss jrt:/jdk.security.jgss</p><p>.</p><p>.</p><p>.</p><p><br></p><p>Please note, com.udayankhattry.modularity is the root module and as it implicitly requires java.base so you have other entries as well.</p>", "question": "<p><strong>Question ID: UKOCP17053</strong></p><p><br></p><p>Which of the options of java command displays module resolution output?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP17053Which of the options of java command displays module resolution output?", "related_lectures": []}, {"_class": "assessment", "id": 71526756, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<pre class=\"prettyprint linenums\">module com.discount.shopping {\n}</pre>", "<pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.Product;\n    exports com.discount.shopping.Order;\n    exports com.discount.shopping.payments.Discount;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.*;\n    exports com.discount.shopping.payments.*;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.*;\n}</pre>", "<pre class=\"prettyprint linenums\">module shopping {\n    exports com.discount.shopping;\n    exports com.discount.shopping.payments;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping to all;\n    exports com.discount.shopping.payments to all;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.discount.shopping {\n    export com.discount.shopping;\n    export com.discount.shopping.payments;\n}</pre>", "<p>None of the other options</p>"], "explanation": "<p><strong>UKOCP68608: </strong></p><p>Let's check all the options one by one: </p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n}</pre><p>\u2717&nbsp; By default module doesn't export any package. </p><p><br></p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.Product;\n    exports com.discount.shopping.Order;\n    exports com.discount.shopping.payments.Discount;\n}</pre><p>\u2717&nbsp; after exports keyword package name is expected and not the class name.</p><p><br></p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.*;\n    exports com.discount.shopping.payments.*;\n}</pre><p>\u2717&nbsp; Wild-card (*) is not allowed with the package names.</p><p><br></p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping.*;\n}</pre><p>\u2717&nbsp; Wild-card (*) is not allowed with the package names.</p><p><br></p><pre class=\"prettyprint linenums\">module shopping {\n    exports com.discount.shopping;\n    exports com.discount.shopping.payments;\n}</pre><p>\u2717&nbsp; Even though both the exports are correct but module name is 'shopping' and not 'com.discount.shopping'.</p><p><br></p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n    exports com.discount.shopping to all;\n    exports com.discount.shopping.payments to all;\n}</pre><p>\u2717&nbsp; It is a valid syntax of qualified exports but 'all' has no special meaning here.</p><p>Syntax of qualified exports is: </p><p>exports &lt;package_name&gt; to &lt;comma_separated_list_of_modules&gt;;</p><p><br></p><p>Given exports directives will just make packages 'com.discount.shopping' and 'com.discount.shopping.payments' readable by module named 'all' and not by all the modules.</p><p>If module 'all' is not available, then compiler compiles all the files but displays a warning for missing module 'all'.</p><p><br></p><pre class=\"prettyprint linenums\">module com.discount.shopping {\n    export com.discount.shopping;\n    export com.discount.shopping.payments;\n} </pre><p>\u2717&nbsp; 'export' is not a valid directive, it should be 'exports'.</p><p><br></p><p>Hence, correct answer is: None of the other options</p>", "question": "<p><strong>Question ID: UKOCP68608</strong></p><p><br></p><p>Consider below public classes:</p><p>com.discount.shopping.Product, com.discount.shopping.Order and com.discount.shopping.payments.Discount. </p><p><br></p><p>The requirement is to create a modular application for above classes. Module name must be com.discount.shopping and above 3 classes must be readable by all the modules, which of the following definitions of module-info.java file will achieve this?</p>", "feedbacks": ["", "", "", "", "", "", "", ""]}, "correct_response": ["h"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP68608Consider below public classes:com.discount.shopping.Product, com.discount.shopping.Order and com.discount.shopping.payments.Discount. The requirement is to create a modular application for above classes. Module name must be com.discount.shopping and above 3 classes must be readable by all the modules, which of the following definitions of module-info.java file will achieve this?", "related_lectures": []}, {"_class": "assessment", "id": 71526758, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["A, B and C", "Only A and B", "Only B and C", "Only A and C", "Only A", "Only B", "<p>Only C</p>"], "explanation": "<p><strong>UKOCP85953: </strong></p><p>All three statements related to unnamed module are correct.</p>", "question": "<p><strong>Question ID: UKOCP85953</strong></p><p><br></p><p>Below are the statements related to unnamed module: </p><p>A. Exports all its packages</p><p>B. Reads all other modules available on the module graph. </p><p>C. A named module cannot access unnamed module.</p><p><br></p><p>Which of the above statements are correct?</p>", "feedbacks": ["", "", "", "", "", "", ""]}, "correct_response": ["a"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP85953Below are the statements related to unnamed module: A. Exports all its packagesB. Reads all other modules available on the module graph. C. A named module cannot access unnamed module.Which of the above statements are correct?", "related_lectures": []}, {"_class": "assessment", "id": 71526738, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Directory Y will be created under X and directory Z will be created under Y", "Only directory Y will be created under X", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP49035: </strong></p><p>`Files.createDirectories(path);` creates a directory by creating all nonexistent parent directories first. So this method first creates directory Y under X and then directory Z under Y. </p>", "question": "<p><strong>Question ID: UKOCP49035</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500X</pre><p>Directory X exists under F:.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var path = Paths.get(\"F:\\\\X\\\\Y\\\\Z\");\n        Files.createDirectories(path);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", ""]}, "correct_response": ["a"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP49035F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500XDirectory X exists under F:.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var path = Paths.get(\"F:\\\\X\\\\Y\\\\Z\");\n        Files.createDirectories(path);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526736, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["NoSuchFileException is thrown at runtime", "FileNotFoundException is thrown at runtime", "F:\\A\\B\\Book.java", "F:\\A\\B\\C\\Book.java", "Book.java"], "explanation": "<p><strong>UKOCP59293: </strong></p><p>Variable 'file' infers to Path type.</p><p>toAbsolutePath() method doesn't care if given path elements are physically available or not. It just returns the absolute path. </p><p><br></p><p>As file already refers to absolute path, hence the same path is printed on to the console. </p>", "question": "<p><strong>Question ID: UKOCP59293</strong></p><p><br></p><p>F: is accessible for reading and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java</pre><p>'Book.java' file is available under 'C' directory.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var file = Paths.get(\"F:\\\\A\\\\B\\\\Book.java\");\n        System.out.println(file.toAbsolutePath());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["c"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP59293F: is accessible for reading and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java'Book.java' file is available under 'C' directory.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var file = Paths.get(\"F:\\\\A\\\\B\\\\Book.java\");\n        System.out.println(file.toAbsolutePath());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526734, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["2 will be printed on to the console", "2 will not be printed on to the console", "Runtime Exception"], "explanation": "<p><strong>UKOCP74479: </strong></p><p>InputStreamReader class has a constructor 'public InputStreamReader(InputStream in)', hence System.in, which is an instance of InputStream can be passed to it. </p><p><br></p><p>br.read() reads a single character, so it reads user input as '2' and not 2. ASCII code for character '2' is not 2. In fact, it is 50. </p><p><br></p><p>So, 50 will be shown in the output. </p><p><br></p><p>OCP exam doesn't expect you to know exact corresponding ASCII codes but you should know that read() method returns single character (16-bit: 0 to 65535) but as return type is int hence it returns the ASCII value in this case. </p><p><br></p><p>If you want to retrieve the user input then use below code:&nbsp; </p><pre class=\"prettyprint linenums\">var s = br.readLine();\nvar i = Integer.parseInt(s); //In case you want to convert to int.\nSystem.out.println(i);</pre>", "question": "<p><strong>Question ID: UKOCP74479</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        try(var br = new BufferedReader(new InputStreamReader(System.in));) {\n            System.out.print(\"Enter any number between 1 and 10: \");\n            var num = br.read();\n            System.out.println(num);\n        }\n    }\n}</pre><p><br></p><p>On execution above code prompts user with following message:</p><p>Enter any number between 1 and 10: </p><p><br></p><p>Which of the following statement is true if user types 2 and presses Enter?</p>", "feedbacks": ["", "", ""]}, "correct_response": ["b"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP74479Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        try(var br = new BufferedReader(new InputStreamReader(System.in));) {\n            System.out.print(\"Enter any number between 1 and 10: \");\n            var num = br.read();\n            System.out.println(num);\n        }\n    }\n}On execution above code prompts user with following message:Enter any number between 1 and 10: Which of the following statement is true if user types 2 and presses Enter?", "related_lectures": []}, {"_class": "assessment", "id": 71526732, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["It is always 1", "It is always 0", "It is always 2", "It can contain any number between 0 and 10000"], "explanation": "<p><strong>UKOCP28569: </strong></p><p>It is an example of Singleton design pattern. </p><p>Util instance will be created only once, when obj is null. Next all calls to Util.get() will return the only instance. </p><p><br></p><p>Please note: shutdown() doesn't wait for previously submitted tasks to complete execution. There are 10000 tasks to be handled by 100 thread, which means threads are reused. Reuse can happen only when thread finishes its previous task. Hence, instance of Util class will definitely get created. </p><p>Hence, by the time code reaches Line n1, value of ctr will be 1.</p>", "question": "<p><strong>Question ID: UKOCP28569</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.Executors;\nimport java.util.stream.IntStream;\n\nclass Util {\n    int ctr = 0;\n    private static Util obj;\n    private Util() {\n        ++ctr;\n    }\n    static synchronized Util get() {\n        if(obj == null)\n            obj = new Util();\n        return obj;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newFixedThreadPool(100);\n        IntStream.rangeClosed(1, 10000)\n            .parallel()\n            .forEach(x -&gt; es.submit(() -&gt; Util.get()));\n        es.shutdown(); \n        //Line n1\n    }\n}</pre><p><br></p><p>What will be the value of variable 'ctr', when execution reaches Line n1?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "8.4 Concurrency: Locks", "question_plain": "Question ID: UKOCP28569Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.Executors;\nimport java.util.stream.IntStream;\n\nclass Util {\n    int ctr = 0;\n    private static Util obj;\n    private Util() {\n        ++ctr;\n    }\n    static synchronized Util get() {\n        if(obj == null)\n            obj = new Util();\n        return obj;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newFixedThreadPool(100);\n        IntStream.rangeClosed(1, 10000)\n            .parallel()\n            .forEach(x -&gt; es.submit(() -&gt; Util.get()));\n        es.shutdown(); \n        //Line n1\n    }\n}What will be the value of variable 'ctr', when execution reaches Line n1?", "related_lectures": []}, {"_class": "assessment", "id": 71526730, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error", "null", "HELLO", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP67718: </strong></p><p>Variable 'es' infers to ExecutorService type.</p><p>submit method of ExecutorService interface is overloaded: submit(Runnable) and submit(Callable). Both Runnable and Callable are Functional interfaces. </p><p><br></p><p>Given lambda expression '() -&gt; \"HELLO\"', it accepts no parameter and returns a String, hence it matches with the call() method implementation of Callable interface. </p><p>Variable 'f' infers to Future&lt;String&gt; type.</p><p>f.get() would return \"HELLO\". </p><p><br></p><p>Notice, get() method throws 2 checked exceptions InterruptedException and ExecutionException and main method declares to throw these exceptions, hence no compilation error. </p>", "question": "<p><strong>Question ID: UKOCP67718</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var f = es.submit(() -&gt; \"HELLO\");\n        System.out.println(f.get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP67718Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var f = es.submit(() -&gt; \"HELLO\");\n        System.out.println(f.get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526728, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["It will always print true", "It will always print false", "Output cannot be predicted"], "explanation": "<p><strong>UKOCP63349: </strong></p><p>Variable 's1' infers to String type and variable 's2' also infers to String type.</p><p>reduce method in Stream class is declared as: T reduce(T identity, BinaryOperator&lt;T&gt; accumulator)</p><p>By checking the reduce method, 'reduce(\"_\", String::concat)', we can say that: </p><p>Identity is String type, accumulator is BinaryOperator&lt;String&gt; type. </p><p><br></p><p>Though you may always get false but result cannot be predicted as identity value (\"_\") used in reduce method is not following an important rule. </p><p><br></p><p>For each element 't' of the stream, accumulator.apply(identity, t) is equal to t. </p><p><br></p><p>'String::concat' is equivalent to lambda expression '(s1, s2) -&gt; s1.concat(s2);'. </p><p><br></p><p>For 1st element of the stream, \"A\" accumulator.apply(\"_\", \"A\") results in \"_A\", which is not equal to \"A\" and hence rule is not followed. </p><p><br></p><p>s1 will always refer to \"_AEIOU\" but s2 may refer to various possible string objects depending upon how parallel stream is processed. </p><p><br></p><p>s2 may refer to \"_A_E_I_O_U\" or \"_AE_I_OU\" or \"_AEIOU\". So output cannot be predicted. </p>", "question": "<p><strong>Question ID: UKOCP63349</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var s1 = List.of(\"A\", \"E\", \"I\", \"O\", \"U\").stream()\n            .reduce(\"_\", String::concat);\n        var s2 = List.of(\"A\", \"E\", \"I\", \"O\", \"U\").parallelStream()\n            .reduce(\"_\", String::concat);\n        System.out.println(s1.equals(s2));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", ""]}, "correct_response": ["c"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP63349Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var s1 = List.of(\"A\", \"E\", \"I\", \"O\", \"U\").stream()\n            .reduce(\"_\", String::concat);\n        var s2 = List.of(\"A\", \"E\", \"I\", \"O\", \"U\").parallelStream()\n            .reduce(\"_\", String::concat);\n        System.out.println(s1.equals(s2));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526726, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Only 1", "Only 2", "Only 3", "Both 1 &amp; 2", "Both 2 &amp; 3", "All 1, 2 &amp; 3"], "explanation": "<p><strong>UKOCP20651: </strong></p><p>Variable id has package scope and as class Test is in the same package hence p.id doesn't cause any compilation error. </p><p><br></p><p>`Collectors.toMap(p -&gt; p.id, Function.identity())` and `Collectors.toMap(p -&gt; p.id, p -&gt; p)` are exactly same, as `Function.identity()` is same as lambda expression `p -&gt; p`. </p><p><br></p><p>Collectors.toCollection(TreeMap::new) causes compilation error as TreeMap doesn't extend from Collection interface. </p>", "question": "<p><strong>Question ID: UKOCP20651</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Map;\nimport java.util.TreeMap;\nimport java.util.function.Function;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\nclass Person {\n    int id;\n    String name;\n    Person(int id, String name) {\n        this.id = id;\n        this.name = name;\n    }\n\n    public String toString() {\n        return \"{\" + id + \", \" + name + \"}\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Person) {\n            Person p = (Person) obj;\n            return this.id == p.id;\n        }\n        return false;\n    }\n\n    public int hashCode() {\n        return Integer.valueOf(this.id).hashCode();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Person p1 = new Person(1010, \"Sean\");\n        Person p2 = new Person(2843, \"Rob\");\n        Person p3 = new Person(1111, \"Lucy\");\n\n        Stream&lt;Person&gt; stream = Stream.of(p1, p2, p3);\n        Map&lt;Integer, Person&gt; map = stream.collect(/*INSERT*/);\n        System.out.println(map.size());\n    }\n}</pre><p><br></p><p>And below statements: </p><p>1. <code>Collectors.toMap(p -&gt; p.id, Function.identity())</code></p><p>2. <code>Collectors.toMap(p -&gt; p.id, p -&gt; p)</code></p><p>3. <code>Collectors.toCollection(TreeMap::new)</code></p><p><br></p><p>Which of the following statements can replace /*INSERT*/ such that output is 3?</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["d"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP20651Given code: package com.udayankhattry.ocp;\n\nimport java.util.Map;\nimport java.util.TreeMap;\nimport java.util.function.Function;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\nclass Person {\n    int id;\n    String name;\n    Person(int id, String name) {\n        this.id = id;\n        this.name = name;\n    }\n\n    public String toString() {\n        return \"{\" + id + \", \" + name + \"}\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Person) {\n            Person p = (Person) obj;\n            return this.id == p.id;\n        }\n        return false;\n    }\n\n    public int hashCode() {\n        return Integer.valueOf(this.id).hashCode();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Person p1 = new Person(1010, \"Sean\");\n        Person p2 = new Person(2843, \"Rob\");\n        Person p3 = new Person(1111, \"Lucy\");\n\n        Stream&lt;Person&gt; stream = Stream.of(p1, p2, p3);\n        Map&lt;Integer, Person&gt; map = stream.collect(/*INSERT*/);\n        System.out.println(map.size());\n    }\n}And below statements: 1. Collectors.toMap(p -&gt; p.id, Function.identity())2. Collectors.toMap(p -&gt; p.id, p -&gt; p)3. Collectors.toCollection(TreeMap::new)Which of the following statements can replace /*INSERT*/ such that output is 3?", "related_lectures": []}, {"_class": "assessment", "id": 71526724, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP64224</strong></p><p><br></p><p>Which of the following is Primitive variant of Optional class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP64224: </strong></p><p>Only 3 primitive variants available: OptionalDouble, OptionalInt and OptionalLong. </p><p><br></p><p>NOTE: There are 3 primitive equivalents of Optional&lt;T&gt; class available. Remember their similarity with Optional&lt;T&gt; class. </p><p><br></p><p>Optional&lt;T&gt;: </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; empty() </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; of\u200b(T value)</p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; ofNullable\u200b(T value) **</p><p>+ T&nbsp; &nbsp; &nbsp;get()</p><p>+ T&nbsp; &nbsp; &nbsp;orElse\u200b(T other)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseGet\u200b(Supplier&lt;? extends T&gt; supplier)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; T&nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(Consumer&lt;? super T&gt; action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(Consumer&lt;? super T&gt; action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ Stream&lt;T&gt;&nbsp; &nbsp; &nbsp;stream()</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp;or\u200b(Supplier&lt;? extends Optional&lt;? extends T&gt;&gt; supplier) **</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp; &nbsp; &nbsp;filter\u200b(Predicate&lt;? super T&gt; predicate) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;map\u200b(Function&lt;? super T,\u200b? extends U&gt; mapper) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;flatMap\u200b(Function&lt;? super T,\u200b? extends Optional&lt;? extends U&gt;&gt; mapper) **</p><p><br></p><p><br></p><p>OptionalInt: </p><p>+ static OptionalInt&nbsp; &nbsp; empty()</p><p>+ static OptionalInt&nbsp; &nbsp; of\u200b(int value)</p><p>+ int&nbsp; &nbsp;getAsInt()</p><p>+ int&nbsp; &nbsp;orElse\u200b(int other)</p><p>+ int&nbsp; &nbsp;orElseGet\u200b(IntSupplier supplier)</p><p>+ int&nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; int&nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(IntConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(IntConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ IntStream&nbsp; &nbsp; &nbsp;stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalLong: </p><p>+ static OptionalLong&nbsp; &nbsp;empty()</p><p>+ static OptionalLong&nbsp; &nbsp;of\u200b(long value)</p><p>+ long&nbsp; getAsLong()</p><p>+ long&nbsp; orElse\u200b(long other)</p><p>+ long&nbsp; orElseGet\u200b(LongSupplier supplier)</p><p>+ long&nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; long&nbsp; &nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(LongConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(LongConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ LongStream&nbsp; &nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalDouble: </p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;empty()</p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;of\u200b(double value)</p><p>+ double&nbsp; &nbsp; getAsDouble()</p><p>+ double&nbsp; &nbsp; orElse\u200b(double other)</p><p>+ double&nbsp; &nbsp; orElseGet\u200b(DoubleSupplier supplier)</p><p>+ double&nbsp; &nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; double&nbsp; orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(DoubleConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(DoubleConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ DoubleStream&nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p>", "answers": ["ByteOptional", "IntOptional", "OptionalBoolean", "OptionalFloat", "OptionalDouble"]}, "correct_response": ["e"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP64224Which of the following is Primitive variant of Optional class?", "related_lectures": []}, {"_class": "assessment", "id": 71526722, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<p>Peter</p><p>bonita</p><p>John</p>", "<p>John</p><p>bonita</p><p>Peter</p>", "<p>bonita</p><p>John</p><p>Peter</p>", "<p>John</p><p>Peter</p><p>bonita</p>"], "explanation": "<p><strong>UKOCP72796: </strong></p><p>In this example, Stream&lt;String&gt; is used. sorted method accepts Comparator&lt;? super String&gt; type. </p><p><br></p><p>compareToIgnoreCase is defined in String class and it compares the text by in case-insensitive manner. Even though 'b' is in lower case it is printed first, followed by 'J' and 'P'. </p>", "question": "<p><strong>Question ID: UKOCP72796</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] names = {\"Peter\", \"bonita\", \"John\"};\n        Arrays.stream(names)\n            .sorted((s1, s2) -&gt; s1.compareToIgnoreCase(s2))\n            .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP72796Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] names = {\"Peter\", \"bonita\", \"John\"};\n        Arrays.stream(names)\n            .sorted((s1, s2) -&gt; s1.compareToIgnoreCase(s2))\n            .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526720, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["true", "false", "Nothing is printed on to the console as code runs infinitely", "true is printed on to the console and code runs infinitely"], "explanation": "<p><strong>UKOCP73631: </strong></p><p>stream =&gt; {1, 2, 3, 4, 5, ... }. It is an infinite stream. </p><p>Predicate 'i -&gt; i &gt; 1' returns true for any Integer greater than 1. </p><p>As 2 &gt; 1, so true is printed and operation is terminated. Code doesn't run infinitely.</p><p><br></p><p>NOTE: `stream.allMatch(i -&gt; i &gt; 1)` returns false, as 1st element of the stream (1) returns false for the predicate and `stream.noneMatch(i -&gt; i &gt; 1)` returns false, as 2nd element of the stream (2) returns true for the predicate.</p>", "question": "<p><strong>Question ID: UKOCP73631</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Integer&gt; stream = Stream.iterate(1, i -&gt; i + 1);\n        System.out.println(stream.anyMatch(i -&gt; i &gt; 1));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP73631Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Integer&gt; stream = Stream.iterate(1, i -&gt; i + 1);\n        System.out.println(stream.anyMatch(i -&gt; i &gt; 1));\n    }\n}What is the result?", "related_lectures": []}]};

    // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();
    // ---- END RESTORE ----

    function select(question, answer) {
      var questionElement = document.getElementById(question);
      var answers = questionElement.getElementsByClassName("answer");
      for (var i = 0; i < answers.length; i++) {
        var span = answers[i].children[0].children[0].children[0];
        var input = answers[i].children[0].children[0].children[1];
        span.classList.remove("selected");
        input.checked = false;
      }
      var span = answers[answer].children[0].children[0].children[0];
      var input = answers[answer].children[0].children[0].children[1];
      span.classList.add("selected");
      input.checked = true;
    }
