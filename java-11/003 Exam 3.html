    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 80116460, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51495</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">int i = 10;\nSystem.out.println(i &gt; 3 != false);</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "true", "false", "null"], "explanation": "<p><strong>UKOCP51495: </strong></p><p>Given Expression: </p><p>i &gt; 3 != false</p><p>It has 2 operators &gt; and !=. &gt; has higher precedence over !=, hence given expression can be written as: </p><p>(i &gt; 3) != false</p><p>Let's solve above expression: </p><p>true != false</p><p>true</p><p><br></p><p>Hence true is printed on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP51495Consider below code snippet:int i = 10;\nSystem.out.println(i &gt; 3 != false);What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116512, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP69175</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(List.of(\"A\", \"E\", \"I\", \"O\", \"U\"));\n        if(verify(list, l -&gt; l.remove(\"I\"))) //Line n1\n            if(verify(list, l -&gt; l.add(\"I\"))){} //Line n2\n\n        System.out.println(list);\n    }\n\n    private static boolean verify(List&lt;String&gt; list, Predicate&lt;List&lt;String&gt;&gt; predicate) {\n        return predicate.test(list); //Line n3\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "[A, E, I, O, U]", "[A, E, O, U]", "[A, E, O, U, I]"], "explanation": "<p><strong>UKOCP69175: </strong></p><p>verify(...) method accepts 2 parameters: List&lt;String&gt; type and Predicate&lt;List&lt;String&gt;&gt; type.</p><p>For Predicate&lt;List&lt;String&gt;&gt;, test method should have the signature: `boolean test(List&lt;String&gt; t);`</p><p>Line n3 correctly invokes the test(...) method of Predicate&lt;List&lt;String&gt;&gt; interface.</p><p><br></p><p>`List&lt;String&gt; list = new ArrayList&lt;&gt;(List.of(\"A\", \"E\", \"I\", \"O\", \"U\"));` It constructs the ArrayList instance containing the elements of the specified collection (list object returned by List.of(...)). This ArrayList object is not backed by the passed collection and hence can be modified without any issues. list --&gt; {A, E, I, O, U}</p><p><br></p><p>remove(Object) method of List interface returns true if removal was successful otherwise false.</p><p>add(E) method of List interface returns true if addition was successful otherwise false.</p><p><br></p><p>As, both the methods, remove(Object) and add(E) return boolean value, hence these methods can be used as the body of lambda expression of Predicate interface. </p><p><br></p><p>Line n1 is a valid call to verify(...) method and it removes matching element \"I\" from the list and returns true. So, list --&gt; {A, E, O, U}. As true is returned, hence control goes inside if-block to execute Line n2.</p><p><br></p><p>Line n2 is also a valid call to verify(...) method and it adds \"I\" at the end of the list and returns true. list --&gt; {A, E, O, U, I}. But as there is nothing inside this if-block, hence control goes to the last statement inside main(String[]) method, `System.out.println(list);` is executed and [A, E, O, U, I] is printed on to the console. </p>", "relatedLectureIds": ""}, "correct_response": ["f"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP69175Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(List.of(\"A\", \"E\", \"I\", \"O\", \"U\"));\n        if(verify(list, l -&gt; l.remove(\"I\"))) //Line n1\n            if(verify(list, l -&gt; l.add(\"I\"))){} //Line n2\n\n        System.out.println(list);\n    }\n\n    private static boolean verify(List&lt;String&gt; list, Predicate&lt;List&lt;String&gt;&gt; predicate) {\n        return predicate.test(list); //Line n3\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116510, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP83498</strong></p><p><br></p><p>Consider below code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Operator&lt;T&gt; {\n    T operate(T t);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Operator&lt;String&gt; opr =  s -&gt; s.toUpperCase(); //Line n1\n        System.out.println(opr.operate(\"lambda and method references\"));\n    }\n}</pre><p><br></p><p>On execution, above code prints LAMBDA AND METHOD REFERENCES on to the console. </p><p>Which of the following can replace Line n1 such that there is no change in the output?</p>", "feedbacks": ["", "", "", ""], "answers": ["<p><code>Operator&lt;String&gt; opr =&nbsp; s.toUpperCase();</code> </p>", "<p><code>Operator&lt;String&gt; opr =&nbsp; s::toUpperCase();</code> </p>", "<p><code>Operator&lt;String&gt; opr =&nbsp; s::toUpperCase;</code> </p>", "<p><code>Operator&lt;String&gt; opr =&nbsp; String::toUpperCase;</code> </p>"], "explanation": "<p><strong>UKOCP83498: </strong></p><p>This is an example of \"Reference to an Instance Method of an Arbitrary Object of a Particular Type\". </p><p>Parameter of lambda expression is used to invoke the toUpperCase() method and toUpperCase() method accepts no parameter, which means one parameter less than the operate method. </p><p>So, correct method reference syntax is: String::toUpperCase;</p><p>Note round brackets are not used in any of the method reference syntax.</p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP83498Consider below code:package com.udayankhattry.ocp;\n\ninterface Operator&lt;T&gt; {\n    T operate(T t);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Operator&lt;String&gt; opr =  s -&gt; s.toUpperCase(); //Line n1\n        System.out.println(opr.operate(\"lambda and method references\"));\n    }\n}On execution, above code prints LAMBDA AND METHOD REFERENCES on to the console. Which of the following can replace Line n1 such that there is no change in the output?", "related_lectures": []}, {"_class": "assessment", "id": 80116508, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP52747</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Dancer {\n    default void dance() {\n        System.out.println(\"DANCER\");\n    }\n}\n\ninterface TapDancer extends Dancer {\n    void dance();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        TapDancer td = () -&gt; System.out.println(\"TAPDANCER\"); //Line n1\n        ((Dancer)td).dance(); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["DANCER", "TAPDANCER", "Compilation error in TapDancer interface", "Compilation error in Test class", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP52747: </strong></p><p>Interfaces in Java can define default methods, hence no issues with Dancer interface.</p><p><br></p><p>Interface TapDancer is a Functional Interface, as it has one non-overriding abstract method dance(). Interfaces in java are allowed to override default method with abstract method. Interface TapDancer compiles successfully. </p><p><br></p><p>As TapDancer is a Functional Interface, hence it can be a target type of lambda expression. Line n1 compiles successfully. </p><p><br></p><p>Dancer is a supertype of TapDancer, hence reference variable can be easily typecasted to Dancer. And dance() method is available in Dancer interface, so no issues with Line n2 as well, it compiles successfully. But at runtime, method of lambda expression will be invoked. </p><p>Given code executes successfully and prints TAPDANCER on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP52747Given code: package com.udayankhattry.ocp;\n\ninterface Dancer {\n    default void dance() {\n        System.out.println(\"DANCER\");\n    }\n}\n\ninterface TapDancer extends Dancer {\n    void dance();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        TapDancer td = () -&gt; System.out.println(\"TAPDANCER\"); //Line n1\n        ((Dancer)td).dance(); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116506, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP26464</strong></p><p><br></p><p>For the given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Operator {\n    int operate(int i, int j);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        System.out.println(opr.operate(10, 20));\n    }\n} </pre><p><br></p><p>Which of the following options successfully replace /*INSERT*/ such that on execution, 30 is printed on to the console?</p><p>Choose 3 options.</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["<p><code>Operator opr = (int x, int y) -&gt; { return x + y; };</code> </p>", "<p><code>Operator opr = (x, y) -&gt; { return x + y; };</code> </p>", "<p><code>Operator opr = (x, y) -&gt;&nbsp; return x + y;</code> </p>", "<p><code>Operator opr = (x, y) -&gt;&nbsp; x + y;</code> </p>", "<p><code>Operator opr = x, y -&gt;&nbsp; x + y;</code> </p>", "<p><code>Operator opr = (int x, var y) -&gt;&nbsp; x + y;</code> </p>", "<p><code>Operator opr = (int x, y) -&gt;&nbsp; x + y;</code> </p>"], "explanation": "<p><strong>UKOCP26464: </strong></p><p><code>Operator opr = (int x, int y) -&gt; { return x + y; };</code></p><p>\u2713&nbsp; operate(int, int) method accepts two int type parameters and returns the addition of passed parameters.</p><p><br></p><p><code>Operator opr = (x, y) -&gt; { return x + y; };</code></p><p>\u2713&nbsp; Type is removed from left part, type inference handles it.</p><p><br></p><p><code>Operator opr = (x, y) -&gt;&nbsp; return x + y;</code></p><p>\u2717&nbsp; Compilation error, if there is only one statement in the right side then semicolon inside the body, curly brackets and return keyword(if available) can be removed. But all should be removed. You can't just remove one and leave others.</p><p><br></p><p><code>Operator opr = (x, y) -&gt;&nbsp; x + y;</code></p><p>\u2713&nbsp; Semicolon inside the body, curly brackets and return keyword, all 3 are removed from right side.</p><p><br></p><p><code>Operator opr = x, y -&gt;&nbsp; x + y;</code></p><p>\u2717&nbsp; Compilation error, if there are no parameters or more than one parameter available, then parentheses or round brackets '()' cannot be removed from left side.</p><p><br></p><p><code>Operator opr = (int x, var y) -&gt;&nbsp; x + y;</code></p><p>\u2717&nbsp; Compilation error, local variable type inference and explicitly-typed parameters cannot be mixed. </p><p><br></p><p><code>Operator opr = (int x, y) -&gt;&nbsp; x + y;</code></p><p>\u2717&nbsp; Compilation error, implicitly-typed and explicitly-typed parameters cannot be mixed. </p>", "relatedLectureIds": ""}, "correct_response": ["a", "b", "d"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP26464For the given code:package com.udayankhattry.ocp;\n\ninterface Operator {\n    int operate(int i, int j);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        System.out.println(opr.operate(10, 20));\n    }\n} Which of the following options successfully replace /*INSERT*/ such that on execution, 30 is printed on to the console?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 80116504, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP83821</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map1 = Map.of(\"1\", \"2\", \"3\", \"4\");\n        var map2 = Map.ofEntries(Map.entry(\"3\", \"4\"), Map.entry(\"1\", \"2\"));\n        var list1 = List.of(\"1\", \"2\", \"3\", \"4\");\n        var list2 = List.of(\"4\", \"3\", \"2\", \"1\");\n        System.out.println(map1.equals(map2) + \":\" + list1.equals(list2));\n     }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["true:true", "false:false", "true:false", "false:true"], "explanation": "<p><strong>UKOCP83821: </strong></p><p>There are 11 overloaded of methods in Map interface:</p><p>Map.of()</p><p>Map.of(K k1, V v1)</p><p>Map.of(K k1, V v1, K k2, V v2)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8, K k9, V v9)</p><p>Map.of(K k1, V v1, K k2, V v2, K k3, V v3, K k4, V v4, K k5, V v5, K k6, V v6, K k7, V v7, K k8, V v8, K k9, V v9, K k10, V v10)</p><p><br></p><p>These create an unmodifiable map containing specified keys and values. </p><p>These methods throw NullPointerException - if any key or value is null or IllegalArgumentException - if the keys are duplicates</p><p><br></p><p>Please note interfaces List and Set contain 12 overloaded of methods each, whereas interface Map contains 11 overloaded of methods. Varargs version is not available in Map interface. </p><p>To provide more than 10 key-value pairs use, Map.ofEntries\u200b(Map.Entry&lt;? extends K,\u200b? extends V&gt;... entries) method.</p><p><br></p><p>Variable 'map1' refers to Map object containing 2 key-value pairs. Variable 'map2' refers to different Map object containing same 2 key-value pairs. </p><p>According to the Javadoc of equals(Object) method of Map interface, it compares the specified object with this map for equality. Returns true if the given object is also a map and the two maps represent the same mappings. More formally, two maps m1 and m2 represent the same mappings if m1.entrySet().equals(m2.entrySet()). </p><p>Hence, `map1.equals(map2)` evaluates to true. </p><p><br></p><p>There are 12 overloaded of methods in List interface:</p><p>List.of()</p><p>List.of(E e1)</p><p>List.of\u200b(E e1, E e2)</p><p>List.of(E e1, E e2, E e3)</p><p>List.of(E e1, E e2, E e3, E e4)</p><p>List.of(E e1, E e2, E e3, E e4, E e5)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>List.of(E... elements)</p><p><br></p><p>These create an unmodifiable list containing specified elements. </p><p>These methods throw NullPointerException - if an element is null</p><p><br></p><p>Variable 'list1' refers to List object containing elements \"1\", \"2\" , \"3\" &amp; \"4\" in order. Variable 'list2' refers to List object containing elements \"4\", \"3\", \"2\" &amp; \"1\" in order. </p><p>According to the Javadoc of equals(Object) method of Map interface, it compares the specified object with this list for equality. Returns true if and only if the specified object is also a list, both lists have the same size, and all corresponding pairs of elements in the two lists are equal. (Two elements e1 and e2 are equal if Objects.equals(e1, e2).) In other words, two lists are defined to be equal if they contain the same elements in the same order.</p><p>Hence, `list1.equals(list2)` evaluates to false. </p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP83821Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map1 = Map.of(\"1\", \"2\", \"3\", \"4\");\n        var map2 = Map.ofEntries(Map.entry(\"3\", \"4\"), Map.entry(\"1\", \"2\"));\n        var list1 = List.of(\"1\", \"2\", \"3\", \"4\");\n        var list2 = List.of(\"4\", \"3\", \"2\", \"1\");\n        System.out.println(map1.equals(map2) + \":\" + list1.equals(list2));\n     }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116502, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP32269</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Student) {\n            Student stud = (Student)obj;\n            return this.name.equals(stud.name) &amp;&amp; this.age == stud.age;\n        }\n        return false;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Student&gt; students = new HashSet&lt;&gt;();\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 22));\n\n        System.out.println(students.size());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", ""], "answers": ["3", "2", "Runtime Exception"], "explanation": "<p><strong>UKOCP32269: </strong></p><p>HashSet makes use of hashCode to find out the correct bucket, it then makes use of equals(Object) method to find out duplicate objects. </p><p><br></p><p>Student class correctly overrides equals(Object) method but it doesn't override hashCode() method. This means you get different hashCode for different objects. </p><p>HashSet in this case cannot find out duplicate Student objects and 3 Student objects are added to the Set. </p><p><br></p><p>System.out.println(students.size()); =&gt; Prints 3 on to the console. </p><p><br></p><p>To avoid duplicate in the given Set, override hashCode() method in Student class:</p><pre class=\"prettyprint linenums\">public int hashCode() {\n    return name.hashCode() + age;\n}</pre>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP32269Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Student) {\n            Student stud = (Student)obj;\n            return this.name.equals(stud.name) &amp;&amp; this.age == stud.age;\n        }\n        return false;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Student&gt; students = new HashSet&lt;&gt;();\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 22));\n\n        System.out.println(students.size());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116500, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP21142</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\ninterface Sellable {}\nabstract class Animal {}\nclass Mammal extends Animal{}\nclass Rabbit extends Mammal implements Sellable{}\n\npublic class Test {\n    {\n        List&lt;Animal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n    {\n        List&lt;Animal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Mammal());\n    }\n    {\n        List&lt;Mammal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n    {\n        List&lt;Sellable&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Mammal());\n    }\n    {\n        List&lt;Sellable&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n}</pre><p><br></p><p>Which of the following statements is true?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["Only one initializer block causes compilation error", "Two initializer blocks cause compilation error", "Three initializer blocks cause compilation error", "Four initializer blocks cause compilation error", "Five initializer blocks cause compilation error"], "explanation": "<p><strong>UKOCP21142: </strong></p><p>Even though code seems to be checking the knowledge of ArrayList but it actually checks the knowledge of Polymorphism.&nbsp; </p><p>List&lt;Sellable&gt; list = new ArrayList&lt;&gt;(); is valid statement and list can accept any object passing instanceof check for Sellable type.&nbsp; </p><p>Rabbit implements Sellable hence new Rabbit() can be added to list.&nbsp; </p><p>But as Mammal doesn't implement Sellable hence new Mammal() can't be added to list. </p><p><br></p><p>Other initializer blocks can be verified on similar lines. So there is only one initializer block, which causes compilation error. </p>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP21142Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\ninterface Sellable {}\nabstract class Animal {}\nclass Mammal extends Animal{}\nclass Rabbit extends Mammal implements Sellable{}\n\npublic class Test {\n    {\n        List&lt;Animal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n    {\n        List&lt;Animal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Mammal());\n    }\n    {\n        List&lt;Mammal&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n    {\n        List&lt;Sellable&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Mammal());\n    }\n    {\n        List&lt;Sellable&gt; list = new ArrayList&lt;&gt;();\n        list.add(new Rabbit());\n    }\n}Which of the following statements is true?", "related_lectures": []}, {"_class": "assessment", "id": 80116498, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68250</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; dryFruits = new ArrayList&lt;&gt;();\n        dryFruits.add(\"Walnut\");\n        dryFruits.add(\"Apricot\");\n        dryFruits.add(\"Almond\");\n        dryFruits.add(\"Date\");\n    \n        for(String dryFruit : dryFruits) {\n            if(dryFruit.startsWith(\"A\")) {\n                dryFruits.remove(dryFruit);\n            }\n        }\n        \n        System.out.println(dryFruits);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "answers": ["[Walnut, Apricot, Almond, Date]", "[Walnut, Date]", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP68250: </strong></p><p>ConcurrentModificationException exception may be thrown for following condition:</p><p>1. Collection is being iterated using Iterator/ListIterator or by using for-each loop. </p><p>And</p><p>2. Execution of Iterator.next(), Iterator.remove(), ListIterator.previous(), ListIterator.set(E) &amp; ListIterator.add(E) methods. These methods may throw java.util.ConcurrentModificationException in case Collection had been modified by means other than the iterator itself, such as Collection.add(E) or Collection.remove(Object) or List.remove(int) etc.</p><p><br></p><p>PLEASE NOTE: for-each loop internally implements Iterator and invokes hasNext() and next() methods.</p><p><br></p><p>For the given code, 'dryFruits' list is being iterated using for-each loop (internally as an Iterator).</p><p>hasNext() method of Iterator has following implementation:</p><pre class=\"prettyprint linenums\">public boolean hasNext() {\n    return cursor != size;\n}</pre><p>Where cursor is the index of next element to return and initially it is 0.</p><p><br></p><p>1st Iteration: cursor = 0, size = 4, hasNext() returns true. iterator.next() increments the cursor by 1 and returns \"Walnut\".</p><p>2nd Iteration: cursor = 1, size = 4, hasNext() returns true. iterator.next() increments the cursor by 1 and returns \"Apricot\". As \"Apricot\" starts with \"A\", hence dryFruits.remove(dryFruit) removes \"Apricot\" from the list and hence reducing the list's size by 1, size becomes 3.</p><p>3rd Iteration: cursor = 2, size = 3, hasNext() returns true. iterator.next() method throws java.util.ConcurrentModificationException.</p><p><br></p><p>If you want to successfully remove the items from ArrayList, while using Iterator or ListIterator, then use Iterator.remove() or ListIterator.remove() method and NOT List.remove(...) method. Using List.remove(...) method while iterating the list (using the Iterator/ListIterator or for-each) may throw java.util.ConcurrentModificationException.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP68250Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; dryFruits = new ArrayList&lt;&gt;();\n        dryFruits.add(\"Walnut\");\n        dryFruits.add(\"Apricot\");\n        dryFruits.add(\"Almond\");\n        dryFruits.add(\"Date\");\n    \n        for(String dryFruit : dryFruits) {\n            if(dryFruit.startsWith(\"A\")) {\n                dryFruits.remove(dryFruit);\n            }\n        }\n        \n        System.out.println(dryFruits);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116496, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68264</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static &lt;T&gt; T get(T t) {\n        return t;\n    }\n\n    public static void main(String[] args) {\n        String str = get(\"HELLO\");\n        System.out.println(str);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "answers": ["HELLO", "Compilation error in &#39;get&#39; method", "Compilation error in &#39;main&#39; method", "Runtime Exception"], "explanation": "<p><strong>UKOCP68264: </strong></p><p>Return type of generic method 'get' is T, which is correctly defined before the return type of the method. </p><p>get(\"HELLO\"); passed String so return value should be String only. String result is stored in str variable and same is printed using System.out.println statement. </p>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP68264Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static &lt;T&gt; T get(T t) {\n        return t;\n    }\n\n    public static void main(String[] args) {\n        String str = get(\"HELLO\");\n        System.out.println(str);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116494, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP34034</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        char [] arr1 = {'A'};\n        char [] arr2 = {'A', 'A', 'A', 'A'};\n        System.out.println(Arrays.compare(arr1, arr2));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["0", "1", "2", "3", "-1", "-2", "<p>-3</p>"], "explanation": "<p><strong>UKOCP34034: </strong></p><p>Arrays class has following overloaded compare methods for primitive type arrays:</p><p>int compare\u200b(boolean[] a, boolean[] b)</p><p>int compare\u200b(byte[] a, byte[] b)</p><p>int compare\u200b(short[] a, short[] b)</p><p>int compare\u200b(char[] a, char[] b)</p><p>int compare\u200b(int[] a, int[] b)</p><p>int compare\u200b(long[] a, long[] b)</p><p>int compare\u200b(float[] a, float[] b)</p><p>int compare\u200b(double[] a, double[] b)</p><p><br></p><p>For comparing the array contents, these methods take help of static compare(x, y) method defined in respective Wrapper classes. For example, Arrays.compare(char[] a, char[] b) uses Character.compare(char x, char y) to compare array contents.</p><p>So, for the exam, you need to have an idea of how static compare(...) methods are implemented in these wrapper classes:</p><p>For Character, Byte &amp; Short; compare method returns x - y.</p><p>For Integer and Long; compare method returns -1 if x &lt; y, it returns 1 if x &gt; y and it returns 0 if x == y.</p><p>For Float and Double; logic is almost same as Integer type but logic is bit complex for finding equality of two floats or two doubles (not part of the exam).</p><p>For Boolean; compare method returns 0 if x == y, 1 if x is true and -1 if x is false.</p><p><br></p><p>All of these compare methods of Arrays class compare the arrays lexicographically and return below values:</p><p>0:&nbsp; if the first and second array are equal and contain the same elements in the same order</p><p>&lt;0: if the first array is lexicographically less than the second array</p><p>&gt;0: if the first array is lexicographically greater than the second array</p><p><br></p><p>Consider following scenarios for lexicographic comparison of arrays:&nbsp; </p><p>A. If 1st array is null and 2nd array is not null, return -1.</p><p>E.g., Arrays.compare(null, new char[] {'A'}) returns -1</p><p><br></p><p>B. If 2nd array is null and 1st array is not null, return 1.</p><p>E.g., Arrays.compare(new boolean[] {false}, null) returns 1</p><p><br></p><p>C. If both the arrays are null, return 0.</p><p>E.g., Arrays.compare((int []) null, (int []) null) returns 0</p><p><br></p><p>D. If both the arrays are of equal lengths and contain same elements in the same order, return 0.</p><p>E.g., Arrays.compare(new char[] {'A', 'C', 'E'}, new char[] {'A', 'C', 'E'}) returns 0</p><p><br></p><p>E. If one array is the proper prefix of the other, then return a.length - b.length, where a refers to 1st array and b refers to 2nd array. </p><p>E.g., Arrays.compare(new char[] {'A', 'C', 'E'}, new char[] {'A'}) returns 3 - 1, which is 2. Please note that 2nd array is a proper prefix of 1st array.</p><p><br></p><p>F. For unequal arrays, respective compare methods of wrapper classes are invoked and it returns non-zero value (positive or negative) based on the array element comparison: </p><p>E.g., </p><p>Arrays.compare(new char[] {'A', 'C', 'E'}, new char[] {'E', 'Y'}) returns -4, which is the result of Character.compare('A', 'E').</p><p>Arrays.compare(new int[] {5, 10, 15, 20}, new int[] {5, 100, 150, 200}) returns -1, which is the result of Integer.compare(10, 100).</p><p>Arrays.compare(new byte[] {5, 10, 100, 20}, new byte[] {5, 10, 15}) returns 85, which is the result of Byte.compare((byte)100, (byte)15).</p><p><br></p><p>For the given code,</p><pre class=\"prettyprint linenums\">char [] arr1 = {'A'};\nchar [] arr2 = {'A', 'A', 'A', 'A'};</pre><p>arr1 is a proper prefix of arr2.</p><p>Hence, Arrays.compare(arr1, arr2) = arr1.length - arr2.length = 1 - 4 = -3</p><p><br></p><p>Output of the given code is: -3.</p>", "relatedLectureIds": ""}, "correct_response": ["g"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP34034Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        char [] arr1 = {'A'};\n        char [] arr2 = {'A', 'A', 'A', 'A'};\n        System.out.println(Arrays.compare(arr1, arr2));\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 80116492, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP38841</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int[] arr1 = { 10, 100, 1000 }; //Line n1\n        char[] arr2 = { 'x', 'y', 'z' }; //Line n2\n        arr1 = arr2; // Line n3\n        for (int i = 0; i &lt; arr1.length; i++) {\n            System.out.print(arr1[i] + \" \"); //Line n4\n        }\n    }\n}</pre><p><br></p><p>ASCII code of 'x' is 120, 'y' is 121 and z is 122. </p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["10 100 1000 ", "x y z ", "120 121 122 ", "0 0 0 ", "Compilation error"], "explanation": "<p><strong>UKOCP38841: </strong></p><p>Line n1 creates an int array object of 3 elements: 10, 100, 1000 and arr1 refers to it.</p><p>Line n2 creates an char array object of 3 elements: 'x', 'y', 'z'.</p><p>Statement `arr1 = arr2;` causes compilation error as char [] is not compatible with int [] even though char is compatible with int. </p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP38841Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int[] arr1 = { 10, 100, 1000 }; //Line n1\n        char[] arr2 = { 'x', 'y', 'z' }; //Line n2\n        arr1 = arr2; // Line n3\n        for (int i = 0; i &lt; arr1.length; i++) {\n            System.out.print(arr1[i] + \" \"); //Line n4\n        }\n    }\n}ASCII code of 'x' is 120, 'y' is 121 and z is 122. What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116490, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP17187</strong></p><p><br></p><p>Given code:&nbsp;</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass MyException extends RuntimeException {\n    public void log() {\n        System.out.println(\"Logging MyException\");\n    }\n}\n\nclass YourException extends RuntimeException {\n    public void log() {\n        System.out.println(\"Logging YourException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            throw new MyException();\n        } catch(MyException | YourException ex){\n            ex.log();\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "answers": ["Logging MyException", "Logging YourException", "Compilation error", "Runtime Exception"], "explanation": "<p><strong>UKOCP17187: </strong></p><p>In a multi-catch block, type of reference variable (ex in this case) is the common base class of all the Exception types mentioned, 'MyException' and 'YourException'. </p><p>This means ex is of RuntimeException. Method log() is not available in RuntimeException or its super classes.</p><p><br></p><p>ex.log(); causes compilation failure. </p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP17187Given code:&nbsp;package com.udayankhattry.ocp;\n\nclass MyException extends RuntimeException {\n    public void log() {\n        System.out.println(\"Logging MyException\");\n    }\n}\n\nclass YourException extends RuntimeException {\n    public void log() {\n        System.out.println(\"Logging YourException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            throw new MyException();\n        } catch(MyException | YourException ex){\n            ex.log();\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116488, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP19357</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\nabstract class Super {\n    public abstract void m1() throws IOException;\n}\n\nclass Sub extends Super {\n    @Override\n    public void m1() throws IOException {\n        throw new FileNotFoundException();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Super s = new Sub();\n        try {\n            s.m1();\n        } catch (IOException e) {\n            System.out.print(\"A\");\n        } catch(FileNotFoundException e) {\n            System.out.print(\"B\");\n        } finally {\n            System.out.print(\"C\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "answers": ["AC", "BC", "class Sub causes compilation error", "class Test causes compilation error"], "explanation": "<p><strong>UKOCP19357: </strong></p><p>Method m1() of Sub class correctly overrides the method m1() of Super class, so there is no compilation error in Sub class.</p><p><br></p><p>FileNotFoundException extends IOException and hence catch block of FileNotFoundException should appear before the catch block of IOException. </p><p>Therefore, class Test causes compilation error.</p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP19357Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\nabstract class Super {\n    public abstract void m1() throws IOException;\n}\n\nclass Sub extends Super {\n    @Override\n    public void m1() throws IOException {\n        throw new FileNotFoundException();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Super s = new Sub();\n        try {\n            s.m1();\n        } catch (IOException e) {\n            System.out.print(\"A\");\n        } catch(FileNotFoundException e) {\n            System.out.print(\"B\");\n        } finally {\n            System.out.print(\"C\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116484, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP38092</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Document {\n    default String getType() {\n        return \"TEXT\";\n    }\n}\n\ninterface WordDocument extends Document {\n    String getType();\n}\n\nclass Word implements WordDocument {}\n\npublic class Test {\n    public static void main(String[] args) {\n        Document doc = new Word(); //Line n1\n        System.out.println(doc.getType()); //Line n2\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "feedbacks": ["", "", "", ""], "answers": ["Interface Document causes compilation error", "Interface WordDocument causes compilation error", "Class Word causes compilation error", "Test class compiles successfully and on execution prints TEXT on to the console"], "explanation": "<p><strong>UKOCP38092: </strong></p><p>As per Java 8, default methods were added in the interface. </p><p>Interface Document defines default method getType(), there is no compilation error in interface Document. Method getType() is implicitly public in Document.</p><p>Interface WordDocument extends Document and it overrides the default method getType() of Document, overriding method in WordDocument is implicitly abstract and public. An interface in java can override the default method of super type with abstract modifier. Interface WordDocument compiles successfully.</p><p>Class Word implements WordDocument and as WordDocument interface has abstract method getType(), and as class Word doesn't implement the getType() method hence it causes compilation failure.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP38092Given code of Test.java file: package com.udayankhattry.ocp;\n\ninterface Document {\n    default String getType() {\n        return \"TEXT\";\n    }\n}\n\ninterface WordDocument extends Document {\n    String getType();\n}\n\nclass Word implements WordDocument {}\n\npublic class Test {\n    public static void main(String[] args) {\n        Document doc = new Word(); //Line n1\n        System.out.println(doc.getType()); //Line n2\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 80116486, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42586</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            System.out.println(args[1].length());\n        } catch (RuntimeException ex) {\n            System.out.println(\"ONE\");\n        } catch (FileNotFoundException ex) {\n            System.out.println(\"TWO\");\n        }\n        System.out.println(\"THREE\");\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["<p>ONE</p><p>THREE</p>", "<p>TWO</p><p>THREE</p>", "THREE", "None of the System.out.println statements is executed", "Compilation error"], "explanation": "<p><strong>UKOCP42586: </strong></p><p>java.io.FileNotFoundException exception is a checked exception.</p><p><br></p><p>Java doesn't allow to catch specific checked exceptions if these are not thrown by the statements inside try block. catch(FileNotFoundException ex) {} causes compilation error in this case as System.out.println(1); will never throw FileNotFoundException. </p><p><br></p><p>NOTE: Java allows to catch Exception type. catch(Exception ex) {} will never cause compilation error.</p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP42586Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            System.out.println(args[1].length());\n        } catch (RuntimeException ex) {\n            System.out.println(\"ONE\");\n        } catch (FileNotFoundException ex) {\n            System.out.println(\"TWO\");\n        }\n        System.out.println(\"THREE\");\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116458, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP80827</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    \n    private static void add(double d1, double d2) {\n        System.out.println(\"double version: \" + (d1 + d2));\n    }\n    \n    private static void add(Double d1, Double d2) {\n        System.out.println(\"Double version: \" + (d1 + d2));\n    }\n    \n    public static void main(String[] args) {\n        add(10.0, null);\n    }\n    \n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP80827: </strong></p><p>add(10.0, null); =&gt; Compiler can't convert null to double primitive type, so 2nd argument is tagged to Double reference type. So to match the method call, 10.0 is converted to Double object by auto-boxing and add(10.0, null); is tagged to add(Double, Double); method. </p><p><br></p><p>But at the time of execution, d2 is null so System.out.println(\"Double version: \" + (d1 + d2)); throws NullPointerException. </p>", "answers": ["Compilation error", "double version: 10.0", "Double version: 10.0", "An exception is thrown at runtime"]}, "correct_response": ["d"], "section": "1.2 Working with data types: Wrapper types", "question_plain": "Question ID: UKOCP80827Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    \n    private static void add(double d1, double d2) {\n        System.out.println(\"double version: \" + (d1 + d2));\n    }\n    \n    private static void add(Double d1, Double d2) {\n        System.out.println(\"Double version: \" + (d1 + d2));\n    }\n    \n    public static void main(String[] args) {\n        add(10.0, null);\n    }\n    \n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116462, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP20300</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        boolean flag1 = \"Java\" == \"Java\".replace('J', 'J'); //Line n1\n        boolean flag2 = \"Java\" == \"Java\".replace(\"J\", \"J\"); //Line n2\n        System.out.println(flag1 &amp;&amp; flag2);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP20300: </strong></p><p>String class has following two overloaded replace methods: </p><p>1. public String replace(char oldChar, char newChar) {}: </p><p>Returns a string resulting from replacing all occurrences of oldChar in this string with newChar. If no replacement is done, then source String object is returned. e.g.</p><p>\"Java\".replace('a', 'A') --&gt; returns new String object \"JAvA\".</p><p>\"Java\".replace('a', 'a') --&gt; returns the source String object \"Java\" (no change).</p><p>\"Java\".replace('m', 'M') --&gt; returns the source String object \"Java\" (no change).</p><p><br></p><p>2. public String replace(CharSequence target, CharSequence replacement) {}: </p><p>Returns a new String object after replacing each substring of this string that matches the literal target sequence with the specified literal replacement sequence. e.g. </p><p>\"Java\".replace(\"a\", \"A\") --&gt; returns new String object \"JAvA\".</p><p>\"Java\".replace(\"a\", \"a\") --&gt; returns new String object \"Java\" (it replaces \"a\" with \"a\").</p><p>\"Java\".replace(\"m\", \"M\") --&gt; returns the source String object \"Java\" (no change).</p><p><br></p><p>For Line n1, as both oldChar and newChar are same, hence source String (\"Java\") is returned by `\"Java\".replace('J', 'J');` without any change. flag1 stores true.</p><p>For Line n2, even though target and replacement are same but as \"J\" is found in the source String, hence a new String object \"Java\" is returned by `\"Java\".replace(\"J\", \"J\");` after replacing \"J\" with \"J\". flag2 stores false.</p><p>flag1 &amp;&amp; flag2 evaluates to false.</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "true", "false"]}, "correct_response": ["d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP20300Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        boolean flag1 = \"Java\" == \"Java\".replace('J', 'J'); //Line n1\n        boolean flag2 = \"Java\" == \"Java\".replace(\"J\", \"J\"); //Line n2\n        System.out.println(flag1 &amp;&amp; flag2);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116464, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP44744</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"TOMATO\");\n        System.out.println(sb.reverse().replace(\"O\", \"A\")); //Line n1\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["TOMATO", "TAMATO", "TAMATA", "OTAMOT", "OTAMAT", "ATAMAT", "<p>Compilation error</p>"], "explanation": "<p><strong>UKOCP44744: </strong></p><p>sb --&gt; {\"TOMATO\"}</p><p>sb.reverse() --&gt; {\"OTAMOT\"}. reverse() method returns a StringBuilder object. </p><p>replace method of StringBuilder class accepts 3 arguments: `replace(int start, int end, String str)`. At Line n1, replace(\"O\", \"A\") method accepts 2 arguments and hence it causes compilation error.</p>", "relatedLectureIds": ""}, "correct_response": ["g"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP44744Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"TOMATO\");\n        System.out.println(sb.reverse().replace(\"O\", \"A\")); //Line n1\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116466, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP20722</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String fruit = \"mango\";\n        switch (fruit) {\n            case \"Apple\":\n                System.out.println(\"APPLE\");\n            case \"Mango\":\n                System.out.println(\"MANGO\");\n            case \"Banana\":\n                System.out.println(\"BANANA\");\n                break;\n            default:\n                System.out.println(\"ANY FRUIT WILL DO\");\n        }\n    }\n}</pre>", "feedbacks": ["", "", "", "", ""], "answers": ["MANGO", "ANY FRUIT WILL DO", "<p>MANGO</p><p>BANANA</p>", "<p>MANGO</p><p>ANY FRUIT WILL DO</p>", "<p>MANGO</p><p>BANANA</p><p>ANY FRUIT WILL DO</p>"], "explanation": "<p><strong>UKOCP20722: </strong></p><p>\"mango\" is different from \"Mango\", so there is no matching case available. default block is executed and as it is the last block inside switch hence after printing \"ANY FRUIT WILL DO\" control goes out of switch block, main method ends and program terminates successfully.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP20722What will be the result of compiling and executing Test class?package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String fruit = \"mango\";\n        switch (fruit) {\n            case \"Apple\":\n                System.out.println(\"APPLE\");\n            case \"Mango\":\n                System.out.println(\"MANGO\");\n            case \"Banana\":\n                System.out.println(\"BANANA\");\n                break;\n            default:\n                System.out.println(\"ANY FRUIT WILL DO\");\n        }\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 80116468, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP64314</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var: while (true) { //Line n1\n            i: for (int i = 0; i &lt;= 2; i++) {\n                if(i == 2) {\n                    /*INSERT*/\n                }\n            }\n        }\n        System.out.println(\"THINK DIFFERENT\"); //Line n2\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print THINK DIFFERENT on to the console?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["<p><code>continue;</code> </p>", "<p><code>continue i;</code> </p>", "<p><code>continue var;</code> </p>", "<p><code>break;</code> </p>", "<p><code>break i;</code> </p>", "<p><code>break var;</code> </p>"], "explanation": "<p><strong>UKOCP64314: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name, package name or loop's label but it cannot be used as a class or interface name.</p><p>At Line n1, 'var' is used as while loop's label, so no issues at Line n1.</p><p><br></p><p>while(true) is and infinite loop and compiler is aware of that, so unless and until you provide the logic to break out of the loop, compiler considers Line n2 as unreachable code, which causes compilation failure.</p><p>continue statements don't break out of the loop so even if you use `continue;`, `continue i;` or `continue var;` to replace /*INSERT*/, unreachable code error will still be there.</p><p><br></p><p>`break;` and `break i;` statements are same and will break out to the inner for loop, Line n2 will still be unreachable.</p><p><br></p><p>`break var;` will successfully break out of the outer while loop. </p><p><br></p><p>On execution, control will come out of the while loop, when i equals to 2 and THINK DIFFERENT will be printed on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["f"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP64314Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var: while (true) { //Line n1\n            i: for (int i = 0; i &lt;= 2; i++) {\n                if(i == 2) {\n                    /*INSERT*/\n                }\n            }\n        }\n        System.out.println(\"THINK DIFFERENT\"); //Line n2\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print THINK DIFFERENT on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 80116470, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP88728</strong></p><p><br></p><p>Consider below code of TestNewsPaper.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass NewsPaper {\n    \n}\n\npublic class TestNewsPaper {\n    public static void main(String[] args) {\n        new NewsPaper(); //Line n1\n        NewsPaper p = new NewsPaper(); // Line n2\n        change(p); //Line n3\n        System.out.println(\"About to end.\"); //Line n4\n    }\n    \n    public static void change(NewsPaper np) { //Line n5\n        np = new NewsPaper(); //Line n6\n    }\n}</pre><p><br></p><p>On executing TestNewsPaper class, how many objects of NewsPaper class will be eligible for Garbage Collection at Line n4?</p>", "feedbacks": ["", "", "", ""], "answers": ["0", "1", "2", "3"], "explanation": "<p><strong>UKOCP88728: </strong></p><p>Object created at Line n1 becomes eligible for Garbage collection after Line n1 only, as there are no references to it. So We have one object marked for GC.&nbsp; </p><p>Line n2 creates another NewsPaper object. </p><p>Line n3 invokes change(NewsPaper) method. Parameter variable 'np' refers to the same NewsPaper object created at Line n2.</p><p>Line n6 creates a new NewsPaper object and variable 'np' refers to it. </p><p>Object created at Line n6 becomes unreachable after change(NewsPaper) method pops out of the STACK, and this happens after Line n3. </p><p>So at Line n4, we have two NewsPaper objects eligible for Garbage collection: Created at Line n1 and Created at Line n6.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.1 Java Object-Oriented Approach: Declare, Instantiate & GC", "question_plain": "Question ID: UKOCP88728Consider below code of TestNewsPaper.java file:package com.udayankhattry.ocp;\n\nclass NewsPaper {\n    \n}\n\npublic class TestNewsPaper {\n    public static void main(String[] args) {\n        new NewsPaper(); //Line n1\n        NewsPaper p = new NewsPaper(); // Line n2\n        change(p); //Line n3\n        System.out.println(\"About to end.\"); //Line n4\n    }\n    \n    public static void change(NewsPaper np) { //Line n5\n        np = new NewsPaper(); //Line n6\n    }\n}On executing TestNewsPaper class, how many objects of NewsPaper class will be eligible for Garbage Collection at Line n4?", "related_lectures": []}, {"_class": "assessment", "id": 80116474, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP46511</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void m(int x) {\n        System.out.println(\"INT VERSION\");\n    }\n    \n    private static void m(char x) {\n        System.out.println(\"CHAR VERSION\");\n    }\n    \n    public static void main(String [] args) {\n        int i = '5';\n        m(i);\n        m('5');\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["<p>INT VERSION</p><p>INT VERSION</p>", "<p>CHAR VERSION</p><p>CHAR VERSION</p>", "<p>INT VERSION</p><p>CHAR VERSION</p>", "<p>CHAR VERSION</p><p>INT VERSION</p>", "Compilation error"], "explanation": "<p><strong>UKOCP46511: </strong></p><p>Method m is overloaded and which overloaded method to invoke, is decided at compile time. </p><p>m(i) is tagged to m(int) as i is of int type and m('5') is tagged to m(char) as '5' is char literal. </p><p><br></p><p>`m(i);` prints int version on to the console.</p><p>`m('5');` prints char version on to the console. </p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP46511Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void m(int x) {\n        System.out.println(\"INT VERSION\");\n    }\n    \n    private static void m(char x) {\n        System.out.println(\"CHAR VERSION\");\n    }\n    \n    public static void main(String [] args) {\n        int i = '5';\n        m(i);\n        m('5');\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116476, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP56787</strong></p><p><br></p><p>Consider the code of TestPerson.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Person {\n    String name;\n    int age;\n    \n    Person() {\n        Person(\"Rohit\", 25);\n    }\n    \n    Person(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n}\n\npublic class TestPerson {\n    public static void main(String[] args) {\n        Person p = new Person();\n        System.out.println(p.name + \":\" + p.age);\n    }\n}</pre><p><br></p><p>There is a compilation error in the Person class.</p><p>Which two modifications, done independently, print \"Rohit:25\" on to the console? </p>", "feedbacks": ["", "", "", ""], "answers": ["<p>Add below code in the Person class:</p><pre class=\"prettyprint linenums\">void Person(String name, int age) {\n    this.name = name;\n    this.age = age;\n}</pre>", "<p>Replace <code>Person(\"Rohit\", 25);</code> with <code>super(\"Rohit\", 25);</code> </p>", "<p>Replace <code>Person(\"Rohit\", 25);</code> with <code>this(\"Rohit\", 25);</code> </p>", "<p>Replace <code>Person(\"Rohit\", 25);</code> with <code>this.Person(\"Rohit\", 25);</code> </p>"], "explanation": "<p><strong>UKOCP56787: </strong></p><p>First find out the reason for compilation error, all the options are giving hint :)</p><p><br></p><p>no-argument constructor of Person class calling another overloaded constructor by the name and this causes compilation error. This problem can be fixed in 2 ways: </p><p>1st one: replace Person(\"Rohit\", 25); with this(\"Rohit\", 25) OR 2nd one: add void Person(String, int) method in the Person class. </p><p><br></p><p>Method can have same name as the class name and constructor can call other methods.</p>", "relatedLectureIds": ""}, "correct_response": ["a", "c"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP56787Consider the code of TestPerson.java file:package com.udayankhattry.ocp;\n\nclass Person {\n    String name;\n    int age;\n    \n    Person() {\n        Person(\"Rohit\", 25);\n    }\n    \n    Person(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n}\n\npublic class TestPerson {\n    public static void main(String[] args) {\n        Person p = new Person();\n        System.out.println(p.name + \":\" + p.age);\n    }\n}There is a compilation error in the Person class.Which two modifications, done independently, print \"Rohit:25\" on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 80116478, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP80405</strong></p><p><br></p><p>Consider below code of Circle.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Circle {\n    private double radius;\n    \n    public Circle(double radius) {\n        this.radius = radius;\n    }\n    \n    public double getArea() {\n        return Math.PI * radius * radius;\n    }\n}</pre><p><br></p><p>User must be allowed to read and change the value of radius field. What needs to be done so that all the classes can read/change the value of radius field and Circle class is well encapsulated as well?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["Nothing needs to be done", "Change radius declaration from `private double radius;` to `double radius;`", "Change radius declaration from `private double radius;` to `protected double radius;`", "Change radius declaration from `private double radius;` to `public double radius;`", "<p>Add below 2 methods in Circle class:</p><pre class=\"prettyprint linenums\">public double getRadius() {\n    return radius;\n}\n\npublic void setRadius(double radius) {\n    this.radius = radius;\n}</pre>", "<p>Add below 2 methods in Circle class:</p><pre class=\"prettyprint linenums\">protected double getRadius() {\n    return radius;\n}\n\nprotected void setRadius(double radius) {\n    this.radius = radius;\n}</pre>"], "explanation": "<p><strong>UKOCP80405: </strong></p><p>Circle class needs to be well encapsulated, this means that instance variable radius must be declared with private access modifier and getter/setter methods must be public, so that value in radius variable can be read/changed by other classes. </p><p>Out of the given options, below option is correct: </p><p>Add below 2 methods in Circle class:</p><pre class=\"prettyprint linenums\">public double getRadius() {\n    return radius;\n}\n\npublic void setRadius(double radius) {\n    this.radius = radius;\n}</pre>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP80405Consider below code of Circle.java file: package com.udayankhattry.ocp;\n\npublic class Circle {\n    private double radius;\n    \n    public Circle(double radius) {\n        this.radius = radius;\n    }\n    \n    public double getArea() {\n        return Math.PI * radius * radius;\n    }\n}User must be allowed to read and change the value of radius field. What needs to be done so that all the classes can read/change the value of radius field and Circle class is well encapsulated as well?", "related_lectures": []}, {"_class": "assessment", "id": 80116480, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP63078</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        P p = new R(); //Line n1\n        System.out.println(p.compute(\"Go\")); //Line n2\n    }\n}\n\nclass P {\n    String compute(String str) {\n        return str.repeat(3);\n    }\n}\n\nclass Q extends P {\n    String compute(String str) {\n        return super.compute(str.toLowerCase());\n    }\n}\n\nclass R extends Q {\n    String compute(String str) {\n        return super.compute(str.replace('o', 'O')); //2nd argument is uppercase O\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["gogogo", "GoGoGo", "GOGOGO", "Go", "GO", "go"], "explanation": "<p><strong>UKOCP63078: </strong></p><p>Class Q correctly overrides the compute(String) method of P class and class R correctly overrides the compute(String) method of Q class. Keyword super is used to invoke the method of parent class. </p><p><br></p><p>Instance method 'repeat()' has been added to String class in Java 11 and it has the signature: `public String repeat(int count) {}`</p><p>It returns the new String object whose value is the concatenation of this String repeated 'count' times. For example, </p><p>\"A\".repeat(3); returns \"AAA\".</p><p><br></p><p>At Line n1, reference variable 'p' refers to an instance of class R, hence p.compute(\"Go\") invokes the compute(String) method of R class. </p><p>return super.compute(str.replace('o', 'O')); =&gt; return super.compute(\"Go\".replace('o', 'O')); =&gt; return super.compute(\"GO\");</p><p><br></p><p>It invokes the compute(String) method of Parent class, which is Q. </p><p>=&gt; return super.compute(str.toLowerCase()); =&gt; return super.compute(\"GO\".toLowerCase()); =&gt; return super.compute(\"go\");</p><p><br></p><p>It invokes the compute(String) method of Parent class, which is P.</p><p>=&gt; return str.repeat(3); =&gt; return \"go\".repeat(3); =&gt; return \"gogogo\";</p><p><br></p><p>Control goes back to compute(String) method of Q and to the compute(String) method of R, which returns \"gogogo\".</p><p>Line n2 prints gogogo on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP63078Consider below code of Test.java file:public class Test {\n    public static void main(String[] args) {\n        P p = new R(); //Line n1\n        System.out.println(p.compute(\"Go\")); //Line n2\n    }\n}\n\nclass P {\n    String compute(String str) {\n        return str.repeat(3);\n    }\n}\n\nclass Q extends P {\n    String compute(String str) {\n        return super.compute(str.toLowerCase());\n    }\n}\n\nclass R extends Q {\n    String compute(String str) {\n        return super.compute(str.replace('o', 'O')); //2nd argument is uppercase O\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 80116482, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP43018</strong></p><p><br></p><p>Given the following definitions of the class Insect and the interface Flyable, the task is to declare a class Mosquito that inherits from the class Insect and implements the interface Flyable.</p><pre class=\"prettyprint linenums\">class Insect {}\ninterface Flyable {}</pre><p><br></p><p>Select the correct option to accomplish this task:</p>", "feedbacks": ["", "", "", ""], "answers": ["<p><code>class Mosquito implements Insect extends Flyable{}</code> </p>", "<p><code>class Mosquito implements Insect, Flyable{}</code> </p>", "<p><code>class Mosquito extends Insect, Flyable{}</code> </p>", "<p><code>class Mosquito extends Insect implements Flyable{}</code> </p>"], "explanation": "<p><strong>UKOCP43018: </strong></p><p>A class in Java extends from another class and implements interface(s). Hence correct syntax is: </p><p><code>class Mosquito extends Insect implements Flyable{}</code> </p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP43018Given the following definitions of the class Insect and the interface Flyable, the task is to declare a class Mosquito that inherits from the class Insect and implements the interface Flyable.class Insect {}\ninterface Flyable {}Select the correct option to accomplish this task:", "related_lectures": []}, {"_class": "assessment", "id": 80116472, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75425</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nabstract class Greetings {\n    abstract void greet();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var obj = new Greetings() {\n            @Override public void greet() {\n                System.out.println(\"BELIEVE IN YOURSELF\");\n            }\n        };\n        obj.greet();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "NullPointerException", "BELIEVE IN YOURSELF", "Nothing is printed on to the console"], "explanation": "<p><strong>UKOCP75425: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>obj refers to an anonymous inner class instance extending from Greetings class and the anonymous inner class code correctly overrides greet() method. </p><p>Code executes and prints BELIEVE IN YOURSELF on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP75425Given code: package com.udayankhattry.ocp;\n\nabstract class Greetings {\n    abstract void greet();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var obj = new Greetings() {\n            @Override public void greet() {\n                System.out.println(\"BELIEVE IN YOURSELF\");\n            }\n        };\n        obj.greet();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116536, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP10821</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\".\", \"..\", \".\", \"..\", \"..\", \".\").normalize();\n        System.out.println(path.getNameCount());\n        System.out.println(path.getName(0).toString().length());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["<p>6</p><p>1</p>", "<p>5</p><p>2</p>", "<p>3</p><p>2</p>", "<p>3</p><p>1</p>", "<p>2</p><p>1</p>", "<p>2</p><p>2</p>", "<p>1</p><p>0</p>"], "explanation": "<p><strong>UKOCP10821: </strong></p><p>Variable 'path' infers to Path type and refers to relative path 'Path[\".\\\\..\\\\.\\\\..\\\\..\\\\.\"]'</p><p>According to Javadoc of normalize method:</p><p>1. It removes all the redundant name elements.</p><p>2. \".\" represents current directory in Windows/Linux environment, hence it is considered redundant.</p><p>3. \"..\" represents parent directory in Windows/Linux environment. If a \"..\" is preceded by a non-\"..\" name, then both names are considered redundant. </p><p>In the given case, to normalize, first remove all the occurrences of \".\", which returns 'Path[\"..\\\\..\\\\..\"]'. No more redundant elements are left, hence path.normalize() returns 'Path[\"..\\\\..\\\\..\"]'</p><p>For the empty path, `path.getNameCount()` returns 3</p><p>and path.getName(0) returns \"..\", therefore, `path.getName(0).toString().length()` returns 2.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP10821Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\".\", \"..\", \".\", \"..\", \"..\", \".\").normalize();\n        System.out.println(path.getNameCount());\n        System.out.println(path.getName(0).toString().length());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116538, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP19644</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below record: </p><p><code>101, John, Smith, 12000</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) {\n                System.out.println(\"ID: \" + rs.getInt(\"IDD\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close();\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            System.out.println(\"An Error Occurred!\");\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["Compilation Error", "&#39;An Error Occurred!&#39; is printed on to the console", "<p>Code executes fine and prints following on to the console: </p><p>ID: 101</p><p>First Name: John</p><p>Last Name: Smith</p><p>Salary: 12000</p>", "<p>Code executes fine and prints following on to the console: </p><p>ID: 0</p><p>First Name: John</p><p>Last Name: Smith</p><p>Salary: 12000</p>", "Code executes fine and doesn&#39;t print anything on to the console"], "explanation": "<p><strong>UKOCP19644: </strong></p><p>Variable 'con' infers to Connection type, variable 'query' infers to String type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>As SELECT statement returns one record, code inside while loop is executed. </p><p><br></p><p>`rs.getInt(\"IDD\")` throws SQLException as column name 'IDD' will not be found at runtime. Exception handler for SQLException is available, which prints 'An Error Occurred!' on to the console. </p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP19644Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below record: 101, John, Smith, 12000Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public s
