  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 92470847, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP88788: </strong></p><p>Javadoc of trim() method states that it returns a string whose value is this string, with all leading and trailing space removed, where space is defined as any character whose codepoint is less than or equal to 'U+0020' or '\\u0020' (the space character).</p><p>As the developer comment in above code states that 'text' refers to String object containing multiple space characters, hence text.trim() returns \"BE YOURSELF!\" after removing all leading and trailing space characters. Hence trim() is correct option.</p><p><br></p><p>stripLeading(), stripTrailing() and strip() were added in Java 11. </p><p>stripLeading() returns a string whose value is this string, with all leading white space removed.</p><p>stripTrailing() returns a string whose value is this string, with all trailing white space removed.</p><p>strip() returns a string whose value is this string, with all leading and trailing white space removed.</p><p><br></p><p>Point to note here is that trim() method works with space, where space is defined as any character whose codepoint is less than or equal to 'U+0020' or '\\u0020' (the space character) but strip(), stripLeading() and stripTrailing() works with white space. </p><p>To find out what is white space character in Java, check Character.isWhitespace\u200b(int) method, you will find below: </p><p><br></p><p>A character is a Java whitespace character if and only if it satisfies one of the following criteria:</p><p>It is a Unicode space character (SPACE_SEPARATOR, LINE_SEPARATOR, or PARAGRAPH_SEPARATOR) but is not also a non-breaking space ('\\u00A0', '\\u2007', '\\u202F').</p><p>It is '\\t', U+0009 HORIZONTAL TABULATION.</p><p>It is '\\n', U+000A LINE FEED.</p><p>It is '\\u000B', U+000B VERTICAL TABULATION.</p><p>It is '\\f', U+000C FORM FEED.</p><p>It is '\\r', U+000D CARRIAGE RETURN.</p><p>It is '\\u001C', U+001C FILE SEPARATOR.</p><p>It is '\\u001D', U+001D GROUP SEPARATOR.</p><p>It is '\\u001E', U+001E RECORD SEPARATOR.</p><p>It is '\\u001F', U+001F UNIT SEPARATOR. </p><p><br></p><p>White space character in java includes space character along with above characters. </p><p>Hence, text.strip() will successfully remove all the leading and trailing white spaces and will return \"BE YOURSELF!\".</p><p><br></p><p>text.stripLeading().stripTrailing() will first remove leading white space and then trailing white space and will return \"BE YOURSELF!\".</p><p><br></p><p>String class doesn't have methods with the names: ltrim(), rtrim(), trimLeading(), trimTrailing() and trimBoth(), hence these will cause compilation error.</p>", "question": "<p><strong>Question ID: UKOCP88788</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"    BE YOURSELF!    \"; //Contains multiple space characters\n        System.out.println(text./*INSERT*/);\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print \"BE YOURSELF!\" on to the console? </p><p>Select 3 options.</p>", "answers": ["trim()", "strip()", "stripLeading().stripTrailing()", "ltrim().rtrim()", "trimLeading().trimTrailing()", "trimBoth()"]}, "correct_response": ["a", "b", "c"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP88788Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"    BE YOURSELF!    \"; //Contains multiple space characters\n        System.out.println(text./*INSERT*/);\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print \"BE YOURSELF!\" on to the console? Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470845, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP77648: </strong></p><p>Binary plus (+) has got higher precedence than != operator. Let us group the expression.&nbsp; </p><p>\"Equals??? \" + 10 != 5&nbsp; </p><p>= (\"Equals??? \" + 10) != 5&nbsp; </p><p>[!= is binary operator, so we have to evaluate the left side first. + operator behaves as concatenation operator.]&nbsp; </p><p>= \"Equals??? 10\" != 5&nbsp; </p><p>Left side of above expression is String, and right side is int. But String can't be compared to int, hence compilation error.&nbsp; </p>", "question": "<p><strong>Question ID: UKOCP77648</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Equals??? \" + 10 != 5);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Equals??? true", "Equals??? false", "Compilation error", "Equals??? 10 != 5"]}, "correct_response": ["c"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP77648Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Equals??? \" + 10 != 5);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470867, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP79426: </strong></p><p>Subclass overrides the methods of superclass but it hides the variables of superclass.</p><p><br></p><p>Line n3 hides the variable created at Line n1 and Line n4 overrides the getSide() method of Line n2. There is no compilation error for Square class as it correctly overrides getSide() method. You can use any access modifier at Line n3 as well, there are no rules for variable hiding. </p><p><br></p><p>'s' is of Shape type, hence s.side equals to 0 and s.getSide() invokes overriding method of Square class and it returns 4. Hence output is: 0:4.</p>", "question": "<p><strong>Question ID: UKOCP79426</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Shape {\n    int side = 0; //Line n1\n\n    int getSide() { //Line n2\n        return side;\n    }\n}\n\nclass Square extends Shape {\n    private int side = 4; //Line n3\n\n    protected int getSide() { //Line n4\n        return side;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Shape s = new Square();\n        System.out.println(s.side + \":\" + s.getSide());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "answers": ["Compilation error at Line n3", "Compilation error at Line n4", "0:0", "0:4", "4:4", "4:0"]}, "correct_response": ["d"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP79426Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nclass Shape {\n    int side = 0; //Line n1\n\n    int getSide() { //Line n2\n        return side;\n    }\n}\n\nclass Square extends Shape {\n    private int side = 4; //Line n3\n\n    protected int getSide() { //Line n4\n        return side;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Shape s = new Square();\n        System.out.println(s.side + \":\" + s.getSide());\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 92470865, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP45203: </strong></p><p>super(); is added by the compiler as the first statement in both the constructors:</p><pre class=\"prettyprint linenums\">Animal() {\n    super();\n    System.out.print(\"ANIMAL-\");\n}</pre><p>and</p><pre class=\"prettyprint linenums\">public Dog() {\n    super();\n    System.out.print(\"DOG\");\n}</pre><p><br></p><p>Class Animal extends from Object class and Object class has no-argument constructor, hence no issues with the constructor of Animal class. </p><p><br></p><p>Animal class's constructor has package scope, which means it is accessible to all the classes declared in package 'a'. But Dog class is declared in package 'b' and hence `super();` statement inside Dog class's constructor causes compilation error as no-argument constructor of Animal class is not visible.</p><p><br></p><p>There is no compilation error in Test.java file as Dog class's constructor is public and therefore `new Dog();` compiles successfully. </p>", "question": "<p><strong>Question ID: UKOCP45203</strong></p><p><br></p><p>Consider below codes of 3 java files: </p><pre class=\"prettyprint linenums\">//Animal.java\npackage a;\n\npublic class Animal {\n    Animal() {\n        System.out.print(\"ANIMAL-\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Dog.java\npackage d;\n\nimport a.Animal;\n\npublic class Dog extends Animal {\n    public Dog() {\n        System.out.print(\"DOG\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\nimport d.Dog;\n\npublic class Test {\n    public static void main(String[] args) {\n        new Dog();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error in Animal.java file", "Compilation error in Dog.java file", "Compilation error in Test.java file", "It executes successfully and prints ANIMAL-DOG on to the console", "It executes successfully and prints DOG on to the console", "It executes successfully but nothing is printed on to the console"]}, "correct_response": ["b"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP45203Consider below codes of 3 java files: //Animal.java\npackage a;\n\npublic class Animal {\n    Animal() {\n        System.out.print(\"ANIMAL-\");\n    }\n}//Dog.java\npackage d;\n\nimport a.Animal;\n\npublic class Dog extends Animal {\n    public Dog() {\n        System.out.print(\"DOG\");\n    }\n}//Test.java\npackage com.udayankhattry.ocp;\n\nimport d.Dog;\n\npublic class Test {\n    public static void main(String[] args) {\n        new Dog();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470863, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP20374: </strong></p><p>Fields declared with final are constant fields.</p>", "question": "<p><strong>Question ID: UKOCP20374</strong></p><p><br></p><p>Which of the following statement declares a constant field in Java?</p>", "answers": ["<p><code>const int x = 10;</code> </p>", "<p><code>static int x = 10;</code> </p>", "<p><code>final static int x = 10;</code> </p>", "<p><code>int x = 10;</code> </p>"]}, "correct_response": ["c"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP20374Which of the following statement declares a constant field in Java?", "related_lectures": []}, {"_class": "assessment", "id": 92470861, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP82607: </strong></p><p>print() is static method of class Test. So correct syntax to invoke method print() is Test.print(); </p><p>but static methods can also be invoked using reference variable: obj.print(); Warning is displayed in this case. </p><p>Even though obj has null value, we don't get NullPointerException as objects are not needed to invoke static methods. </p>", "question": "<p><strong>Question ID: UKOCP82607</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">public class Test {\n    public static void print() {\n        System.out.println(\"STATIC METHOD!!!\");\n    }\n    \n    public static void main(String[] args) {\n        Test obj = null; //Line n1\n        obj.print(); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["An Exception is thrown at runtime", "Compilation error at Line n2", "It prints STATIC METHOD!!! on to the console", "None of the other options"]}, "correct_response": ["c"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP82607Consider below code of Test.java file:public class Test {\n    public static void print() {\n        System.out.println(\"STATIC METHOD!!!\");\n    }\n    \n    public static void main(String[] args) {\n        Test obj = null; //Line n1\n        obj.print(); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470859, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP42523: </strong></p><p>In this case, you have to write code outside class A. </p><p>B is a static nested class and outside class A, class B's name can be referred by A.B or var.</p><p><br></p><p>Instance of class B can be created by 'new A.B();'.</p>", "question": "<p><strong>Question ID: UKOCP42523</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass A {\n    static class B {\n        \n    }\n}\n\npublic class Test {\n    /*INSERT*/\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that there are no compilation errors?</p>", "answers": ["<p><code>B obj = new B();</code> </p>", "<p><code>B obj = new A.B();</code> </p>", "<p><code>A.B obj = new A.B();</code> </p>", "<p><code>A.B obj = new A().new B();</code> </p>"]}, "correct_response": ["c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP42523Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nclass A {\n    static class B {\n        \n    }\n}\n\npublic class Test {\n    /*INSERT*/\n}Which of the following options can replace /*INSERT*/ such that there are no compilation errors?", "related_lectures": []}, {"_class": "assessment", "id": 92470857, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP64765: </strong></p><p>invokeInner() is instance method of outer class, X. So, implicit 'this' reference is available for this method. this reference refers to the currently executing instance of outer class, X. So Java compiler converts `var obj = new Y();` to `var obj = this.new Y();` and hence this syntax has no issues. So Line n1 is fine. </p><p><br></p><p>Because of the special relationship between Outer and inner class, Outer and Inner class can very easily access each other's private members. Hence, no issues with Line n2 as well. </p><p>Given code compiles and executes fine and prints INNER to the console.</p>", "question": "<p><strong>Question ID: UKOCP64765</strong></p><p><br></p><p>What will be the result of compiling and executing class Test?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass X {\n    class Y {\n        private void m() {\n            System.out.println(\"INNER\");\n        }\n    }\n    \n    public void invokeInner() {\n        var obj = new Y(); //Line n1\n        obj.m(); //Line n2\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new X().invokeInner();\n    }\n}</pre>", "answers": ["INNER", "Compilation error at Line n1 as instance of outer class (X) is needed to create the instance of inner class (Y)", "Compilation error at Line n2 as private method m() cannot be invoked outside the body of inner class (Y)", "Exception is thrown at runtime"]}, "correct_response": ["a"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP64765What will be the result of compiling and executing class Test?package com.udayankhattry.ocp;\n\nclass X {\n    class Y {\n        private void m() {\n            System.out.println(\"INNER\");\n        }\n    }\n    \n    public void invokeInner() {\n        var obj = new Y(); //Line n1\n        obj.m(); //Line n2\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new X().invokeInner();\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 92470855, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42424</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str = Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\")\n              .dropWhile(s -&gt; s.length() &gt; 4)\n              .collect(Collectors.joining(\", \"));\n        System.out.println(str);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": [], "links": [], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP42424: </strong></p><p>default Stream&lt;T&gt; dropWhile\u200b(Predicate&lt;? super T&gt; predicate)</p><p>According to the Javadoc: </p><p>Returns, if this stream is ordered, a stream consisting of the remaining elements of this stream after dropping the longest prefix of elements that match the given predicate. Otherwise returns, if this stream is unordered, a stream consisting of the remaining elements of this stream after dropping a subset of elements that match the given predicate.</p><p><br></p><p>If this stream is ordered then the longest prefix is a contiguous sequence of elements of this stream that match the given predicate. The first element of the sequence is the first element of this stream, and the element immediately following the last element of the sequence does not match the given predicate.</p><p><br></p><p>If this stream is unordered, and some (but not all) elements of this stream match the given predicate, then the behavior of this operation is nondeterministic; it is free to drop any subset of matching elements (which includes the empty set). </p><p><br></p><p>Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\") =&gt; [\"a\", \"an\", \"and\", \"alas\", \"after\"] {Sequential, ordered stream}</p><p>dropWhile(s -&gt; s.length() &gt; 4) =&gt; [\"a\", \"an\", \"and\", \"alas\", \"after\"] {1st element doesn't match the given predicate, hence a stream containing 1st element and all the elements afterwards is returned.}</p><p>collect(Collectors.joining(\", \")); =&gt; \"a, an, and, alas, after\"</p>", "answers": ["a, an, and, alas, after", "after", "alas, after", "a, an, and", "a, an, and, alas"]}, "correct_response": ["a"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP42424Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str = Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\")\n              .dropWhile(s -&gt; s.length() &gt; 4)\n              .collect(Collectors.joining(\", \"));\n        System.out.println(str);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470853, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP64304: </strong></p><p>`final boolean flag = false;` statement makes flag a compile time constant.&nbsp; </p><p>Compiler knows the value of flag, which is false at compile time and hence it gives \"Unreachable Code\" error for Line n2.</p>", "question": "<p><strong>Question ID: UKOCP64304</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        final boolean flag = false; //Line n1\n        while(flag) {\n            System.out.println(\"Good Morning!\"); //Line n2\n        }\n    }\n}</pre><p><br></p><p>Which of the following statements is correct for above code?</p>", "answers": ["Program compiles and executes successfully but produces no output", "Compilation error", "Infinite loop", "It will print &quot;Good Morning!&quot; once"]}, "correct_response": ["b"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP64304Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        final boolean flag = false; //Line n1\n        while(flag) {\n            System.out.println(\"Good Morning!\"); //Line n2\n        }\n    }\n}Which of the following statements is correct for above code?", "related_lectures": []}, {"_class": "assessment", "id": 92470851, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP63002: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name. But var type cannot be used as method parameters or method return type. Hence 'operate(var v1, var v2)' causes compilation error.</p><p><br></p><p>For more information on local variable type inference, please check the URL: http://openjdk.java.net/jeps/286</p>", "question": "<p><strong>Question ID: UKOCP63002</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        operate(10 , 20);\n        operate(\"A\", \"B\");\n        operate('A', 1); //ASCII code of 'A' is 65\n    }\n    \n    public static void operate(var v1, var v2) {\n        System.out.println(v1 + v2);\n    }\n}</pre><p><br></p><p>What is the result of compiling and executing above code?</p>", "answers": ["<p>30</p><p>AB</p><p>66</p>", "<p>30</p><p>AB</p><p>A1</p>", "<p>1020</p><p>AB</p><p>A1</p>", "<p>1020</p><p>AB</p><p>66</p>", "Compilation error", "Runtime error"]}, "correct_response": ["e"], "section": "1.6 Working with data types: Local variable type inference", "question_plain": "Question ID: UKOCP63002Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        operate(10 , 20);\n        operate(\"A\", \"B\");\n        operate('A', 1); //ASCII code of 'A' is 65\n    }\n    \n    public static void operate(var v1, var v2) {\n        System.out.println(v1 + v2);\n    }\n}What is the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 92470849, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP10981: </strong></p><p>Instance overloaded method split(...) has below declarations:</p><p>1. public String[] split\u200b(String regex, int limit) {...}: It returns the String[] after splitting this string around matches of the given regex. </p><p>The limit parameter controls the number of times the pattern is applied and therefore affects the length of the resulting array.</p><p>A. If the limit is positive then the pattern will be applied at most (limit - 1) times, the array's length will be no greater than limit, and the array's last entry will contain all input beyond the last matched delimiter. For example:</p><p>\"BAZAAR\".split(\"A\", 1); returns [\"BAZAAR\"] as pattern is applied 1 - 1 = 0 time.</p><p>\"BAZAAR\".split(\"A\", 2); returns [\"B\",\"ZAAR\"] as pattern is applied 2 - 1 = 1 time.</p><p>\"BAZAAR\".split(\"A\", 3); returns [\"B\",\"Z\",\"AR\"] as pattern is applied 3 - 1 = 2 times.</p><p>\"BAZAAR\".split(\"A\", 4); returns [\"B\",\"Z\",\"\",\"R\"] as pattern is applied 4 - 1 = 3 times.</p><p>\"BAZAAR\".split(\"A\", 4); returns [\"B\",\"Z\",\"\",\"R\"] as pattern needs to be applied 5 - 1 = 4 times but it is applied 3 times (which is max).</p><p>\":\".split(\":\", 2); returns [\"\",\"\"] as pattern is applied (2 - 1) time and there is an empty space (\"\") before and after \":\", so resulting array contains two empty strings.</p><p><br></p><p>B. If the limit is zero then the pattern will be applied as many times as possible, the array can have any length, and trailing empty strings will be discarded. For example,</p><p>\"BAZAAR\".split(\"A\", 0); returns [\"B\",\"Z\",\"\",\"R\"].</p><p>\":\".split(\":\", 0); returns blank array as both the empty strings are discarded.</p><p><br></p><p>C. If the limit is negative then the pattern will be applied as many times as possible and the array can have any length. For example,</p><p>\"BAZAAR\".split(\"A\", -10); returns [\"B\",\"Z\",\"\",\"R\"] as pattern is applied max times, which is 3.</p><p>\":\".split(\":\", -2); returns [\"\",\"\"] as pattern is applied max times, which is 3.</p><p><br></p><p>2. public String[] split\u200b(String regex) {...}: It returns the String[] after splitting this string around matches of the given regular expression.</p><p>This method works as if by invoking the two-argument split method with the given expression and a limit argument of zero. Trailing empty strings are therefore not included in the resulting array.&nbsp; </p><p>\"BAZAAR\".split(\"A\"); returns [\"B\",\"Z\",\"\",\"R\"] as this statement is equivalent to \"BAZAAR\".split(\"A\", 0);.</p><p>\":\".split(\":\"); returns blank array as this statement is equivalent to \":\".split(\":\", 0);.</p><p><br></p><p>Let's solve the given expression based on above points:</p><p>txt.split(\"an\").length</p><p>=\"an\".split(\"an\").length</p><p>=[].length //\"an\".split(\"an\") returns blank array as both the empty strings are discarded.</p><p>=0</p><p><br></p><p>Hence, 0 is printed on to the console.</p>", "question": "<p><strong>Question ID: UKOCP10981</strong></p><p><br></p><p>Given the code fragment:</p><pre class=\"prettyprint linenums\">String txt = \"an\";\nSystem.out.println(txt.split(\"an\").length);</pre><p><br></p><p>What is the result?</p>", "answers": ["0", "1", "2", "3", "Compilation error"]}, "correct_response": ["a"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP10981Given the code fragment:String txt = \"an\";\nSystem.out.println(txt.split(\"an\").length);What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470907, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42910</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Comparator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;String&gt; stream = Stream.of(\"d\", \"a\", \"mm\", \"bb\", \"zzz\", \"www\");\n        Comparator&lt;String&gt; lengthComp = (s1, s2) -&gt; s1.length() - s2.length();\n        stream.sorted(lengthComp).forEach(System.out::println);\n    }\n}</pre><p><br></p><p>Which of the following needs to be done, so that output is: </p><p>a</p><p>d</p><p>bb</p><p>mm</p><p>www</p><p>zzz</p>", "relatedLectureIds": "", "feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP42910: </strong></p><p>Current code displays below output:</p><p>d</p><p>a</p><p>mm</p><p>bb</p><p>zzz</p><p>www</p><p><br></p><p>if string's length is same, then insertion order is preserved. </p><p><br></p><p>Requirement is to sort the stream in ascending order of length of the string and if length is same, then sort on natural order. </p><p><br></p><p>lengthComp is for sorting the string on the basis of length, thenComparing default method of Comparator interface allows to pass 2nd level of Comparator. </p><p>Hence replacing `stream.sorted(lengthComp)` with `stream.sorted(lengthComp.thenComparing(String::compareTo))` will do the trick. </p><p><br></p><p>stream.sorted(lengthComp.reversed()) will simply reversed the order, which means longest string will be printed first, but this is not expected.</p>", "answers": ["No need to make any changes, on execution given code prints expected result", "Replace `stream.sorted(lengthComp)` with `stream.sorted(lengthComp.thenComparing(String::compareTo))`", "Replace `stream.sorted(lengthComp)` with `stream.sorted(lengthComp.reversed())`"]}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP42910Given code: package com.udayankhattry.ocp;\n\nimport java.util.Comparator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;String&gt; stream = Stream.of(\"d\", \"a\", \"mm\", \"bb\", \"zzz\", \"www\");\n        Comparator&lt;String&gt; lengthComp = (s1, s2) -&gt; s1.length() - s2.length();\n        stream.sorted(lengthComp).forEach(System.out::println);\n    }\n}Which of the following needs to be done, so that output is: adbbmmwwwzzz", "related_lectures": []}, {"_class": "assessment", "id": 92470943, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP61505: </strong></p><p>In Bottom-up approach, lower lever jars need to be converted first. </p><p>In this case, client.jar depends on services.jar and services.jar depends on database.jar. Hence, out of the given options, correct order of modularization is: </p><p>database.jar, services.jar and client.jar</p>", "question": "<p><strong>Question ID: UKOCP61505</strong></p><p><br></p><p>You as a developer, have task to modularize an application, which contains 3 jars: client.jar, services.jar and database.jar. </p><p><br></p><p>client.jar depends on services.jar and services.jar depends on database.jar. You have decided to follow bottom-up approach for modularizing the application. </p><p><br></p><p>Which of the following is the correct way of doing this migration?</p>", "answers": ["Modularize services.jar and leave database.jar", "Modularize services.jar and convert database.jar to automatic module", "Modularize client.jar, and convert services.jar and database.jar to automatic modules", "Modularize client.jar, automate services.jar and leave database.jar", "Modularize database.jar and leave services.jar", "Modularize database.jar and then services.jar and finally client.jar"]}, "correct_response": ["f"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP61505You as a developer, have task to modularize an application, which contains 3 jars: client.jar, services.jar and database.jar. client.jar depends on services.jar and services.jar depends on database.jar. You have decided to follow bottom-up approach for modularizing the application. Which of the following is the correct way of doing this migration?", "related_lectures": []}, {"_class": "assessment", "id": 92470909, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP22815: </strong></p><p>IntStream.rangeClosed(int start, int end) =&gt; Returns a sequential stream from start to end, both inclusive and with a step of 1.</p><p>IntStream.map(IntUnaryOperator) =&gt; Returns a stream consisting of the results of applying the given function to the elements of this stream.</p><p><br></p><p>IntStream.rangeClosed(1,3) =&gt; [1,2,3] </p><p>map(i -&gt; i * i) =&gt; [1,4,9]</p><p>map(i -&gt; i * i) =&gt; [1,16,81]</p><p>sum() =&gt; 1+16+81 = 98</p>", "question": "<p><strong>Question ID: UKOCP22815</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int sum = IntStream.rangeClosed(1,3)\n            .map(i -&gt; i * i)\n            .map(i -&gt; i * i)\n            .sum();\n        System.out.println(sum);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["6", "14", "98", "None of the other options"]}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP22815Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int sum = IntStream.rangeClosed(1,3)\n            .map(i -&gt; i * i)\n            .map(i -&gt; i * i)\n            .sum();\n        System.out.println(sum);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470911, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP42424: </strong></p><p>default Stream&lt;T&gt; dropWhile\u200b(Predicate&lt;? super T&gt; predicate)</p><p>According to the Javadoc: </p><p>Returns, if this stream is ordered, a stream consisting of the remaining elements of this stream after dropping the longest prefix of elements that match the given predicate. Otherwise returns, if this stream is unordered, a stream consisting of the remaining elements of this stream after dropping a subset of elements that match the given predicate.</p><p><br></p><p>If this stream is ordered then the longest prefix is a contiguous sequence of elements of this stream that match the given predicate. The first element of the sequence is the first element of this stream, and the element immediately following the last element of the sequence does not match the given predicate.</p><p><br></p><p>If this stream is unordered, and some (but not all) elements of this stream match the given predicate, then the behavior of this operation is nondeterministic; it is free to drop any subset of matching elements (which includes the empty set). </p><p><br></p><p>Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\") =&gt; [\"a\", \"an\", \"and\", \"alas\", \"after\"] {Sequential, ordered stream}</p><p>dropWhile(s -&gt; s.length() &gt; 4) =&gt; [\"a\", \"an\", \"and\", \"alas\", \"after\"] {1st element doesn't match the given predicate, hence a stream containing 1st element and all the elements afterwards is returned.}</p><p>collect(Collectors.joining(\", \")); =&gt; \"a, an, and, alas, after\"</p>", "question": "<p><strong>Question ID: UKOCP42424</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str = Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\")\n            .dropWhile(s -&gt; s.length() &gt; 4)\n            .collect(Collectors.joining(\", \"));\n        System.out.println(str);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["a, an, and, alas, after", "after", "alas, after", "a, an, and", "a, an, and, alas"]}, "correct_response": ["a"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP42424Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str = Stream.of(\"a\", \"an\", \"and\", \"alas\", \"after\")\n            .dropWhile(s -&gt; s.length() &gt; 4)\n            .collect(Collectors.joining(\", \"));\n        System.out.println(str);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470913, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP62020: </strong></p><p>books --&gt; [Book[9781976704031:9.99], Book[9781976704032:15.99]].&nbsp; </p><p>books.stream() --&gt; {Book[9781976704031:9.99], Book[9781976704032:15.99]}. It is sequential stream.&nbsp; </p><p><br></p><p>To understand, first reduce() method can be somewhat written as: </p><p><br></p><p>Book book = new Book(\"9781976704033\", 0.0);</p><p>for(Book element : stream) {</p><p>&nbsp; &nbsp; book = accumulator.apply(book, element);</p><p>}</p><p>return book; </p><p><br></p><p>Above code is just for understanding purpose, you can't iterate a stream using given loop.</p><p><br></p><p>apply(book, element) invokes the code of lambda expression: </p><p>(b1, b2) -&gt; { </p><p>&nbsp; &nbsp; b1.price = b1.price + b2.price;</p><p>&nbsp; &nbsp; return new Book(b1.isbn, b1.price);</p><p>}</p><p><br></p><p>This means, price of Book object referred by book will be the addition of 9.99 and 15.99, which is 25.98 and its isbn will remain 9781976704033. </p><p><br></p><p>b --&gt; Book[9781976704033:25.98]. </p><p><br></p><p>Above book is added to the books list. </p><p>books --&gt; [Book[9781976704031:9.99], Book[9781976704032:15.99], Book[9781976704033:25.98]].</p><p><br></p><p>books.parallelStream().reduce((x, y) -&gt; x.price &gt; y.price ? x : y) returns Optional&lt;Book&gt;, the Book object inside Optional has highest price. </p><p><br></p><p>Hence, output is: Book[9781976704033:25.98]. </p>", "question": "<p><strong>Question ID: UKOCP62020</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Book {\n    String isbn;\n    double price;\n\n    Book(String isbn, double price) {\n        this.isbn = isbn;\n        this.price = price;\n    }\n\n    public String toString() {\n        return \"Book[\" + isbn + \":\" + price + \"]\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Book&gt; books = new ArrayList&lt;&gt;();\n        books.add(new Book(\"9781976704031\", 9.99));\n        books.add(new Book(\"9781976704032\", 15.99));\n\n        Book b = books.stream().reduce(new Book(\"9781976704033\", 0.0), (b1, b2) -&gt; {\n            b1.price = b1.price + b2.price;\n            return new Book(b1.isbn, b1.price);\n        });\n\n        books.add(b);\n        books.parallelStream().reduce((x, y) -&gt; x.price &gt; y.price ? x : y)\n            .ifPresent(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Book[9781976704033:25.98]", "Book[9781976704031:9.99]", "Book[9781976704032:15.99]", "Book[9781976704033:9.99]", "Book[9781976704033:15.99]"]}, "correct_response": ["a"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP62020Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Book {\n    String isbn;\n    double price;\n\n    Book(String isbn, double price) {\n        this.isbn = isbn;\n        this.price = price;\n    }\n\n    public String toString() {\n        return \"Book[\" + isbn + \":\" + price + \"]\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Book&gt; books = new ArrayList&lt;&gt;();\n        books.add(new Book(\"9781976704031\", 9.99));\n        books.add(new Book(\"9781976704032\", 15.99));\n\n        Book b = books.stream().reduce(new Book(\"9781976704033\", 0.0), (b1, b2) -&gt; {\n            b1.price = b1.price + b2.price;\n            return new Book(b1.isbn, b1.price);\n        });\n\n        books.add(b);\n        books.parallelStream().reduce((x, y) -&gt; x.price &gt; y.price ? x : y)\n            .ifPresent(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470915, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP89974: </strong></p><p>Variable 'list1' infers to List&lt;String&gt; type. </p><p><br></p><p>'new CopyOnWriteArrayList&lt;&gt;(list1);' creates a thread-safe list containing the elements of list1. list1 and list2 are not linked, hence changes made to one list doesn't affect other list.&nbsp; </p><p>Variable 'list2' infers to CopyOnWriteArrayList&lt;String&gt; type.</p><p><br></p><p>CopyOnWriteArrayList allows add/set/remove while iterating through the list. On every modification, a fresh copy of underlying array is created, leaving the iterator object unchanged. </p><p>'Melon' and 'Mango' are deleted from list2.&nbsp; </p><p><br></p><p>list1 refers to [Melon, Apple, Banana, Mango] and list2 refers to [Apple, Banana]. </p>", "question": "<p><strong>Question ID: UKOCP89974</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.concurrent.CopyOnWriteArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(\"Melon\", \"Apple\", \"Banana\", \"Mango\");\n        var list2 = new CopyOnWriteArrayList&lt;&gt;(list1);\n        for(String s : list2) {\n            if(s.startsWith(\"M\")){\n                list2.remove(s);\n            }\n        }\n        System.out.println(list1);\n        System.out.println(list2);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>[Melon, Apple, Banana, Mango]</p><p>[Melon, Apple, Banana, Mango]</p>", "<p>[Apple, Banana]</p><p>[Apple, Banana]</p>", "<p>[Melon, Apple, Banana, Mango]</p><p>[Apple, Banana]</p>", "An exception is thrown at runtime"]}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP89974Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.concurrent.CopyOnWriteArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(\"Melon\", \"Apple\", \"Banana\", \"Mango\");\n        var list2 = new CopyOnWriteArrayList&lt;&gt;(list1);\n        for(String s : list2) {\n            if(s.startsWith(\"M\")){\n                list2.remove(s);\n            }\n        }\n        System.out.println(list1);\n        System.out.println(list2);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470917, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP38378: </strong></p><p>Starting with JDK 11, it is possible to launch single-file source-code Programs. </p><p>If you execute 'java --help' command, you would find below option was added for Java 11:</p><p>java [options] &lt;sourcefile&gt; [args]</p><p>&nbsp; &nbsp; (to execute a single source-file program)</p><p>&nbsp; &nbsp; </p><p>Single-file program is the file where the whole program fits in a single source file and it is very useful in the early stages of learning Java. </p><p><br></p><p>The effect of `java Test.java` command is that the source file is compiled into memory and the first class found in the source file is executed. Hence `java Test.java` is equivalent to (but not exactly same as): </p><p><br></p><p>javac -d &lt;memory&gt; Test.java</p><p>java -cp &lt;memory&gt; Test</p><p><br></p><p>'&lt;' within format string is used to reuse the argument matched by the previous format specifier. </p><p>d is for Integer and x is for hexadecimal. Hexadecimal value for 10 is a. </p><p>So, 'console.format(\"%d %&lt;x\", 10);' prints '10 a' on to the console. </p><p>NOTE: console.format(...) and console.printf(...) methods are same. In fact, printf(...) method invokes format(...) method. </p>", "question": "<p><strong>Question ID: UKOCP38378</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        var console = System.console();\n        if(console != null) {\n            console.format(\"%d %&lt;x\", 10);\n        }\n    }\n}</pre><p><br></p><p>And the command:</p><p><code>java Test.java</code></p><p><br></p><p>What is the result?</p>", "answers": ["10 10", "10 12", "10 a", "10", "Runtime Exception"]}, "correct_response": ["c"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP38378Given code of Test.java file: public class Test {\n    public static void main(String[] args) {\n        var console = System.console();\n        if(console != null) {\n            console.format(\"%d %&lt;x\", 10);\n        }\n    }\n}And the command:java Test.javaWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470919, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP39698: </strong></p><p>Variable 'bos' infers to BufferedOutputStream type and main(String []) method declares to throw IOException, hence given code compiles successfully. </p><p><br></p><p>Even though, `bos.close();` method is invoked but it is not invoked in finally block. If statements before `bos.close();` throw any exception, then `bos.close();` will not execute and this will result in resource leak. </p><p><br></p><p>To avoid resource leak, either use try-with-resources statement or provide try-finally block. </p>", "question": "<p><strong>Question ID: UKOCP39698</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var bos = new BufferedOutputStream(\n            new FileOutputStream(\"F:\\\\file.tmp\"));\n        bos.write(2);\n        bos.close();\n    }\n}</pre><p><br></p><p>Which of the following statement regarding above code is true?</p>", "answers": ["Above code causes compilation error", "There is no chance of resource leak", "There is a chance of resource leak"]}, "correct_response": ["c"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP39698Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var bos = new BufferedOutputStream(\n            new FileOutputStream(\"F:\\\\file.tmp\"));\n        bos.write(2);\n        bos.close();\n    }\n}Which of the following statement regarding above code is true?", "related_lectures": []}, {"_class": "assessment", "id": 92470921, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP15279: </strong></p><p>Root folder or drive is not considered in count and indexing. In the given path A is at 0th index, B is at 1st index, C is at 2nd index and Book.java is at 3rd index. </p><p><br></p><p>In 'subpath(int beginIndex, int endIndex)' method beginIndex in inclusive and endIndex is exclusive. So, in the given question, starting index is 1 and end index is 3. </p><p><br></p><p>So, 'path.subpath(1,4)' returns 'B\\C\\Book.java'. </p>", "question": "<p><strong>Question ID: UKOCP15279</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        System.out.println(path.subpath(1,4));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Exception is thrown at runtime", "A\\B\\C\\Book.java", "A\\B\\C", "B\\C\\Book.java"]}, "correct_response": ["d"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP15279Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        System.out.println(path.subpath(1,4));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470923, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP77961: </strong></p><p>Files.isSameFile(Path path1, Path path2) returns true if both the paths locate the same physical file.</p><p><br></p><p>After normalization, p1 would refer to: 'Path[F:\\A\\B\\C\\Book.java]' and p2 would refer to 'Path[F:\\A\\B\\C\\Book.java]'. As both refer to same physical file, hence output is true</p>", "question": "<p><strong>Question ID: UKOCP77961</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var p1 = Paths.get(\"F:\\\\A\\\\B\\\\D\\\\..\\\\C\\\\Book.java\");\n        var p2 = Paths.get(\"F:\\\\A\\\\B\\\\.\\\\.\\\\C\\\\Book.java\");\n        System.out.println(Files.isSameFile(p1, p2));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["true", "false"]}, "correct_response": ["a"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP77961F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.javaGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var p1 = Paths.get(\"F:\\\\A\\\\B\\\\D\\\\..\\\\C\\\\Book.java\");\n        var p2 = Paths.get(\"F:\\\\A\\\\B\\\\.\\\\.\\\\C\\\\Book.java\");\n        System.out.println(Files.isSameFile(p1, p2));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470925, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP66006: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>Given sql query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000    \n102 Sean    Smith   15000    \n103 Regina  Williams    15500    \n104 Natasha George  14600    </pre><p><br></p><p>'resultSetType' can accept 3 constants: TYPE_FORWARD_ONLY, TYPE_SCROLL_INSENSITIVE &amp; TYPE_SCROLL_SENSITIVE.&nbsp; </p><p>'resultSetConcurrency' can accept 2 constants: CONCUR_READ_ONLY &amp; CONCUR_UPDATABLE.</p><p><br></p><p>`rs.absolute(-2);` moves the cursor to 3rd record (2nd from last).&nbsp; </p><p>`rs.relative(-1);` moves the cursor to 2nd record (1 up from the current cursor position).&nbsp; </p><p><br></p><p>`rs.getInt(1)` returns 102. </p><p><br></p><p>NOTE: Column index starts with 1 and not 0.</p>", "question": "<p><strong>Question ID: UKOCP66006</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.absolute(-2);\n            rs.relative(-1);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "answers": ["101", "102", "103", "104"]}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP66006Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.absolute(-2);\n            rs.relative(-1);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470927, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP21107: </strong></p><p>Variable 'url' infers to String type, variable 'prop' infers to Properties type, variable 'query' infers to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>Initially cursor is just before the first record. `rs.absolute(0);` also moves the cursor to just before the first record.&nbsp; </p><p><br></p><p>As ResultSet cursor is before the first record, hence `rs.getInt(1)` throws SQLException at runtime.&nbsp; </p>", "question": "<p><strong>Question ID: UKOCP21107</strong></p><p><br></p><p>Given structure of MESSAGES table:</p><p><code>MESSAGES (msg1 varchar(100), msg2 varchar(100))</code></p><p><br></p><p>MESSAGES table contains below records: </p><p><code>'Happy New Year!', 'Happy Holidays!'</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select count(*) FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.absolute(0);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "answers": ["0", "1", "2", "An exception is thrown at runtime"]}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP21107Given structure of MESSAGES table:MESSAGES (msg1 varchar(100), msg2 varchar(100))MESSAGES table contains below records: 'Happy New Year!', 'Happy Holidays!'Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select count(*) FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.absolute(0);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470929, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP57540: </strong></p><p>There are no setCountry(...) and setLanguage(...) methods defined in Locale class. </p>", "question": "<p><strong>Question ID: UKOCP57540</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = Locale.ENGLISH;\n        loc.setCountry(\"en\");\n        loc.setCountry(\"CA\");\n\n        System.out.println(loc.getDisplayCountry());\n    }\n}</pre><p><br></p><p>'CA' is the country code for 'Canada'.</p><p><br></p><p>What is the result?</p>", "answers": ["Canada", "United States", "English", "Compilation error", "No text is displayed in the output"]}, "correct_response": ["d"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP57540Given code: package com.udayankhattry.ocp;\n\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = Locale.ENGLISH;\n        loc.setCountry(\"en\");\n        loc.setCountry(\"CA\");\n\n        System.out.println(loc.getDisplayCountry());\n    }\n}'CA' is the country code for 'Canada'.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470931, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP46402: </strong></p><p>If you supply a pattern with multiple grouping characters(such as comma), the interval between the last one and the end of the integer is the one that is used.</p><p>For the pattern \"###,##,#\", interval is just 1 digit. It also indicates that don't pad the passed number with 0's for any number of less than 6 digits.</p><p>For the pattern \"000,00,0\", interval is just 1 digit. It also indicates that pad the passed number with 0's for any number of less than 6 digits. </p><p><br></p><p>Let's check all the statements: </p><p>1. <code>System.out.println(df1.format(87654).equals(df2.format(87654))); </code></p><p>\u2717&nbsp; `df1.format(87654)` returns \"8,7,6,5,4\" and `df2.format(87654)` returns \"0,8,7,6,5,4\". Both the strings are different, hence it would return false.</p><p><br></p><p>2. <code>System.out.println(df1.format(1).equals(df2.format(1)));</code></p><p>\u2717&nbsp; `df1.format(1)` returns \"1\" and `df2.format(1)` returns \"0,0,0,0,0,1\". Both the strings are different, hence it would return false.</p><p><br></p><p>3. <code>System.out.println(df1.format(1234567).equals(df2.format(1234567)));</code></p><p>\u2713&nbsp; `df1.format(1234567)` returns \"1,2,3,4,5,6,7\" and `df2.format(1234567)` returns \"1,2,3,4,5,6,7\". Both the strings are same, hence it would return true.</p><p><br></p><p>4. <code>System.out.println(df1.format(123456).equals(df2.format(123456)));</code></p><p>\u2713&nbsp; `df1.format(123456)` returns \"1,2,3,4,5,6\" and `df2.format(123456)` returns \"1,2,3,4,5,6\". Both the strings are same, hence it would return true.</p>", "question": "<p><strong>Question ID: UKOCP46402</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.DecimalFormat;\n\npublic class Test {\n    public static void main(String [] args)  {\n        var df1 = new DecimalFormat(\"###,##,#\");\n        var df2 = new DecimalFormat(\"000,00,0\");\n        \n        /*INSERT*/\n    }\n}</pre><p><br></p><p>And the statements:</p><p>1. <code>System.out.println(df1.format(87654).equals(df2.format(87654)));</code></p><p>2. <code>System.out.println(df1.format(1).equals(df2.format(1)));</code></p><p>3. <code>System.out.println(df1.format(1234567).equals(df2.format(1234567)));</code></p><p>4. <code>System.out.println(df1.format(123456).equals(df2.format(123456)));</code></p><p><br></p><p>How many of the above statements can replace /*INSERT*/, such that output is true?</p>", "answers": ["All four statements", "Only three statements", "Only two statements", "Only one statement"]}, "correct_response": ["c"], "section": "12.3 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP46402Given code: package com.udayankhattry.ocp;\n\nimport java.text.DecimalFormat;\n\npublic class Test {\n    public static void main(String [] args)  {\n        var df1 = new DecimalFormat(\"###,##,#\");\n        var df2 = new DecimalFormat(\"000,00,0\");\n        \n        /*INSERT*/\n    }\n}And the statements:1. System.out.println(df1.format(87654).equals(df2.format(87654)));2. System.out.println(df1.format(1).equals(df2.format(1)));3. System.out.println(df1.format(1234567).equals(df2.format(1234567)));4. System.out.println(df1.format(123456).equals(df2.format(123456)));How many of the above statements can replace /*INSERT*/, such that output is true?", "related_lectures": []}, {"_class": "assessment", "id": 92470933, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP75396: </strong></p><p>@Writer</p><p>\u2713&nbsp; Both the attributes of Writer have default values, hence their default values will be used here. When no attributes are used, then () can also be omitted.</p><p><br></p><p>@Writer()</p><p>\u2713&nbsp; Both the attributes of Writer have default values, hence their default values will be used here.</p><p><br></p><p>@Writer(\"Udayan\")</p><p>\u2717&nbsp; If the name of the attribute is 'value', then only its name can be omitted. Attribute 'value' in Writer is of int type, but \"Udayan\" is of String type and hence it causes compilation error. </p><p><br></p><p>@Writer(50)</p><p>\u2713&nbsp; If the name of the attribute is 'value', then only its name can be omitted. 50 is assigned to attribute 'value'. Default value of 'name' will be used here.</p><p><br></p><p>@Writer(\"Tom\", 37)</p><p>\u2717&nbsp; Multiple attributes cannot be specified, without specifying their names.</p><p><br></p><p>@Writer(28, \"Soha\")</p><p>\u2717&nbsp; Multiple attributes cannot be specified, without specifying their names.</p><p><br></p><p>@Writer(32, name=\"Ben\")</p><p>\u2717&nbsp; Multiple attributes cannot be specified, without specifying their names.</p>", "question": "<p><strong>Question ID: UKOCP75396</strong></p><p><br></p><p>Given code of Writer annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface Writer {\n    String name() default \"Cristie\";\n    int value() default 10;\n}</pre><p><br></p><p>And code of Song.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\n/*INSERT*/\npublic class Song{}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/, such that Song.java compiles successfully?</p><p>Choose 3 options.</p>", "answers": ["@Writer", "@Writer()", "@Writer(&quot;Udayan&quot;)", "@Writer(50)", "@Writer(&quot;Tom&quot;, 37)", "@Writer(28, &quot;Soha&quot;)", "<p>@Writer(32, name=\"Ben\")</p>"]}, "correct_response": ["a", "b", "d"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP75396Given code of Writer annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface Writer {\n    String name() default \"Cristie\";\n    int value() default 10;\n}And code of Song.java file: package com.udayankhattry.ocp;\n\n/*INSERT*/\npublic class Song{}Which of the following options can replace /*INSERT*/, such that Song.java compiles successfully?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470935, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP80735: </strong></p><p>Classes of new Java Date and Time API are immutable.</p><p>At Line n1, d1 refers to valid LocalDate instances. As, d1 refers to an immutable instance, hence `calculate(d1);` will not be able to change the contents of instance, referred by d1. </p><p>When code reaches Line n2, there will not be any changes to the object referred by d1.</p><p><br></p><p>Let's check all the options one by one: </p><p>Value of d1 at Line n1 and Line n2 will always be same</p><p>\u2713 As per above explanation.</p><p><br></p><p>Value of d1 at Line n1 and Line n2 may differ</p><p>\u2717&nbsp; As per above explanation.</p><p><br></p><p>At Line n2, value of d1 may be null</p><p>\u2717&nbsp; It is mentioned in the question, that at Line n1, d1 is not null. `calculate(d1);` method cannot make d1 to refer to null or any other object, hence at Line n2, d1 cannot be null.</p><p><br></p><p>Code inside method calculate(LocalDate) may assign a new LocalDate instance to d1</p><p>\u2717&nbsp; d1 is a local variable of main(String[]) method, hence calculate(LocalDate) method cannot assign a new LocalDate instance to d1</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 6-1 / MUTABLE-1: Prefer immutability for value types</p>", "question": "<p><strong>Question ID: UKOCP80735</strong></p><p><br></p><p>Consider below code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\n\npublic class Test {\n    public static void main(String[] args) {\n        LocalDate d1 = null;\n        //Value of d1 is successfully extracted from a DB\n        \n        //Line n1\n        calculate(d1);\n        //Line n2\n    }\n\n    public static void calculate(LocalDate date1) {\n        //Complex code\n    }\n}</pre><p><br></p><p>Assume that the given code successfully extracts the value of d1 from a database and at Line n1, d1 is not null.</p><p>Which of the following statement is correct?</p>", "answers": ["Value of d1 at Line n1 and Line n2 will always be same", "Value of d1 at Line n1 and Line n2 may differ", "At Line n2, value of d1 may be null", "Code inside method calculate(LocalDate) may assign a new LocalDate instance to d1"]}, "correct_response": ["a"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP80735Consider below code: package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\n\npublic class Test {\n    public static void main(String[] args) {\n        LocalDate d1 = null;\n        //Value of d1 is successfully extracted from a DB\n        \n        //Line n1\n        calculate(d1);\n        //Line n2\n    }\n\n    public static void calculate(LocalDate date1) {\n        //Complex code\n    }\n}Assume that the given code successfully extracts the value of d1 from a database and at Line n1, d1 is not null.Which of the following statement is correct?", "related_lectures": []}, {"_class": "assessment", "id": 92470937, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP19222: </strong></p><p>module-info.java file is the module descriptor file, which is used to define the module name, its dependencies on other modules, its packages etc. </p><p>It cannot be empty, it must at least specify the module name. E.g.</p><pre class=\"prettyprint linenums\">module mymodule{\n}</pre><p><br></p><p>It is allowed to have empty module body (there is nothing between curly brackets {}). </p><p>Please note all the java modules implicitly require java.base module.</p>", "question": "<p><strong>Question ID: UKOCP19222</strong></p><p><br></p><p>In a modular application, is it possible to have empty module-info.java file?</p>", "answers": ["Yes", "No"]}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP19222In a modular application, is it possible to have empty module-info.java file?", "related_lectures": []}, {"_class": "assessment", "id": 92470939, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP45517: </strong></p><p>Format of javac command is: </p><p>javac &lt;options&gt; &lt;source files&gt;</p><p><br></p><p>Below are the important options (related to modules) of javac command:</p><p>--module-source-path &lt;module-source-path&gt;: </p><p>Specify where to find input source files for multiple modules. In this case, module source path is 'source' directory. </p><p><br></p><p>--module &lt;module-name&gt;, -m &lt;module-name&gt;: </p><p>Compile only the specified module. This will compile all *.java file specified in the module. Multiple module names are separated by comma.</p><p><br></p><p>-d &lt;directory&gt;: </p><p>Specify where to place generated class files. In this case, it is 'classes' directory. Please note generated class files will be arranged in package-wise directory structure. </p><p><br></p><p>--module-path &lt;path&gt;, -p &lt;path&gt;: </p><p>Specify where to find compiled/packaged application modules. It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries. For example, javac -p mods;singlemodule;connector.jar represents a module path which contains all the modules inside 'mods' directory, exploded module 'singlemodule' and modular jar 'connector.jar'. </p><p>In this case, it is 'jars\\dbconnection.jar'.</p><p><br></p><p>It is clear that module 'dbtester' requires the module 'dbconnection' to access the 'com.database.util.DBConnect' class. Jar file of module 'dbconnection' is available under 'jars' directory.</p><p>To access compiled module code/jar files of other modules at compile time use --module-path or -p option. </p><p>Hence, correct command to compile 'dbtester' module is: </p><p><code>javac -d classes --module-source-path source -p jars\\dbconnection.jar -m dbtester</code></p><p><br></p><p>Let's check other 3 javac commands:</p><p><code>javac -d classes --module-source-path source;jars\\dbconnection.jar -m dbtester</code></p><p>\u2717&nbsp; 'dbconnection.jar' doesn't contain module source, hence compiler complains about missing module.</p><p><br></p><p><code>javac -d classes --module-source-path source,jars\\dbconnection.jar -m dbtester</code></p><p>\u2717&nbsp; Path separator is ; (on windows) or : (on Linux/Mac), hence comma should not be used. In this case, module source path is considered as source,jars\\dbconnection.jar'.</p><p><br></p><p><code>javac -d classes --module-source-path src --module-class-path jars\\dbconnection.jar -m dbtester</code></p><p>\u2717&nbsp; --module-class-path is not a valid option, correct option is: --module-path.</p>", "question": "<p><strong>Question ID: UKOCP45517</strong></p><p><br></p><p>Your Vendor has provided you a modular jar to test the database connection API. </p><p>Below are the Jar details:</p><p>Jar File name: dbconnection.jar</p><p>Module name: dbconnection</p><p>Class name: com.database.util.DBConnect</p><p>Method: public static void connect(String dbURL, String username, String passowrd) {...}</p><p>module-info.java contents:</p><pre class=\"prettyprint linenums\">module dbconnection {\n    exports com.database.util to dbtester;\n}</pre><p><br></p><p>File/Directory structure on your Windows platform is: </p><pre class=\"prettyprint linenums\">C:\n+---source\n|   \\---dbtester\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---test\n|                       DBTester.java\n|\n+---classes\n\\---jars\n        dbconnection.jar</pre><p><br></p><p>C:\\source\\dbtester\\module-info.java:</p><pre class=\"prettyprint linenums\">module dbtester {\n    requires dbconnection;\n}</pre><p><br></p><p>C:\\source\\dbtester\\com\\udayankhattry\\test\\DBTester.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.test;\n\nimport com.database.util.DBConnect;\n\npublic class DBTester {\n    public static void main(String... args) {\n        DBConnect.connect(\"temp\", \"admin\", \"pT12uY3$$\");\n    }\n}</pre><p><br></p><p>Which of the following javac commands compile your module code successfully?</p>", "answers": ["<p><code>javac -d classes --module-source-path source;jars\\dbconnection.jar -m dbtester</code> </p>", "<p><code>javac -d classes --module-source-path source -p jars\\dbconnection.jar -m dbtester</code> </p>", "<p><code>javac -d classes --module-source-path source,jars\\dbconnection.jar -m dbtester</code> </p>", "<p><code>javac -d classes --module-source-path src --module-class-path jars\\dbconnection.jar -m dbtester</code> </p>"]}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP45517Your Vendor has provided you a modular jar to test the database connection API. Below are the Jar details:Jar File name: dbconnection.jarModule name: dbconnectionClass name: com.database.util.DBConnectMethod: public static void connect(String dbURL, String username, String passowrd) {...}module-info.java contents:module dbconnection {\n    exports com.database.util to dbtester;\n}File/Directory structure on your Windows platform is: C:\n+---source\n|   \\---dbtester\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---test\n|                       DBTester.java\n|\n+---classes\n\\---jars\n        dbconnection.jarC:\\source\\dbtester\\module-info.java:module dbtester {\n    requires dbconnection;\n}C:\\source\\dbtester\\com\\udayankhattry\\test\\DBTester.java:package com.udayankhattry.test;\n\nimport com.database.util.DBConnect;\n\npublic class DBTester {\n    public static void main(String... args) {\n        DBConnect.connect(\"temp\", \"admin\", \"pT12uY3$$\");\n    }\n}Which of the following javac commands compile your module code successfully?", "related_lectures": []}, {"_class": "assessment", "id": 92470941, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP42007</strong></p><p><br></p><p>On windows platform, you have below modular jar file available: </p><p>C:\\utilities\\jar_files\\date.jar</p><p><br></p><p>Module name is: com.util.date</p><p>It contains com.udayankhattry.utils.DateUtil class, which on execution prints the current date on to the console.</p><p><br></p><p>Which of the following commands executed from C:\\ successfully print current date on to the console?</p><p>Choose 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP42007: </strong></p><p>Forma
