ement\u200b(String sql, int[] columnIndexes)</p><p>+ PreparedStatement&nbsp; &nbsp; &nbsp;prepareStatement\u200b(String sql, int resultSetType, int resultSetConcurrency)</p><p>+ PreparedStatement&nbsp; &nbsp; &nbsp;prepareStatement\u200b(String sql, int resultSetType, int resultSetConcurrency, int resultSetHoldability)</p><p>+ PreparedStatement&nbsp; &nbsp; &nbsp;prepareStatement\u200b(String sql, String[] columnNames)</p><p><br></p><p><br></p><p>Let's check all the options one by one: </p><p><code>con.prepareStatement()</code></p><p>\u2717&nbsp; All the overloaded methods accept String object containing sql query.</p><p><br></p><p><code>con.createStatement()</code></p><p>\u2713&nbsp; Correct.</p><p><br></p><p><code>con.prepareStatement(\"Select ID FROM LOG\")</code></p><p>\u2713&nbsp; Correct.</p><p><br></p><p><code>con.createStatement(\"Select ID FROM LOG\")</code></p><p>\u2717&nbsp; None of the overloaded createStatement method accept String object containing sql query.</p><p><br></p><p><code>con.prepareStatement(\"Select ID FROM LOG\", ResultSet.TYPE_FORWARD_ONLY, ResultSet.CONCUR_READ_ONLY)</code></p><p>\u2713&nbsp; Correct.</p><p><br></p><p><code>con.createStatement(\"Select ID FROM LOG\", ResultSet.TYPE_FORWARD_ONLY, ResultSet.CONCUR_READ_ONLY)</code></p><p>\u2717&nbsp; None of the overloaded createStatement method accept String object containing sql query.</p>"}, "correct_response": ["b", "c", "e"], "section": "11.2 JDBC: PreparedStatement, Connection, ResultSet", "question_plain": "Question ID: UKOCP29061Given structure of LOG table: LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))Given code: package com.udayankhattry.ocp;\n\nimport java.sql.DriverManager;\nimport java.sql.SQLException;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException{\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = /*INSERT*/) {\n            \n        }\n    }\n}Which of the options can be used to replace /*INSERT*/ such that there is no compilation error?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526848, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP10462</strong></p><p><br></p><p>Below files are available for your project: </p><p>//1. Currency_en.properties</p><pre class=\"prettyprint linenums\">name=Saudi Riyal\ncoin=No</pre><p><br></p><p>//2. Currency.properties</p><pre class=\"prettyprint linenums\">name=Dollar\npaper=Yes\ncoin=Yes</pre><p><br></p><p>//3. Currency_ko.properties</p><p><code>name=Won</code></p><p><br></p><p>//4. Test.java</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"en\"));\n        var loc = new Locale(\"ko\");\n        var rb = ResourceBundle.getBundle(\"Currency\", loc);\n        System.out.println(rb.getObject(\"name\"));\n        System.out.println(rb.getString(\"coin\"));\n    }\n}</pre><p><br></p><p>Assume that all the *.properties files are included in the CLASSPATH. What will be the output of compiling and executing Test class?</p>", "answers": ["<p>Saudi Riyal</p><p>No</p>", "<p>Dollar</p><p>Yes</p>", "<p>Won</p><p>No</p>", "<p>Won </p><p>Yes</p>"], "explanation": "<p><strong>UKOCP10462: </strong></p><p>Variable 'loc' infers to Locale type and variable 'rb' infers to ResourceBundle type.</p><p><br></p><p>If all the files have same keys and locale is \"ko\", then key-value pair of best match ('Currency_ko.properties') file will be considered. </p><p><br></p><p>If the files have different keys and locale is \"ko\", then key-value pair is searched in following order: </p><p>1. Currency_ko.properties [parent = 'Currency.properties']</p><p>2. Currency.properties [parent = null]</p><p>If \"Currency_ko.properties\" file is present, then this file and its parent (Currency.properties), if available, will be searched. Other properties files will be ignored.</p><p><br></p><p>As ResouceBundle object is referring to locale \"ko\", hence keys are first searched in 'Currency_ko.properties' and then its parent file 'Currency.properties'. </p><p>Key 'name' has value 'Won' in 'Currency_ko.properties' file and key 'coin' is not available in this file. Hence, it is searched in 'Currency.properties' file, which has coin=Yes</p><p><br></p><p>Therefore, output is: </p><p>Won</p><p>Yes</p>"}, "correct_response": ["d"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP10462Below files are available for your project: //1. Currency_en.propertiesname=Saudi Riyal\ncoin=No//2. Currency.propertiesname=Dollar\npaper=Yes\ncoin=Yes//3. Currency_ko.propertiesname=Won//4. Test.javapackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"en\"));\n        var loc = new Locale(\"ko\");\n        var rb = ResourceBundle.getBundle(\"Currency\", loc);\n        System.out.println(rb.getObject(\"name\"));\n        System.out.println(rb.getString(\"coin\"));\n    }\n}Assume that all the *.properties files are included in the CLASSPATH. What will be the output of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526850, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67321</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.MessageFormat;\n\npublic class Test {\n    public static void main(String [] args)  {\n        var str = \"\\\"{0} x {0} x {0}\\\" = {1}\";\n        System.out.println(MessageFormat.format(str, 3, 3*3*3));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP67321: </strong></p><p>Message format pattern referred by 'str' is: \"\\\"{0} x {0} x {0}\\\" = {1}\" and it contains two argument indexes {0} and {1} and notice that double quotes are escaped as well.</p><p>MessageFormat.format(str, 3, 3*3*3) =&gt; Returns a String object after replacing all occurrences of {0} with 3 and all occurrences of {1} with the result of 3*3*3, which is 27. </p><p><br></p><p>Hence, output will be: \"3 x 3 x 3\" = 27</p>", "answers": ["3 x 3 x 3 = 27", "3 x 3 x 3 = 3*3*3", "&quot;3 x 3 x 3&quot; = 27", "&quot;3 x 3 x 3&quot; = 3*3*3", "&quot;3 x 3 x 3&quot; = 3", "3 x 3 x 3 = 3", "<p>An exception is thrown at runtime</p>"]}, "correct_response": ["c"], "section": "12.6 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP67321Given code: package com.udayankhattry.ocp;\n\nimport java.text.MessageFormat;\n\npublic class Test {\n    public static void main(String [] args)  {\n        var str = \"\\\"{0} x {0} x {0}\\\" = {1}\";\n        System.out.println(MessageFormat.format(str, 3, 3*3*3));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526852, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP68626</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">class StringUtil {\n    /**\n     * @deprecated This method has been deprecated,\n     * use rev(String) method instead\n     */\n    @Deprecated(since = \"11\", forRemoval = true)\n    public static String reverse(String str) {\n        return str.chars() //IntStream\n            .mapToObj(c -&gt; (char)c) //Convert int to char\n            .reduce(\"\", (s1,s2) -&gt; s2+s1, (s1,s2) -&gt; s2+s1);\n\n    }\n\n    public static String rev(String str) {\n        return new StringBuilder(str).reverse().toString();\n    }\n}\n\npublic class Test {\n    //Line n1\n    public static void main(String[] args) {\n        System.out.println(StringUtil.rev(\"HELLO\")); //Line n2\n        System.out.println(StringUtil.reverse(\"HELLO\")); //Line n3\n    }\n}</pre><p><br></p><p>Which of the following needs to be done, so that code compiles without any warning by Java 11 compiler?</p>", "explanation": "<p><strong>UKOCP68626: </strong></p><p>Let's first find out the issue (if any): </p><p>Method `reverse(String)` has been Deprecated, therefore compiler will issue warning for the statement, where this method is invoked. </p><p><br></p><p>Line n3 invokes, `StringUtil.reverse(\"HELLO\")` method, therefore compiler will issue warning for this statement.</p><p>Also note that, attribute 'forRemoval' of @Deprecated tag has been set to true, this means by using `@SuppressWarnings({\"deprecation\"})` warnings will not be suppressed. Removal warning can be suppressed by using `@SuppressWarnings({\"removal\"})`</p><p><br></p><p>Out of the given options, only one option 'Replace //Line n1 with @SuppressWarnings({\"deprecated\", \"removal\"})' is correct. Please note that it uses 2 values: \"deprecated\" and \"removal\", in which \"deprecated\" is not a valid value.</p><p>'value' attribute of SuppressWarnings annotation is of String [] type, therefore it can accept multiple String values, but to suppress removal warning, one of the values must be \"removal\".</p>", "answers": ["Given code compiles successfully without any warning", "Replace //Line n1 with @SuppressWarnings", "Replace //Line n1 with @SuppressWarnings(value=&quot;deprecated&quot;)", "Replace //Line n1 with @SuppressWarnings({&quot;deprecation&quot;})", "Replace //Line n1 with @SuppressWarnings({&quot;deprecated&quot;, &quot;removal&quot;})"]}, "correct_response": ["e"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP68626Given code: class StringUtil {\n    /**\n     * @deprecated This method has been deprecated,\n     * use rev(String) method instead\n     */\n    @Deprecated(since = \"11\", forRemoval = true)\n    public static String reverse(String str) {\n        return str.chars() //IntStream\n            .mapToObj(c -&gt; (char)c) //Convert int to char\n            .reduce(\"\", (s1,s2) -&gt; s2+s1, (s1,s2) -&gt; s2+s1);\n\n    }\n\n    public static String rev(String str) {\n        return new StringBuilder(str).reverse().toString();\n    }\n}\n\npublic class Test {\n    //Line n1\n    public static void main(String[] args) {\n        System.out.println(StringUtil.rev(\"HELLO\")); //Line n2\n        System.out.println(StringUtil.reverse(\"HELLO\")); //Line n3\n    }\n}Which of the following needs to be done, so that code compiles without any warning by Java 11 compiler?", "related_lectures": []}, {"_class": "assessment", "id": 71526854, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP80739</strong></p><p><br></p><p>Below options are given to guard sensitive data during serialization: </p><p><br></p><p>1. Declare sensitive fields transient</p><p>2. Define the serialPersistentFields array field appropriately</p><p>3. Implement writeObject and use ObjectOutputStream.putField selectively</p><p>4. Implement writeReplace to replace the instance with a serial proxy</p><p>5. Implement the Externalizable interface</p><p><br></p><p>How many options are correct?</p>", "answers": ["All five options", "Only four options", "Only three options", "Only two options", "Only one option"], "explanation": "<p><strong>UKOCP80739: </strong></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 8-2 / SERIAL-2: Guard sensitive data during serialization</p>"}, "correct_response": ["a"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP80739Below options are given to guard sensitive data during serialization: 1. Declare sensitive fields transient2. Define the serialPersistentFields array field appropriately3. Implement writeObject and use ObjectOutputStream.putField selectively4. Implement writeReplace to replace the instance with a serial proxy5. Implement the Externalizable interfaceHow many options are correct?", "related_lectures": []}, {"_class": "assessment", "id": 71526856, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP57989</strong></p><p><br></p><p>You have below 3rd party modular jar:</p><p>C:\\third-party\\jars\\conncetivity.jar</p><p><br></p><p>Module name is: com.db.connect</p><p>and it contains com.jdbc.utils.Connect class which contains main(String...) method. </p><p><br></p><p>Which of the following commands executed from C:\\ will successfully execute the com.jdbc.utils.Connect class?</p>", "explanation": "<p><strong>UKOCP57989: </strong></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional. </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>As given question doesn't say anything about setting the 'Main-Class' attribute, hence class name must be passed after the module name in -m option.</p><p>Correct -m option will be: -m com.db.connect/com.jdbc.utils.Connect</p><p><br></p><p>Correct -p option will be: -p third-party\\jars or -p third-party\\jars\\conncetivity.jar</p><p><br></p><p>Let's check all the options one by one:</p><p><code>java -p third-party -m com.db.connect/com.jdbc.utils.Connect</code></p><p>\u2717&nbsp; '-p third-party' is not valid, it should be '-p third-party\\jars' or '-p third-party\\jars\\conncetivity.jar'. </p><p><br></p><p><code>java -p third-party\\jars -m com.db.connect</code></p><p>\u2717&nbsp; '-m com.db.connect' is not valid, it should be '-m com.db.connect/com.jdbc.utils.Connect'. </p><p><br></p><p><code>java -p third-party\\* -m com.db.connect/com.jdbc.utils.Connect</code></p><p>\u2717&nbsp; '*' is not allowed in -p option. </p><p><br></p><p><code>java -p third-party\\jars\\conncetivity.jar -m com.db.connect</code></p><p>\u2717&nbsp; '-m com.db.connect' is not valid, it should be '-m com.db.connect/com.jdbc.utils.Connect'. </p><p><br></p><p><code>java -p third-party\\jars -m com.db.connect/com.jdbc.utils.Connect</code></p><p>\u2713&nbsp; Both -p and -m options are correct. </p><p><br></p><p><code>java -m com.db.connect/com.jdbc.utils.Connect -p third-party\\jars</code></p><p>\u2717&nbsp; -m should be the last option.</p>", "answers": ["<p><code>java -p third-party -m com.db.connect/com.jdbc.utils.Connect</code> </p>", "<p><code>java -p third-party\\jars -m com.db.connect</code> </p>", "<p><code>java -p third-party\\* -m com.db.connect/com.jdbc.utils.Connect</code> </p>", "<p><code>java -p third-party\\jars\\conncetivity.jar -m com.db.connect</code> </p>", "<p><code>java -p third-party\\jars -m com.db.connect/com.jdbc.utils.Connect</code> </p>", "<p><code>java -m com.db.connect/com.jdbc.utils.Connect -p third-party\\jars</code> </p>"]}, "correct_response": ["e"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP57989You have below 3rd party modular jar:C:\\third-party\\jars\\conncetivity.jarModule name is: com.db.connectand it contains com.jdbc.utils.Connect class which contains main(String...) method. Which of the following commands executed from C:\\ will successfully execute the com.jdbc.utils.Connect class?", "related_lectures": []}, {"_class": "assessment", "id": 71526858, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP80711</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   +---com.udayankhattry.gifts\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---udayankhattry\n|   |           \\---gifts\n|   |                   Gift.java\n|   |\n|   +---com.udayankhattry.game\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---udayankhattry\n|   |           \\---game\n|   |                   Game.java\n|   |\n|   \\---com.udayankhattry.test\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---test\n|                       Test.java\n|\n\\---cls</pre><p><br></p><p>File contents below:-</p><p>C:\\src\\com.udayankhattry.gifts\\com\\udayankhattry\\gifts\\Gift.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.gifts;\n\nimport java.util.List;\n\npublic class Gift {\n    static List&lt;String&gt; gifts = List.of(\"Car\", \"Laptop\", \"Smartphone\", \"Smartwatch\", \"EBook Reader\");\n\n    private String name;\n\n    Gift(String name) {\n        this.name = name;\n    }\n\n    public String toString() {\n        return name;\n    }\n\n    public static Gift get(int num) {\n        return new Gift(gifts.get(num));\n    }\n}</pre><p><br></p><p>C:\\src\\com.udayankhattry.gifts\\module-info.java:</p><pre class=\"prettyprint linenums\">module com.udayankhattry.gifts {\n    exports com.udayankhattry.gifts;\n}</pre><p><br></p><p>C:\\src\\com.udayankhattry.game\\com\\udayankhattry\\game\\Game.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.game;\n\nimport com.udayankhattry.gifts.Gift;\n\npublic class Game {\n    public Gift play(int num) {\n        if (num &lt; 0 || num &gt; 4)\n            return null;\n        return Gift.get(num);\n    }\n}</pre><p><br></p><p>C:\\src\\com.udayankhattry.game\\module-info.java:</p><pre class=\"prettyprint linenums\">module com.udayankhattry.game {\n    /*INSERT*/ com.udayankhattry.gifts;\n    exports com.udayankhattry.game;\n}</pre><p><br></p><p>C:\\src\\com.udayankhattry.test\\com\\udayankhattry\\test\\Test.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.test;\n\nimport com.udayankhattry.game.Game;\nimport com.udayankhattry.gifts.Gift;\n\npublic class Test {\n    public static void main(String[] args) {\n        Gift myGift = new Game().play(2);\n        System.out.println(myGift);\n    }\n}</pre><p><br></p><p>C:\\src\\com.udayankhattry.test\\module-info.java:</p><pre class=\"prettyprint linenums\">module com.udayankhattry.test {\n    requires com.udayankhattry.game;\n}</pre><p><br></p><p>And the below command to be executed from C:\\</p><p><code>javac -d cls --module-source-path src -m com.udayankhattry.test</code></p><p><br></p><p>File C:\\src\\com.udayankhattry.game\\module-info.java is incomplete, which of the following options replaces /*INSERT*/ such that given javac command successfully compiles the module code?</p>", "explanation": "<p><strong>UKOCP80711: </strong></p><p>As we are required to replace /*INSERT*/ to resolve compilation error, which means other codes compile fine, no need to check for any other logic. </p><p>We need to just check the readability of the modules.</p><p><br></p><p>Let's start with the root module 'com.udayankhattry.test'</p><p>It uses both 'com.udayankhattry.game.Game' and 'com.udayankhattry.gifts.Gift' classes. Though it has `requires com.udayankhattry.game;` directive but `requires com.udayankhattry.gifts;` is missing. And we are not suppose to make changes in C:\\src\\com.udayankhattry.test\\module-info.java file. </p><p>Only file that can be changed is: C:\\src\\com.udayankhattry.game\\module-info.java. </p><p><br></p><p>If /*INSERT*/ is replaced with 'requires', then module 'com.udayankhattry.test' will still not be able to read the module 'com.udayankhattry.gifts' as readability is not transitive. </p><p>For example, if module C has `requires B;` (C reads B) and module B has `requires A;` (B reads A), then C doesn't read A. </p><p>To have the transitive readability, 'requires transitive' directive is used. If module C has `requires B;` (C reads B) and module B has `requires transitive A;` (B reads A [transitive dependency]), then C will also read A.</p><p><br></p><p>Hence if /*INSERT*/ is replaced with 'requires transitive', then module 'com.udayankhattry.test' will also have readability access to module 'com.udayankhattry.gifts'. </p><p>This is also known as implied readability. </p><p><br></p><p>You will find several examples of this in modular JDK. For example, module java.se:</p><p>C:\\&gt;java --describe-module java.se</p><p>java.se@11.0.10</p><p>requires java.xml.crypto transitive</p><p>requires java.datatransfer transitive</p><p>requires java.naming transitive</p><p>requires java.management transitive</p><p>requires java.instrument transitive</p><p>requires java.sql transitive</p><p>requires java.xml transitive</p><p>requires java.security.sasl transitive</p><p>requires java.base mandated</p><p>requires java.prefs transitive</p><p>requires java.security.jgss transitive</p><p>requires java.transaction.xa transitive</p><p>requires java.desktop transitive</p><p>requires java.sql.rowset transitive</p><p>requires java.management.rmi transitive</p><p>requires java.rmi transitive</p><p>requires java.net.http transitive</p><p>requires java.compiler transitive</p><p>requires java.logging transitive</p><p>requires java.scripting transitive</p><p><br></p><p>So any module reading java.se will also read java.xml.crypto, java.datatransfer etc.</p>", "answers": ["require", "requires", "requires transitive", "export", "exports"]}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP80711Given below the directory/file structure on Windows platform: C:\n+---src\n|   +---com.udayankhattry.gifts\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---udayankhattry\n|   |           \\---gifts\n|   |                   Gift.java\n|   |\n|   +---com.udayankhattry.game\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---udayankhattry\n|   |           \\---game\n|   |                   Game.java\n|   |\n|   \\---com.udayankhattry.test\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---test\n|                       Test.java\n|\n\\---clsFile contents below:-C:\\src\\com.udayankhattry.gifts\\com\\udayankhattry\\gifts\\Gift.java:package com.udayankhattry.gifts;\n\nimport java.util.List;\n\npublic class Gift {\n    static List&lt;String&gt; gifts = List.of(\"Car\", \"Laptop\", \"Smartphone\", \"Smartwatch\", \"EBook Reader\");\n\n    private String name;\n\n    Gift(String name) {\n        this.name = name;\n    }\n\n    public String toString() {\n        return name;\n    }\n\n    public static Gift get(int num) {\n        return new Gift(gifts.get(num));\n    }\n}C:\\src\ \com.udayankhattry.producer\\com\\udayankhattry\\producer\\SecretMessage.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.producer;\n\nimport com.udayankhattry.service.MessageService;\n\npublic class SecretMessage implements MessageService {\n    public void message() {\n        System.out.println(\"ATTACK\");\n    }\n    \n    public static MessageService provider() {\n        return () -&gt; System.out.println(\"DEFEND\"); \n    }\n}</pre><p><br></p><p>And below commands to compile and execute the module code: </p><p><code>javac -d out --module-source-path producer-consumer -m com.udayankhattry.service,com.udayankhattry.consumer,com.udayankhattry.producer</code></p><p><code>java -p out -m com.udayankhattry.consumer/com.udayankhattry.consumer.test.TestService</code></p><p><br></p><p>What needs to be done, such that the output is DEFEND?</p>", "explanation": "<p><strong>UKOCP62839: </strong></p><p>Let's check all the options one by one: </p><p>- Nothing, given program prints DEFEND on to the console</p><p>\u2713&nbsp; It is an example of Produce and Consume services. Given producer 'SecretMessage' class implements the MessageService interface by providing the implementation of message() method. </p><p>It also has a public static no-args method named \"provider\" returning the service implementation.</p><p><br></p><p>In this case, static method takes the precedence and output is: DEFEND</p><p><br></p><p>- Delete below declaration from the SecretMessage class: </p><pre class=\"prettyprint linenums\">public void message() {\n    System.out.println(\"ATTACK\");\n}</pre><p>\u2717&nbsp; It will cause compilation error as SecretMessage class implements MessageService interface</p><p><br></p><p>- Replace the contents SecretMessage.java file with below contents: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.producer;\n\nimport com.udayankhattry.service.MessageService;\n\npublic class SecretMessage {\n    public MessageService provider() {\n        return () -&gt; System.out.println(\"DEFEND\"); \n    }\n}</pre><p>\u2717&nbsp; Although code would compile successfully but will throw an exception at runtime, because provider() method must be static.</p>", "answers": ["Nothing, given program prints DEFEND on to the console", "<p>Delete below declaration from the SecretMessage class: </p><pre class=\"prettyprint linenums\">public void message() {\n    System.out.println(\"ATTACK\");\n}</pre>", "<p>Replace the contents SecretMessage.java file with below contents: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.producer;\n\nimport com.udayankhattry.service.MessageService;\n\npublic class SecretMessage {\n    public MessageService provider() {\n        return () -&gt; System.out.println(\"DEFEND\"); \n    }\n}</pre>"]}, "correct_response": ["a"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP62839Given below the directory/file structure on Windows platform: C:.\n+---out\n\\---producer-consumer\n    +---com.udayankhattry.service\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |                   MessageService.java\n    |\n    +---com.udayankhattry.consumer\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.java\n    |\n    \\---com.udayankhattry.producer\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---producer\n                        SecretMessage.javaBelow are the file details:-C:\\producer-consumer\\com.udayankhattry.service\\module-info.java: module com.udayankhattry.service {\n    exports com.udayankhattry.service;\n}C:\\producer-consumer\\com.udayankhattry.service\\com\\udayankhattry\\service\\MessageService.java: package com.udayankhattry.service;\n\npublic interface MessageService {\n    void message();\n}C:\\producer-consumer\\com.udayankhattry.consumer\\module-info.java: module com.udayankhattry.consumer {\n    requires com.udayankhattry.service;\n    uses com.udayankhattry.service.MessageService;\n}C:\\producer-consumer\\com.udayankhattry.consumer\\com\\udayankhattry\\service\\test\\TestService.java: package com.udayankhattry.consumer.test;\n\nimport java.util.ServiceLoader;\nimport com.udayankhattry.service.MessageService;\n\npublic class TestService {\n    public static void main(String[] args) {\n        ServiceLoader&lt;MessageService&gt; sl = ServiceLoader.load(MessageService.class);\n        sl.findFirst().ifPresent(m -&gt; m.message());\n    }\n}C:\\producer-consumer\\com.udayankhattry.producer\\module-info.java: module com.udayankhattry.producer {\n    requires com.udayankhattry.service;\n    provides com.udayankhattry.service.MessageService with com.udayankhattry.producer.SecretMessage;\n}C:\\producer-consumer\\com.udayankhattry.producer\\com\\udayankhattry\\producer\\SecretMessage.java: package com.udayankhattry.producer;\n\nimport com.udayankhattry.service.MessageService;\n\npublic class SecretMessage implements MessageService {\n    public void message() {\n        System.out.println(\"ATTACK\");\n    }\n    \n    public static MessageService provider() {\n        return () -&gt; System.out.println(\"DEFEND\"); \n    }\n}And below commands to compile and execute the module code: javac -d out --module-source-path producer-consumer -m com.udayankhattry.service,com.udayankhattry.consumer,com.udayankhattry.producerjava -p out -m com.udayankhattry.consumer/com.udayankhattry.consumer.test.TestServiceWhat needs to be done, such that the output is DEFEND?", "related_lectures": []}, {"_class": "assessment", "id": 71526830, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP49087</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int res = IntStream.rangeClosed(1, 1000)\n                    .parallel()\n                    .filter( i -&gt; i &gt; 50).findFirst().getAsInt();\n        System.out.println(res);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP49087: </strong></p><p>First element that matches the filter is 51. </p><p>In this case, base stream is sequential ordered IntStream (it has specific Encounter Order), hence findFirst() method will always return 51 regardless of whether the stream is sequential or parallel.</p>", "answers": ["It will always print 51", "It will print any number between 51 and 1000", "It will always print 50", "It will print any number between 1 and 50"]}, "correct_response": ["a"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP49087Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int res = IntStream.rangeClosed(1, 1000)\n                    .parallel()\n                    .filter( i -&gt; i &gt; 50).findFirst().getAsInt();\n        System.out.println(res);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526828, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP74035</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var codes = List.of(\"1st\", \"2nd\", \"3rd\", \"4th\");\n        System.out.println(codes.stream()\n                                .filter(s -&gt; s.endsWith(\"d\"))\n                                .reduce((s1, s2) -&gt; s1 + s2));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP74035: </strong></p><p>Variable 'codes' infers to List&lt;String&gt; type.</p><p>filter method filters all the strings ending with \"d\". [\"2nd\", \"3rd\"]</p><p><br></p><p>'stream.reduce((s1, s2) -&gt; s1 + s2)' returns 'Optional&lt;String&gt;' type whereas 'stream.reduce(\"\", (s1, s2) -&gt; s1 + s2)' returns 'String'. </p>", "answers": ["1st4th", "2nd3rd", "Optional[1st4th]", "Optional[2nd3rd]"]}, "correct_response": ["d"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP74035Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var codes = List.of(\"1st\", \"2nd\", \"3rd\", \"4th\");\n        System.out.println(codes.stream()\n                                .filter(s -&gt; s.endsWith(\"d\"))\n                                .reduce((s1, s2) -&gt; s1 + s2));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526826, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP73176</strong></p><p><br></p><p>Consider below code blocks:</p><p>1. </p><pre class=\"prettyprint linenums\">for(var i = 1; i &lt;= 5; i++) {\n    System.out.println(\"*\".repeat(i));\n}</pre><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">Stream.iterate(\"*\", s -&gt; s += \"*\").limit(5)\n        .forEach(System.out::println);</pre><p><br></p><p>3. </p><pre class=\"prettyprint linenums\">Stream.iterate(\"*\", s -&gt; s.length() &lt;= 5, s -&gt; s += \"*\")\n        .forEach(System.out::println);</pre><p><br></p><p>4. </p><pre class=\"prettyprint linenums\">IntStream.range(1, 6)\n        .map(i -&gt; \"*\".repeat(i))\n        .forEach(System.out::println);</pre><p><br></p><p>Which of the following statements is correct?</p>", "explanation": "<p><strong>UKOCP73176: </strong></p><p>for-loop produces below output:</p><p>*</p><p>**</p><p>***</p><p>****</p><p>*****</p><p><br></p><p>For 2nd block:</p><p>static &lt;T&gt; Stream&lt;T&gt; iterate\u200b(T seed, UnaryOperator&lt;T&gt; f) method of Stream, returns an infinite sequential ordered Stream. Because we used limit(5), hence only 1st five elements are taken. </p><p>Stream.iterate(\"*\", s -&gt; s += \"*\").limit(5) =&gt; [\"*\", \"**\", \"***\", \"****\", \"*****\"]</p><p>forEach(System.out::println) =&gt; Produces exactly same output as for-loop.</p><p><br></p><p>For 3rd block: </p><p>static &lt;T&gt; Stream&lt;T&gt; iterate\u200b(T seed, Predicate&lt;? super T&gt; hasNext, UnaryOperator&lt;T&gt; next): This is the overloaded method, which returns a sequential ordered Stream, until the hasNext predicate condition is true.</p><p>Stream.iterate(\"*\", s -&gt; s.length() &lt;= 5, s -&gt; s += \"*\") =&gt; [\"*\", \"**\", \"***\", \"****\", \"*****\"]</p><p>forEach(System.out::println) =&gt; Produces exactly same output as for-loop.</p><p><br></p><p>For 4th block: </p><p>IntStream.range(1, 6) =&gt; [1, 2, 3, 4, 5]</p><p>map\u200b(IntUnaryOperator mapper) of IntStream class: IntUnaryOperator's method `int applyAsInt\u200b(int operand)` returns int. </p><p>Therefore, `.map(i -&gt; \"*\".repeat(i))` causes compilation error, as mapper function in this case returns String and not int.</p><p>If `&lt;U&gt; Stream&lt;U&gt; mapToObj(IntFunction&lt;? extends U&gt; mapper)` is used instead of `int applyAsInt\u200b(int operand)`, this block would also produce the same output. </p><p><br></p><p>Hence, only first 3 blocks produce same output, and 4th block fails to compile. </p>", "answers": ["All 4 blocks produce same output", "Only 3 blocks produce same output", "Only 2 blocks produce same output", "All 4 blocks produce different output"]}, "correct_response": ["b"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP73176Consider below code blocks:1. for(var i = 1; i &lt;= 5; i++) {\n    System.out.println(\"*\".repeat(i));\n}2. Stream.iterate(\"*\", s -&gt; s += \"*\").limit(5)\n        .forEach(System.out::println);3. Stream.iterate(\"*\", s -&gt; s.length() &lt;= 5, s -&gt; s += \"*\")\n        .forEach(System.out::println);4. IntStream.range(1, 6)\n        .map(i -&gt; \"*\".repeat(i))\n        .forEach(System.out::println);Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 71526824, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP68282</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\nclass Toy {\n    String name;\n    Toy(String name) {\n        this.name = name;\n    }\n\n    @Override\n    public String toString() {\n        return \"Toy[\" + name +\"]\";\n    }\n\n    @Override\n    public boolean equals(Object obj) {\n        return true;\n    }\n\n    @Override\n    public int hashCode() {\n        return 0;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Toy&gt; stream = Stream.of(new Toy(\"BALL\"), new Toy(\"BAT\"));\n        Optional&lt;Toy&gt; optional = stream.distinct().findFirst();\n        System.out.println(optional.isPresent() + \" : \" + optional.get());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP68282: </strong></p><p>stream =&gt; [new Toy(\"BALL\"), new Toy(\"BAT\")] {Sequential ordered stream}</p><p><br></p><p>distinct() method of Stream uses equals(Object) and hashCode() methods to find out duplicates. In this case, implementation of equals(Object) and hashCode() methods in Toy class makes all the Toy objects equal. Hence, new Toy(\"BALL\") and new Toy(\"BAT\") are considered same. </p><p>For ordered streams, the selection of distinct elements is stable (for duplicated elements, the element appearing first in the encounter order is preserved.)</p><p><br></p><p>stream.distinct() =&gt; [new Toy(\"BALL\")]</p><p>findFirst(); =&gt; Optional[new Toy(\"BALL\")]</p><p><br></p><p>optional.isPresent() =&gt; true. isPresent method returns true if optional is not empty otherwise false.&nbsp; </p><p>optional.get() =&gt; Returns Toy object {new Toy(\"BALL\")}, toString() method of Toy class returns \"Toy[BALL]\" for this object. </p><p><br></p><p>Output is: </p><p>true : Toy[BALL]</p><p><br></p><p>NOTE: In real world projects, it is advisable to to check using isPresent() method before using the get() method. </p><pre class=\"prettyprint linenums\">if(optional.isPresent()) {\n    System.out.println(optional.get());\n}</pre>", "answers": ["true : Toy[BALL]", "true : Toy[BAT]", "false : Toy[BALL]", "false : Toy[BAT]", "true : &lt;Some text containing @ symbol&gt;", "true : Toy[&lt;Some text containing @ symbol&gt;]"]}, "correct_response": ["a"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP68282Given code: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\nclass Toy {\n    String name;\n    Toy(String name) {\n        this.name = name;\n    }\n\n    @Override\n    public String toString() {\n        return \"Toy[\" + name +\"]\";\n    }\n\n    @Override\n    public boolean equals(Object obj) {\n        return true;\n    }\n\n    @Override\n    public int hashCode() {\n        return 0;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Toy&gt; stream = Stream.of(new Toy(\"BALL\"), new Toy(\"BAT\"));\n        Optional&lt;Toy&gt; optional = stream.distinct().findFirst();\n        System.out.println(optional.isPresent() + \" : \" + optional.get());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526822, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP38404</strong></p><p><br></p><p>Given: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        /* INSERT */\n        var vowels = List.of('A', 'E', 'I', 'O', 'U');\n        vowels.stream().map(x -&gt; operator.apply(x)).forEach(System.out::print); //Line n1\n    }\n}</pre><p><br></p><p>Line n1 is causing compilation error as variable 'operator' is not found. </p><p>Which of the following two options can replace /* INSERT */ such that output is: BFJPV?</p>", "answers": ["<p><code>UnaryOperator&lt;Integer&gt; operator = c -&gt; c + 1;</code> </p>", "<p><code>UnaryOperator&lt;Character&gt; operator = c -&gt; c + 1;</code> </p>", "<p><code>UnaryOperator&lt;Character&gt; operator = c -&gt; c.charValue() + 1;</code> </p>", "<p><code>UnaryOperator&lt;Character&gt; operator = c -&gt; (char)(c.charValue() + 1);</code> </p>", "<p><code>Function&lt;Character, Character&gt; operator = x -&gt; (char)(x + 1);</code> </p>", "<p><code>Function&lt;Character, Integer&gt; operator = x -&gt; x + 1;</code> </p>"], "explanation": "<p><strong>UKOCP38404: </strong></p><p>As 'vowels' refers to List&lt;Character&gt;, hence vowels.stream() returns Stream&lt;Character&gt; type. So, map method of Stream&lt;Character&gt; type has signature: &lt;R&gt; Stream&lt;R&gt; map(Function&lt;? super Character, ? extends R&gt; mapper);</p><p><br></p><p>Since forEach(System.out::print) is printing BFJPV, hence result of map(x -&gt; operator.apply(x)) should be Stream&lt;Character&gt; and not Stream&lt;Integer&gt;.</p><p><br></p><p>This means correct reference type of 'operator' variable is Function&lt;Character, Character&gt;. Now as UnaryOperator&lt;T&gt; extends Function&lt;T, T&gt;, so UnaryOpeartor&lt;Character&gt; is also correct reference type of 'operator' variable. </p><p><br></p><p>Out of 6, we are left with 4 options. Let's check the remaining options one by one: </p><p><br></p><p>`UnaryOperator&lt;Character&gt; operator = c -&gt; c + 1;`: `c + 1` results in int and int can be converted to Integer but not Character, so this causes compilation failure.</p><p><br></p><p>`UnaryOperator&lt;Character&gt; operator = c -&gt; c.charValue() + 1;`: `c.charValue() + 1` results in int and int can be converted to Integer but not Character, so this causes compilation failure.</p><p><br></p><p>`UnaryOperator&lt;Character&gt; operator = c -&gt; (char)(c.charValue() + 1);`: This expression adds 1 to the current char value (primitive char is compatible with primitive int) and resultant int value is type-casted to char, which is converted to Character by auto-boxing. Hence, this is correct option.</p><p>Note: UnarayOperator&lt;T&gt; extends Function&lt;T, T&gt;</p><p><br></p><p>`Function&lt;Character, Character&gt; operator = x -&gt; (char)(x + 1);`: This is also correct option. x + 1 results in int, which is type-casted to char and finally converted to to Character by auto-boxing.</p>"}, "correct_response": ["d", "e"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP38404Given: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        /* INSERT */\n        var vowels = List.of('A', 'E', 'I', 'O', 'U');\n        vowels.stream().map(x -&gt; operator.apply(x)).forEach(System.out::print); //Line n1\n    }\n}Line n1 is causing compilation error as variable 'operator' is not found. Which of the following two options can replace /* INSERT */ such that output is: BFJPV?", "related_lectures": []}, {"_class": "assessment", "id": 71526820, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP12266</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        int i = 2000;\n        Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();\n        deque.add(1000);\n        deque.add(i);\n        deque.add(3000);\n        \n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following 2 statements, if used to replace /*INSERT*/, will print following on to the console:</p><p>1000</p><p>2000</p><p>3000</p>", "answers": ["<p><code>deque.forEach(System.out::print);</code> </p>", "<p><code>deque.forEach(System.out::println);</code> </p>", "<p><code>deque.forEach(i -&gt; System.out.println(i));</code> </p>", "<p><code>deque.forEach(s -&gt; System.out.println(s));</code> </p>"], "explanation": "<p><strong>UKOCP12266: </strong></p><p>Iterator&lt;T&gt; interface has forEach(Consumer) method. As Consumer is a Functional Interface, hence a lambda expression or method reference syntax can be passed as argument to forEach() method.&nbsp; </p><p><br></p><p><code>deque.forEach(System.out::print);</code> </p><p>\u2717 This will print 100020003000 without any newline character in between.&nbsp; </p><p><br></p><p><code>deque.forEach(System.out::println);</code> </p><p>\u2713 This prints desired output</p><p><br></p><p><code>deque.forEach(i -&gt; System.out.println(i));</code> </p><p>\u2717 Causes compilation failure as lambda expression variable 'i' conflicts with local variable. </p><p><br></p><p><code>deque.forEach(s -&gt; System.out.println(s));</code> </p><p>\u2713 Prints desired output.&nbsp; </p><p><br></p><p>NOTE: `System.out::print` is a method reference syntax corresponding to lambda expression `s -&gt; System.out.println(s)`.</p>"}, "correct_response": ["b", "d"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP12266Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        int i = 2000;\n        Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();\n        deque.add(1000);\n        deque.add(i);\n        deque.add(3000);\n        \n        /*INSERT*/\n    }\n}Which of the following 2 statements, if used to replace /*INSERT*/, will print following on to the console:100020003000", "related_lectures": []}, {"_class": "assessment", "id": 71526818, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP61224</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.ToIntFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"Aa aA aB Ba aC Ca\";\n        ToIntFunction&lt;String&gt; func = text::indexOf;\n        System.out.println(func.applyAsInt(\"a\"));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["0", "-1", "1", "Compilation error"], "explanation": "<p><strong>UKOCP61224: </strong></p><p>`text::indexOf` is equivalent to lambda expression `search -&gt; text.indexOf(search)`.&nbsp; </p><p>ToIntFunction&lt;T&gt; has method: int applyAsInt(T value);. </p><p>In this case T is of String type. </p><p>`func.applyAsInt(\"a\")` will invoke text.indexOf(\"a\"), which returns the index of first occurrence of \"a\". In the given text, it is 1.</p>"}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP61224Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.ToIntFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"Aa aA aB Ba aC Ca\";\n        ToIntFunction&lt;String&gt; func = text::indexOf;\n        System.out.println(func.applyAsInt(\"a\"));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526816, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP15351</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"*\", \"**\", \"***\", \"****\", \"*****\"};\n        Predicate pr1 = s -&gt; s.length() &lt; 4;\n        print(arr, pr1);\n    }\n    \n    private static void print(String [] arr, Predicate&lt;String&gt; predicate) {\n        for(String str : arr) {\n            if(predicate.test(str)) {\n                System.out.println(str);\n            }\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error", "<p>*</p><p>**</p><p>***</p>", "<p>*</p><p>**</p><p>***</p><p>****</p>", "<p>*</p><p>**</p><p>***</p><p>****</p><p>*****</p>"], "explanation": "<p><strong>UKOCP15351: </strong></p><p>Though Predicate is a generic interface but raw type is also allowed. Type of the variable in lambda expression is inferred by the generic type of Predicate&lt;T&gt; interface.&nbsp; </p><p><br></p><p>In this case, Predicate pr1 = s -&gt; s.length() &lt; 4; Predicate is considered of Object type so variable 's' is of Object type and Object class doesn't have length() method. So, `s.length()` causes compilation error. </p>"}, "correct_response": ["a"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP15351Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"*\", \"**\", \"***\", \"****\", \"*****\"};\n        Predicate pr1 = s -&gt; s.length() &lt; 4;\n        print(arr, pr1);\n    }\n    \n    private static void print(String [] arr, Predicate&lt;String&gt; predicate) {\n        for(String str : arr) {\n            if(predicate.test(str)) {\n                System.out.println(str);\n            }\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526814, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP14012</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Writer {\n    void print(Object obj);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Writer obj = System.out::print;\n        obj.print(\"BE HONEST\");\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP14012: </strong></p><p>This is the case of \"Reference to an Instance Method of a Particular Object\". </p><p>Both print(Object) method and print(Object) method accepts same argument. </p><p>System.out::println means println method is called on System.out reference variable. </p><p>obj.print(\"BE HONEST\"); invokes System.out.println(\"BE HONEST\"); and this prints BE HONEST on to the console.</p>", "answers": ["Compilation error", "BE HONEST", "An exception is thrown at runtime", "None of the other options"]}, "correct_response": ["b"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP14012Given code: package com.udayankhattry.ocp;\n\ninterface Writer {\n    void print(Object obj);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Writer obj = System.out::print;\n        obj.print(\"BE HONEST\");\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526812, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP52745</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Operation {\n    int operate(int x, int y);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 10;\n        int y = 20;\n        Operation o1 = (x, y) -&gt; x * y; \n        System.out.println(o1.operate(5, 10));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["50", "200", "Compilation error", "Exception is thrown at runtime"], "explanation": "<p><strong>UKOCP52745: </strong></p><p>Lambda expression's variables x and y cannot redeclare another local variables defined in the enclosing scope. </p><p>`Operation o1 = (x, y) -&gt; x * y;` causes compilation error.</p>"}, "correct_response": ["c"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP52745Given code: package com.udayankhattry.ocp;\n\ninterface Operation {\n    int operate(int x, int y);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 10;\n        int y = 20;\n        Operation o1 = (x, y) -&gt; x * y; \n        System.out.println(o1.operate(5, 10));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526810, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP69193</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Person {\n    private String firstName;\n    private String lastName;\n\n    public Person(String firstName, String lastName) {\n        this.firstName = firstName;\n        this.lastName = lastName;\n    }\n\n    public String getFirstName() {\n        return firstName;\n    }\n\n    public String getLastName() {\n        return lastName;\n    }\n\n    public String toString() {\n        return \"{\" + firstName + \", \" + lastName + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Person&gt; list = Arrays.asList(\n                new Person(\"Tom\", \"Riddle\"),\n                new Person(\"Tom\", \"Hanks\"),\n                new Person(\"Yusuf\", \"Pathan\"));\n        list.stream().sorted(Comparator.comparing(Person::getFirstName).reversed()\n                .thenComparing(Person::getLastName)).forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP69193: </strong></p><p>In this case, sorted method accepts an instance of Comparator&lt;Person&gt; type. </p><p><br></p><p>Comparator.comparing(Person::getFirstName) =&gt; Returns a Comparator for sorting the records in ascending order of first name.&nbsp; </p><p>Comparator.comparing(Person::getFirstName).reversed() =&gt; Returns a Comparator for sorting the records in descending order of first name.&nbsp; </p><p>Comparator.comparing(Person::getFirstName).reversed().thenComparing(Person::getLastName) =&gt; Returns a Comparator for sorting the records in descending order of first name and in case first name matches, then ascending order of last name. </p><p><br></p><p>So correct answer is: </p><p>{Yusuf, Pathan}</p><p>{Tom, Hanks}</p><p>{Tom, Riddle}</p>", "answers": ["<p>{Tom, Riddle}</p><p>{Tom, Hanks}</p><p>{Yusuf, Pathan}</p>", "<p>{Tom, Hanks}</p><p>{Tom, Riddle}</p><p>{Yusuf, Pathan}</p>", "<p>{Yusuf, Pathan}</p><p>{Tom, Riddle}</p><p>{Tom, Hanks}</p>", "<p>{Yusuf, Pathan}</p><p>{Tom, Hanks}</p><p>{Tom, Riddle}</p>"]}, "correct_response": ["d"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP69193Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Person {\n    private String firstName;\n    private String lastName;\n\n    public Person(String firstName, String lastName) {\n        this.firstName = firstName;\n        this.lastName = lastName;\n    }\n\n    public String getFirstName() {\n        return firstName;\n    }\n\n    public String getLastName() {\n        return lastName;\n    }\n\n    public String toString() {\n        return \"{\" + firstName + \", \" + lastName + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Person&gt; list = Arrays.asList(\n                new Person(\"Tom\", \"Riddle\"),\n                new Person(\"Tom\", \"Hanks\"),\n                new Person(\"Yusuf\", \"Pathan\"));\n        list.stream().sorted(Comparator.comparing(Person::getFirstName).reversed()\n                .thenComparing(Person::getLastName)).forEach(System.out::println);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526808, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP56246</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Map;\nimport java.util.TreeMap;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        Map&lt;Integer, String&gt; map = new TreeMap&lt;&gt;();\n        map.put(1, \"one\");\n        map.put(2, \"two\");\n        map.put(3, \"three\");\n        map.put(null, \"null\");\n        map.forEach((key, value) -&gt; System.out.println(\"{\" + key + \": \" + value + \"}\"));\n    }\n} </pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>{null: null}</p><p>{1: one}</p><p>{2: two}</p><p>{3: three}</p>", "<p>{1: one}</p><p>{2: two}</p><p>{3: three}</p><p>{null: null}</p>", "<p>{1: one}</p><p>{2: two}</p><p>{3: three}</p>", "NullPointerException is thrown at runtime"], "explanation": "<p><strong>UKOCP56246: </strong></p><p>TreeMap cannot contain null keys. Hence, 'map.put(null, \"null\");' throws NullPointerException.</p>"}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP56246Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Map;\nimport java.util.TreeMap;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        Map&lt;Integer, String&gt; map = new TreeMap&lt;&gt;();\n        map.put(1, \"one\");\n        map.put(2, \"two\");\n        map.put(3, \"three\");\n        map.put(null, \"null\");\n        map.forEach((key, value) -&gt; System.out.println(\"{\" + key + \": \" + value + \"}\"));\n    }\n} What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526806, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP59767</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(\"A\", \"B\");\n        var list2 = List.of(\"B\", \"C\");\n        list1.retainAll(list2);\n        System.out.println(list1.size());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP59767: </strong></p><p>There are 12 overloaded of methods in List interface:</p><p>List.of()</p><p>List.of(E e1)</p><p>List.of\u200b(E e1, E e2)</p><p>List.of(E e1, E e2, E e3)</p><p>List.of(E e1, E e2, E e3, E e4)</p><p>List.of(E e1, E e2, E e3, E e4, E e5)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>List.of(E... elements)</p><p><br></p><p>These create an unmodifiable list containing specified elements. </p><p>These methods throw NullPointerException - if an element is null</p><p><br></p><p>Calling any mutator method on the List(add, addAll, set, remove, removeIf, removeAll, retainAll) will always cause UnsupportedOperationException to be thrown. </p><p><br></p><p>As, List object referred by 'list1' variable is unmodifiable, hence `list1.retainAll(list2);` throws UnsupportedOperationException at runtime.</p>", "answers": ["1", "2", "3", "4", "An exception is thrown at runtime"]}, "correct_response": ["e"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP59767Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(\"A\", \"B\");\n        var list2 = List.of(\"B\", \"C\");\n        list1.retainAll(list2);\n        System.out.println(list1.size());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526804, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP33129</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;StringBuilder&gt; gemStones = new ArrayList&lt;&gt;();\n        gemStones.add(new StringBuilder(\"Sapphire\"));\n        gemStones.add(new StringBuilder(\"Emerald\"));\n        gemStones.add(new StringBuilder(\"Ruby\"));\n\n        if(gemStones.contains(new StringBuilder(\"Sapphire\"))) {\n            gemStones.add(new StringBuilder(\"Diamond\"));\n        }\n\n        System.out.println(gemStones.size());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP33129: </strong></p><p>Three StringBuilder objects [{\"Sapphire\"}, {\"Emerald\"}, {\"Ruby\"}] are added to the gemStones list.</p><p>StringBuilder class doesn't override equals(Object) method and hence `gemStones.contains(new StringBuilder(\"Sapphire\"))` returns false. Code inside if-block is not executed and days.size() returns 3. </p>", "answers": ["4", "3", "Compilation error", "Runtime exception"]}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP33129Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;StringBuilder&gt; gemStones = new ArrayList&lt;&gt;();\n        gemStones.add(new StringBuilder(\"Sapphire\"));\n        gemStones.add(new StringBuilder(\"Emerald\"));\n        gemStones.add(new StringBuilder(\"Ruby\"));\n\n        if(gemStones.contains(new StringBuilder(\"Sapphire\"))) {\n            gemStones.add(new StringBuilder(\"Diamond\"));\n        }\n\n        System.out.println(gemStones.size());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526802, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP35358</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Student {\n    private String name;\n    private int age;\n    \n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n    \n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Student&gt; students = new ArrayList&lt;&gt;();\n        students.add(new Student(\"James\", 25));\n        students.add(new Student(\"James\", 27));\n        students.add(new Student(\"James\", 25));\n        students.add(new Student(\"James\", 25));\n        \n        students.remove(new Student(\"James\", 25));\n        \n        for(Student stud : students) {\n            System.out.println(stud);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP35358: </strong></p><p>Before you answer this, you must know that there are 5 different Student object created in the memory (4 at the time of adding to the list and 1 at the time of removing from the list). This means these 5 Student objects will be stored at different memory addresses.</p><p><br></p><p>remove(Object) method removes the first occurrence of matching object and equals(Object) method decides whether 2 objects are equal or not. equals(Object) method defined in Object class uses == operator to check the equality and in this case as 5 Student objects are stored at different memory location, hence not equal. </p><p><br></p><p>Nothing is removed from the students list, all the 4 Student objects are printed in the insertion order. </p>", "answers": ["<p>Student[James, 27]</p><p>Student[James, 25]</p><p>Student[James, 25]</p>", "<p>Student[James, 25]</p><p>Student[James, 27]</p><p>Student[James, 25]</p>", "Student[James, 27]", "<p>Student[James, 25]</p><p>Student[James, 27]</p><p>Student[James, 25]</p><p>Student[James, 25]</p>"]}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP35358Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Student {\n    private String name;\n    private int age;\n    \n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n    \n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Student&gt; students = new ArrayList&lt;&gt;();\n        students.add(new Student(\"James\", 25));\n        students.add(new Student(\"James\", 27));\n        students.add(new Student(\"James\", 25));\n        students.add(new Student(\"James\", 25));\n        \n        students.remove(new Student(\"James\", 25));\n        \n        for(Student stud : students) {\n            System.out.println(stud);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526800, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP39706</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Printer&lt;T extends String&gt; {}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;String&gt; printer = new Printer&lt;&gt;();\n        System.out.println(printer);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP39706: </strong></p><p>Even though String is a final class but T extends String is a valid syntax. As no class extends from java.lang.String class so parameterized type will always be Printer&lt;String&gt;.&nbsp; </p><p><br></p><p>Generic class Printer doesn't override toString() method, hence Object version is invoked. </p>", "answers": ["Some text containing @ symbol", "Compilation error for Printer class", "Compilation error for Test class"]}, "correct_response": ["a"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP39706Given code of Test.java file:package com.udayankhattry.ocp;\n\nclass Printer&lt;T extends String&gt; {}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;String&gt; printer = new Printer&lt;&gt;();\n        System.out.println(printer);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}]};

    function kiemTraDapAn(correctMuti, choise) {
      // Chuyển đổi các số trong choise thành chữ cái tương ứng
      const choiseLetters = choise.map(num => String.fromCharCode(parseInt(num) + 'a'.charCodeAt(0)));
      console.log('choiseLetters',choiseLetters)
      // Kiểm tra điều kiện:
      // 1. Chiều dài hai mảng phải bằng nhau
      // 2. Tất cả các phần tử trong choiseLetters phải có trong correctMuti
      if (
        choiseLetters.length === correctMuti.length &&
        choiseLetters.every(c => correctMuti.includes(c))
      ) {
        return true;
      } else {
        return false;
      }
    }

    // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();

        span.classList.remove("selected");
        input.checked = false;

      var span = answers[answer].children[0].children[0].children[0];
      var input = answers[answer].children[0].children[0].children[1];
      span.classList.add("selected");
      input.checked = true;
    }
