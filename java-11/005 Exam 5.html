t of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional. </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>And below is the important option (related to non-modular codes) of java command:</p><p>--class-path or -classpath or -cp: A ; separated list of directories, JAR archives, and ZIP archives to search for class files.</p><p><br></p><p>In Java 11 you can still use the -cp argument with java command. All classes found on the classpath (i.e. loaded outside a module) ends up in the unnamed module. Unnamed module reads all other modules. Using the unnamed module happens automatically, when you put your classes and jar files on the classpath.</p><p><br></p><p>Let's check all the options one by one: </p><p><code>java -p utilities -m com.util.date</code></p><p>\u2717&nbsp; Directory 'utilities' doesn't contain the jar file. As given question doesn't say anything about setting the 'Main-Class' attribute, hence class name must be passed after the module name in -m option. Correct -m option will be: -m com.util.date/com.udayankhattry.utils.DateUtil. </p><p><br></p><p><code>java -p utilities\\jar_files -m com.util.date</code></p><p>\u2717&nbsp; Directory 'utilities\\jar_files' is the valid path which contains 'date.jar', but class name after module is missing, it should be '-m com.util.date/com.udayankhattry.utils.DateUtil'.</p><p><br></p><p><code>java -p utilities\\jar_files -m com.util.date/com.udayankhattry.utils.DateUtil</code></p><p>\u2713&nbsp; It displays the current date.</p><p><br></p><p><code>java -cp utilities\\jar_files com.udayankhattry.utils.DateUtil</code></p><p>\u2717&nbsp; Classpath 'utilities\\jar_files' contains date.jar and date.jar contains the DateUtil class, hence correct classpath option should be '-cp utilities\\jar_files\\date.jar'.</p><p><br></p><p><code>java -cp utilities\\jar_files\\date.jar com.udayankhattry.utils.DateUtil</code></p><p>\u2713&nbsp; Classpath 'utilities\\jar_files\\date.jar' is valid and fully qualified name of the class 'com.udayankhattry.utils.DateUtil' is also valid. It prints the current date.</p>", "answers": ["<p><code>java -p utilities -m com.util.date</code> </p>", "<p><code>java -p utilities\\jar_files -m com.util.date</code> </p>", "<p><code>java -p utilities\\jar_files -m com.util.date/com.udayankhattry.utils.DateUtil</code> </p>", "<p><code>java -cp utilities\\jar_files com.udayankhattry.utils.DateUtil</code> </p>", "<p><code>java -cp utilities\\jar_files\\date.jar com.udayankhattry.utils.DateUtil</code> </p>"]}, "correct_response": ["c", "e"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP42007On windows platform, you have below modular jar file available: C:\\utilities\\jar_files\\date.jarModule name is: com.util.dateIt contains com.udayankhattry.utils.DateUtil class, which on execution prints the current date on to the console.Which of the following commands executed from C:\\ successfully print current date on to the console?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470887, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP53190: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>Given statement: </p><p>var list = new ArrayList&lt;&gt;(); =&gt; list refers to an ArrayList of Object type, because Generic type is not defined on the right side.</p><p><br></p><p>It is possible to add null to ArrayList instance. </p><p>Initially list has 3 elements: [null, null, null].</p><p>remove(int) returns the deleted member of the list. In this case `list.remove(0);` returns null as null was deleted from the 0th index. So, list is left with 2 elements: [null, null]. </p><p>remove(Object) returns true if deletion was successful otherwise false. In this case `list.remove(null)` removes first null from the list and returns true and list is left with just one element: [null]. </p><p>Hence, the output is: 'null:true'.</p>", "question": "<p><strong>Question ID: UKOCP53190</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new ArrayList&lt;&gt;();\n        list.add(null);\n        list.add(null);\n        list.add(null);\n        System.out.println(list.remove(0) + \":\" + list.remove(null));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["true:true", "true:false", "null:true", "null:null", "NullPointerException is thrown at runtime"]}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP53190Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new ArrayList&lt;&gt;();\n        list.add(null);\n        list.add(null);\n        list.add(null);\n        System.out.println(list.remove(0) + \":\" + list.remove(null));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470869, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP38900: </strong></p><p>Variable 'count' declared inside interface GetSetGo is implicitly public, static and final. Line n1 compiles successfully.</p><p>Line n2 creates one dimensional array of 5 elements of GetSetGo type and all 5 elements are initialized to null. Line n2 compiles successfully.</p><p>Though correct way to refer static variable is by using the type name, such as GetSetGo.count but it can also be invoked by using reference variable of GetSetGo type. Hence, obj.count at Line n3 correctly points to the count variable at Line n1. But as variable 'count' is implicitly final, therefore obj.count++ causes compilation error. Line n3 fails to compile.</p><p>Line n4 compiles successfully as variable 'count' is implicitly static and GetSetGo.count is the correct syntax to point to 'count' variable of interface GetSetGo.</p>", "question": "<p><strong>Question ID: UKOCP38900</strong></p><p><br></p><p>Consider below codes of 2 java files: </p><pre class=\"prettyprint linenums\">//GetSetGo.java\npackage com.udayankhattry.ocp;\n\npublic interface GetSetGo {\n    int count = 1; //Line n1\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        GetSetGo [] arr = new GetSetGo[5]; //Line n2\n        for(GetSetGo obj : arr) {\n            obj.count++; //Line n3\n        }\n        System.out.println(GetSetGo.count); //Line n4\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 causes compilation error", "Test class compiles successfully and on execution prints 5 on to the console", "Test class compiles successfully and on execution prints 6 on to the console"]}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP38900Consider below codes of 2 java files: //GetSetGo.java\npackage com.udayankhattry.ocp;\n\npublic interface GetSetGo {\n    int count = 1; //Line n1\n}//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        GetSetGo [] arr = new GetSetGo[5]; //Line n2\n        for(GetSetGo obj : arr) {\n            obj.count++; //Line n3\n        }\n        System.out.println(GetSetGo.count); //Line n4\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 92470871, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP11854: </strong></p><p>Enum constructor is invoked once for every constant. </p><p><br></p><p>For 'Flags.TRUE', enum constructor is invoked for TRUE as well as FALSE.</p>", "question": "<p><strong>Question ID: UKOCP11854</strong></p><p><br></p><p>Consider the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nenum Flags {\n    TRUE, FALSE;\n\n    Flags() {\n        System.out.println(\"HELLO\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Flags flags = Flags.TRUE;\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["HELLO is printed twice", "HELLO is printed once", "Exception is thrown at runtime", "None of the other options"]}, "correct_response": ["a"], "section": "3.8 Java OO: Enumerations", "question_plain": "Question ID: UKOCP11854Consider the code of Test.java file:package com.udayankhattry.ocp;\n\nenum Flags {\n    TRUE, FALSE;\n\n    Flags() {\n        System.out.println(\"HELLO\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Flags flags = Flags.TRUE;\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470873, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP12715: </strong></p><p>NullPointerException extends RuntimeException and in multi-catch syntax we can't specify multiple Exceptions related to each other in multilevel inheritance.</p>", "question": "<p><strong>Question ID: UKOCP12715</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    private static String s;\n    public static void main(String[] args) {\n        try {\n            System.out.println(s.length());\n        } catch(NullPointerException | RuntimeException ex) {\n            System.out.println(\"DONE\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["DONE", "Executes successfully but no output", "Compilation error", "None of the other options"]}, "correct_response": ["c"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP12715Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    private static String s;\n    public static void main(String[] args) {\n        try {\n            System.out.println(s.length());\n        } catch(NullPointerException | RuntimeException ex) {\n            System.out.println(\"DONE\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470875, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP29169: </strong></p><p>findSecretFile() method declares to throw FileNotFoundException (checked exception) and main(String []) method invokes findSecretFile(); method. </p><p>catch-handler in this case can specify FileNotFoundException or IOException or Exception or Throwable. As catch-handler for Throwable is available, hence exception is handled correctly inside main(String []) method. </p><p><br></p><p>As, return; statement is available inside catch-block only, therefore compiler doesn't tag `System.out.println(\"DONE\");` as unreachable. </p><p>If return; statement was present in both try and catch block or finally-block, then unreachable code compilation error would have caused by the last statement in main(String []) method. </p><p><br></p><p>Throwable is the root class of the exception hierarchy and it contains some useful constructors: </p><p><br></p><p>1. public Throwable() {...} : No-argument constructor</p><p>2. public Throwable(String message) {...} : Pass the detail message</p><p>3. public Throwable(String message, Throwable cause) {...} : Pass the detail message and the cause</p><p>4. public Throwable(Throwable cause) {...} : Pass the cause</p><p><br></p><p>Exception and RuntimeException classes also provide similar constructors. </p><p><br></p><p>Throwable class also contains methods, which are inherited by all the subclasses (Exception, RuntimeException etc.)</p><p>1. public String getMessage() {...} : Returns the detail message (E.g. detail message set by 2nd and 3rd constructor)</p><p>2. public String toString() {} : </p><p>Returns a short description of this throwable. The result is the concatenation of:</p><p>the name of the class of this object</p><p>\": \" (a colon and a space)</p><p>the result of invoking this object's getLocalizedMessage() method </p><p><br></p><p>If getLocalizedMessage returns null, then just the class name is returned.</p><p><br></p><p><br></p><p>On execution, main(String []) method invokes findSecretFile(), which throws an instance of FileNotFoundException. </p><p>There is a matching catch-handler available in main(String []) method, therefore `System.out.println(ex.getMessage());` is executed and this prints ACCESS REQUIRED on to the console. </p><p>As there is finally-block available, so just before the return; statement takes control out of main(String []) method, code inside finally-block gets executed and this prints LEVEL 1 on to the console.</p><p>Control exits the main(String []) method and program terminates successfully. </p>", "question": "<p><strong>Question ID: UKOCP29169</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            findSecretFile();\n        } catch(Throwable ex) {\n            System.out.println(ex.getMessage());\n            return;\n        } finally {\n            System.out.println(\"LEVEL 1\");\n        }\n        System.out.println(\"DONE\");\n    }\n\n    static void findSecretFile() throws FileNotFoundException {\n        throw new FileNotFoundException(\"ACCESS REQUIRED\");\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>ACCESS REQUIRED</p><p>LEVEL 1</p><p>DONE</p>", "<p>ACCESS REQUIRED</p><p>LEVEL 1</p>", "ACCESS REQUIRED", "<p>ACCESS REQUIRED</p><p>DONE</p>", "Compilation error"]}, "correct_response": ["b"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP29169Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            findSecretFile();\n        } catch(Throwable ex) {\n            System.out.println(ex.getMessage());\n            return;\n        } finally {\n            System.out.println(\"LEVEL 1\");\n        }\n        System.out.println(\"DONE\");\n    }\n\n    static void findSecretFile() throws FileNotFoundException {\n        throw new FileNotFoundException(\"ACCESS REQUIRED\");\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470877, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP86141: </strong></p><p>For null resources, close() method is not called and hence NullPointerException is not thrown at runtime.&nbsp; </p><p><br></p><p>HELLO is printed on to the console. </p>", "question": "<p><strong>Question ID: UKOCP86141</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.PrintWriter;\n\npublic class Test {\n    public static void main(String[] args) {\n        try(PrintWriter writer = null) {\n            System.out.println(\"HELLO\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["HELLO", "Compilation error", "NullPointerException is thrown at runtime"]}, "correct_response": ["a"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP86141Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.PrintWriter;\n\npublic class Test {\n    public static void main(String[] args) {\n        try(PrintWriter writer = null) {\n            System.out.println(\"HELLO\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470879, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP11388: </strong></p><p>Line n1 creates a String [] object of 4 elements. arr[0] --&gt; \"A\", arr[1] --&gt; \"B\", arr[2] --&gt; \"C\" and arr[3] --&gt; \"D\".</p><p>At Line n2, arr[0] --&gt; \"B\".</p><p>At Line n3, arr[1] --&gt; \"E\". </p><p>So, after Line n3, arr refers to {\"B\", \"E\", \"C\", \"D\"}.</p><p>for-each loop prints the array elements referred by arr and hence the output is: B E C D </p>", "question": "<p><strong>Question ID: UKOCP11388</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] arr = { \"A\", \"B\", \"C\", \"D\" }; // Line n1\n        arr[0] = arr[1]; // Line n2\n        arr[1] = \"E\"; // Line n3\n        for (String s : arr) {\n            System.out.print(s + \" \");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "B E C D ", "E E C D ", "A E C D ", "B B C D ", "<p>A B C D</p>"]}, "correct_response": ["c"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP11388Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] arr = { \"A\", \"B\", \"C\", \"D\" }; // Line n1\n        arr[0] = arr[1]; // Line n2\n        arr[1] = \"E\"; // Line n3\n        for (String s : arr) {\n            System.out.print(s + \" \");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470881, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP89186: </strong></p><p>`char [] arr1 [] = new char[5][];`: Creates two-dimensional array object, whose 1st dimension is 5 but 2nd dimension is not yet defined. On the left side array symbols can be used before the reference variable or after the reference variable or can be mixed, hence `char [][] arr1`, `char [] arr1 []` and `char arr1[][]` all are valid. This statement compiles successfully.</p><p><br></p><p>`byte [] val = new byte[10];`: Creates one-dimensional byte array object and val refers to it. All the array elements are initialized to 0. This statement compiles without any error.</p><p><br></p><p>`int [] arr2 = {1, 2, 3, 4, 5};`: This syntax creates one-dimensional int array object of 5 elements and initializes these 5 elements as well. It initializes element at 0th index to 1, element at 1st index to 2, element at 2nd index to 3, element at 3rd index to 4 and element at 4th index to 5. 'arr2' refers to this one-dimensional array object. This statement also compiles fine.</p><p><br></p><p>`int [] arr3 = new int[3]{10, 20, 30};`: You can't specify size at the time of initializing with data, hence `new int[3]{10, 20, 30};` causes compilation error.</p><p>Correct syntax is: `int [] arr3 = new int[]{10, 20, 30};` OR `int [] arr3 = {10, 20, 30};`</p>", "question": "<p><strong>Question ID: UKOCP89186</strong></p><p><br></p><p>Which of the following array declarations and initializations is NOT legal?</p>", "answers": ["<p><code>char [] arr1 [] = new char[5][];</code> </p>", "<p><code>int [] arr2 = {1, 2, 3, 4, 5};</code> </p>", "<p><code>int [] arr3 = new int[3]{10, 20, 30};</code> </p>", "<p><code>byte [] val = new byte[10];</code> </p>"]}, "correct_response": ["c"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP89186Which of the following array declarations and initializations is NOT legal?", "related_lectures": []}, {"_class": "assessment", "id": 92470883, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP57597: </strong></p><p>static declaration of type parameter is not allowed, only instance declaration is possible. </p><p><br></p><p>'static T obj;' causes compilation failure. </p>", "question": "<p><strong>Question ID: UKOCP57597</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test&lt;T&gt; {\n    static T obj;\n}</pre><p><br></p><p>Does above code compile successfully?</p>", "answers": ["Yes", "No"]}, "correct_response": ["b"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP57597Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test&lt;T&gt; {\n    static T obj;\n}Does above code compile successfully?", "related_lectures": []}, {"_class": "assessment", "id": 92470885, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP59750: </strong></p><p>ArrayList's 1st and 3rd items are referring to same String instance referred by 's' [s --&gt; \"Hello\"] and 2nd item is referring to another instance of String.</p><p><br></p><p>String is immutable, which means s.replace(\"l\", \"L\"); creates another String instance \"HeLLo\" but 's' still refers to \"Hello\" [s --&gt; \"Hello\"].&nbsp; </p><p><br></p><p>[Hello, Hello, Hello] is printed in the output.</p>", "question": "<p><strong>Question ID: UKOCP59750</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        String s = new String(\"Hello\");\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(s);\n        list.add(new String(\"Hello\"));\n        list.add(s);\n        s.replace(\"l\", \"L\");\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["[Hello, Hello, Hello]", "[HeLLo, Hello, Hello]", "[HeLLo, Hello, HeLLo]", "[HeLLo, HeLLo, HeLLo]"]}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP59750Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        String s = new String(\"Hello\");\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(s);\n        list.add(new String(\"Hello\"));\n        list.add(s);\n        s.replace(\"l\", \"L\");\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92470905, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP42921: </strong></p><p>Optional&lt;T&gt; class has below method: </p><p>public static &lt;T&gt; Optional&lt;T&gt; of(T value){...}</p><p>It returns an Optional describing the given non-null value. </p><p>If null argument is passed to of method, then NullPointerException is thrown at runtime. </p>", "question": "<p><strong>Question ID: UKOCP42921</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Optional.of(null);\n        System.out.println(optional);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Optional.empty", "Optional[null]", "Optional[0]", "NullPointerException is thrown at runtime"]}, "correct_response": ["d"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP42921Given code: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Optional.of(null);\n        System.out.println(optional);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470889, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP11352: </strong></p><p>There are 12 overloaded of methods in Set interface:</p><p>Set.of()</p><p>Set.of(E e1)</p><p>Set.of\u200b(E e1, E e2)</p><p>Set.of(E e1, E e2, E e3)</p><p>Set.of(E e1, E e2, E e3, E e4)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>Set.of(E... elements)</p><p><br></p><p>These create an unmodifiable set containing specified elements. </p><p>These methods throw NullPointerException - if an element is null or IllegalArgumentException - if the elements are duplicates</p><p><br></p><p>As, while executing Line n1, duplicate element \"I\" is processed first, therefore IllegalArgumentException is thrown.</p>", "question": "<p><strong>Question ID: UKOCP11352</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;String&gt; set = Set.of(\"A\", \"E\", \"I\", \"I\", null, \"O\", \"U\");\n        System.out.println(set.size());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error", "IllegalArgumentException is thrown at runtime", "NullPointerException is thrown at runtime", "5", "6", "7"]}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP11352Given code: package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;String&gt; set = Set.of(\"A\", \"E\", \"I\", \"I\", null, \"O\", \"U\");\n        System.out.println(set.size());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470891, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP14873: </strong></p><p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().compareTo(o2.getFirst()));</code> =&gt; It sorts in the ascending order of first name in case-sensitive manner and displays [John Smith, Peter Lee, bonita smith] in the output.&nbsp; </p><p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().toLowerCase().compareTo(o2.getFirst().toLowerCase()));</code> =&gt; At the time of comparison, first names in lower case are considered, this doesn't change the case of displayed output. Output is: [bonita smith, John Smith, Peter Lee].&nbsp; </p><p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().toUpperCase().compareTo(o2.getFirst().toUpperCase()));</code> =&gt; At the time of comparison, first names in upper case are considered, this doesn't change the case of displayed output. Output is: [bonita smith, John Smith, Peter Lee].&nbsp; </p><p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().compareToIgnoreCase(o2.getFirst()));</code> =&gt; compareToIgnoreCase method compares the first names in case-insensitive manner and displays </p><p>[bonita smith, John Smith, Peter Lee] in the output.</p>", "question": "<p><strong>Question ID: UKOCP14873</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\nclass Name {\n    String first;\n    String last;\n\n    public Name(String first, String last) {\n        this.first = first;\n        this.last = last;\n    }\n\n    public String getFirst() {\n        return first;\n    }\n\n    public String getLast() {\n        return last;\n    }\n\n    public String toString() {\n        return first + \" \" + last;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Name&gt; names = Arrays.asList(new Name(\"Peter\", \"Lee\"), new Name(\"John\", \"Smith\"), \n                new Name(\"bonita\", \"smith\"));\n        \n        /*INSERT*/\n\n        System.out.println(names);\n    }\n}</pre><p><br></p><p>Currently on executing Test class, [Peter Lee, John Smith, bonita smith] is displayed in the output.</p><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing Test class, [bonita smith, John Smith, Peter Lee] is displayed in the output? </p><p>The names list must be sorted in ascending order of first name in case-insensitive manner. </p><p>Select 3 options.</p>", "answers": ["<p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().compareTo(o2.getFirst()));</code> </p>", "<p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().toLowerCase().compareTo(o2.getFirst().toLowerCase()));</code> </p>", "<p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().toUpperCase().compareTo(o2.getFirst().toUpperCase()));</code> </p>", "<p><code>Collections.sort(names, (o1, o2) -&gt; o1.getFirst().compareToIgnoreCase(o2.getFirst()));</code> </p>"]}, "correct_response": ["b", "c", "d"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP14873Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\nclass Name {\n    String first;\n    String last;\n\n    public Name(String first, String last) {\n        this.first = first;\n        this.last = last;\n    }\n\n    public String getFirst() {\n        return first;\n    }\n\n    public String getLast() {\n        return last;\n    }\n\n    public String toString() {\n        return first + \" \" + last;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Name&gt; names = Arrays.asList(new Name(\"Peter\", \"Lee\"), new Name(\"John\", \"Smith\"), \n                new Name(\"bonita\", \"smith\"));\n        \n        /*INSERT*/\n\n        System.out.println(names);\n    }\n}Currently on executing Test class, [Peter Lee, John Smith, bonita smith] is displayed in the output.Which of the following options can replace /*INSERT*/ such that on executing Test class, [bonita smith, John Smith, Peter Lee] is displayed in the output? The names list must be sorted in ascending order of first name in case-insensitive manner. Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470893, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP63887: </strong></p><p>The target type of a lambda expression must be a functional interface.</p><p>At Line n1, interface Child is the target type for lambda expression, which means Child must be a Functional Interface. Let's check if Child is a Functional interface or not. </p><p><br></p><p>Functional interface must have only one non-overriding abstract method but Functional interface can have constant variables, static methods, default methods, private methods and overriding abstract methods [equals(Object) method, toString() method etc. from Object class]. </p><p><br></p><p>Interface Parent is a valid interface and it contains a default method, 3 static methods out of which 2 are private and one overriding abstract method [toString()] but it doesn't contain non-overriding abstract method. </p><p><br></p><p>Interface Child extends Parent and it declares a non-overriding abstract method play(). As Parent interface doesn't have any non-overriding abstract method, therefore, Child interface has only one non-overriding abstract method and therefore it's a valid Functional interface.</p><p><br></p><p>There is no compilation error in the given code. </p><p><br></p><p>Lambda expression at Line n1 is the correct implementation of play() method and on execution Line n2 prints PLAYING CRICKET... on to the console.</p>", "question": "<p><strong>Question ID: UKOCP63887</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Parent {\n    default void earn() {\n        System.out.println(\"Earning for the family\");\n    }\n\n    static void plan() {\n        planRetirement();\n        planChildrenEducation();\n    }\n\n    private static void planChildrenEducation() {\n        //valid codes\n    }\n\n    private static void planRetirement() {\n        //valid codes\n    }\n\n    String toString();\n}\n\ninterface Child extends Parent {\n    void play();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Child child = () -&gt; System.out.println(\"PLAYING CRICKET...\"); //Line n1\n        child.play(); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error in Parent interface", "Compilation error in Child interface", "Compilation error in Test class", "On execution, Test class prints PLAYING CRICKET... on to the console", "On execution, Test class throws an Exception"]}, "correct_response": ["d"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP63887Given code: package com.udayankhattry.ocp;\n\ninterface Parent {\n    default void earn() {\n        System.out.println(\"Earning for the family\");\n    }\n\n    static void plan() {\n        planRetirement();\n        planChildrenEducation();\n    }\n\n    private static void planChildrenEducation() {\n        //valid codes\n    }\n\n    private static void planRetirement() {\n        //valid codes\n    }\n\n    String toString();\n}\n\ninterface Child extends Parent {\n    void play();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Child child = () -&gt; System.out.println(\"PLAYING CRICKET...\"); //Line n1\n        child.play(); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470895, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP76734: </strong></p><p>This is an example of method reference to static method. </p><p>Corresponding lambda expression to Test::print is: (byte x, byte y, byte z) -&gt; Test.print(x, y, z). Hence, no issues with Line n1.</p><p>At runtime, when Line n2 invokes the lambda expression of Line n1, byte is wrapped to Byte and because of Inheritance, it can be easily assigned to Number type. Hence, Line n2 compiles successfully. </p><p>Output of the given code is: 11, 22, 33.</p>", "question": "<p><strong>Question ID: UKOCP76734</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Logger {\n    String log(byte i, byte j, byte k);\n}\n\npublic class Test {\n    private static String print(Number i, Number j, Number k) {\n        return i + \", \" + j + \", \" + k;\n    }\n\n    public static void main(String[] args) {\n        Logger obj = Test::print; //Line n1\n        System.out.println(obj.log((byte)11, (byte)22, (byte)33)); //Line n2\n    }\n}\n</pre><p>What is the result?</p>", "answers": ["Compilation error at Line n1", "Compilation error at Line n2", "11, 22, 33", "33, 22, 11"]}, "correct_response": ["c"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP76734Given code: package com.udayankhattry.ocp;\n\ninterface Logger {\n    String log(byte i, byte j, byte k);\n}\n\npublic class Test {\n    private static String print(Number i, Number j, Number k) {\n        return i + \", \" + j + \", \" + k;\n    }\n\n    public static void main(String[] args) {\n        Logger obj = Test::print; //Line n1\n        System.out.println(obj.log((byte)11, (byte)22, (byte)33)); //Line n2\n    }\n}\nWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470897, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP29994: </strong></p><p>Date date = obj.get(); means get() method of the interface is invoked. get() method is declared in Supplier interface. All options of Function interface are incorrect.</p><p>Supplier interface's declaration is: public interface Supplier&lt;T&gt; { T get(); }.&nbsp; </p><p><br></p><p>Question specifies that Date::new is the constructor reference for no-argument Date() constructor</p><p>Supplier&lt;Date&gt; can replace /*INSERT*/.&nbsp; </p><p><br></p><p>If you use raw type, Supplier or parameterized type Supplier&lt;Object&gt;, then obj.get() method would return Object type. So Date date = obj.get(); will have to be converted to Date date = (Date)obj.get(); but you are allowed to replace /*INSERT*/ only, hence Supplier and Supplier&lt;Object&gt; are incorrect options.</p><p><br></p><p>Please note that, to solve this question, you are not suppose to have any knowledge of java.util.Date class. All the needed information are given in this question. </p>", "question": "<p><strong>Question ID: UKOCP29994</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Date;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/ obj = Date::new;//Constructor reference for no-argument Date() constructor\n        Date date = obj.get(); //Creates an instance of Date class.\n        System.out.println(date);\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing Test class, current date and time is displayed in the output?</p>", "answers": ["Supplier", "Supplier&lt;Object&gt;", "Supplier&lt;Date&gt;", "Function", "Function&lt;Date&gt;", "Function&lt;Object&gt;"]}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP29994Given code:package com.udayankhattry.ocp;\n\nimport java.util.Date;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/ obj = Date::new;//Constructor reference for no-argument Date() constructor\n        Date date = obj.get(); //Creates an instance of Date class.\n        System.out.println(date);\n    }\n}Which of the following options can replace /*INSERT*/ such that on executing Test class, current date and time is displayed in the output?", "related_lectures": []}, {"_class": "assessment", "id": 92470899, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP74530: </strong></p><p>There are 3 primitive interfaces corresponding to Predicate interface: </p><p>DoublePredicate : boolean test(double value);</p><p>IntPredicate : boolean test(int value);</p><p>LongPredicate : boolean test(long value);</p><p><br></p><p>Lambda expression 'd -&gt; d &lt; 10000' in this case can be easily assigned to DoublePredicate target type. 'd -&gt; d &lt; 10000' returns true if value is less than 10000. </p><p><br></p><p>But note: negate() method is used, which means a new DoublePredicate is returned which is just opposite of the given DoublePredicate. After negation, the resultant predicate is 'd -&gt; d &gt;= 10000'.</p><p>Salary is incremented only for Lucy and not Jack.</p>", "question": "<p><strong>Question ID: UKOCP74530</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.DoublePredicate;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Jack\", 8000),\n                new Employee(\"Lucy\", 12000));\n        updateSalary(employees, d -&gt; d &lt; 10000);\n        employees.forEach(System.out::println);\n    }\n\n    private static void updateSalary(List&lt;Employee&gt; list, DoublePredicate predicate) {\n        for(Employee e : list) {\n            if(predicate.negate().test(e.getSalary())) {\n                e.setSalary(e.getSalary() + 2000);\n            }\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>{Jack, 8000.0}</p><p>{Lucy, 12000.0}</p>", "<p>{Jack, 10000.0}</p><p>{Lucy, 12000.0}</p>", "<p>{Jack, 8000.0}</p><p>{Lucy, 14000.0}</p>", "<p>{Jack, 10000.0}</p><p>{Lucy, 14000.0}</p>"]}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP74530Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.DoublePredicate;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Jack\", 8000),\n                new Employee(\"Lucy\", 12000));\n        updateSalary(employees, d -&gt; d &lt; 10000);\n        employees.forEach(System.out::println);\n    }\n\n    private static void updateSalary(List&lt;Employee&gt; list, DoublePredicate predicate) {\n        for(Employee e : list) {\n            if(predicate.negate().test(e.getSalary())) {\n                e.setSalary(e.getSalary() + 2000);\n            }\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470901, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP81279: </strong></p><p>`s -&gt; s.add(10)` an ambiguous call and it matches to 2nd argument of both the overloaded methods.</p><p>Consumer&lt;Set&lt;Integer&gt;&gt; consumer = s -&gt; s.add(10);</p><p>and</p><p>Predicate&lt;Set&lt;Integer&gt;&gt; predicate = s -&gt; s.add(10);</p><p><br></p><p>So, both Line n1 and Line n2 cause compilation error. </p><p><br></p><p>There are 3 ways to resolve the error:</p><p>1. Use the reference variable of particular type:</p><p>Consumer&lt;Set&lt;Integer&gt;&gt; consumer = s -&gt; s.add(10);</p><p>add(set, consumer); //Line n1 =&gt; Matches to method at Line n3</p><p><br></p><p>Predicate&lt;Set&lt;Integer&gt;&gt; predicate = s -&gt; s.add(20);</p><p>add(set, predicate); //Line n2 =&gt; Matches to method at Line n4</p><p><br></p><p>2. Typecast to exact type:</p><p>add(set, (Consumer&lt;Set&lt;Integer&gt;&gt;)s -&gt; s.add(10)); //Line n1 =&gt; Matches to method at Line n3</p><p>add(set, (Predicate&lt;Set&lt;Integer&gt;&gt;)s -&gt; s.add(20)); //Line n2 =&gt; Matches to method at Line n4</p><p><br></p><p>3. Use the lambda expression with body:</p><p>add(set, s -&gt; {s.add(10); return;}); //Line n1 =&gt; Matches to method at Line n3</p><p>add(set, s -&gt; {return s.add(20);}); //Line n2 =&gt; Matches to method at Line n4</p>", "question": "<p><strong>Question ID: UKOCP81279</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Integer&gt; set = new HashSet&lt;&gt;();\n        add(set, s -&gt; s.add(10)); //Line n1\n        add(set, s -&gt; s.add(20)); //Line n2\n\n        System.out.println(set.size());\n    }\n\n    private static void add(Set&lt;Integer&gt; set, Consumer&lt;Set&lt;Integer&gt;&gt; consumer) { //Line n3\n        consumer.accept(set);\n    }\n\n    private static void add(Set&lt;Integer&gt; set, Predicate&lt;Set&lt;Integer&gt;&gt; predicate) { //Line n4\n        predicate.test(set);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["0", "1", "2", "Compilation error"]}, "correct_response": ["d"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP81279Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Integer&gt; set = new HashSet&lt;&gt;();\n        add(set, s -&gt; s.add(10)); //Line n1\n        add(set, s -&gt; s.add(20)); //Line n2\n\n        System.out.println(set.siz     // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
