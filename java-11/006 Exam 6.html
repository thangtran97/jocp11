n            System.out.println(\"EQUAL \" + num);\n        } else {\n            System.out.println(\"NOT EQUAL \" + num);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880854, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP49133</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        do {\n            System.out.print(\"SLOW-\");\n        } while (false);\n\n        System.out.println(\"DOWN\");\n    }\n}</pre><p><br></p><p>Which of the following statements is correct for above code?</p>", "answers": ["Compiles successfully and on execution prints DOWN", "Compiles successfully and on execution prints SLOW- in infinite loop", "Unreachable code compilation error", "Compiles successfully and on execution prints SLOW-DOWN"], "explanation": "<p><strong>UKOCP49133: </strong></p><p>As do-while loop executes at least once, hence none of the code is unreachable in this case.&nbsp; </p><p>Java runtime prints \"SLOW-\" to the console, then it checks boolean expression, which is false.&nbsp; </p><p>Hence control goes out of do-while block. Java runtime executes 2nd System.out.println statement to print \"DOWN\" on to the console. </p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP49133Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        do {\n            System.out.print(\"SLOW-\");\n        } while (false);\n\n        System.out.println(\"DOWN\");\n    }\n}Which of the following statements is correct for above code?", "related_lectures": []}, {"_class": "assessment", "id": 55880856, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP86560</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String res = \"\";\n        loop: for(var i = 1; i &lt;= 5; i++) { //Line n1\n            switch(i) {\n            case 1:\n                res += \"UP \";\n                break;\n            case 2: \n                res += \"TO \";\n                break;\n            case 3: \n                break;\n            case 4:\n                res += \"DATE\";\n                break loop;\n            }\n        }\n        System.out.println(String.join(\"-\", res.split(\" \"))); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP86560: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>At Line n1, variable 'i' infers to int type, so given loop executes 5 times from values of i from 5 to 1.</p><p><br></p><p>To know more about join and split methods of String class, please check the URLs: </p><p>https://udayankhattry.com/join-string/</p><p>https://udayankhattry.com/split-string/</p><p><br></p><p>Let's solve the given code:</p><p>Initially, res = \"\"</p><p>1st iteration: i = 1. code of 'case 1:' is executed, res = \"\" + \"UP \" = \"UP \". break; statement breaks out of the switch-case block and not the loop.</p><p>2nd iteration: i = 2. code of 'case 2:' is executed, res = \"UP \" + \"TO \" = \"UP TO \". break; statement breaks out of the switch-case block.</p><p>3rd iteration: i = 3. code of 'case 3:' is executed. break; statement breaks out of the switch-case block.</p><p>4th iteration: i = 4. code of 'case 4:' is executed. res = \"UP TO \" + \"DATE\" = \"UP TO DATE\". break loop; statement breaks out of the for loop.</p><p><br></p><p>Line n2 is executed: </p><p>String.join(\"-\", res.split(\" \"))</p><p>= String.join(\"-\", \"UP TO DATE\".split(\" \"))</p><p>= String.join(\"-\", [\"UP\",\"TO\",\"DATE\"]) //Splits on the basis of single space \" \".</p><p>= \"UP-TO-DATE\"</p><p><br></p><p>Line n2 prints UP-TO-DATE on to the console.</p>", "answers": ["UP", "TO", "DATE", "UP-TO", "TO-DATE", "UP-TO-DATE", "<p>Compilation error at Line n1</p>", "<p>Compilation error at Line n2</p>"], "relatedLectureIds": ""}, "correct_response": ["f"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP86560Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String res = \"\";\n        loop: for(var i = 1; i &lt;= 5; i++) { //Line n1\n            switch(i) {\n            case 1:\n                res += \"UP \";\n                break;\n            case 2: \n                res += \"TO \";\n                break;\n            case 3: \n                break;\n            case 4:\n                res += \"DATE\";\n                break loop;\n            }\n        }\n        System.out.println(String.join(\"-\", res.split(\" \"))); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880858, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP37185</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer {\n    public void print(int x) {\n        class Inner {\n            public void getX() {\n                System.out.println(++x);\n            }\n        }\n        Inner inner = new Inner();\n        inner.getX();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Outer().print(100);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP37185: </strong></p><p>class Inner is method local inner class and it is accessing parameter variable x. </p><p>Starting with JDK 8, a method local inner class can access local variables and parameters of the enclosing block that are final or effectively final. </p><p>But the statement System.out.println(++x); tries to increment the value of variable x and hence compilation error.</p>", "answers": ["100", "101", "Compilation error", "Runtime exception"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP37185Given code: package com.udayankhattry.ocp;\n\nclass Outer {\n    public void print(int x) {\n        class Inner {\n            public void getX() {\n                System.out.println(++x);\n            }\n        }\n        Inner inner = new Inner();\n        inner.getX();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Outer().print(100);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880860, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP86544</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer {\n    static class Inner {\n        static void greetings(String s) {\n            System.out.println(s);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following 2 options can replace /*INSERT*/ such that on executing class Test, output is: HELLO!?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP86544: </strong></p><p>Outside of top-level class, Outer, static nested class's name can be referred by using TOP-LEVEL-CLASS.STATIC-NESTED-CLASS or var. So, in this case, correct way to refer static nested class is Outer.Inner. greetings(String) is a static method, so it can be invoked by using the class name, which is by the statement: Outer.Inner.greetings(\"...\"); </p><p><br></p><p>Even though it is not preferred to invoke static method in non-static manner, but you can use the instance of class to invoke its static method.</p><p>To Create the instance of static nested class, syntax is: new TOP-LEVEL-CLASS.STATIC-NESTED-CLASS(...); </p><p>in this case, new Outer.Inner();</p>", "answers": ["<pre class=\"prettyprint linenums\">Outer.Inner inner1 = new Outer().new Inner();\ninner1.greetings(\"HELLO!\");</pre>", "<pre class=\"prettyprint linenums\">Outer.Inner inner2 = new Outer.Inner();\ninner2.greetings(\"HELLO!\");</pre>", "<p><code>Outer.Inner.greetings(\"HELLO!\"); </code> </p>", "<p><code>Inner.greetings(\"HELLO!\"); </code> </p>"]}, "correct_response": ["b", "c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP86544Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nclass Outer {\n    static class Inner {\n        static void greetings(String s) {\n            System.out.println(s);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}Which of the following 2 options can replace /*INSERT*/ such that on executing class Test, output is: HELLO!?", "related_lectures": []}, {"_class": "assessment", "id": 55880862, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68301</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    static int i1 = 10;\n    int i2 = 20;\n    \n    int add() {\n        return this.i1 + this.i2; //Line n1\n    }\n    \n    public static void main(String[] args) {\n        System.out.println(new Test().add()); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP68301: </strong></p><p>'i1' is a static variable and 'i2' is an instance variable. Preferred way to access static variable 'i1' inside add() method is by using 'i1' or 'Test.i1'. Even though 'this.i1' is not the recommended way but it works. </p><p>And instance variable 'i2' can be accessed inside add() method by using 'i2' or 'this.i2'. Hence, Line n1 compiles successfully.</p><p><br></p><p>As add() is an instance method of Test class, so an instance of Test class is needed to invoke the add() method. `new Test().add()` correctly invokes the add() method of Test class and returns 30. Line n2 prints 30 on to the console. </p>", "answers": ["It executes successfully and prints 30 on to the console", "It executes successfully and prints 20 on to the console", "It executes successfully and prints 10 on to the console", "Line n1 causes compilation error", "Line n2 causes compilation error"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP68301Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    static int i1 = 10;\n    int i2 = 20;\n    \n    int add() {\n        return this.i1 + this.i2; //Line n1\n    }\n    \n    public static void main(String[] args) {\n        System.out.println(new Test().add()); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880864, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP47829</strong></p><p><br></p><p>Consider below code of Wall.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Wall {\n    public static void main(String args[]) {\n        double area = 5.7;\n        String color;\n        if (area &lt; 7)\n            color = \"BLUE\";\n        \n        System.out.println(color);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Wall class?</p>", "answers": ["BLUE", "null", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP47829: </strong></p><p>'color' is LOCAL variable and it must be initialized before it can be used.</p><p>As area is not compile time constant, java compiler doesn't have an idea of the value of variable area. </p><p>There is no else block available as well.</p><p><br></p><p>So compiler cannot be sure of whether variable color will be initialized or not. So `System.out.println(color);` causes compilation error.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP47829Consider below code of Wall.java file: package com.udayankhattry.ocp;\n\npublic class Wall {\n    public static void main(String args[]) {\n        double area = 5.7;\n        String color;\n        if (area &lt; 7)\n            color = \"BLUE\";\n        \n        System.out.println(color);\n    }\n}What will be the result of compiling and executing Wall class?", "related_lectures": []}, {"_class": "assessment", "id": 55880866, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP46539</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Document {\n    int pages;\n    Document(int pages) {\n        this.pages = pages;\n    }\n}\n\nclass Word extends Document {\n    String type;\n    Word(String type) {\n        super(20); //default pages\n        /*INSERT-1*/\n    }\n    \n    Word(int pages, String type) {\n        /*INSERT-2*/\n        super.pages = pages;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Word obj = new Word(25, \"TEXT\");\n        System.out.println(String.join(\",\", obj.type, obj.pages + \"\"));\n    }\n}</pre><p><br></p><p>Currently above code causes compilation error. </p><p>Which of the options can successfully print TEXT,25 on to the console?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP46539: </strong></p><p>Java compiler adds super(); as the first statement inside constructor, if call to another constructor using this(...) or super(...) is not available.&nbsp; </p><p>Compiler adds super(); as the first line in Word's constructor: Word(int pages, String type) { super(); } but Document class doesn't have a no-argument constructor and that is why Word's constructor `Word(int pages, String type)` causes compilation error. </p><p><br></p><p>Word(String) constructor is actually not setting the passed type argument. Replace /*INSERT-1*/ with: `this.type = type;` will set the value to type variable. </p><p><br></p><p>As the first statement inside Word(int pages, String type){} constructor, you can either have `super(pages);` or `this(type);` but not both. </p><p>Replacing /*INSERT-2*/ with `super(pages);` will be redundant as in the next statement `super.pages = pages;`, pages variable of Document class is set. Hence, replacing /*INSERT-2*/ with `this(type);` is needed to set the type variable. </p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Based on above points, `System.out.println(String.join(\",\", obj.type, obj.pages + \"\"));` will print TEXT,25 on to the console.</p>", "answers": ["<p>Replace /*INSERT-1*/ with:</p><p><code>this(type);</code></p><p>Replace /*INSERT-2*/ with: </p><p><code>this.type = type;</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><p><code>this.type = type;</code></p><p>Replace /*INSERT-2*/ with: </p><p><code>this(type);</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><p><code>super.type = type;</code></p><p>Replace /*INSERT-2*/ with: </p><p><code>this(type);</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><p><code>super.type = type;</code></p><p>Replace /*INSERT-2*/ with: </p><p><code>super(type);</code> </p>", "None of the other options"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP46539Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nclass Document {\n    int pages;\n    Document(int pages) {\n        this.pages = pages;\n    }\n}\n\nclass Word extends Document {\n    String type;\n    Word(String type) {\n        super(20); //default pages\n        /*INSERT-1*/\n    }\n    \n    Word(int pages, String type) {\n        /*INSERT-2*/\n        super.pages = pages;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Word obj = new Word(25, \"TEXT\");\n        System.out.println(String.join(\",\", obj.type, obj.pages + \"\"));\n    }\n}Currently above code causes compilation error. Which of the options can successfully print TEXT,25 on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 55880868, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP55474</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Base {\n    static void print() { //Line n1\n        System.out.println(\"BASE\");\n    }\n}\n\nclass Derived extends Base {\n    static void print() { //Line n2\n        System.out.println(\"DERIVED\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Base b = null;\n        Derived d = (Derived) b; //Line n3\n        d.print(); //Line n4\n    }\n}</pre><p><br></p><p>Which of the following statements is true for above code?</p>", "feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP55474: </strong></p><p>print() method at Line n2 hides the method at Line n1. So, no compilation error at Line n2.</p><p><br></p><p>Reference variable 'b' is of type Base, so `(Derived) b` does not cause any compilation error. Moreover, at runtime it will not throw any ClassCastException as well because b is null. Had 'b' been referring to an instance of Base class [Base b = new Base();], `(Derived) b` would have thrown ClassCastException.</p><p><br></p><p>d.print(); doesn't cause any compilation error but as this syntax creates confusion, so it is not a good practice to access the static variables or static methods using reference variable, instead class name should be used. Derived.print(); is the preferred syntax. </p><p><br></p><p>d.print(); invokes the static print() method of Derived class and prints DERIVED on to the console.</p>", "answers": ["Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 causes compilation error", "Code compiles successfully and on execution Line n3 throws an exception", "Code compiles successfully and on execution prints BASE on to the console", "Code compiles successfully and on execution prints DERIVED on to the console"], "relatedLectureIds": ""}, "correct_response": ["f"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP55474Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Base {\n    static void print() { //Line n1\n        System.out.println(\"BASE\");\n    }\n}\n\nclass Derived extends Base {\n    static void print() { //Line n2\n        System.out.println(\"DERIVED\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Base b = null;\n        Derived d = (Derived) b; //Line n3\n        d.print(); //Line n4\n    }\n}Which of the following statements is true for above code?", "related_lectures": []}, {"_class": "assessment", "id": 55880870, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51068</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface I1 {\n    public static void print(String str) {\n        System.out.println(\"I1:\" + str.toUpperCase());\n    }\n}\n\nclass C1 implements I1 {\n    void print(String str) {\n        System.out.println(\"C1:\" + str.toLowerCase());\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        I1 obj = new C1();\n        obj.print(\"Java\");\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "answers": ["Class C1 causes compilation error", "Class Test causes compilation error", "Interface I1 causes compilation error", "Given code compiles successfully and on execution prints I1:JAVA on to the console", "Given code compiles successfully and on execution prints C1:java on to the console"], "explanation": "<p><strong>UKOCP51068: </strong></p><p>As per Java 8, default and static methods were added in the interface. Interface I1 defines static method print(String), there is no compilation error in interface I1.</p><p>Also the scope of print(String) method of I1 is limited to interface I1 and it can be invoked by using Interface name only, I1.print(\"\").</p><p><br></p><p>class C1 implements I1 and it also defines print(String) instance method. Even though class C1 implements I1, it doesn't have static print(String) method in its scope, therefore class C1 compiles successfully.</p><p><br></p><p>Super type reference variable can refer to an instance of Sub type, therefore the statement `I1 obj = new C1();` compiles successfully.</p><p>obj is of I1 type, hence `obj.print(\"Java\");` tries to tag the static method of I1 but static print(String) method of I1 can only be invoked by using I1.print(\"Java\");. </p><p>Therefore, `obj.print(\"Java\");` causes compilation error.</p>", "feedbacks": ["", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP51068Consider below code of Test.java file: package com.udayankhattry.ocp;\n\ninterface I1 {\n    public static void print(String str) {\n        System.out.println(\"I1:\" + str.toUpperCase());\n    }\n}\n\nclass C1 implements I1 {\n    void print(String str) {\n        System.out.println(\"C1:\" + str.toLowerCase());\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        I1 obj = new C1();\n        obj.print(\"Java\");\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 55880846, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51498</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass A {\n    public String toString() {\n        return null;\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        String text = null;\n        text = text + new A(); //Line n1\n        System.out.println(text.length()); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP51498: </strong></p><p>You need to keep in mind an important point related to String Concatenation: </p><p>If only one operand expression is of type String, then string conversion is performed on the other operand to produce a string at run time.</p><p>If one of the operand is null, it is converted to the string \"null\".</p><p>If operand is not null, then the conversion is performed as if by an invocation of the toString method of the referenced object with no arguments; but if the result of invoking the toString method is null, then the string \"null\" is used instead.</p><p><br></p><p>Let's check the expression of Line n1:</p><p>text = text + new A(); --&gt; As text is of String type, hence + operator behaves as concatenation operator.</p><p>As text is null, so \"null\" is used in the Expression. </p><p>new A() represents the object of A class, so toString() method of A class is invoked, but as toString() method of A class returns null, hence \"null\" is used in the given expression. </p><p>So, given expression is written as: </p><p>text = \"null\" + \"null\";</p><p>text = \"nullnull\";</p><p><br></p><p>Hence, Line n2 prints 8 on to the console.</p>", "answers": ["Line n1 causes compilation error", "Line n1 causes Runtime error", "Line n2 causes Runtime error", "0", "4", "8"], "relatedLectureIds": ""}, "correct_response": ["f"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP51498Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nclass A {\n    public String toString() {\n        return null;\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        String text = null;\n        text = text + new A(); //Line n1\n        System.out.println(text.length()); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880874, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP53263</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        try {\n            try {\n                System.out.println(args[1]); //Line n1\n            } catch(RuntimeException e) {\n                System.out.print(\"INHALE-\"); //Line n2\n                throw e; //Line n3\n            } finally {\n                System.out.print(\"EXHALE-\"); //Line n4\n            }\n        } catch(RuntimeException e) {\n            System.out.print(\"INHALE-\"); //Line n5\n        } finally {\n            System.out.print(\"EXHALE\"); //Line n6\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP53263: </strong></p><p>As command-line argument is not passed, hence Line n1 throws ArrayIndexOutOfBoundsException (subclass of RuntimeException), handler is available in inner catch block, it executes Line n2 and prints INHALE- on to the console.&nbsp; </p><p>throw e; re-throws the exception.&nbsp; </p><p><br></p><p>But before exception instance is forwarded to outer catch-block, inner finally-block gets executed and prints EXHALE- on to the console.&nbsp; </p><p>In outer try-catch block, handler for RuntimeException is available, so outer catch-block gets executed and prints INHALE- on to the console. </p><p>After that outer finally-block gets executed and prints EXHALE- on to the console. </p><p><br></p><p>Hence, the output is: INHALE-EXHALE-INHALE-EXHALE</p>", "answers": ["INHALE-EXHALE", "INHALE-EXHALE-", "INHALE-EXHALE-INHALE-", "INHALE-EXHALE-EXHALE", "INHALE-EXHALE-INHALE-EXHALE"], "relatedLectureIds": ""}, "correct_response": ["e"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP53263Given code of Test.java file: public class Test {\n    public static void main(String[] args) {\n        try {\n            try {\n                System.out.println(args[1]); //Line n1\n            } catch(RuntimeException e) {\n                System.out.print(\"INHALE-\"); //Line n2\n                throw e; //Line n3\n            } finally {\n                System.out.print(\"EXHALE-\"); //Line n4\n            }\n        } catch(RuntimeException e) {\n            System.out.print(\"INHALE-\"); //Line n5\n        } finally {\n            System.out.print(\"EXHALE\"); //Line n6\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880876, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP45634</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\ninterface Printer {\n    default void print() throws FileNotFoundException {\n        System.out.println(\"PRINTER\");\n    }\n}\n\nclass FilePrinter implements Printer {\n    public void print() { //Line n1\n        System.out.println(\"FILE PRINTER\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer p = new FilePrinter(); //Line n2\n        p.print(); //Line n3\n        var fp = new FilePrinter(); //Line n4\n        fp.print(); //Line n5\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error at Line n1", "Compilation error at Line n2", "Compilation error at Line n3", "Compilation error at Line n4", "Compilation error at Line n5", "1122 is printed on to the console", "<p>1111 is printed on to the console</p>", "<p>2211 is printed on to the console</p>", "<p>2222 is printed on to the console</p>"], "explanation": "<p><strong>UKOCP45634: </strong></p><p>According to overriding rules, if super class / interface method declares to throw a checked exception, then overriding method of sub class / implementer class has following options:</p><p>1. May not declare to throw any checked exception.</p><p>2. May declare to throw the same checked exception thrown by super class / interface method.</p><p>3. May declare to throw the sub class of the exception thrown by super class / interface method.</p><p>4. Cannot declare to throw the super class of the exception thrown by super class / interface method. </p><p>5. Cannot declare to throw unrelated checked exception.</p><p>6. May declare to throw any RuntimeException or Error.</p><p><br></p><p>default methods were added in Java 8 and FilePrinter class correctly overrides the default method print() of Printer interface. Line n1 compiles successfully. </p><p><br></p><p>At Line n2, 'p' is of Printer type (supertype) and it refers to an instance of FilePrinter class (subtype), this is polymorphism and allowed in Java. Line n2 compiles successfully. </p><p><br></p><p>At Line n3, method print() is invoked on 'p' reference (Printer type) and as print() method defined in Printer interface declares to throw FileNotFoundException (checked exception). As main(String []) method doesn't declare to throw FileNotFoundException and also there is not try-catch block available, therefore Line n3 causes compilation error. </p><p><br></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>At Line n4, 'fp' infers to FilePrinter type. </p><p><br></p><p>At Line n5, method print() is invoked on 'fp' reference (FilePrinter type) and as print() method defined in FilePrinter class doesn't declare to throw any checked exception, hence Line n5 compiles successfully. </p><p><br></p><p>Only Line n3 causes compilation failure.</p>", "feedbacks": ["", "", "", "", "", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP45634Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\n\ninterface Printer {\n    default void print() throws FileNotFoundException {\n        System.out.println(\"PRINTER\");\n    }\n}\n\nclass FilePrinter implements Printer {\n    public void print() { //Line n1\n        System.out.println(\"FILE PRINTER\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer p = new FilePrinter(); //Line n2\n        p.print(); //Line n3\n        var fp = new FilePrinter(); //Line n4\n        fp.print(); //Line n5\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880878, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP21173</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() {\n        System.out.println(\"Closing\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(AutoCloseable resource = new MyResource()) {\n\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error in MyResource class", "Compilation error in Test class", "Closing"], "explanation": "<p><strong>UKOCP21173: </strong></p><p>close() method in AutoCloseable interface has below declaration: </p><p>void close() throws Exception;</p><p><br></p><p>MyResource class correctly overrides close() method. </p><p><br></p><p>try-with-resources statement internally invokes resource.close() method. </p><p><br></p><p>resource is of AutoCloseable type, so compiler checks the close() method declaration of AutoCloseable interface. </p><p><br></p><p>close() method in AutoCloseable interface declares to throw Exception (checked exception) and hence handle or declare rule must be followed.</p><p><br></p><p>As main method neither declares to throw Exception nor provides catch block for Exception type, hence try-with-resources statement causes compilation error.</p>", "feedbacks": ["", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP21173Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() {\n        System.out.println(\"Closing\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(AutoCloseable resource = new MyResource()) {\n\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880880, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP21192</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] arr = { \"L\", \"I\", \"V\", \"E\" }; //Line n1\n        int i = -2;\n\n        if (i++ == -1) { //Line n2\n            arr[-(--i)] = \"F\"; //Line n3\n        } else if (--i == -2) { //Line n4\n            arr[-++i] = \"O\"; //Line n5\n        }\n\n        System.out.println(String.join(\"\", arr)); //Line n6\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP21192: </strong></p><p>Line n1 creates a String [] object of 4 elements and arr refers to this array object. arr[0] = \"L\", arr[1] = \"I\", arr[2] = \"V\" and arr[3] = \"E\".</p><p>i = -2.</p><p>Boolean expression of Line n2: i++ == -1 </p><p>=&gt; (i++) == -1 //As Post-increment operator ++ has higher precedence over ==</p><p>=&gt; -2 == -1 //i = -1, value of i is used in the expression and then incremented.</p><p>=&gt; false and hence Line n3 is not executed. </p><p>But there is no issue with Line n3 and it compiles successfully.</p><p><br></p><p>Boolean expression of Line n4 is evaluated next: </p><p>--i == -2 //i = -1</p><p>=&gt; (--i) == -2 //As Pre-decrement operator -- has higher precedence over ==</p><p>=&gt; -2 == -2 //i = -2, value of i is decremented first and then used in the expression.</p><p>=&gt; true and hence Line n5 is executed next.</p><p><br></p><p>Line n5: </p><p>arr[-++i] = \"O\"; //i = -2</p><p>=&gt; arr[-(++i)] = \"O\"; //Unary minus '-' and pre-increment '++' operators have same precedence </p><p>=&gt; arr[-(-1)] = \"O\"; //i = -1, value of i is incremented first and then used in the expression. </p><p>=&gt; arr[1] = \"O\"; //2nd array element is changed to \"O\".</p><p>Hence after Line n5, arr refers to {\"L\", \"O\", \"V\", \"E\"}</p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Hence, `System.out.println(String.join(\"\", arr));` prints LOVE on to the console.</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "LIVE", "LIFE", "LIVO", "LOVE", "<p>LIOE</p>"], "relatedLectureIds": ""}, "correct_response": ["f"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP21192Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] arr = { \"L\", \"I\", \"V\", \"E\" }; //Line n1\n        int i = -2;\n\n        if (i++ == -1) { //Line n2\n            arr[-(--i)] = \"F\"; //Line n3\n        } else if (--i == -2) { //Line n4\n            arr[-++i] = \"O\"; //Line n5\n        }\n\n        System.out.println(String.join(\"\", arr)); //Line n6\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880882, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP81203</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var arr = new int[x][y]; //Line n1\n        arr[1][4] = 100;\n        arr[6][6] = 200;\n        arr[3][6] = 300;\n    }\n}</pre><p><br></p><p>And below combination of x and y values:</p><p>1. x = 6, y = 6</p><p>2. x = 2, y = 5</p><p>3. x = 4, y = 7</p><p>4. x = 7, y = 7</p><p>5. x = 8, y = 8</p><p>6. x = 0, y = 0</p><p>7. x = -1, y = -1</p><p><br></p><p>How many of above x,y pair(s) can replace x and y at Line n1 such that Test.java file compiles successfully?</p>", "answers": ["All 7 pairs", "6 pairs", "5 pairs", "4 pairs", "3 pairs", "2 pairs", "<p>1 pair</p>"], "explanation": "<p><strong>UKOCP81203: </strong></p><p>Given question expects you to solve the compilation error and not care about runtime error. For array indexes, any int values can be used, hence all the 7 pairs are allowed in this case.</p><p><br></p><p>If question were expecting to compile and execute the program successfully, then any combination greater than the max indexes values would have worked. For example, in the given code, as max 1st dimension value = 6 and max 2nd dimension value = 6, so any int value &gt; 6 can be used for x and any int value &gt; 6 can be used for y.</p><p>Out of the given seven options, only two options (x = 7, y = 7) and (x = 8, y = 8) would have worked.</p><p><br></p><p>Also note that the statement at Line n1 after replacing the values of x and y compiles successfully. E.g.</p><p>`var arr = new int[1][1];`: Right side expression creates an int[][] object. arr infers to int[][] type.</p>", "feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP81203Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var arr = new int[x][y]; //Line n1\n        arr[1][4] = 100;\n        arr[6][6] = 200;\n        arr[3][6] = 300;\n    }\n}And below combination of x and y values:1. x = 6, y = 62. x = 2, y = 53. x = 4, y = 74. x = 7, y = 75. x = 8, y = 86. x = 0, y = 07. x = -1, y = -1How many of above x,y pair(s) can replace x and y at Line n1 such that Test.java file compiles successfully?", "related_lectures": []}, {"_class": "assessment", "id": 55880884, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP57135</strong></p><p><br></p><p>For the given code snippet:</p><p><code>List&lt;String&gt; list = new /*INSERT*/();</code></p><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, compiles successfully?</p><p>Select 2 options.</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP57135: </strong></p><p>List is an interface so its instance can't be created using new keyword. List&lt;String&gt; and List&lt;&gt; will cause compilation failure. </p><p>ArrayList implements List interface, so it can be it can be used to replace /*INSERT*/. `List&lt;String&gt; list = new ArrayList&lt;String&gt;();` compiles successfully. </p><p><br></p><p>Starting with JDK 7, Java allows to not specify type while initializing the ArrayList. Type is inferred from the left side of the statement. </p><p><br></p><p>So `List&lt;String&gt; list = new ArrayList&lt;&gt;();` is a valid syntax starting with JDK 7. </p>", "answers": ["List&lt;String&gt;", "List&lt;&gt;", "ArrayList&lt;String&gt;", "ArrayList&lt;&gt;"], "relatedLectureIds": ""}, "correct_response": ["c", "d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP57135For the given code snippet:List&lt;String&gt; list = new /*INSERT*/();Which of the following options, if used to replace /*INSERT*/, compiles successfully?Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 55880886, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42074</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(0, \"Array\");\n        list.add(0, \"List\");\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP42074: </strong></p><p>list.add(0, \"Array\"); means list --&gt; [Array],&nbsp; &nbsp;</p><p>list.add(0, \"List\"); means insert \"List\" to 0th index and shift \"Array\" to right. So after this operation, list --&gt; [List, Array]. In the console, [List, Array] is printed.</p>", "answers": ["[Array]", "[List]", "[Array, List]", "[List, Array]", "An exception is thrown at runtime"], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP42074Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(0, \"Array\");\n        list.add(0, \"List\");\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880888, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP58431</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">import java.util.*;\n\nclass Father {}\n\nclass Son extends Father {}\n\nclass GrandSon extends Son {}\n\nabstract class Super {\n    abstract List&lt;Father&gt; get();\n}\n\nclass Sub extends Super {\n    /*INSERT*/\n}</pre><p><br></p><p>And the definitions of get() method:</p><p>1. <code>List&lt;Father&gt; get() {return null;}</code></p><p>2. <code>ArrayList&lt;Father&gt; get() {return null;}</code></p><p>3. <code>List&lt;Son&gt; get() {return null;}</code></p><p>4. <code>ArrayList&lt;Son&gt; get() {return null;}</code></p><p>5. <code>List&lt;GrandSon&gt; get() {return null;}</code></p><p>6. <code>ArrayList&lt;GrandSon&gt; get() {return null;}</code></p><p>7. <code>List&lt;Object&gt; get() {return null;}</code></p><p>8. <code>ArrayList&lt;Object&gt; get() {return null;}</code></p><p><br></p><p>How many definitions of get() method can replace /*INSERT*/ such that there is no compilation error?</p>", "answers": ["One definition", "Two definitions", "Three definitions", "Four definitions", "Five definitions", "Six definitions", "<p>Seven definitions</p>", "<p>Eight definitions</p>"], "explanation": "<p><strong>UKOCP58431: </strong></p><p>There are 2 rules related to return types of overriding method: </p><p>1. If return type of overridden method is of primitive type, then overriding method should use same primitive type.</p><p>2. If return type of overridden method is of reference type, then overriding method can use same reference type or its sub-type (also known as covariant return type).</p><p><br></p><p>ArrayList is a subtype of List, hence overriding method can use List&lt;Father&gt; or ArrayList&lt;Father&gt; as return type. Definitions 1 and 2 are valid.</p><p><br></p><p>Please note: even though Son is a subtype of Father, List&lt;Son&gt; is not subtype of List&lt;Father&gt;. Hence definitions 3 and 4 are NOT valid.</p><p><br></p><p>On similar lines, even though GrandSon is a subtype of Father, List&lt;GrandSon&gt; is not subtype of List&lt;Father&gt;. Hence definitions 5 and 6 are also NOT valid.</p><p><br></p><p>List&lt;Object&gt; is not subtype of List&lt;Father&gt;, definition 7 is NOT valid.</p><p><br></p><p>ArrayList&lt;Object&gt; is not subtype of List&lt;Father&gt;, definition 8 is also NOT valid.</p>", "feedbacks": ["", "", "", "", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP58431Consider below code snippet:import java.util.*;\n\nclass Father {}\n\nclass Son extends Father {}\n\nclass GrandSon extends Son {}\n\nabstract class Super {\n    abstract List&lt;Father&gt; get();\n}\n\nclass Sub extends Super {\n    /*INSERT*/\n}And the definitions of get() method:1. List&lt;Father&gt; get() {return null;}2. ArrayList&lt;Father&gt; get() {return null;}3. List&lt;Son&gt; get() {return null;}4. ArrayList&lt;Son&gt; get() {return null;}5. List&lt;GrandSon&gt; get() {return null;}6. ArrayList&lt;GrandSon&gt; get() {return null;}7. List&lt;Object&gt; get() {return null;}8. ArrayList&lt;Object&gt; get() {return null;}How many definitions of get() method can replace /*INSERT*/ such that there is no compilation error?", "related_lectures": []}, {"_class": "assessment", "id": 55880890, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP70994</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var sb1 = new StringBuilder(\"A\");\n        var sb2 = new StringBuilder(\"B\");\n        var set1 = Set.of(sb1, sb2); //Line n1\n        var set2 = Set.copyOf(set1); //Line n2\n        System.out.println((set1 == set2) + \":\" + set1.equals(set2)); //Line n3\n     }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP70994: </strong></p><p>There are 12 overloaded of methods in Set interface:</p><p>Set.of()</p><p>Set.of(E e1)</p><p>Set.of\u200b(E e1, E e2)</p><p>Set.of(E e1, E e2, E e3)</p><p>Set.of(E e1, E e2, E e3, E e4)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>Set.of(E... elements)</p><p><br></p><p>These create an unmodifiable set containing specified elements. </p><p>These methods throw NullPointerException - if an element is null or IllegalArgumentException - if the elements are duplicates</p><p><br></p><p>Variable 'set1' refers to unmodifiable Set object containing two StringBuilder objects. </p><p><br></p><p>According to the Javadoc of copyOf method: </p><p>Returns an unmodifiable Set containing the elements of the given Collection. The given Collection must not be null, and it must not contain any null elements. If the given Collection contains duplicate elements, an arbitrary element of the duplicates is preserved. If the given Collection is subsequently modified, the returned Set will not reflect such modifications.</p><p>It throws NullPointerException if passed argument is null, or if it contains any nulls.</p><p>NOTE: If the given Collection is an unmodifiable Set, calling copyOf will generally not create a copy.</p><p><br></p><p>`Set.copyOf(set1);` returns the same Set object referred by variable 'set1'. Hence, at Line n2, variable 'set2' refers to same Set object referred by 'set1'.</p><p>Therefore set1 == set2 evaluates to true and also set1.equals(set2) evaluates to true.</p><p>Output is true:true</p>", "answers": ["true:true", "true:false", "false:false", "false:true"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP70994Given code: package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var sb1 = new StringBuilder(\"A\");\n        var sb2 = new StringBuilder(\"B\");\n        var set1 = Set.of(sb1, sb2); //Line n1\n        var set2 = Set.copyOf(set1); //Line n2\n        System.out.println((set1 == set2) + \":\" + set1.equals(set2)); //Line n3\n     }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880892, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68695</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Point {\n    private int x;\n    private int y;\n    \n    public Point(int x, int y) {\n        this.x = x;\n        this.y = y;\n    }\n    \n    public int getX() {\n        return x;\n    }\n\n    public int getY() {\n        return y;\n    }\n\n    @Override\n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Point&gt; points = new ArrayList&lt;&gt;();\n        points.add(new Point(4, 5));\n        points.add(new Point(6, 7));\n        points.add(new Point(2, 2));\n        \n        Collections.sort(points, new Comparator&lt;Point&gt;() {\n            public int compareTo(Point o1, Point o2) {\n                return o1.getX() - o2.getX();\n            }\n        });\n        \n        System.out.println(points);\n    }\n}</pre>", "answers": ["[Point(2, 2), Point(4, 5), Point(6, 7)]", "[Point(6, 7), Point(4, 5), Point(2, 2)]", "[Point(4, 5), Point(6, 7), Point(2, 2)]", "Compilation error"], "explanation": "<p><strong>UKOCP68695: </strong></p><p>Comparator interface has compare(...) method and not compareTo(...) method. </p><p>Anonymous inner class's syntax doesn't implement compare(...) method and thus compilation error. </p><p><br></p><p>Make sure to check the accessibility and interface method details before working with the logic.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP68695What will be the result of compiling and executing Test class?package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Point {\n    private int x;\n    private int y;\n    \n    public Point(int x, int y) {\n        this.x = x;\n        this.y = y;\n    }\n    \n    public int getX() {\n        return x;\n    }\n\n    public int getY() {\n        return y;\n    }\n\n    @Override\n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Point&gt; points = new ArrayList&lt;&gt;();\n        points.add(new Point(4, 5));\n        points.add(new Point(6, 7));\n        points.add(new Point(2, 2));\n        \n        Collections.sort(points, new Comparator&lt;Point&gt;() {\n            public int compareTo(Point o1, Point o2) {\n                return o1.getX() - o2.getX();\n            }\n        });\n        \n        System.out.println(points);\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 55880894, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP64742</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Printer {\n    void print();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        int i = 400;\n        Printer obj = () -&gt; System.out.println(i);\n        obj.print();\n        System.out.println(++i);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>400</p><p>400</p>", "<p>400</p><p>401</p>", "Compilation error", "Exception is thrown at runtime"], "explanation": "<p><strong>UKOCP64742: </strong></p><p>Variable 'i' is a local variable and it is used in the lambda expression. So, it should either be final or effectively final. </p><p>The last statement inside main(String []) method, increments value of i, which means it is not effectively final and hence compilation error.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP64742Given code: package com.udayankhattry.ocp;\n\ninterface Printer {\n    void print();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        int i = 400;\n        Printer obj = () -&gt; System.out.println(i);\n        obj.print();\n        System.out.println(++i);\n    }\n}What is the result?", "related_lectures": []}]};
