orEach(Consumer) method performs the given action for each element of the Iterable until all elements have been processed or the action throws an exception.</p><p><br></p><p>Lambda expression at Line n1: `d -&gt; d.divide()` is the correct implementation of `void accept(Division t);` and hence can easily be assigned to target type Consumer&lt;Division&gt;. Purpose of this lambda expression is to divide 'num' by 'den' and store the result in 'res' variable. Hence, statement at Line n1 will populate 'res' variable of the three Division objects.</p><p>Please note that for the 2nd Division object [num = 27, den = 0], divide() method throws a RuntimeException but it is handled. If you don't handle it, then stack trace will be printed and program will terminate abruptly. </p><p><br></p><p>Lambda expression at Line n2: `d -&gt; System.out.println(d)` is also the correct implementation of `void accept(Division t);` and hence can easily be assigned to target type Consumer&lt;Division&gt;. Purpose of this lambda expression is to print the Division object on to the console. toString() method of Division object is invoked which prints the state of Division object, in case if den == 0, then \"Infinity\" is used in place of the value of variable 'res'.</p><p><br></p><p>Statement at Line n2 will print the details of 3 Division instances available in the list.</p><p><br></p><p>Output will be: </p><p>100/4 = 25</p><p>27/0 = Infinity</p><p>25/5 = 5</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP84792Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\nclass Division {\n    int num;\n    int den;\n    int res;\n\n    Division(int num, int den) {\n        this.num = num;\n        this.den = den;\n    }\n\n    void divide() {\n        try {\n            res = num / den;\n        } catch(RuntimeException e) {}\n    }\n\n    public String toString() {\n        if (den == 0)\n            return num + \"/\" + den + \" = \" + \"Infinity\";\n        else\n            return num + \"/\" + den + \" = \" + res;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new Division(100, 4), new Division(27, 0), new Division(25, 5));\n        list.forEach(d -&gt; d.divide()); //Line n1\n        list.forEach(d -&gt; System.out.println(d)); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798074, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP37557</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.LongFunction;\nimport java.util.function.LongUnaryOperator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        long seed = 10;\n        var stream = Stream.iterate(seed, i -&gt; i &lt;= 12, i -&gt; i + 2); //Line n1\n        LongFunction&lt;LongUnaryOperator&gt; func = m -&gt; n -&gt; n / m; //Line n2\n        stream.mapToLong(i -&gt; i).map(func.apply(2)).forEach(System.out::println); //Line n3\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>10</p><p>12</p>", "<p>0</p><p>0</p>", "<p>1</p><p>1</p>", "<p>5</p><p>6</p>", "Compilation error"], "explanation": "<p><strong>UKOCP37557: </strong></p><p>Variable 'stream' is of Stream&lt;Long&gt; type, because variable 'seed' is of long type.</p><p>iterate method has below signature: </p><p>public static&lt;T&gt; Stream&lt;T&gt; iterate(T seed, Predicate&lt;? super T&gt; hasNext, UnaryOperator&lt;T&gt; next) {...}</p><p>According to Javadoc:</p><p>This method returns a sequential ordered Stream produced by iterative application of the given next function to an initial element, conditioned on satisfying the given hasNext predicate. The stream terminates as soon as the hasNext predicate returns false.</p><p><br></p><p>stream =&gt; [10, 12]</p><p><br></p><p>Though the lambda expression with 2 arrows seems confusing but it is correct syntax. To understand, Line n2 can be re-written as: </p><pre class=\"prettyprint linenums\">LongFunction&lt;LongUnaryOperator&gt; func = (m) -&gt; {\n    return (n) -&gt; {\n        return n / m;\n    };\n};</pre><p><br></p><p>And corresponding anonymous class syntax is: </p><pre class=\"prettyprint linenums\">LongFunction&lt;LongUnaryOperator&gt; func = new LongFunction&lt;LongUnaryOperator&gt;() {\n    @Override\n    public LongUnaryOperator apply(long m) {\n        LongUnaryOperator operator = new LongUnaryOperator() {\n            @Override\n            public long applyAsLong(long n) {\n                return n / m;\n            }\n        };\n        return operator;\n    }\n};</pre><p><br></p><p>So, there is no issue with Line n2. Let's check Line n3. </p><p>stream.mapToLong(i -&gt; i) returns an instance of LongStream and LongStream has map(LongUnaryOperator) method. </p><p>'func.apply(2)' returns an instance of LongUnaryOperator, in which applyAsLong(long) method has below implementation:</p><pre class=\"prettyprint linenums\">LongUnaryOperator operator = new LongUnaryOperator() {\n    @Override\n    public long applyAsLong(long n) {\n        return n / 2;\n    }\n};</pre><p><br></p><p>As stream has elements 10 and 12, so map(func.apply(2)) returns an instance of LongStream after dividing each element by 2, so resultant stream contains elements 5 and 6. </p><p>forEach(System.out::println) prints 5 and 6 on to the console.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP37557Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.LongFunction;\nimport java.util.function.LongUnaryOperator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        long seed = 10;\n        var stream = Stream.iterate(seed, i -&gt; i &lt;= 12, i -&gt; i + 2); //Line n1\n        LongFunction&lt;LongUnaryOperator&gt; func = m -&gt; n -&gt; n / m; //Line n2\n        stream.mapToLong(i -&gt; i).map(func.apply(2)).forEach(System.out::println); //Line n3\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798076, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP38436</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(Stream.of(10, 0, -10)\n                                .sorted()\n                                .findAny()\n                                .orElse(-1));\n    }\n}</pre><p><br></p><p>Which of the following statements are true about the execution of Test class?</p><p>Choose 2 options.</p>", "answers": ["It can print any number from the stream", "It will always print 10 on to the console", "It will always print -10 on to the console", "It will always print 0 on to the console", "It will never print -1 on to the console"], "explanation": "<p><strong>UKOCP38436: </strong></p><p>findAny() may return any element from the stream and as stream is not parallel, it will most likely return first element from the sorted stream, which is -10. But this is not the guaranteed result. </p><p>As this stream has 3 elements, hence -1 will never get printed on to the console. </p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["a", "e"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP38436Given code:package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(Stream.of(10, 0, -10)\n                                .sorted()\n                                .findAny()\n                                .orElse(-1));\n    }\n}Which of the following statements are true about the execution of Test class?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798078, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP51866</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = \"OCP\".chars();\n        stream.forEach(c -&gt; System.out.print((char)c));\n        System.out.println(stream.count());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["OCP3", "Runtime exception", "Compilation error", "None of the other options"], "explanation": "<p><strong>UKOCP51866: </strong></p><p>forEach, count, toArray, reduce, collect, findFirst, findAny, anyMatch, allMatch, sum, min, max, average etc. are considered as terminal operations. </p><p><br></p><p>Once the terminal operation is complete, all the elements of the stream are considered as used. Any attempt to use the stream again causes IllegalStateException. </p><p><br></p><p>In this example, count() is used after using forEach() method and hence IllegalStateException is thrown.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP51866Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = \"OCP\".chars();\n        stream.forEach(c -&gt; System.out.print((char)c));\n        System.out.println(stream.count());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798080, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP32614</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Arrays.asList(1.8, 2.2, 3.5).stream();\n        System.out.println(stream.reduce((d1, d2) -&gt; d1 + d2)); //Line n1\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Optional[7.5]", "7.5", "Line n1 causes Compilation error"], "explanation": "<p><strong>UKOCP32614: </strong></p><p>Stream&lt;T&gt; interface has below 3 overloaded reduce methods: </p><p>+ Optional&lt;T&gt;&nbsp; &nbsp;reduce\u200b(BinaryOperator&lt;T&gt; accumulator)</p><p>+ T&nbsp; &nbsp; reduce\u200b(T identity, BinaryOperator&lt;T&gt; accumulator)</p><p>+ &lt;U&gt; U&nbsp; &nbsp; reduce\u200b(U identity, BiFunction&lt;U,\u200b? super T,\u200bU&gt; accumulator, BinaryOperator&lt;U&gt; combiner)</p><p><br></p><p>There is no issues with Line n1 as lambda expression `(d1, d2) -&gt; d1 + d2` is the correct implementation of 'BinaryOperator&lt;Double&gt;'</p><p>`stream.reduce((d1, d2) -&gt; d1 + d2)` returns 'Optional&lt;Double&gt;' and hence, output in this case is: Optional[7.5]</p>", "feedbacks": ["", "", ""]}, "correct_response": ["a"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP32614Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Arrays.asList(1.8, 2.2, 3.5).stream();\n        System.out.println(stream.reduce((d1, d2) -&gt; d1 + d2)); //Line n1\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798082, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP74485</strong></p><p><br></p><p>Given code snippet: </p><p><code>var list = List.of(\"S\", \"P\", \"I\", \"R\", \"I\", \"T\");</code></p><p><br></p><p>And below statements: </p><p>1. <code>list.forEach(System.out::print);</code></p><p>2. <code>list.stream().forEach(System.out::print);</code></p><p>3. <code>list.stream().map(Function.identity()).forEach(System.out::print);</code></p><p>4. <code>list.parallelStream().forEachOrdered(System.out::print);</code></p><p>5. <code>System.out.println(list.stream().collect(Collectors.joining()));</code></p><p><br></p><p>How many of the above statements will print SPIRIT on to the console? </p>", "answers": ["Only one statement", "Only two statements", "Only three statements", "Only four statements", "All five statements"], "explanation": "<p><strong>UKOCP74485: </strong></p><p>Iterable&lt;T&gt; interface has forEach(Consumer&lt;? super T&gt;) method. List&lt;E&gt; extends Collection&lt;E&gt; &amp; Collection&lt;E&gt; extends Iterable&lt;E&gt;, therefore forEach(Consumer) can easily be invoked on reference variable of List&lt;E&gt; type.</p><p>Stream&lt;T&gt; interface also has forEach\u200b(Consumer&lt;? super T&gt;) method. </p><p>Therefore, forEach method can be invoked on List as well as Stream. </p><p><br></p><p>Let's check all the statements one by one: </p><p>1. <code>list.forEach(System.out::print);</code></p><p>\u2713&nbsp; As, list is an ordered data structure, hence forEach(System.out::print) method prints SPIRIT on to the console.</p><p><br></p><p>2. <code>list.stream().forEach(System.out::print);</code></p><p>\u2713&nbsp; As base stream is ordered, hence forEach(System.out::print) method prints SPIRIT on to the console.</p><p><br></p><p>3. <code>list.stream().map(Function.identity()).forEach(System.out::print);</code></p><p>\u2713&nbsp; `Function.identity()` is same as `t -&gt; t` (which returns the passed value). In fact, this in redundant map call. forEach(System.out::print) method prints SPIRIT on to the console.</p><p><br></p><p>4. <code>list.parallelStream().forEachOrdered(System.out::print);</code></p><p>\u2713&nbsp; forEachOrdered() will processes the elements of the stream in the order specified by its source (Encounter order), regardless of whether the stream is sequential or parallel. Hence, output is: SPIRIT</p><p><br></p><p>5. <code>System.out.println(list.stream().collect(Collectors.joining()));</code></p><p>\u2713&nbsp; list.stream().collect(Collectors.joining()) returns \"SPIRIT\"</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP74485Given code snippet: var list = List.of(\"S\", \"P\", \"I\", \"R\", \"I\", \"T\");And below statements: 1. list.forEach(System.out::print);2. list.stream().forEach(System.out::print);3. list.stream().map(Function.identity()).forEach(System.out::print);4. list.parallelStream().forEachOrdered(System.out::print);5. System.out.println(list.stream().collect(Collectors.joining()));How many of the above statements will print SPIRIT on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 48798084, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP53579</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Random;\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String [] args) throws Exception {\n        Callable&lt;String&gt; r = () -&gt; {\n            int sum = 0;\n            for(int i = 1; i &lt; 1000; i++) {\n                sum += i / new Random().nextInt(50);\n            }\n            return \"\" + sum;\n        };\n\n        var es = Executors.newSingleThreadExecutor();\n        var f = es.submit(r);\n        System.out.println(f.get()); //Line n1\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Line n1 will always display the same result", "Line n1 may throw TimeoutException", "Line n1 may throw ExecutionException", "Compilation error"], "explanation": "<p><strong>UKOCP53579: </strong></p><p>Method submit is overloaded in ExecutorService interface to accept both Callable and Runnable: </p><p>&lt;T&gt; Future&lt;T&gt; submit(Callable&lt;T&gt; task): Submits a value-returning task for execution and returns a Future representing the pending results of the task. The Future's get method will return the task's result upon successful completion. </p><p>and </p><p>&lt;T&gt; Future&lt;T&gt; submit\u200b(Runnable task, T result): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return the given result upon successful completion.</p><p>and</p><p>Future&lt;?&gt; submit(Runnable task): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return null upon successful completion.</p><p><br></p><p>All 3 methods return a Future object. </p><p><br></p><p>Future&lt;V&gt; interface has below method:</p><p>V get() throws InterruptedException, ExecutionException;</p><p>It waits if necessary for the computation to complete, and then retrieves its result. It throws ExecutionException, if the computation threw an exception; throws InterruptedException, if the current thread was interrupted while waiting.</p><p>It never throws TimeoutException. </p><p><br></p><p>Variable 'es' infers to ExecutorService type and variable 'f' infers to Future&lt;String&gt; type.</p><p>Given code compiles successfully.</p><p><br></p><p>`new Random().nextInt(50);` generates a random integer between 0 and 49. Hence, result of Callable implementation will vary across multiple executions. </p><p><br></p><p>If the generated random number is 0, then implementation of callable may throw ArithmeticException. As, the computation threw an exception, `f.get()` will throw ExecutionExeption. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP53579Given code: package com.udayankhattry.ocp;\n\nimport java.util.Random;\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String [] args) throws Exception {\n        Callable&lt;String&gt; r = () -&gt; {\n            int sum = 0;\n            for(int i = 1; i &lt; 1000; i++) {\n                sum += i / new Random().nextInt(50);\n            }\n            return \"\" + sum;\n        };\n\n        var es = Executors.newSingleThreadExecutor();\n        var f = es.submit(r);\n        System.out.println(f.get()); //Line n1\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798086, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP61189</strong></p><p><br></p><p>Which of the following problems can be efficiently solved using Fork/Join framework?</p>", "answers": ["Problems that can be divided into sub tasks, where each sub-task can be computed independently in asynchronous manner", "Problems that can be divided into sub tasks, where each sub-task can be computed independently in synchronous manner", "Problems that has lots of File Input/Output activities"], "explanation": "<p><strong>UKOCP61189: </strong></p><p>Fork/Join framework is for the problems that can be divided into sub tasks and result of computation can be combined later. Each sub-task should be computed independently without depending upon other tasks and result can be combined later. </p><p><br></p><p>Input/Output operations may block and hence this framework is not suitable for any type of I/O operations. </p><p><br></p><p>Synchronization defeats the purpose of fork/join framework to compute the tasks in parallel.</p>", "feedbacks": ["", "", ""]}, "correct_response": ["a"], "section": "8.2 Concurrency: RecursiveTask, RecursiveAction", "question_plain": "Question ID: UKOCP61189Which of the following problems can be efficiently solved using Fork/Join framework?", "related_lectures": []}, {"_class": "assessment", "id": 48798088, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP53519</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var dirs = new File(\"F:\\\\A\\\\B\\\\C\");\n        System.out.println(dirs.mkdirs());\n        var dir = new File(\"F:\\\\A\");\n        System.out.println(dir.mkdir());\n        System.out.println(dir.delete());\n    }\n}</pre><p><br></p><p>F: is accessible for reading/writing and currently doesn't contain any files/directories. </p><p><br></p><p>What is the result?</p>", "answers": ["<p>true</p><p>false</p><p>true</p>", "<p>false</p><p>false</p><p>false</p>", "<p>true</p><p>true</p><p>true</p>", "<p>false</p><p>true</p><p>true</p>", "<p>true</p><p>false</p><p>false</p>"], "explanation": "<p><strong>UKOCP53519: </strong></p><p>Given File methods return boolean and don't throw any checked exception at runtime. </p><p><br></p><p>Variable 'dirs' infers to File type.</p><p>dirs -&gt; referring to File object for abstract path: F:\\A\\B\\C. </p><p>Initially F: is blank. </p><p><br></p><p>System.out.println(dirs.mkdirs()); =&gt; Creates all the directories A, B, C as per abstract path and returns true.</p><p><br></p><p>Variable 'dir' infers to File type. </p><p>dir -&gt; referring to File object for abstract path: F:\\A</p><p><br></p><p>System.out.println(dir.mkdir()); =&gt; returns false as F:\\A directory exists. </p><p><br></p><p>System.out.println(dir.delete()); =&gt; returns false as F:\\A is not empty directory, it contains directory 'B'.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP53519Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var dirs = new File(\"F:\\\\A\\\\B\\\\C\");\n        System.out.println(dirs.mkdirs());\n        var dir = new File(\"F:\\\\A\");\n        System.out.println(dir.mkdir());\n        System.out.println(dir.delete());\n    }\n}F: is accessible for reading/writing and currently doesn't contain any files/directories. What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798090, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP70089</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Person {\n    private String name;\n    private int age;\n\n    public Person(){}\n\n    public Person(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n}\n\nclass Student extends Person implements Serializable {\n    private String course;\n\n    public Student(String name, int age, String course) {\n        super(name, age);\n        this.course = course;\n    }\n\n    public String getCourse() {\n        return course;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Aafia\", 24, \"Chemistry\");\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"F:\\\\stud.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"F:\\\\stud.ser\")))\n        {\n            oos.writeObject(stud);\n\n            var s = (Student) ois.readObject();\n            System.out.printf(\"%s, %d, %s\", s.getName(), s.getAge(), s.getCourse());\n        }\n    }\n}</pre><p><br></p><p>F: is accessible for reading/writing and currently doesn't contain any files/directories. </p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP70089: </strong></p><p>Variable 'stud' infers to Student type, variable 'oos' infers to ObjectOutputStream, variable 'ois' infers to ObjectInputStream and variable 's' infers to Student type.</p><p><br></p><p>Class Student implements Serializable but it's super class Person is not Serializable. </p><p><br></p><p>While de-serializing of Serializable class, constructor of that class is not invoked. But as Parent class is not Serializable, hence to construct the Parent class object, a no-argument constructor in Parent class is needed. This no-argument constructor initializes the properties to their default values. </p><p><br></p><p>Person class has no-argument constructor. So while de-serialization, name and age are initialized to their default values: null and 0 respectively. course refers to \"Chemistry\" as it belongs to Serializable class, Student. </p><p><br></p><p>In the output, you get 'null, 0, Chemistry'. </p>", "answers": ["Aafia, 24, Chemistry", "null, 0, Chemistry", "null, 0, null", "Runtime Exception"]}, "correct_response": ["b"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP70089Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Person {\n    private String name;\n    private int age;\n\n    public Person(){}\n\n    public Person(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n}\n\nclass Student extends Person implements Serializable {\n    private String course;\n\n    public Student(String name, int age, String course) {\n        super(name, age);\n        this.course = course;\n    }\n\n    public String getCourse() {\n        return course;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Aafia\", 24, \"Chemistry\");\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"F:\\\\stud.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"F:\\\\stud.ser\")))\n        {\n            oos.writeObject(stud);\n\n            var s = (Student) ois.readObject();\n            System.out.printf(\"%s, %d, %s\", s.getName(), s.getAge(), s.getCourse());\n        }\n    }\n}F: is accessible for reading/writing and currently doesn't contain any files/directories. What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798092, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP61134</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path1 = Paths.get(\"C:\\\\A\\\\B\\\\C\");\n        var path2 = Paths.get(\"D:\\\\A\");\n        System.out.println(path1.relativize(path2));\n        System.out.println(path2.relativize(path1));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "<p>B\\C</p><p>..\\..</p>", "<p>..\\..</p><p>B\\C</p>"], "explanation": "<p><strong>UKOCP61134: </strong></p><p>Variable 'path1' infers to Path type and refers to 'C:\\A\\B\\C'.</p><p>Variable 'path2' infers to Path type and refers to 'D:\\A'</p><p>For 'path1.relativize(path2)' both path1 and path2 should be of same type. Both should either be relative or absolute. </p><p><br></p><p>In this case, path1 refers to 'C:\\A\\B\\C' and path2 refers to 'D:\\A'. </p><p><br></p><p>Even though both paths are absolute but their roots are different, hence IllegalArgumentException is thrown at runtime. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP61134Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path1 = Paths.get(\"C:\\\\A\\\\B\\\\C\");\n        var path2 = Paths.get(\"D:\\\\A\");\n        System.out.println(path1.relativize(path2));\n        System.out.println(path2.relativize(path1));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798094, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP27260</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>F: is accessible for reading and contains 'Book.java' file. </p><p><br></p><p>Which of the following statements, if used to replace /*INSERT*/, will successfully print contents of 'Book.java' on to the console?</p><p>Choose 3 options. </p>", "answers": ["<pre class=\"prettyprint linenums\">Files.lines(Paths.get(\"F:\\\\Book.java\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Files.lines(Paths.get(\"F:\\\\Book.java\"))\n    .stream()\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Files.readAllLines(Paths.get(\"F:\\\\Book.java\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Files.readAllLines(Paths.get(\"F:\\\\Book.java\"))\n    .stream()\n    .forEach(System.out::println);</pre>"], "explanation": "<p><strong>UKOCP27260: </strong></p><p>Below are the declarations of lines and readAllLines methods from Files class:&nbsp; </p><p>public static Stream&lt;String&gt; lines(Path path) throws IOException {...}&nbsp; </p><p>public static List&lt;String&gt; readAllLines(Path path) throws IOException {...}&nbsp; </p><p><br></p><p>`Files.lines(Paths.get(\"F:\\\\Book.java\"))` returns Stream&lt;String&gt; object. Hence forEach() can be invoked but stream() can't be invoked. </p><p><br></p><p>`Files.readAllLines(Paths.get(\"F:\\\\Book.java\"))` returns List&lt;String&gt; object. Hence both forEach() and stream() methods can be invoked. List has both the methods. But converting list to stream() and then invoking forEach() method is not required but it is a legal syntax and prints the file contents. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a", "c", "d"], "section": "9.6 Java I/O API: Use Stream API with NIO.2", "question_plain": "Question ID: UKOCP27260Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        /*INSERT*/\n    }\n}F: is accessible for reading and contains 'Book.java' file. Which of the following statements, if used to replace /*INSERT*/, will successfully print contents of 'Book.java' on to the console?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798096, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54009</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"username\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.relative(1);\n            System.out.println(rs.getString(2));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "answers": ["John", "Sean", "Smith", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP54009: </strong></p><p>Variable 'url' infers to String type, variable 'prop' infers to Properties type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>As credentials are passed as java.util.Properties so user name should be passed as \"user\" property and password should be passed as \"password\" property. </p><p><br></p><p>In the given code, `prop.put(\"username\", \"root\");` name of property is 'username' and not 'user' and that is why SQLException is thrown at runtime. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP54009Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"username\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.relative(1);\n            System.out.println(rs.getString(2));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798098, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP70985</strong></p><p><br></p><p>Given structure of LOG table: </p><p><code>LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))</code></p><p><br></p><p>LOG table contains below records: </p><pre class=\"prettyprint linenums\">1001    Login Successful\n1002    Login Failure\n1003    Not Authorized</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.ArrayList;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException{\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var list = new ArrayList&lt;Integer&gt;();\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var ps = con.prepareStatement(\"Select ID FROM LOG\");) {\n            try (var rs = ps.executeQuery();) {\n                while(rs.next())\n                    list.add(/*INSERT*/);\n            }\n        }\n        System.out.println(list.stream().mapToInt(x -&gt; x).sum());\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>And below options:</p><p>1. <code>rs.getInt(0)</code></p><p>2. <code>rs.getInt(1)</code></p><p>3. <code>rs.getInt(\"ID\")</code></p><p>4. <code>rs.getObject(0)</code></p><p>5. <code>rs.getObject(1)</code></p><p>6. <code>rs.getObject(\"ID\")</code></p><p>7. <code>rs.getObject(1, Integer.class)</code></p><p>8. <code>rs.getObject(0, Integer.class) </code></p><p>9. <code>rs.getInteger(\"ID\")</code></p><p><br></p><p>How many of the above options can be used to replace /*INSERT*/ (separately and not together) such that 3006 is printed on to the console?</p>", "answers": ["Only one option", "Only two options", "Only three options", "Only four options", "More than four options"], "explanation": "<p><strong>UKOCP70985: </strong></p><p>Variables 'url', 'user' and 'password' infer to String type. Variable 'list' infers to ArrayList&lt;Integer&gt; type. Variable 'con' infers to Connection type, variable 'ps' infers to PreparedStatement type and variable 'rs' infers to ResultSet type. </p><p><br></p><p>This code is supposed to print sum of IDs, which is 1001 + 1002 + 1003 = 3006. </p><p><br></p><p>ID column of Log table is of integer type and variable 'list' refers to an instance of ArrayList&lt;Integer&gt;.</p><p>So, /*INSERT*/ must be replaced with something which returns Integer or compatible value.</p><p>Let's check all the options one by one: </p><p>1. <code>rs.getInt(0)</code></p><p>\u2717&nbsp; Column index starts with 1 and not 0. This would throw SQLException at runtime.</p><p><br></p><p>2. <code>rs.getInt(1)</code></p><p>\u2713&nbsp; It returns int value for ID column.</p><p><br></p><p>3. <code>rs.getInt(\"ID\")</code></p><p>\u2713&nbsp; It returns int value for ID column.</p><p><br></p><p>4. <code>rs.getObject(0)</code></p><p>\u2717&nbsp; It returns an Object and not Integer, hence this would cause compilation error.</p><p><br></p><p>5. <code>rs.getObject(1)</code></p><p>\u2717&nbsp; It returns an Object and not Integer, hence this would cause compilation error.</p><p><br></p><p>6. <code>rs.getObject(\"ID\")</code></p><p>\u2717&nbsp; It returns an Object and not Integer, hence this would cause compilation error.</p><p><br></p><p>7. <code>rs.getObject(1, Integer.class)</code></p><p>\u2713&nbsp; It correctly returns value of ID column wrapped in Integer object.</p><p><br></p><p>8. <code>rs.getObject(0, Integer.class)</code></p><p>\u2717&nbsp; Column index starts with 1 and not 0. This would throw SQLException at runtime.</p><p><br></p><p>9. <code>rs.getInteger(\"ID\")</code></p><p>\u2717&nbsp; It causes compilation error as getInteger(String) method doesn't exist in ResultSet interface.</p><p><br></p><p>Hence, out of 9 options, only 3 options are correct.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["c"], "section": "11.2 JDBC: PreparedStatement, Connection, ResultSet", "question_plain": "Question ID: UKOCP70985Given structure of LOG table: LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))LOG table contains below records: 1001    Login Successful\n1002    Login Failure\n1003    Not AuthorizedGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.ArrayList;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException{\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var list = new ArrayList&lt;Integer&gt;();\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var ps = con.prepareStatement(\"Select ID FROM LOG\");) {\n            try (var rs = ps.executeQuery();) {\n                while(rs.next())\n                    list.add(/*INSERT*/);\n            }\n        }\n        System.out.println(list.stream().mapToInt(x -&gt; x).sum());\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.And below options:1. rs.getInt(0)2. rs.getInt(1)3. rs.getInt(\"ID\")4. rs.getObject(0)5. rs.getObject(1)6. rs.getObject(\"ID\")7. rs.getObject(1, Integer.class)8. rs.getObject(0, Integer.class) 9. rs.getInteger(\"ID\")How many of the above options can be used to replace /*INSERT*/ (separately and not together) such that 3006 is printed on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 48798100, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP71807</strong></p><p><br></p><p>Below files are available for your project: </p><pre class=\"prettyprint linenums\">//1. ResourceBundle.properties\nlocale=French/Canada</pre><p><br></p><pre class=\"prettyprint linenums\">//2. ResourceBundle_CA.properties\nlocale=Canada</pre><p><br></p><pre class=\"prettyprint linenums\">//3. ResourceBundle_hi.properties\nlocale=Hindi</pre><p><br></p><pre class=\"prettyprint linenums\">//4. ResourceBundle_IN.properties\nlocale=India</pre><p><br></p><pre class=\"prettyprint linenums\">//5. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"CA\"));\n        var loc = new Locale(\"en\", \"IN\");\n        var rb = ResourceBundle.getBundle(\"MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"locale\"));\n    }\n}</pre><p><br></p><p>Assume that all the *.properties files are included in the CLASSPATH. What will be the output of compiling and executing Test class?</p>", "answers": ["French/Canada", "Canada", "Hindi", "India", "Runtime Exception"], "explanation": "<p><strong>UKOCP71807: </strong></p><p>Variable 'loc' infers to Locale type and variable 'rb' infers to ResourceBundle type.</p><p><br></p><p>ResourceBundle.getBundle(\"MyResourceBundle\", loc); =&gt; Base resource bundle file name should be 'MyResourceBundle'. </p><p><br></p><p>Default Locale is: fr_CA and passed Locale to getBundle method is: en_IN</p><p><br></p><p>As all the resource bundles have same key(s), the search order for matching resource bundle is:</p><p>MyResourceBundle_en_IN.properties [1st: Complete en_IN].&nbsp; </p><p>MyResourceBundle_en.properties [2nd: Only language en].&nbsp; </p><p>MyResourceBundle_fr_CA.properties [3rd: Complete default Locale fr_CA].&nbsp; </p><p>MyResourceBundle_fr.properties [4th: Language of default Locale fr].&nbsp; </p><p>MyResourceBundle.properties [5th: ResourceBundle's name without language or country].&nbsp; </p><p><br></p><p>None of the properties files match with above search list, hence MissingResourceException is thrown at runtime.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP71807Below files are available for your project: //1. ResourceBundle.properties\nlocale=French/Canada//2. ResourceBundle_CA.properties\nlocale=Canada//3. ResourceBundle_hi.properties\nlocale=Hindi//4. ResourceBundle_IN.properties\nlocale=India//5. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"CA\"));\n        var loc = new Locale(\"en\", \"IN\");\n        var rb = ResourceBundle.getBundle(\"MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"locale\"));\n    }\n}Assume that all the *.properties files are included in the CLASSPATH. What will be the output of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798102, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP26808</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = new Date();\n        var format = new SimpleDateFormat(\"'Time is:' hh:mm:ss a\");\n        System.out.println(format.format(date));\n    }\n}</pre><p><br></p><p>Which of the following statement is correct?</p>", "answers": ["It throws an exception at runtime", "If program execution time is 1:32:22 PM, output is: Time is: 13:32:22", "If program execution time is 1:32:22 PM, output is: Time is: 13:32:22 PM", "If program execution time is 1:32:22 PM, output is: Time is: 1:32:22 PM", "If program execution time is 1:32:22 PM, output is: Time is: 1:32:22", "If program execution time is 1:32:22 PM, output is: Time is: 01:32:22 PM", "<p>If program execution time is 1:32:22 PM, output is: Time is: 01:32:22</p>"], "explanation": "<p><strong>UKOCP26808: </strong></p><p>Variable 'date' infers to Date type and variable 'format' infers to SimpleDateFormat type.</p><p>In the format string:</p><p>h represents Hour in am/pm (1-12); hh represents 2 digits for the hour (01-12).</p><p>m represents Minute in hour (0-59); mm represents 2 digits for the minute (00-59).</p><p>s represents Second in minute (0-59); ss represents 2 digits for the second (00-59).</p><p>a represents AM/PM marker.</p><p><br></p><p>In the format string, anything between opening and closing quote [''] is displayed as is, Hence 'Time is:' will be displayed as Time is: </p><p><br></p><p>Output will be: </p><p>Time is: 01:32:22 PM</p>", "feedbacks": ["", "", "", "", "", "", ""]}, "correct_response": ["f"], "section": "12.5 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP26808Given code: package com.udayankhattry.ocp;\n\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = new Date();\n        var format = new SimpleDateFormat(\"'Time is:' hh:mm:ss a\");\n        System.out.println(format.format(date));\n    }\n}Which of the following statement is correct?", "related_lectures": []}, {"_class": "assessment", "id": 48798104, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP75394</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\n//Line n1\nclass Util {\n    /**\n     * @deprecated This method has been deprecated,\n     * use add(int...) method instead\n     */\n    @Deprecated(since = \"10\")\n    //Line n2\n    public static int add (int n1, int n2) {\n        return n1 + n2;\n    }\n\n    public static int add(int... nums) {\n        var sum = 0;\n        for(int i : nums)\n            sum += i;\n        return sum;\n    }\n}\n\n//Line n3\npublic class Test {\n    //Line n4\n    public static void main(String[] args) {\n        System.out.println(Util.add(10));\n        System.out.println(Util.add(10, 20));\n        System.out.println(Util.add(10, 20, 30));\n    }\n}</pre><p><br></p><p>Which of the following needs to be done, so that code compiles without any warning by Java 11 compiler?</p>", "answers": ["Replace //Line n1 with @SuppressWarnings", "Replace //Line n2 with @SuppressWarnings(&quot;deprecated&quot;)", "Replace //Line n3 with @SuppressWarnings({&quot;deprecated&quot;})", "Replace //Line n4 with @SuppressWarnings({&quot;deprecation&quot;})", "Given code compiles successfully without any warning"], "explanation": "<p><strong>UKOCP75394: </strong></p><p>Let's first find out the issue (if any): </p><p>Method `add (int n1, int n2)` has been Deprecated, therefore compiler will issue warning for the statement, where this method is invoked. </p><p><br></p><p>`Util.add(10)` invokes add(int...) method, hence no issues here.</p><p>`Util.add(10, 20)` invokes add(int, int) method, and therefore compiler will issue warning for this statement.</p><p>`Util.add(10, 20, 30)` invokes add(int...) method, hence no issues here.</p><p><br></p><p>To suppress the warning, you may add @SuppressWarnings annotation either at Line n3 or at Line n4. </p><p>SuppressWarnings annotation has one 'value' attribute of String [] type and it doesn't provide any default value.</p><p>So, possible answers are:</p><p>Replace //Line n3 with @SuppressWarnings({\"deprecated\"})</p><p>Replace //Line n4 with @SuppressWarnings(\"deprecation\")</p><p><br></p><p>To suppress deprecated warning, one of the values passed to 'value' attribute should be \"deprecation\".</p><p>Hence, you may use any of the following syntaxes:</p><p>@SuppressWarnings(\"deprecation\") =&gt; As we are passing just one value, \"deprecation\" to String [], hence {} can be omitted</p><p>@SuppressWarnings({\"deprecation\"}) =&gt; String[] contains one element {\"deprecation\"}.</p><p><br></p><p>Hence, out of the 2 filtered options, there is just one correct option: </p><p>Replace //Line n4 with @SuppressWarnings(\"deprecation\")</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP75394Given code: package com.udayankhattry.ocp;\n\n//Line n1\nclass Util {\n    /**\n     * @deprecated This method has been deprecated,\n     * use add(int...) method instead\n     */\n    @Deprecated(since = \"10\")\n    //Line n2\n    public static int add (int n1, int n2) {\n        return n1 + n2;\n    }\n\n    public static int add(int... nums) {\n        var sum = 0;\n        for(int i : nums)\n            sum += i;\n        return sum;\n    }\n}\n\n//Line n3\npublic class Test {\n    //Line n4\n    public static void main(String[] args) {\n        System.out.println(Util.add(10));\n        System.out.println(Util.add(10, 20));\n        System.out.println(Util.add(10, 20, 30));\n    }\n}Which of the following needs to be done, so that code compiles without any warning by Java 11 compiler?", "related_lectures": []}, {"_class": "assessment", "id": 48798106, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP21540</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.nio.file.Path;\n\npublic class FileUtility {\n    public static void copy(Path src, Path dest) throws IOException {\n        try (var fis = new FileInputStream(src.toFile());\n             var fos = new FileOutputStream(dest.toFile())) {\n            int res;\n            var arr = new byte[500000];\n            while((res = fis.read(arr)) != -1){\n                fos.write(arr, 0, res);\n            }\n        }\n    }\n}</pre><p><br></p><p>And the statements:</p><p>1. Above code is for copying text files only</p><p>2. Above code is for copying all types of files</p><p>3. FiliUtility.copy(Path, Path) method may be a target of Denial of Service attack</p><p>4. FiliUtility.copy(Path, Path) method may be a target of directory traversal attacks</p><p>5. FileInputStream and FileOutputStream objects are not closed properly</p><p><br></p><p>How many of the above statements are correct?</p>", "answers": ["None of the statements", "Only one statement", "Only two statements", "Only three statements", "Only four statements", "All five statements"], "explanation": "<p><strong>UKOCP21540: </strong></p><p>1. Above code is for copying text files only</p><p>\u2717&nbsp; FileInputStream and FileOutputStream works with bytes, hence these work with all type of files.</p><p><br></p><p>2. Above code is for copying all types of files</p><p>\u2713&nbsp; FileInputStream and FileOutputStream works with bytes, hence these work with all type of files.</p><p><br></p><p>3. FiliUtility.copy(Path, Path) method may be a target of Denial of Service attack</p><p>\u2713&nbsp; Malicious users may send multiple requests to this method, containing extremely large files, hence causing CPU and disk space over-utilized.</p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 1-1 / DOS-1: Beware of activities that may use disproportionate resources </p><p><br></p><p>4. FiliUtility.copy(Path, Path) method may be a target of directory traversal attacks</p><p>\u2713&nbsp; Malicious users may try to guess the parent directory names by using relative paths, such as \"../../..\" or may provide a symbolic links in the path.</p><p>These needs to be verified and corrected by using methods normalize() and toRealPath(LinkOption...).</p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 5-1 / INPUT-1: Validate inputs</p><p><br></p><p>5. FileInputStream and FileOutputStream objects are not closed properly</p><p>\u2717&nbsp; As, this code uses try-with-resources statement, hence resources will get closed automatically.</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["d"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP21540Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.nio.file.Path;\n\npublic class FileUtility {\n    public static void copy(Path src, Path dest) throws IOException {\n        try (var fis = new FileInputStream(src.toFile());\n             var fos = new FileOutputStream(dest.toFile())) {\n            int res;\n            var arr = new byte[500000];\n            while((res = fis.read(arr)) != -1){\n                fos.write(arr, 0, res);\n            }\n        }\n    }\n}And the statements:1. Above code is for copying text files only2. Above code is for copying all types of files3. FiliUtility.copy(Path, Path) method may be a target of Denial of Service attack4. FiliUtility.copy(Path, Path) method may be a target of directory traversal attacks5. FileInputStream and FileOutputStream objects are not closed properlyHow many of the above statements are correct?", "related_lectures": []}, {"_class": "assessment", "id": 48798108, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP80724</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   \\---messages\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Main.java\n|                       Test.java\n|\n+---bin\n|   \\---messages\n|       |   module-info.class\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Test.class\n|                       Main.class\n|\n\\---jars\n        messages.jar</pre><p><br></p><p>Contents of C:\\src\\messages\\com\\udayankhattry\\ocp\\Main.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        System.out.println(\"FOCUS AND WIN\");\n    }\n}</pre><p><br></p><p>Contents of C:\\src\\messages\\com\\udayankhattry\\ocp\\Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String... args) {\n        System.out.println(\"DRILL YOUR SKILLS\");\n    }\n}</pre><p><br></p><p>Contents of C:\\src\\messages\\module-info.java file: </p><pre class=\"prettyprint linenums\">module messages {\n}</pre><p><br></p><p>'messages.jar' file was created by executing below command from C:\\</p><p><code>jar -cfe jars\\messages.jar com.udayankhattry.ocp.Test -C bin\\messages .</code></p><p><br></p><p>Which of the following commands, if executed from C:\\, displays FOCUS AND WIN on to the console?</p><p>Choose 2 options.</p>", "answers": ["<p><code>java -p jars\\messages.jar -m messages</code> </p>", "<p><code>java -p jars -m messages</code> </p>", "<p><code>java -p bin -m messages</code> </p>", "<p><code>java -p bin -m messages/com.udayankhattry.ocp.Main</code> </p>", "<p><code>java -p jars -m messages/com.udayankhattry.ocp.Main</code> </p>", "<p><code>java -m messages/com.udayankhattry.ocp.Main -p jars</code> </p>"], "explanation": "<p><strong>UKOCP80724: </strong></p><p>Options of the jar command: </p><p>-c or --create: Create the archive</p><p>-f or --file=FILE: The archive file name</p><p>-e or --main-class=CLASSNAME: The application entry point for stand-alone applications bundled into a modular, or executable, jar archive</p><p>-C DIR: Change to the specified directory and include the following file</p><p><br></p><p>Given jar command:</p><p>C:\\&gt;jar -cfe jars\\messages.jar com.udayankhattry.ocp.Test -C bin\\messages .</p><p>Jar command instructs to create a new archive 'jars\\messages.jar' and set the entry point to 'com.udayankhattry.ocp.Test' class. </p><p>-C bin\\messages . instructs jar tool to change to the 'bin\\messages' directory and put all compiled files from this directory in the JAR file.</p><p><br></p><p>Important point to note here is that entry point (mainclass) is: com.udayankhattry.ocp.Test</p><p><br></p><p><br></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional. </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>Let's check all the options one by one:</p><p><code>java -p jars\\messages.jar -m messages</code></p><p>\u2717&nbsp; As &lt;mainclass&gt; has not been specified, hence it considers the mainclass set at jar creation, which is: com.udayankhattry.ocp.Test. Output is: DRILL YOUR SKILLS</p><p><br></p><p><code>java -p jars -m messages</code></p><p>\u2717&nbsp; With -p option, you can specify directory containing modules or individual modules as well. Same as above, it also prints DRILL YOUR SKILLS on to the console</p><p><br></p><p><code>java -p bin -m messages</code></p><p>\u2717&nbsp; As directory 'bin' contains exploded module, hence class name must be specified after module name 'messages'</p><p><br></p><p><code>java -p bin -m messages/com.udayankhattry.ocp.Main</code></p><p>\u2713&nbsp; As directory 'bin' contains exploded module and class name is also specified after module name 'messages', main(String...) method of Main class gets executed and prints FOCUS AND WIN on to the console. </p><p><br></p><p><code>java -p jars -m messages/com.udayankhattry.ocp.Main</code></p><p>\u2713&nbsp; Specifying class name after the module name (in case of jar file) executes the given class and not the entry-point (mainclass) set at jar creation. main(String...) method of Main class gets executed and prints FOCUS AND WIN on to the console.</p><p><br></p><p><code>java -m messages/com.udayankhattry.ocp.Main -p jars</code></p><p>\u2717&nbsp; -m must be the last option.</p><p><br></p><p><code>java -m messages/com.udayankhattry.ocp.Main</code></p><p>\u2717&nbsp; --module-path or -p option is missing.</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["d", "e"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP80724Given below the directory/file structure on Windows platform: C:\n+---src\n|   \\---messages\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Main.java\n|                       Test.java\n|\n+---bin\n|   \\---messages\n|       |   module-info.class\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Test.class\n|                       Main.class\n|\n\\---jars\n        messages.jarContents of C:\\src\\messages\\com\\udayankhattry\\ocp\\Main.java file:package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        System.out.println(\"FOCUS AND WIN\");\n    }\n}Contents of C:\\src\\messages\\com\\udayankhattry\\ocp\\Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String... args) {\n        System.out.println(\"DRILL YOUR SKILLS\");\n    }\n}Contents of C:\\src\\messages\\module-info.java file: module messages {\n}'messages.jar' file was created by executing below command from C:\\jar -cfe jars\\messages.jar com.udayankhattry.ocp.Test -C bin\\messages .Which of the following commands, if executed from C:\\, displays FOCUS AND WIN on to the console?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798110, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP35707</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   +---servicing\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---store\n|   |           \\---support\n|   |                   Car.java\n|   |                   Service.java\n|   |\n|   \\---testing\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Test.java\n|\n\\---cls</pre><p><br></p><p>Below are the file details:-</p><p>C:\\src\\servicing\\module-info.java: </p><pre class=\"prettyprint linenums\">module servicing {\n    exports com.store.support;\n}</pre><p><br></p><p>C:\\src\\servicing\\com\\store\\support\\Car.java: </p><pre class=\"prettyprint linenums\">package com.store.support;\n\nclass Vehicle {\n    public String toString() {\n        return \"VEHICLE\";\n    }\n}\n\npublic class Car extends Vehicle {\n    public String toString() {\n        return \"CAR\";\n    }\n}</pre><p><br></p><p>C:\\src\\servicing\\com\\store\\support\\Service.java: </p><pre class=\"prettyprint linenums\">package com.store.support;\n\npublic class Service {\n    public static void doService(Vehicle vehicle) {\n        System.out.println(\"SERVICING \" + vehicle);\n    }\n}</pre><p><br></p><p>C:\\src\\testing\\module-info.java: </p><pre class=\"prettyprint linenums\">module testing {\n    requires servicing;\n}</pre><p><br></p><p>C:\\src\\testing\\com\\udayankhattry\\ocp\\Test.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport com.store.support.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Vehicle obj = new Car();\n        Service.doService(obj);\n    }\n}</pre><p><br></p><p>And the below commands to be executed from C:\\</p><p><code>javac -d cls --module-source-path src -m testing</code></p><p><code>java -p cls -m testing/com.udayankhattry.ocp.Test</code></p><p><br></p><p>Which of the following statements is correct?</p>", "answers": ["Given code compiles successfully and output is: SERVICING CAR", "Given code compiles successfully and output is: SERVICING VEHICLE", "javac command causes some error", "java command throws an exception at runtime"], "explanation": "<p><strong>UKOCP35707: </strong></p><p>module-info.java file of 'testing' module requires 'servicing' module and module-info.java file of 'servicing' module exports 'com.store.support' package. Hence, 'testing' module can access all the public classes of 'com.store.support' package and their public members. </p><p><br></p><p>Please note, class 'Vehicle' is not public and therefore java compiler complains about `Vehicle obj = new Car();` statement. </p><p>C:\\&gt;javac -d cls --module-source-path src -m testing</p><p>src\\testing\\com\\udayankhattry\\ocp\\Test.java:7: error: cannot find symbol</p><p>&nbsp; &nbsp; &nbsp; &nbsp; Vehicle obj = new Car();</p><p>&nbsp; &nbsp; &nbsp; &nbsp; ^</p><p>&nbsp; symbol:&nbsp; &nbsp;class Vehicle</p><p>&nbsp; location: class Test</p><p>1 error</p><p><br></p><p>If you replace, 'Vehicle' with 'Car' [Car obj = new Car();], then code would compile successfully and would print SERVICING CAR on to the console.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP35707Given below the directory/file structure on Windows platform: C:\n+---src\n|   +---servicing\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---store\n|   |           \\---support\n|   |                   Car.java\n|   |                   Service.java\n|   |\n|   \\---testing\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Test.java\n|\n\\---clsBelow are the file details:-C:\\src\\servicing\\module-info.java: module servicing {\n    exports com.store.support;\n}C:\\src\\servicing\\com\\store\\support\\Car.java: package com.store.support;\n\nclass Vehicle {\n    public String toString() {\n        return \"VEHICLE\";\n    }\n}\n\npublic class Car extends Vehicle {\n    public String toString() {\n        return \"CAR\";\n    }\n}C:\\src\\servicing\\com\\store\\support\\Service.java: package com.store.support;\n\npublic class Service {\n    public static void doService(Vehicle vehicle) {\n        System.out.println(\"SERVICING \" + vehicle);\n    }\n}C:\\src\\testing\\module-info.java: module testing {\n    requires servicing;\n}C:\\src\\testing\\com\\udayankhattry\\ocp\\Test.java: package com.udayankhattry.ocp;\n\nimport com.store.support.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Vehicle obj = new Car();\n        Service.doService(obj);\n    }\n}And the below commands to be executed from C:\\javac -d cls --module-source-path src -m testingjava -p cls -m testing/com.udayankhattry.ocp.TestWhich of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 48798112, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP82448</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:.\n+---out\n\\---producer-consumer\n    +---com.udayankhattry.service\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |                   MessageService.ja     function kiemTraDapAn(correctMuti, choise) {
      // Chuyển đổi các số trong choise thành chữ cái tương ứng
      const choiseLetters = choise.map(num => String.fromCharCode(parseInt(num) + 'a'.charCodeAt(0)));

      // Kiểm tra điều kiện:
      // 1. Chiều dài hai mảng phải bằng nhau
      // 2. Tất cả các phần tử trong choiseLetters phải có trong correctMuti
      if (
        choiseLetters.length === correctMuti.length &&
        choiseLetters.every(c => correctMuti.includes(c))
      ) {
        return true;
      } else {
        return false;
      }
    }

    // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();
