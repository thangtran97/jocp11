tatic void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) {\n                System.out.println(\"ID: \" + rs.getInt(\"IDD\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close();\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            System.out.println(\"An Error Occurred!\");\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116540, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP81624</strong></p><p><br></p><p>Given structure of MESSAGES table:</p><p><code>MESSAGES (msg1 varchar(100), msg2 varchar(100))</code></p><p><br></p><p>MESSAGES table contains below records: </p><p><code>'Happy New Year!', 'Happy Holidays!'</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select msg1 as msg, msg2 as msg FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.absolute(1);\n            System.out.println(rs.getString(\"msg\"));\n            System.out.println(rs.getString(\"msg\"));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["<p>Happy New Year!</p><p>Happy Holidays!</p>", "<p>Happy Holidays!</p><p>Happy Holidays!</p>", "<p>Happy New Year!</p><p>Happy New Year!</p>", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP81624: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>In the given query, both the column aliases have same name 'msg'. `rs.getString(\"msg\")` always returns the first matching column. </p><p><br></p><p>In case of matching column names, column indexes can be used. </p><p>`rs.getString(1)` would return 'Happy New Year!' and `rs.getString(2)` would return 'Happy Holidays!'.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP81624Given structure of MESSAGES table:MESSAGES (msg1 varchar(100), msg2 varchar(100))MESSAGES table contains below records: 'Happy New Year!', 'Happy Holidays!'Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select msg1 as msg, msg2 as msg FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.absolute(1);\n            System.out.println(rs.getString(\"msg\"));\n            System.out.println(rs.getString(\"msg\"));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116542, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP81615</strong></p><p><br></p><p>Which of the following code will create/return a Locale object for the JVM, on which your code is running?</p>", "feedbacks": ["", "", "", ""], "answers": ["<p><code>Locale.getDefaultLocale();</code> </p>", "<p><code>Locale.getLocale();</code> </p>", "<p><code>System.getDefault();</code> </p>", "<p><code>Locale.getDefault();</code> </p>"], "explanation": "<p><strong>UKOCP81615: </strong></p><p>Locale.getDefault(); returns the default Locale for the currently running instance of JVM and getDefault() method is from Locale class and not from System class. </p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP81615Which of the following code will create/return a Locale object for the JVM, on which your code is running?", "related_lectures": []}, {"_class": "assessment", "id": 80116544, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP37947</strong></p><p><br></p><p>Below files are available for your project: </p><pre class=\"prettyprint linenums\">//1. ResourceBundle.properties\nk1=1\nk2=2</pre><p><br></p><pre class=\"prettyprint linenums\">//2. ResourceBundle_EN.properties\nk3=EN3\nk4=EN4</pre><p><br></p><pre class=\"prettyprint linenums\">//3. ResourceBundle_US.properties\nk2=US2\nk3=US3</pre><p><br></p><pre class=\"prettyprint linenums\">//4. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = Locale.US;\n        var bundle = ResourceBundle.getBundle(\"ResourceBundle\", loc);\n        var enumeration = bundle.getKeys();\n        while (enumeration.hasMoreElements()) {\n            var key = enumeration.nextElement();\n            var val = bundle.getString(key);\n            System.out.println(key + \"=\" + val);\n        }\n    }\n}</pre><p><br></p><p>Assume that all the *.properties files are included in the CLASSPATH. </p><p>What will be the output of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["<p>k2=US2</p><p>k3=US3</p><p>k3=EN3</p><p>k4=EN4</p><p>k1=1</p><p>k2=2</p>", "<p>k1=1</p><p>k2=2</p><p>k3=EN3</p><p>k4=EN4</p><p>k2=US2</p><p>k3=US3</p>", "<p>k3=EN3</p><p>k4=EN4</p><p>k1=1</p><p>k2=2</p>", "<p>k1=1</p><p>k2=2</p><p>k3=EN3</p><p>k4=EN4</p>", "<p>k2=US2</p><p>k3=US3</p><p>k4=EN4</p><p>k1=1</p>"], "explanation": "<p><strong>UKOCP37947: </strong></p><p>Variable 'loc' infers to Locale type, variable 'bundle' infers to ResourceBundle type, variable 'enumeration' infers to Enumeration&lt;String&gt; type.</p><p>Variables 'key' and 'val' infer to String type.</p><p><br></p><p>Locale.US represents a Locale instance for en_US. As locale is en_US, hence given files will be searched in below order:</p><p>ResourceBundle_en_US.properties (Not available)</p><p>ResourceBundle_en.properties (Available and works even in the file name \"EN\" is in upper-case, but convention is to use lowercase of language code)</p><p>ResourceBundle.properties (Available)</p><p>Note that 'ResourceBundle_US.properties' will not be considered.</p><p><br></p><p>Hence `bundle.getKeys();` returns an Enumeration&lt;String&gt; instance containing (k3,k4) from 'ResourceBundle_EN.properties' file and (k1,k2) from 'ResouceBundle.properties' file. </p><p><br></p><p>You can iterate over Enumeration using hasMoreElements() and nextElement() methods.</p><p><br></p><p>Iteration logic prints key-value pair in the order of Enumeration elements (k3, k4, k1, k2). Hence the output will be: </p><p>k3=EN3</p><p>k4=EN4</p><p>k1=1</p><p>k2=2</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP37947Below files are available for your project: //1. ResourceBundle.properties\nk1=1\nk2=2//2. ResourceBundle_EN.properties\nk3=EN3\nk4=EN4//3. ResourceBundle_US.properties\nk2=US2\nk3=US3//4. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = Locale.US;\n        var bundle = ResourceBundle.getBundle(\"ResourceBundle\", loc);\n        var enumeration = bundle.getKeys();\n        while (enumeration.hasMoreElements()) {\n            var key = enumeration.nextElement();\n            var val = bundle.getString(key);\n            System.out.println(key + \"=\" + val);\n        }\n    }\n}Assume that all the *.properties files are included in the CLASSPATH. What will be the output of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116546, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP35753</strong></p><p><br></p><p>Given code: </p><p>Below files are available for your project: </p><p>//1. Spell.properties</p><p><code>actions=First cast {1} and then {0}.</code></p><p><br></p><p>//2. C:\\magic\\Spell.txt</p><pre class=\"prettyprint linenums\">WINGARDIUM LEVIOSA\nEXPELLIARMUS</pre><p><br></p><p>//3. Test.java</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\nimport java.text.MessageFormat;\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var loc = new Locale(\"en\", \"US\");\n        var bundle = ResourceBundle.getBundle(\"Spell\", loc);\n        var mf = new MessageFormat(bundle.getString(\"actions\"));\n\n        System.out.println(mf.format(Files.readAllLines(Paths.get(\"C:\", \"magic\", \"Spell.txt\")).toArray()));\n    }\n}</pre><p><br></p><p>Assume that Spell.properties file is included in the CLASSPATH.</p><p>What is the result of compiling and executing Test.java file?</p>", "feedbacks": ["", "", "", ""], "answers": ["First cast {1} and then {0}.", "First cast EXPELLIARMUS and then WINGARDIUM LEVIOSA.", "First cast WINGARDIUM LEVIOSA and then EXPELLIARMUS.", "MissingResourceException is thrown at runtime"], "explanation": "<p><strong>UKOCP35753: </strong></p><p>As there is no default locale mentioned, hence for the given Locale en_US, search order for matching resource bundle is: </p><p>1. com.udayankhattry.ocp.Spell_en_US [1st: Complete, en_US].</p><p>2. com.udayankhattry.ocp.Spell_en [2nd: Only language, en].</p><p>3. com.udayankhattry.ocp.Spell [3rd: ResourceBundle's name without language or country].</p><p><br></p><p>There is just one resource file 'Spell.properties', available, hence it will be considered for reading resource keys.</p><p>`bundle.getString(\"actions\")` returns \"First cast {1} and then {0}.\", which is used as pattern for the message format.</p><p><br></p><p>`Files.readAllLines(Paths.get(\"C:\", \"magic\", \"Spell.txt\")).toArray()` returns String [] {\"WINGARDIUM LEVIOSA\", \"EXPELLIARMUS\"}. </p><p><br></p><p>\"WINGARDIUM LEVIOSA\" will replace {0} and \"EXPELLIARMUS\" will replace {1}. </p><p>Therefore, output is: First cast EXPELLIARMUS and then WINGARDIUM LEVIOSA.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "12.6 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP35753Given code: Below files are available for your project: //1. Spell.propertiesactions=First cast {1} and then {0}.//2. C:\\magic\\Spell.txtWINGARDIUM LEVIOSA\nEXPELLIARMUS//3. Test.javapackage com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\nimport java.text.MessageFormat;\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var loc = new Locale(\"en\", \"US\");\n        var bundle = ResourceBundle.getBundle(\"Spell\", loc);\n        var mf = new MessageFormat(bundle.getString(\"actions\"));\n\n        System.out.println(mf.format(Files.readAllLines(Paths.get(\"C:\", \"magic\", \"Spell.txt\")).toArray()));\n    }\n}Assume that Spell.properties file is included in the CLASSPATH.What is the result of compiling and executing Test.java file?", "related_lectures": []}, {"_class": "assessment", "id": 80116548, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68620</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    /*INSERT-1*/\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = create();\n    }\n    \n    /*INSERT-2*/\n    private static List create() {\n        return new ArrayList();\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "relatedLectureIds": "", "feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP68620: </strong></p><p>Compiler issues unchecked warnings for the code, which mixes generic and raw types. </p><p>Return type of method create() is List (raw type) and statement `List&lt;Integer&gt; list = create();` inside main(String[]) method assigns the return value to List&lt;Integer&gt; type, which is of generic type. Hence, compiler issues warning for code inside main(String[]) method. </p><p>Replacing /*INSERT-1*/ with @SuppressWarnings(\"unchecked\") will suppress the warning.</p>", "answers": ["Given code compiles successfully, without any warnings", "Warnings can be suppressed by replacing /*INSERT-1*/ with @SuppressWarnings(&quot;unchecked&quot;)", "Warnings can be suppressed by replacing /*INSERT-2*/ with @SuppressWarnings(&quot;unchecked&quot;)"]}, "correct_response": ["b"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP68620Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    /*INSERT-1*/\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = create();\n    }\n    \n    /*INSERT-2*/\n    private static List create() {\n        return new ArrayList();\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 80116550, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP44647</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.security.AccessController;\nimport java.security.PrivilegedAction;\nimport java.util.List;\n\nclass SpecialFileReader {\n\n    public static final List&lt;String&gt; read() {\n        final Path path = Path.of(\"C:\", \"test\", \"Test.java\");\n        PrivilegedAction&lt;List&lt;String&gt;&gt; pa = () -&gt; {\n            List&lt;String&gt; list = null;\n            try {\n                list =  Files.readAllLines(path);\n            } catch(IOException ex) {\n                System.out.println(\"IOException\");\n            }\n            return list;\n        };\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/, to make sure that caller has valid permissions?</p>", "feedbacks": ["", "", ""], "answers": ["<p><code>return AccessController.doPrivileged(pa);</code> </p>", "<p><code>return AccessController.doPrivileged(pa, null);</code> </p>", "<p><code>return AccessController.doPrivileged(pa, AccessController.getContext());</code> </p>"], "explanation": "<p><strong>UKOCP44647: </strong></p><p>`AccessController.doPrivileged(pa);` and `AccessController.doPrivileged(pa, null);` are exactly same, which perform the given action with all of the permissions possessed by the Caller's protection domain. </p><p>To check the caller's permission, `AccessController.getContext()` is used. Please note, `AccessController.getContext()` never returns null.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 9-3 / ACCESS-3: Safely invoke java.security.AccessController.doPrivileged</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "10.2 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP44647Given code: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.security.AccessController;\nimport java.security.PrivilegedAction;\nimport java.util.List;\n\nclass SpecialFileReader {\n\n    public static final List&lt;String&gt; read() {\n        final Path path = Path.of(\"C:\", \"test\", \"Test.java\");\n        PrivilegedAction&lt;List&lt;String&gt;&gt; pa = () -&gt; {\n            List&lt;String&gt; list = null;\n            try {\n                list =  Files.readAllLines(path);\n            } catch(IOException ex) {\n                System.out.println(\"IOException\");\n            }\n            return list;\n        };\n        /*INSERT*/\n    }\n}Which of the following options can replace /*INSERT*/, to make sure that caller has valid permissions?", "related_lectures": []}, {"_class": "assessment", "id": 80116552, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP52299</strong></p><p><br></p><p>Consider three independent modules with the same name 'messages' in three different directories:</p><pre class=\"prettyprint linenums\">C:\n\u251c\u2500\u2500\u2500out1\n\u2502   \u2514\u2500\u2500\u2500messages\n\u2502       \u2502   module-info.class\n\u2502       \u2502\n\u2502       \u2514\u2500\u2500\u2500com\n\u2502           \u2514\u2500\u2500\u2500udayankhattry\n\u2502               \u2514\u2500\u2500\u2500ocp\n\u2502                       Main.class\n\u2502\n\u251c\u2500\u2500\u2500out2\n\u2502   \u2514\u2500\u2500\u2500messages\n\u2502       \u2502   module-info.class\n\u2502       \u2502\n\u2502       \u2514\u2500\u2500\u2500com\n\u2502           \u2514\u2500\u2500\u2500udayankhattry\n\u2502               \u2514\u2500\u2500\u2500ocp\n\u2502                       Main.class\n\u2502\n\u2514\u2500\u2500\u2500out3\n    \u2514\u2500\u2500\u2500messages\n        \u2502   module-info.class\n        \u2502\n        \u2514\u2500\u2500\u2500com\n            \u2514\u2500\u2500\u2500udayankhattry\n                \u2514\u2500\u2500\u2500ocp\n                        Main.class</pre><p><br></p><p>main(String...) method of Main class defined in 'out1' contains: System.out.println(\"KEEP IT SIMPLE\");</p><p>main(String...) method of Main class defined in 'out2' contains: System.out.println(\"NEVER GIVE UP\");</p><p>main(String...) method of Main class defined in 'out3' contains: System.out.println(\"YES YOU CAN\");</p><p><br></p><p>And the command:</p><p><code>java -p out3;out2;out1\\messages -m messages/com.udayankhattry.ocp.Main</code></p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["It causes error because of the duplicate modules found", "KEEP IT SIMPLE", "NEVER GIVE UP", "YES YOU CAN"], "explanation": "<p><strong>UKOCP52299: </strong></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional.&nbsp; </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>When multiple modules with the same name are in different directories on the module path, first module is selected and rest of the modules with same name are ignored. As first module directory in the module path is 'out3', hence YES YOU CAN is the output.</p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP52299Consider three independent modules with the same name 'messages' in three different directories:C:\n\u251c\u2500\u2500\u2500out1\n\u2502   \u2514\u2500\u2500\u2500messages\n\u2502       \u2502   module-info.class\n\u2502       \u2502\n\u2502       \u2514\u2500\u2500\u2500com\n\u2502           \u2514\u2500\u2500\u2500udayankhattry\n\u2502               \u2514\u2500\u2500\u2500ocp\n\u2502                       Main.class\n\u2502\n\u251c\u2500\u2500\u2500out2\n\u2502   \u2514\u2500\u2500\u2500messages\n\u2502       \u2502   module-info.class\n\u2502       \u2502\n\u2502       \u2514\u2500\u2500\u2500com\n\u2502           \u2514\u2500\u2500\u2500udayankhattry\n\u2502               \u2514\u2500\u2500\u2500ocp\n\u2502                       Main.class\n\u2502\n\u2514\u2500\u2500\u2500out3\n    \u2514\u2500\u2500\u2500messages\n        \u2502   module-info.class\n        \u2502\n        \u2514\u2500\u2500\u2500com\n            \u2514\u2500\u2500\u2500udayankhattry\n                \u2514\u2500\u2500\u2500ocp\n                        Main.classmain(String...) method of Main class defined in 'out1' contains: System.out.println(\"KEEP IT SIMPLE\");main(String...) method of Main class defined in 'out2' contains: System.out.println(\"NEVER GIVE UP\");main(String...) method of Main class defined in 'out3' contains: System.out.println(\"YES YOU CAN\");And the command:java -p out3;out2;out1\\messages -m messages/com.udayankhattry.ocp.MainWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116554, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP22412</strong></p><p><br></p><p>_____________ system module defines the foundational APIs of the Java SE Platform.</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["java.se", "java.base", "jdk.se", "jdk.base", "java", "se"], "explanation": "<p><strong>UKOCP22412: </strong></p><p>Foundational APIs of the Java SE Platform are found in 'java.base' module. Please check the link: https://docs.oracle.com/en/java/javase/11/docs/api/java.base/module-summary.html</p><p><br></p><p>java.se is an aggregator module, which collects and re-exports the content of other modules but adds no content of its own.</p><p><br></p><p>'jdk.se', 'jdk.base', 'java' and 'se' are not valid system modules.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP22412_____________ system module defines the foundational APIs of the Java SE Platform.", "related_lectures": []}, {"_class": "assessment", "id": 80116556, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP44175</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:.\n+---out\n+---jars\n|       message-printer-1.0x.jar\n|\n\\---source\n    \\---com.xyz.testprinter\n        |   module-info.java\n        |\n        \\---com\n            \\---ocp\n                \\---test\n                        Test.java</pre><p><br></p><p>Suppose you have below non-modular jar file: </p><p>C:\\jars\\message-printer-1.0x.jar</p><p><br></p><p>META-INF\\MANIFEST.MF file has below entries: </p><p>Manifest-Version: 1.0</p><p>Created-By: 11.0 (udayankhattry.com)</p><p><br></p><p>Printer.class file is packaged inside jar and has been generated from below Printer.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Printer {\n    public static void print(String... strs) {\n        System.out.println(String.join(\", \", strs));\n    }\n}</pre><p><br></p><p>And files related to modular application: </p><p>C:\\source\\com.xyz.testprinter\\module-info.java: </p><pre class=\"prettyprint linenums\">module mymodule {\n    /*INSERT*/\n}</pre><p><br></p><p>C:\\source\\com.xyz.testprinter\\com\\ocp\\test\\Test.java: </p><pre class=\"prettyprint linenums\">package com.ocp.test; \n\nimport com.udayankhattry.ocp.Printer;\n\npublic class TestNonModularJar {\n    public static void main(String... args) {\n        Printer.print(\"My friend\", \"John\", \"likes to go swimming.\");\n    }\n}\n</pre><p>And the commands to be executed from C: </p><p><code>javac -d out --module-source-path source -p jars\\printer.jar -m mymodule</code></p><p><code>java -p out;jars\\printer.jar -m mymodule/com.ocp.test.TestNonModularJar</code></p><p><br></p><p>Which of the following needs to be done such that output is: </p><p>My friend,&nbsp; John,&nbsp; likes to go swimming.</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["No changes are necessary, code as is prints expected output", "Replace /*INSERT*/ with `requires message-printer-1.0x.jar;`", "Replace /*INSERT*/ with `requires message-printer-1.0x;`", "Replace /*INSERT*/ with `requires message-printer;`", "Replace /*INSERT*/ with `requires message.printer;`", "Replace /*INSERT*/ with `requires com.udayankhattry.ocp;`"], "explanation": "<p><strong>UKOCP44175: </strong></p><p>'message-printer-1.0x.jar' is a non-modular jar. </p><p>During compilation &amp; execution, it is mentioned in module-path: '-p jars\\message-printer-1.0x.jar' and '-p out;jars\\message-printer-1.0x.jar'.</p><p>Non-modular jar files placed in module-path are treated as \"Automatic Modules\". </p><p><br></p><p>META-INF\\MANIFEST.MF file doesn't have any entry for 'Automatic-Module-Name', which if present, represents the module name. Hence, in this case, module name is derived from the jar name ('message-printer-1.0x').</p><p>To derive the name, version part is removed and as - (dash) character is not allowed in module name it is replaced with . (dot) character.</p><p>The resulting module name will be: 'message.printer'.</p><p>NOTE: To check the derivation algorithm, please check the javadoc of java.lang.module.ModuleFinder.of(Path... entries) method.</p><p><br></p><p>Module 'com.xyz.testprinter' reads 'com.udayankhattry.ocp.Printer' class of the jar, hence in the module descriptor file, `requires &lt;module&gt;;` is needed. </p><p>Therefore, /*INSERT*/ must be replaced with `requires message.printer;`.</p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP44175Given below the directory/file structure on Windows platform: C:.\n+---out\n+---jars\n|       message-printer-1.0x.jar\n|\n\\---source\n    \\---com.xyz.testprinter\n        |   module-info.java\n        |\n        \\---com\n            \\---ocp\n                \\---test\n                        Test.javaSuppose you have below non-modular jar file: C:\\jars\\message-printer-1.0x.jarMETA-INF\\MANIFEST.MF file has below entries: Manifest-Version: 1.0Created-By: 11.0 (udayankhattry.com)Printer.class file is packaged inside jar and has been generated from below Printer.java file: package com.udayankhattry.ocp;\n\npublic class Printer {\n    public static void print(String... strs) {\n        System.out.println(String.join(\", \", strs));\n    }\n}And files related to modular application: C:\\source\\com.xyz.testprinter\\module-info.java: module mymodule {\n    /*INSERT*/\n}C:\\source\\com.xyz.testprinter\\com\\ocp\\test\\Test.java: package com.ocp.test; \n\nimport com.udayankhattry.ocp.Printer;\n\npublic class TestNonModularJar {\n    public static void main(String... args) {\n        Printer.print(\"My friend\", \"John\", \"likes to go swimming.\");\n    }\n}\nAnd the commands to be executed from C: javac -d out --module-source-path source -p jars\\printer.jar -m mymodulejava -p out;jars\\printer.jar -m mymodule/com.ocp.test.TestNonModularJarWhich of the following needs to be done such that output is: My friend,&nbsp; John,&nbsp; likes to go swimming.", "related_lectures": []}, {"_class": "assessment", "id": 80116534, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42408</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Store implements Serializable {\n    int i;\n    Double d;\n    String s;\n    StringBuilder sb;\n    Object object = new Object() {\n      public String toString() {\n          return \"OBJECT\";\n      }\n    };\n    List&lt;String&gt; colors = new ArrayList&lt;&gt;(List.of(\"R\", \"G\", \"B\"));\n\n    Store(int i, Double d) {\n        this.i = i;\n        this.d = d;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var store = new Store(10, Double.parseDouble(\"100.0\"));\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"J:\\\\store.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"J:\\\\store.ser\")))\n        {\n            oos.writeObject(store);\n\n            var s = (Store)ois.readObject();\n            System.out.println(s.i + \":\" + s.d + \":\" + s.s + \":\" + s.sb + \":\" + s.object + \":\" + s.colors) ;\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["10:100.0:null:null:OBJECT:[R, G, B]", "10:100.0:null:null:null:[R, G, B]", "0:0.0:null:null:OBJECT:[R, G, B]", "0:0.0:null:null:null:[R, G, B]", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP42408: </strong></p><p>Variable 'store' infers to Store type, variable 'oos' infers to ObjectOutputStream type, variable 'ois' infers to ObjectInputStream type and variable 's' infers to Store type.</p><p><br></p><p>Number (super class of Double) implements Serializable.</p><p>String, StringBuilder and ArrayList also implement Serializable but Object class doesn't implement Serializable. </p><p>Instance variable object refers to an instance of un-named sub class of Object class, which means to an instance of anonymous inner class, which is not Serializable. Hence, `oos.writeObject(store);` throws NotSerializableException at runtime.</p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP42408Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\nimport java.util.ArrayList;\nimport java.util.List;\n\nclass Store implements Serializable {\n    int i;\n    Double d;\n    String s;\n    StringBuilder sb;\n    Object object = new Object() {\n      public String toString() {\n          return \"OBJECT\";\n      }\n    };\n    List&lt;String&gt; colors = new ArrayList&lt;&gt;(List.of(\"R\", \"G\", \"B\"));\n\n    Store(int i, Double d) {\n        this.i = i;\n        this.d = d;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var store = new Store(10, Double.parseDouble(\"100.0\"));\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"J:\\\\store.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"J:\\\\store.ser\")))\n        {\n            oos.writeObject(store);\n\n            var s = (Store)ois.readObject();\n            System.out.println(s.i + \":\" + s.d + \":\" + s.s + \":\" + s.sb + \":\" + s.object + \":\" + s.colors) ;\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116532, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP18766</strong></p><p><br></p><p>Below is the directory structure of \"F:/Test\" directory:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500Test\n    \u2502   t1.pdf\n    \u2502   t2.pdf\n    \u2502\n    \u251c\u2500\u2500\u2500A\n    \u2502   \u2502   a.pdf\n    \u2502   \u2502\n    \u2502   \u251c\u2500\u2500\u2500B\n    \u2502   \u2502   \u2502   b.pdf\n    \u2502   \u2502   \u2502\n    \u2502   \u2502   \u2514\u2500\u2500\u2500M\n    \u2502   \u2502           m.pdf\n    \u2502   \u2502\n    \u2502   \u251c\u2500\u2500\u2500C\n    \u2502   \u2502       c.pdf\n    \u2502   \u2502\n    \u2502   \u2514\u2500\u2500\u2500D\n    \u2502           d.pdf\n    \u2502\n    \u2514\u2500\u2500\u2500X\n        \u2514\u2500\u2500\u2500Y\n            \u2502   y.pdf\n            \u2502\n            \u2514\u2500\u2500\u2500Z\n                    z.pdf</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.File;\nimport java.io.IOException;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        deleteFiles(new File(\"F:\\\\Test\"), \".pdf\");\n    }\n\n    public static void deleteFiles(File dir, String extension) throws IOException {\n        var list = dir.listFiles();\n        if (list != null &amp;&amp; list.length &gt; 0) {\n            for (var file : list) {\n                if (file.isDirectory()) {\n                    deleteFiles(file, extension);\n                } else if (file.getName().endsWith(extension)) {\n                    file.delete();\n                }\n            }\n        }\n    }\n}</pre><p><br></p><p>There is full permission to list/create/delete files and directories in F:.</p><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["All the pdf files in &#39;Test&#39; directory and its sub-directories will be deleted successfully", "Only t1.pdf and t2.pdf will get deleted", "t1.pdf, t2.pdf and all the pdf files under &#39;A&#39; and its sub-directories will be deleted successfully", "t1.pdf, t2.pdf and all the pdf files under &#39;X&#39; and its sub-directories will be deleted successfully", "Only t1.pdf and t2.pdf will not get deleted, other pdf files will be successfully deleted"], "explanation": "<p><strong>UKOCP18766: </strong></p><p>Variable 'list' infers to File[] type and variable 'file' infers to File type.</p><p><br></p><p>File is used to represent both File and Directory. </p><p><br></p><p>deleteFiles(new File(\"F:\\\\Test\"), \".pdf\"); =&gt; A java file object referring to 'F:\\Test' is created and on method call variable 'dir' refers to it. </p><p><br></p><p>dir.listFiles() method returns an File [], this contains the list of immediate files and directories. </p><p><br></p><p>NOTE: listFiles() method returns File[] and list() method returns String [].</p><p><br></p><p>In this case, array list will have 4 File objects: [{F:\\Test\\t1.pdf},{F:\\Test\\t2.pdf},{F:\\Test\\A},{F:\\Test\\X}]. </p><p><br></p><p>for loop iterates through each File object and if the File object is a Directory, then it recursively invokes deleteFiles method. </p><p><br></p><p>file.isDirectory() method checks if the file object is a File or Directory? </p><p><br></p><p>file.getName() returns the name (not the full path) of the file object (such as 't1.pdf', 't2.pdf', 'A' etc.).</p><p><br></p><p>file.delete() deletes the actual file from the disk.</p>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP18766Below is the directory structure of \"F:/Test\" directory:F:.\n\u2514\u2500\u2500\u2500Test\n    \u2502   t1.pdf\n    \u2502   t2.pdf\n    \u2502\n    \u251c\u2500\u2500\u2500A\n    \u2502   \u2502   a.pdf\n    \u2502   \u2502\n    \u2502   \u251c\u2500\u2500\u2500B\n    \u2502   \u2502   \u2502   b.pdf\n    \u2502   \u2502   \u2502\n    \u2502   \u2502   \u2514\u2500\u2500\u2500M\n    \u2502   \u2502           m.pdf\n    \u2502   \u2502\n    \u2502   \u251c\u2500\u2500\u2500C\n    \u2502   \u2502       c.pdf\n    \u2502   \u2502\n    \u2502   \u2514\u2500\u2500\u2500D\n    \u2502           d.pdf\n    \u2502\n    \u2514\u2500\u2500\u2500X\n        \u2514\u2500\u2500\u2500Y\n            \u2502   y.pdf\n            \u2502\n            \u2514\u2500\u2500\u2500Z\n                    z.pdfGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.File;\nimport java.io.IOException;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        deleteFiles(new File(\"F:\\\\Test\"), \".pdf\");\n    }\n\n    public static void deleteFiles(File dir, String extension) throws IOException {\n        var list = dir.listFiles();\n        if (list != null &amp;&amp; list.length &gt; 0) {\n            for (var file : list) {\n                if (file.isDirectory()) {\n                    deleteFiles(file, extension);\n                } else if (file.getName().endsWith(extension)) {\n                    file.delete();\n                }\n            }\n        }\n    }\n}There is full permission to list/create/delete files and directories in F:.What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 80116530, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75792</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, BrokenBarrierException {\n        var cb = new CyclicBarrier(6, () -&gt; System.out.println(\"HURRAH!\"));\n        var es = Executors.newFixedThreadPool(5);\n        IntStream.rangeClosed(1, 10)\n            .parallel()\n            .forEach(x -&gt; es.submit(() -&gt; cb.await()));\n        es.shutdown();\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "feedbacks": ["", "", "", ""], "answers": ["It prints HURRAH! once", "It prints HURRAH! twice", "No output and program waits indefinitely", "No output and program terminates successfully"], "explanation": "<p><strong>UKOCP75792: </strong></p><p>Variable 'cb' infers to CyclicBarrier type. </p><p>`new CyclicBarrier(6, () -&gt; System.out.println(\"HURRAH!\"));` means 6 threads must call await() so that Cyclic Barrier is tripped and barrier action is executed.</p><p>`Executors.newFixedThreadPool(5);` creates a fixed thread pool of 5 thread, which means at max, 5 threads will invoke cb.await() method. </p><p>So, HURRAH! will not be executed even once, and program waits indefinitely.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "8.3 Concurrency: CyclicBarrier", "question_plain": "Question ID: UKOCP75792Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, BrokenBarrierException {\n        var cb = new CyclicBarrier(6, () -&gt; System.out.println(\"HURRAH!\"));\n        var es = Executors.newFixedThreadPool(5);\n        IntStream.rangeClosed(1, 10)\n            .parallel()\n            .forEach(x -&gt; es.submit(() -&gt; cb.await()));\n        es.shutdown();\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 80116528, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP73169</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Printer implements Runnable {\n    public void run() {\n        System.out.println(\"Printing\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newFixedThreadPool(1);\n        /*INSERT*/\n        es.shutdown();\n    }\n}</pre><p><br></p><p>Which of the following statements, if used to replace /*INSERT*/, will print 'Printing' on to the console? </p><p>Choose 2 options.</p>", "feedbacks": ["", "", "", ""], "answers": ["<p><code>es.submit(new Printer());</code> </p>", "<p><code>es.execute(new Printer());</code> </p>", "<p><code>es.run(new Printer());</code> </p>", "<p><code>es.start(new Printer());</code> </p>"], "explanation": "<p><strong>UKOCP73169: </strong></p><p>Variable 'es' infers to ExecutorService type.</p><p><br></p><p>ExecutorService interface has following methods: </p><p>Future&lt;?&gt; submit(Runnable task);&nbsp; &nbsp;</p><p>&lt;T&gt; Future&lt;T&gt; submit(Runnable task, T result);&nbsp; &nbsp;</p><p>&lt;T&gt; Future&lt;T&gt; submit(Callable&lt;T&gt; task);&nbsp; &nbsp;</p><p><br></p><p>Hence, 'es.submit(new Printer());' is one of the correct options.&nbsp; </p><p><br></p><p>ExecutorService interface extends Executor interface and it has `void execute(Runnable command);` method. Hence, 'es.execute(new Printer());' is the 2nd correct option. </p>", "relatedLectureIds": ""}, "correct_response": ["a", "b"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP73169Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Printer implements Runnable {\n    public void run() {\n        System.out.println(\"Printing\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newFixedThreadPool(1);\n        /*INSERT*/\n        es.shutdown();\n    }\n}Which of the following statements, if used to replace /*INSERT*/, will print 'Printing' on to the console? Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 80116526, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP11706</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var vowels = List.of(\"A\", \"E\", \"I\", \"O\", \"U\");\n        System.out.println(vowels.________________.isParallel());\n    }\n}</pre><p><br></p><p>Which of the options correctly fills the blank, such that output is true? </p><p>Choose 2 options.</p>", "feedbacks": ["", "", "", ""], "answers": ["<p><code>stream().parallel()</code> </p>", "<p><code>stream()</code> </p>", "<p><code>parallel()</code> </p>", "<p><code>parallelStream()</code> </p>"], "explanation": "<p><strong>UKOCP11706: </strong></p><p>Collection interface has a default method stream() to return a sequential() stream for the currently executing Collection. </p><p>Collection interface has a default method parallelStream() to return a parallel stream for the currently executing Collection.</p><p><br></p><p>Stream class has parallel() method to convert to parallel stream and sequential() method to convert to sequential stream. </p><p>isParallel() method of Stream class returns true for parallel Stream. </p><p><br></p><p>Variable 'vowels' is of List&lt;String&gt; type, which is a Collection. So, </p><p><br></p><p>vowels.stream() returns a sequential stream and vowels.stream().parallel() returns a parallel stream. vowels.stream().parallel().isParallel() returns true.&nbsp; </p><p>stream() returns a sequential stream and vowels.stream().isParallel() returns false.&nbsp; </p><p>vowels.parallel() causes compilation error. </p><p>vowels.parallelStream() returns a parallel stream. vowels.parallelStream().isParallel() returns true.</p>", "relatedLectureIds": ""}, "correct_response": ["a", "d"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP11706Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var vowels = List.of(\"A\", \"E\", \"I\", \"O\", \"U\");\n        System.out.println(vowels.________________.isParallel());\n    }\n}Which of the options correctly fills the blank, such that output is true? Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 80116524, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP33947</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream.of(2, 4, 6, 8, 10, 12)\n            .filter(Predicate.not(Predicate.isEqual(100)))\n            .reduce((i1, i2) -&gt; i1 + i2)\n            .stream()\n            .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["Program executes successfully but produces no output", "42", "32", "0"], "explanation": "<p><strong>UKOCP33947: </strong></p><p>Predicate&lt;T&gt; interface has 2 static methods: </p><p>+ static &lt;T&gt; Predicate&lt;T&gt; \tisEqual\u200b(Object targetRef): Returns a predicate that tests if two arguments are equal according to Objects.equals(Object, Object).</p><p>+ static &lt;T&gt; Predicate&lt;T&gt; \tnot\u200b(Predicate&lt;? super T&gt; target): Returns a predicate that is the negation of the supplied predicate.</p><p>Predicate.isEqual(100) =&gt; Returns a Predicate which returns true, if passed Integer object IS EQUAL to 100. </p><p>Predicate.not(Predicate.isEqual(100)) =&gt; Returns a Predicate which returns true, if passed Integer object IS NOT EQUAL to 100. </p><p><br></p><p>Let's check the given code: </p><p>Stream.of(2, 4, 6, 8, 10, 12) =&gt; Stream&lt;Integer&gt; [2, 4, 6, 8, 10, 12]</p><p>filter(Predicate.not(Predicate.isEqual(100))) =&gt; Stream&lt;Integer&gt; [2, 4, 6, 8, 10, 12]</p><p>reduce((i1, i2) -&gt; i1 + i2) =&gt; Optional[2 + 4 + 6 + 8 + 10 + 12] = Optional[42]</p><p>stream() =&gt; Stream&lt;Integer&gt; [42]</p><p>forEach(System.out::println) =&gt; Prints 42</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP33947Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream.of(2, 4, 6, 8, 10, 12)\n            .filter(Predicate.not(Predicate.isEqual(100)))\n            .reduce((i1, i2) -&gt; i1 + i2)\n            .stream()\n            .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116522, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP50053</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.OptionalInt;\n\nclass MyException extends Exception{}\n\npublic class Test {\n    public static void main(String[] args) {\n        OptionalInt optional = OptionalInt.empty();\n        System.out.println(optional.orElseThrow(MyException::new));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["null", "An instance of NoSuchElementException is thrown at runtime", "An instance of RuntimeException is thrown at runtime", "An instance of MyException is thrown at runtime", "An instance of NullPointerException is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP50053: </strong></p><p>MyException is a checked exception, so 'handle or declare' rule must be followed. </p><p><br></p><p>'orElseThrow(MyException::new)' can throw checked exception at runtime, so it must be surrounded by a try-catch block or main method should declare proper throws clause.</p><p><br></p><p>NOTE: There are 3 primitive equivalents of Optional&lt;T&gt; class available. Remember their similarity with Optional&lt;T&gt; class. </p><p><br></p><p>Optional&lt;T&gt;: </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; empty() </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; of\u200b(T value)</p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; ofNullable\u200b(T value) **</p><p>+ T&nbsp; &nbsp; &nbsp;get()</p><p>+ T&nbsp; &nbsp; &nbsp;orElse\u200b(T other)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseGet\u200b(Supplier&lt;? extends T&gt; supplier)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; T&nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(Consumer&lt;? super T&gt; action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(Consumer&lt;? super T&gt; action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ Stream&lt;T&gt;&nbsp; &nbsp; &nbsp;stream()</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp;or\u200b(Supplier&lt;? extends Optional&lt;? extends T&gt;&gt; supplier) **</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp; &nbsp; &nbsp;filter\u200b(Predicate&lt;? super T&gt; predicate) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;map\u200b(Function&lt;? super T,\u200b? extends U&gt; mapper) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;flatMap\u200b(Function&lt;? super T,\u200b? extends Optional&lt;? extends U&gt;&gt; mapper) **</p><p><br></p><p><br></p><p>OptionalInt: </p><p>+ static OptionalInt&nbsp; &nbsp; empty()</p><p>+ static OptionalInt&nbsp; &nbsp; of\u200b(int value)</p><p>+ int&nbsp; &nbsp;getAsInt()</p><p>+ int&nbsp; &nbsp;orElse\u200b(int other)</p><p>+ int&nbsp; &nbsp;orElseGet\u200b(IntSupplier supplier)</p><p>+ int&nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; int&nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(IntConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(IntConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ IntStream&nbsp; &nbsp; &nbsp;stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalLong: </p><p>+ static OptionalLong&nbsp; &nbsp;empty()</p><p>+ static OptionalLong&nbsp; &nbsp;of\u200b(long value)</p><p>+ long&nbsp; getAsLong()</p><p>+ long&nbsp; orElse\u200b(long other)</p><p>+ long&nbsp; orElseGet\u200b(LongSupplier supplier)</p><p>+ long&nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; long&nbsp; &nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(LongConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(LongConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ LongStream&nbsp; &nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalDouble: </p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;empty()</p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;of\u200b(double value)</p><p>+ double&nbsp; &nbsp; getAsDouble()</p><p>+ double&nbsp; &nbsp; orElse\u200b(double other)</p><p>+ double&nbsp; &nbsp; orElseGet\u200b(DoubleSupplier supplier)</p><p>+ double&nbsp; &nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; double&nbsp; orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(DoubleConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(DoubleConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ DoubleStream&nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type].</p>", "relatedLectureIds": ""}, "correct_response": ["f"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP50053Given code: package com.udayankhattry.ocp;\n\nimport java.util.OptionalInt;\n\nclass MyException extends Exception{}\n\npublic class Test {\n    public static void main(String[] args) {\n        OptionalInt optional = OptionalInt.empty();\n        System.out.println(optional.orElseThrow(MyException::new));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116520, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP70119</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        var names = List.of(\"John\", \"william\", \"Claire\", \"HOPE\", \"Clark\", \"Hunter\", \"Kirk\");\n\n        search(names, \"jack\")\n            .or(() -&gt; search(names, \"Jon\"))\n            .or(() -&gt; search(names, \"hope\"))\n            .or(() -&gt; search(names, \"Clark\"))\n            .stream()\n            .forEach(System.out::print);\n    }\n\n    static Optional&lt;String&gt; search(List&lt;String&gt; list, String textToSearch) {\n        return list.stream()\n                    .filter(s -&gt; s.equalsIgnoreCase(textToSearch))\n                    .findFirst();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["hope", "HOPE", "Clark", "jack", "HOPEClark", "Program executes successfully but produces no output"], "explanation": "<p><strong>UKOCP70119: </strong></p><p>Optional&lt;T&gt; class has below or method: </p><p>public Optional&lt;T&gt; or\u200b(Supplier&lt;? extends Optional&lt;? extends T&gt;&gt; supplier){...}</p><p>According to Javadoc, If a value is present, returns an Optional describing the value, otherwise returns an Optional produced by the supplying function.</p><p><br></p><p>Let's check the given code: </p><p>Variable 'names' infers to List&lt;String&gt; type. </p><p>search(names, \"jack\") =&gt; Returns an empty Optional.</p><p>or(() -&gt; search(names, \"Jon\")) =&gt; Returns an empty Optional. </p><p>or(() -&gt; search(names, \"hope\")) =&gt; Returns Optional[\"HOPE\"].</p><p>As non-empty Optional has been returned, hence remaining or methods will not be invoked. </p><p>stream() =&gt; Stream&lt;String&gt; [\"HOPE\"]</p><p>forEach(System.out::print) =&gt; Prints HOPE on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP70119Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        var names = List.of(\"John\", \"william\", \"Claire\", \"HOPE\", \"Clark\", \"Hunter\", \"Kirk\");\n\n        search(names, \"jack\")\n            .or(() -&gt; search(names, \"Jon\"))\n            .or(() -&gt; search(names, \"hope\"))\n            .or(() -&gt; search(names, \"Clark\"))\n            .stream()\n            .forEach(System.out::print);\n    }\n\n    static Optional&lt;String&gt; search(List&lt;String&gt; list, String textToSearch) {\n        return list.stream()\n                    .filter(s -&gt; s.equalsIgnoreCase(textToSearch))\n                    .findFirst();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116518, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP25596</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Rope {\n    int length;\n    String color;\n\n    Rope(int length, String color) {\n        this.length = length;\n        this.color = color;\n    }\n\n    public String toString() {\n        return \"Rope [\" + color + \", \" + length + \"]\";\n    }\n\n    static class RedRopeFilter {\n        boolean filter(Rope rope) {\n            return rope.color.equalsIgnoreCase(\"Red\");\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new Rope(5, \"red\"),\n                                new Rope(10, \"Red\"), new Rope(7, \"RED\"),\n                                new Rope(10, \"green\"), new Rope(7, \"Blue\"));\n\n        list.stream().filter(new Rope.RedRopeFilter()::filter).forEach(System.out::println); //Line n1\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["Line n1 causes compilation error", "Rope [Red, 10]", "<p>Rope [red, 5]</p><p>Rope [Red, 10]</p><p>Rope [RED, 7]</p>", "<p>Rope [green, 10]</p><p>Rope [Blue, 7]</p>", "<p>Rope [red, 5]</p><p>Rope [Red, 10]</p><p>Rope [RED, 7]</p><p>Rope [green, 10]</p><p>Rope [Blue, 7]</p>"], "explanation": "<p><strong>UKOCP25596: </strong></p><p>Variable 'list' infers to List&lt;Rope&gt; type. </p><p>'new Rope.RedRopeFilter()::filter' is an example of \"Reference to an Instance Method of a Particular Object\". Equivalent lambda expression is: `(Rope r) -&gt; new Rope.RedRopeFilter().filter(r)`. </p><p>As filter(...) method accepts Predicate&lt;? super Point&gt; instance as an argument, hence given method reference syntax is the correct implementation of the Predicate. Line n1 compiles successfully. </p><p>Result of filtration is the Stream&lt;Rope&gt; instance containing Rope objects of 'red' color. Please note string 'red' can be in any case(upper, lower or mixed) Therefore, this stream contains Rope [red, 5], Rope [Red, 10] and Rope [RED, 7].</p><p>forEach(System.out::println) prints Rope [red, 5], Rope [Red, 10] and Rope [RED, 7]) on to the console.</p><p><br></p><p>If 'filter(Rope)' is declared as static, then to achieve same output, you will have to change the method reference syntax to: `filter(Rope.RedRopeFilter::filter)`.</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP25596Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Rope {\n    int length;\n    String color;\n\n    Rope(int length, String color) {\n        this.length = length;\n        this.color = color;\n    }\n\n    public String toString() {\n        return \"Rope [\" + color + \", \" + length + \"]\";\n    }\n\n    static class RedRopeFilter {\n        boolean filter(Rope rope) {\n            return rope.color.equalsIgnoreCase(\"Red\");\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new Rope(5, \"red\"),\n                                new Rope(10, \"Red\"), new Rope(7, \"RED\"),\n                                new Rope(10, \"green\"), new Rope(7, \"Blue\"));\n\n        list.stream().filter(new Rope.RedRopeFilter()::filter).forEach(System.out::println); //Line n1\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116516, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP36238</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map = new LinkedHashMap&lt;Integer, String&gt;();\n        map.put(1,  null);\n        map.put(2,  \"TWO\");\n        map.put(3, \"THREE\");\n        map.merge(1, \"ONE\", String::concat); //Line n1\n        map.merge(2, \"2\", (s1, s2) -&gt; s2 + \":\" + s1); //Line n2\n        map.merge(3, \"3\", (s1, s2) -&gt; null); //Line n3\n        System.out.println(map);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["{1=ONE, 2=2:TWO, 3=3}", "{1=ONE, 2=2:TWO}", "{1=nullONE, 2=2:TWO, 3=3}", "{1=ONE, 2=2:TWO, 3=THREE}", "{1=ONE, 2=2:TWO, 3=null}", "{1=ONE, 2=TWO:2, 3=null}", "<p>{2=2:TWO}</p>"], "explanation": "<p><strong>UKOCP36238: </strong></p><p>Map&lt;K, V&gt; interface has default merge method with below signature: </p><p>default V merge\u200b(K key, V value, BiFunction&lt;? super V,\u200b? super V,\u200b? extends V&gt; remappingFunction)</p><p>According to the Javadoc of this method, \"If the specified key is not already associated with a value or is associated with null, associates it with the given non-null value. Otherwise, replaces the associated value with the results of the given remapping function, or removes if the result is null.\"</p><p><br></p><p>The default implementation is equivalent to performing the following steps for this map, then returning the current value or null if absent:</p><p><br></p><p>V oldValue = map.get(key);</p><p>V newValue = (oldValue == null) ? value :</p><p>&nbsp; &nbsp; &nbsp; &nbsp; remappingFunction.apply(oldValue, value);</p><p>if (newValue == null)</p><p>&nbsp; &nbsp; map.remove(key);</p><p>else</p><p>&nbsp; &nbsp; map.put(key, newValue);</p><p>\t</p><p>\t</p><p>BiFunction&lt;T, U, R&gt; has below apply method: </p><p>+R apply(T t, U u);</p><p><br></p><p>Method reference syntax, `String::concat` at Line n1 is equivalent to `(String s1, String s2) -&gt; {return s1.concat(s2);}` and is the correct implementation of BiFunction&lt;String, String, String&gt;.</p><p>Similarly, lambda expressions at Line n2 and Line n3 are correct implementations of BiFunction&lt;String, String, String&gt;.</p><p>\t</p><p>Let's check the given code: </p><p>LinkedHashMap object contains 3 key-value pairs: </p><p>{1=null, 2=TWO, 3=THREE}</p><p><br></p><p>At Line n1, as value associated with key 1 is null, hence passed value [\"ONE\"] is associated with key 1. After this statement executes successfully, LinkedHashMap object refers to {1=ONE, 2=TWO, 3=THREE}</p><p><br></p><p>At Line n2, `remappingFunction.apply(oldValue, value);` is executed, which is equivalent to `(s1, s2) -&gt; s2 + \":\" + s1` (s1 is oldValue [\"TWO\"] and s2 is the passed value [\"2\"]), hence given lambda expression returns \"2:TWO\" and therefore \"2:TWO\" gets associated with key 2. After this statement executes successfully, LinkedHashMap object refers to {1=ONE, 2=2:TWO, 3=THREE}</p><p><br></p><p>At Line n3, `remappingFunction.apply(oldValue, value);` is executed, which returns null. As remappingFunction returns null, hence associated key is removed from the LinkedHashMap object. After this statement executes successfully, LinkedHashMap object refers to {1=ONE, 2=2:TWO}</p><p><br></p><p>Therefore, output is: {1=ONE, 2=2:TWO}</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP36238Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map = new LinkedHashMap&lt;Integer, String&gt;();\n        map.put(1,  null);\n        map.put(2,  \"TWO\");\n        map.put(3, \"THREE\");\n        map.merge(1, \"ONE\", String::concat); //Line n1\n        map.merge(2, \"2\", (s1, s2) -&gt; s2 + \":\" + s1); //Line n2\n        map.merge(3, \"3\", (s1, s2) -&gt; null); //Line n3\n        System.out.println(map);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 80116514, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP14030</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        UnaryOperator&lt;String&gt; opr1 =  s -&gt; {\n            System.out.print(1);\n            return s.toUpperCase();\n        };\n        UnaryOperator&lt;String&gt; opr2 = s -&gt; {\n            System.out.print(2);\n            return new StringBuilder(s).reverse().toString();\n        };\n        UnaryOperator&lt;String&gt; opr3 = s -&gt; {\n            System.out.print(3);\n            return s.substring(2);\n        };\n\t\t\n\t\topr1.andThen(opr2).compose(opr3); //Line n1\n        System.out.println(opr1.apply(\"amar\")); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["312RA", "132RA", "123RA", "1RAMA", "1AMAR", "213MA", "<p>321MA</p>"], "explanation": "<p><strong>UKOCP14030: </strong></p><p>interface UnaryOperator&lt;T&gt; extends Function&lt;T, T&gt;, so its apply function has the signature: T apply(T).</p><p>It also inherits below functions from Function&lt;T, T&gt; interface: </p><p>default &lt;V&gt; Function&lt;V, T&gt; compose(Function&lt;? super V, ? extends T&gt; before) {...}</p><p>default &lt;V&gt; Function&lt;T, V&gt; andThen(Function&lt;? super T, ? extends V&gt; after) {...}</p><p><br></p><p>compose and andThen methods doesn't change the object, on which these methods are invoked, rather creates a new Function&lt;T, T&gt; object. </p><p>Line n1 returns a new Function&lt;String, String&gt; object, but we are not assigning this object to any reference variable or calling method apply(String) on this method chain. </p><p>Line n2 simply executes the lambda expression referred by opr1 and it prints 1 and returns \"AMAR\". Hence, Line n2 prints 1AMAR</p><p><br></p><p>If you want to invoke the apply method on the Function&lt;String, String&gt; object returned by Line n1, then either use below code:</p><pre class=\"prettyprint linenums\">Function&lt;String, String&gt; func = opr1.andThen(opr2).compose(opr3);\nSystem.out.println(func.apply(\"amar\"));</pre><p>OR</p><p><code>System.out.println(opr1.andThen(opr2).compose(opr3).apply(\"amar\"));</code></p><p><br></p><p>Both the codes would print 312RA on to the console.</p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP14030Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        UnaryOperator&lt;String&gt; opr1 =  s -&gt; {\n            System.out.print(1);\n            return s.toUpperCase();\n        };\n        UnaryOperator&lt;String&gt; opr2 = s -&gt; {\n            System.out.print(2);\n            return new StringBuilder(s).reverse().toString();\n        };\n        UnaryOperator&lt;String&gt; opr3 = s -&gt; {\n            System.out.print(3);\n            return s.substring(2);\n        };\n\t\t\n\t\topr1.andThen(opr2).compose(opr3); //Line n1\n        System.out.println(opr1.apply(\"amar\")); //Line n2\n    }\n}What is the result?", "related_lectures": []}]};

    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
