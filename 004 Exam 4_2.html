    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 71527730, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP49014: </strong></p><p>Initially F:\\ is blank. </p><p><br></p><p>new File(\"F:\\\\f1.txt\"); =&gt; It just creates a Java object containing abstract path 'F:\\f1.txt'. No physical file is created on the disc. </p><p><br></p><p>new FileWriter(\"F:\\\\f2.txt\"); =&gt; It creates 'f2.txt' under F:. </p><p><br></p><p>new PrintWriter(\"F:\\\\f3.txt\"); =&gt; It creates 'f3.txt' under F:.</p><p><br></p><p>NOTE: Constructors of FileWriter and PrintWriter can create a new file but not directory. </p>", "answers": ["0", "1", "2", "3"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP49014</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = new File(\"F:\\\\f1.txt\");\n        var fileWriter = new FileWriter(\"F:\\\\f2.txt\");\n        var printWriter = new PrintWriter(\"F:\\\\f3.txt\");\n    }\n}</pre><p>F: is accessible for reading/writing and currently doesn't contain any files/directories. </p><p><br></p><p>On executing Test class, how many physical files will be created on the disc?</p>"}, "correct_response": ["c"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP49014Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = new File(\"F:\\\\f1.txt\");\n        var fileWriter = new FileWriter(\"F:\\\\f2.txt\");\n        var printWriter = new PrintWriter(\"F:\\\\f3.txt\");\n    }\n}F: is accessible for reading/writing and currently doesn't contain any files/directories. On executing Test class, how many physical files will be created on the disc?", "related_lectures": []}, {"_class": "assessment", "id": 71527706, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP74552: </strong></p><p>This is an example of method reference to static method. Double colon (::) operator is used for method reference syntax. print() method of Printer interface and printCurrentTime() method of Util class don't accept any parameters. () -&gt; Util.printCurrentTime(); is same as Util::printCurrentTime.&nbsp; </p><p>NOTE: round brackets are not used in any of the method reference syntax. </p><p><br></p><p>Please note that, to solve this question, you are not suppose to have any knowledge of classes of java.text package. All the needed information are given in this question.</p>", "answers": ["<p><code>Util::printCurrentTime();</code> </p>", "<p><code>Util::printCurrentTime;</code> </p>", "<p><code>Util-&gt;printCurrentTime();</code> </p>", "<p><code>Util-&gt;printCurrentTime;</code> </p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP74552</strong></p><p><br></p><p>Consider below code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.*;\nimport java.util.Date;\n\n@FunctionalInterface\ninterface Printer {\n    void print();\n}\n\nclass Util {\n    public static void printCurrentTime() {\n        //Format to display date\n        DateFormat dateFormat\n            = new SimpleDateFormat(\"dd-MM-yyyy HH:mm:ss\");\n\n        //Create a date object representing \n        // current date and time\n        Date date = new Date();\n\n        //prints the date object in above format\n        System.out.println(dateFormat.format(date));\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer creator =\n                () -&gt; Util.printCurrentTime();\n        creator.print();\n    }\n}</pre><p><br></p><p>On execution, Test class prints the current date and time on to the console. Which of the following method reference syntax can replace the Lambda expression [() -&gt; Util.printCurrentTime();] inside main method such that there is no change in the output?</p>"}, "correct_response": ["b"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP74552Consider below code:package com.udayankhattry.ocp;\n\nimport java.text.*;\nimport java.util.Date;\n\n@FunctionalInterface\ninterface Printer {\n    void print();\n}\n\nclass Util {\n    public static void printCurrentTime() {\n        //Format to display date\n        DateFormat dateFormat\n            = new SimpleDateFormat(\"dd-MM-yyyy HH:mm:ss\");\n\n        //Create a date object representing \n        // current date and time\n        Date date = new Date();\n\n        //prints the date object in above format\n        System.out.println(dateFormat.format(date));\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer creator =\n                () -&gt; Util.printCurrentTime();\n        creator.print();\n    }\n}On execution, Test class prints the current date and time on to the console. Which of the following method reference syntax can replace the Lambda expression [() -&gt; Util.printCurrentTime();] inside main method such that there is no change in the output?", "related_lectures": []}, {"_class": "assessment", "id": 71527708, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP26005: </strong></p><p>java.util.Comparator interface is available with Java since JDK 1.2. So, even though it is a functional interface but Java guys didn't move it to java.util.function package. </p><p><br></p><p>Had Comparator interface moved to java.util.function package, then millions of lines of existing Java codes would have broken. That's why package of all the existing functional interface was not changed.</p>", "answers": ["<p><code>import java.util.function.Comparator;</code> </p>", "<p><code>import java.util.Comparator;</code> </p>", "<p><code>import java.function.Comparator;</code> </p>", "<p><code>import java.lang.Comparator;</code> </p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP26005</strong></p><p><br></p><p>Which of the import statements correctly imports the functional interface Comparator?</p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP26005Which of the import statements correctly imports the functional interface Comparator?", "related_lectures": []}, {"_class": "assessment", "id": 71527710, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP82153: </strong></p><p>andThen is the default method defined in Consumer interface, so it is invoked on consumer reference variable. </p><p><br></p><p>Value passed in the argument of accept method is passed to both the consumer objects. </p><p>So, for understanding purpose Line n1 can be split into: add.accept(10); print.accept(10);&nbsp; </p><p><br></p><p>add.accept(10) is executed first and it increments the count variable by 10, so count becomes 11. </p><p><br></p><p>Then print.accept(10); method prints 10 on to the console. </p><p><br></p><p>Check the code of andThen method defined in Consumer interface to understand it better. </p>", "answers": ["11", "10", "1", "Compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP82153</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Consumer;\n\nclass Counter {\n    static int count = 1;\n}\npublic class Test {\n    public static void main(String[] args) {\n        Consumer&lt;Integer&gt; add = i -&gt; Counter.count += i;\n        Consumer&lt;Integer&gt; print = System.out::println;\n        add.andThen(print).accept(10); //Line n1\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP82153Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.Consumer;\n\nclass Counter {\n    static int count = 1;\n}\npublic class Test {\n    public static void main(String[] args) {\n        Consumer&lt;Integer&gt; add = i -&gt; Counter.count += i;\n        Consumer&lt;Integer&gt; print = System.out::println;\n        add.andThen(print).accept(10); //Line n1\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527712, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP22062: </strong></p><p>Though the lambda expression with 2 arrows seems confusing but it is correct syntax. To understand, Line n1 can be re-written as: </p><pre class=\"prettyprint linenums\">DoubleFunction&lt;DoubleUnaryOperator&gt; func = (m) -&gt; {\n    return (n) -&gt; {\n        return m + n;\n    };\n};</pre><p><br></p><p>And corresponding anonymous class syntax is: </p><pre class=\"prettyprint linenums\">DoubleFunction&lt;DoubleUnaryOperator&gt; func = new DoubleFunction&lt;DoubleUnaryOperator&gt;() {\n    @Override\n    public DoubleUnaryOperator apply(double m) {\n        DoubleUnaryOperator duo = new DoubleUnaryOperator() {\n            @Override\n            public double applyAsDouble(double n) {\n                return m + n;\n            }\n        };\n        return duo;\n    }\n};</pre><p><br></p><p>So, there is no issue with Line n1. Let's check Line n2.</p><p>'func.apply(11)' returns an instance of DoubleUnaryOperator, in which applyAsDouble(double) method has below implementation:</p><pre class=\"prettyprint linenums\">DoubleUnaryOperator duo = new DoubleUnaryOperator() {\n    @Override\n    public double applyAsDouble(double n) {\n        return 11 + n;\n    }\n};</pre><p><br></p><p>And hence, when applyAsDouble(24) is invoked on above instance of DoubleUnaryOperator, then it returns the result of 11 + 24, which is 35 and as return type is double, so 35.0 is returned.</p>", "answers": ["22.0", "48.0", "35.0", "Line n1 causes compilation error", "Line n2 causes compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22062</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.DoubleFunction;\nimport java.util.function.DoubleUnaryOperator;\n\npublic class Test {\n    public static void main(String[] args) {\n        DoubleFunction&lt;DoubleUnaryOperator&gt; func = m -&gt; n -&gt; m + n; //Line n1\n        System.out.println(func.apply(11).applyAsDouble(24)); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP22062Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.DoubleFunction;\nimport java.util.function.DoubleUnaryOperator;\n\npublic class Test {\n    public static void main(String[] args) {\n        DoubleFunction&lt;DoubleUnaryOperator&gt; func = m -&gt; n -&gt; m + n; //Line n1\n        System.out.println(func.apply(11).applyAsDouble(24)); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527714, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP25580: </strong></p><p>Stream.of() returns blank stream. As Type of stream is specified, stream is of 'Stream&lt;StringBuilder&gt;', each element of the stream is considered to be of 'StringBuilder' type. </p><p>map method in this case accepts `Function&lt;? super StringBuilder, ? extends StringBuilder&gt;`. </p><p>In Lambda expression `s -&gt; s.reverse()`, s is of StringBuilder type and hence no compilation error. </p><p>As stream is blank, hence map and forEach methods are not executed even once. Program executes fine but nothing is printed on to the console. </p>", "answers": ["Compilation error", "NullPointerException is thrown at runtime", "ClassCastException is thrown at runtime", "Program executes successfully but nothing is printed on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP25580</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;StringBuilder&gt; stream = Stream.of();\n        stream.map(s -&gt; s.reverse())\n                .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP25580Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;StringBuilder&gt; stream = Stream.of();\n        stream.map(s -&gt; s.reverse())\n                .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527716, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", ""], "explanation": "<p><strong>UKOCP27770: </strong></p><p>Method signatures: </p><p>boolean anyMatch(Predicate&lt;? super T&gt;) : Returns true if any of the stream element matches the given Predicate. If stream is empty, it returns false and predicate is not evaluated.&nbsp; </p><p><br></p><p>boolean allMatch(Predicate&lt;? super T&gt;) : Returns true if all the stream elements match the given Predicate. If stream is empty, it returns true and predicate is not evaluated.&nbsp; </p><p><br></p><p>boolean noneMatch(Predicate&lt;? super T&gt;) : Returns true if none of the stream element matches the given Predicate. If stream is empty, it returns true and predicate is not evaluated. </p><p><br></p><p>In the given code, </p><p>Stream.generate(() -&gt; new Double(\"1.0\")).limit(10); =&gt; returns a Stream&lt;Double&gt; containing 10 elements and each element is 1.0. </p><p><br></p><p>stream.filter(d -&gt; d &gt; 2) =&gt; returns an empty stream as given predicate is not true for even 1 element. </p><p><br></p><p>allMatch method, when invoked on empty stream, returns true. </p>", "answers": ["false", "true"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP27770</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Stream.generate(() -&gt; Double.valueOf(\"1.0\"))\n                                                                .limit(10);\n        System.out.println(stream.filter(d -&gt; d &gt; 2)\n                                    .allMatch(d -&gt; d == 2));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP27770Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Stream.generate(() -&gt; Double.valueOf(\"1.0\"))\n                                                                .limit(10);\n        System.out.println(stream.filter(d -&gt; d &gt; 2)\n                                    .allMatch(d -&gt; d == 2));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527718, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP24274: </strong></p><p>`(i1, i2) -&gt; i2.compareTo(i1)` helps to sort in descending order. Code is: 'i2.compareTo(i1)' and not 'i1.compareTo(i2)'. </p><p><br></p><p>comp.reversed() returns a Comparator for sorting in ascending order. Hence, the output is: </p><p>-9 8 23 42 55 </p>", "answers": ["55 42 23 8 -9 ", "-9 8 23 42 55 ", "55 23 -9 8 42 ", "42 8 -9 23 55 "], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP24274</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Comparator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Comparator&lt;Integer&gt; comp = (i1, i2) -&gt; i2.compareTo(i1);\n        Stream&lt;Integer&gt; stream = Stream.of(55, 23, -9, 8, 42);\n        stream.sorted(comp.reversed())\n            .forEach(i -&gt; System.out.print(i + \" \"));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP24274Given code: package com.udayankhattry.ocp;\n\nimport java.util.Comparator;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Comparator&lt;Integer&gt; comp = (i1, i2) -&gt; i2.compareTo(i1);\n        Stream&lt;Integer&gt; stream = Stream.of(55, 23, -9, 8, 42);\n        stream.sorted(comp.reversed())\n            .forEach(i -&gt; System.out.print(i + \" \"));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527720, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP37089: </strong></p><p>orElseThrow throws the instance of provided Exception if optional is empty. </p><p><br></p><p>In this case optional is an empty OptionalDouble, hence an instance of MyException is thrown at runtime. </p><p><br></p><p>NOTE: There are 3 primitive equivalents of Optional&lt;T&gt; class available. Remember their similarity with Optional&lt;T&gt; class. </p><p><br></p><p>Optional&lt;T&gt;: </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; empty() </p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; of\u200b(T value)</p><p>+ static &lt;T&gt; Optional&lt;T&gt;&nbsp; &nbsp; ofNullable\u200b(T value) **</p><p>+ T&nbsp; &nbsp; &nbsp;get()</p><p>+ T&nbsp; &nbsp; &nbsp;orElse\u200b(T other)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseGet\u200b(Supplier&lt;? extends T&gt; supplier)</p><p>+ T&nbsp; &nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; T&nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(Consumer&lt;? super T&gt; action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(Consumer&lt;? super T&gt; action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ Stream&lt;T&gt;&nbsp; &nbsp; &nbsp;stream()</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp;or\u200b(Supplier&lt;? extends Optional&lt;? extends T&gt;&gt; supplier) **</p><p>+ Optional&lt;T&gt;&nbsp; &nbsp; &nbsp; &nbsp;filter\u200b(Predicate&lt;? super T&gt; predicate) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;map\u200b(Function&lt;? super T,\u200b? extends U&gt; mapper) **</p><p>+ &lt;U&gt; Optional&lt;U&gt;&nbsp; &nbsp;flatMap\u200b(Function&lt;? super T,\u200b? extends Optional&lt;? extends U&gt;&gt; mapper) **</p><p><br></p><p><br></p><p>OptionalInt: </p><p>+ static OptionalInt&nbsp; &nbsp; empty()</p><p>+ static OptionalInt&nbsp; &nbsp; of\u200b(int value)</p><p>+ int&nbsp; &nbsp;getAsInt()</p><p>+ int&nbsp; &nbsp;orElse\u200b(int other)</p><p>+ int&nbsp; &nbsp;orElseGet\u200b(IntSupplier supplier)</p><p>+ int&nbsp; &nbsp;orElseThrow()</p><p>+ &lt;X extends Throwable&gt; int&nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(IntConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(IntConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ IntStream&nbsp; &nbsp; &nbsp;stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalLong: </p><p>+ static OptionalLong&nbsp; &nbsp;empty()</p><p>+ static OptionalLong&nbsp; &nbsp;of\u200b(long value)</p><p>+ long&nbsp; getAsLong()</p><p>+ long&nbsp; orElse\u200b(long other)</p><p>+ long&nbsp; orElseGet\u200b(LongSupplier supplier)</p><p>+ long&nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; long&nbsp; &nbsp; &nbsp; &nbsp;orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(LongConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(LongConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ LongStream&nbsp; &nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type]. </p><p><br></p><p><br></p><p>OptionalDouble: </p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;empty()</p><p>+ static OptionalDouble&nbsp; &nbsp; &nbsp;of\u200b(double value)</p><p>+ double&nbsp; &nbsp; getAsDouble()</p><p>+ double&nbsp; &nbsp; orElse\u200b(double other)</p><p>+ double&nbsp; &nbsp; orElseGet\u200b(DoubleSupplier supplier)</p><p>+ double&nbsp; &nbsp; orElseThrow()</p><p>+ &lt;X extends Throwable&gt; double&nbsp; orElseThrow\u200b(Supplier&lt;? extends X&gt; exceptionSupplier)</p><p>+ void&nbsp; ifPresent\u200b(DoubleConsumer action)</p><p>+ void&nbsp; ifPresentOrElse\u200b(DoubleConsumer action, Runnable emptyAction)</p><p>+ boolean&nbsp; &nbsp;isEmpty()</p><p>+ boolean&nbsp; &nbsp;isPresent()</p><p>+ DoubleStream&nbsp; stream()</p><p>[ofNullable, or, filter, map, faltMap methods are not available in primitive type].</p>", "answers": ["null", "An instance of NoSuchElementException is thrown at runtime", "An instance of RuntimeException is thrown at runtime", "An instance of MyException is thrown at runtime", "An instance of NullPointerException is thrown at runtime", "Compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP37089</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.OptionalDouble;\n\nclass MyException extends RuntimeException{}\n\npublic class Test {\n    public static void main(String[] args) {\n        OptionalDouble optional = OptionalDouble.empty();\n        System.out.println(optional.orElseThrow(MyException::new));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP37089Given code: package com.udayankhattry.ocp;\n\nimport java.util.OptionalDouble;\n\nclass MyException extends RuntimeException{}\n\npublic class Test {\n    public static void main(String[] args) {\n        OptionalDouble optional = OptionalDouble.empty();\n        System.out.println(optional.orElseThrow(MyException::new));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527722, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP43753: </strong></p><p>stream =&gt; [9, 2, 1, 8, 9, 2, 9] {Sequential ordered stream}</p><p><br></p><p>distinct() method of Stream returns the Stream object containing unique elements.</p><p>For ordered streams, the selection of distinct elements is stable (for duplicated elements, the element appearing first in the encounter order is preserved.)</p><p><br></p><p>stream.distinct() =&gt; [9, 2, 1, 8]</p><p>map(i -&gt; \"\" + i) =&gt; [\"9\", \"2\", \"1\", \"8\"]</p><p>collect(Collectors.joining()) =&gt; \"9218\".</p>", "answers": ["1829", "9821", "1289", "2189", "9218"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP43753</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        var stream = Stream.of(9, 2, 1, 8, 9, 2, 9);\n        System.out.println(stream.distinct()\n            .map(i -&gt; \"\" + i)\n            .collect(Collectors.joining())\n        );\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["e"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP43753Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        var stream = Stream.of(9, 2, 1, 8, 9, 2, 9);\n        System.out.println(stream.distinct()\n            .map(i -&gt; \"\" + i)\n            .collect(Collectors.joining())\n        );\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527724, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP21506: </strong></p><p>Variables 'str1' and 'str2' infer to String type.</p><p>reduce method in Stream class is declared as: T reduce(T identity, BinaryOperator&lt;T&gt; accumulator)</p><p>By checking the reduce method, 'reduce(\"\", String::concat)', we can say that: </p><p>Identity is String type, accumulator is BinaryOperator&lt;String&gt; type. </p><p><br></p><p>'String::concat' is equivalent to lambda expression '(s1, s2) -&gt; s1.concat(s2);'.</p><p><br></p><p>To get consistent output, there are requirements for reduce method arguments:</p><p>1. For each element 't' of the stream, accumulator.apply(identity, t) is equal to t. </p><p>&nbsp; &nbsp;For 1st element of the stream, \"S\" accumulator.apply(\"\", \"S\") results in \"S\", which is equal to \"S\" and hence 1st rule is followed.&nbsp; </p><p><br></p><p>2. The accumulator operator (concat) in this case must be associative and stateless. </p><p>&nbsp; &nbsp;concat is associative as (s1.concat(s2)).concat(s3) equals to s1.concat(s2.concat(s3)). Given method reference syntax is stateless as well. </p><p>&nbsp; &nbsp;</p><p>As both the rules are followed, hence reduce will give the same result for both sequential and parallel stream. </p>", "answers": ["It will always print true", "It will always print false", "Output cannot be predicted"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP21506</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var str1 = List.of(\"S\", \"P\", \"O\", \"R\", \"T\").stream()\n            .reduce(\"\", String::concat);\n        var str2 = List.of(\"S\", \"P\", \"O\", \"R\", \"T\").parallelStream()\n            .reduce(\"\", String::concat);\n        System.out.println(str1.equals(str2));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP21506Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var str1 = List.of(\"S\", \"P\", \"O\", \"R\", \"T\").stream()\n            .reduce(\"\", String::concat);\n        var str2 = List.of(\"S\", \"P\", \"O\", \"R\", \"T\").parallelStream()\n            .reduce(\"\", String::concat);\n        System.out.println(str1.equals(str2));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527726, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP44623: </strong></p><p>Variable 'es' infers to ExecutorService type.</p><p>ExecutorService interface extends Executor interface and it has `void execute(Runnable command);'. Runnable is a Functional interface which has single abstract method `public abstract void run();`.&nbsp; &nbsp;</p><p><br></p><p>Given lambda expression, `() -&gt; \"HELLO\"` returns a String and it doesn't match with the implementation of run() method whose return type is void. Hence it causes compilation error. </p><p><br></p><p>Return type of execute method is void, hence another reason for compilation error is that result of ex.execute(...) cannot be assigned to Future&lt;String&gt;. </p>", "answers": ["Compilation error", "null", "HELLO", "An exception is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP44623</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        Future&lt;String&gt; f = es.execute(() -&gt; \"HELLO\");\n        System.out.println(f.get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP44623Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        Future&lt;String&gt; f = es.execute(() -&gt; \"HELLO\");\n        System.out.println(f.get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527728, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP42867: </strong></p><p>AtomicInteger overrides toString() method hence when ai is passed to println method, its value is printed. </p><p><br></p><p>`ai.addAndGet(1)` first adds 1 (10+1) and returns 11. 'ai' also prints 11.&nbsp; </p><p>`ai.getAndAdd(1)` first returns 10 and then adds 1.&nbsp; </p><p>`ai.getAndIncrement()` first returns 10 and then adds 1.&nbsp; </p><p>`ai.incrementAndGet()` increments the value by 1 (10+1) and returns 11.&nbsp; </p><p>`ai.incrementAndGet(1)` causes compilation failure.&nbsp; </p><p>`ai.get()` returns the current value of ai.&nbsp; </p>", "answers": ["<p><code>System.out.println(ai.addAndGet(1) + \":\" + ai);</code> </p>", "<p><code>System.out.println(ai.getAndAdd(1) + \":\" + ai.get());</code> </p>", "<p><code>System.out.println(ai.getAndIncrement() + \":\" + ai.get());</code> </p>", "<p><code>System.out.println(ai.incrementAndGet() + \":\" + ai.get());</code> </p>", "<p><code>System.out.println(ai.incrementAndGet(1) + \":\" + ai.get());</code> </p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP42867</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.atomic.AtomicInteger;\n\npublic class Test {\n    public static void main(String [] args) {\n        var ai = new AtomicInteger(10);\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following statements, if used to replace /*INSERT*/, will print '11:11' on to the console? </p><p>Choose 2 options. </p>"}, "correct_response": ["a", "d"], "section": "8.4 Concurrency: Locks", "question_plain": "Question ID: UKOCP42867Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.atomic.AtomicInteger;\n\npublic class Test {\n    public static void main(String [] args) {\n        var ai = new AtomicInteger(10);\n        /*INSERT*/\n    }\n}Which of the following statements, if used to replace /*INSERT*/, will print '11:11' on to the console? Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71527658, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP42543: </strong></p><p>Both fName and lName are of String reference type. fName refers to \"Joshua\" and lName refers to \"Bloch\". </p><p>In System.out.println() statement, we have used assignment operator (=) and not equality operator (==). So result is never boolean. </p><p>fName = lName means copy the contents of lName to fName. </p><p>As lName is referring to \"Bloch\" and so after the assignment, fName starts referring to \"Bloch\" as well. </p><p>System.out.println() finally prints the String referred by fName, which is \"Bloch\". </p><p>As this option is is not available, hence correct answer is \"None of the other options\"</p>", "answers": ["Compilation error", "false", "true", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP42543</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String fName = \"Joshua\";\n        String lName = \"Bloch\";\n        System.out.println(fName = lName);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP42543Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String fName = \"Joshua\";\n        String lName = \"Bloch\";\n        System.out.println(fName = lName);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527732, "assessment_type": "multiple-choice", "prompt": {"answers": ["NoSuchFileException is thrown at runtime", "FileNotFoundException is thrown at runtime", "F:\\A\\B\\Book.java", "F:\\A\\B\\C\\Book.java", "C:\\classes\\Book.java", "C:\\Book.java"], "feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP45923</strong></p><p><br></p><p>F: is accessible for reading and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java</pre><p>'Book.java' file is available under 'C' directory.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">import java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var file = Paths.get(\"Book.java\");\n        System.out.println(file.toAbsolutePath());\n    }\n}</pre><p>Actual path of generated class file is: \"C:\\classes\\Test.class\".</p><p><br></p><p>Current working directory is \"C:\\classes\\\"</p><p><br></p><p>And the command:</p><p><code>java Test</code></p><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP45923: </strong></p><p>Variable 'file' infers to Path type.</p><p>Paths.get(\"Book.java\"); represents a relative path. This means relative to current directory.&nbsp; </p><p><br></p><p>Current working directory is \"C:\\classes\", hence path of 'Book.java' is calculated relative to 'C:\\classes'.&nbsp; </p><p><br></p><p>file.toAbsolutePath() returns 'C:\\classes\\Book.java'.&nbsp; </p><p><br></p><p>NOTE: toAbsolutePath() method doesn't care if given path elements are physically available or not. It just returns the absolute path. </p>"}, "correct_response": ["e"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP45923F: is accessible for reading and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java'Book.java' file is available under 'C' directory.Given code of Test.java file: import java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var file = Paths.get(\"Book.java\");\n        System.out.println(file.toAbsolutePath());\n    }\n}Actual path of generated class file is: \"C:\\classes\\Test.class\".Current working directory is \"C:\\classes\\\"And the command:java TestWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527734, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP28599: </strong></p><p>`Files.createDirectory(path);` creates the farthest directory element but all parents must exist. </p><p><br></p><p>In this case, createDirectory method tries to create 'Z' directory under F:\\X\\Y. </p><p><br></p><p>F:\\X exists but F:\\X\\Y doesn't exist and hence NoSuchFileException is thrown at runtime. </p>", "answers": ["Directory Y will be created under X and directory Z will be created under Y", "Only directory Y will be created under X", "An exception is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP28599</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500X</pre><p>Directory X exists under F:.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var path = Paths.get(\"F:\\\\X\\\\Y\\\\Z\");\n        Files.createDirectory(path);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["c"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP28599F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500XDirectory X exists under F:.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var path = Paths.get(\"F:\\\\X\\\\Y\\\\Z\");\n        Files.createDirectory(path);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527736, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP23753: </strong></p><p>There are 2 ResultSet concur types: CONCUR_READ_ONLY and CONCUR_UPDATABLE. </p>", "answers": ["CONCUR_WRITE_ONLY", "CONCUR_READ_WRITE", "CONCUR_READ_ONLY", "CONCUR_BOTH"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP23753</strong></p><p><br></p><p>Which of the following is a valid ResultSet concur type?</p>"}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP23753Which of the following is a valid ResultSet concur type?", "related_lectures": []}, {"_class": "assessment", "id": 71527738, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP79322: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>execute(String) method of Statement can accept all types of queries. It returns true if the first result is a ResultSet object; false if it is an update count or there are no results. </p><p><br></p><p>DELETE sql query returns the no. of deleted records, which is not a ResultSet hence record is deleted from the database and false is returned. </p>", "answers": ["0", "1", "true", "false"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP79322</strong></p><p><br></p><p>Given structure of MESSAGES table:</p><p><code>MESSAGES (msg1 varchar(100), msg2 varchar(100))</code></p><p><br></p><p>MESSAGES table contains below records: </p><p><code>'Happy New Year!', 'Happy Holidays!'</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"DELETE FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement())\n        {\n            System.out.println(stmt.execute(query));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP79322Given structure of MESSAGES table:MESSAGES (msg1 varchar(100), msg2 varchar(100))MESSAGES table contains below records: 'Happy New Year!', 'Happy Holidays!'Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"DELETE FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement())\n        {\n            System.out.println(stmt.execute(query));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527740, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP46896: </strong></p><p>Variable 'loc' infers to Locale type.</p><p>setDefault(Locale) is a static method defined inside Locale class but static method can be invoked using instance reference as well. </p><p><br></p><p>Compiler changes `loc.setDefault(loc);` to `Locale.setDefault(loc);`. </p><p><br></p><p>Line 8 doesn't cause any compilation error and on execution it sets the default locale to it_IT. </p><p><br></p><p>Hence, `Locale.getDefault()` will always return it_IT.</p>", "answers": ["Code compiles and executes successfully and prints it_IT on to the console", "Line 8 causes compilation failure", "Code compiles and execute successfully but may print text other than it_IT"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP46896</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = new Locale(\"it\", \"IT\"); //Line 7\n        loc.setDefault(loc); //Line 8\n        System.out.println(Locale.getDefault());\n    }\n}</pre><p><br></p><p>Which of the following statement is correct about above code?</p>"}, "correct_response": ["a"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP46896Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = new Locale(\"it\", \"IT\"); //Line 7\n        loc.setDefault(loc); //Line 8\n        System.out.println(Locale.getDefault());\n    }\n}Which of the following statement is correct about above code?", "related_lectures": []}, {"_class": "assessment", "id": 71527742, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP23301: </strong></p><p>`NumberFormat.getIntegerInstance();` returns an integer number format for the current default FORMAT locale. The returned number format is configured to round floating point numbers to the nearest integer using half-even rounding for formatting, and to parse only the integer part of an input string.</p><p><br></p><p>nf.parse(\"10.49\") returns 10</p><p>nf.parse(\"10.50\") returns 10</p><p>nf.parse(\"10.51\") returns 10</p><p><br></p><p>Stream.of(nf.parse(\"10.49\"), nf.parse(\"10.50\"), nf.parse(\"10.51\")) =&gt; Stream&lt;Number&gt;[10, 10, 10]</p><p>map(x -&gt; \"\" + x) =&gt; Stream&lt;String&gt;[10, 10, 10]</p><p>forEachOrdered(System.out::print) =&gt; 101010</p>", "answers": ["101111", "101011", "101010", "32", "31", "30"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP23301</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\nimport java.text.ParseException;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String [] args) throws ParseException {\n        var nf = NumberFormat.getIntegerInstance();\n        Stream.of(nf.parse(\"10.49\"), nf.parse(\"10.50\"), nf.parse(\"10.51\"))\n             .map(x -&gt; \"\" + x)\n             .forEachOrdered(System.out::print);\n\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "12.3 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP23301Given code: package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\nimport java.text.ParseException;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String [] args) throws ParseException {\n        var nf = NumberFormat.getIntegerInstance();\n        Stream.of(nf.parse(\"10.49\"), nf.parse(\"10.50\"), nf.parse(\"10.51\"))\n             .map(x -&gt; \"\" + x)\n             .forEachOrdered(System.out::print);\n\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527744, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP86064: </strong></p><p>There are 3 constants available in the RetentionPolicy enum: SOURCE, CLASS and RUNTIME.</p><p>RetentionPolicy.ALL doesn't exist.</p><p><br></p><p>Retention policy defaults to RetentionPolicy.CLASS</p>", "answers": ["RetentionPolicy.SOURCE", "RetentionPolicy.CLASS", "RetentionPolicy.RUNTIME", "RetentionPolicy.ALL"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP86064</strong></p><p><br></p><p>If no Retention annotation is present on an annotation type declaration, the retention policy defaults to _________________.</p>"}, "correct_response": ["b"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP86064If no Retention annotation is present on an annotation type declaration, the retention policy defaults to _________________.", "related_lectures": []}, {"_class": "assessment", "id": 71527746, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP67770: </strong></p><p>Based on the statement: \"This class must be accessible across packages and users should be able to create instances of MagicSpell class.\", we have below points:</p><p>- MagicSpell class must be public (accessible across packages)</p><p>- Constructor of MagicSpell class must be public (users should be able to create instances of MagicSpell class, across packages)</p><p>- cast() method of MagicSpell class must be public (as it will be invoked across packages)</p><p><br></p><p>`new MagicSpell().cast();` prints either ACCIO or LUMOS or ALOHOMORA</p><p>Users can create the sub-class of MagicSpell class and change the functionality of cast() method. For example, </p><p>`new MagicSpell() {public void cast() {System.out.println(\"AVADA KEDAVRA\");}}.cast();` would print AVADA KEDAVRA.</p><p><br></p><p>Issue here is that users can override the cast() method, and to restrict it, best solution would be to declare cast() method with final modifier. Hence, Line n4 should be: `public final void cast() {`. </p><p>But as this option is not available, hence we'll have to go with next best option, which is to mark the class MagicSpell final. </p><p>Hence, correct option is: </p><p>Change Line n1 to `public final class MagicSpell {`</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 4-5 / EXTEND-5: Limit the extensibility of classes and methods</p>", "answers": ["Nothing needs to be done, invoking cast() method will always print expected output", "Change Line n1 to `public final class MagicSpell {`", "Change Line n3 to `private MagicSpell() {}`", "Change Line n4 to `private void cast() {`", "Change Line n4 to `final void cast() {`"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67770</strong></p><p><br></p><p>Given code of MagicSpell.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Random;\n\npublic class MagicSpell { //Line n1\n    private final String [] spells = {\"ACCIO\", \"LUMOS\", \"ALOHOMORA\"}; //Line n2\n    \n    public MagicSpell() {} //Line n3\n    \n    public void cast() { //Line n4\n        System.out.println(spells[new Random().nextInt(3)]);\n    }\n}</pre><p>This class must be accessible across packages and users should be able to create instances of MagicSpell class. </p><p><br></p><p>What needs to be done, such that invoking cast() method must print either ACCIO or LUMOS or ALOHOMORA?</p>"}, "correct_response": ["b"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP67770Given code of MagicSpell.java file: package com.udayankhattry.ocp;\n\nimport java.util.Random;\n\npublic class MagicSpell { //Line n1\n    private final String [] spells = {\"ACCIO\", \"LUMOS\", \"ALOHOMORA\"}; //Line n2\n    \n    public MagicSpell() {} //Line n3\n    \n    public void cast() { //Line n4\n        System.out.println(spells[new Random().nextInt(3)]);\n    }\n}This class must be accessible across packages and users should be able to create instances of MagicSpell class. What needs to be done, such that invoking cast() method must print either ACCIO or LUMOS or ALOHOMORA?", "related_lectures": []}, {"_class": "assessment", "id": 71527748, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP40286: </strong></p><p>By default, all the Java modules are dependent on java.base module. There is no need to have 'requires' directive in the module descriptor file (module-info.java) for java.base module.</p>", "answers": ["java.se", "java.base", "java.lang", "java.compiler", "java.logging"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP40286</strong></p><p><br></p><p>Platform module ___________, is the most important module and every Java module requires it implicitly.</p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP40286Platform module ___________, is the most important module and every Java module requires it implicitly.", "related_lectures": []}, {"_class": "assessment", "id": 71527750, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP44677: </strong></p><p>Format of javac command is: </p><p>javac &lt;options&gt; &lt;source files&gt;</p><p><br></p><p>Below are the important options (related to modules) of javac command:</p><p>--module-source-path &lt;module-source-path&gt;: </p><p>Specify where to find input source files for multiple modules. In this case, module source path is 'src' directory. </p><p><br></p><p>--module &lt;module-name&gt;, -m &lt;module-name&gt;: </p><p>Compile only the specified module. This will compile all *.java file specified in the module. Multiple module names are separated by comma.</p><p><br></p><p>-d &lt;directory&gt;: </p><p>Specify where to place generated class files. In this case, it is 'bin' directory. Please note generated class files will be arranged in package-wise directory structure. </p><p><br></p><p>--module-path &lt;path&gt;, -p &lt;path&gt;: </p><p>Specify where to find compiled/packaged application modules. It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries. For example, javac -p mods;singlemodule;connector.jar represents a module path which contains all the modules inside 'mods' directory, exploded module 'singlemodule' and modular jar 'connector.jar'. </p><p>It is not used in this case as given module is not dependent upon other compiled/packaged application modules.</p><p><br></p><p>Let's check all the commands one by one: </p><p><code>javac -d bin --module-source-path src --module x</code></p><p>\u2717&nbsp; Module descriptor of module 'x' doesn't have 'requires y;' directive, hence this command will compile all the java files of module 'x' only.</p><p><br></p><p><code>javac -d bin --module-source-path src --module y</code></p><p>\u2713&nbsp; Module descriptor of module 'y' has 'requires x;' directive, so it will compile both the modules 'y' and 'x'. </p><p><br></p><p><code>javac -d bin --module-source-path src --module *</code></p><p>\u2717&nbsp; Wild-card (*) is not valid, multiple module names are separated by comma.</p><p><br></p><p><code>javac -d bin --module-source-path src --module x;y</code></p><p>\u2717&nbsp; x;y is not valid, multiple module names are separated by comma. If you replace 'x;y' with 'x,y', then both the modules will compile.</p>", "answers": ["<p><code>javac -d bin --module-source-path src --module x</code> </p>", "<p><code>javac -d bin --module-source-path src --module y</code> </p>", "<p><code>javac -d bin --module-source-path src --module *</code> </p>", "<p><code>javac -d bin --module-source-path src --module x;y</code> </p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP44677</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   +---x\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---circus\n|   |               Animal.java\n|   |               Lion.java\n|   |\n|   \\---y\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---circus\n|               \\---tricks\n|                       Tricks.java\n|\n\\---bin</pre><p><br></p><p>Below are the file details:-</p><p>C:\\src\\x\\com\\circus\\Animal.java:</p><pre class=\"prettyprint linenums\">package com.circus;\n\npublic abstract class Animal {\n    public abstract void eat();\n}</pre><p><br></p><p>C:\\src\\x\\com\\circus\\Lion.java:</p><pre class=\"prettyprint linenums\">package com.circus;\n\npublic class Lion extends Animal {\n    @Override\n    public void eat() {\n        System.out.println(\"Lion eats meat\");\n    }\n}</pre><p><br></p><p>C:\\src\\x\\module-info.java:</p><pre class=\"prettyprint linenums\">module x {\n    exports com.circus;\n}</pre><p><br></p><p>C:\\src\\y\\com\\circus\\tricks\\Tricks.java:</p><pre class=\"prettyprint linenums\">package com.circus.tricks;\n\nimport com.circus.*;\n\npublic class Tricks {\n    public static void main(String... args) {\n        doTricks(new Lion());\n    }\n    \n    private static void doTricks(Animal animal) {\n        animal.eat();\n    }\n}</pre><p><br></p><p>C:\\src\\y\\module-info.java:</p><pre class=\"prettyprint linenums\">module y {\n    requires x;\n}</pre><p><br></p><p>Which of following commands if executed from C:\\ will compile both the modules x and y?</p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP44677Given below the directory/file structure on Windows platform: C:\n+---src\n|   +---x\n|   |   |   module-info.java\n|   |   |\n|   |   \\---com\n|   |       \\---circus\n|   |               Animal.java\n|   |               Lion.java\n|   |\n|   \\---y\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---circus\n|               \\---tricks\n|                       Tricks.java\n|\n\\---binBelow are the file details:-C:\\src\\x\\com\\circus\\Animal.java:package com.circus;\n\npublic abstract class Animal {\n    public abstract void eat();\n}C:\\src\\x\\com\\circus\\Lion.java:package com.circus;\n\npublic class Lion extends Animal {\n    @Override\n    public void eat() {\n        System.out.println(\"Lion eats meat\");\n    }\n}C:\\src\\x\\module-info.java:module x {\n    exports com.circus;\n}C:\\src\\y\\com\\circus\\tricks\\Tricks.java:package com.circus.tricks;\n\nimport com.circus.*;\n\npublic class Tricks {\n    public static void main(String... args) {\n        doTricks(new Lion());\n    }\n    \n    private static void doTricks(Animal animal) {\n        animal.eat();\n    }\n}C:\\src\\y\\module-info.java:module y {\n    requires x;\n}Which of following commands if executed from C:\\ will compile both the modules x and y?", "related_lectures": []}, {"_class": "assessment", "id": 71527752, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP80717: </strong></p><p>Logic in secret_one.jar is to take the source string \"ADTETFAECNKD\" and print the alternate characters starting at index 0, hence it prints ATTACK</p><p>and </p><p>Logic in secret_two.jar is to take the source string \"ADTETFAECNKD\" and print the alternate characters starting at index 1, hence it prints DEFEND</p><p> </p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional.&nbsp; </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>When multiple modules with the same name are in different jar files on the module path, first module is selected and rest of the modules with same name are ignored. As first modular jar file in module path is 'secret_two.jar', hence com.udayankhattry.ocp.Secret class defined in secret_two.jar file executes, which prints DEFEND on to the console.</p>", "answers": ["ATTACK", "DEFEND", "It causes error because of the duplicate modules found"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP80717</strong></p><p><br></p><p>You have below two modular jars available on your windows system:</p><p>1. C:\\jars\\jar1\\secret_one.jar</p><p>Module name is 'secret' and it contains 'com.udayankhattry.ocp.Secret' class, corresponding java source has below code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Secret {\n    public static void main(String... args) {\n        var str = \"ADTETFAECNKD\";\n        for(int i = 0; i &lt; str.length(); i+=2) {\n            System.out.print(str.charAt(i));\n        }\n    }\n}</pre><p><br></p><p>2. C:\\jars\\jar2\\secret_two.jar</p><p>Module name is 'secret' and it contains 'com.udayankhattry.ocp.Secret' class, corresponding java source has below code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Secret {\n    public static void main(String... args) {\n        var str = \"ADTETFAECNKD\";\n        for(int i = 1; i &lt; str.length(); i+=2) {\n            System.out.print(str.charAt(i));\n        }\n    }\n}</pre><p><br></p><p>What will be the result of executing below command from C:\\?</p><p><code>java -p jars\\jar2\\secret_two.jar;jars\\jar1\\secret_one.jar -m secret/com.udayankhattry.ocp.Secret</code> </p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP80717You have below two modular jars available on your windows system:1. C:\\jars\\jar1\\secret_one.jarModule name is 'secret' and it contains 'com.udayankhattry.ocp.Secret' class, corresponding java source has below code:package com.udayankhattry.ocp;\n\npublic class Secret {\n    public static void main(String... args) {\n        var str = \"ADTETFAECNKD\";\n        for(int i = 0; i &lt; str.length(); i+=2) {\n            System.out.print(str.charAt(i));\n        }\n    }\n}2. C:\\jars\\jar2\\secret_two.jarModule name is 'secret' and it contains 'com.udayankhattry.ocp.Secret' class, corresponding java source has below code:package com.udayankhattry.ocp;\n\npublic class Secret {\n    public static void main(String... args) {\n        var str = \"ADTETFAECNKD\";\n        for(int i = 1; i &lt; str.length(); i+=2) {\n            System.out.print(str.charAt(i));\n        }\n    }\n}What will be the result of executing below command from C:\\?java -p jars\\jar2\\secret_two.jar;jars\\jar1\\secret_one.jar -m secret/com.udayankhattry.ocp.Secret", "related_lectures": []}, {"_class": "assessment", "id": 71527702, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP60726: </strong></p><p>Deque's add() method invokes addLast(E) method and remove() method invokes removeFirst() method. </p><p><br></p><p>chars.add('A'); =&gt; [A],&nbsp; </p><p>chars.remove(); =&gt; [],&nbsp; </p><p>chars.remove(); =&gt; No elements left to remove() and hence java.util.NoSuchElementException is thrown at runtime. </p>", "answers": ["[]", "[A]", "Runtime Exception"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP60726</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayDeque;\nimport java.util.Deque;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Character&gt; chars = new ArrayDeque&lt;&gt;();\n        chars.add('A');\n        chars.remove();\n        chars.remove();\n\n        System.out.println(chars);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP60726Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayDeque;\nimport java.util.Deque;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Character&gt; chars = new ArrayDeque&lt;&gt;();\n        chars.add('A');\n        chars.remove();\n        chars.remove();\n\n        System.out.println(chars);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527656, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP46906</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Password\" + 1 + 2 + 3 + 4);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP46906: </strong></p><p>As expression contains + operator only, which is left to right associative. Let us group the expression.</p><p>\"Password\" + 1 + 2 + 3 + 4 </p><p>= (\"Password\" + 1) + 2 + 3 + 4</p><p>= ((\"Password\" + 1) + 2) + 3 + 4</p><p>= (((\"Password\" + 1) + 2) + 3) + 4</p><p>[Let us solve it now, + operator with String behaves as concatenation operator.]</p><p>= ((\"Password1\" + 2) + 3) + 4</p><p>= (\"Password12\" + 3) + 4</p><p>= \"Password123\" + 4</p><p>= \"Password1234\"</p>", "answers": ["Password10", "Password19", "Password1234", "Password 10"]}, "correct_response": ["c"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP46906Given code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Password\" + 1 + 2 + 3 + 4);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527660, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP67831: </strong></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Based on above points:</p><p>Snippet 1 compiles successfully and on execution prints \"1. null::null\" on to the console.</p><p>Snippet 2 compiles successfully and on execution prints \"2. \" on to the console.</p><p>Snippet 3 compiles successfully and on execution throws NullPointerException as elements refer to null</p><p>Snippet 4 causes compilation error as `String.join(\".\", null)` is an ambiguous call and compiler is not sure about which overloaded join(...) method should be tagged for this call.</p>", "answers": ["Snippet 1 compiles successfully", "Snippet 2 compiles successfully", "Snippet 3 compiles successfully", "Snippet 4 compiles successfully", "Snippet 1 throws runtime exception", "Snippet 2 throws runtime exception", "<p>Snippet 3 throws runtime exception</p>", "<p>Snippet 4 throws runtime exception</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67831</strong></p><p><br></p><p>Consider below 4 code snippets:</p><p>1. </p><pre class=\"prettyprint linenums\">String [] arr1 = {null, null};\nSystem.out.println(\"1. \" + String.join(\"::\", arr1));</pre><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">String [] arr2 = {};\nSystem.out.println(\"2. \" + String.join(\"-\", arr2));</pre><p><br></p><p>3. </p><pre class=\"prettyprint linenums\">String [] arr3 = null;\nSystem.out.println(\"3. \" + String.join(\".\", arr3));</pre><p><br></p><p>4.</p><p><code>System.out.println(\"4. \" + String.join(\".\", null));</code></p><p><br></p><p>Which of the following statements are correct about above snippets? </p><p>Choose 4 options. </p>"}, "correct_response": ["a", "b", "c", "g"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP67831Consider below 4 code snippets:1. String [] arr1 = {null, null};\nSystem.out.println(\"1. \" + String.join(\"::\", arr1));2. String [] arr2 = {};\nSystem.out.println(\"2. \" + String.join(\"-\", arr2));3. String [] arr3 = null;\nSystem.out.println(\"3. \" + String.join(\".\", arr3));4.System.out.println(\"4. \" + String.join(\".\", null));Which of the following statements are correct about above snippets? Choose 4 options.", "related_lectures": []}, {"_class": "assessment", "id": 71527662, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP21636: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>For Line n1, x infers to String type. </p><p>For Line n2, y infers to int type.</p><p>As, x is of String type and y is of int type, hence x + y results in \"100100\".</p><p><br></p><p>For more information on local variable type inference, please check the URL: http://openjdk.java.net/jeps/286</p>", "answers": ["Only Line n1 causes compilation error", "Only Line n2 causes compilation error", "Only Line n3 causes compilation error", "Only Line n1 and Line n3 cause compilation error", "Line n1, Line n2 and Line n3 cause compilation error", "Code compiles successfully and prints 200 on to the console", "<p>Code compiles successfully and prints 100100 on to the console</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP21636</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var x = \"100\"; //Line n1\n        var y = 100; //Line n2\n        System.out.println(x + y); //Line n3\n    }\n}</pre><p><br></p><p>What is the result of compiling and executing Test class?</p>"}, "correct_response": ["g"], "section": "1.6 Working with data types: Local variable type inference", "question_plain": "Question ID: UKOCP21636Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var x = \"100\"; //Line n1\n        var y = 100; //Line n2\n        System.out.println(x + y); //Line n3\n    }\n}What is the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527664, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP38015: </strong></p><p>Even though char is compatible with int type but '3' is not equal to 3.</p><p>int day = 3; =&gt; SORRY!!! NO SALE</p><p>Integer day = 3; =&gt; day is of Integer type and case contains char '3'. char '3' cannot be compared with Integer and hence compilation error. case '3' can easily be compared with int value but not with Integer type. </p><p>int day = '3'; =&gt; BUY 2 GET 1 FREE&nbsp; </p><p><br></p><p>HINT: There is no need to remember. case '3' value means you are trying to equate or compare day (Integer value) with '3' (char). If assignment operation works then method invocation, switch expression parameter etc. will also work. Integer day = 3; is possible but Integer day = '3'; causes compilation error as char cannot be converted to Integer.</p>", "answers": ["<p><code>int day = 3;</code> </p>", "<p><code>Integer day = 3;</code> </p>", "<p><code>int day = '3';</code> </p>", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP38015</strong></p><p><br></p><p>Given: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        switch(day) {\n            case '3':\n                System.out.println(\"BUY 2 GET 1 FREE\");\n                break;\n            default:\n                System.out.println(\"SORRY!!! NO SALE\");\n        }\n    }\n}</pre><p><br></p><p>For the class Test, which of the following options, if used to replace /*INSERT*/, will print \"BUY 2 GET 1 FREE\" on to the console?</p>"}, "correct_response": ["c"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP38015Given: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        switch(day) {\n            case '3':\n                System.out.println(\"BUY 2 GET 1 FREE\");\n                break;\n            default:\n                System.out.println(\"SORRY!!! NO SALE\");\n        }\n    }\n}For the class Test, which of the following options, if used to replace /*INSERT*/, will print \"BUY 2 GET 1 FREE\" on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71527666, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP22906: </strong></p><p>No syntax error in the given code. </p><p>Initially, i = 1, j = 5 and k = 0.</p><p>1st iteration of A: i = 2.</p><p>&nbsp; &nbsp; 1st iteration of B: j = 4.</p><p>&nbsp; &nbsp; &nbsp; &nbsp; 1st iteration of C: k = k + i + j = 0 + 2 + 4 = 6. `i == j` evaluates to false and `i &gt; j` also evaluates to false, hence else block gets executed. `continue B` takes the control to the loop B.</p><p>&nbsp; &nbsp; 2nd iteration of B: j = 3.</p><p>&nbsp; &nbsp; &nbsp; &nbsp; 1st iteration of C: k = k + i + j = 6 + 2 + 3 = 11. `i == j` evaluates to false and `i &gt; j` also evaluates to false, hence else block gets executed. `continue B` takes the control to the loop B.</p><p>&nbsp; &nbsp; 3rd iteration of B: j = 2.</p><p>&nbsp; &nbsp; &nbsp; &nbsp; 1st iteration of C: k = k + i + j = 11 + 2 + 2 = 15. `i == j` evaluates to true, control breaks out of the loop A.</p><p><br></p><p>`System.out.println(k);` prints 15 on to the console.</p>", "answers": ["Compilation error", "Program never terminates as above code causes infinite loop", "6", "11", "15", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22906</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var i = 1;\n        var j = 5;\n        var k = 0;\n        A: while(true) {\n            i++;\n            B: while(true) {\n                j--;\n                C: while(true) {\n                    k += i + j;\n                    if(i == j)\n                        break A;\n                    else if (i &gt; j)\n                        continue A;\n                    else \n                        continue B;\n                }\n            }\n        }\n        System.out.println(k);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["e"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP22906Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var i = 1;\n        var j = 5;\n        var k = 0;\n        A: while(true) {\n            i++;\n            B: while(true) {\n                j--;\n                C: while(true) {\n                    k += i + j;\n                    if(i == j)\n                        break A;\n                    else if (i &gt; j)\n                        continue A;\n                    else \n                        continue B;\n                }\n            }\n        }\n        System.out.println(k);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527668, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP65605: </strong></p><p>To refer to inner class name from outside the top level class, use the syntax: outer_class.inner_class.</p><p>In this case, correct syntax to refer B from Test class is: A.B and not B.</p>", "answers": ["12", "21", "2", "1", "Compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP65605</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass A {\n    A() {\n        System.out.print(1);\n    }\n    class B {\n        B() {\n            System.out.print(2);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        B obj = new A().new B();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP65605Given code:package com.udayankhattry.ocp;\n\nclass A {\n    A() {\n        System.out.print(1);\n    }\n    class B {\n        B() {\n            System.out.print(2);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        B obj = new A().new B();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527670, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP71060: </strong></p><p>Variable 'obj' infers to anonymous inner class implementing Logger interface. The anonymous inner class correctly overrides get() and log() methods. Both these methods can be invoked on reference variable 'obj' as it is of anonymous inner class type.</p><p>get() method returns the currently executing instance of anonymous inner class, which implements Logger interface. Hence, instance returned by obj.get() method will always be subtype of Logger interface. </p><p>Given code compiles succes
