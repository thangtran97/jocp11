  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 102740973, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP31888</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        StringBuilder sb = new StringBuilder(\"INHALE \");\n        String s = sb.toString() + (sb.append(\"EXHALE \"));\n        System.out.println(s.strip().length());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP31888: </strong></p><p>Initially sb refers to {\"INHALE \"}</p><p>Given Statement: </p><p>String s = sb.toString() + (sb.append(\"EXHALE \"));</p><p>String s = \"INHALE \" + (sb.append(\"EXHALE \")); //Left operand of + operator is evaluated first, sb --&gt; {\"INHALE \"}</p><p>String s = \"INHALE \" + {\"INHALE EXHALE \"}; //Right operand of + operator is evaluated next, sb --&gt; {\"INHALE EXHALE \"}</p><p>String s = \"INHALE \" + \"INHALE EXHALE \"; //As left operand is of String type, so + operator behaves as concatenation operator and that is why toString() method on right operand (which is StringBuilder object referred by 'sb') is invoked.</p><p>String s = \"INHALE INHALE EXHALE \"; //String object referred by 's' has 21 characters.</p><p><br></p><p>strip() method of String class (available since Java 11) returns a string whose value is this string, with all leading and trailing white space removed.</p><p>To find out what is white space character in Java, check Character.isWhitespace\u200b(int) method, you will find below: </p><p>A character is a Java whitespace character if and only if it satisfies one of the following criteria:</p><p>It is a Unicode space character (SPACE_SEPARATOR, LINE_SEPARATOR, or PARAGRAPH_SEPARATOR) but is not also a non-breaking space ('\\u00A0', '\\u2007', '\\u202F').</p><p>It is '\\t', U+0009 HORIZONTAL TABULATION.</p><p>It is '\\n', U+000A LINE FEED.</p><p>It is '\\u000B', U+000B VERTICAL TABULATION.</p><p>It is '\\f', U+000C FORM FEED.</p><p>It is '\\r', U+000D CARRIAGE RETURN.</p><p>It is '\\u001C', U+001C FILE SEPARATOR.</p><p>It is '\\u001D', U+001D GROUP SEPARATOR.</p><p>It is '\\u001E', U+001E RECORD SEPARATOR.</p><p>It is '\\u001F', U+001F UNIT SEPARATOR. </p><p><br></p><p>White space character in java includes space character along with above characters. </p><p><br></p><p>As s refers to \"INHALE INHALE EXHALE \" [contains 21 characters], hence s.strip() creates a new String object by trimming trailing space character: \"INHALE INHALE EXHALE\" [contains 20 characters].</p><p><br></p><p>Hence, `System.out.println(s.strip().length());` prints 20 on to the console.</p>", "answers": ["21", "20", "28", "27", "24", "23", "<p>18</p>", "<p>17</p>"]}, "correct_response": ["b"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP31888Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        StringBuilder sb = new StringBuilder(\"INHALE \");\n        String s = sb.toString() + (sb.append(\"EXHALE \"));\n        System.out.println(s.strip().length());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102740975, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP46496</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Boolean [] arr = new Boolean[2];\n        System.out.println(arr[0] + \":\" + arr[1]);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": [], "links": [], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP46496: </strong></p><p>Array elements are initialized to their default values. </p><p>'arr' is referring to an array of Boolean type, which is reference type and hence both the array elements are initialized to null and therefore in the output null:null is printed.</p>", "answers": ["An Exception is thrown at runtime", "true:true", "false:false", "null:null"]}, "correct_response": ["d"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP46496Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Boolean [] arr = new Boolean[2];\n        System.out.println(arr[0] + \":\" + arr[1]);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102740977, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75465</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"Dream BIG\");\n        String s1 = sb.toString();\n        String s2 = sb.toString();\n        \n        System.out.println(s1 == s2);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "true", "false", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP75465: </strong></p><p>toString() method defined in StringBuilder class doesn't use String literal rather uses the constructor of String class to create the instance of String class. </p><p><br></p><p>So both 's1' and 's2' refer to different String instances even though their contents are same. s1 == s2 returns false.</p>"}, "correct_response": ["c"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP75465Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"Dream BIG\");\n        String s1 = sb.toString();\n        String s2 = sb.toString();\n        \n        System.out.println(s1 == s2);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740979, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP33613</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int grade = 60;\n        if(grade = 60)\n            System.out.println(\"You passed...\");\n        else\n            System.out.println(\"You failed...\");\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["You passed...", "You failed...", "Compilation error", "Produces no output"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP33613: </strong></p><p>Following are allowed in boolean expression of if statement:</p><p>1. Any expression whose result is either true or false. e.g. age &gt; 20&nbsp; </p><p>2. A boolean variable. e.g. flag&nbsp; </p><p>3. A boolean literal: true or false&nbsp; </p><p>4. A boolean assignment. e.g. flag = true&nbsp; </p><p><br></p><p>boolean expression in this case is: (grade = 60), which is an int assignment and not boolean assignment. Hence, Compilation error.</p>"}, "correct_response": ["c"], "section": "2.1 Controlling Program Flow: if/else", "question_plain": "Question ID: UKOCP33613Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int grade = 60;\n        if(grade = 60)\n            System.out.println(\"You passed...\");\n        else\n            System.out.println(\"You failed...\");\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740981, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP76772</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        for(var var = 0; var &lt;= 2; var++){} //Line n1\n        System.out.println(var); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["0", "2", "3", "Compilation error at Line n1", "Compilation error at Line n2"], "feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP76772: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier 'var' is not a keyword, hence 'var' can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p>At Line n1, initialization expression of for loop is: `var var = 0;`. Java compiler automatically infers 'var' to be of int type as right side expression is int literal.</p><p><br></p><p>Variable 'var' is declared inside for loop, hence it is not accessible beyond loop's body. Line n2 causes compilation error.</p><p><br></p><p>For more information on local variable type inference, please check the URL: http://openjdk.java.net/jeps/286</p>"}, "correct_response": ["e"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP76772Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        for(var var = 0; var &lt;= 2; var++){} //Line n1\n        System.out.println(var); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740971, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP53688</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">public class Test {\n&nbsp; &nbsp; public static void main(String[] args) {\n&nbsp; &nbsp; &nbsp; &nbsp; byte b1 = (byte) (127 + 21);\n&nbsp; &nbsp; &nbsp; &nbsp; System.out.println(b1);\n&nbsp; &nbsp; }\n}</pre>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["148", "Compilation error", "-108", "128"], "explanation": "<p><strong>UKOCP53688: </strong></p><p>127 + 21 = 148 (int type: 32-bits) = 00000000 00000000 00000000 10010100&nbsp; </p><p>Above binary number is positive, as left most bit is 0.&nbsp; </p><p>Same binary number after type-casting to byte (8-bits): 10010100, negative number as left most bit is 1.&nbsp; </p><p>There is only one negative number in the option and hence -108 is the correct answer.</p><p>Binary 10010100 = -108.</p>"}, "correct_response": ["c"], "section": "1.1 Working with data types: Primitive types", "question_plain": "Question ID: UKOCP53688What will be the result of compiling and executing Test class?public class Test {\n&nbsp; &nbsp; public static void main(String[] args) {\n&nbsp; &nbsp; &nbsp; &nbsp; byte b1 = (byte) (127 + 21);\n&nbsp; &nbsp; &nbsp; &nbsp; System.out.println(b1);\n&nbsp; &nbsp; }\n}", "related_lectures": []}, {"_class": "assessment", "id": 102741045, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP26391</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student implements Serializable {\n    private transient String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Lucy\", 22);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}</pre><p><br></p><p>There is full permission to list/create/delete files and directories in C:.</p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Compilation error", "Runtime Exception", "Lucy : 22", "null : 22", "null : 0"], "explanation": "<p><strong>UKOCP26391: </strong></p><p>Variable 'stud' infers to Student type, variable 'objOutputStream' infers to ObjectOutputStream type and variable 'objInputStream' infers to ObjectInputStream type.</p><p>writeObject(Object obj) method of ObjectOutputStream throws IOException.</p><p>readObject() method of ObjectInputStream throws IOException, ClassNotFoundException. </p><p>main(String []) method declares to throw these 2 exceptions.</p><p>Given code compiles successfully. </p><p><br></p><p>Student class implements Serializable, hence objects of Student class can be serialized using ObjectOutputStream. </p><p><br></p><p>State of transient and static fields are not persisted. </p><p><br></p><p>While de-serializing, transient fields are initialized to default values (null for reference type and respective Zeros for primitive types) and static fields refer to current value. </p><p><br></p><p>In this case, name is transient, so it is not persisted. On de-serializing, null is printed for name and 22 is printed for age. </p>"}, "correct_response": ["d"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP26391Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student implements Serializable {\n    private transient String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Lucy\", 22);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}There is full permission to list/create/delete files and directories in C:.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741027, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP46039</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"EARTH\", \"MOON\", \"SUN\", \"PLUTO\"};\n        var list = /*INSERT*/;\n        list.set(3, \"JUPITER\"); //Line n1\n        list.forEach(str -&gt; System.out.println(str)); //Line n2\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that output is:</p><p>EARTH</p><p>MOON</p><p>SUN</p><p>JUPITER</p><p><br></p><p>Choose 2 options.</p>", "answers": ["<p><code>List.of(arr)</code> </p>", "<p><code>Arrays.asList(arr)</code> </p>", "<p><code>new ArrayList&lt;&gt;(List.of(arr))</code> </p>", "<p><code>ArrayList.of(arr)</code> </p>", "<p><code>new ArrayList&lt;&gt;(ArrayList.of(arr))</code> </p>"], "feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP46039: </strong></p><p>Arrays.asList(...) method returns a fixed-size list backed by the specified array and as list is backed by the specified array therefore, you cannot add or remove elements from this list. Using add/remove methods cause an exception at runtime. But you can invoke the set(int index, E element) method on the returned list.</p><p>This behavior is bit different from the List.of(...) method, which returns unmodifiable list, hence calling add/remove/set methods on the unmodifiable list throws an exception at runtime.</p><p><br></p><p>Iterable&lt;T&gt; interface has forEach(Consumer&lt;? super T&gt;) method. List&lt;E&gt; extends Collection&lt;E&gt; &amp; Collection&lt;E&gt; extends Iterable&lt;E&gt;, therefore forEach(Consumer) can easily be invoked on reference variable of List&lt;E&gt; type.</p><p>As Consumer is a Functional Interface, hence a lambda expression can be passed as argument to forEach() method.&nbsp; </p><p>forEach(Consumer) method performs the given action for each element of the Iterable until all elements have been processed or the action throws an exception.</p><p><br></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>If you replace /*INSERT*/ with List.of(arr), then for the statement `var list = List.of(arr);`, list refers to a List of String type.</p><p><br></p><p>Let's check all the options one by one:</p><p><code>List.of(arr)</code></p><p>\u2717&nbsp; Line n1 will throw an exception at runtime.</p><p><br></p><p><code>Arrays.asList(arr)</code></p><p>\u2713&nbsp; set(...) method can be invoked on the list object returned by Arrays.asList(arr) method. Line n1 will change the last list element from \"PLUTO\" to \"JUPITER\". Line n2 will display the expected output.</p><p><br></p><p><code>new ArrayList&lt;&gt;(List.of(arr))</code> </p><p>\u2713&nbsp; It constructs the ArrayList instance containing the elements of the specified collection (list object returned by List.of(arr)). This ArrayList object is not backed by the passed collection and hence can be modified without any issues. Line n1 will change the last list element from \"PLUTO\" to \"JUPITER\". Line n2 will display the expected output.</p><p><br></p><p><code>ArrayList.of(arr)</code></p><p>\u2717&nbsp; static overloaded methods of(...) were added to List interface in Java 9 and can only be invoked by using List.of(...). This statement causes compilation error.</p><p><br></p><p><code>new ArrayList&lt;&gt;(ArrayList.of(arr))</code> </p><p>\u2717&nbsp; static overloaded methods of(...) were added to List interface in Java 9 and can only be invoked by using List.of(...). This statement causes compilation error.</p>"}, "correct_response": ["b", "c"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP46039Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"EARTH\", \"MOON\", \"SUN\", \"PLUTO\"};\n        var list = /*INSERT*/;\n        list.set(3, \"JUPITER\"); //Line n1\n        list.forEach(str -&gt; System.out.println(str)); //Line n2\n    }\n}Which of the following options can replace /*INSERT*/ such that output is:EARTHMOONSUNJUPITERChoose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741043, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP87788</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        var optional = Optional.ofNullable(System.console());\n        if(optional.isPresent()) {\n            System.out.println(optional.get());\n        }\n    }\n}</pre><p><br></p><p>Which of the following statement are correct regarding above code?</p>", "answers": ["Above code will never throw NullPointerException", "Above code may throw NullPointerException", "Above code will always print some output on to the console"], "feedbacks": ["", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP87788: </strong></p><p>Two cases are possible:</p><p>1. If JVM is associated with the Console (such as running above code from command prompt/window):</p><p>System.console() will return the Console object, optional.isPresent() will return true and System.out.println(optional.get()); will print the Console reference (such as java.io.Console@48140564).</p><p><br></p><p>2. If JVM is not associated with the Console (such as running above code from an IDE or online):</p><p>System.console() will return null and Optional.ofNullable(System.console()); returns an EMPTY Optional.</p><p>For EMPTY optional, optional.isPresent() returns false and System.out.println(optional.get()); will not get executed. So you may not get any output in this case.</p><p><br></p><p>In both the cases, optional reference will always refer to some Optional object and will never be null. NullPointerException can't be thrown by calling methods on optional reference. </p>"}, "correct_response": ["a"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP87788Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        var optional = Optional.ofNullable(System.console());\n        if(optional.isPresent()) {\n            System.out.println(optional.get());\n        }\n    }\n}Which of the following statement are correct regarding above code?", "related_lectures": []}, {"_class": "assessment", "id": 102741041, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP17025</strong></p><p><br></p><p>Given code of Adder.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.ForkJoinPool;\nimport java.util.concurrent.RecursiveTask;\n\npublic class Adder {\n    private static long LIMIT = 1000000000;\n    private static final int THREADS = 100;\n\n    static class AdderTask extends RecursiveTask&lt;Long&gt; {\n        long from, to;\n\n        public AdderTask(long from, long to) {\n            this.from = from;\n            this.to = to;\n        }\n\n        @Override\n        protected Long compute() {\n            if ((to - from) &lt;= LIMIT/THREADS) {\n                long localSum = 0;\n                for(long i = from; i &lt;= to; i++) {\n                    localSum += i;\n                }\n                return localSum;\n            }\n            else {\n                long mid = (from + to) / 2;\n                AdderTask first = new AdderTask(from, mid);\n                AdderTask second = new AdderTask(mid + 1, to);\n                first.fork();\n                /*INSERT*/\n            }\n        }\n    }\n\n    public static void main(String[] args) {\n        ForkJoinPool pool = new ForkJoinPool(THREADS);\n        long sum = pool.invoke(new AdderTask(1, LIMIT));\n        System.out.printf(\"sum of the number from %d to %d is %d %n\", 1, LIMIT, sum);\n    }\n}</pre><p><br></p><p>Which of the following statement, if used to replace /*INSERT*/, will EFFICIENTLY add the numbers from 1 to 1000000000?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p><code>return first.join() + second.compute();</code> </p>", "<p><code>return second.compute() + first.join();</code> </p>", "<p><code>return first.join();</code> </p>", "<p><code>return second.compute();</code> </p>"], "explanation": "<p><strong>UKOCP17025: </strong></p><p>After invoking fork() on 1st subtask, it is necessary to invoke join() on 1st subtask and compute() on 2nd subtask. Hence `return first.join();` and `return second.compute();` are not valid options. </p><p><br></p><p>The order of execution of calling join() and compute() on divided subtasks is important in a fork/join framework. </p><p><br></p><p>For the statement `return first.join() + second.compute();` as join() is called so each task waits for its completion before starting execution of a new thread. Even though you will get the correct output but it is not utilizing the fork/join framework efficiently. </p><p><br></p><p>If you are interested in finding out the time difference then I will suggest to modify main(String[]) method as below and run the program for both the statements separately. </p><p><br></p><pre class=\"prettyprint linenums\">public static void main(String[] args) {\n    LocalTime start = LocalTime.now();\n    ForkJoinPool pool = new ForkJoinPool(THREADS);\n    long sum = pool.invoke(new AdderTask(1, LIMIT));\n    System.out.printf(\"sum of the number from %d to %d is %d %n\", 1, LIMIT, sum);\n    LocalTime end = LocalTime.now();\n    System.out.println(ChronoUnit.NANOS.between(start, end));\n}</pre>"}, "correct_response": ["b"], "section": "8.2 Concurrency: RecursiveTask, RecursiveAction", "question_plain": "Question ID: UKOCP17025Given code of Adder.java file: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.ForkJoinPool;\nimport java.util.concurrent.RecursiveTask;\n\npublic class Adder {\n    private static long LIMIT = 1000000000;\n    private static final int THREADS = 100;\n\n    static class AdderTask extends RecursiveTask&lt;Long&gt; {\n        long from, to;\n\n        public AdderTask(long from, long to) {\n            this.from = from;\n            this.to = to;\n        }\n\n        @Override\n        protected Long compute() {\n            if ((to - from) &lt;= LIMIT/THREADS) {\n                long localSum = 0;\n                for(long i = from; i &lt;= to; i++) {\n                    localSum += i;\n                }\n                return localSum;\n            }\n            else {\n                long mid = (from + to) / 2;\n                AdderTask first = new AdderTask(from, mid);\n                AdderTask second = new AdderTask(mid + 1, to);\n                first.fork();\n                /*INSERT*/\n            }\n        }\n    }\n\n    public static void main(String[] args) {\n        ForkJoinPool pool = new ForkJoinPool(THREADS);\n        long sum = pool.invoke(new AdderTask(1, LIMIT));\n        System.out.printf(\"sum of the number from %d to %d is %d %n\", 1, LIMIT, sum);\n    }\n}Which of the following statement, if used to replace /*INSERT*/, will EFFICIENTLY add the numbers from 1 to 1000000000?", "related_lectures": []}, {"_class": "assessment", "id": 102741039, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP63353</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(1);\n        System.out.println(es.submit(callable).get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["1", "0", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP63353: </strong></p><p>Variable 'es' infers to ExecutorService type and variable 'callable' infers to MyCallable type.</p><p>get() method throws 2 checked exceptions: InterruptedException and ExecutionException.&nbsp; </p><p><br></p><p>As the given code neither handles these exceptions using catch block nor declares these exceptions in throws clause, hence call to get() method causes compilation failure. </p>"}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP63353Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(1);\n        System.out.println(es.submit(callable).get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741037, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP76209</strong></p><p><br></p><p>Can all streams be converted to parallel stream?</p>", "relatedLectureIds": "", "feedbacks": ["", ""], "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP76209: </strong></p><p>All streams in Java implements BaseStream interface and this interface has parallel() and sequential() methods. Hence all streams can either be parallel or sequential.</p>"}, "correct_response": ["a"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP76209Can all streams be converted to parallel stream?", "related_lectures": []}, {"_class": "assessment", "id": 102741035, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP34813</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.IntSummaryStatistics;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"I am going to pass OCP exam in first attempt\";\n        Stream&lt;String&gt; stream = Arrays.stream(text.split(\" \"));\n        IntSummaryStatistics stat = stream.map(s -&gt; s.length())\n                                            .summaryStatistics();\n        System.out.println(stat.getMax());\n    }\n}</pre><p><br></p><p>Which of the following needs to be done, so that output is 7?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["No need to make any changes, on execution given code prints 7 on to the console", "Replace `text.split(&quot; &quot;)` with `text.split(&quot;,&quot;)`", "Replace `stream.map(s -&gt; s.length())` with `stream.mapToInt(s -&gt; s.length())`", "Replace `stat.getMax()` with `stat.getCount()`"], "explanation": "<p><strong>UKOCP34813: </strong></p><p>text.split(\" \") =&gt; {\"I\", \"am\", \"going\", \"to\", \"pass\", \"OCP\", \"exam\", \"in\", \"first\", \"attempt\"}.&nbsp; </p><p>Arrays.stream(text.split(\" \")); =&gt; [\"I\", \"am\", \"going\", \"to\", \"pass\", \"OCP\", \"exam\", \"in\", \"first\", \"attempt\"]. Stream&lt;String&gt; instance is returned.&nbsp; </p><p>stream.map(s -&gt; s.length()) =&gt; [1, 2, 5, 2, 4, 3, 4, 2, 5, 7]. Stream&lt;Integer&gt; is returned.&nbsp; </p><p><br></p><p>summaryStatistics() method is declared in IntStream, LongStream and DoubleStream interfaces but not declared in Stream&lt;Integer&gt; interface and hence `stream.map(s -&gt; s.length()).summaryStatistics();` causes compilation failure. </p><p><br></p><p>Out of the given options, replacing `stream.map(s -&gt; s.length())` with `stream.mapToInt(s -&gt; s.length())` will correctly return an instance of IntStream and hence summaryStatistics() method can easily be invoked. </p><p><br></p><p>As you had to select only one option, so you can stop here. No need to validate other options. I am explaining other options just for knowledge purpose.</p><p><br></p><p>stat.getCount() will return 10 so not a correct option. </p><p><br></p><p>text.split(\" \") delimits the text on the basis of single space. text.split(\",\") will delimit it on the basis of comma but as no comma is present in the given text, hence whole text will be returned and stat.getMax() will print 44. </p>"}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP34813Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.IntSummaryStatistics;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        String text = \"I am going to pass OCP exam in first attempt\";\n        Stream&lt;String&gt; stream = Arrays.stream(text.split(\" \"));\n        IntSummaryStatistics stat = stream.map(s -&gt; s.length())\n                                            .summaryStatistics();\n        System.out.println(stat.getMax());\n    }\n}Which of the following needs to be done, so that output is 7?", "related_lectures": []}, {"_class": "assessment", "id": 102741033, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP58014</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\"> package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream.range(1, 10)\n            .forEach(System.out::print);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["123456789", "12345678910", "13579", "246810"], "explanation": "<p><strong>UKOCP58014: </strong></p><p>IntStream.range(int start, int end) =&gt; start is inclusive and end is exclusive and incremental step is 1. So, stream consists of value from 1 to 9 and these values are printed by forEach method. </p><p><br></p><p>NOTE: For IntStream.rangeClosed(int start, int end), both start and end are inclusive. </p>"}, "correct_response": ["a"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP58014Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream.range(1, 10)\n            .forEach(System.out::print);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741031, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP86952</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Arrays;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(Arrays.asList(\"Z\", \"Y\", \"X\"));\n        list.stream()\n            .sorted()\n            .findFirst()\n            .get();\n        System.out.println(list.get(2));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["X", "Y", "Z", "Runtime Exception"], "explanation": "<p><strong>UKOCP86952: </strong></p><p>findFirst() will never return empty Optional if stream is not empty. So no exception for get() method. </p><p>Also list and stream are not connected, which means operations done on stream doesn't affect the source, in this case list. </p><p>list.get(2) will print 'X' on to the console. </p>"}, "correct_response": ["a"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP86952Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Arrays;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(Arrays.asList(\"Z\", \"Y\", \"X\"));\n        list.stream()\n            .sorted()\n            .findFirst()\n            .get();\n        System.out.println(list.get(2));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741029, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP13124</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Jack\", 10000),\n            new Employee(\"Lucy\", 12000));\n        employees.stream()\n            .peek(e -&gt; e.setSalary(e.getSalary() + 1000))\n            .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>{Jack, 10000.0}</p><p>{Lucy, 12000.0}</p>", "<p>{Jack, 11000.0}</p><p>{Lucy, 13000.0}</p>", "<p>{Lucy, 12000.0}</p><p>{Jack, 10000.0}</p>", "<p>{Lucy, 13000.0}</p><p>{Jack, 11000.0}</p>"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP13124: </strong></p><p>employees.stream() =&gt; [{\"Jack\",10000.0},{\"Lucy\",12000.0}]. </p><p><br></p><p>peek(e -&gt; e.setSalary(e.getSalary() + 1000)) =&gt; [{\"Jack\",11000.0},{\"Lucy\",13000.0}]. </p><p>peek(Consumer) method applies the passed lambda expression to all the elements of the stream and returns the same elements in the stream. </p><p><br></p><p>forEach(System.out::println); =&gt; Prints both the elements of the stream. </p><p><br></p><p>Arrays.asList(...) method returns sequential List object, so order of elements remain same. </p><p><br></p><p>Output is: </p><p>{Jack, 11000.0}</p><p>{Lucy, 13000.0}</p><p><br></p><p>NOTE: peek() method is for debugging the streams and should not be used in production ready code. </p>"}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP13124Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Jack\", 10000),\n            new Employee(\"Lucy\", 12000));\n        employees.stream()\n            .peek(e -&gt; e.setSalary(e.getSalary() + 1000))\n            .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741069, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP12105</strong></p><p><br></p><p>You have below modular jar file: </p><p>C:\\modules\\test.jar</p><p><br></p><p>META-INF\\MANIFEST.MF file has below entries: </p><p>Manifest-Version: 1.0</p><p>Created-By: 11.0 (udayankhattry.com)</p><p>Main-Class: com.udayankhattry.ocp.Main</p><p><br></p><p>com.udayankhattry.ocp.Main class has been generated from below Main.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        System.out.println(\"BREAK THE ICE\");\n    }\n}</pre><p><br></p><p>And the command executed from C:\\</p><p><code>java -p modules -m com.udayankhattry.modularity</code></p><p>It prints BREAK THE ICE on to the console</p><p><br></p><p>You have executed below command form C:\\ to create the runtime image:</p><p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity&nbsp; --launcher run=com.udayankhattry.modularity --output messenger</code></p><p><br></p><p>And the commands executed from C:\\</p><p>1. messenger\\bin\\run</p><p>2. messenger\\bin\\java -m com.udayankhattry.modularity</p><p>3. messenger\\bin\\run com.udayankhattry.ocp.Main</p><p>4. messenger\\bin\\java -m com.udayankhattry.modularity/com.udayankhattry.ocp.Main</p><p>5. messenger\\run</p><p><br></p><p>How many of the above commands will print BREAK THE ICE on to the console?</p>", "answers": ["All five commands", "Only 4 commands", "Only 3 commands", "Only 2 commands", "Only 1 command", "None of the given commands"], "feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP12105: </strong></p><p>jlink command places all the executables inside 'bin' sub-directory of the image. In this case directory 'C:\\messenger\\bin' will contain java and run (name of the launcher) executables. </p><p><br></p><p>Let's check all the commands: </p><p>1. messenger\\bin\\run</p><p>\u2713&nbsp; As in the jlink command, option --launcher run=com.udayankhattry.modularity has been used, so it creates executable 'run', which is a shortcut of executing this module.</p><p><br></p><p>2. messenger\\bin\\java -m com.udayankhattry.modularity</p><p>\u2713&nbsp; Valid syntax to execute the module.</p><p><br></p><p>3. messenger\\bin\\run com.udayankhattry.ocp.Main</p><p>\u2713&nbsp; Though it looks wrong, but it is valid and will display expected output. \"com.udayankhattry.ocp.Main\" is considered as command-line argument and is ignored by the code of Main.java file.</p><p><br></p><p>4. messenger\\bin\\java -m com.udayankhattry.modularity/com.udayankhattry.ocp.Main</p><p>\u2713&nbsp; META-INF\\MANIFEST.MF of test.jar has an entry for the main class, Main-Class: com.udayankhattry.ocp.Main. Hence, specifying only the module name is enough (as in command number 2), but you can specify fully qualified name of the class as well.</p><p><br></p><p>5. messenger\\run</p><p>\u2717&nbsp; Path of executable 'run' is 'C:\\messenger\\bin\\run' and not 'C:\\messenger\\run'.</p><p><br></p><p>Hence, out of five commands, only four commands will print expected output. </p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP12105You have below modular jar file: C:\\modules\\test.jarMETA-INF\\MANIFEST.MF file has below entries: Manifest-Version: 1.0Created-By: 11.0 (udayankhattry.com)Main-Class: com.udayankhattry.ocp.Maincom.udayankhattry.ocp.Main class has been generated from below Main.java file: package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        System.out.println(\"BREAK THE ICE\");\n    }\n}And the command executed from C:\\java -p modules -m com.udayankhattry.modularityIt prints BREAK THE ICE on to the consoleYou have executed below command form C:\\ to create the runtime image:jlink --module-path modules --add-modules com.udayankhattry.modularity&nbsp; --launcher run=com.udayankhattry.modularity --output messengerAnd the commands executed from C:\\1. messenger\\bin\\run2. messenger\\bin\\java -m com.udayankhattry.modularity3. messenger\\bin\\run com.udayankhattry.ocp.Main4. messenger\\bin\\java -m com.udayankhattry.modularity/com.udayankhattry.ocp.Main5. messenger\\runHow many of the above commands will print BREAK THE ICE on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 102741047, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP21944</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u251c\u2500\u2500\u2500A\n\u2502   \u2514\u2500\u2500\u2500B\n\u2502           Book.java\n\u2502\n\u2514\u2500\u2500\u2500B\n        abc.txt</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var src = Paths.get(\"F:\\\\A\\\\B\");\n        var tgt = Paths.get(\"F:\\\\B\");\n        Files.move(src, tgt, StandardCopyOption.REPLACE_EXISTING);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Directory B with its contents will move successfully from &#39;F:\\A\\B&#39; to &#39;F:\\B&#39;", "An exception is thrown at runtime", "Compilation error"], "feedbacks": ["", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP21944: </strong></p><p>Files.move(Path source, Path target, CopyOption... options) method throws following exceptions-&nbsp; </p><p>[Copied from the Javadoc]</p><p>1. UnsupportedOperationException - if the array contains a copy option that is not supported</p><p>2. FileAlreadyExistsException - if the target file exists but cannot be replaced because the REPLACE_EXISTING option is not specified (optional specific exception)</p><p>3. DirectoryNotEmptyException - the REPLACE_EXISTING option is specified but the file cannot be replaced because it is a non-empty directory (optional specific exception)</p><p>4. AtomicMoveNotSupportedException - if the options array contains the ATOMIC_MOVE option but the file cannot be moved as an atomic file system operation.</p><p>5. IOException - if an I/O error occurs</p><p>6. SecurityException - In the case of the default provider, and a security manager is installed, the checkWrite method is invoked to check write access to both the source and target file.</p><p><br></p><p>As target directory is not empty and StandardCopyOption.REPLACE_EXISTING is used hence DirectoryNotEmptyException is thrown at runtime. </p>"}, "correct_response": ["b"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP21944F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u251c\u2500\u2500\u2500A\n\u2502   \u2514\u2500\u2500\u2500B\n\u2502           Book.java\n\u2502\n\u2514\u2500\u2500\u2500B\n        abc.txtGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var src = Paths.get(\"F:\\\\A\\\\B\");\n        var tgt = Paths.get(\"F:\\\\B\");\n        Files.move(src, tgt, StandardCopyOption.REPLACE_EXISTING);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741049, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP84243</strong></p><p><br></p><p>C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:</p><pre class=\"prettyprint linenums\">C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt</pre><p>'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"C:\", \"TEMP\", \"msg\");\n        Files.delete(src);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["The code executes successfully but doesn&#39;t delete anything", "The code executes successfully and deletes symbolic link file &#39;msg&#39;", "The code executes successfully and deletes the file referred by symbolic link &#39;Message.txt&#39;", "<p>The code executes successfully and deletes all the directories and files in the path 'C:\\TEMP\\Parent\\Child\\Message.txt' </p>"], "explanation": "<p><strong>UKOCP84243: </strong></p><p>According to the javadoc comment of delete method, if the file is a symbolic link then the symbolic link itself, not the final target of the link, is deleted.</p>"}, "correct_response": ["b"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP84243C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"C:\", \"TEMP\", \"msg\");\n        Files.delete(src);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741051, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP11777</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) { //Line 12\n                System.out.println(\"ID: \" + rs.getInt(\"ID\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close(); //Line 18\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            ex.printStackTrace();\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p>EMPLOYEE table doesn't have any records.</p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Line 12 throws an exception at runtime", "Line 18 throws an exception at runtime", "<p>Code executes fine and prints following on to the console: </p><p>ID: 0</p><p>First Name: null</p><p>Last Name: null</p><p>Salary: 0.0</p>", "Code executes fine and doesn&#39;t print anything on to the console"], "explanation": "<p><strong>UKOCP11777: </strong></p><p>Variable 'con' infers to Connection type, variable 'query' infers to String type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>Even if there are no records in EMPLOYEE table, ResultSet object returned by `stmt.executeQuery(query);` will never be null. </p><p><br></p><p>`rs.next();` returns false and control doesn't enter while loop. Code executes fine and doesn't print anything on to the console. </p>"}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP11777Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) { //Line 12\n                System.out.println(\"ID: \" + rs.getInt(\"ID\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close(); //Line 18\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            ex.printStackTrace();\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.EMPLOYEE table doesn't have any records.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741053, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP59722</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n        ) {\n            var res1 = stmt.executeQuery(\"SELECT * FROM EMPLOYEE ORDER BY ID\");\n            var res2 = stmt.executeQuery(\"SELECT * FROM EMPLOYEE ORDER BY ID DESC\");\n            res1.next();\n            System.out.println(res1.getInt(1));\n            res2.next();\n            System.out.println(res2.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p>101</p><p>104</p>", "<p>104</p><p>101</p>", "An exception is thrown at runtime", "None of the other options"], "explanation": "<p><strong>UKOCP59722: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type and variable 'stmt' infers to Statement type. Variables 'res1' and 'res2' infer to ResultSet type.</p><p><br></p><p>executeQuery method closes the previously opened ResultSet object on the same Statement object. </p><p><br></p><p>ResultSet object referred by 'res1' gets closed when 2nd executeQuery method is executed. So `res1.next();` throws SQLException at runtime.</p>"}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP59722Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n        ) {\n            var res1 = stmt.executeQuery(\"SELECT * FROM EMPLOYEE ORDER BY ID\");\n            var res2 = stmt.executeQuery(\"SELECT * FROM EMPLOYEE ORDER BY ID DESC\");\n            res1.next();\n            System.out.println(res1.getInt(1));\n            res2.next();\n            System.out.println(res2.getInt(1));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741055, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP24623</strong></p><p><br></p><p>Given code of 4 Java files:</p><pre class=\"prettyprint linenums\">//1. MyResourceBundle.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", \"SURPRISE!\"}};\n        return arr;\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//2. MyResourceBundle_en_CA.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_en_CA extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 12.64}};\n        return arr;\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//3. MyResourceBundle_fr.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_fr extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 1001}};\n        return arr;\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//4. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"IT\"));\n        var loc = new Locale(\"en\", \"US\");\n        var rb = ResourceBundle.getBundle(\"com.udayankhattry.ocp.MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"surprise\"));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["SURPRISE!", "12.64", "1001", "MissingResourceException is thrown at runtime"], "explanation": "<p><strong>UKOCP24623: </strong></p><p>Variable 'loc' infers to Locale type and variable 'rb' infers to ResourceBundle type.</p><p><br></p><p>As all the resource bundles have same key(s), the search order for matching resource bundle is: </p><p>1. com.udayankhattry.ocp.MyResourceBundle_en_US [1st: Complete, en_US].</p><p>2. com.udayankhattry.ocp.MyResourceBundle_en [2nd: Only language, en].</p><p>3. com.udayankhattry.ocp.MyResourceBundle_fr_IT [3rd: Complete Default Locale, fr_IT].</p><p>4. com.udayankhattry.ocp.MyResourceBundle_fr [4th: Language of Default Locale, fr].</p><p>5. com.udayankhattry.ocp.MyResourceBundle [5th: ResourceBundle's name without language or country].</p><p><br></p><p>If search reaches the 5th step and no matching resource bundle is found, then MissingResourceException is thrown at runtime.</p><p><br></p><p>In 4th step, matching resource bundle is found and hence 1001 is printed on to the console.</p>"}, "correct_response": ["c"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP24623Given code of 4 Java files://1. MyResourceBundle.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", \"SURPRISE!\"}};\n        return arr;\n    }\n}//2. MyResourceBundle_en_CA.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_en_CA extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 12.64}};\n        return arr;\n    }\n}//3. MyResourceBundle_fr.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_fr extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 1001}};\n        return arr;\n    }\n}//4. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"IT\"));\n        var loc = new Locale(\"en\", \"US\");\n        var rb = ResourceBundle.getBundle(\"com.udayankhattry.ocp.MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"surprise\"));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741057, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP80759</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.*;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDateTime.of(2025, Month.JANUARY, 1, 10, 10);\n        var formatter = DateTimeFormatter.ofLocalizedDate(FormatStyle.FULL);\n        System.out.println(formatter.format(date));\n    }\n}</pre><p><br></p><p>Will above code display time part on to the console?</p>", "relatedLectureIds": "", "feedbacks": ["", ""], "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP80759: </strong></p><p>DateTimeFormatter.ofLocalizedDate(FormatStyle.FULL); statement returns formatter to format date part. </p><p><br></p><p>date is of LocalDateTime type hence it has both date part and time part. </p><p><br></p><p>`formatter.format(date)` simply formats the date part and ignores time part. </p><p><br></p><p>NOTE: You should aware of other formatter related methods for the exam, such as: 'ofLocalizedTime' and 'ofLocalizedDateTime'</p><p><br></p><p>Please also keep in mind below format styles:</p><p>FormatStyle.FULL =&gt; Full text style, with the most detail. For example, the format might be 'Tuesday, April 12, 1952 AD' or '3:30:42pm PST'.</p><p>FormatStyle.LONG =&gt; Long text style, with lots of detail. For example, the format might be 'January 12, 1952'.</p><p>FormatStyle.MEDIUM =&gt; Long text style, with lots of detail. For example, the format might be 'Jan 12, 1952'.</p><p>FormatStyle.SHORT =&gt; Short text style, typically numeric. For example, the format might be '12.13.52' or '3:30pm'.</p>"}, "correct_response": ["b"], "section": "12.4 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP80759Given code: package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.*;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDateTime.of(2025, Month.JANUARY, 1, 10, 10);\n        var formatter = DateTimeFormatter.ofLocalizedDate(FormatStyle.FULL);\n        System.out.println(formatter.format(date));\n    }\n}Will above code display time part on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 102741059, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP57960</strong></p><p><br></p><p>Suppose, public void print(){} method has been marked with @Log annotation. You would like to include @Log annotation in the generated Javadoc for print() method, what needs to be done?</p>", "answers": ["Nothing, javadoc command by default includes the annotation information", "Add @Documented annotation to Log annotation", "Add @documented annotation to Log annotation", "Add @documented annotation to print() method"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP57960: </strong></p><p>All the annotation marked with @Documented annotation are included in the generated Javadoc by javadoc command. </p><p>@documented is not a valid annotation type.</p>"}, "correct_response": ["b"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP57960Suppose, public void print(){} method has been marked with @Log annotation. You would like to include @Log annotation in the generated Javadoc for print() method, what needs to be done?", "related_lectures": []}, {"_class": "assessment", "id": 102741061, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP53110</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {2, 4, 6, 8, 10};\n        Arrays.stream(arr).forEach(System.out::print); //Line n1\n        System.out.println();\n        Arrays.stream(doubleTheElements(arr)).forEach(System.out::print); //Line n2\n        System.out.println();\n        Arrays.stream(arr).forEach(System.out::print); //Line n3\n    }\n\n    private static int[] doubleTheElements(int... arr1) {\n        int [] copy = arr1;\n        for(int i = 0; i &lt; copy.length; i++) {\n            copy[i] *= 2;\n        }\n        return copy;\n    }\n}</pre><p><br></p><p>Which of the following statements are correct?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Line n1 and Line n2 produce same output", "Line n2 and Line n3 produce same output", "Line n1 and Line n3 produce same output", "Line n1, Line n2 and Line n3 produce same output", "Line n1, Line n2 and Line n3 produce different output"], "explanation": "<p><strong>UKOCP53110: </strong></p><p>Line n1 prints 246810</p><p>Line n2 prints 48121620</p><p><br></p><p>Because at Line n2, method `doubleTheElements(arr)` was invoked and even though the implementation of doubleTheElements(int...) seems to work on the copy of the array, but in reality both variables 'copy' and 'arr' refer to same array object. </p><p>Hence, changes made to the array object referred by 'copy' are also accessible using 'arr'.</p><p>Therefore, Line n3 also prints 48121620</p><p><br></p><p>If you don't want the array object created in main(String []) method to be changed by doubleTheElements(int...) method, then pass the copy of array object at Line n2.</p><p>Arrays.stream(doubleTheElements(arr.clone())).forEach(System.out::print); //Line n2</p><p>In this case, Line n1 and Line n3 would produce same output.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 6-12 / MUTABLE-12: Do not expose modifiable collections</p>"}, "correct_response": ["b"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP53110Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {2, 4, 6, 8, 10};\n        Arrays.stream(arr).forEach(System.out::print); //Line n1\n        System.out.println();\n        Arrays.stream(doubleTheElements(arr)).forEach(System.out::print); //Line n2\n        System.out.println();\n        Arrays.stream(arr).forEach(System.out::print); //Line n3\n    }\n\n    private static int[] doubleTheElements(int... arr1) {\n        int [] copy = arr1;\n        for(int i = 0; i &lt; copy.length; i++) {\n            copy[i] *= 2;\n        }\n        return copy;\n    }\n}Which of the following statements are correct?", "related_lectures": []}, {"_class": "assessment", "id": 102741063, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP57948</strong></p><p><br></p><p>Consider below command executes successfully from C:\\ on Windows environment:</p><p><code>java -p out -m com.teaching.util/com.teaching.util.GradeCalculator</code></p><p><br></p><p>Directory 'out' or its subdirectories don't contain jar file.</p><p>Given command executes successfully.</p><p><br></p><p>Which of the following statements are correct? </p><p>Choose 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Module name is com.teaching.util.GradeCalculator", "Module name is com.teaching.util", "Source files must be available under subdirectories of out directory", "Class files must be available under subdirectories of out directory", "&#39;out&#39; directory must contain a directory named &#39;com.teaching.util&#39;"], "explanation": "<p><strong>UKOCP57948: </strong></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional. </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p><br></p><p>Given command:</p><p>java -p out -m com.teaching.util/com.teaching.util.GradeCalculator</p><p><br></p><p>By looking at the -m option, it can be easily said that module name is 'com.teaching.util' and it contains a package 'com.teaching.util' and this package contains a class GradeCalculator.</p><p><br></p><p>As 'out' directory doesn't contain jar file, this means exploded module is available under 'out'. Hence, all the class files must be available under subdirectories of out directory</p><p><br></p><p>Hence below two statements are correct:</p><p>Module name is com.teaching.util</p><p>Class files must be available under subdirectories of out directory</p><p><br></p><p>Let's check other statements: </p><p>Module name is com.teaching.util.GradeCalculator </p><p>\u2717&nbsp; It is a fully qualified class name and not the module name.</p><p><br></p><p>Source files must be available under subdirectories of out directory </p><p>\u2717&nbsp; It is not a compulsion, source files can reside in other unrelated directory.</p><p><br></p><p>'out' directory must contain a directory named 'com.teaching.util' </p><p>\u2717&nbsp; Not necessary if module was compiled using single-module mode.</p><p>For example, </p><p>Let's check below code structure:</p><pre class=\"prettyprint linenums\">C:\n+---src\n|   \\---mymodule\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---teaching\n|               \\---util\n|                       GradeCalculator.java\n|\n\\---out\n    \\---mymodule</pre><p><br></p><p>And below command successfully compiles the files:</p><p>C:\\&gt;javac -d out\\mymodule src\\mymodule\\com\\teaching\\util\\GradeCalculator.java src\\mymodule\\module-info.java</p><p><br></p><p>Structure after compilation: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   \\---mymodule\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---teaching\n|               \\---util\n|                       GradeCalculator.java\n|\n\\---out\n    \\---mymodule\n        |   module-info.class\n        |\n        \\---com\n            \\---teaching\n                \\---util\n                        GradeCalculator.class</pre><p><br></p><p>Given java command executes fine:</p><p>C:\\&gt;java -p out -m com.teaching.util/com.teaching.util.GradeCalculator</p><p>Grade Calculator [It is because of the System.out.println(\"Grade Calculator\"); statement inside main(String...) method of GradeCalculator class]</p><p><br></p><p>Clearly, Source files are not available under 'out' and 'out' directory doesn't contain 'com.teaching.util' directory.</p>"}, "correct_response": ["b", "d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP57948Consider below command executes successfully from C:\\ on Windows environment:java -p out -m com.teaching.util/com.teaching.util.GradeCalculatorDirectory 'out' or its subdirectories don't contain jar file.Given command executes successfully.Which of the following statements are correct? Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741065, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP65571</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---src\n|   |   [POSITION-1]\n|   |\n|   \\---office\n|       |   [POSITION-2]\n|       |\n|       \\---com\n|           |   [POSITION-3]\n|           |\n|           \\---xyz\n|               +---hr\n|               |   |   Hiring.java\n|               |   |   [POSITION-4]\n|               |   |\n|               |   \\---training\n|               |           JavaTraining.java\n|               |           [POSITION-5]\n|               |\n|               \\---projects\n|                       JavaProject.java\n|\n\\---cls</pre><p><br></p><p>[POSITION-1], [POSITION-2], [POSITION-3], [POSITION-4], [POSITION-5] are possible place holders for module-info.java file.</p><p><br></p><p>Below are the file details:-</p><p>C:\\src\\office\\com\\xyz\\hr\\Hiring.java:</p><pre class=\"prettyprint linenums\">package com.xyz.hr;\n\npublic class Hiring {\n    //Lots of valid codes\n}</pre><p><br></p><p>C:\\src\\office\\com\\xyz\\hr\\training\\JavaTraining.java: </p><pre class=\"prettyprint linenums\">package com.xyz.hr.training;\n\npublic class JavaTraining {\n    //Lots of valid codes\n}</pre><p><br></p><p>C:\\src\\office\\com\\xyz\\projects\\JavaProject.java:</p><pre class=\"prettyprint linenums\">package com.xyz.projects;\n\npublic class JavaProject {\n    //Lots of valid codes\n}\n\nContents of module-info.java:\nmodule office {\n    exports com.xyz.hr.training;\n}</pre><p><br></p><p>And consider the command to be executed from C:\\</p><p><code>javac -d cls --module-source-path src -m office</code></p><p><br></p><p>What should be the location of module-info.java file such that above javac command executes successfully?</p>", "answers": ["[POSITION-1]", "[POSITION-2]", "[POSITION-3]", "[POSITION-4]", "[POSITION-5]"], "feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP65571: </strong></p><p>Though this question looks complex but it is very simple. You are expected to know the location of module-info.java file. </p><p><br></p><p>module-info.java file is placed under the module directory, which in this case is 'office', hence module-info.java file must be placed at [POSITION-2].</p><p><br></p><p>If module-info.java file is missing or is placed at wrong position, then given javac command would cause below error:</p><p>error: module office not found in module source path</p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP65571Given below the directory/file structure on Windows platform: C:\n+---src\n|   |   [POSITION-1]\n|   |\n|   \\---office\n|       |   [POSITION-2]\n|       |\n|       \\---com\n|           |   [POSITION-3]\n|           |\n|           \\---xyz\n|
