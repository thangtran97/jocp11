is placed in its module directory 'message.printer'. If you specify multiple jars, then multiple module-info.java files will be generated under their respective directories.</p><p><br></p><p>--generate-module-info option is available with jdeps command only, hence remaining three commands (jlink, javac &amp; java) would cause error.</p>"}, "correct_response": ["a"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP62836You have a non-modular jar file (C:\\libraries\\message-printer-1.0x.jar) and you would like to generate module-info.java file automatically for this jar. Which of the following commands, executed from C:\\, can generate module-info.java file?", "related_lectures": []}, {"_class": "assessment", "id": 94384809, "assessment_type": "multiple-choice", "prompt": {"answers": ["HELLO is printed twice", "HELLO is printed once", "Exception is thrown at runtime", "Compilation error"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP34974</strong></p><p><br></p><p>Consider the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nenum Flags {\n    TRUE, FALSE;\n\n    public Flags() {\n        System.out.println(\"HELLO\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Flags flags = Flags.TRUE;\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP34974: </strong></p><p>Enum constructors are implicitly private, even though you can provide private access modifier but it will be redundant. </p><p>Using 'public' or 'protected' for enum constructors is not allowed. </p>"}, "correct_response": ["d"], "section": "3.8 Java OO: Enumerations", "question_plain": "Question ID: UKOCP34974Consider the code of Test.java file:package com.udayankhattry.ocp;\n\nenum Flags {\n    TRUE, FALSE;\n\n    public Flags() {\n        System.out.println(\"HELLO\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Flags flags = Flags.TRUE;\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384785, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["TEST", "Output string contains @ symbol", "Exception is thrown at runtime", "Compilation error"], "question": "<p><strong>Question ID: UKOCP88304</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test extends String {\n    @Override\n    public String toString() {\n        return \"TEST\";\n    }\n    \n    public static void main(String[] args) {\n        Test obj = new Test();\n        System.out.println(obj);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP88304: </strong></p><p>String is a final class so it cannot be extended. </p>"}, "correct_response": ["d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP88304Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test extends String {\n    @Override\n    public String toString() {\n        return \"TEST\";\n    }\n    \n    public static void main(String[] args) {\n        Test obj = new Test();\n        System.out.println(obj);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384787, "assessment_type": "multiple-choice", "prompt": {"answers": ["<p>false:true</p><p>false:false</p>", "<p>false:false</p><p>false:true</p>", "<p>false:false</p><p>false:false</p>", "<p>false:true</p><p>false:true</p>", "<p>false:true</p><p>true:true</p>", "<p>true:true</p><p>true:true</p>", "<p>false:false</p><p>true:true</p>"], "feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67836</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str1 = \"Book\"; //Line n1\n        String str2 = new String(new char[] {'B', 'o', 'o', 'k'}); //Line n2\n        String str3 = new String(\"Book\"); //Line n3\n        System.out.println((str1 == str2) + \":\" + (str1 == str2.intern())); //Line n4\n        System.out.println((str2 == str3) + \":\" + (str2.intern() == str3.intern())); //Line n5\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP67836: </strong></p><p>Line n1 creates a String Pool instance \"Book\". Variable 'str1' refers to String Pool instance \"Book\".</p><p>At Line n2, variable 'str2' refers to non-pool instance \"Book\". Therefore, str1 == str2 evaluates to false.</p><p>At Line n3, variable 'str3' refers to another no-pool instance \"Book\". Therefore, str2 == str3 evaluates to false.</p><p>According to Javadoc, when the intern() method is invoked, if the pool already contains a string equal to this String object as determined by the equals(Object) method, then the string from the pool is returned. Otherwise, this String object is added to the pool and a reference to this String object is returned. </p><p>As, at Line n1, \"Book\" object is already referred by String Pool, therefore, str2.intern() and str3.intern() would refer to same String Pool object. </p><p>Line n4 prints false:true and Line n5 prints false:true.</p>"}, "correct_response": ["d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP67836Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String str1 = \"Book\"; //Line n1\n        String str2 = new String(new char[] {'B', 'o', 'o', 'k'}); //Line n2\n        String str3 = new String(\"Book\"); //Line n3\n        System.out.println((str1 == str2) + \":\" + (str1 == str2.intern())); //Line n4\n        System.out.println((str2 == str3) + \":\" + (str2.intern() == str3.intern())); //Line n5\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384789, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP76309: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name. But var type cannot be used as method parameters or method return type. Hence 'var add(int v1, int v2)' causes compilation error.</p><p><br></p><p>For more information on local variable type inference, please check the URL: http://openjdk.java.net/jeps/286</p>", "answers": ["<p>97</p><p>98</p>", "<p>a</p><p>b</p>", "<p>a</p><p>98</p>", "<p>97</p><p>b</p>", "Compilation error", "Runtime error"], "question": "<p><strong>Question ID: UKOCP76309</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(add(90, 7));\n        System.out.println(add('a', 1)); //ASCII code for 'a' is 97 and 'b' is 98\n    }\n    \n    public static var add(int v1, int v2) {\n        return v1 + v2;\n    }\n}</pre><p><br></p><p>What is the result of compiling and executing above code?</p>", "relatedLectureIds": ""}, "correct_response": ["e"], "section": "1.6 Working with data types: Local variable type inference", "question_plain": "Question ID: UKOCP76309Consider below code of Test.java file:package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(add(90, 7));\n        System.out.println(add('a', 1)); //ASCII code for 'a' is 97 and 'b' is 98\n    }\n    \n    public static var add(int v1, int v2) {\n        return v1 + v2;\n    }\n}What is the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 94384791, "assessment_type": "multiple-choice", "prompt": {"answers": ["Program compiles and executes successfully but produces no output", "Compilation error", "Infinite loop", "It will print &quot;Good Night!&quot; once"], "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP83067</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        final boolean flag;\n        flag = false;\n        while(flag) {\n            System.out.println(\"Good Night!\");\n        }\n    }\n}</pre><p><br></p><p>Which of the following statements is correct for above code?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP83067: </strong></p><p>`final boolean flag; flag = false;` doesn't make flag a compile time constant.&nbsp; </p><p>Compiler doesn't know flag's value at compile-time and hence it allows this syntax.&nbsp; </p><p>At runtime, as boolean expression of while loop is false, loop's body doesn't execute even once and hence no output.&nbsp; </p>"}, "correct_response": ["a"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP83067Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        final boolean flag;\n        flag = false;\n        while(flag) {\n            System.out.println(\"Good Night!\");\n        }\n    }\n}Which of the following statements is correct for above code?", "related_lectures": []}, {"_class": "assessment", "id": 94384793, "assessment_type": "multiple-choice", "prompt": {"answers": ["1.2.3", "123", "3", "Compilation error", "An exception is thrown at runtime"], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP18892: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>Given code compiles successfully. </p><p>At Line n1, variable 'res' infers to String and at line n2, variable 's' infers to String as well.</p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Let's check the iterations:</p><p>1st iteration: s refers to \"1\". `String.join(\".\", s)` returns \"1\" and res = \"\" + \"1\" = \"1\".</p><p>2nd iteration: s refers to \"2\". `String.join(\".\", s)` returns \"2\" and res = \"1\" + \"2\" = \"12\".</p><p>3rd iteration: s refers to \"3\". `String.join(\".\", s)` returns \"3\" and res = \"12\" + \"3\" = \"123\".</p><p>Loop finishes its execution and Line n4 prints 123 on to the console.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP18892</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var res = \"\"; //Line n1\n        String [] arr = {\"1\", \"2\", \"3\"};\n        for(var s : arr) { //Line n2\n            res += String.join(\".\", s); //Line n3\n        }\n        System.out.println(res); //Line n4\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP18892Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var res = \"\"; //Line n1\n        String [] arr = {\"1\", \"2\", \"3\"};\n        for(var s : arr) { //Line n2\n            res += String.join(\".\", s); //Line n3\n        }\n        System.out.println(res); //Line n4\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384795, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP61251: </strong></p><p>In this example, inner class's variable var shadows the outer class's variable var. So output is Java.</p><p><br></p><p>Few points to note here:&nbsp; </p><p>1. If inner class shadows the variable of outer class, then Java compiler prepends 'this.' to the variable. System.out.println(var); is replaced by System.out.println(this.var); </p><p> </p><p>2. If inner class does not shadow the variable of outer class, then Java compiler prepends \"outer_class.this.\" to the variable. So, if class Q doesn't shadow the variable of class P, then System.out.println(var); would be replaced by System.out.println(P.this.var);</p><p><br></p><p>In the given example, if you provide System.out.println(P.this.var); inside print() method, then output would be 100.</p>", "answers": ["Java", "100", "Compilation error", "Exception is thrown at runtime"], "question": "<p><strong>Question ID: UKOCP61251</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass P {\n    private int var = 100;\n    class Q {\n        String var = \"Java\";\n        void print() {\n            System.out.println(var);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new P().new Q().print();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["a"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP61251Given code: package com.udayankhattry.ocp;\n\nclass P {\n    private int var = 100;\n    class Q {\n        String var = \"Java\";\n        void print() {\n            System.out.println(var);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new P().new Q().print();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384797, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">B obj1 = new B();\nobj1.log();</pre>", "<pre class=\"prettyprint linenums\">B obj3 = new A().new B();\nobj3.log();</pre>", "<pre class=\"prettyprint linenums\">A.B obj2 = new A.B();\nobj2.log();</pre>", "<pre class=\"prettyprint linenums\">A.B obj4 = new A().new B();\nobj4.log();</pre>", "<pre class=\"prettyprint linenums\">var obj5 = new A.B();\nobj5.log();</pre>"], "question": "<p><strong>Question ID: UKOCP64776</strong></p><p><br></p><p>Below the code of A.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class A {\n    private static class B {\n        private void log() {\n            System.out.println(\"BE THE CHANGE\");\n        }\n    }\n    \n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that there on executing class A, output is: BE THE CHANGE?</p><p>Choose 3 options.</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP64776: </strong></p><p>static nested class can use all 4 access modifiers (public, protected, default and private) and 2 non-access modifiers (final and abstract). </p><p>static nested class can contain all type of members, static as well as non-static. This behavior is different from other inner classes as other inner classes don't allow to define anything static, except static final variables. This is the reason static nested class is not considered as inner class. </p><p><br></p><p>There are 2 parts in accessing static nested class: 1st one to access the static nested class's name and 2nd one to instantiate the static nested class.</p><p>Within the top-level class, a static nested class's name can be referred by 3 ways: TOP-LEVEL-CLASS.STATIC-NESTED-CLASS or STATIC-NESTED-CLASS or var. </p><p><br></p><p>In this case, either use A.B or B or var. Now for instantiating the static nested class, an instance of enclosing class cannot be used, which means in this case, I can't write new A().new B(). Correct way to instance static nested class is: new A.B(); but as main method is inside class A, hence I can even write new B(); as well.</p><p><br></p><p>Top-level class can easily access private members of inner or static nested class, so no issues in invoking log() method from within the definition of class A.</p>"}, "correct_response": ["a", "c", "e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP64776Below the code of A.java file:package com.udayankhattry.ocp;\n\npublic class A {\n    private static class B {\n        private void log() {\n            System.out.println(\"BE THE CHANGE\");\n        }\n    }\n    \n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}Which of the following options can replace /*INSERT*/ such that there on executing class A, output is: BE THE CHANGE?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 94384799, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<p>Point(17, 35, -1)</p><p>Point(19, 40, 0)</p>", "<p>Point(19, 35, -1)</p><p>Point(19, 40, 0)</p>", "<p>Point(17, 35, -1)</p><p>Point(17, 40, 0)</p>", "<p>Point(19, 40, 0)</p><p>Point(19, 40, 0)</p>", "<p>Point(17, 35, -1)</p><p>Point(17, 35, -1)</p>", "<p>Point(19, 35, -1)</p><p>Point(19, 35, -1)</p>", "<p>Compilation error</p>"], "question": "<p><strong>Question ID: UKOCP87068</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\nclass Point {\n    static int x;\n    int y, z;\n    \n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \", \" + z + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Point p1 = new Point();\n        p1.x = 17;\n        p1.y = 35;\n        p1.z = -1;\n        \n        Point p2 = new Point();\n        p2.x = 19;\n        p2.y = 40;\n        p2.z = 0;\n        \n        System.out.println(p1); //Line n1\n        System.out.println(p2); //Line n2\n    }\n}</pre>", "feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP87068: </strong></p><p>Point class correctly overrides the toString() method. Even though variable x is static, but it can be easily accessed by instance method toString(). </p><p>Variables x, y and z are declared with default scope, so can be accessed in same package. There is no compilation error in the code.</p><p>There is only one copy of static variable for all the instances of the class. Variable x is shared by p1 and p2 both. </p><p>p1.x = 17; sets the value of static variable x to 17, p2.x = 19; modifies the value of static variable x to 19. As there is just one copy of x, hence p1.x = 19</p><p><br></p><p>Please note: p1.x and p2.x don't cause any compilation error but as this syntax creates confusion, so it is not a good practice to access the static variables or static methods using reference variable, instead class name should be used. Point.x is the preferred syntax. </p><p><br></p><p>Each object has its own copy of instance variables, so just before executing Line n1, p1.y = 35 &amp; p1.z = -1 AND p2.y = 40 &amp; p2.z = 0</p><p>Output is: </p><p>Point(19, 35, -1)</p><p>Point(19, 40, 0)</p>"}, "correct_response": ["b"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP87068What will be the result of compiling and executing Test class?//Test.java\npackage com.udayankhattry.ocp;\n\nclass Point {\n    static int x;\n    int y, z;\n    \n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \", \" + z + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Point p1 = new Point();\n        p1.x = 17;\n        p1.y = 35;\n        p1.z = -1;\n        \n        Point p2 = new Point();\n        p2.x = 19;\n        p2.y = 40;\n        p2.z = 0;\n        \n        System.out.println(p1); //Line n1\n        System.out.println(p2); //Line n2\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 94384801, "assessment_type": "multiple-choice", "prompt": {"answers": ["public, private", "private, public", "default (with no access modifier specified), public", "protected, public", "default (with no access modifier specified), protected"], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP79443: </strong></p><p>'private' is most restrictive, then comes 'default (with no access modifier specified)', after that 'protected' and finally 'public' is least restrictive.</p>", "question": "<p><strong>Question ID: UKOCP79443</strong></p><p><br></p><p>_________ modifier is most restrictive and __________ modifier is least restrictive. </p><p><br></p><p>Which of the following options (in below specified order) can be filled in above blank spaces?</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP79443_________ modifier is most restrictive and __________ modifier is least restrictive. Which of the following options (in below specified order) can be filled in above blank spaces?", "related_lectures": []}, {"_class": "assessment", "id": 94384803, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "answers": ["constant", "super", "final", "class", "const"], "question": "<p><strong>Question ID: UKOCP45688</strong></p><p><br></p><p>Which of these keywords can be used to prevent inheritance of a class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP45688: </strong></p><p>Class declared as final cannot be inherited. Examples are: String, Integer, System etc.</p>"}, "correct_response": ["c"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP45688Which of these keywords can be used to prevent inheritance of a class?", "related_lectures": []}, {"_class": "assessment", "id": 94384805, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP44289</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": [], "links": [], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP44289: </strong></p><p>List is super type and ArrayList is sub type, hence List l = new ArrayList(); is valid syntax.&nbsp; </p><p>Animal is super type and Dog is sub type, hence Animal a = new Dog(); is valid syntax. Both depicts Polymorphism. </p><p><br></p><p>But in generics syntax, Parameterized types are not polymorhic, this means ArrayList&lt;Animal&gt; is not super type of ArrayList&lt;Dog&gt;. Remember this point. So below syntaxes are not allowed:&nbsp; </p><p>ArrayList&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;(); OR List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();</p>", "answers": ["true", "false", "Compilation error", "Runtime exception"]}, "correct_response": ["c"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP44289Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384807, "assessment_type": "multiple-choice", "prompt": {"answers": ["There is a compilation error in Shrinkable.java file", "There is a compilation error in AntMan.java file", "There is a compilation error in Test.java file", "There is no compilation error and on execution, Test class prints 80% on to the console"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP55426: </strong></p><p>As per Java 8, default and static methods were added in the interface and as per Java 9, private methods were added in the interface. There is no issue in Shrinkable.java file.</p><p>class AntMan implements Shrinkable interface but as there is no abstract method in Shrinkable interface, hence AntMan class is not needed to implement any method. AntMan.java file compiles successfully.</p><p>static method of Shrinkable interface can only be accessed by using Shrinkable.shrinkPercentage(). `AntMan.shrinkPercentage();` causes compilation error.</p>", "question": "<p><strong>Question ID: UKOCP55426</strong></p><p><br></p><p>Consider below codes of 3 java files:</p><pre class=\"prettyprint linenums\">//Shrinkable.java\npackage com.udayankhattry.ocp;\n\npublic interface Shrinkable {\n    public static void shrinkPercentage() {\n        System.out.println(\"80%\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//AntMan.java\npackage com.udayankhattry.ocp;\n\npublic class AntMan implements Shrinkable { }</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        AntMan.shrinkPercentage();\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP55426Consider below codes of 3 java files://Shrinkable.java\npackage com.udayankhattry.ocp;\n\npublic interface Shrinkable {\n    public static void shrinkPercentage() {\n        System.out.println(\"80%\");\n    }\n}//AntMan.java\npackage com.udayankhattry.ocp;\n\npublic class AntMan implements Shrinkable { }//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        AntMan.shrinkPercentage();\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 94384783, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["Result is: true", "Result is: false", "Compilation error", "Result is: (10 != 5)"], "explanation": "<p><strong>UKOCP56705: </strong></p><p>\"Result is: \" + (10 != 5) [Nothing to evaluate at left side, so let's evaluate the right side of +, 10 != 5 is true.]&nbsp; </p><p>= \"Result is: \" + true [+ operator behaves as concatenation operator]&nbsp; </p><p>= \"Result is: true\" </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP56705</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Result is: \" + (10 != 5));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["a"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP56705Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(\"Result is: \" + (10 != 5));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384811, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(IOException | SQLException ex) {}</pre>", "<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(SQLException | IOException ex) {}</pre>", "<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(IOException | Exception ex) {}</pre>", "<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(SQLException | Exception ex) {}</pre>", "<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(Exception | RuntimeException ex) {}</pre>", "<pre class=\"prettyprint linenums\">try {\n    save();\n    log();\n} catch(Exception ex) {}</pre>"], "explanation": "<p><strong>UKOCP46971: </strong></p><p>save() method throws IOException (which is a Checked Exception) and log() method throws SQLException (which is also a Checked Exception). </p><p><br></p><p>Let's check all the options one by one (I am just using the catch-block as try-block of all the options are same):</p><p><code>catch(IOException | SQLException ex) {}</code>: \u2713 As IOException and SQLException are not related to each other in multi-level inheritance, hence this multi-catch syntax is valid. </p><p><br></p><p><code>catch(SQLException | IOException ex) {}</code>: \u2713 Same as above, order of exceptions in multi-catch syntax doesn't matter.</p><p><br></p><p><code>catch(IOException | Exception ex) {}</code>: \u2717 Causes compilation error as IOException extends Exception.</p><p><br></p><p><code>catch(SQLException | Exception ex) {}</code>: \u2717 Causes compilation error as SQLException extends Exception.</p><p><br></p><p><code>catch(Exception | RuntimeException ex) {}</code>: \u2717 Causes compilation error as RuntimeException extends Exception.</p><p><br></p><p><code>catch(Exception ex) {}</code>: \u2713 As Exception is the super class of both IOException and SQLException, hence it can handle both the exceptions. </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP46971</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n\n    private static void save() throws IOException {}\n\n    private static void log() throws SQLException {}\n}</pre><p><br></p><p>Which of the block of codes can be used to replace /*INSERT*/ such that there is no compilation error?</p><p>Choose 3 options.</p>"}, "correct_response": ["a", "b", "f"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP46971Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n\n    private static void save() throws IOException {}\n\n    private static void log() throws SQLException {}\n}Which of the block of codes can be used to replace /*INSERT*/ such that there is no compilation error?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 94384813, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "answers": ["Compilation error", "1234FINALLY", "124FINALLY", "14FINALLY", "12IO", "124IO", "<p>14FNF</p>"], "explanation": "<p><strong>UKOCP18033: </strong></p><p>Method find() declares to throw Exception and the throw statements inside this method is throwing the Subclasses of Exception, hence no issues in find() method. </p><p>main(String []) method also provide legal try-catch block, hence the given code compiles successfully. </p><p><br></p><p>Throwable is the root class of the exception hierarchy and it contains some useful constructors: </p><p><br></p><p>1. public Throwable() {...} : No-argument constructor</p><p>2. public Throwable(String message) {...} : Pass the detail message</p><p>3. public Throwable(String message, Throwable cause) {...} : Pass the detail message and the cause</p><p>4. public Throwable(Throwable cause) {...} : Pass the cause</p><p><br></p><p>Exception and RuntimeException classes also provide similar constructors. </p><p><br></p><p>Throwable class also contains methods, which are inherited by all the subclasses (Exception, RuntimeException etc.)</p><p>1. public String getMessage() {...} : Returns the detail message (E.g. detail message set by 2nd and 3rd constructor)</p><p>2. public String toString() {} : </p><p>Returns a short description of this throwable. The result is the concatenation of:</p><p>the name of the class of this object</p><p>\": \" (a colon and a space)</p><p>the result of invoking this object's getLocalizedMessage() method </p><p><br></p><p>If getLocalizedMessage returns null, then just the class name is returned.</p><p><br></p><p>Let's check the execution:</p><p>main(String []) method invokes find() and first statement inside try-block gets executed, 1 is printed on to the console. </p><p>Next statement is executed and an instance of FileNotFoundException is thrown. </p><p>Matching catch-handler is available, so control goes inside the first catch-handler and 2 is printed on to the console. An instance of IOException is thrown by the catch-block but another catch-block at the same level are not executed. </p><p>As finally-block always executes, hence, 4 is printed on to the console and an Exception instance is thrown by the finally-block. </p><p><br></p><p>Control goes back to the calling method main(String []), catch-handler is executed and it prints FINALLY on to the console. </p><p><br></p><p>Hence output is: 124FINALLY</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP18033</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            find();\n        } catch(Exception ex) {\n            System.out.println(ex.getMessage());\n        }\n    }\n\n    static void find() throws Exception {\n        try {\n            System.out.print(1);\n            throw new FileNotFoundException(\"FNF\");\n        } catch(FileNotFoundException ex) {\n            System.out.print(2);\n            throw new IOException(\"IO\");\n        } catch(IOException ex) {\n            System.out.print(3);\n            throw new Exception(\"EXP\");\n        } finally {\n            System.out.print(4);\n            throw new Exception(\"FINALLY\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["c"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP18033Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            find();\n        } catch(Exception ex) {\n            System.out.println(ex.getMessage());\n        }\n    }\n\n    static void find() throws Exception {\n        try {\n            System.out.print(1);\n            throw new FileNotFoundException(\"FNF\");\n        } catch(FileNotFoundException ex) {\n            System.out.print(2);\n            throw new IOException(\"IO\");\n        } catch(IOException ex) {\n            System.out.print(3);\n            throw new Exception(\"EXP\");\n        } finally {\n            System.out.print(4);\n            throw new Exception(\"FINALLY\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384815, "assessment_type": "multiple-choice", "prompt": {"answers": ["HELLO", "Compilation error", "Runtime exception"], "feedbacks": ["", "", ""], "question": "<p><strong>Question ID: UKOCP74940</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.PrintWriter;\n\npublic class Test {\n    public static void main(String[] args) {\n        try(PrintWriter writer;) {\n            writer = new PrintWriter(System.out);\n            writer.println(\"HELLO\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP74940: </strong></p><p>Resources used in try-with-resources statement must be initialized. </p><p><br></p><p>'try(PrintWriter writer;)' causes compilation error as writer is not initialized in this statement.</p>"}, "correct_response": ["b"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP74940Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.PrintWriter;\n\npublic class Test {\n    public static void main(String[] args) {\n        try(PrintWriter writer;) {\n            writer = new PrintWriter(System.out);\n            writer.println(\"HELLO\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384817, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["true", "false", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP14896: </strong></p><p>new String[1] creates a String [] object of one element and as all the elements of array are initialized to respective zeros (in case of primitive type) or null (in case of reference type), arr[0] refers to null. </p><p><br></p><p>isBlank() method of String class (available since Java 11) returns true if the string is empty or contains only white space codepoints, otherwise false. As isBlank() is available, hence `arr[0].isBlank()` compiles successfully.</p><p><br></p><p>But as method 'isBlank()' is invoked on null reference (arr[0] refers to null), so NullPointerException is thrown at runtime.</p>", "question": "<p><strong>Question ID: UKOCP14896</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = new String[1];\n        System.out.println(arr[0].isBlank());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP14896Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = new String[1];\n        System.out.println(arr[0].isBlank());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384819, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", "", ""], "answers": ["6", "64", "642", "7", "75", "753", "<p>7531</p>", "<p>7654321</p>"], "question": "<p><strong>Question ID: UKOCP50981</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[][] arr = { { \"7\", \"6\", \"5\" }, { \"4\", \"3\" }, { \"2\", \"1\" } };\n        for (int i = 0; i &lt; arr.length; i++) { //Line n1\n            for (int j = 0; j &lt; arr[i].length; j++) { //Line n2\n                switch (arr[i][j]) { //Line n3\n                    case \"2\":\n                    case \"4\":\n                    case \"6\":\n                        break; //Line n4\n                    default: \n                        continue; //Line n5\n                }\n                System.out.print(arr[i][j]); //Line n6\n            }\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP50981: </strong></p><p>case values must evaluate to the same type / compatible type as the switch expression can use.&nbsp; </p><p>switch expression can accept following:&nbsp; </p><p>char or Character,&nbsp; </p><p>byte or Byte,&nbsp; </p><p>short or Short,&nbsp; </p><p>int or Integer,&nbsp; </p><p>An enum only from Java 6,&nbsp; </p><p>A String expression only from Java 7.&nbsp; </p><p><br></p><p>In this case, switch expression [switch (arr[i][j])] is of String type. </p><p>Please note that break; statement at Line n4 takes the control to Line n6 (outside switch-case block) and not out of the inner for loop, where as, continue; statement at Line n5 takes the control to the update expression (j++) of Line n2.</p><p>arr.length is 3, so outer loop executes 3 times. </p><p>1st iteration of outer loop, i=0. </p><p> -1st iteration of inner loop, i=0, j=0 and arr[0].length = 3. 0 &lt; 3 evaluates to true. </p><p>&nbsp; arr[0][0] = \"7\", Line n5 is executed, and it takes the control to j++ (j = 1). 1 &lt; 3 evaluates to true.</p><p> -2nd iteration of inner loop</p><p>&nbsp; arr[0][1] = \"6\", Line n4 is executed, and it takes the control to Line n6. 6 is printed on to the console. Control goes to j++ (j = 2). 2 &lt; 3 evaluates to true.</p><p> -3rd iteration of inner loop</p><p>&nbsp; arr[0][2] = \"5\", Line n5 is executed, and it takes the control to j++ (j = 3).&nbsp; &nbsp;As 3 &lt; 3 evaluates to false, control exits inner loop and goes to i++.</p><p>You must have noticed that 1st iteration of outer loop prints the even number of 1st array { \"7\", \"6\", \"5\" }</p><p><br></p><p>Similarly, 2nd iteration of outer loop prints the even number of 2nd array { \"4\", \"3\" }, which is 4 </p><p>and 3rd iteration of outer loop prints the even number of 3rd array { \"2\", \"1\" }, which is 2. </p><p><br></p><p>Therefore, the output is: 642.</p>"}, "correct_response": ["c"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP50981Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[][] arr = { { \"7\", \"6\", \"5\" }, { \"4\", \"3\" }, { \"2\", \"1\" } };\n        for (int i = 0; i &lt; arr.length; i++) { //Line n1\n            for (int j = 0; j &lt; arr[i].length; j++) { //Line n2\n                switch (arr[i][j]) { //Line n3\n                    case \"2\":\n                    case \"4\":\n                    case \"6\":\n                        break; //Line n4\n                    default: \n                        continue; //Line n5\n                }\n                System.out.print(arr[i][j]); //Line n6\n            }\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384821, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP44289</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["true", "false", "Compilation error", "Runtime exception"], "explanation": "<p><strong>UKOCP44289: </strong></p><p>List is super type and ArrayList is sub type, hence List l = new ArrayList(); is valid syntax.&nbsp; </p><p>Animal is super type and Dog is sub type, hence Animal a = new Dog(); is valid syntax. Both depicts Polymorphism. </p><p><br></p><p>But in generics syntax, Parameterized types are not polymorhic, this means ArrayList&lt;Animal&gt; is not super type of ArrayList&lt;Dog&gt;. Remember this point. So below syntaxes are not allowed:&nbsp; </p><p>ArrayList&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;(); OR List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();</p>"}, "correct_response": ["c"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP44289Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384823, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "answers": ["[ONE, TWO, THREE, THREE]", "[ONE, TWO, THREE]", "[ONE, TWO]", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP33124: </strong></p><p>list.remove(Object) method returns boolean result but list.remove(int index) returns the removed item from the list, which in this case is of String type and not Boolean type and hence if(list.remove(2)) causes compilation error.</p>", "question": "<p><strong>Question ID: UKOCP33124</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"ONE\");\n        list.add(\"TWO\");\n        list.add(\"THREE\");\n        list.add(\"THREE\");\n        \n        if(list.remove(2)) {\n            list.remove(\"THREE\");\n        }\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP33124Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"ONE\");\n        list.add(\"TWO\");\n        list.add(\"THREE\");\n        list.add(\"THREE\");\n        \n        if(list.remove(2)) {\n            list.remove(\"THREE\");\n        }\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384825, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "answers": ["Compilation error at Line n1", "Compilation error at Line n2", "An exception is thrown at runtime", "TAKE.THE.RISK.", "TAKE.THE.RISK", "TAKETHERISK", "<p>TAKETHERISK.</p>"], "question": "<p><strong>Question ID: UKOCP83848</strong></p><p><br></p><p>Below is the code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new ArrayList&lt;&gt;(); //Line n1\n        list.add(\"TAKE\");\n        list.add(\"THE\");\n        list.add(\"RISK\");\n\n        System.out.println(String.join(\".\", list)); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP83848: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>At Line n1, list refers to an ArrayList of Object type, because Generic type is not defined on the right side.</p><p>Three String objects are added to the list.</p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Now if you look at the 2nd overloaded method, 2nd parameter is: 'Iterable&lt;? extends CharSequence&gt;', which means if you are passing List, then List&lt;String&gt;, List&lt;StringBuilder&gt; &amp; List&lt;StringBuffer&gt; are possible arguments.</p><p>But raw List and List&lt;Object&gt; won't work. As ArrayList instance created at Line n1 is of Object type, hence Line n2 causes compilation error.</p><p><br></p><p>If you change Line n1 to: List&lt;String&gt; list = new ArrayList&lt;&gt;();</p><p>then output will be: TAKE.THE.RISK</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP83848Below is the code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new ArrayList&lt;&gt;(); //Line n1\n        list.add(\"TAKE\");\n        list.add(\"THE\");\n        list.add(\"RISK\");\n\n        System.out.println(String.join(\".\", list)); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384827, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP25508: </strong></p><p>There are 12 overloaded of methods in Set interface:</p><p>Set.of()</p><p>Set.of(E e1)</p><p>Set.of\u200b(E e1, E e2)</p><p>Set.of(E e1, E e2, E e3)</p><p>Set.of(E e1, E e2, E e3, E e4)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>Set.of(E... elements)</p><p><br></p><p>These create an unmodifiable set containing specified elements. </p><p>These methods throw NullPointerException - if an element is null or IllegalArgumentException - if the elements are duplicates</p><p><br></p><p>According to the Javadoc of equals(Object) method of Set interface, it compares the specified object with this set for equality. Returns true if the specified object is also a set, the two sets have the same size, and every member of the specified set is contained in this set (or equivalently, every member of this set is contained in the specified set). </p><p><br></p><p>All three sets contain same elements \"1\", \"2\" and \"3\" and hence the output is true:true</p>", "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP25508</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var set1 = Set.of(\"1\", \"2\", \"3\");\n        var set2 = Set.of(\"3\", \"1\", \"2\");\n        var set3 = Set.of(\"1\", \"2\", \"3\");\n        System.out.println(set1.equals(set2) + \":\" + set1.equals(set3));\n     }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["true:true", "false:false", "true:false", "false:true"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP25508Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var set1 = Set.of(\"1\", \"2\", \"3\");\n        var set2 = Set.of(\"3\", \"1\", \"2\");\n        var set3 = Set.of(\"1\", \"2\", \"3\");\n        System.out.println(set1.equals(set2) + \":\" + set1.equals(set3));\n     }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384829, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["Add the import statement for the Comparator interface: import java.util.Comparator; ", "Existing code without any changes displays above output", "Change the lambda expression to (s1, s2) -&gt; s2.length()-s1.length()", "Change the lambda expression to (s2, s1) -&gt; s1.length()-s2.length()"], "question": "<p><strong>Question ID: UKOCP12694</strong></p><p><br></p><p>For the code below:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"**\", \"***\", \"*\", \"*****\", \"****\"};\n        Arrays.sort(arr, (s1, s2) -&gt; s1.length()-s2.length());\n        for(String str : arr) {\n            System.out.println(str);\n        }\n    }\n}</pre><p><br></p><p>What do you need to do so that above code gives following output?</p><p>*</p><p>**</p><p>***</p><p>****</p><p>*****</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP12694: </strong></p><p>Even though lambda expression is for the compare method of Comparator interface, but in the code name \"Comparator\" is not used hence import statement is not needed here. Expressions </p><p>(s1, s2) -&gt; s2.length()-s1.length() and (s2, s1) -&gt; s1.length()-s2.length() displays the output in reversed order.</p>"}, "correct_response": ["b"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP12694For the code below:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"**\", \"***\", \"*\", \"*****\", \"****\"};\n        Arrays.sort(arr, (s1, s2) -&gt; s1.length()-s2.length());\n        for(String str : arr) {\n            System.out.println(str);\n        }\n    }\n}What do you need to do so that above code gives following output?***************", "related_lectures": []}, {"_class": "assessment", "id": 94384831, "assessment_type": "multiple-choice", "prompt": {"answers": ["Only one statement", "Two statements", "Three statements", "Four statements", "All Five statements", "None of the statements"], "feedbacks": ["", "", "", "", "", ""], "question": "<p><strong>Question ID: UKOCP58060</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface I1 {\n    void m1();\n}\n\ninterface I2 extends I1 {\n    void m2();\n}\n\ninterface I3 extends I2 {\n    void m3();\n}\n\ninterface I4 {\n    String toString();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>And the statements:</p><p>1. <code>I1 i1 = () -&gt; System.out.println(1);</code></p><p>2. <code>I2 i2 = () -&gt; System.out.println(2);</code></p><p>3. <code>I3 i3 = () -&gt; System.out.println(3);</code></p><p>4. <code>I4 i4 = () -&gt; System.out.println(4);</code></p><p>5.<code> I4 i5 = () -&gt; \"\";</code></p><p><br></p><p>Which of the above statements can replace /*INSERT*/ such that there is no compilation error?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP58060: </strong></p><p>Target type of lambda expression must be a Functional interface. </p><p>Functional interface must have only one non-overriding abstract method but Functional interface can have constant variables, static methods, default methods, private methods and overriding abstract methods [equals(Object) method, toString() method etc. from Object class]. </p><p><br></p><p>Let's check which of the given interfaces are Functional interfaces...</p><p><br></p><p>Interface I1 contains only one non-overriding abstract method m1() and hence it is a Functional interface. </p><p>Interface I2 extends I1 and therefore it has two non-overriding abstract methods m1() and m2(). I2 is NOT a Functional interface.</p><p>Interface I3 extends I2 and therefore it has three non-overriding abstract methods m1(), m2() and m3(). I3 is NOT a Functional interface.</p><p>Interface I4 contains only one overriding abstract method toString() and therefore it is NOT a Functional interface.</p><p><br></p><p>Out of the given 4 interfaces, only I1 is the Functional interface and hence can be used as the target type of the lambda expression. </p><p><br></p><p>Let's check the validity of the lambda expression:</p><p>`() -&gt; System.out.println(1);` is the correct implementation of `void m1();` method and therefore can be assigned to target type I1. </p><p><br></p><p>Out of given 5 statements only statement number 1 will successfully replace the /*INSERT*/.</p>"}, "correct_response": ["a"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP58060Given code: package com.udayankhattry.ocp;\n\ninterface I1 {\n    void m1();\n}\n\ninterface I2 extends I1 {\n    void m2();\n}\n\ninterface I3 extends I2 {\n    void m3();\n}\n\ninterface I4 {\n    String toString();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}And the statements:1. I1 i1 = () -&gt; System.out.println(1);2. I2 i2 = () -&gt; System.out.println(2);3. I3 i3 = () -&gt; System.out.println(3);4. I4 i4 = () -&gt; System.out.println(4);5. I4 i5 = () -&gt; \"\";Which of the above statements can replace /*INSERT*/ such that there is no compilation error?", "related_lectures": []}]};

        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();

        var input = answers[i].children[0].children[0].children[1];
        span.classList.remove("selected");
        input.checked = false;
      }
      var span = answers[answer].children[0].children[0].children[0];
      var input = answers[answer].children[0].children[0].children[1];
      span.classList.add("selected");
      input.checked = true;
