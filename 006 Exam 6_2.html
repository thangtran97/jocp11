  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 52772648, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">Console console = System.console();\nString pwd = console.readPassword(\"Enter Password: \");\nSystem.out.println(pwd);</pre>", "<pre class=\"prettyprint linenums\">Console console = new Console(System.in);\nString pwd = console.readPassword(\"Enter Password: \");\nSystem.out.println(pwd);</pre>", "<pre class=\"prettyprint linenums\">Console console = new Console(System.in);\nchar [] pwd = console.readPassword(\"Enter Password: \");\nSystem.out.println(new String(pwd));</pre>", "<pre class=\"prettyprint linenums\">Console console = System.console();\nchar [] pwd = console.readPassword(\"Enter Password: \");\nSystem.out.println(new String(pwd));</pre>"], "explanation": "<p><strong>UKOCP88635: </strong></p><p>new Console(...) causes compilation error as it doesn't have matching constructor. It's no-argument constructor is private. </p><p>Correct way to get Console instance is by System.console();&nbsp; </p><p><br></p><p>readPassword method is overloaded: </p><p>char [] readPassword() {...} </p><p>char [] readPassword(String fmtString, Object... args) {...}</p><p><br></p><p>console.readPassword(\"Enter Password: \"); =&gt; compiles and executes successfully as there are no format specifier in 1st argument, so it is OK to provide just one argument to this method. </p><p><br></p><p>Return type of readPassword(...) method is char [] and not String. </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP88635</strong></p><p><br></p><p>Which of the following will correctly accept and print the entered password on to the console?</p>"}, "correct_response": ["d"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP88635Which of the following will correctly accept and print the entered password on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 52772626, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP70190: </strong></p><p>This is an example of method reference to Constructor. </p><p>Lambda expression corresponding to `Creator&lt;Dog&gt; obj = Dog::new;` is `Creator&lt;Dog&gt; obj = (String str) -&gt; new Dog(str);`</p><p>create(String) method accepts a String parameter and Dog class also has a constructor, which specifies parameter of String type. Hence, no issues at Line n2.</p><p>There is no compilation error in the given code. </p><p><br></p><p>At runtime, Line n3 correctly invokes the parameterized constructor of Dog class. </p><p>At Line n1, AnimalType.valueOf(\"MAMMAL\") returns AnimalType.MAMMAL. </p><p>Hence, Line n4 prints MAMMAL on to the console. </p>", "answers": ["MAMMAL", "mammal", "0", "Compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP70190</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create(String type);\n}\n\nenum AnimalType {\n    MAMMAL, BIRD, REPTILE;\n}\n\nabstract class Animal {\n    private AnimalType type;\n\n    public Animal(AnimalType type) {\n        this.type = type;\n    }\n\n    public AnimalType getType() {\n        return type;\n    }\n}\n\nclass Dog extends Animal {\n    public Dog(String type) {\n        super(AnimalType.valueOf(type.toUpperCase())); //Line n1\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;Dog&gt; obj = Dog::new; //Line n2\n        var d = obj.create(\"mammal\"); //Line n3\n        System.out.println(d.getType()); //Line n4\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP70190Given code: package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create(String type);\n}\n\nenum AnimalType {\n    MAMMAL, BIRD, REPTILE;\n}\n\nabstract class Animal {\n    private AnimalType type;\n\n    public Animal(AnimalType type) {\n        this.type = type;\n    }\n\n    public AnimalType getType() {\n        return type;\n    }\n}\n\nclass Dog extends Animal {\n    public Dog(String type) {\n        super(AnimalType.valueOf(type.toUpperCase())); //Line n1\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;Dog&gt; obj = Dog::new; //Line n2\n        var d = obj.create(\"mammal\"); //Line n3\n        System.out.println(d.getType()); //Line n4\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772628, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP63866: </strong></p><p>f1.compose(f2) means first apply f2 and then f1. </p><p>f2.apply(\"12345\") returns \"54321\" and then f1.apply(\"54321\") returns 54321</p>", "answers": ["12345", "54321", "Compilation error", "NumberFormatException is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP63866</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Function;\n\npublic class Test {\n    public static void main(String[] args) {\n        Function&lt;String, Integer&gt; f1 = Integer::new;\n        Function&lt;String, String&gt; f2 = s -&gt; new StringBuilder(s).reverse().toString();\n        System.out.println(f1.compose(f2).apply(\"12345\"));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP63866Given code:package com.udayankhattry.ocp;\n\nimport java.util.function.Function;\n\npublic class Test {\n    public static void main(String[] args) {\n        Function&lt;String, Integer&gt; f1 = Integer::new;\n        Function&lt;String, String&gt; f2 = s -&gt; new StringBuilder(s).reverse().toString();\n        System.out.println(f1.compose(f2).apply(\"12345\"));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772630, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP26495: </strong></p><p>BiFunction&lt;T, U, R&gt; : R apply(T t, U u);</p><p>BiFunction interface accepts 3 type parameters, first 2 parameters (T,U) are passed to apply method and 3rd type parameter is the return type of apply method. </p><p>In this case, 'BiFunction&lt;Integer, Integer, Character&gt;' means apply method will have declaration: 'Character apply(Integer d1, Integer d2)'. </p><p>Lambda expression should accept 2 Integer type parameters and must return Character object. Lambda expression is: </p><p>'(i, j) -&gt; i + j', i + j returns an int type and int cannot be implicitly casted to Character and this causes compilation error.</p>", "answers": ["Compilation error", "65", "A"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP26495</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;Integer, Integer, Character&gt; compFunc = (i, j) -&gt; i + j;\n        System.out.println(compFunc.apply(0, 65));\n    }\n}</pre><p>NOTE: ASCII value of A is 65.</p><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP26495Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;Integer, Integer, Character&gt; compFunc = (i, j) -&gt; i + j;\n        System.out.println(compFunc.apply(0, 65));\n    }\n}NOTE: ASCII value of A is 65.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772632, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP22069: </strong></p><p>Arrays.asList(...) method returns a fixed-size list backed by the specified array and as list is backed by the specified array therefore, you cannot add or remove elements from this list. Using add/remove methods cause an exception at runtime. But you can invoke the set(int index, E element) method on the returned list.</p><p>This behavior is bit different from the List.of(...) method, which returns unmodifiable list, hence calling add/remove/set methods on the unmodifiable list throws an exception at runtime.</p><p><br></p><p>Given code, does not try to add new elements to the list or does not try to remove elements from the list, hence no question of any runtime exception.</p><p><br></p><p>Iterable&lt;T&gt; interface has forEach(Consumer&lt;? super T&gt;) method. List&lt;E&gt; extends Collection&lt;E&gt; &amp; Collection&lt;E&gt; extends Iterable&lt;E&gt;, therefore forEach(Consumer) can easily be invoked on reference variable of List&lt;E&gt; type.</p><p>As Consumer is a Functional Interface, hence a lambda expression can be passed as argument to forEach() method.&nbsp; </p><p>forEach(Consumer) method performs the given action for each element of the Iterable until all elements have been processed or the action throws an exception.</p><p><br></p><p>Initially,</p><p>list --&gt; {[\"A\"], [\"A\"]}</p><p>1st iteration: i = 0, i == 0 evaluates to true, code inside if-block gets executed. \"B\" is appended to both the list elements. list --&gt; {[\"AB\"], [\"AB\"]}</p><p>2nd iteration: i = 1, i == 0 evaluates to false, code inside else-block gets executed. \"C\" is appended to both the list elements. list --&gt; {[\"ABC\"], [\"ABC\"]}</p><p><br></p><p>list.forEach(sb -&gt; System.out.println(sb)); prints below on to the console:</p><p>ABC</p><p>ABC</p>", "answers": ["<p>A</p><p>A</p>", "<p>ABC</p><p>ABC</p>", "<p>ABB</p><p>ACC</p>", "<p>BC</p><p>BC</p>", "<p>AB</p><p>AB</p>", "<p>AC</p><p>AC</p>", "<p>Runtime exception is thrown</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22069</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder [] arr = {new StringBuilder(\"A\"), new StringBuilder(\"A\")};\n        List&lt;StringBuilder&gt; list = Arrays.asList(arr);\n        for(int i = 0; i &lt; 2; i++)\n            if(i == 0)\n                list.forEach(sb -&gt; sb.append(\"B\"));\n            else\n                list.forEach(sb -&gt; sb.append(\"C\"));\n\n        list.forEach(sb -&gt; System.out.println(sb));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP22069Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder [] arr = {new StringBuilder(\"A\"), new StringBuilder(\"A\")};\n        List&lt;StringBuilder&gt; list = Arrays.asList(arr);\n        for(int i = 0; i &lt; 2; i++)\n            if(i == 0)\n                list.forEach(sb -&gt; sb.append(\"B\"));\n            else\n                list.forEach(sb -&gt; sb.append(\"C\"));\n\n        list.forEach(sb -&gt; System.out.println(sb));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772634, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "answers": ["MRAP", "AMPR", "RPMA", "Runtime Exception", "None of the other options"], "explanation": "<p><strong>UKOCP39731: </strong></p><p>Collections.sort(list, null); =&gt; [\"A\", \"M\", \"P\", \"R\"] {A null Comparator indicates that the elements' natural ordering should be used}</p><p>Streams are lazily evaluated, which means if terminal operations such as: forEach, toArray, reduce, collect, sum, min, max, average etc. are not present, the given stream pipeline is not evaluated and hence peek() method doesn't print anything on to the console. </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP39731</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"M\", \"R\", \"A\", \"P\");\n        Collections.sort(list, null);\n        list.stream()\n            .peek(System.out::print);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["e"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP39731Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"M\", \"R\", \"A\", \"P\");\n        Collections.sort(list, null);\n        list.stream()\n            .peek(System.out::print);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772636, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["Optional[1.0] is printed and program terminates successfully", "Optional[1.0] is printed and program runs infinitely", "Nothing is printed and program runs infinitely", "Compilation error"], "explanation": "<p><strong>UKOCP84773: </strong></p><p>Stream.generate(() -&gt; new Double(\"1.0\")); generates an infinite stream of Double, whose elements are 1.0. </p><p><br></p><p>stream.sorted() is an intermediate operation and needs all the elements to be available for sorting. As all the elements of infinite stream are never available, hence sorted() method never completes. </p><p>So, among all the available option, correct option is: 'Nothing is printed and program runs infinitely.'</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP84773</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Stream.generate(() -&gt; Double.valueOf(\"1.0\"));\n        System.out.println(stream.sorted().findFirst());\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP84773Given code:package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Double&gt; stream = Stream.generate(() -&gt; Double.valueOf(\"1.0\"));\n        System.out.println(stream.sorted().findFirst());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772638, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP37576: </strong></p><p>chars() method in String class returns IntStream, all the elements in this stream are stored as int value of corresponding char. </p><p><br></p><p>filter(Test::isDirection) =&gt; Returns the stream consisting of int (char) for which isDirection method returns true. isDirection method returns true for 'N', 'E', 'W' and 'S' only, for other characters (including whitespace character) it returns false. </p><p><br></p><p>forEach(c -&gt; System.out.print((char)c)); =&gt; forEach method typecast int value to char and hence NEWS is printed on to the console. </p>", "answers": ["orth ast est outh", "N E W S", "NEWS", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP37576</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    private static boolean isDirection(int ch) {\n        switch(ch) {\n            case 'N':\n            case 'E':\n            case 'W':\n            case 'S':\n                return true;\n        }\n        return false;\n    }\n\n    public static void main(String[] args) {\n        String str = \"North East West South\";\n        str.chars()\n            .filter(Test::isDirection)\n            .forEach(c -&gt; System.out.print((char)c));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP37576Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    private static boolean isDirection(int ch) {\n        switch(ch) {\n            case 'N':\n            case 'E':\n            case 'W':\n            case 'S':\n                return true;\n        }\n        return false;\n    }\n\n    public static void main(String[] args) {\n        String str = \"North East West South\";\n        str.chars()\n            .filter(Test::isDirection)\n            .forEach(c -&gt; System.out.print((char)c));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772640, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP30455: </strong></p><p>There are 3 summary statistics methods available in JDK: IntSummaryStatistics, LongSummaryStatistics &amp; DoubleSummaryStatistics. </p><p><br></p><p>summaryStatistics() method in IntStream class returns an instance of IntSummaryStatistics. </p><p>summaryStatistics() method in LongStream class returns an instance of LongSummaryStatistics. </p><p>summaryStatistics() method in DoubleStream class returns an instance of DoubleSummaryStatistics. </p><p><br></p><p>The 3 summary statistics classes override toString() method to print the data about count, sum, min, average and max. </p><p><br></p><p>All the 3 summary statistics classes have methods to extract specific stat as well: getCount(), getSum(), getMin(), getMax() and getAverage(). </p><p><br></p><p>Summary Statistics are really useful if you want multiple stats, say for example you want to find both min and max. As min and max are terminal operation for finite stream, so after using one operation stream gets closed and not possible to use the same stream for other terminal operations.</p>", "answers": ["On execution only sum and average data will be printed on to the console", "On execution only max, min and count data will be printed on to the console", "On execution sum, average, max, min and count data will be printed on to the console", "On execution a text containing @ symbol will be printed on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP30455</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = IntStream.rangeClosed(1, 20)\n                                .filter(i -&gt; i % 2 == 0);\n        System.out.println(stream.summaryStatistics());\n    }\n}</pre><p><br></p><p>Which of the following statements is true for above code?</p>"}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP30455Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = IntStream.rangeClosed(1, 20)\n                                .filter(i -&gt; i % 2 == 0);\n        System.out.println(stream.summaryStatistics());\n    }\n}Which of the following statements is true for above code?", "related_lectures": []}, {"_class": "assessment", "id": 52772642, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP87338</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.function.Predicate;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream.of(List.of('A', 'N', 'T'), List.of('A', 'Q', 'U', 'A'))\n            .filter(Predicate.not(l -&gt; l.size() &gt; 3))\n            .flatMap(l -&gt; l.stream())\n            .collect(Collectors.toList())\n            .forEach(System.out::print);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP87338: </strong></p><p>Predicate&lt;T&gt; interface has 2 static methods: </p><p>+ static &lt;T&gt; Predicate&lt;T&gt; \tisEqual\u200b(Object targetRef): Returns a predicate that tests if two arguments are equal according to Objects.equals(Object, Object).</p><p>+ static &lt;T&gt; Predicate&lt;T&gt; \tnot\u200b(Predicate&lt;? super T&gt; target): Returns a predicate that is the negation of the supplied predicate.</p><p>Predicate.not(l -&gt; l.size() &gt; 3) =&gt; Returns a Predicate, which returns true if passed list's size is &lt;= 3</p><p><br></p><p>Let's check the given code: </p><p>Stream.of(List.of('A', 'N', 'T'), List.of('A', 'Q', 'U', 'A')) =&gt; Stream&lt;List&lt;Character&gt;&gt; [['A', 'N', 'T'], ['A', 'Q', 'U', 'A']]</p><p>.filter(Predicate.not(l -&gt; l.size() &gt; 3)) =&gt; Stream&lt;List&lt;Character&gt;&gt; [['A', 'N', 'T']]</p><p>.flatMap(l -&gt; l.stream()) =&gt; Stream&lt;Character&gt; ['A', 'N', 'T']</p><p>.collect(Collectors.toList()) =&gt; List&lt;Character&gt; ['A', 'N', 'T']</p><p>.forEach(System.out::print) =&gt; Prints ANT</p>", "answers": ["ANT", "AQUA", "[A, N, T]", "[A, Q, U, A]", "Given code executes successfully but produces no output"]}, "correct_response": ["a"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP87338Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.function.Predicate;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream.of(List.of('A', 'N', 'T'), List.of('A', 'Q', 'U', 'A'))\n            .filter(Predicate.not(l -&gt; l.size() &gt; 3))\n            .flatMap(l -&gt; l.stream())\n            .collect(Collectors.toList())\n            .forEach(System.out::print);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772644, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP40276: </strong></p><p>Variable 'es' infers to ExecutorService type and variable 'callable' infers to MyCallable type.</p><p>`Executors.newSingleThreadExecutor();` creates an Executor that uses a single worker thread. </p><p><br></p><p>`new MyCallable(100);` creates MyCallable object and initializes its property i to 100. </p><p><br></p><p>`es.submit(callable)` invokes the call method and returns a Future object containing Integer value 99. get() method prints this value on to the console. </p><p><br></p><p>`es.submit(callable)` is invoked again for the same MyCallable instance, call method returns a Future object containing Integer value 98. get() method prints this value on to the console.</p>", "answers": ["<p>98</p><p>98</p>", "<p>99</p><p>99</p>", "<p>99</p><p>98</p>", "<p>100</p><p>100</p>", "<p>100</p><p>99</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP40276</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(100);\n        System.out.println(es.submit(callable).get());\n        System.out.println(es.submit(callable).get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP40276Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(100);\n        System.out.println(es.submit(callable).get());\n        System.out.println(es.submit(callable).get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772646, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP69901: </strong></p><p>RecursiveAction class has an abstract method `void compute()` and Adder class correctly overrides it.&nbsp; </p><p><br></p><p>`new Adder(1, 20);` instantiates an Adder object with from = 1, to = 20 and total = 0.&nbsp; </p><p><br></p><p>20 - 1 is not less than or equal to 4 hence else block will create multiple Adder objects, and compute() method will be invoked on these objects. More Adder objects will be created further. </p><p><br></p><p>Statement `total+=sum;` will update the total filed of these objects but not the adder object created at Line 34. So when 'System.out.println(adder.total);' is executed, it prints 0 on to the console.</p><p><br></p><p>To get the expected output (which is sum of numbers from 1 to 20), add below code as the last statement in the else block so that total field of Adder object created at Line 34 is updated successfully: </p><p>`total = first.total + second.total;`</p>", "answers": ["It will print 0 on to the console", "It will print 210 on to the console", "It can print any number between 0 and 210", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP69901</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Adder extends RecursiveAction {\n    private int from;\n    private int to;\n    int total = 0;\n\n    Adder(int from, int to) {\n        this.from = from;\n        this.to = to;\n    }\n\n    @Override\n    protected void compute() {\n        if ((to - from) &lt;= 4) {\n            int sum = 0;\n            for(int i = from; i &lt;= to; i++) {\n                sum += i;\n            }\n            total+=sum;\n        } else {\n            int mid = (from + to) / 2;\n            Adder first = new Adder(from, mid);\n            Adder second = new Adder(mid + 1, to);\n            invokeAll(first, second);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Adder adder = new Adder(1, 20); //Line 34\n        ForkJoinPool pool = new ForkJoinPool(4);\n        pool.invoke(adder);\n        System.out.println(adder.total);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "8.2 Concurrency: RecursiveTask, RecursiveAction", "question_plain": "Question ID: UKOCP69901Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Adder extends RecursiveAction {\n    private int from;\n    private int to;\n    int total = 0;\n\n    Adder(int from, int to) {\n        this.from = from;\n        this.to = to;\n    }\n\n    @Override\n    protected void compute() {\n        if ((to - from) &lt;= 4) {\n            int sum = 0;\n            for(int i = from; i &lt;= to; i++) {\n                sum += i;\n            }\n            total+=sum;\n        } else {\n            int mid = (from + to) / 2;\n            Adder first = new Adder(from, mid);\n            Adder second = new Adder(mid + 1, to);\n            invokeAll(first, second);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Adder adder = new Adder(1, 20); //Line 34\n        ForkJoinPool pool = new ForkJoinPool(4);\n        pool.invoke(adder);\n        System.out.println(adder.total);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772578, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["1Z0-819", "true", "false", "Compilation error"], "explanation": "<p><strong>UKOCP62170: </strong></p><p>Please note that Strings computed by concatenation at compile time, will be referred by String Pool during execution. Compile time String concatenation happens when both of the operands are compile time constants, such as literal, final variable etc. </p><p><br></p><p>For the statement, String s2 = \"1Z0-819\" + \"\";, `\"1Z0-819\" + \"\"` is a constant expression as both the operands \"1Z0-819\" and \"\" are String literals, which means the expression `\"1Z0-819\" + \"\"` is computed at compile-time and results in String literal \"1Z0-819\".</p><p>So, during compilation, Java compiler translates the statement</p><p><code>String s2 = \"1Z0-819\" + \"\";</code></p><p>to </p><p><code>String s2 = \"1Z0-819\";</code></p><p><br></p><p>As \"1Z0-819\" is a String literal, hence at runtime it will be referred by String Pool.</p><p><br></p><p>When Test class is executed, </p><p>s1 refers to \"1Z0-819\" (String Pool object).</p><p>s2 also refers to same String pool object \"1Z0-819\". </p><p>s1 and s2 both refer to the same String object and that is why s1 == s2 returns true.</p><p><br></p><p>Please note that Strings computed by concatenation at run time (if the resultant expression is not constant expression) are newly created and therefore distinct.</p><p>For below code snippet:</p><pre class=\"prettyprint linenums\">String str1 = \"1Z0-819\";\nString str2 = str1 + \"\";\nSystem.out.println(str1 == str2);</pre><p><br></p><p>Output is false, as str1 is a variable and `str1 + \"\"` is not a constant expression, therefore this expression is computed only at runtime and a new non-pool String object is created.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP62170</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String s1 = \"1Z0-819\";\n        String s2 = \"1Z0-819\" + \"\";\n        System.out.println(s1 == s2);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP62170Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String s1 = \"1Z0-819\";\n        String s2 = \"1Z0-819\" + \"\";\n        System.out.println(s1 == s2);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772650, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP40681: </strong></p><p>Variable 'stud' infers to Student type, variable 'objOutputStream' infers to ObjectOutputStream type and variable 'objInputStream' infers to ObjectInputStream type.</p><p>writeObject(Object obj) method of ObjectOutputStream throws IOException.</p><p>readObject() method of ObjectInputStream throws IOException, ClassNotFoundException. </p><p>main(String []) method declares to throw these 2 exceptions.</p><p>Given code compiles successfully. </p><p><br></p><p>As Student class doesn't implement Serializable or Externalizable, hence `oos.writeObject(stud);` throws java.io.NotSerializableException. </p><p><br></p><p>To persist Student objects using ObjectOutputStream, Student class should implement Serializable. </p>", "answers": ["Compilation error", "Runtime Exception", "John : 20", "null : 0"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP40681</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"John\", 20);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}</pre><p>There is full permission to list/create/delete files and directories in C:.</p><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP40681Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"John\", 20);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}There is full permission to list/create/delete files and directories in C:.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772652, "assessment_type": "multiple-choice", "prompt": {"answers": ["true", "false", "Compilation error"], "feedbacks": ["", "", ""], "question": "<p><strong>Question ID: UKOCP63313</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n           Book.java</pre><p>&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; </p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.File;\nimport java.io.IOException;\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\Book.java\");\n        var size1 = Files.size(path);\n\n        var file = new File(\"F:\\\\A\\\\B\\\\Book.java\");\n        var size2 = file.length();\n\n        System.out.println(size1 == size2);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP63313: </strong></p><p>Variable 'path' infers to Path type, variable 'file' infers to File type and variables 'size1' and 'size2' infer to long type.</p><p>static method Files.size(path) method is equivalent to instance method length() defined in java.io.File class. </p><p><br></p><p>Both returns file of the length, in bytes. </p>"}, "correct_response": ["a"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP63313F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n           Book.java&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.File;\nimport java.io.IOException;\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException{\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\Book.java\");\n        var size1 = Files.size(path);\n\n        var file = new File(\"F:\\\\A\\\\B\\\\Book.java\");\n        var size2 = file.length();\n\n        System.out.println(size1 == size2);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772654, "assessment_type": "multiple-choice", "prompt": {"answers": ["true:true", "true:false", "false:false", "false:true"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP20626: </strong></p><p>First of all I would like to tell you that Windows shortcut and symbolic links are different.&nbsp; </p><p>Shortcut is just a regular file and symbolic link is a File System object.&nbsp; </p><p><br></p><p>To create symbolic link used in this question, I used below command: </p><p>C:\\TEMP&gt;mklink msg .\\Parent\\Child\\Message.txt&nbsp; </p><p><br></p><p>And below message was displayed on to the console for the successful creation of symbolic link 'symbolic link created for msg &lt;&lt;===&gt;&gt; .\\Parent\\Child\\Message.txt'.&nbsp; </p><p><br></p><p>When copy() method is used for symbolic link, then by default target file is copied and not the symbolic link.&nbsp; </p><p><br></p><p>So, 'src' is a symbolic link an 'tgt' is a regular file. 'true:false' is printed on to the console. </p><p><br></p><p>NOTE: If you want to copy symbolic link, then use `Files.copy(src, tgt, LinkOption.NOFOLLOW_LINKS);` but make sure that user should have 'symbolic' LinkPermission. </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP20626</strong></p><p><br></p><p>C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:</p><pre class=\"prettyprint linenums\">C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt</pre><p>'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"C:\", \"TEMP\", \"msg\");\n\n        var tgt = Paths.get(\"C:\", \"TEMP\", \"Parent\", \"copy\");\n        Files.copy(src, tgt);\n\n        System.out.println(Files.isSymbolicLink(src) + \":\" + Files.isSymbolicLink(tgt));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP20626C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"C:\", \"TEMP\", \"msg\");\n\n        var tgt = Paths.get(\"C:\", \"TEMP\", \"Parent\", \"copy\");\n        Files.copy(src, tgt);\n\n        System.out.println(Files.isSymbolicLink(src) + \":\" + Files.isSymbolicLink(tgt));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772656, "assessment_type": "multiple-choice", "prompt": {"answers": ["102", "104", "105", "An exception is thrown by rs.deleteRow();", "An exception is thrown by rs.refreshRow();"], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP32230: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type and variable 'stmt' infers to Statement type. Variables 'rs' infers to ResultSet type.</p><p><br></p><p>Given query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000    \n102 Sean    Smith   15000    \n103 Regina  Williams    15500    \n104 Natasha George  14600    </pre><p><br></p><p>`rs.absolute(1);` It moves the cursor to 1st record</p><p>`rs.moveToInsertRow();` It moves the cursor to the insert row. </p><p>Please note, If the cursor is at insert row and refreshRow() or updateRow() or deleteRow() method is called, then SQLException is thrown.</p><p>Hence, in this case an exception is thrown by rs.deleteRow();</p><p><br></p><p>NOTE: If you comment out `rs.deleteRow();` statement, then `rs.refreshRow();` statement would throw SQLException.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP32230</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.absolute(1);\n            rs.moveToInsertRow();\n            rs.updateInt(1, 105);\n            rs.updateString(2, \"Chris\");\n            rs.updateString(3, \"Morris\");\n            rs.updateDouble(4, 25000);\n            rs.deleteRow();\n            rs.refreshRow();\n            System.out.println(rs.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP32230Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.absolute(1);\n            rs.moveToInsertRow();\n            rs.updateInt(1, 105);\n            rs.updateString(2, \"Chris\");\n            rs.updateString(3, \"Morris\");\n            rs.updateDouble(4, 25000);\n            rs.deleteRow();\n            rs.refreshRow();\n            System.out.println(rs.getInt(1));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772658, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP68673: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>Given query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000    \n102 Sean    Smith   15000    \n103 Regina  Williams    15500    \n104 Natasha George  14600    </pre><p>Initially cursor is just before the 1st record. </p><p><br></p><p>`rs.relative(-3);` doesn't throw any exception but keeps the cursor just before the 1st record. According to javadoc of relative method, \"Attempting to move beyond the first/last row in the result set positions the cursor before/after the first/last row\". Same is true for absolute method as well. </p><p><br></p><p>`rs.relative(1);` is identical to `rs.next()` so it moves the cursor to the 1st record. </p><p><br></p><p>`rs.getInt(1)` returns 101. </p>", "answers": ["An exception is thrown at runtime", "101", "102", "103", "104"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP68673</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.relative(-3);\n            rs.relative(1);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP68673Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.relative(-3);\n            rs.relative(1);\n            System.out.println(rs.getInt(1));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772660, "assessment_type": "multiple-choice", "prompt": {"answers": ["<p><code>abstract protected String[][] getContents();</code> </p>", "<p><code>abstract protected String[] getContents();</code> </p>", "<p><code>abstract protected Object[][] getContents();</code> </p>", "<p><code>abstract protected Object[] getContents();</code> </p>"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP81617: </strong></p><p>ListResourceBundle has one abstract method: `abstract protected Object[][] getContents();`. </p><p>All the concrete sub classes of ListResourceBundle must override this method.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP81617</strong></p><p><br></p><p>Which of the following method a concrete class must override if it extends from ListResourceBundle?</p>"}, "correct_response": ["c"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP81617Which of the following method a concrete class must override if it extends from ListResourceBundle?", "related_lectures": []}, {"_class": "assessment", "id": 52772662, "assessment_type": "multiple-choice", "prompt": {"answers": ["Runtime Exception", "01nd day of 2023", "02nd day of 2023", "32nd day of 2023"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP45559: </strong></p><p>Variable 'date' infers to LocalDate type and variable 'formatter' infers to DateTimeFormatter type.</p><p><br></p><p>In the format string, anything between opening and closing quote [''] is displayed as it is. </p><p><br></p><p>DD -&gt; is for representing single digit number as 2 digits (4 as 04).</p><p>'nd day of' -&gt; nd day of is displayed.</p><p>uuuu -&gt; 4 digit representation for the year. </p><p><br></p><p>Output is: 32nd day of 2023. </p><p><br></p><p>NOTE: To display single quote, escape it with one more single quote. For example, </p><p>`DateTimeFormatter.ofPattern(\"'It''s' DD'nd day of' uuuu\");` this will help to print: [It's 32nd day of 2018] where as `DateTimeFormatter.ofPattern(\"'It's' DD'nd day of' uuuu\");` causes runtime exception.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP45559</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(2023, Month.FEBRUARY, 1);\n        var formatter = DateTimeFormatter.ofPattern(\"DD'nd day of' uuuu\");\n        System.out.println(formatter.format(date));\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "12.4 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP45559Given code: package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(2023, Month.FEBRUARY, 1);\n        var formatter = DateTimeFormatter.ofPattern(\"DD'nd day of' uuuu\");\n        System.out.println(formatter.format(date));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772664, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "answers": ["Author annotation fails to compile", "Authors annotation fails to compile", "Test class fails to compile", "Given codes compile successfully and on execution print 4", "Given codes compile successfully and on execution print 3", "Given codes compile successfully and on execution print 2", "<p>Given codes compile successfully and on execution print 1</p>"], "explanation": "<p><strong>UKOCP17032: </strong></p><p>Annotation Author compiles successfully, `@Repeatable(Authors.class)` annotation indicates that containing annotation type is Authors, so repeating @Author annotations is stored in an @Authors annotation.</p><p> </p><p>Authors annotation is the containing annotation type, which has 'value' attribute of Author[] type. Hence, Authors annotation also compiles successfully. </p><p><br></p><p>Both 'name' and 'age' attributes of Author annotation have default values, hence @Author annotation can be easily applied to Book class. Other 3 @Author annotations are also valid. </p><p>`Book.class.getAnnotations()` returns an Annotation[] and all the repeatable annotations of Author type are stored in Authors as Author [] type. Hence Annotation[] stores just one Annotation object of Authors type.</p><p>Stream.of(Book.class.getAnnotations()) =&gt; Stream&lt;Annotation&gt;[Authors]</p><p>As, Stream contains just one element, hence count() method returns 1.</p><p><br></p><p>Given codes compile successfully and on execution prints 1.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP17032</strong></p><p><br></p><p>Below is the code of Author annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\n@Repeatable(Authors.class)\npublic @interface Author {\n    String name() default \"Udayan\";\n    int age() default 40;\n}</pre><p><br></p><p>Below is the code of Authors annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\npublic @interface Authors {\n    Author[] value();\n}</pre><p><br></p><p>And the code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\n@Author\n@Author(name=\"Sayantan\", age= 35)\n@Author(name=\"Albina\", age=36)\n@Author(name=\"Bharti\", age=37)\nclass Book {}\n\npublic class Test {\n    public static void main(String[] args) {\n        var sum = Stream.of(Book.class.getAnnotations()).count();\n        System.out.println(sum);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["g"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP17032Below is the code of Author annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\n@Repeatable(Authors.class)\npublic @interface Author {\n    String name() default \"Udayan\";\n    int age() default 40;\n}Below is the code of Authors annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\npublic @interface Authors {\n    Author[] value();\n}And the code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.stream.Stream;\n\n@Author\n@Author(name=\"Sayantan\", age= 35)\n@Author(name=\"Albina\", age=36)\n@Author(name=\"Bharti\", age=37)\nclass Book {}\n\npublic class Test {\n    public static void main(String[] args) {\n        var sum = Stream.of(Book.class.getAnnotations()).count();\n        System.out.println(sum);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772666, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["Nothing, given code adheres to all the security guidelines", "A copy of Student objects needs to be sent rather than the Student objects stored in the list", "Provide controlled access to `StudentService.process(List)` method", "`StudentService.process(list);` needs to be invoked in thread-safe manner"], "explanation": "<p><strong>UKOCP28178: </strong></p><p>As, Student is a mutable class, hence copy of all the Student objects should be passed to StudentService.process(List) method.</p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 6-6 / MUTABLE-6: Treat passing input to untrusted object as output</p><p><br></p><p>Question doesn't talks about resource utilization or multi-threading, hence providing controlled access or providing thread-safety are not needed.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP28178</strong></p><p><br></p><p>You have a mutable Student class.</p><p><br></p><p>And you have below piece of Code:</p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        List&lt;Student&gt; list = List.of(/*Data of 100 students*/);\n        StudentService.process(list);\n    }\n}</pre><p><br></p><p>`StudentService.process(list);` processes the list of Student, what needs to be done, according to Java Security guidelines?</p>"}, "correct_response": ["b"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP28178You have a mutable Student class.And you have below piece of Code:public class Test {\n    public static void main(String[] args) {\n        List&lt;Student&gt; list = List.of(/*Data of 100 students*/);\n        StudentService.process(list);\n    }\n}`StudentService.process(list);` processes the list of Student, what needs to be done, according to Java Security guidelines?", "related_lectures": []}, {"_class": "assessment", "id": 52772668, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "answers": ["<p><code>javac --list</code> </p>", "<p><code>javac --list-modules</code> </p>", "<p><code>javac --list-system-modules</code> </p>", "<p><code>java --list</code> </p>", "<p><code>java --list-modules</code> </p>", "<p><code>java --list-system-modules</code> </p>"], "explanation": "<p><strong>UKOCP53107: </strong></p><p>To get a list of all the system modules, use below command:</p><p><code>java --list-modules</code> </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP53107</strong></p><p><br></p><p>Which of the following commands displays the list of system modules?</p>"}, "correct_response": ["e"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP53107Which of the following commands displays the list of system modules?", "related_lectures": []}, {"_class": "assessment", "id": 52772670, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "answers": ["--module-path", "--path", "--source-code-path", "--module-source-path", "--source", "-p"], "explanation": "<p><strong>UKOCP12603: </strong></p><p>Format of javac command is: </p><p>javac &lt;options&gt; &lt;source files&gt;</p><p><br></p><p>Below are the important options (related to modules) of javac command:</p><p>--module-source-path &lt;module-source-path&gt;: </p><p>Specify where to find input source files for multiple modules. In this case, module source path is 'codes' directory. </p><p><br></p><p>--module &lt;module-name&gt;, -m &lt;module-name&gt;: </p><p>Compile only the specified module. This will compile all *.java file specified in the module. Multiple module names are separated by comma.</p><p><br></p><p>-d &lt;directory&gt;: </p><p>Specify where to place generated class files. In this case, it is 'classes' directory. Please note generated class files will be arranged in package-wise directory structure. </p><p><br></p><p>--module-path &lt;path&gt;, -p &lt;path&gt;: </p><p>Specify where to find compiled/packaged application modules. It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries. For example, javac -p mods;singlemodule;connector.jar represents a module path which contains all the modules inside 'mods' directory, exploded module 'singlemodule' and modular jar 'connector.jar'. </p><p><br></p><p>Let's check all the options one by one: </p><p>--module-path</p><p>\u2717&nbsp; --module-source-path is missing. --module-path is same as -p and it expects path of compiled classes or jar files containing compiled classes.</p><p><br></p><p>--module-source-path</p><p>\u2713&nbsp; Correct.</p><p><br></p><p>--path</p><p>\u2717&nbsp; --path is not a valid option of javac command.</p><p><br></p><p>--source-code-path</p><p>\u2717&nbsp; --source-code-path is not a valid option of javac command.</p><p><br></p><p>--source</p><p>\u2717&nbsp; --source is not a valid option of javac command.</p><p><br></p><p>-p</p><p>\u2717&nbsp; --module-source-path is missing. -p is same as --module-path and it expects path of compiled classes or jar files containing compiled classes.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP12603</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---codes\n|   \\---currency\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Currency.java\n|\n\\---classes</pre><p><br></p><p>Below are the file contents:-</p><p>C:\\codes\\currency\\module-info.java:</p><pre class=\"prettyprint linenums\">module currency {\n}</pre><p><br></p><p>C:\\codes\\currency\\com\\udayankhattry\\ocp\\Currency.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Currency {\n    //Lots of valid codes\n}</pre><p><br></p><p>And consider the command to be executed from C:\\</p><p><code>javac -d classes _______________ codes -m currency</code></p><p><br></p><p>Which of the options can be used to fill above blank such that there is no error on executing above command?</p>"}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP12603Given below the directory/file structure on Windows platform: C:\n+---codes\n|   \\---currency\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Currency.java\n|\n\\---classesBelow are the file contents:-C:\\codes\\currency\\module-info.java:module currency {\n}C:\\codes\\currency\\com\\udayankhattry\\ocp\\Currency.java:package com.udayankhattry.ocp;\n\npublic class Currency {\n    //Lots of valid codes\n}And consider the command to be executed from C:\\javac -d classes _______________ codes -m currencyWhich of the options can be used to fill above blank such that there is no error on executing above command?", "related_lectures": []}, {"_class": "assessment", "id": 52772622, "assessment_type": "multiple-choice", "prompt": {"answers": ["[Point(2, 2), Point(4, 5), Point(6, 7)]", "[Point(6, 7), Point(4, 5), Point(2, 2)]", "[Point(4, 5), Point(6, 7), Point(2, 2)]", "Compilation error"], "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP88283</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Point {\n    private int x;\n    private int y;\n    \n    public Point(int x, int y) {\n        this.x = x;\n        this.y = y;\n    }\n    \n    public int getX() {\n        return x;\n    }\n\n    public int getY() {\n        return y;\n    }\n\n    @Override\n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Point&gt; points = new ArrayList&lt;&gt;();\n        points.add(new Point(4, 5));\n        points.add(new Point(6, 7));\n        points.add(new Point(2, 2));\n        \n        Collections.sort(points, new Comparator&lt;Point&gt;() {\n            public int compare(Point o1, Point o2) {\n                return o2.getX() - o1.getX();\n            }\n        });\n        \n        System.out.println(points);\n    }\n}</pre>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP88283: </strong></p><p>return o2.getX() - o1.getX(); means the Comparator is sorting the Point objects on descending value of x of Point objects. </p><p>To sort the Point objects in ascending order of x, use: return o1.getX() - o2.getX();&nbsp; </p><p>To sort the Point objects in ascending order of y, use: return o1.getY() - o2.getY();</p><p>To sort the Point objects in descending order of y, use: return o2.getY() - o1.getY();</p>"}, "correct_response": ["b"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP88283What will be the result of compiling and executing Test class?package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\nclass Point {\n    private int x;\n    private int y;\n    \n    public Point(int x, int y) {\n        this.x = x;\n        this.y = y;\n    }\n    \n    public int getX() {\n        return x;\n    }\n\n    public int getY() {\n        return y;\n    }\n\n    @Override\n    public String toString() {\n        return \"Point(\" + x + \", \" + y + \")\";\n    }\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Point&gt; points = new ArrayList&lt;&gt;();\n        points.add(new Point(4, 5));\n        points.add(new Point(6, 7));\n        points.add(new Point(2, 2));\n        \n        Collections.sort(points, new Comparator&lt;Point&gt;() {\n            public int compare(Point o1, Point o2) {\n                return o2.getX() - o1.getX();\n            }\n        });\n        \n        System.out.println(points);\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 52772576, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP55855</strong></p><p><br></p><p>Consider below code fragment:&nbsp;</p><pre class=\"prettyprint linenums\">String text = \"RISE \";\ntext = text + (text = \"ABOVE \");\nSystem.out.println(text);</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP55855: </strong></p><p>Initially text refers to \"RISE \".</p><p>Given statement: </p><p>text = text + (text = \"ABOVE \");</p><p>text = \"RISE \" + (text = \"ABOVE \"); //Left operand of + operator is evaluated first, text --&gt; \"RISE \"</p><p>text = \"RISE \" + \"ABOVE \"; //Right operand of + operator is evaluated next, text --&gt; \"ABOVE \"</p><p>text = \"RISE ABOVE \"; //text --&gt; \"RISE ABOVE \"</p><p><br></p><p>Hence `System.out.println(text);` print 'RISE ABOVE ' on to the console.</p>", "answers": ["RISE RISE ABOVE ", "RISE ABOVE ", "ABOVE ABOVE ", "RISE ABOVE RISE "]}, "correct_response": ["b"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP55855Consider below code fragment:&nbsp;String text = \"RISE \";\ntext = text + (text = \"ABOVE \");\nSystem.out.println(text);What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772580, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP56726: </strong></p><p>There are no issues with Line n1 and Line n2, both the statements compile successfully.</p><p><br></p><p>String class contains contentEquals(CharSequence) method. Please note that String, StringBuilder and StringBuffer classes implement CharSequence interface, hence contentEquals(CharSequence) method defined in String class cab be invoked with the argument of either String or StringBuilder or StringBuffer. </p><p>At Line n3, `str.contentEquals(sb)` is invoked with StringBuilder argument and hence it compiles fine. On execution it would compare the contents of String object and the passed StringBuilder object. As both the String object and StringBuilder object contains same content \"Game on\", hence on execution, Line n3 will print true.</p><p><br></p><p>contentEquals method is not available in StringBuilder class and hence Line n4 causes compilation error.</p><p><br></p><p>equals method declared in Object class has the declaration: `public boolean equals(Object)`. Generally, equals method is used to compare different instances of same class but if you pass any other object, there is no compilation error. Parameter type is Object so it can accept any Java object. </p><p><br></p><p>`str.equals(sb)` =&gt; It compiles fine, String class overrides equals(Object) method but as 'sb' is of StringBuilder type so `str.equals(sb)` would return false at runtime. </p><p><br></p><p>`sb.equals(str)` =&gt; It also compiles fine, StringBuilder class doesn't override equals(Object) method. So Object version is invoked which uses == operator, hence `sb.equals(str)` would return false as well at runtime. </p>", "answers": ["Only one statement causes compilation error", "Two statements cause compilation error", "Three statements cause compilation error", "Four statements cause compilation error", "No compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP56726</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \"Game on\"; //Line n1\n        StringBuilder sb = new StringBuilder(str); //Line n2\n        \n        System.out.println(str.contentEquals(sb)); //Line n3\n        System.out.println(sb.contentEquals(str)); //Line n4\n        System.out.println(sb.equals(str)); //Line n5\n        System.out.println(str.equals(sb)); //Line n6\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>"}, "correct_response": ["a"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP56726Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \"Game on\"; //Line n1\n        StringBuilder sb = new StringBuilder(str); //Line n2\n        \n        System.out.println(str.contentEquals(sb)); //Line n3\n        System.out.println(sb.contentEquals(str)); //Line n4\n        System.out.println(sb.equals(str)); //Line n5\n        System.out.println(str.equals(sb)); //Line n6\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 52772582, "assessment_type": "multiple-choice", "prompt": {"answers": ["Congratulations", "You failed", "Compilation error", "<p>Congratulations</p><p>You passed</p>"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP19327: </strong></p><p>As there is no brackets after if, hence only one statement is part of if block and other is outside. </p><p>Above code can be written as below: </p><pre class=\"prettyprint linenums\">if(grade &gt;= 60) { \n    System.out.println(\"Congratulations\"); \n} \nSystem.out.println(\"You passed\"); \nelse \n    System.out.println(\"You failed\"); </pre><p>&nbsp; &nbsp; </p><p>There should not be anything in between if-else block but in this case, System.out.println(\"You passed\"); is in between if-else and thus Compilation error.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP19327</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int grade = 85;\n        if(grade &gt;= 60)\n            System.out.println(\"Congratulations\");\n            System.out.println(\"You passed\");\n        else\n            System.out.println(\"You failed\");\n\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["c"], "section": "2.1 Controlling Program Flow: if/else", "question_plain": "Question ID: UKOCP19327Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int grade = 85;\n        if(grade &gt;= 60)\n            System.out.println(\"Congratulations\");\n            System.out.println(\"You passed\");\n        else\n            System.out.println(\"You failed\");\n\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772584, "assessment_type": "multiple-choice", "prompt": {"answers": ["25", "55", "Compilation error", "24"], "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP28697</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        int start = 1;\n        int sum = 0;\n        do {\n            if(start % 2 == 0) {\n                continue;\n            }\n            sum += start; //Line n1\n        } while(++start &lt;= 10);\n        System.out.println(sum);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP28697: </strong></p><p>When start is divisible by 2 [2, 4, 6, 8, 10], continue; statement takes the control to boolean expression and hence Line n1 is not executed. </p><p>Line n1 is executed only in the case of odd numbers which are less than or equals to 10. Therefore, result is the sum of numbers 1,3,5,7,9; which is 25.</p>"}, "correct_response": ["a"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP28697Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        int start = 1;\n        int sum = 0;\n        do {\n            if(start % 2 == 0) {\n                continue;\n            }\n            sum += start; //Line n1\n        } while(++start &lt;= 10);\n        System.out.println(sum);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772586, "assessment_type": "multiple-choice", "prompt": {"answers": ["32", "33", "34", "<p>33</p><p>32</p>", "Compilation error"], "feedbacks": ["", "", "", "", ""], "question": "<p><strong>Question ID: UKOCP30546</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        for(int x = 10, y = 11, z = 12; y &gt; x &amp;&amp; z &gt; y; y++, z -= 2) {\n            System.out.println(x + y + z);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP30546: </strong></p><p>Basic/Regular for loop has following form:</p><p>for ( [ForInit] ; [Expression] ; [ForUpdate] ) {...}</p><p>[ForInit] can be local variable initialization or the following expressions:</p><p>Assignment </p><p>PreIncrementExpression </p><p>PreDecrementExpression </p><p>PostIncrementExpression </p><p>PostDecrementExpression </p><p>MethodInvocation </p><p>ClassInstanceCreationExpression</p><p><br></p><p>[ForUpdate] can be following expressions:</p><p>Assignment </p><p>PreIncrementExpression </p><p>PreDecrementExpression </p><p>PostIncrementExpression </p><p>PostDecrementExpression </p><p>MethodInvocation </p><p>ClassInstanceCreationExpression</p><p><br></p><p>The [Expression] must have type boolean or Boolean, or a compile-time error occurs. If [Expression] is left blank, it evaluates to t
