  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 71526662, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<p><code>s1.equals(s2)</code> </p>", "<p><code>s1.equals(s2.toUpper())</code> </p>", "<p><code>s2.equals(s1.toLower())</code> </p>", "<p><code>s1.length() == s2.length()</code> </p>", "<p><code>s1.equalsIgnoreCase(s2)</code> </p>", "<p><code>s1.contentEquals(s2)</code> </p>"], "explanation": "<p><strong>UKOCP42545: </strong></p><p>Let's check all the statements one by one: </p><p><br></p><p><code>s1.equals(s2)</code>: equals(String) method of String class matches two String objects and it takes character's case into account while matching. Alphabet A in upper case and alphabet a in lower case are not equal according to this method. As String objects referred by s1 and s2 have different cases, hence output is false.</p><p><br></p><p><code>s1.equals(s2.toUpper())</code>: Compilation error as there is no toUpper() method available in String class. Correct method name is: toUpperCase(). </p><p><br></p><p><code>s2.equals(s1.toLower())</code>: Compilation error as there is no toLower() method available in String class. Correct method name is: toLowerCase(). </p><p><br></p><p><code>s1.length() == s2.length()</code>: length() method returns the number of characters in the String object. s1.length() returns 3 and s2.length() also returns 3, hence output is true.</p><p><br></p><p><code>s1.equalsIgnoreCase(s2)</code>: Compares s1 and s2, ignoring case consideration and hence returns true.</p><p><br></p><p><code>s1.contentEquals(s2)</code>: String class contains two methods: contentEquals(StringBuffer) and contentEquals(CharSequence). Please note that String, StringBuilder and StringBuffer classes implement CharSequence interface, hence contentEquals(CharSequence) method defined in String class cab be invoked with the argument of either String or StringBuilder or StringBuffer. In this case, it is invoked with String argument and hence it is comparing the contents of two String objects. This method also takes character's case into account while matching. As String objects referred by s1 and s2 have different cases, hence output is false.</p>", "question": "<p><strong>Question ID: UKOCP42545</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String s1 = \"OCP\";\n        String s2 = \"ocp\";\n        System.out.println(/*INSERT*/);\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print true on to the console? </p><p>Select 2 options.</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["d", "e"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP42545Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String s1 = \"OCP\";\n        String s2 = \"ocp\";\n        System.out.println(/*INSERT*/);\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print true on to the console? Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526718, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<p>8</p><p>27</p><p>64</p>", "<p>2</p><p>3</p><p>4</p>", "Compilation error", "Runtime exception"], "explanation": "<p><strong>UKOCP30912: </strong></p><p>replaceAll(UnaryOperator&lt;E&gt; operator) is the default method added in List interface.&nbsp; </p><p>interface UnaryOperator&lt;T&gt; extends Function&lt;T, T&gt;.&nbsp; </p><p>As List is of Integer type, this means operator must be of UnaryOperator&lt;Integer&gt; type only. </p><p>'list.replaceAll(operator);' causes compilation error as operator is of UnaryOperator&lt;Long&gt; type. </p>", "question": "<p><strong>Question ID: UKOCP30912</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.function.UnaryOperator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = Arrays.asList (2, 3, 4);\n        UnaryOperator&lt;Long&gt; operator = s -&gt; s*s*s;\n        list.replaceAll(operator);\n        list.forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP30912Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.function.UnaryOperator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = Arrays.asList (2, 3, 4);\n        UnaryOperator&lt;Long&gt; operator = s -&gt; s*s*s;\n        list.replaceAll(operator);\n        list.forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526716, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<p>prevention</p><p>prehistoric</p><p>president</p><p>presentation</p><p>previous</p>", "<p>prevention</p><p>prehistoric</p><p>president</p><p>presentation</p>", "<p>prevention</p><p>prehistoric</p><p>presentation</p>", "<p>prehistoric</p><p>presentation</p>", "presentation", "Program terminates successfully without printing anything on to the console"], "explanation": "<p><strong>UKOCP45182: </strong></p><p>BiFunction&lt;T, U, R&gt; : R apply(T t, U u);</p><p>BiFunction interface accepts 3 type parameters, first 2 parameters (T,U) are passed to apply method and 3rd type parameter is the return type of apply method. </p><p>In this case, 'BiFunction&lt;String, String, String&gt;' means apply method will have declaration: `String apply(String str1, String str2)`. Given lambda expression `(str1, str2) -&gt; {&nbsp; return (str1 + str2); };` is the correct implementation of BiFunction&lt;String, String, String&gt; interface. It simply concatenates the passed strings.</p><p><br></p><p>BiPredicate&lt;T, U&gt; : boolean test(T t, U u);&nbsp; </p><p>BiPredicate interface accepts 2 type parameters and these parameters (T,U) are passed to test method, which returns primitive boolean.</p><p>In this case, 'BiPredicate&lt;String, String&gt;' means test method will have declaration: `boolean test(String s1, String s2)`. Given lambada expression `(str1, str2) -&gt; { return func.apply(str1, str2).length() &gt; 10; };` is correct implementation of BiPredicate&lt;String, String&gt;. Also note, lambda expression for BiPredicate uses BiFunction. This predicate returns true if combined length of passed strings is greater than 10. </p><p><br></p><p>For-each loop simply iterates over the String array elements and prints the string after pre-pending it with \"pre\" in case the combined length of result string is greater than 10. \"prehistoric\" has 11 characters and \"presentation\" has 12 characters and hence these are displayed in the output.</p>", "question": "<p><strong>Question ID: UKOCP45182</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;String, String, String&gt; func = (str1, str2) -&gt; {\n            return (str1 + str2);\n        };\n        \n        BiPredicate&lt;String, String&gt; predicate = (str1, str2) -&gt; {\n            return func.apply(str1, str2).length() &gt; 10;\n        };\n        \n        String [] arr = {\"vention\", \"historic\", \"sident\", \"sentation\", \"vious\"};\n        \n        for(String str : arr) {\n            if(predicate.test(\"pre\", str)) {\n                System.out.println(func.apply(\"pre\", str));\n            }\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["d"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP45182Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;String, String, String&gt; func = (str1, str2) -&gt; {\n            return (str1 + str2);\n        };\n        \n        BiPredicate&lt;String, String&gt; predicate = (str1, str2) -&gt; {\n            return func.apply(str1, str2).length() &gt; 10;\n        };\n        \n        String [] arr = {\"vention\", \"historic\", \"sident\", \"sentation\", \"vious\"};\n        \n        for(String str : arr) {\n            if(predicate.test(\"pre\", str)) {\n                System.out.println(func.apply(\"pre\", str));\n            }\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526714, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["55", "56", "66", "Compilation error"], "explanation": "<p><strong>UKOCP50588: </strong></p><p>andThen is the default method defined in Consumer interface, so it is invoked on consumer reference variable.&nbsp; </p><p><br></p><p>Value passed in the argument of accept method is passed to both the consumer objects. So, for understanding purpose Line n1 can be split into: consumer.accept(5); consumer.accept(5); So it prints '55' on to the console. </p><p><br></p><p>Check the code of andThen method defined in Consumer interface to understand it better. </p>", "question": "<p><strong>Question ID: UKOCP50588</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Consumer;\n\npublic class Test {\n    public static void main(String[] args) {\n        Consumer&lt;Integer&gt; consumer = System.out::print;\n        Integer i = 5;\n        consumer.andThen(consumer).accept(i++); //Line n1\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP50588Given code:package com.udayankhattry.ocp;\n\nimport java.util.function.Consumer;\n\npublic class Test {\n    public static void main(String[] args) {\n        Consumer&lt;Integer&gt; consumer = System.out::print;\n        Integer i = 5;\n        consumer.andThen(consumer).accept(i++); //Line n1\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526712, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<p>Consumer : apply</p><p>Function : accept</p><p>Supplier : test</p><p>Predicate : get</p>", "<p>Consumer : apply</p><p>Function : accept</p><p>Supplier : get</p><p>Predicate : test</p>", "<p>Consumer : accept</p><p>Function : apply</p><p>Supplier : get</p><p>Predicate : test</p>", "<p>Consumer : accept</p><p>Function : apply</p><p>Supplier : test</p><p>Predicate : get</p>"], "explanation": "<p><strong>UKOCP27334: </strong></p><p>It is always handy to remember the names and methods of four important built-in functional interfaces: </p><p>Supplier&lt;T&gt; : T get(); </p><p>Function&lt;T, R&gt; : R apply(T t); </p><p>Consumer&lt;T&gt; : void accept(T t); </p><p>Predicate&lt;T&gt; : boolean test(T t); </p><p>Rest of the built-in functional interfaces are either similar to or dependent upon these four interfaces.</p>", "question": "<p><strong>Question ID: UKOCP27334</strong></p><p><br></p><p>Which of the following pairs correctly represent the Functional interface and its single abstract method?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP27334Which of the following pairs correctly represent the Functional interface and its single abstract method?", "related_lectures": []}, {"_class": "assessment", "id": 71526710, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["One option only", "Two options only", "Three options only", "Four options only", "All five options"], "explanation": "<p><strong>UKOCP50562: </strong></p><p>Let's check all the options one by one: </p><p>1. </p><p><code>startRunning(new Runner()); </code></p><p>\u2713&nbsp; Runner class correctly implements MyRunnable interface and as Line n1 invokes the run(5.8, null) method, because of null check, 0.0 is assigned to null argument. </p><p>5.8 + 0.0 = 5.8 and (int) 5.8 = 5.</p><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">startRunning(new Runner() {\n    public int run(Double d1, Double d2) {\n        return (int)((d1 == null ? 0.0 : d1) + (d2 == null ? 0.0 : d2));\n    }\n});</pre><p>\u2713&nbsp; Anonymous inner class correctly overrides method of Runner class (implements MyRunnable interface). </p><p>Again because of null check, passed null value is converted to 0.0. </p><p>(int) (5.8 + 0.0) = (int) 5.8 = 5.</p><p><br></p><p>3. </p><p><code>startRunning((a, b) -&gt;(int) (a + b));</code></p><p>\u2717&nbsp; Though there is no compilation error as given lambda expression is the correct implementation of MyRunnable interface, but at runtime NullPointerException is thrown by the expression `a + b`, because b is null.</p><p><br></p><p>4. </p><p><code>startRunning((a, b) -&gt; a.byteValue());</code></p><p>\u2713&nbsp; Given lambda expression is the correct implementation of MyRunnable interface, even though method return type is int but byte value can easily be assigned to int type. </p><p>Line n1 invokes the run(5.8, null) method and given lambda expression returns the byte value of 1st argument(5.8), which is 5.</p><p><br></p><p>5.</p><p><code>startRunning((var d1, var d2) -&gt; Double.valueOf(d1 + (d2 == null ? 0.0 : d2)).intValue());</code></p><p>\u2713&nbsp; Local Variable type inference is allowed with lambda parameters. Given lambda expression is the correct implementation of MyRunnable interface. </p><p>static valueOf(double) method of Double class returns Double object and non-static intValue() method returns the int value. Output will be 5 in this case.</p>", "question": "<p><strong>Question ID: UKOCP50562</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface MyRunnable {\n    int run(Double start, Double end);\n}\n\nclass Runner implements MyRunnable {\n    public int run(Double s, Double e) {\n        if(s == null) s = 0.0;\n        if(e == null) e = 0.0;\n        return (int) (s + e);\n    }\n}\n\npublic class Test {\n    public static void startRunning(MyRunnable r) {\n        System.out.println(r.run(5.8, null)); //Line n1\n    }\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>And the options:</p><p>1. </p><p><code>startRunning(new Runner());</code></p><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">startRunning(new Runner() {\n    public int run(Double d1, Double d2) {\n        return (int)((d1 == null ? 0.0 : d1) + (d2 == null ? 0.0 : d2));\n    }\n});</pre><p><br></p><p>3. </p><p><code>startRunning((a, b) -&gt;(int) (a + b));</code></p><p><br></p><p>4. </p><p><code>startRunning((a, b) -&gt; a.byteValue());</code></p><p><br></p><p>5.</p><p><code>startRunning((var d1, var d2) -&gt; Double.valueOf(d1 + (d2 == null ? 0.0 : d2)).intValue());</code></p><p><br></p><p>How many of the above options can be used to replace /*INSERT*/ such that output is 5?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP50562Given code: package com.udayankhattry.ocp;\n\ninterface MyRunnable {\n    int run(Double start, Double end);\n}\n\nclass Runner implements MyRunnable {\n    public int run(Double s, Double e) {\n        if(s == null) s = 0.0;\n        if(e == null) e = 0.0;\n        return (int) (s + e);\n    }\n}\n\npublic class Test {\n    public static void startRunning(MyRunnable r) {\n        System.out.println(r.run(5.8, null)); //Line n1\n    }\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}And the options:1. startRunning(new Runner());2. startRunning(new Runner() {\n    public int run(Double d1, Double d2) {\n        return (int)((d1 == null ? 0.0 : d1) + (d2 == null ? 0.0 : d2));\n    }\n});3. startRunning((a, b) -&gt;(int) (a + b));4. startRunning((a, b) -&gt; a.byteValue());5.startRunning((var d1, var d2) -&gt; Double.valueOf(d1 + (d2 == null ? 0.0 : d2)).intValue());How many of the above options can be used to replace /*INSERT*/ such that output is 5?", "related_lectures": []}, {"_class": "assessment", "id": 71526708, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error", "KEEP CALM", "Program compiles and executes successfully but nothing is printed on to the console", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP88706: </strong></p><p>Lambda expression is defined correctly but test() method is not invoked on obj reference. So, no output.</p>", "question": "<p><strong>Question ID: UKOCP88706</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface ITester {\n    void test();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        ITester obj = () -&gt; System.out.println(\"KEEP CALM\");\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP88706Given code: package com.udayankhattry.ocp;\n\ninterface ITester {\n    void test();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        ITester obj = () -&gt; System.out.println(\"KEEP CALM\");\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526706, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["[A]", "[B]", "[C]"], "explanation": "<p><strong>UKOCP26854: </strong></p><p>Deque's add() method invokes addLast(E) method and remove() method invokes removeFirst() method. </p><p><br></p><p>chars.add('A'); =&gt; [*A], {* represents HEAD element}</p><p>chars.add('B'); =&gt; [*A,B],&nbsp; </p><p>chars.remove(); =&gt; [*B],&nbsp; </p><p>chars.add('C'); =&gt; [*B,C],&nbsp; </p><p>chars.remove(); =&gt; [*C],&nbsp; </p><p>System.out.println(chars); =&gt; Prints [C] on to the console. </p>", "question": "<p><strong>Question ID: UKOCP26854</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayDeque;\nimport java.util.Deque;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Character&gt; chars = new ArrayDeque&lt;&gt;();\n        chars.add('A');\n        chars.add('B');\n        chars.remove();\n        chars.add('C');\n        chars.remove();\n\n        System.out.println(chars);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", ""]}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP26854Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayDeque;\nimport java.util.Deque;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Character&gt; chars = new ArrayDeque&lt;&gt;();\n        chars.add('A');\n        chars.add('B');\n        chars.remove();\n        chars.add('C');\n        chars.remove();\n\n        System.out.println(chars);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526704, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["0", "1", "3", "Runtime Exception"], "explanation": "<p><strong>UKOCP57587: </strong></p><p>TreeSet cannot contain null values. Hence, 'new TreeSet&lt;&gt;(Arrays.asList(null,null,null));' throws NullPointerException.</p>", "question": "<p><strong>Question ID: UKOCP57587</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;String&gt; set = new TreeSet&lt;&gt;(Arrays.asList(null,null,null));\n        long count = set.stream().count();\n        System.out.println(count);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP57587Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;String&gt; set = new TreeSet&lt;&gt;(Arrays.asList(null,null,null));\n        long count = set.stream().count();\n        System.out.println(count);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526702, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["[200, 100, 200]", "[100, 200, 200]", "[200, 200]", "[200]", "Compilation error", "Exception is thrown at runtime"], "explanation": "<p><strong>UKOCP23323: </strong></p><p>List cannot accept primitives, it can accept objects only. So, when 100 and 200 are added to the list, then auto-boxing feature converts these to wrapper objects of Integer type. </p><p>So, 4 items gets added to the list. One can expect the same behavior with remove method as well that 100 will be auto-boxed to Integer object. </p><p>But remove method is overloaded in List interface: remove(int) =&gt; Removes the element from the specified position in this list.</p><p>and remove(Object)&nbsp; =&gt; Removes the first occurrence of the specified element from the list. </p><p>As remove(int) version is available, which perfectly matches with the call remove(100); hence compiler does not do auto-boxing in this case. </p><p>But at runtime remove(100) tries to remove the element at 100th index and this throws IndexOutOfBoundsException. </p>", "question": "<p><strong>Question ID: UKOCP23323</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(100);\n        list.add(200);\n        list.add(100);\n        list.add(200);\n        list.remove(100);\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["f"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP23323Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(100);\n        list.add(200);\n        list.add(100);\n        list.add(200);\n        list.remove(100);\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526700, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["IRST", "FIRST", "TSRIF", "Runtime Exception"], "explanation": "<p><strong>UKOCP78024: </strong></p><p>listIterator(index); method allows to have the starting point at any index. Allowed values are between 0 and size of the list.</p><p><br></p><p>ListIterater extends Iterator and can be used to iterate in both the directions. If you want to iterate backward then pass the no. of elements in the list to listIterator(index) method. In this case, 'list.listIterator(5);'.&nbsp; </p><p><br></p><p>To iterate backward, use hasPrevious() and previous() methods.</p>", "question": "<p><strong>Question ID: UKOCP78024</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.ListIterator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"T\", \"S\", \"R\", \"I\", \"F\");\n        ListIterator&lt;String&gt; iter = list.listIterator(5);\n        while(iter.hasPrevious()) {\n            System.out.print(iter.previous());\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP78024Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.ListIterator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"T\", \"S\", \"R\", \"I\", \"F\");\n        ListIterator&lt;String&gt; iter = list.listIterator(5);\n        while(iter.hasPrevious()) {\n            System.out.print(iter.previous());\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526698, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["AEIO", "AEIOU", "Line n1 causes compilation error", "Line n2 causes compilation error", "Runtime exception"], "explanation": "<p><strong>UKOCP44284: </strong></p><p>Line n1 is a valid syntax but as upper-bounded wildcard is used, hence add operation is not supported. Line n2 causes compilation failure.</p>", "question": "<p><strong>Question ID: UKOCP44284</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;? extends String&gt; list = new ArrayList&lt;&gt;(Arrays.asList(\"A\", \"E\", \"I\", \"O\")); //Line n1\n        list.add(\"U\"); //Line n2\n        list.forEach(System.out::print);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP44284Given code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;? extends String&gt; list = new ArrayList&lt;&gt;(Arrays.asList(\"A\", \"E\", \"I\", \"O\")); //Line n1\n        list.add(\"U\"); //Line n2\n        list.forEach(System.out::print);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526696, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["true2", "true-2", "true32", "true-32", "232", "2-32", "<p>032</p>", "<p>0-32</p>"], "explanation": "<p><strong>UKOCP35368: </strong></p><p>Apart from mismatch methods for primitive arrays, Arrays class also has following non-primitive mismatch methods:</p><p>int mismatch\u200b(Object[] a, Object[] a2): Finds and returns the index of the first mismatch between two Object arrays, otherwise return -1 if no mismatch is found. Array elements are compared based on the obj.equals(Object) method.</p><p>int mismatch\u200b(T[] a, T[] a2, Comparator&lt;? super T&gt; cmp): Finds and returns the index of the first mismatch between two Object arrays, otherwise return -1 if no mismatch is found. Array elements are compared based on the specified comparator.</p><p><br></p><p>Statement Arrays.mismatch(array1, array2) returns 0 as StringBuilder class doesn't override equals(Object) method and hence the implementation of equals(Object) method Object class is invoked. equals(Object) method defined in Object class uses == operator to check the equality and based on that 1st element (at index 0) of both the arrays don't match. </p><p><br></p><p>Apart from compare methods to for primitive arrays, Arrays class also has following generic compare methods:</p><p>int compare\u200b(T[] a, T[] b): Compares two Object arrays, with Comparable elements, lexicographically.</p><p>int compare\u200b(T[] a, T[] b, Comparator&lt;? super T&gt; cmp): Compares two Object arrays using a specified comparator.</p><p><br></p><p>StringBuilder elements are Comparable, as StringBuilder class implements Comparable interface. Based on the compareTo(StringBuilder) method implementation, first two array elements of array1 and array2 are same.</p><p>As both the arrays have different StringBuilder objects at index 2 hence, Arrays.compare(array1, array2) returns -32, which is the result of \"Man\".compareTo(\"man\"). </p><p>It simply returns 'M' - 'm' value, which is 77 - 109 = -32.</p><p><br></p><p>Output of the given code is: 0-32.</p>", "question": "<p><strong>Question ID: UKOCP35368</strong></p><p><br></p><p>ASCII code of 'm' is 109 and 'M' is 77.</p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder[] array1 = { new StringBuilder(\"Manners\"), new StringBuilder(\"maketh\"),\n                new StringBuilder(\"Man\") };\n        StringBuilder[] array2 = { new StringBuilder(\"Manners\"), new StringBuilder(\"maketh\"),\n                new StringBuilder(\"man\") };\n        System.out.print(Arrays.mismatch(array1, array2));\n        System.out.print(Arrays.compare(array1, array2));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "feedbacks": ["", "", "", "", "", "", "", ""]}, "correct_response": ["h"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP35368ASCII code of 'm' is 109 and 'M' is 77.Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder[] array1 = { new StringBuilder(\"Manners\"), new StringBuilder(\"maketh\"),\n                new StringBuilder(\"Man\") };\n        StringBuilder[] array2 = { new StringBuilder(\"Manners\"), new StringBuilder(\"maketh\"),\n                new StringBuilder(\"man\") };\n        System.out.print(Arrays.mismatch(array1, array2));\n        System.out.print(Arrays.compare(array1, array2));\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 71526694, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Only one option", "Only two options", "Only three options", "All four options", "None of the other options"], "explanation": "<p><strong>UKOCP70103: </strong></p><p>From the given array, if you print the elements at 1st, 3rd and 5th indexes, then you will get expected output.</p><p>Also note that, for values of n = 0, 2, 4, 6; Line n1 would not be executed, which means even if the value of n is 6, above code will not throw ArrayIndexOutOfBoundsException.</p><p>For 1st option [int n = 0; n &lt; arr.length; n += 1], values of n used: 0, 1, 2, 3, 4, 5 and because of continue; statement, Line n1 will not execute for 0, 2 &amp; 4 and it will execute only for 1, 3 &amp; 5 and therefore NET will be printed.</p><p>For 2nd option [int n = 0; n &lt;= arr.length; n += 1], values of n used: 0, 1, 2, 3, 4, 5, 6 and because of continue; statement, Line n1 will not execute for 0, 2, 4 &amp; 6 and it will execute only for 1, 3 &amp; 5 and therefore NET will be printed.</p><p>For 3rd option [int n = 1; n &lt; arr.length; n += 2], values of n used: 1, 3, 5 and therefore NET will be printed.</p><p>For 4th option [int n = 1; n &lt;= arr.length; n += 2], values of n used: 1, 3, 5 and therefore NET will be printed.</p><p><br></p><p>Hence, all the 4 options are valid. </p>", "question": "<p><strong>Question ID: UKOCP70103</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"I\", \"N\", \"S\", \"E\", \"R\", \"T\"};\n        for(/*INSERT*/) {\n            if (n % 2 == 0) {\n                continue;\n            }\n            System.out.print(arr[n]); //Line n1\n        }\n    }\n}</pre><p><br></p><p>And below options:</p><p>1. <code>int n = 0; n &lt; arr.length; n += 1</code></p><p>2. <code>int n = 0; n &lt;= arr.length; n += 1</code></p><p>3. <code>int n = 1; n &lt; arr.length; n += 2</code></p><p>4. <code>int n = 1; n &lt;= arr.length; n += 2</code></p><p><br></p><p>How many above options can be used to replace /*INSERT*/, such that on execution, code will print NET on to the console?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP70103Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"I\", \"N\", \"S\", \"E\", \"R\", \"T\"};\n        for(/*INSERT*/) {\n            if (n % 2 == 0) {\n                continue;\n            }\n            System.out.print(arr[n]); //Line n1\n        }\n    }\n}And below options:1. int n = 0; n &lt; arr.length; n += 12. int n = 0; n &lt;= arr.length; n += 13. int n = 1; n &lt; arr.length; n += 24. int n = 1; n &lt;= arr.length; n += 2How many above options can be used to replace /*INSERT*/, such that on execution, code will print NET on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71526692, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error", "Runtime Exception", "On execution program terminates successfully after printing &#39;HELLO&#39; on to the console"], "explanation": "<p><strong>UKOCP66550: </strong></p><p>Even though Scanner is created in try-with-resources block, calling close() method explicitly doesn't cause any problem. </p><p>Scanner class allows to invoke close() method multiple times. </p><p><br></p><p>But once Scanner object is closed, other search operations should not be invoked. If invoked on closed scanner, IllegalStateException is thrown.</p>", "question": "<p><strong>Question ID: UKOCP66550</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Scanner;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.print(\"Enter some text: \");\n        try(Scanner scan = new Scanner(System.in)) {\n            String s = scan.nextLine();\n            System.out.println(s);\n            scan.close();\n            scan.nextLine();\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p><p>User input is: HELLO</p>", "feedbacks": ["", "", ""]}, "correct_response": ["b"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP66550Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Scanner;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.print(\"Enter some text: \");\n        try(Scanner scan = new Scanner(System.in)) {\n            String s = scan.nextLine();\n            System.out.println(s);\n            scan.close();\n            scan.nextLine();\n        }\n    }\n}What will be the result of compiling and executing Test class?User input is: HELLO", "related_lectures": []}, {"_class": "assessment", "id": 71526688, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["ClassCastException", "FileNotFoundException", "ExceptionInInitializerError", "RuntimeException"], "explanation": "<p><strong>UKOCP19344: </strong></p><p>ClassCastException extends RuntimeException (unchecked exception), </p><p>FileNotFoundException extends IOException, IOException extends Exception (checked exception), </p><p>ExceptionInInitializerError is from Error family and is thrown by an static initializer block, </p><p>RuntimeException and all its sub classes are unchecked exceptions.</p>", "question": "<p><strong>Question ID: UKOCP19344</strong></p><p><br></p><p>Which of the following is a checked Exception?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP19344Which of the following is a checked Exception?", "related_lectures": []}, {"_class": "assessment", "id": 71526690, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["<pre class=\"prettyprint linenums\">public class C1 implements I1 {\n    public void m1() {}\n}</pre>", "<pre class=\"prettyprint linenums\">public class C2 implements I1 {\n    public void m1() throws java.io.FileNotFoundException{}\n}</pre>", "<pre class=\"prettyprint linenums\">public class C3 implements I1 {\n    public void m1() throws java.io.IOException{}\n}</pre>", "<pre class=\"prettyprint linenums\">public class C4 implements I1 {\n    public void m1() throws Exception{}\n}</pre>"], "explanation": "<p><strong>UKOCP51079: </strong></p><p>NOTE: Question is asking for \"incorrect\" implementation and not \"correct\" implementation.</p><p><br></p><p>java.io.FileNotFoundException extends java.io.IOException</p><p>and</p><p>java.io.IOException extends java.lang.Exception</p><p><br></p><p>According to overriding rules, if super class / interface method declares to throw a checked exception, then overriding method of sub class / implementer class has following options:</p><p>1. May not declare to throw any checked exception.</p><p>2. May declare to throw the same checked exception thrown by super class / interface method.</p><p>3. May declare to throw the sub class of the exception thrown by super class / interface method.</p><p>4. Cannot declare to throw the super class of the exception thrown by super class / interface method. </p><p>5. Cannot declare to throw unrelated checked exception.</p><p>6. May declare to throw any RuntimeException or Error.</p><p><br></p><p>Based on above rules, class C4 incorrectly implements method m1() of interface I1 as it declares to throw Exception, which is super class of java.io.IOException.</p>", "question": "<p><strong>Question ID: UKOCP51079</strong></p><p><br></p><p>Consider the following interface declaration:</p><pre class=\"prettyprint linenums\">public interface I1 {\n    void m1() throws java.io.IOException;\n}</pre><p><br></p><p>Which of the following incorrectly implements interface I1?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP51079Consider the following interface declaration:public interface I1 {\n    void m1() throws java.io.IOException;\n}Which of the following incorrectly implements interface I1?", "related_lectures": []}, {"_class": "assessment", "id": 71526660, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP17116</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println( 53 / 2.0 );\n        System.out.println( 53 % 2.0 );\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP17116: </strong></p><p>As floating point numbers are used in the expression, hence result should be in floating point number.</p><p>Correct result is:</p><p>53 / 2.0 = 26.5</p><p>53 % 2.0 = 1.0</p>", "answers": ["<p>26</p><p>1</p>", "<p>26.5</p><p>1.0</p>", "<p>26.0</p><p>1.0</p>", "<p>26.5</p><p>0.0</p>"]}, "correct_response": ["b"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP17116Given code: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println( 53 / 2.0 );\n        System.out.println( 53 % 2.0 );\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526664, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["One option only", "Two options only", "Three options only", "Four options only", "Five options only", "All 6 options"], "explanation": "<p><strong>UKOCP66503: </strong></p><p>substring(int beginIndex, int endIndex) method of String class extracts the substring, which begins at the specified beginIndex and extends to the character at index endIndex - 1. </p><p>This method throws IndexOutOfBoundsException if the beginIndex is negative, or endIndex is larger than the length of this String object, or beginIndex is larger than endIndex. e.g. </p><p>\"freeway\".substring(4, 7) returns \"way\"</p><p>\"freeway\".substring(4, 8) throws IndexOutOfBoundsException</p><p><br></p><p>substring\u200b(int beginIndex) method of String class extracts the substring, which begins with the character at the specified index and extends to the end of this string. </p><p>This method throws IndexOutOfBoundsException if beginIndex is negative or larger than the length of this String object. e.g. </p><p>\"freeway\".substring(4) returns \"way\"</p><p>\"freeway\".substring(8) throws IndexOutOfBoundsException</p><p><br></p><p>replace(CharSequence target, CharSequence replacement) method of String class returns a new String object after replacing each substring of this string that matches the literal target sequence with the specified literal replacement sequence. e.g. </p><p>\"Java\".replace(\"a\", \"A\") --&gt; returns new String object \"JAvA\".</p><p><br></p><p>Let's check all the given options: </p><p>\"REBUS\".substring(2); [begin = 2, end = 4 (end of the string)], returns \"BUS\" and hence it is a correct option. </p><p>\"REBUS\".substring(2, 4); [begin = 2, end = 3 (endIndex - 1)], returns \"BU\" and hence it is incorrect option. </p><p>\"REBUS\".substring(2, 5); [begin = 2, end = 4 (endIndex - 1)], returns \"BUS\" and hence it is a correct option.</p><p>\"REBUS\".replace(\"RE\", \"\"); It replaces \"RE\" with empty string \"\" and returns \"BUS\", so it is also a correct option.</p><p>\"REBUS\".substring(2, 6); Length of \"REBUS\" = 5 and endIndex = 6, which is greater than 5, hence it will thrown IndexOutOfBoundsException at runtime. Incorrect option</p><p>\"REBUS\".delete(0, 2); Compilation error as delete(...) method is not available in String class, it is part of StringBuilder class. Incorrect option.</p><p><br></p><p>So, total 3 options will replace /*INSERT*/ to print BUS on to the console.</p>", "question": "<p><strong>Question ID: UKOCP66503</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String word = \"REBUS\";\n        /* INSERT */\n        System.out.println(word);\n    }\n}</pre><p><br></p><p>Following options are available to replace /*INSERT*/:</p><p>1. <code>word = word.substring(2);</code></p><p>2. <code>word = word.substring(2, 4);</code></p><p>3. <code>word = word.substring(2, 5);</code></p><p>4. <code>word = word.replace(\"RE\", \"\");</code></p><p>5. <code>word = word.substring(2, 6);</code></p><p>6. <code>word = word.delete(0, 2);</code></p><p><br></p><p>How many of the above options can be used to replace /*INSERT*/ (separately and not together) such that given command prints BUS on to the console?</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["c"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP66503Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String word = \"REBUS\";\n        /* INSERT */\n        System.out.println(word);\n    }\n}Following options are available to replace /*INSERT*/:1. word = word.substring(2);2. word = word.substring(2, 4);3. word = word.substring(2, 5);4. word = word.replace(\"RE\", \"\");5. word = word.substring(2, 6);6. word = word.delete(0, 2);How many of the above options can be used to replace /*INSERT*/ (separately and not together) such that given command prints BUS on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71526666, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "It compiles successfully and on execution prints FRIENDS on to the console", "It compiles successfully and on execution prints 7 on to the console"], "explanation": "<p><strong>UKOCP43413: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name. Line n1 compiles successfully as static variable 'var' is of String type and refers to \"FRIENDS\".</p><p><br></p><p>At Line n2: </p><p>int var = (var = Test.var.length()); //Local variable 'var' is declared of int type and shadows static String variable 'var'</p><p>=&gt; int var = (var = 7); //Test.var refers to \"FRIENDS\" and \"FRIENDS\".length() = 7</p><p>=&gt; int var = 7; //7 is assigned to var</p><p>=&gt; 7 is again assigned to var</p><p><br></p><p>Line n3 prints 7 on to the console. </p>", "question": "<p><strong>Question ID: UKOCP43413</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    static String var = \"FRIENDS\"; //Line n1\n    public static void main(String[] args) {\n        int var = (var = Test.var.length()); //Line n2\n        System.out.println(var); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "1.6 Working with data types: Local variable type inference", "question_plain": "Question ID: UKOCP43413Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    static String var = \"FRIENDS\"; //Line n1\n    public static void main(String[] args) {\n        int var = (var = Test.var.length()); //Line n2\n        System.out.println(var); //Line n3\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526668, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<p><code>char var = '7';</code> </p>", "<p><code>char var = 7;</code> </p>", "<p><code>Integer var = 7;</code> </p>", "<p><code>Character var = '7';</code> </p>", "<p><code>Character var = 7;</code> </p>"], "explanation": "<p><strong>UKOCP71071: </strong></p><p>switch can accept primitive types: byte, short, int, char; wrapper types: Byte, Short, Integer, Character; String and enums. In this case, all are valid values but only 3 executes \"case 7:\". </p><p>case is comparing integer value 7. NOTE: character seven, '7' is different from integer value seven, 7. So \"char var = '7';\" and \"Character var = '7';\" will print DEFAULT on to the console.</p><p><br></p><p>Please also note that the identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p>", "question": "<p><strong>Question ID: UKOCP71071</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        switch(var) {\n            case 7:\n                System.out.println(\"Lucky no. 7\");\n                break;\n            default:\n                System.out.println(\"DEFAULT\");\n        }\n    }\n}</pre><p><br></p><p>For the class Test, which options, if used to replace /*INSERT*/, will print \"Lucky no. 7\" on to the console?</p><p>Select 3 options.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["b", "c", "e"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP71071Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n        switch(var) {\n            case 7:\n                System.out.println(\"Lucky no. 7\");\n                break;\n            default:\n                System.out.println(\"DEFAULT\");\n        }\n    }\n}For the class Test, which options, if used to replace /*INSERT*/, will print \"Lucky no. 7\" on to the console?Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526670, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP14052</strong></p><p><br></p><p>Consider below code of the Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int ctr = 100;\n        one: for (var i = 0; i &lt; 10; i++) {\n            two: for (var j = 0; j &lt; 7; j++) {\n                three: while (true) {\n                    ctr++;\n                    if (i &gt; j) {\n                        break one;\n                    } else if (i == j) {\n                        break two;\n                    } else {\n                        break three;\n                    }\n                }\n            }\n        }\n        System.out.println(ctr);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP14052: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for-loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as the variable name, method name, package name, or loop's label but it cannot be used as a class or interface name.</p><p><br></p><p>For the 1st loop variable, 'i' infers to int type, so no issues for 1st loop, and for the 2nd loop variable 'j' infers to int type, so no issues for 2nd loop as well.</p><p>Let's check the iteration:</p><p>1st iteration of loop one: i = 0</p><p>&nbsp; &nbsp; 1st iteration of loop two: j = 0</p><p>&nbsp; &nbsp; &nbsp; &nbsp; 1st iteration of loop three: ctr = 101. As `i == j` evaluates to true, hence `break two;` gets executed, which takes the control out of loop two and hence to the increment expression (i++) of loop one.</p><p>2nd iteration of loop one; i = 1</p><p>&nbsp; &nbsp; 1st iteration of loop two: j = 0</p><p>&nbsp; &nbsp; &nbsp; &nbsp; 1st iteration of loop three; ctr = 102. As `i &gt; j` evaluates to true, hence `break one;` gets executed, which takes the control out of the loop one. </p><p><br></p><p>`System.out.println(ctr);` prints 102 onto the console.</p>", "answers": ["Compilation error", "100", "101", "102", "103", "104", "<p>105</p>", "<p>106</p>"]}, "correct_response": ["d"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP14052Consider below code of the Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int ctr = 100;\n        one: for (var i = 0; i &lt; 10; i++) {\n            two: for (var j = 0; j &lt; 7; j++) {\n                three: while (true) {\n                    ctr++;\n                    if (i &gt; j) {\n                        break one;\n                    } else if (i == j) {\n                        break two;\n                    } else {\n                        break three;\n                    }\n                }\n            }\n        }\n        System.out.println(ctr);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526672, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<pre class=\"prettyprint linenums\">Outer.Inner obj1 = new Outer().new Inner();\nobj1.m();</pre>", "<pre class=\"prettyprint linenums\">Inner obj2 = new Outer().new Inner();\nobj2.m();</pre>", "<pre class=\"prettyprint linenums\">var obj3 = new Outer().new Inner();\nobj3.m();</pre>", "<pre class=\"prettyprint linenums\">Outer.Inner obj4 = this.new Inner();\nobj4.m();</pre>", "<pre class=\"prettyprint linenums\">Inner obj5 = this.new Inner();\nobj5.m();</pre>"], "explanation": "<p><strong>UKOCP22920: </strong></p><p>There are 2 parts: 1st one is referring the name of inner class, Inner and 2nd one is creating an instance of inner class, Inner. </p><p>Now, main method is outside Outer class only, so inner class's name can be referred by 2 ways only: Outer.Inner or var. </p><p><br></p><p>As, Inner is Regular inner class, so instance of outer class is needed for creating the instance of inner class. Instance of outer class, Outer can only be obtained by new Outer(). So, instance of inner class can be created by: new Outer().new Inner();</p><p><br></p><p>Also note, keyword 'this' is not allowed within static main method.</p>", "question": "<p><strong>Question ID: UKOCP22920</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer {\n    class Inner {\n        public void m() {\n            System.out.println(\"CHANGE IS GOOD\");\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        //Insert statement here\n    }\n}</pre><p><br></p><p>Which statement when inserted in the main(String []) method will print CHANGE IS GOOD on to the console?</p><p>Select 2 options.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["a", "c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP22920Given code: package com.udayankhattry.ocp;\n\nclass Outer {\n    class Inner {\n        public void m() {\n            System.out.println(\"CHANGE IS GOOD\");\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        //Insert statement here\n    }\n}Which statement when inserted in the main(String []) method will print CHANGE IS GOOD on to the console?Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526676, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["No changes are required as given code prints LIGHT on execution", "Delete Line n1, Line n2 and Line n3", "Replace Line n4 with byte... b = 10;", "Replace Line n5 with new Car().speed((byte...)b);"], "explanation": "<p><strong>UKOCP17193: </strong></p><p>speed method is correctly overloaded in Car class as both the methods have different signature: speed(Byte) and speed(byte...). Please note that there is no rule regarding return type for overloaded methods, return type can be same or different. </p><p>`new Car().speed(b);` tags to speed(Byte) as boxing is preferred over variable arguments. Code as is prints DARK on to the console.</p><p>Variable arguments syntax '...' can be used only for method parameters and not for variable type and type-casting. Hence the option of replacing Line n4 and Line n5 are not correct. </p><p>If you delete speed(Byte) method, i.e. Line n1, Line n2 and Line n3, then `new Car().speed(b);` would tag to speed(byte...) method and on execution would print LIGHT on to the console. </p>", "question": "<p><strong>Question ID: UKOCP17193</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Car {\n    void speed(Byte val) { //Line n1\n        System.out.println(\"DARK\"); //Line n2\n    } //Line n3\n\n    void speed(byte... vals) {\n        System.out.println(\"LIGHT\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        byte b = 10; //Line n4\n        new Car().speed(b); //Line n5\n    }\n}</pre><p><br></p><p>Which of the following needs to be done so that LIGHT is printed on to the console?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP17193Given code of Test.java file:package com.udayankhattry.ocp;\n\nclass Car {\n    void speed(Byte val) { //Line n1\n        System.out.println(\"DARK\"); //Line n2\n    } //Line n3\n\n    void speed(byte... vals) {\n        System.out.println(\"LIGHT\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        byte b = 10; //Line n4\n        new Car().speed(b); //Line n5\n    }\n}Which of the following needs to be done so that LIGHT is printed on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71526678, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP57630: </strong></p><p>To invoke the special main method, JVM loads the class in the memory. At that time, static fields of Test class are initialized. obj is of Character type so null is assigned to it. </p><p><br></p><p>Variable 'c' is an instance variable, so char c = obj.charValue(); is not executed. Class is loaded successfully in the memory and DREAMS COME TRUE is printed on to the console.</p><p><br></p><p>NOTE: `new Test();` statement inside main(String []) method will throw NullPointerException but not ExceptionInInitializerError.</p>", "question": "<p><strong>Question ID: UKOCP57630</strong></p><p><br></p><p>Given code:&nbsp;</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    static Character obj;\n    char c = obj.charValue();\n    \n    public static void main(String[] args) {\n        System.out.println(\"DREAMS COME TRUE\");\n    }\n}</pre><p><br></p><p>On execution, does Test class print DREAMS COME TRUE on to the console?</p>", "feedbacks": ["", ""]}, "correct_response": ["a"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP57630Given code:&nbsp;package com.udayankhattry.ocp;\n\npublic class Test {\n    static Character obj;\n    char c = obj.charValue();\n    \n    public static void main(String[] args) {\n        System.out.println(\"DREAMS COME TRUE\");\n    }\n}On execution, does Test class print DREAMS COME TRUE on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71526680, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["200", "<p>200</p><p>100</p>", "<p>100</p><p>200</p>", "Compilation Error in Super class", "Compilation Error in Sub class"], "explanation": "<p><strong>UKOCP56336: </strong></p><p>super(); is added by the compiler as the first statement in both the constructors:</p><pre class=\"prettyprint linenums\">Super(int i) {\n    super();\n    System.out.println(100);\n}</pre><p><br></p><p>and</p><p><br></p><pre class=\"prettyprint linenums\">Sub() {\n    super();\n    System.out.println(200);\n}</pre><p><br></p><p>Class Super extends from Object class and Object class has no-argument constructor, hence no issues with the constructor of Super class. </p><p><br></p><p>But no-argument constructor is not available in Super class, hence calling super(); from Sub class's constructor causes compilation error.</p>", "question": "<p><strong>Question ID: UKOCP56336</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">class Super {\n    Super(int i) {\n        System.out.println(100);\n    }\n}\n\nclass Sub extends Super {\n    Sub() {\n        System.out.println(200);\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Sub();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP56336Consider below code of Test.java file: class Super {\n    Super(int i) {\n        System.out.println(100);\n    }\n}\n\nclass Sub extends Super {\n    Sub() {\n        System.out.println(200);\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Sub();\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 71526682, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["It executes successfully and prints A on to the console", "It executes successfully and prints B on to the console", "It executes successfully and prints C on to the console", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP36738: </strong></p><p>Class A, B and C are declared public and are inside same package 'com.udayankhattry.ocp'. Method print() of class A has correctly been overridden by B and C. </p><p>print() method is public so no issues in accessing it anywhere. </p><p><br></p><p>Let's check the code inside main method. </p><p><code>A obj1 = new C();</code> =&gt; obj1 refers to an instance of C class, it is polymorphism.&nbsp; </p><p><code>A obj2 = new B();</code> =&gt; obj2 refers to an instance of B class, it is polymorphism.&nbsp; </p><p><code>C obj3 = (C)obj1;</code> =&gt; obj1 actually refers to an instance of C class, so at runtime obj3 (C type) will refer to an instance of C class. As obj1 is of A type so explicit typecasting is necessary.&nbsp; </p><p><code>C obj4 = (C)obj2;</code> =&gt; obj2 actually refers to an instance of B class, so at runtime obj4 (C type) will refer to an instance of B class. B and C are siblings and can't refer to each other, so this statement will throw ClassCastException at runtime.</p>", "question": "<p><strong>Question ID: UKOCP36738</strong></p><p><br></p><p>Consider below codes of 4 java files:</p><pre class=\"prettyprint linenums\">//A.java\npackage com.udayankhattry.ocp;\n\npublic class A {\n    public void print() {\n        System.out.println(\"A\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//B.java\npackage com.udayankhattry.ocp;\n\npublic class B extends A {\n    public void print() {\n        System.out.println(\"B\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//C.java\npackage com.udayankhattry.ocp;\n\npublic class C extends A {\n    public void print() {\n        System.out.println(\"C\");\n    }\n}\n</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        A obj1 = new C();\n        A obj2 = new B();\n        C obj3 = (C)obj1;\n        C obj4 = (C)obj2;\n        obj3.print();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP36738Consider below codes of 4 java files://A.java\npackage com.udayankhattry.ocp;\n\npublic class A {\n    public void print() {\n        System.out.println(\"A\");\n    }\n}//B.java\npackage com.udayankhattry.ocp;\n\npublic class B extends A {\n    public void print() {\n        System.out.println(\"B\");\n    }\n}//C.java\npackage com.udayankhattry.ocp;\n\npublic class C extends A {\n    public void print() {\n        System.out.println(\"C\");\n    }\n}\n//Test.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        A obj1 = new C();\n        A obj2 = new B();\n        C obj3 = (C)obj1;\n        C obj4 = (C)obj2;\n        obj3.print();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526684, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error at Line n1", "Compilation error at Line n2", "Compilation error at Line n3", "<p>Given code compiles successfully and on execution prints below in the output: </p><p>Flying at 20 degrees.</p><p>Landing at -20 degrees.</p>"], "explanation": "<p><strong>UKOCP79419: </strong></p><p>As per Java 8, default and static methods were added in the interface and default methods can invoke static method as well. Hence, there is no issue with the Flyable interface.</p><p><br></p><p>Class Aeroplane implements Flyable interface, hence it inherits the default method fly() and static method horizontalDegree() can be accessed using Flyable.horizontalDegree(). Class Aeroplane also provides the implementation of land() method. There is no issue with Aeroplane class as well.</p><p><br></p><p>On execution below text is printed on to the console: </p><p>Flying at 20 degrees.</p><p>Landing at -20 degrees.</p>", "question": "<p><strong>Question ID: UKOCP79419</strong></p><p><br></p><p>Consider below codes of 2 java files: </p><pre class=\"prettyprint linenums\">//Flyable.java\npackage com.udayankhattry.ocp;\n\npublic interface Flyable {\n    static int horizontalDegree() { //Line n1\n        return 20;\n    }\n\n    default void fly() {\n        System.out.println(\"Flying at \" + horizontalDegree() + \" degrees.\"); //Line n2\n    }\n\n    void land();\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Aeroplane.java\npackage com.udayankhattry.ocp;\n\npublic class Aeroplane implements Flyable {\n    public void land() {\n        System.out.println(\"Landing at \" + -Flyable.horizontalDegree() + \" degrees.\"); //Line n3\n    }\n\n    public static void main(String[] args) {\n        new Aeroplane().fly();\n        new Aeroplane().land();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Aeroplane class?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP79419Consider below codes of 2 java files: //Flyable.java\npackage com.udayankhattry.ocp;\n\npublic interface Flyable {\n    static int horizontalDegree() { //Line n1\n        return 20;\n    }\n\n    default void fly() {\n        System.out.println(\"Flying at \" + horizontalDegree() + \" degrees.\"); //Line n2\n    }\n\n    void land();\n}//Aeroplane.java\npackage com.udayankhattry.ocp;\n\npublic class Aeroplane implements Flyable {\n    public void land() {\n        System.out.println(\"Landing at \" + -Flyable.horizontalDegree() + \" degrees.\"); //Line n3\n    }\n\n    public static void main(String[] args) {\n        new Aeroplane().fly();\n        new Aeroplane().land();\n    }\n}What will be the result of compiling and executing Aeroplane class?", "related_lectures": []}, {"_class": "assessment", "id": 71526686, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP30130: </strong></p><p>Functional interface must have one and only one non-overriding abstract method.&nbsp; </p><p><br></p><p>boolean equals(Object) is declared and defined in Object class, hence it is not non-overriding abstract method.&nbsp; </p><p><br></p><p>@FunctionalInterface annotation causes compilation error.</p>", "question": "<p><strong>Question ID: UKOCP30130</strong></p><p><br></p><p>Is below functional interface correctly defined?</p><pre class=\"prettyprint linenums\">@FunctionalInterface\ninterface Tester {\n    boolean equals(Object obj);\n}</pre>", "feedbacks": ["", ""]}, "correct_response": ["b"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP30130Is below functional interface correctly defined?@FunctionalInterface\ninterface Tester {\n    boolean equals(Object obj);\n}", "related_lectures": []}, {"_class": "assessment", "id": 71526674, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<p><code>printPrice(null);</code> </p>", "<p><code>printPrice(new Sellable());</code> </p>", "<pre class=\"prettyprint linenums\">printPrice(new Sellable() {\n\n});</pre>", "<pre class=\"prettyprint linenums\">printPrice(new Sellable() {\n    @Override\n    public double getPrice() {\n        return 45.34;\n    }\n});</pre>", "<pre class=\"prettyprint linenums\">var obj = new Sellable() {\n    @Override\n    public double getPrice() {\n        return 20.21;\n    }\n    \n    public Sellable getThisObject() {\n        return this;\n    }\n};\nprintPrice(obj.getThisObject());</pre>"], "explanation": "<p><strong>UKOCP66946: </strong></p><p>Instance of anonymous inner class can be assigned to static variable, instance variable, local variable, method parameter and return value. </p><p>In this question, anonymous inner class instance is assigned to method parameter. </p><p><br></p><p><code>printPrice(null); </code></p><p>\u2713 No compilation error as asked in the question but it would throw NullPointerException at runtime.</p><p><br></p><p><code>printPrice(new Sellable()); </code></p><p>\u2717 Cannot create an instance of Sellable type.</p><p> </p><p><code>printPrice(new Sellable() {}); </code></p><p>\u2717 getPrice() method has not been implemented.&nbsp; </p><p><br></p><pre class=\"prettyprint linenums\">printPrice(new Sellable() {\n    @Override\n    public double getPrice() {\n        return 45.34;\n    }\n});</pre><p>\u2713 anonymous inner class correctly implements the getPrice() method. On execution 45.34 would be printed on to the console.</p><p><br></p><pre class=\"prettyprint linenums\">var obj = new Sellable() {\n    @Override\n    public double getPrice() {\n        return 20.21;\n    }\n    \n    public Sellable getThisObject() {\n        return this;\n    }\n};\nprintPrice(obj.getThisObject());</pre><p>\u2713 Variable 'obj' infers to anonymous inner class implementing Sellable interface. The anonymous inner class correctly overrides getPrice() method and provides a new getThisObject() method. Both these methods can be invoked on reference variable 'obj' as it is of anonymous inner class type.</p><p>getThisObject() method returns the currently executing instance of anonymous inner class, which implements Sellable interface. Hence, instance returned by obj.getThisObject() method will always be subtype of Sellable interface. It would compile successfully and on execution would print 20.21 on to the console. </p>", "question": "<p><strong>Question ID: UKOCP66946</strong></p><p><br></p><p>Below is the code of TestSellable.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Sellable {\n    double getPrice();\n}\n\npublic class TestSellable {\n    private static void printPrice(Sellable sellable) {\n        System.out.println(sellable.getPrice());\n    }\n\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that there are no compilation errors?</p><p>Select 3 options.</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["a", "d", "e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP66946Below is the code of TestSellable.java file:package com.udayankhattry.ocp;\n\ninterface Sellable {\n    double getPrice();\n}\n\npublic class TestSellable {\n    private static void printPrice(Sellable sellable) {\n        System.out.println(sellable.getPrice());\n    }\n\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}Which of the following options can replace /*INSERT*/ such that there are no compilation errors?Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526740, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["TYPE_BACKWARD_ONLY", "TYPE_FORWARD_ONLY", "TYPE_BOTH", "TYPE_SCROLL"], "explanation": "<p><strong>UKOCP56675: </strong></p><p>There are 3 ResultSet types: TYPE_FORWARD_ONLY, TYPE_SCROLL_INSENSITIVE and TYPE_SCROLL_SENSITIVE.</p>", "question": "<p><strong>Question ID: UKOCP56675</strong></p><p><br></p><p>Which of the following is a valid ResultSet type?</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP56675Which of the following is a valid ResultSet type?", "related_lectures": []}, {"_class": "assessment", "id": 71526742, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["0", "1", "2", "3", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP47710: </strong></p><p>DriverManager.getConnection(...), con.createStatement(), stmt.executeQuery(...), rs.next() and rs.getInt(...) all declare to throw SQLException, which is a checked exception and hence handle or declare rule applies in this case. </p><p><br></p><p>As main(String []) method neither declares to throw IOException nor a catch block is available for IOException, hence code doesn't compile. </p>", "question": "<p><strong>Question ID: UKOCP47710</strong></p><p><br></p><p>Given structure of LOG table: </p><p><code>LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))</code></p><p><br></p><p>LOG table contains below records: </p><pre class=\"prettyprint linenums\">1001    Login Successful\n1002    Login Failure\n1003    Not Authorized</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var list = new ArrayList&lt;Integer&gt;();\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement()) {\n                ResultSet rs = stmt.executeQuery(\"Select ID from LOG\");\n                while(rs.next()) {\n                    list.add(rs.getInt(\"ID\"));\n                }\n        }\n        System.out.println(list.size());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["f"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP47710Given structure of LOG table: LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))LOG table contains below records: 1001    Login Successful\n1002    Login Failure\n1003    Not AuthorizedGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var list = new ArrayList&lt;Integer&gt;();\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement()) {\n                ResultSet rs = stmt.executeQuery(\"Select ID from LOG\");\n                while(rs.next()) {\n                    list.add(rs.getInt(\"ID\"));\n                }\n        }\n        System.out.println(list.size());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526744, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "answers": ["<pre class=\"prettyprint linenums\">Arrays.stream(loc)\n    .filter(x -&gt; x.getLanguage().equals(\"fr\"))\n    .forEach(System.out::println);</pre>", "<pre class=\"prettyprint linenums\">Arrays.stream(loc)\n    .filter(x -&gt; x.get
