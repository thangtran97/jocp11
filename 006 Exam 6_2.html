rue.</p><p><br></p><p>All the expressions can be left blank; for(;;) is a valid for loop and it is an infinite loop as [Expression] is blank and evaluates to true.</p><p><br></p><p>Multiple comma separated statements are allowed for [ForInit] and [ForUpdate] expressions, where as [Expression] must be single expression which results in boolean or Boolean.</p><p><br></p><p>In the given for loop:</p><p>[ForInit] = int x = 10, y = 11, z = 12: It is allowed. 3 variables are declared and initialized. x = 10, y = 11 &amp; z = 12.</p><p>[Expression] = y &gt; x &amp;&amp; z &gt; y = (y &gt; x) &amp;&amp; (z &gt; y) [Relational operator has higher precedence than logical AND]. This expression is valid and results in boolean value.</p><p>[ForUpdate] = y++, z -= 2. It is allowed. y is incremented by 1 and z is decremented by 2.</p><p><br></p><p>Let's check the loop's iteration:</p><p>1st iteration: x = 10, y = 11, z = 12. (y &gt; x) &amp;&amp; (z &gt; y) = (11 &gt; 10) &amp;&amp; (12 &gt; 11) = true &amp;&amp; true = true. Loop's body is executed and prints x + y + z = 10 + 11 + 12 = 33 on to the console.</p><p>2nd iteration: [ForUpdate] is executed. y = 12, z = 10. (y &gt; x) &amp;&amp; (z &gt; y) = (12 &gt; 10) &amp;&amp; (10 &gt; 12) = true &amp;&amp; false = false. </p><p>Control goes out of for loop and program terminates successfully.</p><p><br></p><p>Loop's body executes once and prints 33 on to the console.</p>"}, "correct_response": ["b"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP30546Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        for(int x = 10, y = 11, z = 12; y &gt; x &amp;&amp; z &gt; y; y++, z -= 2) {\n            System.out.println(x + y + z);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772588, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP87887: </strong></p><p>Method-local inner classes cannot be defined using explicit access modifiers (public, protected and private) but non-access modifiers: final and abstract can be used with method-local inner class. </p><p>In this case, abstract is also not possible as new B() is used.</p>", "answers": ["public class B", "protected class B", "class B", "private class B", "final class B", "abstract class B"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP87887</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass A {\n    public void someMethod(final String name) {\n        /*INSERT*/ {\n            void print() {\n                System.out.println(\"Hello \" + name);\n            }\n        }\n        new B().print();\n        \n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new A().someMethod(\"World!\");\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing Test class, \"Hello World!\" is displayed in the output?</p><p>Choose 2 options.</p>"}, "correct_response": ["c", "e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP87887Given code:package com.udayankhattry.ocp;\n\nclass A {\n    public void someMethod(final String name) {\n        /*INSERT*/ {\n            void print() {\n                System.out.println(\"Hello \" + name);\n            }\n        }\n        new B().print();\n        \n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new A().someMethod(\"World!\");\n    }\n}Which of the following options can replace /*INSERT*/ such that on executing Test class, \"Hello World!\" is displayed in the output?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 52772590, "assessment_type": "multiple-choice", "prompt": {"answers": ["Yes", "No"], "feedbacks": ["", ""], "question": "<p><strong>Question ID: UKOCP37179</strong></p><p><br></p><p>Will below code compile successfully?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer { \n    interface I1 {\n        void m1();\n    }\n}</pre>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP37179: </strong></p><p>interface can be nested inside a class. Class Outer is top-level class and interface I1 is implicitly static. </p><p>Static nested interface can use all 4 access modifiers(public, protected, default and private).</p>"}, "correct_response": ["a"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP37179Will below code compile successfully?package com.udayankhattry.ocp;\n\nclass Outer { \n    interface I1 {\n        void m1();\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 52772592, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP71940: </strong></p><p>Each instance of the class contains separate copies of instance variable and share one copy of static variable. </p><p>There are 3 instances of Counter class created by main method and these are referred by ctr1, ctr2 and ctr3. </p><p>As 'ctr' is a static variable of Counter class, hence ctr1.ctr, ctr2.ctr and ctr3.ctr refer to the same variable. In fact, 'Counter.ctr' is the preferred way to refer the static variable 'ctr' but ctr1.ctr, ctr2.ctr and ctr3.ctr are also allowed.</p><p><br></p><p>As 'count' is an instance variable, so there are 3 separate copies: ctr1.count, ctr2.count, ctr3.count.</p><p><br></p><p>On the completion of for loop: ctr1.count = 5, ctr2.count = 5 and ctr3.count = 5 and Counter.ctr = 15. </p><p><br></p><p>15:5 is printed on to the console.</p>", "answers": ["Compilation error", "5:5 is printed on to the console", "15:15 is printed on to the console", "15:5 is printed on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP71940</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Counter {\n    static int ctr = 0;\n    int count = 0;\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Counter ctr1 = new Counter();\n        Counter ctr2 = new Counter();\n        Counter ctr3 = new Counter();\n        \n        for(int i = 1; i &lt;= 5; i++ ) {\n            ctr1.ctr++;\n            ctr1.count++;\n            ctr2.ctr++;\n            ctr2.count++;\n            ctr3.ctr++;\n            ctr3.count++;\n        }\n        \n        System.out.println(ctr3.ctr + \":\" + ctr3.count);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["d"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP71940Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nclass Counter {\n    static int ctr = 0;\n    int count = 0;\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Counter ctr1 = new Counter();\n        Counter ctr2 = new Counter();\n        Counter ctr3 = new Counter();\n        \n        for(int i = 1; i &lt;= 5; i++ ) {\n            ctr1.ctr++;\n            ctr1.count++;\n            ctr2.ctr++;\n            ctr2.count++;\n            ctr3.ctr++;\n            ctr3.count++;\n        }\n        \n        System.out.println(ctr3.ctr + \":\" + ctr3.count);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772594, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP22549: </strong></p><p>In this case \"if - else if\" block is used and not \"if - else\" block. </p><p><br></p><p>90000 is assigned to variable 'price' but you can assign parameter value or call some method returning double value, such as:</p><p><br></p><p>`double price = currentTemp();`. </p><p><br></p><p>In these cases, compiler will not know the exact value until runtime, hence Java Compiler is not sure which boolean expression will be evaluated to true and so variable model may not be initialized.</p><p><br></p><p>Usage of LOCAL variable, 'model' without initialization causes compilation error. Hence, `System.out.println(model);` statement causes compilation error.</p>", "answers": ["Tesla Model X", "Tesla Model S", "null", "Compilation Error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22549</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        double price = 90000;\n        String model;\n        if(price &gt; 100000) {\n            model = \"Tesla Model X\";\n        } else if(price &lt;= 100000) {\n            model = \"Tesla Model S\";\n        }\n        System.out.println(model);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["d"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP22549Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        double price = 90000;\n        String model;\n        if(price &gt; 100000) {\n            model = \"Tesla Model X\";\n        } else if(price &lt;= 100000) {\n            model = \"Tesla Model S\";\n        }\n        System.out.println(model);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772596, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["Comment the statement at Line 8", "Comment the statement at Line 9", "Comment the statement at Line 10", "Comment the statement at Line 11"], "explanation": "<p><strong>UKOCP66589: </strong></p><p>class A is declared public and defined in com.udayankhattry.ocp package, there is no problem in accessing class A outside com.udayankhattry.ocp package. </p><p>class B is defined in com.udayankhattry.ocp.test package, to extend from class A either use import statement `import com.udayankhattry.ocp.A;` or fully qualified name of the class 'com.udayankhattry.ocp.A'. No issues with this class definition as well.</p><p><br></p><p>Variable i1 is declared public in class A, so Line 8 doesn't cause any compilation error. Variable i2 is declared protected so it can only be accessed in subclass using using inheritance but not using object reference variable. obj.i2 causes compilation error. </p><p><br></p><p>class B inherits variable i2 from class A, so inside class B it can be accessed by using either this or super. Line 10 and Line 11 don't cause any compilation error.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP66589</strong></p><p><br></p><p>Given codes of A.java file:</p><pre class=\"prettyprint linenums\">//A.java\npackage com.udayankhattry.ocp;\n\npublic class A {\n    public int i1 = 1;\n    protected int i2 = 2;\n}</pre><p><br></p><p>and B.java file: </p><pre class=\"prettyprint linenums\">//B.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.A;\n\npublic class B extends A {\n    public void print() {\n        A obj = new A();\n        System.out.println(obj.i1); //Line 8\n        System.out.println(obj.i2); //Line 9\n        System.out.println(this.i2); //Line 10\n        System.out.println(super.i2); //Line 11\n    }\n    \n    public static void main(String [] args) {\n        new B().print();\n    }\n}</pre><p><br></p><p>One of the statements inside print() method causes compilation error. </p><p>Which of the below solutions will help to resolve compilation error?</p>"}, "correct_response": ["b"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP66589Given codes of A.java file://A.java\npackage com.udayankhattry.ocp;\n\npublic class A {\n    public int i1 = 1;\n    protected int i2 = 2;\n}and B.java file: //B.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.A;\n\npublic class B extends A {\n    public void print() {\n        A obj = new A();\n        System.out.println(obj.i1); //Line 8\n        System.out.println(obj.i2); //Line 9\n        System.out.println(this.i2); //Line 10\n        System.out.println(super.i2); //Line 11\n    }\n    \n    public static void main(String [] args) {\n        new B().print();\n    }\n}One of the statements inside print() method causes compilation error. Which of the below solutions will help to resolve compilation error?", "related_lectures": []}, {"_class": "assessment", "id": 52772598, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP54140: </strong></p><p>Instance method of subclass cannot override the static method of superclass. </p><p><br></p><p>Instance method at Line n2 tries to override the static method at Line n1 and hence Line n2 causes compilation error.</p><p><br></p><p>There is no issue with Line n3 as reference variable of superclass can refer to an instance of subclass.</p><p><br></p><p>At Line n4, paper.getType() doesn't cause compilation error but as this syntax creates confusion, so it is not a good practice to access the static variables or static methods using reference variable, instead class name should be used. Paper.getType() is the preferred syntax. </p>", "answers": ["Compilation error in RuledPaper class", "Compilation error in Test class", "Code compiles successfully and on execution prints GENERIC on to the console", "Code compiles successfully and on execution prints RULED on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54140</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Paper {\n    static String getType() { //Line n1\n        return \"GENERIC\";\n    }\n}\n\nclass RuledPaper extends Paper {\n    String getType() { //Line n2\n        return \"RULED\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Paper paper = new RuledPaper(); //Line n3\n        System.out.println(paper.getType()); //Line n4\n    }\n}</pre><p><br></p><p>Which of the following statements is true for above code?</p>"}, "correct_response": ["a"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP54140Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Paper {\n    static String getType() { //Line n1\n        return \"GENERIC\";\n    }\n}\n\nclass RuledPaper extends Paper {\n    String getType() { //Line n2\n        return \"RULED\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Paper paper = new RuledPaper(); //Line n3\n        System.out.println(paper.getType()); //Line n4\n    }\n}Which of the following statements is true for above code?", "related_lectures": []}, {"_class": "assessment", "id": 52772600, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "answers": ["One declaration/definition", "Two declaration(s)/definition(s)", "Three declaration(s)/definition(s)", "Four declaration(s)/definition(s)", "Five declaration(s)/definition(s)", "All six declaration(s)/definition(s)"], "explanation": "<p><strong>UKOCP34968: </strong></p><p>Let's check all the options one by one:</p><p><code>void test();</code></p><p>\u2713&nbsp; By default test method is public and abstract and it is allowed inside an interface.</p><p><br></p><pre class=\"prettyprint linenums\">default void test(String name) {\n    System.out.println(\"Testing \" + name);\n} </pre><p>\u2713&nbsp; As per Java 8, default methods were added in the interface. It is a valid syntax for the default method to be used inside an interface.</p><p><br></p><pre class=\"prettyprint linenums\">static void test(int x) {\n    System.out.println(x);\n} </pre><p>\u2713&nbsp; As per Java 8, static methods were added in the interface. It is a valid syntax for the static method to be used inside an interface.</p><p>Even if all the above 3 methods [test(), test(String) and test(int)] are available in the same interface, there is no issue at all, it is the case of method overloading.</p><p><br></p><p><code>private default void log1() {}</code></p><p>\u2717&nbsp; As per Java 9, private methods were added in the interface, these can be static or non-static but not default.</p><p><br></p><p><code>private void log2() {}</code></p><p>\u2713&nbsp; As per Java 9, private methods were added in the interface, these can be static or non-static.</p><p><br></p><p><code>private static void log3() {}</code></p><p>\u2713&nbsp; As per Java 9, private methods were added in the interface, these can be static or non-static.</p><p><br></p><p>Out of 6 declarations/definitions, 5 can be used inside an interface.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP34968</strong></p><p><br></p><p>Consider below method declarations/definitions:</p><p>1. </p><p><code>void test();</code></p><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">default void test(String name) {\n    System.out.println(\"Testing \" + name);\n}</pre><p><br></p><p>3. </p><pre class=\"prettyprint linenums\">static void test(int x) {\n    System.out.println(x);\n}</pre><p><br></p><p>4. </p><p><code>private default void log1() {}</code></p><p><br></p><p>5. </p><p><code>private void log2() {}</code></p><p><br></p><p>6. </p><p><code>private static void log3() {}</code></p><p><br></p><p>How many of the above declarations/definitions can be used inside an interface?</p>"}, "correct_response": ["e"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP34968Consider below method declarations/definitions:1. void test();2. default void test(String name) {\n    System.out.println(\"Testing \" + name);\n}3. static void test(int x) {\n    System.out.println(x);\n}4. private default void log1() {}5. private void log2() {}6. private static void log3() {}How many of the above declarations/definitions can be used inside an interface?", "related_lectures": []}, {"_class": "assessment", "id": 52772602, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP30119: </strong></p><p>case labels accept unqualified names of enum constants.&nbsp; </p><p>case TrafficLight.RED:, case TrafficLight.YELLOW: and case TrafficLight.GREEN: cause&nbsp; compilation error.</p><p><br></p><p>Correct case labels should be: </p><p>case RED:, case YELLOW: and case GREEN:</p>", "answers": ["STOP", "No output", "IllegalArgumentException is thrown", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP30119</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">public class Test {\n    enum TrafficLight {\n        RED, YELLOW, GREEN;\n    }\n    \n    public static void main(String[] args) {\n        TrafficLight tl = TrafficLight.valueOf(args[1]);\n        switch(tl) {\n            case TrafficLight.RED:\n                System.out.println(\"STOP\");\n                break;\n            case TrafficLight.YELLOW:\n                System.out.println(\"SLOW\");\n                break;\n            case TrafficLight.GREEN:\n                System.out.println(\"GO\");\n                break;\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class by using the commands: </p><p><code>javac        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["a"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP44311Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void div(int i, int j) {\n        try {\n            System.out.println(i / j);\n        } catch(ArithmeticException e) {\n            Exception ex = new Exception(e);\n            throw ex;\n        }\n    }\n    public static void main(String[] args) {\n        try {\n            div(5, 0);\n        } catch(Exception e) {\n            System.out.println(\"END\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772606, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP21203: </strong></p><p>According to overriding rules, if super class / interface method declares to throw a checked exception, then overriding method of sub class / implementer class has following options:</p><p>1. May not declare to throw any checked exception.</p><p>2. May declare to throw the same checked exception thrown by super class / interface method.</p><p>3. May declare to throw the sub class of the exception thrown by super class / interface method.</p><p>4. Cannot declare to throw the super class of the exception thrown by super class / interface method. </p><p>5. Cannot declare to throw unrelated checked exception.</p><p>6. May declare to throw any RuntimeException or Error.</p><p><br></p><p>default methods were added in Java 8 and TravelBlogger class correctly overrides the default method blog() of Blogger interface. Blogger interface compiles successfully.</p><p><br></p><p>At Line n1, 'blogger' is of Blogger type (supertype) and it refers to an instance of TravelBlogger class (subtype), this is polymorphism and allowed in Java. Line n1 compiles successfully. </p><p>At Line n2, blog() method is being invoked on typecasting 'blogger' to TravelBlogger and as TravelBlogger class doesn't declare to throw any checked exception, hence Line n2 compiles successfully. </p><p><br></p><p>As instance is of TravelBlogger type, therefore on execution, Line n2 invokes blog() method of TravelBlogger instance, which prints TRAVEL on to the console. </p>", "answers": ["Compilation error in TravelBlogger class", "Compilation error in Test class", "GENERIC is printed on to the console and program terminates successfully", "TRAVEL is printed on to the console and program terminates successfully", "An exception is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP21203</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Blogger {\n    default void blog() throws Exception {\n        System.out.println(\"GENERIC\");\n    }\n}\n\nclass TravelBlogger implements Blogger {\n    public void blog() {\n        System.out.println(\"TRAVEL\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Blogger blogger = new TravelBlogger(); //Line n1\n        ((TravelBlogger)blogger).blog(); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["d"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP21203Given code of Test.java file: package com.udayankhattry.ocp;\n\ninterface Blogger {\n    default void blog() throws Exception {\n        System.out.println(\"GENERIC\");\n    }\n}\n\nclass TravelBlogger implements Blogger {\n    public void blog() {\n        System.out.println(\"TRAVEL\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Blogger blogger = new TravelBlogger(); //Line n1\n        ((TravelBlogger)blogger).blog(); //Line n2\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772608, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP49504: </strong></p><p>execute() method throws an instance of SQLException. </p><p><br></p><p>Just before finding the matching handler, Java runtime executes close() method. This method throws an instance of IOException but it gets suppressed and an instance of SQLException is thrown. </p><p><br></p><p>e.getMessage() prints SQLException on to the console. </p><p><br></p><p>NOTE: e.getSuppressed() returns Throwable [] and this helps to get all the suppressed exceptions. </p>", "answers": ["IOException", "SQLException", "Compilation error"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP49504</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() throws IOException{\n        throw new IOException(\"IOException\");\n    }\n\n    public void execute() throws SQLException {\n        throw new SQLException(\"SQLException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(MyResource resource = new MyResource()) {\n            resource.execute();\n        } catch(Exception e) {\n            System.out.println(e.getMessage());\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP49504Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() throws IOException{\n        throw new IOException(\"IOException\");\n    }\n\n    public void execute() throws SQLException {\n        throw new SQLException(\"SQLException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(MyResource resource = new MyResource()) {\n            resource.execute();\n        } catch(Exception e) {\n            System.out.println(e.getMessage());\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772610, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP47340: </strong></p><p>`var x = new int[]{1};`: Right side expression creates an int[] object of one element and 1 is assigned to that element. Target-type (int[]) is specified on the right side, hence this statement compiles successfully. x infers to int[] type. </p><p>Similarly y and z also infer to int[] type.</p><p><br></p><p>System.out.println((x = y = z)[0] + y[0] + z[0]); //x --&gt; {1}, y --&gt; {2} and z --&gt; {3}</p><p>=&gt; System.out.println((x = y)[0] + y[0] + z[0]); //x --&gt; {1}, y --&gt; {3} and z --&gt; {3}</p><p>=&gt; System.out.println(x[0] + y[0] + z[0]); //x --&gt; {3}, y --&gt; {3} and z --&gt; {3}</p><p>=&gt; System.out.println(3 + 3 + z[0]); </p><p>=&gt; System.out.println(6 + 3);</p><p>=&gt; System.out.println(9);</p><p><br></p><p>9 is printed on to the console. </p>", "answers": ["Compilation error", "An exception is thrown at runtime", "3", "6", "7", "8", "<p>9</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP47340</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var x = new int[]{1};\n        var y = new int[]{2};\n        var z = new int[]{3};\n        System.out.println((x = y = z)[0] + y[0] + z[0]);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["g"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP47340Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        var x = new int[]{1};\n        var y = new int[]{2};\n        var z = new int[]{3};\n        System.out.println((x = y = z)[0] + y[0] + z[0]);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772612, "assessment_type": "multiple-choice", "prompt": {"answers": ["T", "Compilation error in Printer&lt;T&gt; class", "Compilation error in Test class", "Compilation error in T class"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP14883: </strong></p><p>T is a valid identifier in Java, hence can be used as class name. toString() method has been correctly overridden by class T. No issues with class T.&nbsp; </p><p><br></p><p>Type parameter should not be a Java keyword and naming convention for Type parameter is to use uppercase single character. class Printer&lt;T&gt; correctly uses type parameter, T. </p><p><br></p><p>When using Generic types in the code, you need to specify the type argument. In Test class, 'Printer&lt;T&gt; obj' =&gt; T refers to class T and not type parameter, T. </p><p><br></p><p>System.out.println(obj); =&gt; Prints 'T' on to the console. </p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP14883</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass T {\n    @Override\n    public String toString() {\n        return \"T\";\n    }\n}\n\nclass Printer&lt;T&gt; {\n    private T t;\n    Printer(T t){\n        this.t = t;\n    }\n    @Override\n    public String toString(){\n        return t.toString();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;T&gt; obj = new Printer&lt;&gt;(new T());\n        System.out.println(obj);\n\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["a"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP14883Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass T {\n    @Override\n    public String toString() {\n        return \"T\";\n    }\n}\n\nclass Printer&lt;T&gt; {\n    private T t;\n    Printer(T t){\n        this.t = t;\n    }\n    @Override\n    public String toString(){\n        return t.toString();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;T&gt; obj = new Printer&lt;&gt;(new T());\n        System.out.println(obj);\n\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772614, "assessment_type": "multiple-choice", "prompt": {"answers": ["java.util.List", "java.util.List&lt;Integer&gt;", "java.util.List&lt;Object&gt;", "java.util.List&lt;int&gt;"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP26419: </strong></p><p>Generic type can only be reference type and not primitive type, hence java.util.List&lt;int&gt; is not a valid syntax. </p><p><br></p><p>If you use raw type java.util.List or java.util.List&lt;Object&gt; then Line n3 will cause compilation failure as list.get(0) will return Object type. Object type cannot be converted to primitive type int.</p><p><br></p><p>java.util.List&lt;Integer&gt; is the only correct option left.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP26419</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">public static void process(/*INSERT*/ list) {\n    list.add(100); //Line n2\n    int x = list.get(0); //Line n3\n    System.out.println(list.size() + \":\" + x);\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, compiles successfully?</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP26419Consider below code snippet:public static void process(/*INSERT*/ list) {\n    list.add(100); //Line n2\n    int x = list.get(0); //Line n3\n    System.out.println(list.size() + \":\" + x);\n}Which of the following options, if used to replace /*INSERT*/, compiles successfully?", "related_lectures": []}, {"_class": "assessment", "id": 52772616, "assessment_type": "multiple-choice", "prompt": {"answers": ["[I]", "[CAN]", "[I, CAN]", "[CAN, I]", "An exception is thrown at runtime"], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP38817: </strong></p><p>list.add(0, \"I\"); means list --&gt; [I],&nbsp; &nbsp;</p><p>list.set(0, \"CAN\"); means replace the current element at index 0 with the passed element \"CAN\". So after this operation, list --&gt; [CAN]. </p><p>[CAN] is printed on to the console.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP38817</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(0, \"I\");\n        list.set(0, \"CAN\");\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP38817Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(0, \"I\");\n        list.set(0, \"CAN\");\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772618, "assessment_type": "multiple-choice", "prompt": {"answers": ["0", "1", "2", "3", "4", "5", "<p>None of the other options</p>"], "feedbacks": ["", "", "", "", "", "", ""], "question": "<p><strong>Question ID: UKOCP68235</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] names = { \"Smith\", \"Brown\", \"Thomas\", \"Taylor\", \"Jones\" };\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        for (int x = 0; x &lt; names.length; x++) {\n            list.add(names[x]);\n            switch (x) {\n                case 2:\n                    continue;\n            }\n            break;\n        }\n        System.out.println(list.size());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP68235: </strong></p><p>break; and continue; are used inside for-loop, hence no compilation error. </p><p>In 1st iteration, x = 0. \"Smith\" is added to the list. There is no matching case found, hence control just goes after the switch-case block and executes break; statement, which takes the control out of the for loop. `System.out.println(list.size());` is executed and this prints 1 on to the console.</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP68235Consider below code of Test.java file: package com.udayankhattry.ocp; \n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        String[] names = { \"Smith\", \"Brown\", \"Thomas\", \"Taylor\", \"Jones\" };\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        for (int x = 0; x &lt; names.length; x++) {\n            list.add(names[x]);\n            switch (x) {\n                case 2:\n                    continue;\n            }\n            break;\n        }\n        System.out.println(list.size());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 52772620, "assessment_type": "multiple-choice", "prompt": {"answers": ["true:true", "true:false", "false:false", "false:true"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP58403: </strong></p><p>There are 12 overloaded of methods in Set interface:</p><p>Set.of()</p><p>Set.of(E e1)</p><p>Set.of\u200b(E e1, E e2)</p><p>Set.of(E e1, E e2, E e3)</p><p>Set.of(E e1, E e2, E e3, E e4)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>Set.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>Set.of(E... elements)</p><p><br></p><p>These create an unmodifiable set containing specified elements. </p><p>These methods throw NullPointerException - if an element is null or IllegalArgumentException - if the elements are duplicates</p><p><br></p><p>Variable 'set1' refers to unmodifiable Set object containing 3 StringBuilder objects.</p><p>Variable 'set2' refers to another unmodifiable Set object containing 3 StringBuilder objects. </p><p>Therefore set1 == set2 evaluates to false. </p><p><br></p><p>According to the Javadoc of equals(Object) method of Set interface, it compares the specified object with this set for equality. Returns true if the specified object is also a set, the two sets have the same size, and every member of the specified set is contained in this set (or equivalently, every member of this set is contained in the specified set). </p><p>To check the equality of the Elements, equals(Object) method of the elements is invoked. StringBuilder class doesn't override equals(Object) method and hence two StringBuilder objects containing same texts are not considered equal. Therefore, `set1.equals(set2)` evaluates to false.</p><p>Output is false:false</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP58403</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var set1 = Set.of(new StringBuilder(\"GOD\"), new StringBuilder(\"IS\"), new StringBuilder(\"GREAT\"));\n        var set2 = Set.of(new StringBuilder(\"GOD\"), new StringBuilder(\"IS\"), new StringBuilder(\"GREAT\"));\n        System.out.println((set1 == set2) + \":\" + set1.equals(set2));\n     }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP58403Given code: package com.udayankhattry.ocp;\n\nimport java.util.Set;\n\npublic class Test {\n    public static void main(String[] args) {\n        var set1 = Set.of(new StringBuilder(\"GOD\"), new StringBuilder(\"IS\"), new StringBuilder(\"GREAT\"));\n        var set2 = Set.of(new StringBuilder(\"GOD\"), new StringBuilder(\"IS\"), new StringBuilder(\"GREAT\"));\n        System.out.println((set1 == set2) + \":\" + set1.equals(set2));\n     }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772624, "assessment_type": "multiple-choice", "prompt": {"answers": ["Compilation error", "Exception is thrown at runtime", "10", "11"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP17995: </strong></p><p>No issues with lambda syntax: curly brackets and semicolon are available. </p><p>As calculate()) method of MyInterface interface returns void, hence `return;` statement works even though it is not mandatory.</p><p>Variable 'i' is declared within the body of lambda expression so don't confuse it with local variable of main method. i is declared and initialized to 10, i is incremented by 1 (i becomes 11) and finally value of 'i' is printed.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP17995</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface MyInterface {\n    void calculate();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        MyInterface obj = () -&gt;  {\n            int i = 10;\n            i++;\n            System.out.println(i);\n            return;\n        };\n        obj.calculate();\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["d"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP17995Given code: package com.udayankhattry.ocp;\n\ninterface MyInterface {\n    void calculate();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        MyInterface obj = () -&gt;  {\n            int i = 10;\n            i++;\n            System.out.println(i);\n            return;\n        };\n        obj.calculate();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 52772672, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP28193: </strong></p><p>Given module descriptor file is valid.</p><p>open module A { =&gt; All the packages of this module are open for reflection</p><p>requires X; =&gt; It reads module X.</p><p>requires transitive Y; =&gt; It transitively reads Y.</p><p>requires static Z; =&gt; Module Z is a compile-time dependency</p><p>} =&gt; closes the module body</p>", "answers": ["0", "1", "2", "3"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP28193</strong></p><p><br></p><p>Modules X, Y and Z are valid modules, module descriptor file of module A is given below: </p><pre class=\"prettyprint linenums\">open module A {\n    requires X;\n    requires transitive Y;\n    requires static Z;\n}</pre><p><br></p><p>How many lines of above module-descriptor file causes compilation error?</p>"}, "correct_response": ["a"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP28193Modules X, Y and Z are valid modules, module descriptor file of module A is given below: open module A {\n    requires X;\n    requires transitive Y;\n    requires static Z;\n}How many lines of above module-descriptor file causes compilation error?", "related_lectures": []}, {"_class": "assessment", "id": 52772674, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "answers": ["<p><code>jlink --module-path modules;%JAVA_HOME%\\jmods --add-modules com.udayankhattry.modularity --output mymodule</code> </p>", "<p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity&nbsp; --output mymodule</code> </p>", "<p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity --launcher mymodule=com.udayankhattry.modularity</code> </p>", "<p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity --output mymodule=com.udayankhattry.modularity</code> </p>", "<p><code>jlink --module-path modules --output mymodule</code> </p>"], "explanation": "<p><strong>UKOCP58349: </strong></p><p>From the command</p><p><code>java -p modules -m com.udayankhattry.modularity</code></p><p>it is clear that, module name is: com.udayankhattry.modularity and module path is: C:\\modules.</p><p><br></p><p>Working jlink command with minimum options is: </p><p>jlink --module-path &lt;modulepath&gt; --add-modules &lt;mod&gt;[,&lt;mod&gt;...] --output &lt;path&gt;</p><p><br></p><p>where, </p><p>modulepath: path to compiled modules/jars</p><p>mod: Root module to resolve</p><p>path: Location of output path</p><p><br></p><p>You may use extra options, such as: </p><p>--launcher &lt;name&gt;=&lt;module&gt;[/&lt;mainclass&gt;]: </p><p>To Add a launcher command of the given name for the module and the main class if specified. </p><p><br></p><p>--compress=&lt;0|1|2&gt;: </p><p>Enable compression of resources:</p><p>Level 0: No compression</p><p>Level 1: Constant string sharing</p><p>Level 2: ZIP</p><p><br></p><p>--bind-services </p><p>Link in service provider modules and their dependences</p><p><br></p><p>Let's check all the options: </p><p><code>jlink --module-path modules;%JAVA_HOME%\\jmods --add-modules com.udayankhattry.modularity --output mymodule</code></p><p>\u2713&nbsp; --module-path modules;%JAVA_HOME%\\jmods: It not only includes modules\\test.jar in the module path but also includes which JDK installation to refer to. </p><p>--add-modules com.udayankhattry.modularity: Specifies that root module to resolve is: com.udayankhattry.modularity</p><p>--output mymodule: It will generated runtime image: C:\\mymodule</p><p><br></p><p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity&nbsp; --output mymodule</code></p><p>\u2713&nbsp; Same as above, only difference is that '%JAVA_HOME%\\jmods' is missing from module-path, in this case it will refer to default java installation.</p><p><br></p><p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity --launcher mymodule=com.udayankhattry.modularity</code></p><p>\u2717&nbsp; --output is missing, hence it will not execute</p><p><br></p><p><code>jlink --module-path modules --add-modules com.udayankhattry.modularity --output mymodule=com.udayankhattry.modularity</code></p><p>\u2717&nbsp; It will generate module runtime image with name 'mymodule=com.udayankhattry.modularity' but question expects you to generate runtime image with the name 'mymodule'</p><p><br></p><p><code>jlink --module-path modules --output mymodule</code></p><p>\u2717&nbsp; --add-modules is missing, hence it will not execute</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP58349</strong></p><p><br></p><p>You have below modular jar file: </p><p>C:\\modules\\test.jar</p><p><br></p><p>And the command executed from C:\\</p><p><code>java -p modules -m com.udayankhattry.modularity</code></p><p><br></p><p>It prints MODULAR APPLICATION on to the console</p><p><br></p><p>Which of the commands executed from C:\\ can create a working runtime image of the modular jar with the name 'mymodule'?</p><p>Choose 2 options.</p>"}, "correct_response": ["a", "b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP58349You have below modular jar file: C:\\modules\\test.jarAnd the command executed from C:\\java -p modules -m com.udayankhattry.modularityIt prints MODULAR APPLICATION on to the consoleWhich of the commands executed from C:\\ can create a working runtime image of the modular jar with the name 'mymodule'?Choose 2 options.", "related_lectures": []}]};

    // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();

        var input = answers[i].children[0].children[0].children[1];

        input.checked = false;

      var span = answers[answer].children[0].children[0].children[0];
      var input = answers[answer].children[0].children[0].children[1];
