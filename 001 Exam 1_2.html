    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 92471021, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP64670: </strong></p><p>Variable 'stud' infers to Student type, variable 'objOutputStream' infers to ObjectOutputStream type and variable 'objInputStream' infers to ObjectInputStream type.</p><p>writeObject(Object obj) method of ObjectOutputStream throws IOException.</p><p>readObject() method of ObjectInputStream throws IOException, ClassNotFoundException. </p><p>main(String []) method declares to throw these 2 exceptions.</p><p>Given code compiles successfully. </p><p><br></p><p>Student class implements Serializable, hence objects of Student class can be serialized using ObjectOutputStream. </p><p><br></p><p>setName() and setAge() are called after executing 'oos.writeObject(stud);' hence these are not reflected in the serialized data.</p><p><br></p><p>On de-serializing, persisted Student date is printed on to the console. </p>", "question": "<p><strong>Question ID: UKOCP64670</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student implements Serializable {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Tony\", 23);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        stud.setName(\"Chris\");\n        stud.setAge(25);\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}</pre><p><br></p><p>There is full permission to list/create/delete files and directories in C:.</p><p>What is the result?</p>", "answers": ["Runtime Exception", "Tony : 23", "Chris : 25", "Compilation error"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP64670Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Student implements Serializable {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public int getAge() {\n        return age;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var stud = new Student(\"Tony\", 23);\n\n        try( var objOutputStream = new ObjectOutputStream(\n            new FileOutputStream(\"C:\\\\Student.dat\")) ){\n            objOutputStream.writeObject(stud);\n        }\n\n        stud.setName(\"Chris\");\n        stud.setAge(25);\n\n        try( var objInputStream = new ObjectInputStream(\n            new FileInputStream(\"C:\\\\Student.dat\")) ){\n            stud = (Student)objInputStream.readObject();\n            System.out.printf(\"%s : %d\", stud.getName(), stud.getAge());\n        }\n    }\n}There is full permission to list/create/delete files and directories in C:.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92470997, "assessment_type": "multi-select", "prompt": {"explanation": "<p><strong>UKOCP37111: </strong></p><p>Question is asking about NEEDED statements. Line n1 indicates that Dog's class constructor must accept String argument (check the create method signature of Creator). </p><p>Adding parameterized constructor in Dog class will rectify the compilation error and on execution it will assign Cooper to name variable. But to print \"Cooper eats biscuits.\", eat() method should be invoked. So, invoke eat() method in Line n2. After making these 2 changes, even if you provide no-argument constructors in Dog and Animal class, it will not affect the output so not needed as well.</p>", "question": "<p><strong>Question ID: UKOCP37111</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Creator&lt;T, R&gt; {\n    R create(T t);\n}\n\nabstract class Animal {\n    abstract void eat();\n}\n\nclass Dog extends Animal {\n    private String name;\n    \n    void eat() {\n        System.out.println(this.name + \" eats biscuits.\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;String, Animal&gt; obj =  Dog::new; //Line n1\n        obj.create(\"Cooper\"); //Line n2\n    }\n}</pre><p><br></p><p>Line n1 causes compilation error. </p><p>Which of the following is NEEDED so that on execution, Test class prints \"Cooper eats biscuits.\" on to the console?</p><p>Choose 2 options.</p>", "answers": ["<p>Add below constructor in the Dog class:</p><pre class=\"prettyprint linenums\">Dog(String name) {\n    this.name = name;\n}</pre>", "<p>Add no-argument constructor in the Dog class:</p><pre class=\"prettyprint linenums\">Dog() {\n    this.name = \"Cooper\";\n}</pre>", "<p>Add no-argument constructor in the Animal class:</p><p><code>Animal() {}</code> </p>", "<p>Replace Line n2 with: </p><p><code>obj.create(\"Cooper\").eat();</code> </p>"], "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["a", "d"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP37111Given code: package com.udayankhattry.ocp;\n\ninterface Creator&lt;T, R&gt; {\n    R create(T t);\n}\n\nabstract class Animal {\n    abstract void eat();\n}\n\nclass Dog extends Animal {\n    private String name;\n    \n    void eat() {\n        System.out.println(this.name + \" eats biscuits.\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;String, Animal&gt; obj =  Dog::new; //Line n1\n        obj.create(\"Cooper\"); //Line n2\n    }\n}Line n1 causes compilation error. Which of the following is NEEDED so that on execution, Test class prints \"Cooper eats biscuits.\" on to the console?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470999, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP88281</strong></p><p><br></p><p>Given code:&nbsp;</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Comparator;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"A5\", \"B4\", \"C3\", \"D2\", \"E1\"};\n        Arrays.sort(arr, Comparator.comparing(s -&gt; s.substring(1)));\n        for(String str : arr) {\n            System.out.print(str + \" \");\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": [], "links": [], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP88281: </strong></p><p>Sorting is working on 2nd letter of the array elements, which means 5, 4, 3, 2, 1. Sorting is in ascending order (1, 2, 3, 4, 5) hence the output is:&nbsp; E1 D2 C3 B4 A5 </p>", "answers": ["E1 D2 C3 B4 A5 ", "A5 B4 C3 D2 E1 ", "A1 B2 C3 D4 E5 ", "E5 D4 C3 B2 A1 "]}, "correct_response": ["a"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP88281Given code:&nbsp;package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Comparator;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"A5\", \"B4\", \"C3\", \"D2\", \"E1\"};\n        Arrays.sort(arr, Comparator.comparing(s -&gt; s.substring(1)));\n        for(String str : arr) {\n            System.out.print(str + \" \");\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471001, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP64725: </strong></p><p>BiPredicate&lt;T, U&gt; : boolean test(T t, U u);&nbsp; </p><p>BiPredicate interface accepts 2 type parameters and these parameters (T,U) are passed to test method, which returns primitive boolean.</p><p><br></p><p>In this case, `BiPredicate&lt;String, String&gt; predicate` means test method will have declaration: `boolean test(String s1, String d2)`. </p><p>`String::startsWith` is equivalent to `(s1, s2) -&gt; s1.startsWith(s2)`</p><p><br></p><p>This is an example of \"Reference to an Instance Method of an Arbitrary Object of a Particular Type\" and not \"method reference to static method\". </p><p><br></p><p>Given predicate means return true for any text starting with uppercase \"A\". </p><p>But inside for loop predicate.negate() means, return true for any text not starting with uppercase \"A\". </p>", "question": "<p><strong>Question ID: UKOCP64725</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"A\", \"ab\", \"bab\", \"Aa\", \"bb\", \"baba\", \"aba\", \"Abab\"};\n        BiPredicate&lt;String, String&gt; predicate = String::startsWith;\n\n        for(String str : arr) {\n            if(predicate.negate().test(str, \"A\"))\n                System.out.println(str);\n        }\n    }\n}</pre><p><br></p><p>What is the result? </p>", "answers": ["<p>ab</p><p>aba</p>", "<p>A</p><p>Aa</p><p>Abab</p>", "<p>ab</p><p>bab</p><p>bb</p><p>baba</p><p>aba</p>", "<p>bab</p><p>bb</p><p>baba</p>"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP64725Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"A\", \"ab\", \"bab\", \"Aa\", \"bb\", \"baba\", \"aba\", \"Abab\"};\n        BiPredicate&lt;String, String&gt; predicate = String::startsWith;\n\n        for(String str : arr) {\n            if(predicate.negate().test(str, \"A\"))\n                System.out.println(str);\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471003, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP62518: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>At Line n1, list refers to List instance of String [] type, which means variable 'list' refers to List instance containing two elements of String[] type. Line n1 compiles successfully.</p><p><br></p><p>Iterable&lt;T&gt; interface has forEach(Consumer&lt;? super T&gt;) method. List&lt;E&gt; extends Collection&lt;E&gt; &amp; Collection&lt;E&gt; extends Iterable&lt;E&gt;, therefore forEach(Consumer) can easily be invoked on reference variable of List&lt;E&gt; type.</p><p>As Consumer is a Functional Interface, hence a lambda expression can be passed as argument to forEach() method.&nbsp; </p><p>forEach(Consumer) method performs the given action for each element of the Iterable until all elements have been processed or the action throws an exception.</p><p><br></p><p>The lambda expression at Line n2 is the correct implementation of Consumer&lt;String []&gt; interface. It compiles successfully and on execution prints the length of each array element. </p><p>1st array object has 3 elements and 2nd array object has 2 elements, therefore output is: 32</p>", "question": "<p><strong>Question ID: UKOCP62518</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new String[]{\"A\", \"BB\", \"CCC\"}, new String[]{\"DD\", \"E\"}); //Line n1\n        list.forEach(x -&gt; System.out.print(x.length)); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["Compilation error at Line n1", "Compilation error at Line n2", "12321", "32"], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP62518Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new String[]{\"A\", \"BB\", \"CCC\"}, new String[]{\"DD\", \"E\"}); //Line n1\n        list.forEach(x -&gt; System.out.print(x.length)); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471005, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP33195: </strong></p><p><code>employees.stream()</code> =&gt; Gets the stream for employees list.&nbsp; </p><p><br></p><p><code>filter(x -&gt; x.getSalary() &gt; 10000)</code> =&gt; Returns a stream consisting of elements of the stream that match the given Predicate. In this case {\"Sonia\", 12000} is returned. </p><p><br></p><p><code>map(e -&gt; e.getName())</code> =&gt; Returns a stream consisting of the results of applying the given function to the elements of this stream. In this case {\"Sonia\"} is returned. </p><p><br></p><p><code>sorted()</code> =&gt; As there is just one element in the stream, hence no changes to the stream.</p><p><br></p><p><code>forEach(System.out::println)</code> =&gt; Prints 'Sonia' on to the console. </p>", "question": "<p><strong>Question ID: UKOCP33195</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Sameer\", 10000),\n            new Employee(\"Sonia\", 12000));\n        employees.stream()\n            .filter(x -&gt; x.getSalary() &gt; 10000)\n            .map(e -&gt; e.getName())\n            .sorted()\n            .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Sameer", "Sonia", "<p>Sameer</p><p>Sonia</p>", "<p>Sonia</p><p>Sameer</p>"], "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP33195Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Employee {\n    private String name;\n    private double salary;\n\n    public Employee(String name, double salary) {\n        this.name = name;\n        this.salary = salary;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public double getSalary() {\n        return salary;\n    }\n\n    public void setSalary(double salary) {\n        this.salary = salary;\n    }\n\n    public String toString() {\n        return \"{\" + name + \", \" + salary + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Employee&gt; employees = Arrays.asList(new Employee(\"Sameer\", 10000),\n            new Employee(\"Sonia\", 12000));\n        employees.stream()\n            .filter(x -&gt; x.getSalary() &gt; 10000)\n            .map(e -&gt; e.getName())\n            .sorted()\n            .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471007, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP69133: </strong></p><p>Stream.of() creates an empty stream. </p><p>stream.findFirst(); =&gt; returns an empty Optional. Hence, orElse method is executed and prints -1 on to the console. </p>", "question": "<p><strong>Question ID: UKOCP69133</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Number&gt; stream = Stream.of();\n        Optional&lt;Number&gt; optional = stream.findFirst();\n        System.out.println(optional.orElse(-1));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["null", "0", "-1", "Optional.empty"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP69133Given code: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Number&gt; stream = Stream.of();\n        Optional&lt;Number&gt; optional = stream.findFirst();\n        System.out.println(optional.orElse(-1));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471009, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP37574: </strong></p><p>IntStream.range(int start, int end) =&gt; start is inclusive and end is exclusive and incremental step is 1. </p><p><br></p><p>count() =&gt; Returns the count of elements in this stream.</p><p><br></p><p>IntStream.range(10,1) =&gt; Returns an empty stream as start &gt; end, this means stream doesn't have any elements. That is why count() returns 0.</p>", "question": "<p><strong>Question ID: UKOCP37574</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(IntStream.range(10,1).count());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["10", "9", "0", "Runtime Exception"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP37574Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(IntStream.range(10,1).count());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471011, "assessment_type": "multi-select", "prompt": {"explanation": "<p><strong>UKOCP61193: </strong></p><p>Integer class doesn't have 'multiply' method, hence options containing 'Integer::multiply' will cause compilation failure. </p><p><br></p><p>To understand, `stream.reduce(1, (i, j) -&gt; i * j)` can be written as:</p><p>int result = 1;</p><p>for (int element : stream) {</p><p>&nbsp; &nbsp; result = op.applyAsInt(result, element);</p><p>}</p><p>return result;</p><p><br></p><p>Above code is just for understanding purpose, you can't iterate a stream using given loop.</p><p>Note: 'op' in above code is of IntBinaryOperator and target type of given lambda expression. </p><p>Check IntPipeline class which implements IntStream for the details of reduce method. </p><p>If 1st argument of reduce is 0, then overall result will be zero. </p><p>`stream.reduce(1, (i, j) -&gt; i * j)` and `stream.reduce(res, (i, j) -&gt; i * j)` are correct options. </p>", "question": "<p><strong>Question ID: UKOCP61193</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int res = 1;\n        IntStream stream = IntStream.rangeClosed(1, 5);\n\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing Test class, 120 is printed in the output?</p><p>NOTE: 120 is the multiplication of numbers from 1 to 5. </p><p>Choose 2 options. </p>", "feedbacks": ["", "", "", "", ""], "answers": ["<p><code>System.out.println(stream.reduce(1, (i, j) -&gt; i * j));</code> </p>", "<p><code>System.out.println(stream.reduce(0, (i, j) -&gt; i * j));</code> </p>", "<p><code>System.out.println(stream.reduce(res, (i, j) -&gt; i * j));</code> </p>", "<p><code>System.out.println(stream.reduce(1, Integer::multiply));</code> </p>", "<p><code>System.out.println(stream.reduce(0, Integer::multiply));</code> </p>"], "relatedLectureIds": ""}, "correct_response": ["a", "c"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP61193Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        int res = 1;\n        IntStream stream = IntStream.rangeClosed(1, 5);\n\n        /*INSERT*/\n    }\n}Which of the following options can replace /*INSERT*/ such that on executing Test class, 120 is printed in the output?NOTE: 120 is the multiplication of numbers from 1 to 5. Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 92471013, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP28131: </strong></p><p>Parallel streams internally use fork/join framework only, so there is always an overhead of splitting the tasks and joining the results.&nbsp; &nbsp;</p><p><br></p><p>Parallel streams improves performance for streams with large number of elements, easily splittable into independent operations and computations are complex. </p>", "feedbacks": ["", ""], "answers": ["true", "false"], "question": "<p><strong>Question ID: UKOCP28131</strong></p><p><br></p><p>Performance with parallel stream is always better than sequential streams.</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP28131Performance with parallel stream is always better than sequential streams.", "related_lectures": []}, {"_class": "assessment", "id": 92471015, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP32655: </strong></p><p>Variable 'es' infers to ExecutorService type, variable 'callable' infers to MyCallable type and variable 'thread' infers to MyThread type.</p><p>Method submit is overloaded in ExecutorService interface to accept both Callable and Runnable: </p><p>&lt;T&gt; Future&lt;T&gt; submit(Callable&lt;T&gt; task): Submits a value-returning task for execution and returns a Future representing the pending results of the task. The Future's get method will return the task's result upon successful completion. </p><p>and </p><p>&lt;T&gt; Future&lt;T&gt; submit\u200b(Runnable task, T result): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return the given result upon successful completion.</p><p>and</p><p>Future&lt;?&gt; submit(Runnable task): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return null upon successful completion.</p><p><br></p><p>All 3 methods return a Future object. </p><p><br></p><p>`es.submit(callable)` executes the call() method of MyCallable, which returns 9 and `es.submit(callable).get()` method returns this value. </p><p><br></p><p>`es.submit(thread)` executes the run() method and `es.submit(thread).get()` returns null.</p>", "question": "<p><strong>Question ID: UKOCP32655</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\nclass MyThread extends Thread {\n    private int i;\n\n    MyThread(int i) {\n        this.i = i;\n    }\n\n    public void run() {\n        i++;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws ExecutionException, InterruptedException{\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(10);\n        var thread = new MyThread(10);\n        System.out.println(es.submit(callable).get());\n        System.out.println(es.submit(thread).get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>9</p><p>10</p>", "<p>9</p><p>11</p>", "<p>9</p><p>0</p>", "<p>9</p><p>null</p>"], "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP32655Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyCallable implements Callable&lt;Integer&gt; {\n    private Integer i;\n\n    public MyCallable(Integer i) {\n        this.i = i;\n    }\n\n    public Integer call() throws Exception {\n        return --i;\n    }\n}\n\nclass MyThread extends Thread {\n    private int i;\n\n    MyThread(int i) {\n        this.i = i;\n    }\n\n    public void run() {\n        i++;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws ExecutionException, InterruptedException{\n        var es = Executors.newSingleThreadExecutor();\n        var callable = new MyCallable(10);\n        var thread = new MyThread(10);\n        System.out.println(es.submit(callable).get());\n        System.out.println(es.submit(thread).get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471017, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP85138: </strong></p><p>After invoking fork() on 1st subtask, it is necessary to invoke join() on 1st subtask and compute() on 2nd subtask. </p><p><br></p><p>The order of execution of calling join() and compute() on divided subtasks is important in a fork/join framework. First invoke compute() on 2nd subtask and then join() on 1st subtask.</p>", "question": "<p><strong>Question ID: UKOCP85138</strong></p><p><br></p><p>To efficiently use fork/join framework, after invoking fork() on first subtask, the order of invoking join() and compute() is as follows:</p>", "answers": ["Invoke compute() on 2nd subtask and then join() on 1st subtask", "Invoke join() on 1st subtask and then compute() on 2nd subtask", "Invoke compute() on 1st subtask and then join() on 2nd subtask", "Invoke join() on 2nd subtask and then compute() on 1st subtask"], "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "8.2 Concurrency: RecursiveTask, RecursiveAction", "question_plain": "Question ID: UKOCP85138To efficiently use fork/join framework, after invoking fork() on first subtask, the order of invoking join() and compute() is as follows:", "related_lectures": []}, {"_class": "assessment", "id": 92471019, "assessment_type": "multi-select", "prompt": {"explanation": "<p><strong>UKOCP87305: </strong></p><p>This code compiles successfully.</p><p><br></p><p>Variable 'console' infers to Console type and variable 'name' infers to String type. </p><p><br></p><p>Code inside main method doesn't throw IOException or its subtype but main method is free to declare any exception in its throws clause. </p><p><br></p><p>Even though program is executed from command line but System.console() may return null, in case no console is available for the underlying OS. </p><p>In that case, console.readLine(...) will cause NullPointerException at runtime. </p><p><br></p><p>readLine method is a blocking method, it waits for the user action. It waits until user presses Enter key or terminates the program. </p>", "question": "<p>Question ID: UKOCP87305</p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">import java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var console = System.console();\n        var name = console.readLine(\"What's your name? \");\n        System.out.printf(\"You entered: %s\", name);\n    }\n}</pre><p><br></p><p>Which of the following statements are correct regarding above program, if it is executed from the command line?</p><p>Choose 2 options.</p>", "feedbacks": ["", "", "", "", ""], "answers": ["It causes compilation failure", "It compiles fine but can cause NullPointerException at runtime", "It compiles fine and will never cause NullPointerException at runtime", "It waits indefinitely for the user input after displaying the text: What&#39;s your name? ", "It waits for 1 min for the user input and then terminates"], "relatedLectureIds": ""}, "correct_response": ["b", "d"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP87305Given code: import java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var console = System.console();\n        var name = console.readLine(\"What's your name? \");\n        System.out.printf(\"You entered: %s\", name);\n    }\n}Which of the following statements are correct regarding above program, if it is executed from the command line?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 92470949, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75007</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        boolean flag = false;\n        System.out.println((flag = true) | (flag = false) || (flag = true));\n        System.out.println(flag);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP75007: </strong></p><p>Given statement: </p><p>System.out.println((flag = true) | (flag = false) || (flag = true)); //flag = false</p><p>System.out.println(((flag = true) | (flag = false)) || (flag = true)); //bitwise inclusive OR | has higher precedence over logical OR ||. flag = false</p><p>|| has two operands, Left: ((flag = true) | (flag = false)) and Right: (flag = true). Left operand needs to be evaluated first.</p><p>System.out.println((true | (flag = false)) || (flag = true)); //flag = true</p><p>System.out.println((true | false) || (flag = true)); //flag = false</p><p>System.out.println(true || (flag = true)); //flag = false</p><p>|| is a short-circuit operator and as left operand evaluates to true, hence right operand is not evaluated.</p><p>Above statement prints true on to the console.</p><p>And</p><p>System.out.println(flag); prints false on to the console as flag variable is false.</p>", "answers": ["<p>true</p><p>false</p>", "<p>false</p><p>true</p>", "<p>true</p><p>true</p>", "<p>false</p><p>false</p>", "Compilation error"]}, "correct_response": ["a"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP75007Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        boolean flag = false;\n        System.out.println((flag = true) | (flag = false) || (flag = true));\n        System.out.println(flag);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471023, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP45917: </strong></p><p>Variable 'path' infers to Path type and refers to absolute path 'Path[\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\"]'</p><p>According to Javadoc of normalize method:</p><p>1. It removes all the redundant name elements.</p><p>2. \".\" represents current directory in Windows/Linux environment, hence it is considered redundant.</p><p>3. \"..\" represents parent directory in Windows/Linux environment. If a \"..\" is preceded by a non-\"..\" name, then both names are considered redundant. </p><p>In the given case, to normalize, first remove all the occurrences of \".\", which returns 'Path[\"F:\\\\A\\\\B\\\\C\\\\D\\\\..\\\\Book.java\"]'. Also, \"..\" is preceded by \"D\", therefore, \"D\" and \"..\" are also removed. `path.normalize();` returns 'Path[\"F:\\\\A\\\\B\\\\C\\\\Book.java\"]'.</p><p><br></p><p>Implementations of Path interface are immutable, hence path.normalize() method doesn't make any changes to the Path object referred by reference variable 'path'. </p><p><br></p><p>System.out.println(path); prints the original path, 'F:\\A\\.\\B\\C\\D\\..\\Book.java' on to the console. </p><p><br></p><p>If you replace `path.normalize();` with `path = path.normalize();`, then 'F:\\A\\B\\C\\Book.java' would be printed on to the console.</p>", "question": "<p><strong>Question ID: UKOCP45917</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\");\n        path.normalize();\n        System.out.println(path);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["F:\\A\\B\\C\\Book.java", "F:\\A\\B\\C\\D\\Book.java", "F:\\A\\.\\B\\C\\D\\..\\Book.java", "None of the other options"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP45917Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\");\n        path.normalize();\n        System.out.println(path);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471025, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP16134: </strong></p><p>static Stream&lt;Path&gt; find\u200b(Path start, int maxDepth, BiPredicate&lt;Path,\u200bBasicFileAttributes&gt; matcher, FileVisitOption... options) method of Files class return a Stream that is lazily populated with Path by searching for files in a file tree rooted at a given starting file.</p><p><br></p><p>and in the code, following syntax is used: Files.find(root, 2, predicate).</p><p><br></p><p>root refers to 'F:' and maxDepth is 2. This means look out for all the files under F: (depth 1) and all the files under the directories whose immediate parent is F: (depth 2). </p><p><br></p><p>Variable 'root' infers to Path type and varaible 'paths' infers to Stram&lt;Path&gt; type.</p><p>endsWith method is overloaded in Path interface: </p><p>boolean endsWith(Path other);</p><p>boolean endsWith(String other); </p><p><br></p><p>Even though endsWith(String) accepts String but it should evaluate to pathname, such as \"Child\" OR \"a.txt\" but not just a part of pathname, such as \"txt\".</p><p><br></p><p>p.endsWith(\"txt\") will return false for all the available paths and hence nothing will get printed on to the console. </p><p><br></p><p>NOTE: If you want to find the files ending with \"txt\" then use 'p.toString().endsWith(\"txt\")' in the lambda expression.</p>", "question": "<p><strong>Question ID: UKOCP16134</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500Parent\n    \u2502   a.txt\n    \u2502   b.txt\n    \u2502\n    \u2514\u2500\u2500\u2500Child\n            c.txt\n            d.txt</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.nio.file.attribute.BasicFileAttributes;\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var root = Paths.get(\"F:\");\n        BiPredicate&lt;Path, BasicFileAttributes&gt; predicate = (p,a) -&gt; p.endsWith(\"txt\");\n        try(var paths = Files.find(root, 2, predicate))\n        {\n            paths.forEach(System.out::println);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Above program executes successfully and prints nothing on to the console", "<p>Above program executes successfully and prints below lines on to the console:</p><p>F:Parent\\a.txt</p><p>F:Parent\\b.txt</p>", "<p>Above program executes successfully and prints below lines on to the console: </p><p>F:Parent\\Child\\c.txt</p><p>F:Parent\\Child\\d.txt</p><p>F:Parent\\a.txt</p><p>F:Parent\\b.txt</p>"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "9.6 Java I/O API: Use Stream API with NIO.2", "question_plain": "Question ID: UKOCP16134F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500Parent\n    \u2502   a.txt\n    \u2502   b.txt\n    \u2502\n    \u2514\u2500\u2500\u2500Child\n            c.txt\n            d.txtGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\nimport java.nio.file.attribute.BasicFileAttributes;\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var root = Paths.get(\"F:\");\n        BiPredicate&lt;Path, BasicFileAttributes&gt; predicate = (p,a) -&gt; p.endsWith(\"txt\");\n        try(var paths = Files.find(root, 2, predicate))\n        {\n            paths.forEach(System.out::println);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92471027, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP12626: </strong></p><p>database url has the form: protocol:subprotocol:subname.</p><p><br></p><p>protocol is always 'jdbc'.&nbsp; </p><p><br></p><p>subprotocol is database specific, for MySQL it is 'mysql'.&nbsp; </p><p><br></p><p>subname contains database details, such as '//localhost:3306/ocp'. </p><p><br></p><p>Complete database url form MySQL db is: 'jdbc:mysql://localhost:3306/ocp'. So it always starts with 'jdbc:'.</p>", "question": "<p><strong>Question ID: UKOCP12626</strong></p><p><br></p><p>Database URL starts with ________.</p>", "feedbacks": ["", "", "", ""], "answers": ["db:", "jdbc:", "database:", "url:"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP12626Database URL starts with ________.", "related_lectures": []}, {"_class": "assessment", "id": 92471029, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP86082: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type and variable 'ps' infers to PreparedStatement type.</p><p><br></p><p>Column index starts with 1 and not 0, hence in the query string, 1st ? represents the place holder for the value of 1st column and so on.</p><p>`ps.setInt(1, 101);` =&gt; Sets 101 for ID column (1st ? mark).</p><p>`ps.setObject(3, \"Smith\");` =&gt; Sets Smith for LASTNAME column (3rd ? mark). </p><p>`ps.setString(2, \"John\");` =&gt; Sets John for FIRSTNAME column (2nd ? mark).</p><p>`ps.setDouble(4, 12000.0);` =&gt; Sets 12000.0 for SALARY column (4th ? mark).</p><p><br></p><p>`ps.executeUpdate();` inserts one row (101, \"John\", \"Smith\", 12000.0) in the database.</p>", "question": "<p><strong>Question ID: UKOCP86082</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"INSERT INTO EMPLOYEE VALUES(?, ?, ?, ?)\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var ps = con.prepareStatement(query);\n        ) {\n            ps.setInt(1, 101);\n            ps.setObject(3, \"Smith\");\n            ps.setString(2, \"John\");\n            ps.setDouble(4, 12000.0);\n            ps.executeUpdate();\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p>EMPLOYEE table doesn't have any records.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "answers": ["The program executes successfully and one record is inserted in the EMPLOYEE table", "The program executes successfully but no record is inserted in the EMPLOYEE table", "An exception is thrown at runtime", "Compilation error"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "11.2 JDBC: PreparedStatement, Connection, ResultSet", "question_plain": "Question ID: UKOCP86082Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"INSERT INTO EMPLOYEE VALUES(?, ?, ?, ?)\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var ps = con.prepareStatement(query);\n        ) {\n            ps.setInt(1, 101);\n            ps.setObject(3, \"Smith\");\n            ps.setString(2, \"John\");\n            ps.setDouble(4, 12000.0);\n            ps.executeUpdate();\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.EMPLOYEE table doesn't have any records.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471031, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP77591: </strong></p><p>Variable 'loc' infers to Locale type and variable 'rb' infers to ResourceBundle type.</p><p><br></p><p>As all the resource bundles have same key(s), the search order for matching resource bundle is:</p><p>1. com.udayankhattry.ocp.MyResourceBundle_en_US [1st: Complete, en_US].&nbsp; </p><p>2. com.udayankhattry.ocp.MyResourceBundle_en [2nd: Only language, en].&nbsp; </p><p>3. com.udayankhattry.ocp.MyResourceBundle_fr_IT [3rd: Complete Default Locale, fr_IT].&nbsp; </p><p>4. com.udayankhattry.ocp.MyResourceBundle_fr [4th: Language of Default Locale, fr].&nbsp; </p><p>5. com.udayankhattry.ocp.MyResourceBundle [5th: ResourceBundle's name without language or country]. </p><p><br></p><p>If search reaches the 5th step and no matching resource bundle is found, then MissingResourceException is thrown at runtime. </p><p><br></p><p>In 5th step, matching resource bundle is found and hence 'SURPRISE!' is printed on to the console. </p>", "feedbacks": ["", "", "", ""], "answers": ["SURPRISE!", "12.64", "1001", "MissingResourceException is thrown at runtime"], "question": "<p><strong>Question ID: UKOCP77591</strong></p><p><br></p><p>Given code of 3 Java files:</p><pre class=\"prettyprint linenums\">//1. MyResourceBundle.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", \"SURPRISE!\"}};\n        return arr;\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//2. MyResourceBundle_en_CA.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_en_CA extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 12.64}};\n        return arr;\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//3. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"IT\"));\n        var loc = new Locale(\"en\", \"US\");\n        var rb = ResourceBundle.getBundle(\"com.udayankhattry.ocp.MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"surprise\"));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": ""}, "correct_response": ["a"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP77591Given code of 3 Java files://1. MyResourceBundle.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", \"SURPRISE!\"}};\n        return arr;\n    }\n}//2. MyResourceBundle_en_CA.java\npackage com.udayankhattry.ocp;\n\nimport java.util.ListResourceBundle;\n\npublic class MyResourceBundle_en_CA extends ListResourceBundle {\n    @Override\n    protected Object[][] getContents() {\n        Object [][] arr = {{\"surprise\", 12.64}};\n        return arr;\n    }\n}//3. Test.java\npackage com.udayankhattry.ocp;\n\nimport java.util.Locale;\nimport java.util.ResourceBundle;\n\npublic class Test {\n    public static void main(String[] args) {\n        Locale.setDefault(new Locale(\"fr\", \"IT\"));\n        var loc = new Locale(\"en\", \"US\");\n        var rb = ResourceBundle.getBundle(\"com.udayankhattry.ocp.MyResourceBundle\", loc);\n        System.out.println(rb.getObject(\"surprise\"));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 92471033, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP76273: </strong></p><p>M -&gt; Represents actual digit for the month (1 to 12).&nbsp; </p><p>MM -&gt; Represents 2 digits for the month (01 to 12).&nbsp; </p><p>MMM -&gt; Represents short name for the month, with first character in upper case, such as Jun, Sep</p><p>MMMM -&gt; Represents full name for the month, with first character in upper case, such as June, September</p><p><br></p><p>`DateTimeFormatter.ofPattern(String)` method uses the default Locale and in this case default Locale is set to en_US, hence English month names will be printed in this case. </p><p>\"2022-09-10\" will be formatted to \"10-Sep-2022\".</p>", "question": "<p><strong>Question ID: UKOCP76273</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.format.DateTimeFormatter;\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String [] args) {\n        Locale.setDefault(new Locale(\"en\", \"US\"));\n        var date = LocalDate.parse(\"2022-09-10\");\n        System.out.println(date.format(DateTimeFormatter.ofPattern(\"dd-MMM-yyyy\")));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["10-SEP-2022", "10-Sep-2022", "10-SEPTEMBER-2022", "10-September-2022"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "12.4 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP76273Given code: package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.format.DateTimeFormatter;\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String [] args) {\n        Locale.setDefault(new Locale(\"en\", \"US\"));\n        var date = LocalDate.parse(\"2022-09-10\");\n        System.out.println(date.format(DateTimeFormatter.ofPattern(\"dd-MMM-yyyy\")));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 92471035, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP52273: </strong></p><p>default method 'print(String)' is marked as Deprecated. </p><p>@Deprecated annotation has 2 attributes: 'since' and 'forRemoval'. Default value of 'since' is empty string \"\" and&nbsp; default value of 'forRemoval' is false. </p><p>Given annotation, `@Deprecated(since = \"9\", forRemoval = true)` doesn't use the default values, rather it provides values for these attributes. </p><p>Javadoc comment for this method uses @deprecated tag to provide documentation about the deprecation. </p><p>Interface Log has single abstract method log(String) and hence it is a functional interface. Interface Log compiles successfully. </p><p><br></p><p>As, interface Log is functional interface, therefore it can be implemented using lambda expression. </p><p>Variable 'l' refers to an instance of Log interface. And as print(String) method is available in Log interface, hence `l.print(\"hello\");` doesn't cause any compilation error. But as @Deprecated annotation is available for print(String) method, hence compiler will warn about it but will not halt the compilation. Class files will get generated successfully. </p><p><br></p><p>On execution, output will be: hello.</p>", "question": "<p><strong>Question ID: UKOCP52273</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\n@FunctionalInterface\ninterface Log {\n    void log(String s);\n\n    /**\n     * @deprecated This method has been deprecated,\n     * use log(String) method instead\n     */\n    @Deprecated(since = \"9\", forRemoval = true)\n    default void print(String s) {\n        System.out.println(s);\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Log l = s -&gt; System.out.println(s.toUpperCase());\n        l.print(\"hello\");\n    }\n}</pre><p><br></p><p>What is the result, if above program is compiled and executed in Java 11?</p>", "feedbacks": ["", "", "", ""], "answers": ["Interface Log fails to compile", "Class Test fails to compile", "Given codes compile successfully and output is: hello", "Given codes compile successfully and output is: HELLO"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP52273Given code: package com.udayankhattry.ocp;\n\n@FunctionalInterface\ninterface Log {\n    void log(String s);\n\n    /**\n     * @deprecated This method has been deprecated,\n     * use log(String) method instead\n     */\n    @Deprecated(since = \"9\", forRemoval = true)\n    default void print(String s) {\n        System.out.println(s);\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Log l = s -&gt; System.out.println(s.toUpperCase());\n        l.print(\"hello\");\n    }\n}What is the result, if above program is compiled and executed in Java 11?", "related_lectures": []}, {"_class": "assessment", "id": 92471037, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP28176: </strong></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 5-3 / INPUT-3: Define wrappers around native methods</p>", "question": "<p><strong>Question ID: UKOCP28176</strong></p><p><br></p><p>What are the security best practices related to native methods?</p>", "answers": ["Native methods should be declared as final", "Native methods should be declared as static", "Native methods should be declared private and a public wrapper method around native method should be provided", "Native methods should be declared as synchronized"], "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP28176What are the security best practices related to native methods?", "related_lectures": []}, {"_class": "assessment", "id": 92471039, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP54439: </strong></p><p>Module descriptor lives in a file called 'module-info.java' (all characters in lower-case) and by default all the modules implicitly requires java.base module. Providing explicit `requires java.base;` doesn't cause any compilation error. </p><p>Hence, correct option is: </p><pre class=\"prettyprint linenums\">//module-info.java\nmodule com.training {\n}</pre>", "question": "<p><strong>Question ID: UKOCP54439</strong></p><p><br></p><p>On Windows platform below directories/files are available:</p><p>C:\\src\\com.training\\com\\udayankhattry\\ocp\\Training.java</p><p><br></p><p>Which of the following correctly defines the module descriptor for 'com.training' module?</p><p>Please note that commented line in each option represents the module descriptor file name.</p>", "feedbacks": ["", "", "", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">//module-info.java\nmodule com.training {\n}</pre>", "<pre class=\"prettyprint linenums\">//module.java\nmodule com.training {\n    requires java.base;\n}</pre>", "<pre class=\"prettyprint linenums\">//Module-Info.java\nmodule com.training {\n}</pre>", "<pre class=\"prettyprint linenums\">//Module.java\nmodule training {\n}</pre>", "<pre class=\"prettyprint linenums\">//module-descriptor.java\nmodule com.training {\n}</pre>", "<pre class=\"prettyprint linenums\">//module-descriptor.java\nmodule com.training {\n    requires java.base;\n}</pre>"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP54439On Windows platform below directories/files are available:C:\\src\\com.training\\com\\udayankhattry\\ocp\\Training.javaWhich of the following correctly defines the module descriptor for 'com.training' module?Please note that commented line in each option represents the module descriptor file name.", "related_lectures": []}, {"_class": "assessment", "id": 92471041, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP35725: </strong></p><p>Name of the module descriptor file must be: module-info.java, hence option number 6 is invalid.</p><p><br></p><p>package declarations are not allowed in module-info.java file, hence options 1, 2 and 5 are invalid.</p><p><br></p><p>import statements are allowed in module descriptor file. These import statements are useful when you use 'provides' directive for Services.</p><p><br></p><p>By default all the module implicitly requires java.base module (one of the system module)</p><p><br></p><p>To get a list of all the system modules, use below command:</p><p>java --list-modules</p><p>And to check details of specific module (e.g. java.base), use below command:</p><p>java --describe-module java.base</p><p>You will notice that it exports java.io, java.lang packages but not java.sql package. Option 3 is valid.</p><p><br></p><p>To have `import java.sql.*;` in the module-info.java file, `requires java.sql;` directive is needed, hence option 4 is invalid but option 7 is valid.</p><p><br></p><p>So, out of seven given options, only two options (number 3 and 7) are valid. </p>", "question": "<p><strong>Question ID: UKOCP35725</strong></p><p><br></p><p>Below options represent the module descriptor file name and its contents for the module named 'com.data.sort':</p><p>1. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">package com.data.sort;\n\nmodule com.data.sort {\n}</pre><p><br></p><p>2. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">package x;\n\nmodule com.data.sort {\n    exports x;\n}</pre><p><br></p><p>3. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">import java.io.*;\n\nmodule com.data.sort {\n}</pre><p><br></p><p>4. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">import java.sql.*;\n\nmodule com.data.sort {\n}</pre><p><br></p><p>5. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">package com.udayankhattry;\n\nimport java.lang.*;\n\nmodule com.data.sort {\n}</pre><p><br></p><p>6. </p><p>File name: module-desc.java</p><pre class=\"prettyprint linenums\">module com.data.sort {\n}</pre><p><br></p><p>7. </p><p>File name: module-info.java</p><pre class=\"prettyprint linenums\">import java.sql.*;\n\nmodule com.data.sort {\n    requires java.sql;\n}</pre><p><br></p><p>How many of the above options are valid module descriptor?</p>", "feedbacks": ["", "", "", "", ""], "answers": ["None of the options is valid", "Only one option is valid", "Two options are valid", "Three options are valid", "More than three options are valid"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP35725Below options represent the module descriptor file name and its contents for the module named 'com.data.sort':1. File name: module-info.javapackage com.data.sort;\n\nmodule com.data.sort {\n}2. File name: module-info.javapackage x;\n\nmodule com.data.sort {\n    exports x;\n}3. File name: module-info.javaimport java.io.*;\n\nmodule com.data.sort {\n}4. File name: module-info.javaimport java.sql.*;\n\nmodule com.data.sort {\n}5. File name: module-info.javapackage com.udayankhattry;\n\nimport java.lang.*;\n\nmodule com.data.sort {\n}6. File name: module-desc.javamodule com.data.sort {\n}7. File name: module-info.javaimport java.sql.*;\n\nmodule com.data.sort {\n    requires java.sql;\n}How many of the above options are valid module descriptor?", "related_lectures": []}, {"_class": "assessment", "id": 92471043, "assessment_type": "multiple-choice", "prompt": {"explanation": "<p><strong>UKOCP26740: </strong></p><p>ServiceLoader.load(RandomNumber.class) will load all the available service producers and would return an instance of ServiceLoader&lt;RandomNumber&gt;, which is of Iterable type. </p><p>`sl.findFirst()` returns an instance of Optional&lt;RandomNumber&gt; type.</p><p>`ifPresent(x -&gt; System.out.println(x.getNumber()))`: If RandomNumber implementer instance (producer) is available, then invokes the getNumber() method and prints the generated number. If no producers are available, then it does nothing.</p><p><br></p><p>As, in this case, no producers are available, hence given code produces no output.</p>", "question": "<p><strong>Question ID: UKOCP26740</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---out\n|   \n\\---multi-module\n    +---consumer\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.java\n    |\n    \\---service\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n                        RandomNumber.java</pre><p><br></p><p>Below are the file details:-</p><p>C:\\multi-module\\service\\module-info.java: </p><pre class=\"prettyprint linenums\">module service {\n    exports com.udayankhattry.service;\n}</pre><p><br></p><p>C:\\multi-module\\service\\com\\udayankhattry\\service\\RandomNumber.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.service;\n\npublic interface RandomNumber {\n    int getNumber();\n}</pre><p><br></p><p>C:\\multi-module\\consumer\\module-info.java: </p><pre class=\"prettyprint linenums\">import com.udayankhattry.service.RandomNumber;\n\nmodule consumer {\n    requires service;\n    uses RandomNumber;\n}</pre><p><br></p><p>C:\\multi-module\\consumer\\com\\udayankhattry\\service\\test\\TestService.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.service.test;\n\nimport java.util.ServiceLoader;\nimport com.udayankhattry.service.RandomNumber;\n\npublic class TestService {\n    public static void main(String[] args) {\n        ServiceLoader&lt;RandomNumber&gt; sl = ServiceLoader.load(RandomNumber.class);\n        sl.findFirst().ifPresent(x -&gt; System.out.println(x.getNumber()));\n    }\n}</pre><p><br></p><p>And the below command executed from C:\\</p><p><code>javac -d out --module-source-path multi-module -m service,consumer</code></p><p><br></p><p>Above command compiles code and generates below files: </p><pre class=\"prettyprint linenums\">+---out\n    +---consumer\n    |   |   module-info.class\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.class\n    |\n    \\---service\n        |   module-info.class\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n                        RandomNumber.class</pre><p><br></p><p>What is the result of executing below command from C:\\</p><p><code>java -p out -m consumer/com.udayankhattry.service.test.TestService</code> </p>", "feedbacks": ["", "", ""], "answers": ["An exception is thrown at runtime", "It prints a random number", "It produces no output"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP26740Given below the directory/file structure on Windows platform: C:\n+---out\n|   \n\\---multi-module\n    +---consumer\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.java\n    |\n    \\---service\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n
