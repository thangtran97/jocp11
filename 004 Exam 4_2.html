sfully and on execution prints WINNERS NEVER QUIT on to the console.</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 cuases compilation error", "Test class compiles successfully and on execution prints WINNERS NEVER QUIT on to the console", "Test class compiles successfully and on execution prints nothing"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP71060</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Logger {\n    Object get();\n    void log();\n}\n\npublic class Test {\n    private static void testLogger(Logger logger) {\n        logger.log();\n    }\n\n    public static void main(String[] args) {\n        var obj = new Logger() { //Line n1\n            @Override\n            public Logger get() { //Line n2\n                return this;\n            }\n            \n            @Override\n            public void log() {\n                System.out.println(\"WINNERS NEVER QUIT\"); //Line n3\n            }\n        };\n        testLogger(obj.get()); //Line n4\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP71060Given code: package com.udayankhattry.ocp;\n\ninterface Logger {\n    Object get();\n    void log();\n}\n\npublic class Test {\n    private static void testLogger(Logger logger) {\n        logger.log();\n    }\n\n    public static void main(String[] args) {\n        var obj = new Logger() { //Line n1\n            @Override\n            public Logger get() { //Line n2\n                return this;\n            }\n            \n            @Override\n            public void log() {\n                System.out.println(\"WINNERS NEVER QUIT\"); //Line n3\n            }\n        };\n        testLogger(obj.get()); //Line n4\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527672, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP53281: </strong></p><p>There are no compilation errors and main(String[]) method is invoked on executing Test class.</p><p>i1 = 1.</p><p>`Test.change(i1)` is executed next, contents of i1 (which is 1) is copied to the variable 'num' and method change(int) starts executing.</p><p>`num++;` increments the value of num by 1, num = 2. There are no changes to the value of variable 'i1' of main(String[]) method, which still contains 1.</p><p>`System.out.println(num);` prints 2 on to the console. </p><p>change(int) method finishes its execution and control goes back to the main(String[]) method.</p><p>`System.out.println(i1);` prints 1 on to the console. </p>", "answers": ["Compilation Error", "<p>2</p><p>1</p>", "<p>2</p><p>2</p>", "<p>1</p><p>1</p>", "None of the other options"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP53281</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void change(int num) {\n        num++;\n        System.out.println(num);\n    }\n    \n    public static void main(String[] args) {\n        int i1 = 1;\n        Test.change(i1);\n        System.out.println(i1);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP53281Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void change(int num) {\n        num++;\n        System.out.println(num);\n    }\n    \n    public static void main(String[] args) {\n        int i1 = 1;\n        Test.change(i1);\n        System.out.println(i1);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527674, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP24735: </strong></p><p>Variables 'sb' and 'x' are of static type, so both static and instance initializer blocks can access these. </p><p>Also because of the final keyword, variable 'sb' cannot be changed but the StringBuilder object it refers to can be changed. </p><p>Given code compiles successfully.</p><p>We are not creating the instance of Test class, so instance initializer block will not be executed. Only static initializer block will be executed in this case. </p><p>If static variable declaration / initialization statements are present along with static initializer blocks, then these are invoked in top to bottom order. So, for the given code, order of execution will be:</p><p>1. final static StringBuilder sb = new StringBuilder(\"A\"); =&gt; StringBuilder object [\"A\"] is created and sb refers to it.</p><p>2. static int x = 2; =&gt; Variable x of int type is created and it stores 2.</p><p>3. static { sb.append(\"Z\"); } =&gt; 'sb' now refers to [\"AZ\"]</p><p>4. Code inside main[String []) method is executed. x = 2 so default case (Line n1) is executed, 'sb' now refers to [\"AZB\"]. Because of the fall-through logic, Line n2 is also executed, 'sb' refers to [\"AZBC\"]. Line n3 prints 2:AZBC.</p>", "answers": ["Compilation error", "2:AZBC", "2:ABCZ", "2:ABC", "3:AZC", "3:ACZ", "<p>3:AC</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP24735</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    final static StringBuilder sb = new StringBuilder(\"A\");\n    static int x = 2;\n    public static void main(String[] args) {\n        switch (x) {\n            default: \n                sb.append(\"B\"); //Line n1\n            case 1:\n            case 3: \n            case 5:\n            case 7:\n            case 9: \n                sb.append(\"C\"); //Line n2\n                break;\n        }\n        System.out.println(x + \":\" + sb.toString()); //Line n3\n    }\n    static {\n        sb.append(\"Z\");\n    }\n    { x += 1; }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP24735Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    final static StringBuilder sb = new StringBuilder(\"A\");\n    static int x = 2;\n    public static void main(String[] args) {\n        switch (x) {\n            default: \n                sb.append(\"B\"); //Line n1\n            case 1:\n            case 3: \n            case 5:\n            case 7:\n            case 9: \n                sb.append(\"C\"); //Line n2\n                break;\n        }\n        System.out.println(x + \":\" + sb.toString()); //Line n3\n    }\n    static {\n        sb.append(\"Z\");\n    }\n    { x += 1; }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71527676, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP54156: </strong></p><p>Parent (Super) class constructor is invoked by `super();` (all letters in lowercase) from within the constructor of subclass. </p><p>First statement inside no-argument constructor of Sub class is: `Super();` (Letter 'S' is in uppercase) and hence it causes compilation error.</p>", "answers": ["Compilation Error in Super class", "Compilation Error in Sub class", "Compilation Error in Test class", "It prints ReachOut on to the console", "It prints OutReach on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54156</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Super {\n    Super() {\n        System.out.print(\"Reach\");\n    }\n}\n\nclass Sub extends Super {\n    Sub() {\n        Super();\n        System.out.print(\"Out\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Sub();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>"}, "correct_response": ["b"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP54156Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nclass Super {\n    Super() {\n        System.out.print(\"Reach\");\n    }\n}\n\nclass Sub extends Super {\n    Sub() {\n        Super();\n        System.out.print(\"Out\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        new Sub();\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 71527678, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP29193: </strong></p><p>Class M and M are declared public and inside same package com.udayankhattry.ocp. Method printName() of class M has correctly been overridden by N. </p><p>printName() method is public so no issues in accessing it anywhere. </p><p><br></p><p>Let's check the code inside main method. </p><p>M obj1 = new M(); =&gt; obj1 refers to an instance of class M. </p><p>N obj2 = (N)obj1; =&gt; obj1 is of type M and it is assigned to obj2 (N type), hence explicit casting is necessary. obj1 refers to an instance of class M, so at runtime obj2 will also refer to an instance of class M. sub type can't refer to an instance of super type so at runtime `N obj2 = (N)obj1;` will throw ClassCastException.</p>", "answers": ["It executes successfully and prints M on to the console", "It executes successfully and prints N on to the console", "Compilation error", "An exception is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP29193</strong></p><p><br></p><p>Consider below codes of 3 java files:</p><pre class=\"prettyprint linenums\">//M.java\npackage com.udayankhattry.ocp;\n\npublic class M {\n    public void printName() {\n        System.out.println(\"M\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//N.java\npackage com.udayankhattry.ocp;\n\npublic class N extends M {\n    public void printName() {\n        System.out.println(\"N\");\n    }\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        M obj1 = new M();\n        N obj2 = (N)obj1;\n        obj2.printName();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["d"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP29193Consider below codes of 3 java files://M.java\npackage com.udayankhattry.ocp;\n\npublic class M {\n    public void printName() {\n        System.out.println(\"M\");\n    }\n}//N.java\npackage com.udayankhattry.ocp;\n\npublic class N extends M {\n    public void printName() {\n        System.out.println(\"N\");\n    }\n}//Test.java\npackage com.udayankhattry.ocp.test;\n\nimport com.udayankhattry.ocp.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        M obj1 = new M();\n        N obj2 = (N)obj1;\n        obj2.printName();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527680, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP43491</strong></p><p><br></p><p>Consider below codes of 3 java files: </p><pre class=\"prettyprint linenums\">//Super.java\npackage com.udayankhattry.ocp;\n\npublic interface Super {\n    String name = \"SUPER\"; //Line n1\n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Sub.java\npackage com.udayankhattry.ocp;\n\npublic interface Sub extends Super { //Line n2\n    \n}</pre><p><br></p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Sub sub = null;\n        System.out.println(sub.name); //Line n3\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP43491: </strong></p><p>Variable 'name' declared inside interface Super is implicitly public, static and final. Line n1 compiles successfully.</p><p>In Java, a class can extend from only one class but an interface can extend from multiple interfaces. Line n2 compiles successfully. </p><p>Variable 'name' can be accessed in 2 ways: Super.name and Sub.name.</p><p>Though correct way to refer static variable is by using the type name, such as Sub.name but it can also be invoked by using Sub reference variable. Hence, sub.name at Line n3 correctly points to the name variable at Line n1.</p><p>For invoking static fields, object is not needed, therefore even if sub refers to null, sub.name doesn't throw NullPoionterException.</p><p>Test class compiles successfully and on execution prints SUPER on to the console.</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n3 throws an exception at runtime", "Test class compiles successfully and on execution prints SUPER on to the console"]}, "correct_response": ["e"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP43491Consider below codes of 3 java files: //Super.java\npackage com.udayankhattry.ocp;\n\npublic interface Super {\n    String name = \"SUPER\"; //Line n1\n}//Sub.java\npackage com.udayankhattry.ocp;\n\npublic interface Sub extends Super { //Line n2\n    \n}//Test.java\npackage com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Sub sub = null;\n        System.out.println(sub.name); //Line n3\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 71527682, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP67892: </strong></p><p>Comparator has only one non-overriding abstract method, compare. Runnable has only one non-overriding abstract method, run. </p><p><br></p><p>ActionListener has only one non-overriding abstract method, actionPerformed. Serializable and Cloneable are marker interfaces.</p>", "answers": ["java.util.Comparator", "java.lang.Runnable", "java.awt.event.ActionListener", "java.io.Serializable", "java.lang.Cloneable"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67892</strong></p><p><br></p><p>Which of the following are Functional Interfaces?</p><p>Choose 3 options.</p>"}, "correct_response": ["a", "b", "c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP67892Which of the following are Functional Interfaces?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 71527684, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP30122: </strong></p><p>Variable 'arr' is a class variable of int [] type, so by default it is initialized to null. </p><p>In if block, arr.length &gt; 0 is checked first. Accessing length property on null reference throws NullPointerException. </p><p><br></p><p>Correct logical if block declaration should be:</p><p><code>if(arr != null &amp;&amp; arr.length &gt; 0)</code></p><p><br></p><p>First check for null and then access properties/methods.</p>", "answers": ["No Output", "NullPointerException is thrown at runtime", "ArrayIndexOutOfBoundsException is thrown at runtime", "Error is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP30122</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">public class Test {\n    private static int [] arr;\n    public static void main(String [] args) {\n        if(arr.length &gt; 0 &amp;&amp; arr != null) {\n            System.out.println(arr[0]);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP30122Given code of Test.java file:public class Test {\n    private static int [] arr;\n    public static void main(String [] args) {\n        if(arr.length &gt; 0 &amp;&amp; arr != null) {\n            System.out.println(arr[0]);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527686, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP54104: </strong></p><p>This question is tricky as 2 changes are related and not independent. Let's first check the reason for compilation error. Line n2 throws a checked exception, IOException but it is not declared in the throws clause. So, print method should have throws clause for IOException or the classes in top hierarchy such as Exception or Throwable. </p><p><br></p><p>Based on this deduction, Line n1 can be replaced with either \"static void print() throws Exception {\" or \"static void print() throws Throwable\" but we will have to select one out of these as after replacing Line n1, Line n4 will start giving error as we are not handling the checked exception at Line n4.</p><p><br></p><p>This part is easy, do we have other options, which mention \"Throwable\"? NO. Then mark the first option as \"Replace Line n1 with static void print() throws Exception {\". </p><p><br></p><p>As, print() method throws Exception, so main method should handle Exception or its super type and not it's subtype. Two options working only with IOException can be ruled out. </p><p><br></p><p>Multi-catch statement \"catch(IOException | Exception e)\" causes compilation error as IOException and Exception are related to each other in multilevel inheritance. So you are left with only one option to pair with the 1st choice: </p><p>Surround Line n4 with below try-catch block:</p><pre class=\"prettyprint linenums\">try {\n    ReadTheFile.print();\n} catch(Exception e) {\n    e.printStackTrace();\n}</pre>", "answers": ["<p>Replace Line n1 with <code>static void print() throws Exception {</code> </p>", "<p>Replace Line n1 with <code>static void print() throws Throwable {</code> </p>", "<p>Replace Line n3 with <code>public static void main(String[] args) throws IOException {</code> </p>", "<p>Surround Line n4 with below try-catch block:</p><pre class=\"prettyprint linenums\">try {\n    ReadTheFile.print();\n} catch(IOException e) {\n    e.printStackTrace();\n}</pre>", "<p>Surround Line n4 with below try-catch block:</p><pre class=\"prettyprint linenums\">try {\n    ReadTheFile.print();\n} catch(IOException | Exception e) {\n    e.printStackTrace();\n}</pre>", "<p>Surround Line n4 with below try-catch block:</p><pre class=\"prettyprint linenums\">try {\n    ReadTheFile.print();\n} catch(Exception e) {\n    e.printStackTrace();\n}</pre>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54104</strong></p><p><br></p><p>Given Code:</p><pre class=\"prettyprint linenums\">import java.io.*;\n\nclass ReadTheFile {\n    static void print() { //Line n1\n        throw new IOException(); //Line n2\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) { //Line n3\n        ReadTheFile.print(); //Line n4\n    }\n}</pre><p><br></p><p>Which 2 changes are necessary so that code compiles successfully?</p>"}, "correct_response": ["a", "f"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP54104Given Code:import java.io.*;\n\nclass ReadTheFile {\n    static void print() { //Line n1\n        throw new IOException(); //Line n2\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) { //Line n3\n        ReadTheFile.print(); //Line n4\n    }\n}Which 2 changes are necessary so that code compiles successfully?", "related_lectures": []}, {"_class": "assessment", "id": 71527688, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP34504: </strong></p><p>Even though Scanner is created in try-with-resources block, calling close() method explicitly doesn't cause any problem. </p><p>Scanner class allows to invoke close() method multiple times. In this case, it will be called 3 times: twice because of scan.close() and once because of try-with-resources statement. </p><p><br></p><p>'HELLO' is printed on to the console and program terminates successfully.</p>", "answers": ["Compilation error", "Runtime Exception", "On execution program terminates successfully after printing &#39;HELLO&#39; on to the console"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP34504</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Scanner;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.print(\"Enter some text: \");\n        try(Scanner scan = new Scanner(System.in)) {\n            String s = scan.nextLine();\n            System.out.println(s);\n            scan.close();\n            scan.close();\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p><p>User input is: HELLO</p>"}, "correct_response": ["c"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP34504Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Scanner;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.print(\"Enter some text: \");\n        try(Scanner scan = new Scanner(System.in)) {\n            String s = scan.nextLine();\n            System.out.println(s);\n            scan.close();\n            scan.close();\n        }\n    }\n}What will be the result of compiling and executing Test class?User input is: HELLO", "related_lectures": []}, {"_class": "assessment", "id": 71527690, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP14416: </strong></p><p>Logic in for loop is adding array elements. You need to find out which array elements when added will result in 9. Possible options are: {1+3+5, 2+3+4, 4+5}. </p><p>Based on these 3 combinations you can select 3 correct options.</p>", "answers": ["<p><code>int n = 0; n &lt; arr.length; n++</code> </p>", "<p><code>int n = 0; n &lt; arr.length; n += 2</code> </p>", "<p><code>int n = 3; n &lt; arr.length; n++</code> </p>", "<p><code>int n = 1; n &lt; arr.length - 1; n++</code> </p>", "<p><code>int n = 1; n &lt; arr.length; n += 2</code> </p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP14416</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {1, 2, 3, 4, 5};\n        int x = 0;\n        for(/*INSERT*/) {\n            x += arr[n];\n        }\n        System.out.println(x);\n    }\n}</pre><p><br></p><p>Which 3 options, if used to replace /*INSERT*/, on execution will print 9 on to the console?</p>"}, "correct_response": ["b", "c", "d"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP14416Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {1, 2, 3, 4, 5};\n        int x = 0;\n        for(/*INSERT*/) {\n            x += arr[n];\n        }\n        System.out.println(x);\n    }\n}Which 3 options, if used to replace /*INSERT*/, on execution will print 9 on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 71527692, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP71889: </strong></p><p>Apart from compare methods to for primitive arrays, Arrays class also has following generic compare method:</p><p>int compare\u200b(T[] a, T[] b): Compares two Object arrays, with Comparable elements, lexicographically. </p><p><br></p><p>Above method compares the arrays lexicographically and return below values:</p><p>0:&nbsp; if the first and second array are equal and contain the same elements in the same order</p><p>&lt;0: if the first array is lexicographically less than the second array</p><p>&gt;0: if the first array is lexicographically greater than the second array</p><p><br></p><p>Please note:</p><p>1. A null array is less than a non-null array:</p><p>&nbsp; &nbsp; A. If 1st array is null and 2nd array is not null, return -1.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;E.g., Arrays.compare(null, new String[] {\"JAVA\"}); returns -1.</p><p>&nbsp; &nbsp; B. If 2nd array is null and 1st array is not null, return 1.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;E.g., Arrays.compare(new String[] {\"JAVA\"}, null); returns 1.</p><p>&nbsp; &nbsp; C. If both the arrays are null, return 0.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;E.g., Arrays.compare((String []) null, null); returns 0.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;</p><p>2. While comparing, a null element is less than a non-null element:</p><p>&nbsp; &nbsp; A. If element from 1st array is null, and corresponding element from 2nd array is not null, return -1</p><p>&nbsp; &nbsp; &nbsp; &nbsp;E.g., Arrays.compare(new String[] {null}, new String[] {\"JAVA\"}); returns -1.</p><p>&nbsp; &nbsp; B. If element from 2nd array is null, and corresponding element from 1st array is not null, return 1.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;E.g., Arrays.compare(new String[] {\"JAVA\"}, new String[] {null}); returns 1.</p><p>&nbsp; &nbsp; C. If element from 1st array is null, and corresponding element from 2nd array is also null, return 0.</p><p>&nbsp; &nbsp; &nbsp; &nbsp;Arrays.compare(new String[] {null}, new String[] {null}); returns 0.</p><p><br></p><p>3. If one array is the proper prefix of the other, then return a.length - b.length, where a refers to 1st array and b refers to 2nd array. </p><p>E.g., Arrays.compare(new String[] {\"A\", \"T\", \"O\", \"M\", \"I\", \"C\"}, new String[] {\"A\", \"T\", \"O\", \"M\"}) returns 6 - 4, which is 2. Please note that 2nd array is a proper prefix of 1st array.</p><p><br></p><p>For the given code, </p><p>String elements are Comparable, as String class implements Comparable interface. </p><p>Let's check given 3 compare statements:</p><p>Arrays.compare(array1, array2): array2 is a proper prefix of array1, hence Arrays.compare(array1, array2) = array1.length - array2.length = 3 - 2 = 1.</p><p><br></p><p>Arrays.compare(array2, array3): array2[0] = \"OCP\" and array3[0] = null. Based on above \"2.B.\", it returns 1.</p><p><br></p><p>Arrays.compare(array3, array2): array3[0] = null and array2[0] = \"OCP\". Based on above \"2.A.\", it returns -1.</p><p><br></p><p>Hence output of given code is: 11-1</p>", "answers": ["200", "201", "11-1", "1-11", "-1-1-1", "21-1", "<p>-11-1</p>", "<p>-111</p>"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP71889</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] array1 = {\"OCP\", \"11\", null};\n        String [] array2 = {\"OCP\", \"11\"};\n        String [] array3 = {null, \"OCP\", \"11\"};\n        \n        System.out.print(Arrays.compare(array1, array2));\n        System.out.print(Arrays.compare(array2, array3));\n        System.out.print(Arrays.compare(array3, array2));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>"}, "correct_response": ["c"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP71889Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] array1 = {\"OCP\", \"11\", null};\n        String [] array2 = {\"OCP\", \"11\"};\n        String [] array3 = {null, \"OCP\", \"11\"};\n        \n        System.out.print(Arrays.compare(array1, array2));\n        System.out.print(Arrays.compare(array2, array3));\n        System.out.print(Arrays.compare(array3, array2));\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 71527694, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP47794: </strong></p><p>For 'List&lt;? super String&gt;' type of read objects is 'Object' and type of write objects are String and its subclasses (no subclass of String as String is final). </p><p><br></p><p>'for(String str : list)' causes compilation failure. Correct syntax should be: 'for(Object str : list)'</p>", "answers": ["AB", "Compilation error", "Runtime exception"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP47794</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;? super String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"A\");\n        list.add(\"B\");\n        for(String str : list) {\n            System.out.print(str);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP47794Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;? super String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"A\");\n        list.add(\"B\");\n        for(String str : list) {\n            System.out.print(str);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527696, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP62915: </strong></p><p>listIterator(index); method allows to have the starting point at any index. Allowed values are between 0 and size of the list. </p><p><br></p><p>If next() method is called, then element at 'specified index' is returned and if previous() method is called, then element at 'specified index - 1' is returned.</p>", "answers": ["IF", "RIF", "Runtime Exception"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP62915</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.ListIterator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"T\", \"S\", \"R\", \"I\", \"F\");\n        ListIterator&lt;String&gt; iter = list.listIterator(2);\n        while(iter.hasNext()) {\n            System.out.print(iter.next());\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP62915Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.ListIterator;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"T\", \"S\", \"R\", \"I\", \"F\");\n        ListIterator&lt;String&gt; iter = list.listIterator(2);\n        while(iter.hasNext()) {\n            System.out.print(iter.next());\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527698, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP78034: </strong></p><p>List cannot accept primitives, it can accept objects only. So, when 15 and 25 are added to the list, then auto-boxing feature converts these to wrapper objects of Integer type. </p><p>So, 4 items gets added to the list: [15, 25, 15, 25]. </p><p>`list.remove(Integer.valueOf(15));` matches with list.remove(Object) and this removes the first occurrence of 15 from the list, which means the 1st element of the list. </p><p>After removal list contains: [25, 15, 25]. </p><p>NOTE: String class and all the wrapper classes override equals(Object) method, hence at the time of removal when another instance is passed [Integer.valueOf(15)], there is no issue in removing the matching item.</p>", "answers": ["[25, 15, 25]", "[15, 25, 25]", "[25, 25]", "[25]", "Compilation error", "Exception is thrown at runtime"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP78034</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(15);\n        list.add(25);\n        list.add(15);\n        list.add(25);\n        list.remove(Integer.valueOf(15));\n\n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP78034Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(15);\n        list.add(25);\n        list.add(15);\n        list.add(25);\n        list.remove(Integer.valueOf(15));\n\n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71527700, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP82983: </strong></p><p>HashSet cares about uniqueness and allows 1 null value.</p>", "answers": ["0", "1", "3", "Runtime Exception"], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP82983</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;String&gt; set = new HashSet&lt;&gt;(Arrays.asList(null,null,null));\n        long count = set.stream().count();\n        System.out.println(count);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "     (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();
