  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 102741359, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP66527</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        boolean flag1 = true;\n        boolean flag2 = false;\n        boolean flag3 = true;\n        boolean flag4 = false;\n        \n        System.out.println(!flag1 == flag2 != flag3 == !flag4); //Line n1\n        System.out.println(flag1 = flag2 != flag3 == !flag4); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": [], "links": [], "feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP66527: </strong></p><p>Let's solve the expression at Line n1:</p><p>!flag1 == flag2 != flag3 == !flag4</p><p>(!flag1) == flag2 != flag3 == (!flag4) //Logical NOT has got highest precedence among given operators</p><p>((!flag1) == flag2) != flag3 == (!flag4) //== and != have same precedence and left to right associative, grouping == first</p><p>(((!flag1) == flag2) != flag3) == (!flag4) //grouping != next</p><p>Above expression is left with single operator ==, whose left side is: (((!flag1) == flag2) != flag3) and right side is: (!flag4). As == is a binary operator, so left side is evaluated first.</p><p>((false == flag2) != flag3) == (!flag4) //!flag1 is false</p><p>((false == false) != flag3) == (!flag4) //flag2 is false</p><p>(true != flag3) == (!flag4) //(false == false) evaluates to true</p><p>(true != true) == (!flag4) //flag3 is true</p><p>false == (!flag4) //(true != true) evaluates to false</p><p>false == true //!flag4 is true</p><p>false //(false == true) evaluates to false</p><p>Hence, false is printed on to the console.</p><p><br></p><p>Let's solve the expression at Line n2: </p><p>flag1 = flag2 != flag3 == !flag4</p><p>flag1 = flag2 != flag3 == (!flag4) //Logical NOT has got highest precedence among given operators</p><p>flag1 = (flag2 != flag3) == (!flag4) //== and != have same precedence and left to right associative, grouping == first</p><p>flag1 = ((flag2 != flag3) == (!flag4)) //grouping == next</p><p>Above expression is left with single assignment operator =, whose right side needs to be evaluated first</p><p>flag1 = ((false != flag3) == (!flag4)) //flag2 is false</p><p>flag1 = ((false != true) == (!flag4)) //flag3 is true</p><p>flag1 = (true == (!flag4)) //(false != true) evaluates to true</p><p>flag1 = (true == true) //!flag4 is true</p><p>flag1 = true //(true == true) evaluates to true</p><p>true is assigned to flag1 and true is also printed on to the console</p><p><br></p><p>One suggestion: In the real exam, if you find a question containing multiple expressions, then first check if there is any compilation error or not. If there is no compilation error in all the expressions, then only solve the expressions.</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "<p>true</p><p>true</p>", "<p>true</p><p>false</p>", "<p>false</p><p>true</p>", "<p>false</p><p>false</p>"]}, "correct_response": ["e"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP66527Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        boolean flag1 = true;\n        boolean flag2 = false;\n        boolean flag3 = true;\n        boolean flag4 = false;\n        \n        System.out.println(!flag1 == flag2 != flag3 == !flag4); //Line n1\n        System.out.println(flag1 = flag2 != flag3 == !flag4); //Line n2\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741357, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP73291</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        m(1);\n    }\n    \n    private static void m(Object obj) {\n        System.out.println(\"Object version\");\n    }\n    \n    private static void m(Number obj) {\n        System.out.println(\"Number version\");\n    }\n    \n    private static void m(Double obj) {\n        System.out.println(\"Double version\");\n    }\n}</pre><p><br></p><p>What is the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "Object version", "Number version", "Double version"], "explanation": "<p><strong>UKOCP73291: </strong></p><p>There are 3 overloaded method m. Note all the numeric wrapper classes (Byte, Short, Integer, Long, Float and Double) extend from Number and Number extends from Object.&nbsp; </p><p><br></p><p>Compiler either does implicit casting or Wrapping but not both. 1 is int literal, Java compiler can't implicit cast it to double and then box it to Double rather it boxes i to Integer and as Number is the immediate super class of Integer so Number version refers to Integer object. </p><p><br></p><p>Number version is printed on to the console. </p>"}, "correct_response": ["c"], "section": "1.2 Working with data types: Wrapper types", "question_plain": "Question ID: UKOCP73291Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        m(1);\n    }\n    \n    private static void m(Object obj) {\n        System.out.println(\"Object version\");\n    }\n    \n    private static void m(Number obj) {\n        System.out.println(\"Number version\");\n    }\n    \n    private static void m(Double obj) {\n        System.out.println(\"Double version\");\n    }\n}What is the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741391, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP51809</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String arr1 [], arr2, arr3 = null; //Line n1\n        arr1 = new String[2];\n        arr1[0] = \"A\";\n        arr1[1] = \"B\";\n        arr2 = arr3 = arr1; //Line n2\n        System.out.println(String.join(\"-\", arr2)); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "It executes successfully and prints A-B on to the console", "It executes successfully and prints B-A on to the console", "It executes successfully and prints A on to the console", "<p>It executes successfully and prints B on to the console</p>"], "explanation": "<p><strong>UKOCP51809: </strong></p><p>arr1 is of String[] type, where as arr2 and arr3 are of String type. As all three arr1, arr2 and arr3 are of reference type, hence null can be assigned to all these variables. Line n1 compiles successfully. </p><p><br></p><p>Statement at Line n2: arr2 = arr3 = arr1;</p><p>=&gt; arr2 = (arr3 = arr1); //assignment operator is right to left associative.</p><p>arr3 is of String type and arr1 is of String [] type, hence (arr3 = arr1) causes compilation error. </p><p><br></p><p>Though you had to select one correct option, hence no need to look further but I am providing explanation for Line n3 as well. </p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>Based on above points, `String.join(\"-\", arr2)` compiles successfully as arr2 is of String type.</p>"}, "correct_response": ["b"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP51809Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String arr1 [], arr2, arr3 = null; //Line n1\n        arr1 = new String[2];\n        arr1[0] = \"A\";\n        arr1[1] = \"B\";\n        arr2 = arr3 = arr1; //Line n2\n        System.out.println(String.join(\"-\", arr2)); //Line n3\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741389, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP41274</strong></p><p><br></p><p>Given code:&nbsp;</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass MyException extends RuntimeException {}\n\nclass YourException extends RuntimeException {}\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            throw new YourException();\n        } catch(MyException e1 | YourException e2){\n            System.out.println(\"Caught\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "Caught", "Runtime Exception"], "explanation": "<p><strong>UKOCP41274: </strong></p><p>Wrong syntax for multi-catch block, only one reference variable is allowed. </p><p><br></p><p>Correct syntax of multi-catch statement is: 'catch(MyException | YourException e)'</p>"}, "correct_response": ["a"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP41274Given code:&nbsp;package com.udayankhattry.ocp;\n\nclass MyException extends RuntimeException {}\n\nclass YourException extends RuntimeException {}\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            throw new YourException();\n        } catch(MyException e1 | YourException e2){\n            System.out.println(\"Caught\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741387, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP89662</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\nabstract class Parent {\n    public abstract void find() throws IOException;\n}\n\nclass Child extends Parent {\n    @Override\n    public void find() throws IOException {\n        throw new FileNotFoundException();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Parent p = new Child();\n        try {\n            p.find();\n        } catch (FileNotFoundException e) {\n            System.out.print(\"X\");\n        } catch (IOException e) {\n            System.out.print(\"Y\");\n        } finally {\n            System.out.print(\"Z\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["XZ", "YZ", "XYZ", "Compilation Error"], "explanation": "<p><strong>UKOCP89662: </strong></p><p>Method find() of Child class correctly overrides the method find() of Parent class, so there is no compilation error in Child class.</p><p>Code in Test class doesn't cause any error as well.</p><p><br></p><p>java.io.FileNotFoundException extends java.io.IOException</p><p>and</p><p>java.io.IOException extends java.lang.Exception</p><p><br></p><p>Even though method find() declares to throw IOException but at runtime an instance of FileNotFoundException is thrown.</p><p>A catch handler for FileNotFoundException is available and hence X is printed on to the console.</p><p>After that finally block is executed, which prints Z to the console.</p>"}, "correct_response": ["a"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP89662Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\nabstract class Parent {\n    public abstract void find() throws IOException;\n}\n\nclass Child extends Parent {\n    @Override\n    public void find() throws IOException {\n        throw new FileNotFoundException();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Parent p = new Child();\n        try {\n            p.find();\n        } catch (FileNotFoundException e) {\n            System.out.print(\"X\");\n        } catch (IOException e) {\n            System.out.print(\"Y\");\n        } finally {\n            System.out.print(\"Z\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741385, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP41253</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder();\n        try {\n            for(;;) {\n                sb.append(\"1Z0-819\");\n            }\n        } catch(Exception e) {\n            System.out.println(\"Exception!!!\");\n        }\n        System.out.println(\"Main ends!!!\");\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["&quot;Main ends!!!&quot; is printed on to the console and program terminates successfully", "&quot;Exception!!!&quot; and &quot;Main ends!!!&quot; are printed on to the console and program terminates successfully", "&quot;Exception!!!&quot; is printed on to the console and program terminates successfully", "&quot;Exception!!!&quot; is printed on to the console and program terminates abruptly", "Program terminates abruptly"], "explanation": "<p><strong>UKOCP41253: </strong></p><p>for(;;) is an infinite loop and hence `sb.append(\"1Z0-819\");` causes OutOfMemoryError which is a subclass of Error class. </p><p>main(String []) method throws OutOfMemoryError and program terminates abruptly.</p>"}, "correct_response": ["e"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP41253Given code of Test.java file:package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder();\n        try {\n            for(;;) {\n                sb.append(\"1Z0-819\");\n            }\n        } catch(Exception e) {\n            System.out.println(\"Exception!!!\");\n        }\n        System.out.println(\"Main ends!!!\");\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741383, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP44779</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">interface Workable {\n    void work();\n}\n\n/*INSERT*/ {\n    public void work() {} //Line n1\n}</pre><p><br></p><p>And the statements:</p><p>1. <code>abstract class Work implements Workable</code></p><p>2. <code>class Work implements Workable</code></p><p>3. <code>interface Work extends Workable</code></p><p>4. <code>abstract interface Work extends Workable</code></p><p>5. <code>abstract class Work</code></p><p><br></p><p>How many statements can replace /*INSERT*/ such that there is no compilation error?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["One statement", "Two statements", "Three statements", "Four statements", "Five statements"], "explanation": "<p><strong>UKOCP44779: </strong></p><p>/*INSERT*/ cannot be replaced with interface as work() method at Line n1 is neither abstract nor default. Hence, statements 3 and 4 will not work.</p><p>Let's check other statements:</p><p>1. <code>abstract class Work implements Workable</code>: abstract class in java can have 0 or more abstract methods. It compiles successfully.</p><p>2. <code>class Work implements Workable</code>: It correctly implements the work() method of Workable interface, hence it compiles successfully.</p><p>5. <code>abstract class Work</code>: abstract class in java can have 0 or more abstract methods. It compiles successfully.</p><p><br></p><p>Hence, out of 5 statements, 3 will compile successfully.</p>"}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP44779Consider below code snippet:interface Workable {\n    void work();\n}\n\n/*INSERT*/ {\n    public void work() {} //Line n1\n}And the statements:1. abstract class Work implements Workable2. class Work implements Workable3. interface Work extends Workable4. abstract interface Work extends Workable5. abstract class WorkHow many statements can replace /*INSERT*/ such that there is no compilation error?", "related_lectures": []}, {"_class": "assessment", "id": 102741381, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP66596</strong></p><p><br></p><p>For the given code of Implementer.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface I01 {\n    void m1();\n}\n\npublic class Implementer extends Object implements I01 {\n    protected void m1() {\n        \n    }\n}</pre><p><br></p><p>Which of the following statements is true?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Interface I01 causes compilation error as method m1 is not public", "Implementer class declaration is not correct", "Method m1() in Implementer class is not implemented correctly", "None of the other options"], "explanation": "<p><strong>UKOCP66596: </strong></p><p>void m1(); in interface I01 is equivalent to `public abstract void m1();`. So method m1() is implicitly public and abstract. </p><p>In java,&nbsp; a class can extend from only one class but can implement multiple interfaces. Correct keywords are: extends and implements. So, class declaration is correct.&nbsp; </p><p>As method m1() is implicitly public in I01, hence overriding method in Implementer class should also be public. But it is protected and hence compiler complains.</p>"}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP66596For the given code of Implementer.java file: package com.udayankhattry.ocp;\n\ninterface I01 {\n    void m1();\n}\n\npublic class Implementer extends Object implements I01 {\n    protected void m1() {\n        \n    }\n}Which of the following statements is true?", "related_lectures": []}, {"_class": "assessment", "id": 102741379, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP31043</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass X {\n    void A() {\n        System.out.print(\"A\");\n    }\n}\n\nclass Y extends X {\n    void A() {\n        System.out.print(\"A-\");\n    }\n    \n    void B() {\n        System.out.print(\"B-\");\n    }\n    \n    void C() {\n        System.out.print(\"C-\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        X obj = new Y(); //Line n1\n        obj.A(); //Line n2\n        obj.B(); //Line n3\n        obj.C(); //Line n4\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["A-B-C-", "AB-C-", "Compilation error in class Y", "Compilation error in class Test"], "explanation": "<p><strong>UKOCP31043: </strong></p><p>Class Y correctly extends class X and it overrides method A() and provides two new methods B() and C(). </p><p>At Line n1, obj is of X type and therefore obj.B(); and obj.C(); cause compilation error as these methods are not defined in class X.</p>"}, "correct_response": ["d"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP31043Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass X {\n    void A() {\n        System.out.print(\"A\");\n    }\n}\n\nclass Y extends X {\n    void A() {\n        System.out.print(\"A-\");\n    }\n    \n    void B() {\n        System.out.print(\"B-\");\n    }\n    \n    void C() {\n        System.out.print(\"C-\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        X obj = new Y(); //Line n1\n        obj.A(); //Line n2\n        obj.B(); //Line n3\n        obj.C(); //Line n4\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 102741377, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP79899</strong></p><p><br></p><p>Consider the code of Greet.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic final class Greet {\n    private String msg;\n    public Greet(String msg) {\n        this.msg = msg;\n    }\n\n    public String getMsg() {\n        return msg;\n    }\n\n    public void setMsg(String msg) {\n        this.msg = msg;\n    }\n}</pre><p><br></p><p>Is the Greet class an immutable class?</p>", "relatedLectureIds": "", "feedbacks": ["", ""], "explanation": "<p><strong>UKOCP79899: </strong></p><p>Immutable class should have private fields and no setters. </p><p>In this case it is possible to change the msg after an instance of Greet class is created. Check below code:</p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        Greet greet = new Greet(\"Hello\"); //msg refers to \"Hello\"\n        greet.setMsg(\"Welcome\"); //msg refers to \"Welcome\"\n        System.out.println(greet.getMsg()); //Prints \"Welcome\" on to the console.\n    }\n}</pre><p><br></p><p>To make Greet class immutable, delete the setter and add modifier 'final' for variable msg.</p><pre class=\"prettyprint linenums\">final class Greet {\n    private final String msg;\n    public Greet(String msg) {\n        this.msg = msg;\n    }\n\n    public String getMsg() {\n        return msg;\n    }\n}</pre><p><br></p><p>Once value is assigned to msg variable in the constructor, it cannot be changed later. </p>", "answers": ["Yes", "No"]}, "correct_response": ["b"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP79899Consider the code of Greet.java file:package com.udayankhattry.ocp;\n\npublic final class Greet {\n    private String msg;\n    public Greet(String msg) {\n        this.msg = msg;\n    }\n\n    public String getMsg() {\n        return msg;\n    }\n\n    public void setMsg(String msg) {\n        this.msg = msg;\n    }\n}Is the Greet class an immutable class?", "related_lectures": []}, {"_class": "assessment", "id": 102741373, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22548</strong></p><p><br></p><p>Consider the code of TestStudent.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Student {\n    String name;\n    int age;\n    \n    void Student() {\n        Student(\"James\", 25); //Line n1\n    }\n    \n    void Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n}\n\npublic class TestStudent {\n    public static void main(String[] args) {\n        Student s = new Student(); //Line n2\n        System.out.println(s.name + \":\" + s.age); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing TestStudent class?</p>", "answers": ["null:0", "James:25", "Line n1 causes compilation error", "Line n2 causes compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP22548: </strong></p><p>Methods can have same name as the class. Student() and Student(String, int) are methods and not constructors of the class, note the void return type of these methods. </p><p>Line n1 is a valid instance method call from Student() method, hence Line n1 doesn't cause any compilation error. </p><p><br></p><p>As no constructors are provided in the Student class, java compiler adds default no-argument constructor. That is why the Line n2 doesn't cause any compilation error. </p><p><br></p><p>Default values are assigned to instance variables, hence null is assigned to name and 0 is assigned to age.&nbsp; </p><p><br></p><p>Line n3 prints null:0 on to the console.</p>"}, "correct_response": ["a"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP22548Consider the code of TestStudent.java file:package com.udayankhattry.ocp;\n\nclass Student {\n    String name;\n    int age;\n    \n    void Student() {\n        Student(\"James\", 25); //Line n1\n    }\n    \n    void Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n}\n\npublic class TestStudent {\n    public static void main(String[] args) {\n        Student s = new Student(); //Line n2\n        System.out.println(s.name + \":\" + s.age); //Line n3\n    }\n}What will be the result of compiling and executing TestStudent class?", "related_lectures": []}, {"_class": "assessment", "id": 102741371, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP20750</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Flyable {\n    void fly();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that there are no compilation errors?</p><p>Select 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["<p><code>Flyable flyable = new Flyable();</code> </p>", "<p><code>Flyable flyable = new Flyable(){};</code> </p>", "<pre class=\"prettyprint linenums\">Flyable flyable = new Flyable() {\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n}</pre>", "<pre class=\"prettyprint linenums\">Flyable flyable = new Flyable() {\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n};</pre>", "<pre class=\"prettyprint linenums\">var flyable = new Flyable() {\n    @Override\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n    \n    public void stop() {\n        System.out.println(\"Stopping\");\n    }\n};\nflyable.fly();\nflyable.stop();</pre>"], "explanation": "<p><strong>UKOCP20750: </strong></p><p>Let's check all the options one by one: </p><p><code>Flyable flyable = new Flyable();</code></p><p>\u2717 Can't instantiate an interface.</p><p><br></p><p><code>Flyable flyable = new Flyable(){};</code></p><p>\u2717 fly() method has not been implemented. </p><p><br></p><pre class=\"prettyprint linenums\">Flyable flyable = new Flyable() {\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n}</pre><p>\u2717 semicolon is missing at the end </p><p><br></p><pre class=\"prettyprint linenums\">Flyable flyable = new Flyable() {\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n};</pre><p>\u2713 Correct syntax, fly() method has been implemented successfully.</p><p><br></p><pre class=\"prettyprint linenums\">var flyable = new Flyable() {\n    @Override\n    public void fly() {\n        System.out.println(\"Flying high\");\n    }\n    \n    public void stop() {\n        System.out.println(\"Stopping\");\n    }\n};\nflyable.fly();\nflyable.stop();</pre><p>\u2713 Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>Variable 'flyable' infers to anonymous inner class implementing Flyable interface. The anonymous inner class correctly overrides fly() method and provides a new stop() method. Both these methods can be invoked on reference variable 'flyable' as it is of anonymous inner class type.</p>"}, "correct_response": ["d", "e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP20750Below is the code of Test.java file:package com.udayankhattry.ocp;\n\ninterface Flyable {\n    void fly();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/\n    }\n}Which of the following options can replace /*INSERT*/ such that there are no compilation errors?Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741369, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP39360</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer {\n    private String name = \"NOW OR NEVER\";\n    //Insert inner class definition here\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        new Outer().new Inner().printName();\n    }\n}</pre><p><br></p><p>Which of the following Inner class definitions inserted in the Outer class, will print NOW OR NEVER in the output on executing Test class? </p><p>Select 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(this.name);\n    }\n}</pre>", "<pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre>", "<pre class=\"prettyprint linenums\">inner class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre>", "<pre class=\"prettyprint linenums\">abstract class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre>", "<pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(Outer.this.name);\n    }\n}</pre>"], "explanation": "<p><strong>UKOCP39360: </strong></p><p>Let's check all the options one by one:</p><pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(this.name);\n    }\n}</pre><p>\u2717 Keyword 'this' inside Inner class refers to currently executing instance of Inner class and not the Outer class. As, there is no instance variable 'name' inside Inner class, hence `this.name` causes compilation error. </p><p><br></p><pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre><p>\u2713 To access Outer class variable from within inner class you can use these 2 statements: System.out.println(name); OR System.out.println(Outer.this.name);</p><p><br></p><pre class=\"prettyprint linenums\">inner class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre><p>\u2717 There is no keyword with the name 'inner' in java. </p><p><br></p><pre class=\"prettyprint linenums\">abstract class Inner {\n    public void printName() {\n        System.out.println(name);\n    }\n}</pre><p>\u2717 As new Inner() is used in main method, hence cannot declare class Inner as abstract in this case. But note that abstract or final can be used with regular inner classes.</p><p><br></p><pre class=\"prettyprint linenums\">class Inner {\n    public void printName() {\n        System.out.println(Outer.this.name);\n    }\n}</pre><p>\u2713 To access Outer class variable from within inner class you can use these 2 statements: System.out.println(name); OR System.out.println(Outer.this.name);</p>"}, "correct_response": ["b", "e"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP39360Given code: package com.udayankhattry.ocp;\n\nclass Outer {\n    private String name = \"NOW OR NEVER\";\n    //Insert inner class definition here\n}\n\npublic class Test {\n    public static void main(String [] args) {\n        new Outer().new Inner().printName();\n    }\n}Which of the following Inner class definitions inserted in the Outer class, will print NOW OR NEVER in the output on executing Test class? Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741367, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22901</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int sum = 0;\n        for(var i = 0; i &lt; 7; i++) { //Line n1\n            if(i == 4)\n                break;\n            else\n                continue;\n            sum += i; //Line n2\n        }\n        System.out.println(sum); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["10", "21", "17", "6", "4", "0", "<p>Compilation error at Line n1</p>", "<p>Compilation error at Line n2</p>", "<p>Compilation error at Line n3</p>"], "explanation": "<p><strong>UKOCP22901: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name, package name or loop's label but it cannot be used as a class or interface name.</p><p>At Line n1, variable 'i' infers to int type, so no issues at Line n1.</p><p><br></p><p>if-else block uses break; and continue; statements. break; will exit the loop and will take the control to Line n3 on the other hand continue; will take the control to Line n1. In both the cases Line n2 will never be executed.</p><p>As Compiler knows about it, hence it tags Line n2 as unreachable, which causes compilation error.</p>"}, "correct_response": ["h"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP22901Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int sum = 0;\n        for(var i = 0; i &lt; 7; i++) { //Line n1\n            if(i == 4)\n                break;\n            else\n                continue;\n            sum += i; //Line n2\n        }\n        System.out.println(sum); //Line n3\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741365, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP26028</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String sport = \"swimming\";\n        switch (sport) {\n            default:\n                System.out.println(\"RUNNING\");\n            case \"Tennis\":\n                System.out.println(\"TENNIS\");\n            case \"Swimming\":\n                System.out.println(\"SWIMMING\");\n            case \"Football\":\n                System.out.println(\"FOOTBALL\");\n                break;\n        }\n    }\n}</pre>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["RUNNING", "SWIMMING", "<p>SWIMMING</p><p>FOOTBALL</p>", "<p>RUNNING</p><p>TENNIS</p><p>SWIMMING</p><p>FOOTBALL</p>"], "explanation": "<p><strong>UKOCP26028: </strong></p><p>\"swimming\" is different from \"Swimming\", so there is no matching case available. default block is executed, \"RUNNING\" is printed on to the console. No break statement inside default, hence control enters in fall-through and executes remaining blocks until the break; is found or switch block ends. So in this case, it prints TENNIS, SWIMMING, FOOTBALL one after another and break; statement takes control out of switch block. main method ends and program terminates successfully.</p>"}, "correct_response": ["d"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP26028What will be the result of compiling and executing Test class?package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        String sport = \"swimming\";\n        switch (sport) {\n            default:\n                System.out.println(\"RUNNING\");\n            case \"Tennis\":\n                System.out.println(\"TENNIS\");\n            case \"Swimming\":\n                System.out.println(\"SWIMMING\");\n            case \"Football\":\n                System.out.println(\"FOOTBALL\");\n                break;\n        }\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 102741363, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP16290</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"ELECTROTHERMAL\"); //Line n1\n        sb.setLength(7); //Line n2\n        System.out.print(sb.toString().strip()); //Line n3\n        System.out.print(\":\"); //Line n4\n        sb.setLength(14); //Line n5\n        System.out.println(sb.toString().strip()); //Line n6\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", "", "", ""], "answers": ["THERMAL:ELECTROTHERMAL", "ELECTRO:ELECTROTHERMAL", "ELECTROTHERMAL:THERMAL", "ELECTROTHERMAL:ELECTRO", "ELECTRO:ELECTRO", "ELECTRO:THERMAL", "<p>THERMAL:ELECTRO</p>", "<p>THERMAL:THERMAL</p>"], "explanation": "<p><strong>UKOCP16290: </strong></p><p>strip() method of String class (available since Java 11) returns a string whose value is this string, with all leading and trailing white space removed.</p><p>To find out what is white space character in Java, check Character.isWhitespace\u200b(int) method, you will find below: </p><p>A character is a Java whitespace character if and only if it satisfies one of the following criteria:</p><p>It is a Unicode space character (SPACE_SEPARATOR, LINE_SEPARATOR, or PARAGRAPH_SEPARATOR) but is not also a non-breaking space ('\\u00A0', '\\u2007', '\\u202F').</p><p>It is '\\t', U+0009 HORIZONTAL TABULATION.</p><p>It is '\\n', U+000A LINE FEED.</p><p>It is '\\u000B', U+000B VERTICAL TABULATION.</p><p>It is '\\f', U+000C FORM FEED.</p><p>It is '\\r', U+000D CARRIAGE RETURN.</p><p>It is '\\u001C', U+001C FILE SEPARATOR.</p><p>It is '\\u001D', U+001D GROUP SEPARATOR.</p><p>It is '\\u001E', U+001E RECORD SEPARATOR.</p><p>It is '\\u001F', U+001F UNIT SEPARATOR. </p><p><br></p><p>White space character in java includes space character along with above characters. </p><p><br></p><p>At Line n1, 'sb' refers to StringBuilder object {'E','L','E','C','T','R','O','T','H','E','R','M','A,'L'}. So length of this StringBuilder object is 14. </p><p>At Line n2, `sb.setLength(7);` sets the length of StringBuilder object referred by 'sb' to 7 (it is reducing the length of StringBuilder object from 14 to 7), hence 'sb' refers to {'E','L','E','C','T','R','O'}. Last 7 characters are gone.</p><p>There is no white space character in above StringBuilder object, hence at Line n3 `sb.toString()` returns \"ELECTRO\" and strip() method at Line n3 returns \"ELECTRO\". </p><p>\"ELECTRO\" is printed on to the console.</p><p>When code reaches Line n4, console shows \"ELECTRO:\"</p><p><br></p><p>At Line n5, `sb.setLength(14);` sets the length of StringBuilder object referred by 'sb' to 7 (it is increasing the length of StringBuilder object by 7 by filling available space with null characters '\\u0000'). Now 'sb' refers to StringBuilder object {'E','L','E','C','T','R','O','\\u0000','\\u0000','\\u0000','\\u0000','\\u0000','\\u0000,'\\u0000'}.</p><p>At Line n6, `sb.toString()` returns corresponding String object \"ELECTRO&nbsp; &nbsp; &nbsp; &nbsp;\". As '\\u0000' is white space character, hence \"ELECTRO&nbsp; &nbsp; &nbsp; &nbsp;\".strip() returns \"ELECTRO\". Line n6 prints \"ELECTRO\" on to the console.</p><p><br></p><p>Hence, the output is ELECTRO:ELECTRO.</p>"}, "correct_response": ["e"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP16290Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"ELECTROTHERMAL\"); //Line n1\n        sb.setLength(7); //Line n2\n        System.out.print(sb.toString().strip()); //Line n3\n        System.out.print(\":\"); //Line n4\n        sb.setLength(14); //Line n5\n        System.out.println(sb.toString().strip()); //Line n6\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741361, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP89618</strong></p><p><br></p><p>Consider below code fragment:</p><pre class=\"prettyprint linenums\">String place = \"MISSS\";\nSystem.out.println(place.replace(\"SS\", \"T\"));</pre><p><br></p><p>What is the output?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["MIST", "MITS", "MISSS", "MIT"], "explanation": "<p><strong>UKOCP89618: </strong></p><p>According to Javadoc, replace(CharSequence target, CharSequence replacement) method of String class returns a new String object after replacing each substring of this string that matches the literal target sequence with the specified literal replacement sequence. The replacement proceeds from the beginning of the string to the end, for example, replacing \"aa\" with \"b\" in the string \"aaa\" will result in \"ba\" rather than \"ab\".</p><p><br></p><p><code>\"MISSS\".replace(\"SS\", \"T\");</code> returns \"MITS\".</p>"}, "correct_response": ["b"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP89618Consider below code fragment:String place = \"MISSS\";\nSystem.out.println(place.replace(\"SS\", \"T\"));What is the output?", "related_lectures": []}, {"_class": "assessment", "id": 102741375, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54125</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    static int a = 10000;\n    static {\n        a = -a--;\n    }\n    {\n        a = -a++;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(a);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error", "-10000", "10000", "9999", "-9999"], "explanation": "<p><strong>UKOCP54125: </strong></p><p>Variable 'a' is of static type, so both static and instance initializer blocks can access it. Given code compiles successfully.</p><p><br></p><p>We are not creating the instance of Test class, so instance initializer block will not be executed. Only static initializer block will be executed in this case. </p><p>If static variable declaration / initialization statements are present along with static initializer blocks, then these are invoked in top to bottom order. So, for the given code, order of execution will be: </p><p>1. static int a = 10000;</p><p>and then</p><p>2. static { a = -a--; }</p><p><br></p><p>Statement 1, initializes variable 'a' to 10000.</p><p>Let's solve the statement inside static initializer block:</p><p>a = -a--; [a = 10000].&nbsp; </p><p>a = -(a--); [a = 10000] Postfix operator has got higher precedence than unary operator.&nbsp; &nbsp;</p><p>a= -(10000); [a = 9999] Use the value of a (10000) in the expression and after that decrement the value of a to 9999.&nbsp; </p><p>a = -10000; [a = -10000] Assigns -10000 to a</p><p><br></p><p>System.out.println(a); inside main method prints -10000</p>"}, "correct_response": ["b"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP54125Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    static int a = 10000;\n    static {\n        a = -a--;\n    }\n    {\n        a = -a++;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(a);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741425, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP50070</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = IntStream.rangeClosed(1, 5);\n        System.out.println(stream.parallel().reduce((x, y) -&gt; x + y).getAsInt());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["It will print 15 on to the console", "It can print any number between 1 and 15", "It will print 0 on to the console", "None of the other options"], "explanation": "<p><strong>UKOCP50070: </strong></p><p>stream --&gt; {1, 2, 3, 4, 5}. </p><p>stream.parallel() returns a parallel stream. </p><p><br></p><p>To understand, 'reduce((x, y) -&gt; x + y)' is equivalent to:</p><p><br></p><p>boolean foundAny = false;</p><p>int result = null;</p><p>for (int element : this stream) {</p><p> if (!foundAny) {</p><p>&nbsp; &nbsp; &nbsp;foundAny = true;</p><p>&nbsp; &nbsp; &nbsp;result = element;</p><p> }</p><p> else</p><p>&nbsp; &nbsp; &nbsp;result = accumulator.applyAsInt(result, element);</p><p>}</p><p>return foundAny ? OptionalInt.of(result) : OptionalInt.empty();</p><p><br></p><p>result will be initialized to 1st element of the stream and output will be the result of '1 + 2 + 3 + 4 + 5', which is 15. </p><p><br></p><p>The whole computation may run in parallel, but parallelism doesn't impact final result. In this case as there are only 5 numbers, hence it is an overhead to use parallelism. </p><p><br></p><p>reduce((x, y) -&gt; x + y) returns OptionalInt and it has getAsInt() method.</p>"}, "correct_response": ["a"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP50070Given code:package com.udayankhattry.ocp;\n\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = IntStream.rangeClosed(1, 5);\n        System.out.println(stream.parallel().reduce((x, y) -&gt; x + y).getAsInt());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741427, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51397</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.ExecutionException;\nimport java.util.concurrent.Executors;\n\n\npublic class Test {\n    static int ctr = 0;\n    public static void main(String[] args) throws InterruptedException,\n        ExecutionException {\n        var es = Executors.newFixedThreadPool(3);\n        es.execute(() -&gt; ctr++); //Line n1\n        es.submit(() -&gt; ctr++); //Line n2\n        var s = es.submit(() -&gt; {}, \"$\".repeat(ctr++)); //Line n3\n        System.out.println(s.get());\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", ""], "answers": ["Line n1 causes compilation error", "Line n3 causes compilation error", "Given code always prints $", "Given code always prints $$", "Given code always prints $$$", "None of the other options"], "explanation": "<p><strong>UKOCP51397: </strong></p><p>ExecutorService interface extends Executor interface and it has `void execute(Runnable command);` method. Hence, Line n1 compiles successfully. </p><p><br></p><p>ExecutorService interface has following methods: </p><p>Future&lt;?&gt; submit(Runnable task);&nbsp; &nbsp;</p><p>&lt;T&gt; Future&lt;T&gt; submit(Runnable task, T result);&nbsp; &nbsp;</p><p>&lt;T&gt; Future&lt;T&gt; submit(Callable&lt;T&gt; task);&nbsp; &nbsp;</p><p><br></p><p>Line n2 maps to submit(Runnable task) and Line n3 maps to submit(Runnable task, T result). Hence, Line n3 compiles successfully. </p><p><br></p><p>As there is fixed thread pool of 3 thread, hence tasks submitted by Line n1, Line n2 and Line n3 may run in parallel and in any order. </p><p>At the time of execution of Line n3, variable ctr can have either 0 or 1 or 2. Hence, possible outputs are blank string or \"$\" or \"$$\", but output can't be predicted.</p><p><br></p><p>Hence, correct option is \"None of the other options\"</p>"}, "correct_response": ["f"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP51397Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.ExecutionException;\nimport java.util.concurrent.Executors;\n\n\npublic class Test {\n    static int ctr = 0;\n    public static void main(String[] args) throws InterruptedException,\n        ExecutionException {\n        var es = Executors.newFixedThreadPool(3);\n        es.execute(() -&gt; ctr++); //Line n1\n        es.submit(() -&gt; ctr++); //Line n2\n        var s = es.submit(() -&gt; {}, \"$\".repeat(ctr++)); //Line n3\n        System.out.println(s.get());\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741429, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP73136</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\nimport java.util.concurrent.Executors;\nimport java.util.concurrent.TimeUnit;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException {\n        String s1 = \"LOCK1\";\n        String s2 = \"LOCK2\";\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        Runnable r1 = new Runnable() {\n            @Override\n            public void run() {\n                synchronized (s2) {\n                    synchronized (s1) {\n                        list.add(\"IN\");\n                    }\n                }\n            }\n        };\n\n        Runnable r2 = new Runnable() {\n            @Override\n            public void run() {\n                synchronized (s1) {\n                    synchronized (s2) {\n                        list.add(\"OUT\");\n                    }\n                }\n            }\n        };\n\n        var es = Executors.newFixedThreadPool(4);\n        es.submit(r2);\n        es.submit(r1);\n        es.shutdown();\n        es.awaitTermination(2, TimeUnit.MILLISECONDS);\n        System.out.println(String.join(\"-\", list).isBlank() ? \"BLANK\" : String.join(\"-\", list));\n    }\n}</pre><p><br></p><p>And the statements:</p><p>1. Above code always prints OUT-IN</p><p>2. Above code always prints IN-OUT</p><p>3. Above code may print OUT-IN</p><p>4. Above code may print IN-OUT</p><p>5. Above code always ends in a deadlock</p><p>6. Above code never ends in a deadlock</p><p>7. Above code may end in a deadlock</p><p>8. Above code may print BLANK</p><p><br></p><p>How many of above statements are correct?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Only one statement", "Only two statements", "Only three statements", "Only four statements"], "explanation": "<p><strong>UKOCP73136: </strong></p><p>awaitTermination(long timeout, TimeUnit unit) blocks until all tasks have completed execution after a shutdown request, or the timeout occurs, or the current thread is interrupted, whichever happens first.</p><p><br></p><p>Two threads are running in parallel. There are some possible scenarios:</p><p>1. Thread executing runnable r1, adds \"IN\" to the list first and finishes its execution and thread executing runnable r2, adds \"OUT\" to the list and finishes its execution. </p><p>In this case, output will be IN-OUT</p><p><br></p><p>2. Thread executing runnable r2, adds \"OUT\" to the list first and finishes its execution and thread executing runnable r1, adds \"IN\" to the list and finishes its execution.</p><p>In this case, output will be OUT-IN</p><p><br></p><p>3. Thread executing runnable r1, adds \"IN\" to the list first and thread executing runnable r2 couldn't finish its execution within 2 milliseconds. In this case, output will be IN</p><p><br></p><p>4. Thread executing runnable r2, adds \"OUT\" to the list first and thread executing runnable r1 couldn't finish its execution within 2 milliseconds. In this case, output will be OUT</p><p><br></p><p>5. Thread executing runnable r2, acquires lock on \"LOCK1\" and thread executing runnable r1, acquires lock on \"LOCK2\". Thread executing runnable r2, waits for lock on \"LOCK2\" and Thread executing runnable r1, waits for lock on \"LOCK1\". This would result in deadlock.</p><p>`es.awaitTermination(2, TimeUnit.MILLISECONDS);` would wait for 2 milliseconds and then BLANK will be printed on to the console and program waits indefinitely.</p><p><br></p><p>6. Both the threads couldn't finish the execution within 2 milliseconds, and therefore nothing was added to the list. BLANK will be printed in this case as well. Program may terminate successfully or may end in a deadlock after printing BLANK.</p><p><br></p><p>Based on above points, let's check given statements:</p><p>1. Above code always prints OUT-IN&nbsp; \u2717</p><p>2. Above code always prints IN-OUT&nbsp; \u2717</p><p>3. Above code may print OUT-IN&nbsp; \u2713</p><p>4. Above code may print IN-OUT&nbsp; \u2713</p><p>5. Above code always ends in a deadlock&nbsp; \u2717</p><p>6. Above code never ends in a deadlock&nbsp; \u2717</p><p>7. Above code may end in a deadlock&nbsp; \u2713</p><p>8. Above code may print BLANK&nbsp; \u2713</p>"}, "correct_response": ["d"], "section": "8.3 Concurrency: CyclicBarrier", "question_plain": "Question ID: UKOCP73136Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\nimport java.util.concurrent.Executors;\nimport java.util.concurrent.TimeUnit;\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException {\n        String s1 = \"LOCK1\";\n        String s2 = \"LOCK2\";\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        Runnable r1 = new Runnable() {\n            @Override\n            public void run() {\n                synchronized (s2) {\n                    synchronized (s1) {\n                        list.add(\"IN\");\n                    }\n                }\n            }\n        };\n\n        Runnable r2 = new Runnable() {\n            @Override\n            public void run() {\n                synchronized (s1) {\n                    synchronized (s2) {\n                        list.add(\"OUT\");\n                    }\n                }\n            }\n        };\n\n        var es = Executors.newFixedThreadPool(4);\n        es.submit(r2);\n        es.submit(r1);\n        es.shutdown();\n        es.awaitTermination(2, TimeUnit.MILLISECONDS);\n        System.out.println(String.join(\"-\", list).isBlank() ? \"BLANK\" : String.join(\"-\", list));\n    }\n}And the statements:1. Above code always prints OUT-IN2. Above code always prints IN-OUT3. Above code may print OUT-IN4. Above code may print IN-OUT5. Above code always ends in a deadlock6. Above code never ends in a deadlock7. Above code may end in a deadlock8. Above code may print BLANKHow many of above statements are correct?", "related_lectures": []}, {"_class": "assessment", "id": 102741431, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP78832</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = new File(\"F:\\\\temp.dat\");\n        try(\n            var os = new DataOutputStream(new FileOutputStream(file));\n            var is = new DataInputStream((new FileInputStream(file)))\n        ) {\n            os.writeChars(\"JAVA\");\n            System.out.println(is.readChar());\n        }\n    }\n}</pre><p><br></p><p>F: is accessible for reading/writing and currently doesn't contain any directories/files. </p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["J", "A", "V", "None of the other options"], "explanation": "<p><strong>UKOCP78832: </strong></p><p>writeChars(String) is a convenient method to write multiple characters, behind the scenes it writes 4 characters as 8 bytes of data. </p><p><br></p><p>readChar() method returns 2 bytes of data, interpreted as char. Return type is char and not int. </p><p><br></p><p>'J' is displayed in the output. </p>"}, "correct_response": ["a"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP78832Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = new File(\"F:\\\\temp.dat\");\n        try(\n            var os = new DataOutputStream(new FileOutputStream(file));\n            var is = new DataInputStream((new FileInputStream(file)))\n        ) {\n            os.writeChars(\"JAVA\");\n            System.out.println(is.readChar());\n        }\n    }\n}F: is accessible for reading/writing and currently doesn't contain any directories/files. What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741433, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP65967</strong></p><p><br></p><p>F: is accessible for reading and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java</pre><p>'Book.java' file is available under 'C' directory.</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = Paths.get(\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\");\n        System.out.println(file.toRealPath());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["NoSuchFileException is thrown at runtime", "FileNotFoundException is thrown at runtime", "F:\\A\\B\\C\\Book.java", "F:\\A\\.\\B\\C\\D\\..\\Book.java", "Book.java"], "explanation": "<p><strong>UKOCP65967: </strong></p><p>Method Paths.get(...) converts a path String, or a sequence of strings that when joined form a path string, to a Path.</p><p>Variable 'file' infers to Path type and refers to Path object.</p><p>toRealPath() returns the path of an existing file. It returns the path after normalizing. </p><p><br></p><p>Let's first normalize the path:</p><p>\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\" </p><p>can be normalized to \"F:\\\\A\\\\B\\\\C\\\\D\\\\..\\\\Book.java\" [Single dot is for current directory, hence it is redundant].&nbsp; </p><p>can be further normalized to \"F:\\\\A\\\\B\\\\C\\\\Book.java\" [Double dot is for going to parent directory, hence directory 'D' is removed].&nbsp; </p><p><br></p><p>'F:\\A\\B\\C\\Book.java' exists on the file system, hence no exception.</p>"}, "correct_response": ["c"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP65967F: is accessible for reading and below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java'Book.java' file is available under 'C' directory.Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var file = Paths.get(\"F:\\\\A\\\\.\\\\B\\\\C\\\\D\\\\..\\\\Book.java\");\n        System.out.println(file.toRealPath());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741435, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP55717</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\", \"..\", \".\", \"..\").normalize();\n        System.out.println(path.getNameCount() + \":\" + path.getName(0).toString().length());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["1:3", "1:2", "1:1", "2:3", "2:2", "2:1", "<p>An exception is thrown at runtime</p>"], "explanation": "<p><strong>UKOCP55717: </strong></p><p>Variable 'path' infers to Path type and refers to absolute path 'Path[\"F:\\\\..\\\\.\\\\..\"]'</p><p>According to Javadoc of normalize method:</p><p>1. It removes all the redundant name elements.</p><p>2. \".\" represents current directory in Windows/Linux environment, hence it is considered redundant.</p><p>3. \"..\" represents parent directory in Windows/Linux environment. If a \"..\" is preceded by a non-\"..\" name, then both names are considered redundant. </p><p>In the given case, to normalize, first remove all the occurrences of \".\", which returns 'Path[\"F:\\\\..\\\\..\"]'. </p><p>Again, \"..\" is preceded by a non-\"..\" name, but \"F:\" represents root, therefore only \"..\" is removed, it returns 'Path[\"F:\\\\..\"]'. </p><p>\"..\" is again preceded by \"F:\", therefore only \"..\" is removed, it returns 'Path[\"F:\\\\\"]'</p><p><br></p><p>Root folder or drive is not considered in count and indexing. </p><p><br></p><p>`path.getNameCount()` returns 0 and as there is no name element available at index 0, `path.getName(0)` throws IllegalArgumentException at runtime. </p>"}, "correct_response": ["g"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP55717Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\", \"..\", \".\", \"..\").normalize();\n        System.out.println(path.getNameCount() + \":\" + path.getName(0).toString().length());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741437, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP76288</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) {\n                System.out.println(\"ID: \" + rs.getInt(\"IDD\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close();\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            System.out.println(\"An Error Occurred!\");\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p>EMPLOYEE table doesn't have any records.</p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation Error", "&#39;An Error Occurred!&#39; is printed on to the console", "Code executes fine and doesn&#39;t print anything on to the console", "NullPointerException is thrown at runtime"], "explanation": "<p><strong>UKOCP76288: </strong></p><p>Variable 'con' infers to Connection type, variable 'query' infers to String type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>Even if there are no records in EMPLOYEE table, ResultSet object returned by `stmt.executeQuery(query);` will never be null. </p><p><br></p><p>`rs.next()` returns false and control doesn't enter while loop. </p><p><br></p><p>`rs.getInt(\"IDD\")` statement has wrong column name but as this statement is not executed, hence SQLException is not thrown at runtime. </p><p><br></p><p>Code executes fine and doesn't print anything on to the console. </p>"}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP76288Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            var con = DriverManager.getConnection(\"jdbc:mysql://localhost:3306/ocp\", \"root\", \"password\");\n            var query = \"Select * FROM EMPLOYEE\";\n            var stmt = con.createStatement();\n            var rs = stmt.executeQuery(query);\n            while (rs.next()) {\n                System.out.println(\"ID: \" + rs.getInt(\"IDD\"));\n                System.out.println(\"First Name: \" + rs.getString(\"FIRSTNAME\"));\n                System.out.println(\"Last Name: \" + rs.getString(\"LASTNAME\"));\n                System.out.println(\"Salary: \" + rs.getDouble(\"SALARY\"));\n            }\n            rs.close();\n            stmt.close();\n            con.close();\n        } catch (SQLException ex) {\n            System.out.println(\"An Error Occurred!\");\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.EMPLOYEE table doesn't have any records.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741439, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP70992</strong></p><p><br></p><p>Given structure of MESSAGES table:</p><p><code>MESSAGES (msg1 varchar(100), msg2 varchar(100))</code></p><p><br></p><p>MESSAGES table contains below records: </p><p><code>'Happy New Year!', 'Happy Holidays!'</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select msg1 as msg, msg2 as msg FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            int colCount = rs.getMetaData().getColumnCount();\n            for(int i = 1; i &lt;= colCount; i++) {\n                System.out.println(rs.getString(i));\n            }\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p>Happy New Year!</p><p>Happy Holidays!</p>", "<p>Happy Holidays!</p><p>Happy Holidays!</p>", "<p>Happy New Year!</p><p>Happy New Year!</p>", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP70992: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>`rs.getMetaData().getColumnCount();` definitely returns 2 as there are 2 columns in the table.&nbsp; </p><p><br></p><p>But ResultSet cursor is initially before the first record, hence `rs.getString(i)` throws SQLException at runtime.&nbsp; </p><p><br></p><p>To print both the column values correctly, either use `rs.absolute(1);` OR `rs.relative(1);` OR `rs.next();` just before the for loop.</p>"}, "correct_response": ["d"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP70992Given structure of MESSAGES table:MESSAGES (msg1 varchar(100), msg2 varchar(100))MESSAGES table contains below records: 'Happy New Year!', 'Happy Holidays!'Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select msg1 as msg, msg2 as msg FROM MESSAGES\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            int colCount = rs.getMetaData().getColumnCount();\n            for(int i = 1; i &lt;= colCount; i++) {\n                System.out.println(rs.getString(i));\n            }\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741441, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP19270</strong></p><p><br></p><p>Which of the following will always represent Locale object for English in US? </p><p>Choose 2 options.</p>", "answers": ["<p><code>Locale l1 = Locale.US;</code> </p>", "<p><code>Locale l2 = new Locale(Locale.US);</code> </p>", "<p><code>Locale l3 = Locale.getInstance(\"us\");</code> </p>", "<p><code>Locale l4 = Locale.getDefault();</code> </p>", "<p><code>Locale l5 = new Locale(\"en\", \"US\");</code> </p>"], "explanation": "<p><strong>UKOCP19270: </strong></p><p><code>Locale.US;</code></p><p>\u2713&nbsp; Locale.US represents a Locale instance for en_US.</p><p><br></p><p><code>new Locale(Locale.US);</code></p><p>\u2717&nbsp; There is no Locale constructor which accepts a Locale object.</p><p><br></p><p><code>Locale.getInstance(\"us\");</code></p><p>\u2717&nbsp; There is no getInstance method in Locale class.</p><p><br></p><p><code>Locale.getDefault();</code></p><p>\u2717&nbsp; It will not always return Locale for en_US, it depends on the default locale of JVM.</p><p><br></p><p><code>new Locale(\"en\", \"US\");</code></p><p>\u2713&nbsp; This definitely creates a Locale instance for en_US. </p>"}, "correct_response": ["a", "e"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP19270Which of the following will always represent Locale object for English in US? Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741443, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP71800</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = new Locale(\"en\", \"US\");\n        var nf = NumberFormat.getCurrencyInstance(loc);\n        System.out.printf(\"Amount %s is in %s\" , nf.format(10), nf.getCurrency());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Amount $10.00 is in USD", "Amount $10.00 is in US Dollar", "Amount 10.00 is in US Dollar", "Amount 10.00 is in USD"], "explanation": "<p><strong>UKOCP71800: </strong></p><p>Variable 'loc' infers to Locale type and variable 'nf' infers to NumberFormat type.</p><p><br></p><p>As Locale instance is for en_US, hence `NumberFormat.getCurrencyInstance(loc);` returns NumberFormat instance for US. </p><p>Currency code for US is USD and it is represented as $. </p><p>`nf.getCurrency()` returns the Currency object with currency Code \"USD\" and `nf.format(10)` returns $10.00</p>"}, "correct_response": ["a"], "section": "12.3 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP71800Given code: package com.udayankhattry.ocp;\n\nimport java.text.NumberFormat;\nimport java.util.Locale;\n\npublic class Test {\n    public static void main(String[] args) {\n        var loc = new Locale(\"en\", \"US\");\n        var nf = NumberFormat.getCurrencyInstance(loc);\n        System.out.printf(\"Amount %s is in %s\" , nf.format(10), nf.getCurrency());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741445, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP67320</strong></p><p><br></p><p>Which of the following creates MyAnnotation successfully?</p>", "relatedLectureIds": "", "feedbacks": ["", ""
