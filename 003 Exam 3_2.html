, "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(ElementType.CLASS)\npublic @interface MyAnnotation {\n\n}</pre>", "<pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(TargetType.CLASS)\npublic @interface MyAnnotation {\n\n}</pre>", "<pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(TargetType.TYPE)\npublic @interface MyAnnotation {\n\n}</pre>", "<pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.SOURCE)\n@Target(ElementType.TYPE)\npublic @interface MyAnnotation {\n\n}</pre>", "<pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.SOURCE)\n@Target(ElementType.TYPE)\npublic @annotation MyAnnotation {\n\n}</pre>"], "explanation": "<p><strong>UKOCP67320: </strong></p><p>To create an annotation, use \"@interface\"</p><p><br></p><p>@Retention has value attribute of RetentionPolicy type and enum RetentionPolicy has 3 constants:</p><p>- RetentionPolicy.SOURCE</p><p>- RetentionPolicy.CLASS</p><p>- RetentionPolicy.RUNTIME</p><p><br></p><p>@Target has value attribute of ElementType[] type and enum ElementType has 11 constants:</p><p>ElementType.TYPE</p><p>ElementType.FIELD</p><p>ElementType.METHOD</p><p>ElementType.PARAMETER</p><p>ElementType.CONSTRUCTOR</p><p>ElementType.LOCAL_VARIABLE</p><p>ElementType.ANNOTATION_TYPE</p><p>ElementType.PACKAGE</p><p>ElementType.TYPE_PARAMETER</p><p>ElementType.TYPE_USE</p><p>ElementType.MODULE</p><p><br></p><p>Let's check all the options: </p><p>1. </p><pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(ElementType.CLASS)\npublic @interface MyAnnotation {\n\n}</pre><p>\u2717&nbsp; ElementType.CLASS is not valid.</p><p><br></p><p>2. </p><pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(TargetType.CLASS)\npublic @interface MyAnnotation {\n\n}</pre><p>\u2717&nbsp; @Target has value attribute of ElementType[] type and not TargetType[] type.</p><p><br></p><p>3. </p><pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(TargetType.TYPE)\npublic @interface MyAnnotation {\n\n}</pre><p>\u2717&nbsp; @Target has value attribute of ElementType[] type and not TargetType[] type.</p><p><br></p><p>4. </p><pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.SOURCE)\n@Target(ElementType.TYPE)\npublic @interface MyAnnotation {\n\n}</pre><p>\u2713&nbsp; RetentionPolicy.SOURCE is valid and ElementType.TYPE is also valid.</p><p><br></p><p>5. </p><pre class=\"prettyprint linenums\">import java.lang.annotation.*;\n\n@Retention(RetentionPolicy.SOURCE)\n@Target(ElementType.TYPE)\npublic @annotation MyAnnotation {\n\n}</pre><p>\u2717&nbsp; @annotation is not valid, to create an annotation, use \"@interface\"</p>"}, "correct_response": ["d"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP67320Which of the following creates MyAnnotation successfully?", "related_lectures": []}, {"_class": "assessment", "id": 102741447, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP66444</strong></p><p><br></p><p>Given code of NotNull annotation:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface NotNull {\n    String value() default \"\";\n}</pre><p><br></p><p>Consider all the necessary import statements are available, which of the following statements will compile successfully?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["<p><code>BiFunction&lt;String, String, String&gt; bf1 = (@NotNull var x, var y) -&gt; x.concat(y);</code> </p>", "<p><code>BiFunction&lt;String, String, Boolean&gt; bf2 = (@NotNull x, var y) -&gt; x.equals(y);</code> </p>", "<p><code>Consumer&lt;Integer&gt; cube = (@NotNull int x) -&gt; System.out.println(x * x * x);</code> </p>", "<p><code>Predicate&lt;String&gt; pr = (@NotNull x) -&gt; x.length() &gt; 0;</code> </p>", "<p><code>BiPredicate&lt;String, String&gt; pr2 = (var @NotNull(\"OCP\") s1, var @NotNull(\"OCP\") s2) -&gt; s1.equals(s2);</code> </p>"], "explanation": "<p><strong>UKOCP66444:</strong> </p><p>@Target annotation is absent for NotNull annotation, hence NotNull annotation may be applied on any program element.</p><p><br></p><p><code>BiFunction&lt;String, String, String&gt; bf1 = (@NotNull var x, var y) -&gt; x.concat(y);</code></p><p>\u2713&nbsp; To tag lambda parameters with any annotation, it is necessary to provide the type of lambda parameter. For lambda parameters, local variable type inference can be used. </p><p>NotNull annotation has attribute 'value', which is default, hence @NotNull can be used without specifying any value.</p><p><br></p><p><code>BiFunction&lt;String, String, Boolean&gt; bf2 = (@NotNull x, var y) -&gt; x.equals(y);</code></p><p>\u2717&nbsp; To tag lambda parameters with any annotation, it is necessary to provide the type of lambda parameter. Type is missing for 1st parameter.</p><p><br></p><p><code>Consumer&lt;Integer&gt; cube = (@NotNull int x) -&gt; System.out.println(x * x * x);</code></p><p>\u2717&nbsp; To tag lambda parameters with any annotation, it is necessary to provide the type of lambda parameter. Based on FunctionalInterface, type must be of Integer type or var type but not int type.</p><p><br></p><p><code>Predicate&lt;String&gt; pr = (@NotNull x) -&gt; x.length() &gt; 0;</code></p><p>\u2717&nbsp; To tag lambda parameters with any annotation, it is necessary to provide the type of lambda parameter. Type is missing for the parameter.</p><p><br></p><p><code>BiPredicate&lt;String, String&gt; pr2 = (var @NotNull(\"OCP\") s1, var @NotNull(\"OCP\") s2) -&gt; s1.equals(s2);</code></p><p>\u2717&nbsp; To tag lambda parameters with any annotation, it is necessary to provide the type of lambda parameter. Annotation must appear before the type, correct lambda expression in this case will be: `(@NotNull(\"OCP\") var s1, @NotNull(\"OCP\") var s2) -&gt; s1.equals(s2);`</p>"}, "correct_response": ["a"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP66444Given code of NotNull annotation:package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\npublic @interface NotNull {\n    String value() default \"\";\n}Consider all the necessary import statements are available, which of the following statements will compile successfully?", "related_lectures": []}, {"_class": "assessment", "id": 102741449, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP20698</strong></p><p><br></p><p>Given code of FileReader.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.security.*;\n\npublic class FileReader {\n    public void read (String path) {\n        var permission = new java.io.FilePermission(path, \"read\");\n        AccessController.checkPermission(permission); //Line n1\n\n        final var perms = permission.newPermissionCollection();\n        perms.add(permission);\n\n        var acc = new AccessControlContext(new ProtectionDomain[]{new ProtectionDomain(null, perms)}); //Line n2\n        \n        PrivilegedAction&lt;Void&gt; pa = () -&gt; {\n            /*Read the file*/\n            return null;\n        };\n\n        AccessController.doPrivileged(pa, acc); //Line n3\n    }\n}</pre><p><br></p><p>Does this code allow all users, with or without \"read\" permission on file represented by 'path', to read the file?</p>", "relatedLectureIds": "", "feedbacks": ["", ""], "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP20698: </strong></p><p>Case - 1: User doesn't have \"read\" permission on the file. </p><p>Line n1 will throw AccessControlException, which is a runtime exception, and remaining code will not execute.</p><p><br></p><p>Case - 2: User have multiple permission \"read,write\" on the file. </p><p>At Line n2, Instance of AccessControlContext is created, with \"read\" permission on 'path' and Line n3 executes the privileged action with the specified context.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 9-4 / ACCESS-4: Know how to restrict privileges through doPrivileged</p>"}, "correct_response": ["b"], "section": "10.2 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP20698Given code of FileReader.java file: package com.udayankhattry.ocp;\n\nimport java.security.*;\n\npublic class FileReader {\n    public void read (String path) {\n        var permission = new java.io.FilePermission(path, \"read\");\n        AccessController.checkPermission(permission); //Line n1\n\n        final var perms = permission.newPermissionCollection();\n        perms.add(permission);\n\n        var acc = new AccessControlContext(new ProtectionDomain[]{new ProtectionDomain(null, perms)}); //Line n2\n        \n        PrivilegedAction&lt;Void&gt; pa = () -&gt; {\n            /*Read the file*/\n            return null;\n        };\n\n        AccessController.doPrivileged(pa, acc); //Line n3\n    }\n}Does this code allow all users, with or without \"read\" permission on file represented by 'path', to read the file?", "related_lectures": []}, {"_class": "assessment", "id": 102741451, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP13928</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n\\---src\n    \\---com.udayankhattry.utility\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---utility\n                    |   FileUtility.java\n                    |   StringUtility.java\n                    |\n                    \\---internal\n                            DateUtility.java</pre><p>Name of the module: com.udayankhattry.utility</p><p><br></p><p>and there are three public classes available:</p><p>com.udayankhattry.utility.FileUtility</p><p>com.udayankhattry.utility.StringUtility</p><p>com.udayankhattry.utility.internal.DateUtility</p><p><br></p><p>Currently module-info.java file is blank, which of the following options correctly describes the content of module-info.java file such that FileUtility and StringUtility classes are available for public use but not the DateUtility class?</p>", "answers": ["<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility.*;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility.FileUtility;\n    exports com.udayankhattry.utility.StringUtility;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility.internal;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility.FileUtility;\n    exports com.udayankhattry.utility.StringUtility;\n    not exports com.udayankhattry.utility.internal.DateUtility;\n}</pre>", "<pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility;\n    not exports com.udayankhattry.utility.internal;\n}</pre>"], "explanation": "<p><strong>UKOCP13928: </strong></p><p>By default a module doesn't export anything.</p><p>Package name without any wild-card (*) is expected after exports directive. And all the public type members (classes, interfaces, enums) of the exported package become available for public use.</p><p>But yes the reading module code must have requires directive in its module descriptor file. </p><p><br></p><p>Hence, out of all the option below option is correct: </p><pre class=\"prettyprint linenums\">module com.udayankhattry.utility {\n    exports com.udayankhattry.utility;\n}</pre><p><br></p><p>Both the classes FileUtility and StringUtility are defined in exported package (com.udayankhattry.utility) and hence become available for public use.</p><p><br></p><p>There is no 'not exports' directive and with exports directives class names are not allowed. </p><p><br></p><p>Please note that module names live in a global namespace, separate from other namespaces in Java. Hence, module name can use the name of the package, class or interface.</p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP13928Given below the directory/file structure on Windows platform: C:\n\\---src\n    \\---com.udayankhattry.utility\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---utility\n                    |   FileUtility.java\n                    |   StringUtility.java\n                    |\n                    \\---internal\n                            DateUtility.javaName of the module: com.udayankhattry.utilityand there are three public classes available:com.udayankhattry.utility.FileUtilitycom.udayankhattry.utility.StringUtilitycom.udayankhattry.utility.internal.DateUtilityCurrently module-info.java file is blank, which of the following options correctly describes the content of module-info.java file such that FileUtility and StringUtility classes are available for public use but not the DateUtility class?", "related_lectures": []}, {"_class": "assessment", "id": 102741453, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP53131</strong></p><p><br></p><p>Which of the following is a valid module descriptor file contents for 'agriculture' module?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">public module agriculture {\n}</pre>", "<pre class=\"prettyprint linenums\">module agriculture {\n}\n\nmodule farming {\n}</pre>", "<pre class=\"prettyprint linenums\">module agriculture extends java.se{\n}</pre>", "<pre class=\"prettyprint linenums\">module agriculture {\n    imports java.se;\n}</pre>", "<pre class=\"prettyprint linenums\">module agriculture {\n    import java.se;\n}</pre>", "<pre class=\"prettyprint linenums\">import java.lang.*;\n\nmodule agriculture {\n}</pre>", "<p>None of the other options</p>"], "explanation": "<p><strong>UKOCP53131: </strong></p><p>Let's check all the options one by one: </p><pre class=\"prettyprint linenums\">public module agriculture {\n}</pre><p>\u2717&nbsp; Access and non-access modifiers are not allowed with module declaration.</p><p><br></p><pre class=\"prettyprint linenums\">module agriculture {\n}\n\nmodule farming {\n} </pre><p>\u2717&nbsp; Only one module declaration is allowed in a module descriptor file.</p><p><br></p><pre class=\"prettyprint linenums\">module agriculture extends java.se{\n} </pre><p>\u2717&nbsp; A module doesn't extend/implement another module</p><p><br></p><pre class=\"prettyprint linenums\">module agriculture {\n    imports java.se;\n}</pre><p>\u2717&nbsp; 'imports' is not a valid module directive, it should be 'requires'.</p><p><br></p><pre class=\"prettyprint linenums\">module agriculture {\n    import java.se;\n}</pre><p>\u2717&nbsp; 'import' is not a valid module directive, it should be 'requires'.</p><p><br></p><pre class=\"prettyprint linenums\">import java.lang.*;\n\nmodule agriculture {\n}</pre><p>\u2713&nbsp; import statements are allowed in module descriptor file. These import statements are useful when you use 'provides' directive.</p>"}, "correct_response": ["f"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP53131Which of the following is a valid module descriptor file contents for 'agriculture' module?", "related_lectures": []}, {"_class": "assessment", "id": 102741455, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP81113</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:.\n+---out\n+---jars\n|       printer.jar\n|\n\\---source\n    \\---mymodule\n        |   module-info.java\n        |\n        \\---com\n            \\---ocp\n                \\---test\n                        TestNonModularJar.java</pre><p><br></p><p>Suppose you have below non-modular jar file: </p><p>C:\\jars\\printer.jar</p><p><br></p><p>META-INF\\MANIFEST.MF file has below entries: </p><p>Manifest-Version: 1.0</p><p>Automatic-Module-Name: com.uk.nonmodular</p><p>Created-By: 11.0 (udayankhattry.com)</p><p><br></p><p>Printer.class file is packaged inside jar and has been generated from below Printer.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Printer {\n    public static void print(String... strs) {\n        System.out.println(String.join(\", \", strs));\n    }\n}</pre><p><br></p><p>And files related to modular application: </p><p>C:\\source\\mymodule\\module-info.java: </p><pre class=\"prettyprint linenums\">module mymodule {\n    /*INSERT*/\n}</pre><p><br></p><p>C:\\source\\mymodule\\com\\ocp\\test\\TestNonModularJar.java: </p><pre class=\"prettyprint linenums\">package com.ocp.test; \n\nimport com.udayankhattry.ocp.Printer;\n\npublic class TestNonModularJar {\n    public static void main(String... args) {\n        Printer.print(\"1\", \"2\", \"3\");\n    }\n}</pre><p><br></p><p>And the commands to be executed from C: </p><p><code>javac -d out --module-source-path source -p jars\\printer.jar -m mymodule</code></p><p><code>java -p out;jars\\printer.jar -m mymodule/com.ocp.test.TestNonModularJar</code></p><p><br></p><p>Which of the following needs to be done such that output is: 1, 2, 3?</p>", "answers": ["No changes are necessary, code as is prints expected output", "Replace /*INSERT*/ with `requires printer;`", "Replace /*INSERT*/ with `requires printer.jar;`", "Replace /*INSERT*/ with `requires com.uk.nonmodular;`", "Replace /*INSERT*/ with `requires com.udayankhattry.ocp;`"], "explanation": "<p><strong>UKOCP81113:</strong> </p><p>'printer.jar' is a non-modular jar. </p><p>During compilation &amp; execution, it is mentioned in module-path: '-p jars\\printer.jar' and '-p out;jars\\printer.jar'.</p><p>Non-modular jar files placed in module-path are treated as \"Automatic Modules\". </p><p><br></p><p>META-INF\\MANIFEST.MF file does have any entry for 'Automatic-Module-Name', which if present, represents the module name. Hence, in this case, module name will be 'com.uk.nonmodular'. </p><p>Note: If META-INF\\MANIFEST.MF file doesn't have any entry for 'Automatic-Module-Name', then in that case, jar file name is considered as the module name. </p><p><br></p><p>Module 'mymodule' reads 'com.udayankhattry.ocp.Printer' class of the jar, hence in the module descriptor file, `requires &lt;module&gt;;` is needed. </p><p>Therefore, /*INSERT*/ must be replaced with `requires com.uk.nonmodular;`.</p>"}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP81113Given below the directory/file structure on Windows platform: C:.\n+---out\n+---jars\n|       printer.jar\n|\n\\---source\n    \\---mymodule\n        |   module-info.java\n        |\n        \\---com\n            \\---ocp\n                \\---test\n                        TestNonModularJar.javaSuppose you have below non-modular jar file: C:\\jars\\printer.jarMETA-INF\\MANIFEST.MF file has below entries: Manifest-Version: 1.0Automatic-Module-Name: com.uk.nonmodularCreated-By: 11.0 (udayankhattry.com)Printer.class file is packaged inside jar and has been generated from below Printer.java file: package com.udayankhattry.ocp;\n\npublic class Printer {\n    public static void print(String... strs) {\n        System.out.println(String.join(\", \", strs));\n    }\n}And files related to modular application: C:\\source\\mymodule\\module-info.java: module mymodule {\n    /*INSERT*/\n}C:\\source\\mymodule\\com\\ocp\\test\\TestNonModularJar.java: package com.ocp.test; \n\nimport com.udayankhattry.ocp.Printer;\n\npublic class TestNonModularJar {\n    public static void main(String... args) {\n        Printer.print(\"1\", \"2\", \"3\");\n    }\n}And the commands to be executed from C: javac -d out --module-source-path source -p jars\\printer.jar -m mymodulejava -p out;jars\\printer.jar -m mymodule/com.ocp.test.TestNonModularJarWhich of the following needs to be done such that output is: 1, 2, 3?", "related_lectures": []}, {"_class": "assessment", "id": 102741423, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP30439</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;String&gt; stream = Stream.of(\"java\", \"python\", \"c\", \"c++\");\n        List&lt;String&gt; list = stream.sorted()\n                                    .collect(Collectors.toList());\n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["[c++, c, java, python]", "[python, java, c++, c]", "[c, c++, java, python]", "[java, python, c, c++]"], "explanation": "<p><strong>UKOCP30439: </strong></p><p>Stream.of(\"java\", \"python\", \"c\", \"c++\") =&gt; [\"java\", \"python\", \"c\", \"c++\"]</p><p>stream.sorted() =&gt; [\"c\", \"c++\", \"java\", \"python\"] {sorting on natural order}</p><p>collect(Collectors.toList()) =&gt; Returns a List object containing [\"c\", \"c++\", \"java\", \"python\"] in order. </p><p>System.out.println(list); =&gt; [c, c++, java, python]</p>"}, "correct_response": ["c"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP30439Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;String&gt; stream = Stream.of(\"java\", \"python\", \"c\", \"c++\");\n        List&lt;String&gt; list = stream.sorted()\n                                    .collect(Collectors.toList());\n        System.out.println(list);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741421, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP86009</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.LongStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        LongStream.iterate(0, i -&gt; i + 2)\n            .limit(4)\n            .forEach(System.out::print);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["02", "024", "0246", "02468"], "explanation": "<p><strong>UKOCP86009: </strong></p><p>LongStream.iterate(long seed, LongUnaryOperator f) =&gt; 'seed' is the initial element and 'f' is a function to be applied to the previous element to produce a new element. </p><p><br></p><p>LongUnaryOperator is a functional interface and has method `long applyAsLong(long operand);`. This means lambda expression should accept long parameter and return long value. </p><p>`i -&gt; i + 2` is the correct lambda expression. </p><p><br></p><p>LongStream.iterate(0, i -&gt; i + 2) =&gt; This results in an infinite stream consisting of elements [0,2,4,6,8,10,12,...]</p><p><br></p><p>limit(4) =&gt; Returns a stream consisting of 4 elements [0,2,4,6] from the given stream.&nbsp; </p><p><br></p><p>Hence, the output is: 0246</p>"}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP86009Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.LongStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        LongStream.iterate(0, i -&gt; i + 2)\n            .limit(4)\n            .forEach(System.out::print);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741419, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP27781</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Optional;\n\npublic class Test {\n    static Optional&lt;String&gt; exactMatch(List&lt;String&gt; list, String textToSearch) {\n        return list.stream()\n            .filter(s -&gt; s.equals(textToSearch))\n            .findFirst();\n    }\n\n    static Optional&lt;String&gt; startsWith(List&lt;String&gt; list, String prefix) {\n        return list.stream()\n            .filter(s -&gt; s.startsWith(prefix))\n            .findFirst();\n    }\n\n    static Optional&lt;String&gt; ofLength(List&lt;String&gt; list, int length) {\n        return list.stream()\n            .filter(s -&gt; s.length() == length)\n            .findFirst();\n    }\n\n    public static void main(String[] args) {\n        var planets = List.of(\"Mercury\", \"Venus\", \"Earth\", \"Pluto\",\n                                \"Jupiter\", \"Saturn\", \"Uranus\", \"Neptune\");\n\n        exactMatch(planets, \"Mars\")\n            .or(() -&gt; startsWith(planets, \"M\"))\n            .or(() -&gt; ofLength(planets, 5))\n            .stream()\n            .forEach(System.out::print);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Mars", "Mercury", "Venus", "Earth", "Pluto", "Program executes successfully but produces no output"], "explanation": "<p><strong>UKOCP27781: </strong></p><p>Optional&lt;T&gt; class has below or method: </p><p>public Optional&lt;T&gt; or\u200b(Supplier&lt;? extends Optional&lt;? extends T&gt;&gt; supplier){...}</p><p>According to Javadoc, If a value is present, returns an Optional describing the value, otherwise returns an Optional produced by the supplying function.</p><p><br></p><p>Let's check the given code: </p><p>Variable 'names' infers to List&lt;String&gt; type. </p><p>exactMatch(planets, \"Mars\") =&gt; Returns an empty Optional.</p><p>.or(() -&gt; startsWith(planets, \"M\")) =&gt; Returns Optional[\"Mercury\"].</p><p>As non-empty Optional has been returned, hence remaining or methods will not be invoked. </p><p>stream() =&gt; Stream&lt;String&gt; [\"Mercury\"]</p><p>forEach(System.out::print) =&gt; Prints Mercury on to the console.</p>"}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP27781Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Optional;\n\npublic class Test {\n    static Optional&lt;String&gt; exactMatch(List&lt;String&gt; list, String textToSearch) {\n        return list.stream()\n            .filter(s -&gt; s.equals(textToSearch))\n            .findFirst();\n    }\n\n    static Optional&lt;String&gt; startsWith(List&lt;String&gt; list, String prefix) {\n        return list.stream()\n            .filter(s -&gt; s.startsWith(prefix))\n            .findFirst();\n    }\n\n    static Optional&lt;String&gt; ofLength(List&lt;String&gt; list, int length) {\n        return list.stream()\n            .filter(s -&gt; s.length() == length)\n            .findFirst();\n    }\n\n    public static void main(String[] args) {\n        var planets = List.of(\"Mercury\", \"Venus\", \"Earth\", \"Pluto\",\n                                \"Jupiter\", \"Saturn\", \"Uranus\", \"Neptune\");\n\n        exactMatch(planets, \"Mars\")\n            .or(() -&gt; startsWith(planets, \"M\"))\n            .or(() -&gt; ofLength(planets, 5))\n            .stream()\n            .forEach(System.out::print);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741417, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP72781</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        System.out.println(list.stream().anyMatch(s -&gt; s.length() &gt; 0));\n        System.out.println(list.stream().allMatch(s -&gt; s.length() &gt; 0));\n        System.out.println(list.stream().noneMatch(s -&gt; s.length() &gt; 0));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p>false</p><p>false</p><p>false</p>", "<p>true</p><p>true</p><p>true</p>", "<p>false</p><p>true</p><p>true</p>", "<p>true</p><p>false</p><p>false</p>"], "explanation": "<p><strong>UKOCP72781: </strong></p><p>Method signatures: </p><p>boolean anyMatch(Predicate&lt;? super T&gt;) : Returns true if any of the stream element matches the given Predicate. If stream is empty, it returns false and predicate is not evaluated.&nbsp; </p><p><br></p><p>boolean allMatch(Predicate&lt;? super T&gt;) : Returns true if all the stream elements match the given Predicate. If stream is empty, it returns true and predicate is not evaluated.&nbsp; </p><p><br></p><p>boolean noneMatch(Predicate&lt;? super T&gt;) : Returns true if none of the stream element matches the given Predicate. If stream is empty, it returns true and predicate is not evaluated.&nbsp; </p><p><br></p><p>In this case, as stream is empty anyMatch returns false where as allMatch and noneMatch both returns true.</p>"}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP72781Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        System.out.println(list.stream().anyMatch(s -&gt; s.length() &gt; 0));\n        System.out.println(list.stream().allMatch(s -&gt; s.length() &gt; 0));\n        System.out.println(list.stream().noneMatch(s -&gt; s.length() &gt; 0));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741415, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP82131</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map = new LinkedHashMap&lt;String, String&gt;();\n        map.put(\"1\",  null);\n        map.put(\"2\",  \"John\");\n        map.put(\"3\", \"Evelyn\");\n        map.merge(\"1\", \"Harper\", String::concat); //Line n1\n        map.merge(\"2\", \"Lucy\", (s1, s2) -&gt; s2 + \":\" + s1); //Line n2\n        map.merge(\"3\", \"Juliet\", (s1, s2) -&gt; s1.concat(\":\").concat(s2)); //Line n3\n        System.out.println(map);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["{1=Harper, 2=Lucy:John, 3=Evelyn:Juliet}", "{1=Harper, 2=John:Lucy, 3=Evelyn:Juliet}", "{1=Harper, 2=Lucy:John, 3=Juliet:Evelyn}", "{1=Harper, 2=John:Lucy, 3=Juliet:Evelyn}", "{1=nullHarper, 2=Lucy:John, 3=Evelyn:Juliet}", "{1=Harpernull, 2=Lucy:John, 3=Evelyn:Juliet}"], "explanation": "<p><strong>UKOCP82131: </strong></p><p>Map&lt;K, V&gt; interface has default merge method with below signature: </p><p>default V merge\u200b(K key, V value, BiFunction&lt;? super V,\u200b? super V,\u200b? extends V&gt; remappingFunction)</p><p>According to the Javadoc of this method, \"If the specified key is not already associated with a value or is associated with null, associates it with the given non-null value. Otherwise, replaces the associated value with the results of the given remapping function, or removes if the result is null.\"</p><p><br></p><p>The default implementation is equivalent to performing the following steps for this map, then returning the current value or null if absent:</p><p><br></p><p>V oldValue = map.get(key);</p><p>V newValue = (oldValue == null) ? value :</p><p>&nbsp; &nbsp; &nbsp; &nbsp; remappingFunction.apply(oldValue, value);</p><p>if (newValue == null)</p><p>&nbsp; &nbsp; map.remove(key);</p><p>else</p><p>&nbsp; &nbsp; map.put(key, newValue);</p><p>\t</p><p>\t</p><p>BiFunction&lt;T, U, R&gt; has below apply method: </p><p>+R apply(T t, U u);</p><p><br></p><p>Method reference syntax, `String::concat` at Line n1 is equivalent to `(String s1, String s2) -&gt; {return s1.concat(s2);}` and is the correct implementation of BiFunction&lt;String, String, String&gt;.</p><p>Similarly, lambda expressions at Line n2 and Line n3 are correct implementations of BiFunction&lt;String, String, String&gt;.</p><p>\t</p><p>Let's check the given code: </p><p>LinkedHashMap object contains 3 key-value pairs: </p><p>{1=null, 2=John, 3=Evelyn}</p><p><br></p><p>At Line n1, as value associated with key \"1\" is null, hence passed value [\"Harper\"] is associated with key \"1\". After this statement executes successfully, LinkedHashMap object refers to {1=Harper, 2=John, 3=Evelyn}</p><p><br></p><p>At Line n2, `remappingFunction.apply(oldValue, value);` is executed, which is equivalent to `(s1, s2) -&gt; s2 + \":\" + s1` (s1 is oldValue [\"John\"] and s2 is the passed value [\"Lucy\"]), hence given lambda expression returns \"Lucy:John\" and therefore \"Lucy:John\" gets associated with key \"2\". After this statement executes successfully, LinkedHashMap object refers to {1=Harper, 2=Lucy:John, 3=Evelyn}</p><p><br></p><p>At Line n3, `remappingFunction.apply(oldValue, value);` is executed, which is equivalent to `(s1, s2) -&gt; s1.concat(\":\").concat(s2)` (s1 is oldValue [\"Evelyn\"] and s2 is the passed value [\"Juliet\"]), hence given lambda expression returns \"Evelyn:Juliet\" and therefore \"Evelyn:Juliet\" gets associated with key \"3\". After this statement executes successfully, LinkedHashMap object refers to {1=Harper, 2=Lucy:John, 3=Evelyn:Juliet}</p><p><br></p><p>Therefore, output is: {1=Harper, 2=Lucy:John, 3=Evelyn:Juliet}</p>"}, "correct_response": ["a"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP82131Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var map = new LinkedHashMap&lt;String, String&gt;();\n        map.put(\"1\",  null);\n        map.put(\"2\",  \"John\");\n        map.put(\"3\", \"Evelyn\");\n        map.merge(\"1\", \"Harper\", String::concat); //Line n1\n        map.merge(\"2\", \"Lucy\", (s1, s2) -&gt; s2 + \":\" + s1); //Line n2\n        map.merge(\"3\", \"Juliet\", (s1, s2) -&gt; s1.concat(\":\").concat(s2)); //Line n3\n        System.out.println(map);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741413, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP53606</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        BinaryOperator&lt;String&gt; operator = BinaryOperator.maxBy((s1, s2) -&gt; s2.length() - s1.length()); //Line n1\n        var list = List.of(List.of(\"*\", \"****\"), List.of(\"##\", \"#####\"), List.of(\"$$$\", \"$$$$$$\")); //Line n2\n        for(var l : list) { //Line n3\n            System.out.println(operator.apply(l.get(0), l.get(1)));\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>****</p><p>#####</p><p>$$$$$$</p>", "<p>*</p><p>##</p><p>$$$</p>", "<p>*</p><p>##</p><p>$$$</p><p>****</p><p>#####</p><p>$$$$$$</p>", "<p>*</p><p>****</p><p>##</p><p>#####</p><p>$$$</p><p>$$$$$$</p>"], "explanation": "<p><strong>UKOCP53606: </strong></p><p>interface BinaryOperator&lt;T&gt; extends Function&lt;T, T, T&gt;, so its apply function has the signature: T apply(T, T).</p><p>In this case, BinaryOperator&lt;String&gt; is used and hence apply method will have the signature: String apply(String, String).</p><p>BinaryOperator&lt;T&gt; has below static maxBy method: </p><p>public static &lt;T&gt; BinaryOperator&lt;T&gt; maxBy(Comparator&lt;? super T&gt; comparator) {...}: It returns a BinaryOperator which returns the greater of two elements according to the specified Comparator.</p><p>Given Lambda expression for the comparator `(s1, s2) -&gt; s2.length() - s1.length()` sorts the Strings in descending order of their lengths. This means if we pass two strings (\"A\", \"AA\"), maxBy method will return a BinaryOperator which would return shorter String, \"A\" in this case. </p><p><br></p><p>At Line n2, variable 'list' infers to List&lt;List&lt;String&gt;&gt; and refers to a List object containing 3 List&lt;String&gt; Objects.</p><p>At Line n3, variable 'l' infers to List&lt;String&gt;.</p><p>1st iteration of for-each loop: l --&gt; [\"*\", \"****\"]. </p><p>operator.apply(l.get(0), l.get(1))</p><p>=&gt; operator.apply(\"*\", \"****\") =&gt; \"*\".</p><p><br></p><p>2nd iteration of for-each loop: l --&gt; [\"##\", \"#####\"].</p><p>operator.apply(l.get(0), l.get(1))</p><p>=&gt; operator.apply(\"##\", \"#####\") =&gt; \"##\".</p><p><br></p><p>3rd iteration of for-each loop: l --&gt; [\"$$$\", \"$$$$$$\"].</p><p>operator.apply(l.get(0), l.get(1))</p><p>=&gt; operator.apply(\"$$$\", \"$$$$$$\") =&gt; \"$$$\".</p><p><br></p><p>Hence, output is: </p><p>*</p><p>##</p><p>$$$</p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP53606Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        BinaryOperator&lt;String&gt; operator = BinaryOperator.maxBy((s1, s2) -&gt; s2.length() - s1.length()); //Line n1\n        var list = List.of(List.of(\"*\", \"****\"), List.of(\"##\", \"#####\"), List.of(\"$$$\", \"$$$$$$\")); //Line n2\n        for(var l : list) { //Line n3\n            System.out.println(operator.apply(l.get(0), l.get(1)));\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741411, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP46084</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var numbers = new ArrayList&lt;&gt;(List.of(2, 9, 7, 14, 17)); //Line n1\n        Predicate&lt;Integer&gt; pr1 = s -&gt; s % 2 == 0; //Line n2\n        Predicate&lt;Integer&gt; pr2 = s -&gt; s % 3 == 0; //Line n3\n        var pr3 = pr1.or(pr2); //Line n4\n        var pr4 = Predicate.not(pr3); //Line n5\n        numbers.removeIf(pr4); //Line n6\n        System.out.println(numbers); //Line n7\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Runtime Exception", "[2, 9, 14]", "[7, 17]", "[2, 9, 7, 14, 17]", "[2, 14]", "[9, 7, 17]", "<p>[9]</p>"], "explanation": "<p><strong>UKOCP46084: </strong></p><p>At Line n1, variable 'numbers' infers to ArrayList&lt;Integer&gt; and it refers to ArrayList object [2, 9, 7, 14, 17]. </p><p>Line n2 creates a Predicate, which returns true, if passed integer is divisible by 2.</p><p>Line n3 creates a Predicate, which returns true, if passed integer is divisible by 3. </p><p>At Line n4, variable 'pr3' infers to Predicate&lt;Integer&gt; and it refers to a Predicate object, which returns true, if passed integer is divisible by 2 or 3. </p><p><br></p><p>Interface predicate has below static method: </p><p>static &lt;T&gt; Predicate&lt;T&gt; not(Predicate&lt;? super T&gt; target): It returns a predicate that is the negation of the supplied predicate.</p><p>At Line n5, variable 'pr4' infers to Predicate&lt;Integer&gt; and it refers to a Predicate object, which returns true, if passed integer is not divisible by 2 and 3 (negation of pr3).</p><p><br></p><p>removeIf(Predicate&lt;? super E&gt; filter) method was added as a default method in Collection&lt;E&gt; interface in JDK 8 and it removes all the elements of this collection that satisfy the given predicate. </p><p>At Line n6, numbers 7 and 17 are removed for the ArrayList object as these numbers are not divisible by 2 and 3. </p><p>Hence Line n7 prints [2, 9, 14] on to the console. </p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP46084Given code: package com.udayankhattry.ocp;\n\nimport java.util.*;\nimport java.util.function.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var numbers = new ArrayList&lt;&gt;(List.of(2, 9, 7, 14, 17)); //Line n1\n        Predicate&lt;Integer&gt; pr1 = s -&gt; s % 2 == 0; //Line n2\n        Predicate&lt;Integer&gt; pr2 = s -&gt; s % 3 == 0; //Line n3\n        var pr3 = pr1.or(pr2); //Line n4\n        var pr4 = Predicate.not(pr3); //Line n5\n        numbers.removeIf(pr4); //Line n6\n        System.out.println(numbers); //Line n7\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741409, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP37119</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Printable {\n    void print(Printer p1, Printer p2);\n}\n\nclass Printer {\n    public static void print(Printer p1, Printer p2) {\n        System.out.println(p1.toString() + \"$$\" + p2.toString());\n    }\n    \n    public void print(Printer p) {\n        System.out.println(p.toString());\n    }\n    \n    public String toString() {\n        return \"Hello\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printable obj = Printer::print;\n        obj.print(new Printer(), new Printer());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Hello$$Hello", "Hello", "<p>Hello$$Hello</p><p>Hello</p>", "Compilation error"], "explanation": "<p><strong>UKOCP37119: </strong></p><p>Printer::print is an ambiguous call and it refers to both the static and instance method of class Printer: </p><p><code>Printable obj = (p1, p2) -&gt; Printer.print(p1, p2); </code></p><p>and </p><p><code>Printable obj = (p1, p2) -&gt; p1.print(p2); </code></p><p><br></p><p>So Printer::print causes compilation error.</p>"}, "correct_response": ["d"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP37119Given code: package com.udayankhattry.ocp;\n\ninterface Printable {\n    void print(Printer p1, Printer p2);\n}\n\nclass Printer {\n    public static void print(Printer p1, Printer p2) {\n        System.out.println(p1.toString() + \"$$\" + p2.toString());\n    }\n    \n    public void print(Printer p) {\n        System.out.println(p.toString());\n    }\n    \n    public String toString() {\n        return \"Hello\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printable obj = Printer::print;\n        obj.print(new Printer(), new Printer());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741407, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP14006</strong></p><p><br></p><p>Given Code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Printer {\n    String print();\n\n    default String toString() {\n        return \"*\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer obj = () -&gt; \"PRINTER\";\n        System.out.print(obj);\n        System.out.print(obj.print());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["*PRINTER", "**", "PRINTER*", "PRINTERPRINTER", "Compilation error"], "explanation": "<p><strong>UKOCP14006: </strong></p><p>Though an interface is allowed to have overriding abstract methods [equals(Object) method, toString() method etc.] from Object class but default methods of an interface cannot override the methods of the Object class. </p><p>Interface Printer overrides the toString() method and it is declared as default, therefore it causes compilation error. </p>"}, "correct_response": ["e"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP14006Given Code:package com.udayankhattry.ocp;\n\ninterface Printer {\n    String print();\n\n    default String toString() {\n        return \"*\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer obj = () -&gt; \"PRINTER\";\n        System.out.print(obj);\n        System.out.print(obj.print());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741405, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP29976</strong></p><p><br></p><p>Consider below interface:</p><pre class=\"prettyprint linenums\">interface ICalculator {\n    int calc(int x);\n}</pre><p><br></p><p>Which of the following is the correct lambda expression for ICalculator?</p>", "answers": ["<p><code>ICalculator obj1 = x -&gt; return x*x;</code> </p>", "<p><code>ICalculator obj2 = (x) -&gt; return x*x;</code> </p>", "<p><code>ICalculator obj3 = x - &gt; x*x;</code> </p>", "<p><code>ICalculator obj4 = x -&gt; x*x;</code> </p>"], "explanation": "<p><strong>UKOCP29976: </strong></p><p>If there is only one parameter in left part, then parentheses or round brackets '()' can be removed. If there is only one statement in the right-hand side then semicolon inside the body, curly brackets and return keyword(if available) can be removed.</p><p>Let's check all the options one by one: </p><p><code>ICalculator obj1 = x -&gt; return x*x;</code></p><p>\u2717&nbsp; If return keyword is used, then curly brackets and semicolon after the closing curly bracket must be used.</p><p><br></p><p><code>ICalculator obj2 = (x) -&gt; return x*x;</code></p><p>\u2717&nbsp; If return keyword is used, then curly brackets and semicolon after the closing curly bracket must be used.</p><p><br></p><p><code>ICalculator obj3 = x - &gt; x*x;</code></p><p>\u2717&nbsp; There should not be any space between - and &gt;. </p><p><br></p><p><code>ICalculator obj4 = x -&gt; x*x;</code></p><p>\u2713&nbsp; As there is only one parameter, hence parentheses or round brackets '()' can be removed. On right-hand side, there is only one statement, therefore, curly brackets, return keyword and semicolon inside the body are removed.</p>"}, "correct_response": ["d"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP29976Consider below interface:interface ICalculator {\n    int calc(int x);\n}Which of the following is the correct lambda expression for ICalculator?", "related_lectures": []}, {"_class": "assessment", "id": 102741403, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP21167</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();\n        deque.add(100);\n        deque.add(200);\n        deque.addFirst(300);\n        deque.addLast(400);\n        deque.remove(200);\n\n        System.out.println(deque.getFirst());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["100", "200", "300", "400"], "explanation": "<p><strong>UKOCP21167: </strong></p><p>deque.add(100); =&gt; {*100}.&nbsp; * represents HEAD of the deque.&nbsp; </p><p>deque.add(200); =&gt; {*100, 200}.&nbsp; add(E e) invokes addLast(e) method.&nbsp; </p><p>deque.addFirst(300); =&gt; {*300, 100, 200}.&nbsp; </p><p>deque.addLast(400); =&gt; {*300, 100, 200, 400}.&nbsp; </p><p>deque.remove(200); =&gt; {*300, 100, 400}.&nbsp; Deque interface doesn't have remove(int index) method.&nbsp; </p><p><br></p><p>System.out.println(deque.getFirst()); =&gt; Prints 300 on to the console.&nbsp; </p><p><br></p><p>You should be aware of other methods from Deque interface as well, such as:&nbsp; </p><p>removeFirst(); =&gt; Removes the first element from the Deque.&nbsp; </p><p>removeLast(); =&gt; Removes the last element from the Deque.</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP21167Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        Deque&lt;Integer&gt; deque = new ArrayDeque&lt;&gt;();\n        deque.add(100);\n        deque.add(200);\n        deque.addFirst(300);\n        deque.addLast(400);\n        deque.remove(200);\n\n        System.out.println(deque.getFirst());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741401, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP22481</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public int hashCode() {\n        return name.hashCode() + age;\n    }\n\n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Student) {\n            Student stud = (Student)obj;\n            return this.name.equals(stud.name) &amp;&amp; this.age == stud.age;\n        }\n        return false;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Student&gt; students = new TreeSet&lt;&gt;();\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 22));\n\n        System.out.println(students.size());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", ""], "answers": ["2", "3", "Runtime Exception"], "explanation": "<p><strong>UKOCP22481: </strong></p><p>TreeSet requires you to provide either Comparable or Comparator. If you don't provide Comparator explicitly, then for natural ordering your class should implement Comparable interface. </p><p><br></p><p>Student class doesn't use Comparable, hence ClassCastException is thrown at runtime.</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP22481Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\nclass Student {\n    private String name;\n    private int age;\n\n    Student(String name, int age) {\n        this.name = name;\n        this.age = age;\n    }\n\n    public int hashCode() {\n        return name.hashCode() + age;\n    }\n\n    public String toString() {\n        return \"Student[\" + name + \", \" + age + \"]\";\n    }\n\n    public boolean equals(Object obj) {\n        if(obj instanceof Student) {\n            Student stud = (Student)obj;\n            return this.name.equals(stud.name) &amp;&amp; this.age == stud.age;\n        }\n        return false;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Set&lt;Student&gt; students = new TreeSet&lt;&gt;();\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 20));\n        students.add(new Student(\"James\", 22));\n\n        System.out.println(students.size());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741399, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP45572</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["true", "false", "Compilation error", "Runtime exception"], "explanation": "<p><strong>UKOCP45572: </strong></p><p>List is super type and ArrayList is sub type, hence List l = new ArrayList(); is valid syntax.&nbsp; </p><p>Animal is super type and Dog is sub type, hence Animal a = new Dog(); is valid syntax. Both depicts Polymorphism. </p><p><br></p><p>But in generics syntax, Parameterized types are not polymorphic, this means ArrayList&lt;Animal&gt; is not super type of ArrayList&lt;Dog&gt;. Remember this point. So below syntaxes are not allowed:&nbsp; </p><p>ArrayList&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;(); OR List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP45572Below is the code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\nabstract class Animal {}\nclass Dog extends Animal{}\n\npublic class Test {\n    public static void main(String [] args) {\n        List&lt;Animal&gt; list = new ArrayList&lt;Dog&gt;();\n        list.add(0, new Dog());\n        System.out.println(list.size() &gt; 0);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741397, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP80346</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Iterator;\nimport java.util.List;\n\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; sports = new ArrayList&lt;&gt;();\n        sports.add(\"Windsurfing\");\n        sports.add(\"Aerobics\");\n        sports.add(\"Archery\");\n        sports.add(\"Diving\");\n    \n        Iterator&lt;String&gt; iterator = sports.iterator();\n        while(iterator.hasNext()) {\n            String sport = iterator.next();\n            if(sport.startsWith(\"A\")) {\n                sports.remove(sport);\n            }\n        }\n        \n        System.out.println(sports);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["[Windsurfing, Aerobics, Archery, Diving]", "[Windsurfing, Diving]", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP80346: </strong></p><p>ConcurrentModificationException exception may be thrown for following condition:</p><p>1. Collection is being iterated using Iterator/ListIterator or by using for-each loop. </p><p>And</p><p>2. Execution of Iterator.next(), Iterator.remove(), ListIterator.previous(), ListIterator.set(E) &amp; ListIterator.add(E) methods. These methods may throw java.util.ConcurrentModificationException in case Collection had been modified by means other than the iterator itself, such as Collection.add(E) or Collection.remove(Object) or List.remove(int) etc.</p><p><br></p><p>For the given code, 'sports' list is being iterated using the Iterator&lt;String&gt;.</p><p>hasNext() method of Iterator has following implementation:</p><pre class=\"prettyprint linenums\">public boolean hasNext() {\n    return cursor != size;\n}</pre><p>Where cursor is the index of next element to return and initially it is 0.</p><p><br></p><p>1st Iteration: cursor = 0, size = 4, hasNext() returns true. iterator.next() increments the cursor by 1 and returns \"Windsurfing\".</p><p>2nd Iteration: cursor = 1, size = 4, hasNext() returns true. iterator.next() increments the cursor by 1 and returns \"Aerobics\". As \"Aerobics\" starts with \"A\", hence sports.remove(dryFruit) removes \"Aerobics\" from the list and hence reducing the list's size by 1, size becomes 3.</p><p>3rd Iteration: cursor = 2, size = 3, hasNext() returns true. iterator.next() method throws java.util.ConcurrentModificationException.</p><p><br></p><p>If you want to remove the items from ArrayList, while using Iterator or ListIterator, then use Iterator.remove() or ListIterator.remove() method and NOT List.remove(...) method. Using List.remove(...) method while iterating the list (using the Iterator/ListIterator or for-each) may throw java.util.ConcurrentModificationException.</p>"}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP80346Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.Iterator;\nimport java.util.List;\n\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; sports = new ArrayList&lt;&gt;();\n        sports.add(\"Windsurfing\");\n        sports.add(\"Aerobics\");\n        sports.add(\"Archery\");\n        sports.add(\"Diving\");\n    \n        Iterator&lt;String&gt; iterator = sports.iterator();\n        while(iterator.hasNext()) {\n            String sport = iterator.next();\n            if(sport.startsWith(\"A\")) {\n                sports.remove(sport);\n            }\n        }\n        \n        System.out.println(sports);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741395, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP68265</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Animal {}\n\nclass Dog extends Animal {}\n\nclass Cat extends Animal {}\n\nclass A&lt;T&gt; {\n    T t;\n    void set(T t) {\n        this.t = t;\n    }\n\n    T get() {\n        return t;\n    }\n}\n\npublic class Test {\n    public static &lt;T&gt; void print1(A&lt;? extends Animal&gt; obj) {\n        obj.set(new Dog()); //Line n1\n        System.out.println(obj.get().getClass());\n    }\n\n    public static &lt;T&gt; void print2(A&lt;? super Dog&gt; obj) {\n        obj.set(new Dog()); //Line n2\n        System.out.println(obj.get().getClass());\n    }\n\n    public static void main(String[] args) {\n        A&lt;Dog&gt; obj = new A&lt;&gt;();\n        print1(obj); //Line n3\n        print2(obj); //Line n4\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>class com.udayankhattry.ocp.Dog</p><p>class com.udayankhattry.ocp.Dog</p>", "<p>null</p><p>class com.udayankhattry.ocp.Dog</p>", "<p>class com.udayankhattry.ocp.Dog</p><p>null</p>", "Compilation error", "Runtime Exception"], "explanation": "<p><strong>UKOCP68265: </strong></p><p>print1(A&lt;? extends Animal&gt; obj) =&gt; print1 method can accept arguments of A&lt;Animal&gt; or A&lt;Dog&gt; or A&lt;Cat&gt; types at runtime. </p><p>Suppose you have passed 'new A&lt;Cat&gt;()' as the argument of print1 method. Line n1 will not work in this case. </p><p>As compiler is not sure about the data that would come at runtime, hence it doesn't allow Line n1. Line n1 causes compilation failure. </p><p><br></p><p>print2(A&lt;? super Dog&gt; obj) =&gt; print2 method can accept arguments of A&lt;Dog&gt; or A&lt;Animal&gt; or A&lt;Object&gt; types at runtime. </p><p>All 3 arguments works with Line n2, hence no issues with Line n2. </p>"}, "correct_response": ["d"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP68265Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Animal {}\n\nclass Dog extends Animal {}\n\nclass Cat extends Animal {}\n\nclass A&lt;T&gt; {\n    T t;\n    void set(T t) {\n        this.t = t;\n    }\n\n    T get() {\n        return t;\n    }\n}\n\npublic class Test {\n    public static &lt;T&gt; void print1(A&lt;? extends Animal&gt; obj) {\n        obj.set(new Dog()); //Line n1\n        System.out.println(obj.get().getClass());\n    }\n\n    public static &lt;T&gt; void print2(A&lt;? super Dog&gt; obj) {\n        obj.set(new Dog()); //Line n2\n        System.out.println(obj.get().getClass());\n    }\n\n    public static void main(String[] args) {\n        A&lt;Dog&gt; obj = new A&lt;&gt;();\n        print1(obj); //Line n3\n        print2(obj); //Line n4\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741393, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP81222</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] array1 = {};\n        int [] array2 = {100, 200};\n        System.out.print(Arrays.compare(array1, array2));\n        System.out.print(Arrays.mismatch(array1, array2));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", ""], "answers": ["-20", "-10", "-1-1", "00", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP81222: </strong></p><p>Arrays class has following overloaded compare methods for primitive type arrays:</p><p>int compare\u200b(boolean[] a, boolean[] b)</p><p>int compare\u200b(byte[] a, byte[] b)</p><p>int compare\u200b(short[] a, short[] b)</p><p>int compare\u200b(char[] a, char[] b)</p><p>int compare\u200b(int[] a, int[] b)</p><p>int compare\u200b(long[] a, long[] b)</p><p>int compare\u200b(float[] a, float[] b)</p><p>int compare\u200b(double[] a, double[] b)</p><p><br></p><p>For comparing the array contents, these methods take help of static compare(x, y) method defined in respective Wrapper classes. For example, Arrays.compare(char[] a, char[] b) uses Character.compare(char x, char y) to compare array contents.</p><p>So, for the exam, you need to have an idea of how static compare(...) methods are implemented in these wrapper classes:</p><p>For Character, Byte &amp; Short; compare method returns x - y.</p><p>For Integer and Long; compare method returns -1 if x &lt; y, it returns 1 if x &gt; y and it returns 0 if x == y.</p><p>For Float and Double; logic is almost same as Integer type but logic is bit complex for finding equality of two floats or two doubles (not part of the exam).</p><p>For Boolean; compare method returns 0 if x == y, 1 if x is true and -1 if x is false.</p><p><br></p><p>All of these compare methods of Arrays class compare the arrays lexicographically and return below values:</p><p>0:&nbsp; if the first and second array are equal and contain the same elements in the same order</p><p>&lt;0: if the first array is lexicographically less than the second array</p><p>&gt;0: if the first array is lexicographically greater than the second array</p><p><br></p><p>Please note: If one array is the proper prefix of the other, then compare method returns a.length - b.length, where a refers to 1st array and b refers to 2nd array. </p><p>E.g., Arrays.compare(new char[] {'A', 'C', 'E'}, new char[] {'A'}) returns 3 - 1, which is 2. Please note that 2nd array is a proper prefix of 1st array.</p><p><br></p><p>array1 represents a valid int [] of length 0 and array2 represents an array of length 2. </p><p>array1 is a proper prefix of array2, therefore Arrays.compare(array1, array2) = array1.length - array2.length = 0 - 2 = -2.</p><p><br></p><p><br></p><p>Arrays class has following overloaded mismatch methods for primitive type arrays:</p><p>int mismatch\u200b(boolean[] a, boolean[] b)</p><p>int mismatch\u200b(byte[] a, byte[] b)</p><p>int mismatch\u200b(short[] a, short[] b)</p><p>int mismatch\u200b(char[] a, char[] b)</p><p>int mismatch\u200b(int[] a, int[] b)</p><p>int mismatch\u200b(long[] a, long[] b)</p><p>int mismatch\u200b(float[] a, float[] b)</p><p>int mismatch\u200b(double[] a, double[] b)</p><p><br></p><p>Above methods find and return the index of the first mismatch between two primitive arrays, otherwise return -1 if no mismatch is found. The index will be in the range of 0 (inclusive) up to the length (inclusive) of the smaller array. It throws NullPointerException, if either array is null.</p><p><br></p><p>For the given code, there is a mismatch at 1st element, which is index 0. Hence, Arrays.mismatch(array1, array2) returns 0.</p>"}, "correct_response": ["a"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP81222Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] array1 = {};\n        int [] array2 = {100, 200};\n        System.out.print(Arrays.compare(array1, array2));\n        System.out.print(Arrays.mismatch(array1, array2));\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}]};

    // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();

      var questionElement = document.getElementById(question);

      for (var i = 0; i < answers.length; i++) {

        var input = answers[i].children[0].children[0].children[1];
        span.classList.remove("selected");
        input.checked = false;
      }
      var span = answers[answer].children[0].children[0].children[0];
      var input = answers[answer].children[0].children[0].children[1];
      span.classList.add("selected");
      input.checked = true;
