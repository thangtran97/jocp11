   +---hr\n|               |   |   Hiring.java\n|               |   |   [POSITION-4]\n|               |   |\n|               |   \\---training\n|               |           JavaTraining.java\n|               |           [POSITION-5]\n|               |\n|               \\---projects\n|                       JavaProject.java\n|\n\\---cls[POSITION-1], [POSITION-2], [POSITION-3], [POSITION-4], [POSITION-5] are possible place holders for module-info.java file.Below are the file details:-C:\\src\\office\\com\\xyz\\hr\\Hiring.java:package com.xyz.hr;\n\npublic class Hiring {\n    //Lots of valid codes\n}C:\\src\\office\\com\\xyz\\hr\\training\\JavaTraining.java: package com.xyz.hr.training;\n\npublic class JavaTraining {\n    //Lots of valid codes\n}C:\\src\\office\\com\\xyz\\projects\\JavaProject.java:package com.xyz.projects;\n\npublic class JavaProject {\n    //Lots of valid codes\n}\n\nContents of module-info.java:\nmodule office {\n    exports com.xyz.hr.training;\n}And consider the command to be executed from C:\\javac -d cls --module-source-path src -m officeWhat should be the location of module-info.java file such that above javac command executes successfully?", "related_lectures": []}, {"_class": "assessment", "id": 102741067, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP62072</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---out\n|   \n\\---multi-module\n    +---consumer\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.java\n    |\n    \\---service\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n                        RandomNumber.java</pre><p><br></p><p>Below are the file details:-</p><p>C:\\multi-module\\service\\module-info.java: </p><pre class=\"prettyprint linenums\">module service {\n    exports com.udayankhattry.service;\n}</pre><p><br></p><p><br></p><p>C:\\multi-module\\service\\com\\udayankhattry\\service\\RandomNumber.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.service;\n\npublic interface RandomNumber {\n    int getNumber();\n}</pre><p><br></p><p><br></p><p>C:\\multi-module\\consumer\\module-info.java: </p><pre class=\"prettyprint linenums\">import com.udayankhattry.service.RandomNumber;\n\nmodule consumer {\n    requires service;\n    uses RandomNumber;\n}</pre><p><br></p><p>C:\\multi-module\\consumer\\com\\udayankhattry\\service\\test\\TestService.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.service.test;\n\nimport java.util.ServiceLoader;\nimport com.udayankhattry.service.RandomNumber;\n\npublic class TestService {\n    public static void main(String[] args) {\n        ServiceLoader&lt;RandomNumber&gt; sl = ServiceLoader.load(RandomNumber.class);\n        sl.findFirst().ifPresent(x -&gt; System.out.println(x.getNumber()));\n    }\n}</pre><p><br></p><p>And the below command executed from C:\\</p><p><code>javac -d out --module-source-path multi-module -m service,consumer</code></p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error in C:\\multi-module\\consumer\\module-info.java file", "Compilation error in C:\\multi-module\\consumer\\com\\udayankhattry\\service\\test\\TestService.java file", "Compilation error for missing module", "Given code compiles successfully"], "explanation": "<p><strong>UKOCP62072: </strong></p><p>It is an example of Produce and Consume services, though in this case, concrete producer is not available. </p><p><br></p><p>There is no issue with the 'C:\\multi-module\\consumer\\module-info.java' file. import statements are allowed in module descriptor file. Module 'consumer' reads the 'service' module and uses the service 'com.udayankhattry.service.RandomNumber'. </p><p>Please note that, there is no need to specify any service implementation. </p><p><br></p><p>ServiceLoader.load(RandomNumber.class) will load all the available service producers and would return an instance of ServiceLoader&lt;RandomNumber&gt;, which is of Iterable type. </p><p>`sl.findFirst()` returns an instance of Optional&lt;RandomNumber&gt; type.</p><p>`ifPresent(x -&gt; System.out.println(x.getNumber()))`: If RandomNumber implementer instance (producer) is available, then invokes the getNumber() method and prints the generated number. If no producers are available, then it does nothing.</p><p>There is no issue with 'C:\\multi-module\\consumer\\com\\udayankhattry\\service\\test\\TestService.java' file as well.</p><p><br></p><p>As, concrete producer is not used in the module 'consumer', hence compiler doesn't complain about any missing modules.</p><p><br></p><p>Given code compiles successfully and generates below files: </p><pre class=\"prettyprint linenums\">C:.\n+---out\n    +---consumer\n    |   |   module-info.class\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.class\n    |\n    \\---service\n        |   module-info.class\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n                        RandomNumber.class</pre>"}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP62072Given below the directory/file structure on Windows platform: C:\n+---out\n|   \n\\---multi-module\n    +---consumer\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---service\n    |               \\---test\n    |                       TestService.java\n    |\n    \\---service\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---service\n                        RandomNumber.javaBelow are the file details:-C:\\multi-module\\service\\module-info.java: module service {\n    exports com.udayankhattry.service;\n}C:\\multi-module\\service\\com\\udayankhattry\\service\\RandomNumber.java: package com.udayankhattry.service;\n\npublic interface RandomNumber {\n    int getNumber();\n}C:\\multi-module\\consumer\\module-info.java: import com.udayankhattry.service.RandomNumber;\n\nmodule consumer {\n    requires service;\n    uses RandomNumber;\n}C:\\multi-module\\consumer\\com\\udayankhattry\\service\\test\\TestService.java:package com.udayankhattry.service.test;\n\nimport java.util.ServiceLoader;\nimport com.udayankhattry.service.RandomNumber;\n\npublic class TestService {\n    public static void main(String[] args) {\n        ServiceLoader&lt;RandomNumber&gt; sl = ServiceLoader.load(RandomNumber.class);\n        sl.findFirst().ifPresent(x -&gt; System.out.println(x.getNumber()));\n    }\n}And the below command executed from C:\\javac -d out --module-source-path multi-module -m service,consumerWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741003, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP87476</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nabstract class Animal {\n    abstract void jump() throws RuntimeException;\n}\n\nclass Deer extends Animal {\n    void jump() { //Line n1\n        System.out.println(\"DEER JUMPS\");\n    }\n\n    void jump(int i) {\n        System.out.println(\"DEER JUMPS TO \" + i + \" FEET\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Animal animal = new Deer();\n        ((Deer)animal).jump(); //Line n2\n        ((Deer)animal).jump(5); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "An exception is thrown at runtime", "<p>Test class executes successfully and prints:</p><p>DEER JUMPS</p><p>DEER JUMPS TO 5 FEET</p>"], "explanation": "<p><strong>UKOCP87476: </strong></p><p>Method jump() in Animal class declares to throw RuntimeException. </p><p>Overriding method may or may not throw any RuntimeException. Only thing to remember is that if overridden method throws any unchecked exception or Error, then overriding method must not throw any checked exceptions. Line n1 compiles successfully as it correctly overrides the jump() method of Animal class. </p><p>Class Deer also provides overloaded jump(int) method.</p><p><br></p><p>Inside main(String []) method, reference variable 'animal' is of Animal class (supertype) and it refers to an instance of Deer class (subtype), this is polymorphism and allowed in Java.</p><p><br></p><p>As instance is of Deer class, hence 'animal' reference can easily be casted to Deer type. Line n2 and Line n3 compiles successfully and on execution prints below on to the console: </p><p>DEER JUMPS</p><p>DEER JUMPS TO 5 FEET</p>"}, "correct_response": ["e"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP87476Given code of Test.java file: package com.udayankhattry.ocp;\n\nabstract class Animal {\n    abstract void jump() throws RuntimeException;\n}\n\nclass Deer extends Animal {\n    void jump() { //Line n1\n        System.out.println(\"DEER JUMPS\");\n    }\n\n    void jump(int i) {\n        System.out.println(\"DEER JUMPS TO \" + i + \" FEET\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Animal animal = new Deer();\n        ((Deer)animal).jump(); //Line n2\n        ((Deer)animal).jump(5); //Line n3\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740983, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP27378: </strong></p><p>Body of do-while loop is executed first and then condition is checked for the next iteration.</p><p>Initially, flag = false;</p><p>1st iteration: Boolean expression of if-block `flag = !flag` = `flag = !false` = `flag = true`: it assigns true to variable 'flag' and evaluates to true as well. Line n2 is executed and 1 is printed on to the console. Line n3 takes the control to the boolean expression of Line n5.</p><p>2nd iteration: As flag is true, boolean expression at Line n5 evaluates to true and control enters the loop's body. Boolean expression of if-block `flag = !flag` = `flag = !true` = `flag = false`: it assigns false to variable 'flag' and evaluates to false as well. Line n2 and Line n3 are not executed. Line n4 is executed, which prints 2 on to the console. Control goes to the boolean expression of Line n5. As flag is false, boolean expression at Line n5 evaluates to false and control exits the loop.</p><p><br></p><p>Program terminates successfully after printing 12 on to the console.</p>", "question": "<p><strong>Question ID: UKOCP27378</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        boolean flag = false;\n        do {\n            if(flag = !flag) { //Line n1\n                System.out.print(1); //Line n2\n                continue; //Line n3\n            }\n            System.out.print(2); //Line n4\n        } while(flag); //Line n5\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["1", "2", "12", "21", "212", "121", "<p>112</p>", "<p>221</p>", "<p>Compilation error</p>"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP27378Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        boolean flag = false;\n        do {\n            if(flag = !flag) { //Line n1\n                System.out.print(1); //Line n2\n                continue; //Line n3\n            }\n            System.out.print(2); //Line n4\n        } while(flag); //Line n5\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740985, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP84376</strong></p><p><br></p><p>Given Code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Outer {\n    public static void sayHello() {}\n    static {\n        class Inner {\n            /*INSERT*/\n        }\n        new Inner();\n    }\n}\n\npublic class TestOuter {\n    public static void main(String[] args) {\n        Outer.sayHello();\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing TestOuter class, \"HELLO\" is printed in the output?</p><p>Choose 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<pre class=\"prettyprint linenums\">{\n    System.out.println(\"HELLO\");\n}</pre>", "<pre class=\"prettyprint linenums\">static {\n    System.out.println(\"HELLO\");\n}</pre>", "<pre class=\"prettyprint linenums\">Inner() {\n    System.out.println(\"HELLO\");\n}</pre>", "<pre class=\"prettyprint linenums\">Inner(String s) {\n    System.out.println(s);\n}</pre>"], "explanation": "<p><strong>UKOCP84376: </strong></p><p>static initializer block defined inside Outer class is invoked when static method sayHello is invoked. </p><p><br></p><p>Method-local inner class can be defined inside methods(static and non-static) and initializer blocks(static and non-static). </p><p>But like Regular inner class,&nbsp; method-local inner class cannot define anything static, except static final variables. </p><p><br></p><p>new Inner(); invokes the no-argument constructor of Inner class. So, System.out.println(\"HELLO\") can either be provided inside no-argument constructor or instance initializer block.</p>"}, "correct_response": ["a", "c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP84376Given Code: package com.udayankhattry.ocp;\n\nclass Outer {\n    public static void sayHello() {}\n    static {\n        class Inner {\n            /*INSERT*/\n        }\n        new Inner();\n    }\n}\n\npublic class TestOuter {\n    public static void main(String[] args) {\n        Outer.sayHello();\n    }\n}Which of the following options can replace /*INSERT*/ such that on executing TestOuter class, \"HELLO\" is printed in the output?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102740987, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP14074</strong></p><p><br></p><p>Will below code compile successfully?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface I1 {\n    void m1();\n\n    interface I2 { \n        void m2();\n    }\n\n    abstract class A1 { \n        public abstract void m3();\n    }\n\n    class A2 { \n        public void m4() {\n            System.out.println(4);\n        }\n    }\n}</pre>", "answers": ["Yes", "No"], "feedbacks": ["", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP14074: </strong></p><p>interface I2 is implicitly public and static (Nested interface). class A1 is implicitly public and static (Nested class). class A2 is implicitly public and static (Nested class). </p><p><br></p><p>You cannot explicitly specify protected and private for nested classes and nested interfaces inside an interface.</p>"}, "correct_response": ["a"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP14074Will below code compile successfully?package com.udayankhattry.ocp;\n\ninterface I1 {\n    void m1();\n\n    interface I2 { \n        void m2();\n    }\n\n    abstract class A1 { \n        public abstract void m3();\n    }\n\n    class A2 { \n        public void m4() {\n            System.out.println(4);\n        }\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 102740989, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP30176</strong></p><p><br></p><p>Consider the code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void m(int i) {\n        System.out.print(1);\n    }\n    \n    private static void m(int i1, int i2) {\n        System.out.print(2);\n    }\n    \n    private static void m(char... args) {\n        System.out.print(3);\n    }\n    \n    public static void main(String... args) {\n        m('A');\n        m('A', 'B');\n        m('A', 'B', 'C');\n        m('A', 'B', 'C', 'D');\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Above code causes compilation error", "It compiles successfully and on execution prints 3333 on to the console", "It compiles successfully and on execution prints 1233 on to the console", "It compiles successfully and on execution prints 1333 on to the console"], "explanation": "<p><strong>UKOCP30176: </strong></p><p>If choice is between implicit casting and variable arguments, then implicit casting takes precedence because variable arguments syntax was added in Java 5 version. </p><p>m('A'); is tagged to m(int) as 'A' is char literal and implicitly casted to int.</p><p>m('A', 'B'); is tagged to m(int, int) as 'A' and 'B' are char literals and implicitly casted to int.</p><p>m('A', 'B', 'C'); is tagged to m(char...) </p><p>m('A', 'B', 'C', 'D'); is tagged to m(char...)</p><p><br></p><p>There is no compilation error and on execution output is: 1233</p>"}, "correct_response": ["c"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP30176Consider the code of Test.java file:package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void m(int i) {\n        System.out.print(1);\n    }\n    \n    private static void m(int i1, int i2) {\n        System.out.print(2);\n    }\n    \n    private static void m(char... args) {\n        System.out.print(3);\n    }\n    \n    public static void main(String... args) {\n        m('A');\n        m('A', 'B');\n        m('A', 'B', 'C');\n        m('A', 'B', 'C', 'D');\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102740991, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP68798</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        short [] args = new short[]{50, 50};\n        args[0] = 5;\n        args[1] = 10;\n        System.out.println(\"[\" + args[0] + \", \" + args[1] + \"]\");\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP68798: </strong></p><p>main method's parameter variable name is \"args\" and it is LOCAL to main method. So, same name \"args\" can't be used directly within the curly brackets of main method. short [] args = new short[]{50, 50}; causes compilation error for using same name for local variable.</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "[50, 50]", "[5, 10]"]}, "correct_response": ["a"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP68798Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        short [] args = new short[]{50, 50};\n        args[0] = 5;\n        args[1] = 10;\n        System.out.println(\"[\" + args[0] + \", \" + args[1] + \"]\");\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102740993, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP30191</strong></p><p><br></p><p>Which one of these top level classes cannot be sub-classed?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p><code>class Dog {}</code> </p>", "<p><code>abstract class Cat {}</code> </p>", "<p><code>final class Electronics {}</code> </p>", "<p><code>private class Car {}</code> </p>"], "explanation": "<p><strong>UKOCP30191: </strong></p><p><code>class Dog {}</code>: can be sub-classed within the same package.</p><p><code>abstract class Cat {}</code>: can be sub-classed within the same package.</p><p><code>final class Electronics {}</code>: a class with final modifier cannot be sub-classed.</p><p><code>private class Car {}</code>: a top level class cannot be declared with private modifier.</p>"}, "correct_response": ["c"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP30191Which one of these top level classes cannot be sub-classed?", "related_lectures": []}, {"_class": "assessment", "id": 102740995, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP47854</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass M {\n    public void main(String[] args) { //Line n1\n        System.out.println(\"M\");\n    }\n}\n\nclass N extends M {\n    public static void main(String[] args) { //Line n2\n        new M().main(args); //Line n3\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        N.main(args); //Line n4\n    }\n}</pre><p><br></p><p>Which of the following statements is true for above code?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 causes compilation error", "It executes successfully and prints M on to the console"], "explanation": "<p><strong>UKOCP47854: </strong></p><p>The static method of subclass cannot hide the instance method of superclass. static main(String []) method at Line n2 tries to hide the instance main(String []) method at Line n1 and hence Line n2 causes compilation error. </p><p><br></p><p>There is no issue with Line n3 as it is a valid syntax to invoke the instance main(String []) method of M class. </p><p><br></p><p>No issue with Line n4 as well as it correctly invokes static main(String []) method of N class.</p>"}, "correct_response": ["b"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP47854Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass M {\n    public void main(String[] args) { //Line n1\n        System.out.println(\"M\");\n    }\n}\n\nclass N extends M {\n    public static void main(String[] args) { //Line n2\n        new M().main(args); //Line n3\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        N.main(args); //Line n4\n    }\n}Which of the following statements is true for above code?", "related_lectures": []}, {"_class": "assessment", "id": 102740997, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP29136</strong></p><p><br></p><p>Consider below code fragment:</p><pre class=\"prettyprint linenums\">interface Printable {\n    public void setMargin();\n    public void setOrientation();\n}\n\nabstract class Paper implements Printable { //Line 7\n    public void setMargin() {}\n    //Line 9\n}\n\nclass NewsPaper extends Paper { //Line 12\n    public void setMargin() {}\n    //Line 14\n}</pre><p><br></p><p>Above code currently causes compilation error. Which 2 modifications, done independently, enable the code to compile?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Replace the code at Line 7 with: class Paper implements Printable {", "Insert at Line 9: public abstract void setOrientation();", "Replace the code at Line 12 with: abstract class NewsPaper extends Paper {", "Insert at Line 14: public void setOrientation() {}"], "explanation": "<p><strong>UKOCP29136: </strong></p><p>First you should find out the reason for compilation error. Methods declared in Printable interface are implicitly abstract, no issues with Printable interface. </p><p><br></p><p>class Paper is declared abstract and it implements Printable interface, it overrides setMargin() method but setOrientation() method is still abstract. No issues with class Paper as it is an abstract class and can have 0 or more abstract methods.&nbsp; </p><p><br></p><p>class NewsPaper is concrete class and it extends Paper class (which is abstract). So class NewsPaper must override setOrientation() method OR it must be declared abstract.</p><p>Hence, there are 2 possible solution: </p><p>Insert at Line 14: public void setOrientation() {}</p><p>OR</p><p>Replace the code at Line 12 with: abstract class NewsPaper extends Paper {</p><p><br></p><p>Replacing Line 9 with 'public abstract void setOrientation();' is not necessary and it will not resolve the compilation error in NewsPaper class. </p><p><br></p><p>Replacing Line 7 with 'class Paper implements Printable {' will cause compilation failure of Paper class as it inherits abstract method 'setOrientation'.</p>"}, "correct_response": ["c", "d"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP29136Consider below code fragment:interface Printable {\n    public void setMargin();\n    public void setOrientation();\n}\n\nabstract class Paper implements Printable { //Line 7\n    public void setMargin() {}\n    //Line 9\n}\n\nclass NewsPaper extends Paper { //Line 12\n    public void setMargin() {}\n    //Line 14\n}Above code currently causes compilation error. Which 2 modifications, done independently, enable the code to compile?", "related_lectures": []}, {"_class": "assessment", "id": 102740999, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP74198</strong></p><p><br></p><p>Which of the following statement is correct about java enums?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["An enum can extend another class", "An enum can extend another enum", "An enum can implement interfaces", "All java enums implicitly extend from java.util.Enum class"], "explanation": "<p><strong>UKOCP74198: </strong></p><p>Java enums cannot extend from another class or enum but an enum can implement interfaces. </p><p><br></p><p>All java enums implicitly extend from java.lang.Enum class and not from java.util.Enum class.</p>"}, "correct_response": ["c"], "section": "3.8 Java OO: Enumerations", "question_plain": "Question ID: UKOCP74198Which of the following statement is correct about java enums?", "related_lectures": []}, {"_class": "assessment", "id": 102741001, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75492</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void div(int i, int j) {\n        try {\n            System.out.println(i / j);\n        } catch(ArithmeticException e) {\n            throw (RuntimeException)e;\n        }\n    }\n    \n    public static void main(String[] args) {\n        try {\n            div(5, 0);\n        } catch(ArithmeticException e) {\n            System.out.println(\"AE\");\n        } catch(RuntimeException e) {\n            System.out.println(\"RE\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "Program ends abruptly", "AE is printed on to the console and program terminates successfully", "RE is printed on to the console and program terminates successfully"], "explanation": "<p><strong>UKOCP75492: </strong></p><p>Any RuntimeException can be thrown without any need it to be declared in throws clause of surrounding method. </p><p><br></p><p>`throw (RuntimeException)e;` doesn't cause any compilation error. </p><p><br></p><p>Even though variable 'e' is type casted to RuntimeException but exception object is still of ArithmeticException, which is caught in main method and 'AE' is printed to the console. </p>"}, "correct_response": ["c"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP75492Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    private static void div(int i, int j) {\n        try {\n            System.out.println(i / j);\n        } catch(ArithmeticException e) {\n            throw (RuntimeException)e;\n        }\n    }\n    \n    public static void main(String[] args) {\n        try {\n            div(5, 0);\n        } catch(ArithmeticException e) {\n            System.out.println(\"AE\");\n        } catch(RuntimeException e) {\n            System.out.println(\"RE\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741025, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP86977</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiPredicate&lt;String, String&gt; predicate = String::equalsIgnoreCase;\n        System.out.println(predicate.test(\"JaVa\", \"Java\"));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "Runtime error", "true", "false"], "explanation": "<p><strong>UKOCP86977: </strong></p><p>BiPredicate&lt;T, U&gt; : boolean test(T t, U u);&nbsp; </p><p>BiPredicate interface accepts 2 type parameters and these parameters (T,U) are passed to test method, which returns primitive boolean.</p><p><br></p><p>In this case, `BiPredicate&lt;String, String&gt; predicate` means test method will have declaration: `boolean test(String s1, String d2)`. </p><p>`String::equalsIgnoreCase` is equivalent to `(s1, s2) -&gt; s1.equalsIgnoreCase(s2)`</p><p><br></p><p>This is an example of \"Reference to an Instance Method of an Arbitrary Object of a Particular Type\" and not \"method reference to static method\". </p><p>\"JaVa\".equalsIgnoreCase(\"Java\") =&gt; returns true.</p>"}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP86977Given code:package com.udayankhattry.ocp;\n\nimport java.util.function.BiPredicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiPredicate&lt;String, String&gt; predicate = String::equalsIgnoreCase;\n        System.out.println(predicate.test(\"JaVa\", \"Java\"));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741005, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP61623</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() throws IOException{\n        throw new IOException(\"IOException\");\n    }\n\n    public void execute() throws SQLException {\n        throw new SQLException(\"SQLException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(MyResource resource = new MyResource()) {\n            resource.execute();\n        } catch(Exception e) {\n            System.out.println(e.getSuppressed()[0].getMessage());\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["IOException", "SQLException", "Compilation error"], "feedbacks": ["", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP61623: </strong></p><p>execute() method throws an instance of SQLException. </p><p><br></p><p>Just before finding the matching handler, Java runtime executes close() method. This method throws an instance of IOException but it gets suppressed and an instance of SQLException is thrown. </p><p><br></p><p>e.getSuppressed() returns Throwable [] whose 1st element is the instance of suppressed exception, IOException.</p><p><br></p><p>'e.getSuppressed()[0].getMessage()' prints IOException on to the console. </p>"}, "correct_response": ["a"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP61623Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.sql.SQLException;\n\nclass MyResource implements AutoCloseable {\n    @Override\n    public void close() throws IOException{\n        throw new IOException(\"IOException\");\n    }\n\n    public void execute() throws SQLException {\n        throw new SQLException(\"SQLException\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(MyResource resource = new MyResource()) {\n            resource.execute();\n        } catch(Exception e) {\n            System.out.println(e.getSuppressed()[0].getMessage());\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741007, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP46496</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Boolean [] arr = new Boolean[2];\n        System.out.println(arr[0] + \":\" + arr[1]);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["An Exception is thrown at runtime", "true:true", "false:false", "null:null"], "explanation": "<p><strong>UKOCP46496: </strong></p><p>Array elements are initialized to their default values. </p><p>'arr' is referring to an array of Boolean type, which is reference type and hence both the array elements are initialized to null and therefore in the output null:null is printed.</p>"}, "correct_response": ["d"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP46496Consider below code of Test.java file:package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Boolean [] arr = new Boolean[2];\n        System.out.println(arr[0] + \":\" + arr[1]);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741009, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP69119</strong></p><p><br></p><p>Given code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Printer&lt;String&gt; {\n    private String t;\n    Printer(String t){\n        this.t = t;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;Integer&gt; obj = new Printer&lt;&gt;(100);\n        System.out.println(obj);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["100", "Some text containing @ symbol", "Compilation error in Printer class", "Compilation error in Test class"], "explanation": "<p><strong>UKOCP69119: </strong></p><p>Type parameter should not be a Java keyword &amp; a valid Java identifier. Naming convention for Type parameter is to use uppercase single character.&nbsp; </p><p><br></p><p>In class Printer&lt;String&gt;, 'String' is a valid Java identifier and hence a valid type parameter even though it doesn't follow the naming convention of uppercase single character.&nbsp; </p><p><br></p><p>Printer&lt;Integer&gt; obj = new Printer&lt;&gt;(100); =&gt; Type argument is Integer and it correctly creates an instance of Printer class passing Integer object 100.&nbsp; </p><p><br></p><p>Printer class doesn't override toString() method and hence 'System.out.println(obj);' prints some text containing @ symbol.</p>"}, "correct_response": ["b"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP69119Given code of Test.java file:package com.udayankhattry.ocp;\n\nclass Printer&lt;String&gt; {\n    private String t;\n    Printer(String t){\n        this.t = t;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Printer&lt;Integer&gt; obj = new Printer&lt;&gt;(100);\n        System.out.println(obj);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741011, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP36682</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">import java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    List list1 = new ArrayList&lt;String&gt;(); //Line n5\n    List&lt;String&gt; list2 = new ArrayList(); //Line n6\n    List&lt;&gt; list3 = new ArrayList&lt;String&gt;(); //Line n7\n    List&lt;String&gt; list4 = new ArrayList&lt;String&gt;(); //Line n8\n    List&lt;String&gt; list5 = new ArrayList&lt;&gt;(); //Line n9\n}</pre><p><br></p><p>Which of the following statements compile without any warning?</p><p>Choose 2 options.</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["Line n5", "Line n6", "Line n7", "Line n8", "Line n9"], "explanation": "<p><strong>UKOCP36682: </strong></p><p>Line n8's syntax was added in JDK 5 and it compiles without any warnings.&nbsp; </p><p><br></p><p>Line n9's syntax was added in JDK 7, in which type parameter can be ignored from right side of the statement, it is inferred from left side, so Line n9 also compiles without any warning.&nbsp; </p><p><br></p><p>Type parameter can't be removed from declaration part, hence Line n7 causes compilation error.&nbsp; </p><p><br></p><p>Both Line n5 and Line n6 are mixing Generic type with Raw type and hence warning is given by the compiler.</p>"}, "correct_response": ["d", "e"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP36682Consider below code snippet:import java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    List list1 = new ArrayList&lt;String&gt;(); //Line n5\n    List&lt;String&gt; list2 = new ArrayList(); //Line n6\n    List&lt;&gt; list3 = new ArrayList&lt;String&gt;(); //Line n7\n    List&lt;String&gt; list4 = new ArrayList&lt;String&gt;(); //Line n8\n    List&lt;String&gt; list5 = new ArrayList&lt;&gt;(); //Line n9\n}Which of the following statements compile without any warning?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 102741013, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP13516</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(4);\n        list.add(0, \"MOVE\");\n        list.add(2, \"ON\");\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", "", ""], "answers": ["[MOVE, ON]", "[MOVE, null, ON, null]", "[null, null, null, null]", "[]", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP13516: </strong></p><p>ArrayList are different than arrays, though behind the scene ArrayList uses Object[] to store its elements.&nbsp; </p><p><br></p><p>There are 2 things related to ArrayList, one is capacity and another is actual elements stored in the list, returned by size() method. If you don't pass anything to the ArrayList constructor, then default capacity is 10 but this doesn't mean that an ArrayList instance will be created containing 10 elements and all will be initialized to null.&nbsp; </p><p><br></p><p>In fact, size() method will still return 0 for this list. This list still doesn't contain even a single element. You need to use add method or its overloaded counterpart to add items to the list. Even if you want to add null values, you should still invoke some methods, nothing happens automatically. </p><p><br></p><p>In this question, new ArrayList&lt;&gt;(4); creates an ArrayList instance which can initially store 4 elements but currently it doesn't store any data.&nbsp; </p><p><br></p><p>Another point you should remember for the certification exam: Addition of elements in ArrayList should be continuous. If you are using add(index, Element) method to add items to the list, then index should be continuous, you simply can't skip any index. </p><p><br></p><p>In this case, list.add(0, \"MOVE\"); adds \"MOVE\" to 0th index. so after this operation list --&gt; [MOVE].&nbsp; You can now add at 0th index (existing elements will be shifted right) or you can add at index 1 but not at index 2. list.add(2, \"ON\"); throws an instance of java.lang.IndexOutOfBoundsException. </p>"}, "correct_response": ["f"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP13516Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;(4);\n        list.add(0, \"MOVE\");\n        list.add(2, \"ON\");\n        \n        System.out.println(list);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 102741015, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42067</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = Arrays.asList(0,2,4,6,8);\n        list.replaceAll(i -&gt; i + 1);\n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["[0, 2, 4, 6, 8]", "[1, 3, 5, 7, 9]", "Runtime Exception", "Compilation error"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP42067: </strong></p><p>replaceAll(UnaryOperator&lt;E&gt; operator) is a default method available in List interface, it replaces each element of this list with the result of applying the operator to that element. </p><p><br></p><p>list.replaceAll(i -&gt; i 5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP71854Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"M\", \"R\", \"A\", \"P\");\n        Collections.sort(list, null);\n        System.out.println(list);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741021, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP84353</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Counter {\n    int count = 0;\n}\ninterface SetCounter {\n    void set(Counter ctr);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Counter ctr = new Counter(); //Line n1\n        SetCounter obj = x -&gt; x.count = 20; //Line n2\n        ctr.count = 100; //Line n3\n        obj.set(ctr); //Line n4\n        System.out.println(ctr.count); //Line n5\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["Compilation error", "Exception is thrown at runtime", "20", "100"], "explanation": "<p><strong>UKOCP84353: </strong></p><p>There is no compilation error in the given code. </p><p>At Line n1, an instance of Counter is created and is referred by variable 'ctr'. ctr.count = 0.</p><p><br></p><p>Line n2 just defines the lambda expression, no changes are made to variable 'count' at Line n2.</p><p><br></p><p>At Line n3, ctr.count = 100;</p><p><br></p><p>At Line n4, code of Lambda expression of Line n2 is executed and it changes ctr.count to 20. ctr.count = 20.</p><p><br></p><p>Line n5 prints 20 on to the console. </p>"}, "correct_response": ["c"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP84353Given code: package com.udayankhattry.ocp;\n\nclass Counter {\n    int count = 0;\n}\ninterface SetCounter {\n    void set(Counter ctr);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Counter ctr = new Counter(); //Line n1\n        SetCounter obj = x -&gt; x.count = 20; //Line n2\n        ctr.count = 100; //Line n3\n        obj.set(ctr); //Line n4\n        System.out.println(ctr.count); //Line n5\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 102741023, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42933</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Creator&lt;T, R&gt; {\n    R create(T t);\n}\n\nclass Log {\n    \n    Log() {\n        System.out.println(1);\n    }\n    \n    Log(String name) {\n        System.out.println(2);\n    }\n    \n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;String, Log&gt; obj = Log::new;\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["1", "2", "It executes fine but no output", "Compilation error"], "feedbacks": ["", "", "", ""], "relatedLectureIds": "", "explanation": "<p><strong>UKOCP42933: </strong></p><p>Log::new is same as s -&gt; new Log(s); as create method accepts first type parameter T, which is String and returns 2nd type parameter R, which is Log. So, lambda expression s -&gt; new Log(s); calls the parameterized constructor of Log class and returns the Log instance. But to create an instance of Log class, you need to invoke the create method: obj.create(\"some string\"); </p>"}, "correct_response": ["c"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP42933Given code:package com.udayankhattry.ocp;\n\ninterface Creator&lt;T, R&gt; {\n    R create(T t);\n}\n\nclass Log {\n    \n    Log() {\n        System.out.println(1);\n    }\n    \n    Log(String name) {\n     // ---- RESTORE SAVED STATE ----
    (function restoreSavedState() {
      const state = loadState();
      if (!state || !state.answers) return;
      Object.entries(state.answers).forEach(([qId, selectedVals]) => {
        const qElem = document.getElementById(qId);
        if (!qElem) return;
        const isCorrect = state.submitted && state.submitted[qId];
        // Restore selections
        selectedVals.forEach(val => {
          const inp = qElem.querySelector('input[value="' + val + '"]');
          if (!inp) return;
          inp.checked = true;
          if (inp.type === 'radio') {
            const span = inp.parentElement.children[0];
            if (span && span.tagName === 'SPAN') span.classList.add('selected');
          }
          // Color border based on correctness
          const borderColor = isCorrect ? 'limegreen' : 'red';
          const answerLi = inp.closest('li.answer');
          if (answerLi) answerLi.children[0].style.borderColor = borderColor;
        });
        // Show explanation if correct
        if (isCorrect) {
          const qObj = questions.find(q => q.id == qId);
          if (qObj && !qElem.querySelector('.explanation-restored')) {
            const exDiv = document.createElement('div');
            exDiv.className = 'explanation-restored';
            exDiv.innerHTML = qObj.explanation;
            qElem.appendChild(exDiv);
          }
        }
      });
    })();
