Which of the statements can replace Line n1 such that there is no change in the output?</p>", "feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP41638: </strong></p><p>compose &amp; andThen are default methods defined in Function interface. Starting with JDK 8, interfaces can define default and static methods. </p><p><br></p><p>g.compose(f); means first apply f and then g. Same result is achieved by f.andThen(g); =&gt; first apply f and then g. </p><p>f.apply(10) = 10 + 10 = 20 and g.apply(20) = 20 * 20 = 400.</p>", "answers": ["<p><code>Function&lt;Integer, Integer&gt; fog = f.compose(g);</code> </p>", "<p><code>Function&lt;Integer, Integer&gt; fog = f.andThen(g);</code> </p>", "<p><code>Function&lt;Integer, Integer&gt; fog = g.andThen(f);</code> </p>"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP41638Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.Function;\n\npublic class Test {\n    public static void main(String[] args) {\n        Function&lt;Integer, Integer&gt; f = x -&gt; x + 10; \n        Function&lt;Integer, Integer&gt; g = y -&gt; y * y; \n        \n        Function&lt;Integer, Integer&gt; fog = g.compose(f); //Line n1\n        System.out.println(fog.apply(10));\n    }\n}On execution, Test class prints 400 on to the console. Which of the statements can replace Line n1 such that there is no change in the output?", "related_lectures": []}, {"_class": "assessment", "id": 55880900, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP49113</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;String, String, String&gt; func = (s1, s2) -&gt; \n                                                     s2.concat(s1).trim();\n        System.out.println(func.apply(\" CD\", \" AB\"));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP49113: </strong></p><p>BiFunction&lt;String, String, String&gt; interface's apply method signature will be: String apply(String str1, String str2).&nbsp; </p><p><br></p><p>NOTE: Lambda expression's body is: 's2.concat(s1)' and not 's1.concat(s2)'. trim() method trims leading and trailing white spaces and not the white spaces in between. </p><p><br></p><p>func.apply(\" CD\", \" AB\") = \" AB\".concat(\" CD\").trim(); = \" AB CD\".trim(); = \"AB CD\"</p>", "answers": ["AB CD", "ABCD", "CD AB", "CDAB"]}, "correct_response": ["a"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP49113Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.BiFunction;\n\npublic class Test {\n    public static void main(String[] args) {\n        BiFunction&lt;String, String, String&gt; func = (s1, s2) -&gt; \n                                                     s2.concat(s1).trim();\n        System.out.println(func.apply(\" CD\", \" AB\"));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880902, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP63849</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var festivals = List.of(\"DIWALI\", \"CHRISTMAS\", \"EID\");\n        festivals.removeIf(str -&gt; str.length() == 3);\n        System.out.println(festivals);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP63849: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>Given statement: </p><p>var festivals = List.of(\"DIWALI\", \"CHRISTMAS\", \"EID\"); =&gt; festivals refers to a List of String type. </p><p><br></p><p>Static List.of() overloaded methods were added in Java 9 and these return an unmodifiable list containing passed elements. So, above list object referred by festivals is unmodifiable. </p><p><br></p><p>removeIf(Predicate&lt;? super E&gt; filter) method was added as a default method in Collection&lt;E&gt; interface in JDK 8 and it removes all the elements of this collection that satisfy the given predicate. </p><p>Interface java.util.function.Predicate&lt;T&gt; declares below non-overriding abstract method:</p><p>boolean test(T t);</p><p><br></p><p>Lambda expression passed to removeIf(Predicate) method is: `str -&gt; str.length() == 3` and is a valid lambda expression for Predicate&lt;String&gt; interface.</p><p><br></p><p>There is no compilation error in the code but calling removeIf(Predicate) method on unmodifiable list 'festivals' throws an exception(java.lang.UnsupportedOperationException) at runtime.</p>", "answers": ["[DIWALI, CHRISTMAS, EID]", "[DIWALI, CHRISTMAS]", "[]", "Compilation error", "An exception is thrown at runtime"], "relatedLectureIds": ""}, "correct_response": ["e"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP63849Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var festivals = List.of(\"DIWALI\", \"CHRISTMAS\", \"EID\");\n        festivals.removeIf(str -&gt; str.length() == 3);\n        System.out.println(festivals);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880904, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP12275</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.HashMap;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        Map&lt;Integer, String&gt; map = new HashMap&lt;&gt;();\n        map.put(1, \"ONE\");\n        map.put(2, \"TWO\");\n        map.put(3, \"THREE\");\n\n        System.out.println(map.stream().count());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["3", "6", "Runtime Exception", "Compilation error"], "explanation": "<p><strong>UKOCP12275: </strong></p><p>There is no stream() method available in Map interface and hence map.stream() causes compilation error. </p><p><br></p><p>Though you can first get either entrySet or keySet or values and then invoke stream() method. </p><p><br></p><p>For example, below code prints all the key value pairs available in the map: </p><pre class=\"prettyprint linenums\">map.entrySet()\n\t.stream()\n\t.forEach(x -&gt; System.out.println(x.getKey() + \":\" + x.getValue()));</pre><p><br></p><p>Below code prints all the keys of the map:</p><pre class=\"prettyprint linenums\">map.keySet()\n\t.stream()\n\t.forEach(System.out::println);</pre><p><br></p><p>Below code prints all the values of the map:</p><pre class=\"prettyprint linenums\">map.values()\n\t.stream()\n\t.forEach(System.out::println);</pre>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP12275Given code: package com.udayankhattry.ocp;\n\nimport java.util.HashMap;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        Map&lt;Integer, String&gt; map = new HashMap&lt;&gt;();\n        map.put(1, \"ONE\");\n        map.put(2, \"TWO\");\n        map.put(3, \"THREE\");\n\n        System.out.println(map.stream().count());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880906, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP13134</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Stream.of(10).findFirst();\n        System.out.println(optional);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["10", "Optional[10]", "Text containing @ symbol"], "explanation": "<p><strong>UKOCP13134: </strong></p><p>Optional&lt;T&gt; is a final class and overrides toString() method: </p><p><br></p><pre class=\"prettyprint linenums\">public String toString() {\n    return value != null\n        ? String.format(\"Optional[%s]\", value)\n        : \"Optional.empty\";\n}</pre><p><br></p><p>In the question, Optional is of Integer type and Integer class overrides toString() method, so output is: Optional[10]</p>", "feedbacks": ["", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP13134Given code: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Stream.of(10).findFirst();\n        System.out.println(optional);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880908, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP60333</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Random;\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = new Random().ints(1, 7).limit(2);\n        System.out.println(stream.max().getAsInt());\n    }\n}</pre><p><br></p><p>Above code compiles and executes successfully and generates random integers.</p><p><br></p><p>Which of the following is not the possible output of above code?</p>", "answers": ["4", "5", "6", "7"], "explanation": "<p><strong>UKOCP60333: </strong></p><p>new Random().ints(start, end) =&gt; start is inclusive and end is exclusive. So this code generates random integers between 1 and 6. All the 6 integers from 1 to 6 are possible. </p><p><br></p><p>Above code will never generate 7. </p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP60333Given code: package com.udayankhattry.ocp;\n\nimport java.util.Random;\nimport java.util.stream.IntStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        IntStream stream = new Random().ints(1, 7).limit(2);\n        System.out.println(stream.max().getAsInt());\n    }\n}Above code compiles and executes successfully and generates random integers.Which of the following is not the possible output of above code?", "related_lectures": []}, {"_class": "assessment", "id": 55880910, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP50049</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.LongStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        LongStream stream = LongStream.empty();\n        System.out.println(stream.average());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["null", "0.0", "OptionalDouble.empty", "Runtime exception"], "explanation": "<p><strong>UKOCP50049: </strong></p><p>average() method in IntStream, LongStream and DoubleStream returns OptionalDouble. </p><p>As stream is an empty stream, hence 'stream.average()' returns an empty optional. </p><p>OptionalDouble.empty is printed on to the console for empty Optional. </p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP50049Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.LongStream;\n\npublic class Test {\n    public static void main(String[] args) {\n        LongStream stream = LongStream.empty();\n        System.out.println(stream.average());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880912, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP86488</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\nenum Color {\n    RED, YELLOW, GREEN\n}\n\nclass TrafficLight {\n    String msg;\n    Color color;\n\n    TrafficLight(String msg, Color color) {\n        this.msg = msg;\n        this.color = color;\n    }\n\n    public String getMsg() {\n        return msg;\n    }\n\n    public Color getColor() {\n        return color;\n    }\n\n    public String toString() {\n        return \"{\" + color + \", \" + msg + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        TrafficLight tl1 = new TrafficLight(\"Go\", Color.GREEN);\n        TrafficLight tl2 = new TrafficLight(\"Go Now!\", Color.GREEN);\n        TrafficLight tl3 = new TrafficLight(\"Ready to stop\", Color.YELLOW);\n        TrafficLight tl4 = new TrafficLight(\"Slow Down\", Color.YELLOW);\n        TrafficLight tl5 = new TrafficLight(\"Stop\", Color.RED);\n\n        List&lt;TrafficLight&gt; list = Arrays.asList(tl1, tl2, tl3, tl4, tl5);\n\n        Map&lt;Color, List&lt;String&gt;&gt; map = list.stream()\n            .collect(Collectors.groupingBy(TrafficLight::getColor,\n                Collectors.mapping(TrafficLight::getMsg, Collectors.toList())));\n\n        System.out.println(map.get(Color.YELLOW));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP86488: </strong></p><p>Though it looks like very complex code, but it is simple. </p><p>TrafficLight class stores the enum Color and text message to be displayed with the color. </p><p>tl1 --&gt; {GREEN, \"Go\"}.&nbsp; </p><p>tl2 --&gt; {GREEN, \"Go Now!\"}.&nbsp; </p><p>tl3 --&gt; {YELLOW, \"Ready to stop\"}.&nbsp; </p><p>tl4 --&gt; {YELLOW, \"Slow Down\"}.&nbsp; </p><p>tl5 --&gt; {RED, \"Stop\"}.&nbsp; </p><p><br></p><p>list.stream() --&gt; [{GREEN, \"Go\"}, {GREEN, \"Go Now!\"}, {YELLOW, \"Ready to stop\"}, {YELLOW, \"Slow Down\"}, {RED, \"Stop\"}].&nbsp; </p><p><br></p><p>Collectors.groupingBy(TrafficLight::getColor, Collectors.mapping(TrafficLight::getMsg, Collectors.toList())); =&gt; Group above stream on the basis of Color (key is enum constant Color: RED, GREEN, YELLOW). </p><p><br></p><p>So, intermediate object returned by `Collectors.groupingBy(TrafficLight::getColor)` is of Map&lt;Color, List&lt;TrafficLight&gt;&gt; type. But the 2nd argument, `Collectors.mapping(TrafficLight::getMsg, Collectors.toList())` passed to groupingBy(...) method converts List&lt;TrafficLight&gt; to List&lt;String&gt; and returns Map&lt;Color, List&lt;String&gt;&gt;</p><p><br></p><p>map --&gt; {GREEN=[Go, Go Now!], YELLOW=[Ready to stop, Slow Down], RED=[Stop]}.&nbsp; </p><p><br></p><p>System.out.println(map.get(Color.YELLOW)); prints [Ready to stop, Slow Down] on to the console. </p>", "answers": ["[Ready to stop, Slow Down]", "[Ready to stop]", "[Slow Down]", "Some text containing @ symbol"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP86488Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\nenum Color {\n    RED, YELLOW, GREEN\n}\n\nclass TrafficLight {\n    String msg;\n    Color color;\n\n    TrafficLight(String msg, Color color) {\n        this.msg = msg;\n        this.color = color;\n    }\n\n    public String getMsg() {\n        return msg;\n    }\n\n    public Color getColor() {\n        return color;\n    }\n\n    public String toString() {\n        return \"{\" + color + \", \" + msg + \"}\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        TrafficLight tl1 = new TrafficLight(\"Go\", Color.GREEN);\n        TrafficLight tl2 = new TrafficLight(\"Go Now!\", Color.GREEN);\n        TrafficLight tl3 = new TrafficLight(\"Ready to stop\", Color.YELLOW);\n        TrafficLight tl4 = new TrafficLight(\"Slow Down\", Color.YELLOW);\n        TrafficLight tl5 = new TrafficLight(\"Stop\", Color.RED);\n\n        List&lt;TrafficLight&gt; list = Arrays.asList(tl1, tl2, tl3, tl4, tl5);\n\n        Map&lt;Color, List&lt;String&gt;&gt; map = list.stream()\n            .collect(Collectors.groupingBy(TrafficLight::getColor,\n                Collectors.mapping(TrafficLight::getMsg, Collectors.toList())));\n\n        System.out.println(map.get(Color.YELLOW));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880914, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP62026</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Caller implements Callable&lt;Void&gt; {\n    String str;\n\n    public Caller(String s) {\n        this.str = s;\n    }\n\n    public Void call() throws Exception {\n        System.out.println(str.toUpperCase());\n        return null;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var future = es.submit(new Caller(\"Call\"));\n        System.out.println(future.get());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>The program doesn't terminate but prints following:</p><p>CALL</p><p>CALL</p>", "<p>The program doesn't terminate but prints following:</p><p>null</p><p>null</p>", "<p>The program doesn't terminate but prints following:</p><p>CALL</p><p>null</p>", "<p>The program terminates after printing: </p><p>CALL</p><p>null</p>"], "explanation": "<p><strong>UKOCP62026: </strong></p><p>Variable 'es' infers to ExecutorService and variable 'future' infers to Future&lt;Void&gt; type.</p><p>`Executors.newSingleThreadExecutor();` creates an Executor that uses a single worker thread. </p><p>Callable is of Void type and call() method returns null. </p><p><br></p><p>`es.submit(new Caller(\"Call\"));` creates a Caller object and invokes the call method. This method prints 'CALL' on to the console and returns null. </p><p><br></p><p>`System.out.println(future.get());` prints 'null' on to the console. </p><p><br></p><p>As `es.shutdown();` is not invoked, hence program doesn't terminate.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP62026Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Caller implements Callable&lt;Void&gt; {\n    String str;\n\n    public Caller(String s) {\n        this.str = s;\n    }\n\n    public Void call() throws Exception {\n        System.out.println(str.toUpperCase());\n        return null;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws InterruptedException, ExecutionException {\n        var es = Executors.newSingleThreadExecutor();\n        var future = es.submit(new Caller(\"Call\"));\n        System.out.println(future.get());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880916, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP69900</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Adder extends RecursiveAction {\n    private int from;\n    private int to;\n    int total = 0;\n\n    Adder(int from, int to) {\n        this.from = from;\n        this.to = to;\n    }\n\n    @Override\n    protected void compute() {\n        if ((to - from) &lt;= 4) {\n            int sum = 0;\n            for(int i = from; i &lt;= to; i++) {\n                sum += i;\n            }\n            total+=sum;\n        } else {\n            int mid = (from + to) / 2;\n            Adder first = new Adder(from, mid);\n            Adder second = new Adder(mid + 1, to);\n            invokeAll(first, second);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Adder adder = new Adder(1, 5); //Line 34\n        ForkJoinPool pool = new ForkJoinPool(4);\n        pool.invoke(adder);\n        System.out.println(adder.total);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP69900: </strong></p><p>RecursiveAction class has an abstract method `void compute()` and Adder class correctly overrides it.&nbsp; </p><p><br></p><p>`new Adder(1, 5);` instantiates an Adder object with from = 1, to = 5 and total = 0.&nbsp; </p><p><br></p><p>5 - 1 = 4, which is less than or equal to 4 hence else block will not get executed. compute() method will simply add the numbers from 1 to 5 and will update the total field of Adder object created at Line 34. </p><p><br></p><p>So when `System.out.println(adder.total);` is executed, it prints 15 on to the console.</p><p><br></p><p>If Line 34 is replaced with `Adder adder = new Adder(1, 6);`, then else block of compute() method will create more Adder objects and total filed of those Adder objects will be updated and not the Adder object created at Line 34. So, in this case output will be 0. </p><p><br></p><p>Best solution would be to add below code as the last statement in the else block so that total field of Adder object created at Line 34 is updated successfully: </p><p>`total = first.total + second.total;`</p><p><br></p><p>It will give the expected result in all the cases. </p>", "answers": ["It will print 0 on to the console", "It will print 15 on to the console", "It can print any number between 0 and 15", "None of the other options"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "8.2 Concurrency: RecursiveTask, RecursiveAction", "question_plain": "Question ID: UKOCP69900Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Adder extends RecursiveAction {\n    private int from;\n    private int to;\n    int total = 0;\n\n    Adder(int from, int to) {\n        this.from = from;\n        this.to = to;\n    }\n\n    @Override\n    protected void compute() {\n        if ((to - from) &lt;= 4) {\n            int sum = 0;\n            for(int i = from; i &lt;= to; i++) {\n                sum += i;\n            }\n            total+=sum;\n        } else {\n            int mid = (from + to) / 2;\n            Adder first = new Adder(from, mid);\n            Adder second = new Adder(mid + 1, to);\n            invokeAll(first, second);\n        }\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Adder adder = new Adder(1, 5); //Line 34\n        ForkJoinPool pool = new ForkJoinPool(4);\n        pool.invoke(adder);\n        System.out.println(adder.total);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880918, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP38373</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.format(\"A%nB%nC\");\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Runtime Exception", "ABC", "<p>A</p><p>B</p><p>C</p>", "A"], "explanation": "<p><strong>UKOCP38373: </strong></p><p>Format specifier, 'n' is for newline. </p><p>NOTE: System.out.printf(...) is same as&nbsp; System.out.format(...).</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP38373Given code: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.format(\"A%nB%nC\");\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880920, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP20609</strong></p><p><br></p><p>Given methods: </p><p>1. <code>Object readObject(ObjectInputStream ois)</code></p><p>2. <code>void writeObject(ObjectOutputStream oos)</code></p><p>3. <code>Object writeReplace()</code></p><p>4. <code>Object writeResolve()</code></p><p>5. <code>Object readReplace()</code></p><p>6. <code>Object readResolve()</code></p><p><br></p><p>How many of these methods are used to serialize/de-serialize objects?</p>", "feedbacks": ["", "", ""], "explanation": "<p><strong>UKOCP20609: </strong></p><p>Only 4 methods are used to serialize/de-serialize objects: Object readObject(ObjectInputStream ois), void writeObject(ObjectOutputStream oos), Object writeReplace() &amp; Object readResolve(). </p><p><br></p><p>Methods writeResolve() and readReplace() are not used.</p>", "answers": ["Only 2 methods", "Only 4 methods", "All 6 methods"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP20609Given methods: 1. Object readObject(ObjectInputStream ois)2. void writeObject(ObjectOutputStream oos)3. Object writeReplace()4. Object writeResolve()5. Object readReplace()6. Object readResolve()How many of these methods are used to serialize/de-serialize objects?", "related_lectures": []}, {"_class": "assessment", "id": 55880896, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42935</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create();\n}\n\nabstract class Gift {\n    public Gift() {\n        super();\n    }\n    \n    public String toString() {\n        return \"Gift\";\n    }\n}\n\nclass Book extends Gift {\n    public Book() {\n        super();\n    }\n    \n    public String toString() {\n        return \"Book\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;Gift&gt; obj = Gift::new;\n        System.out.println(obj.create());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP42935: </strong></p><p>This is an example of method reference to Constructor. </p><p>Lambda expression corresponding to `Creator&lt;Gift&gt; obj = Gift::new;` is: `Creator&lt;Gift&gt; obj = () -&gt; new Gift();`</p><p>Gift is an abstract class and cannot be instantiated. `Gift::new` causes compilation error.</p>", "answers": ["Compilation error", "Runtime error", "Gift", "Book"], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP42935Given code: package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create();\n}\n\nabstract class Gift {\n    public Gift() {\n        super();\n    }\n    \n    public String toString() {\n        return \"Gift\";\n    }\n}\n\nclass Book extends Gift {\n    public Book() {\n        super();\n    }\n    \n    public String toString() {\n        return \"Book\";\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;Gift&gt; obj = Gift::new;\n        System.out.println(obj.create());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880924, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP15283</strong></p><p><br></p><p>C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:</p><pre class=\"prettyprint linenums\">C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt</pre><p>'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'. </p><p><br></p><p>Message.txt contains following text:</p><p>Welcome!</p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var path = Paths.get(\"C:\", \"TEMP\", \"msg\");\n\n        try (var reader = Files.newBufferedReader(path)) {\n            String str = null;\n            while ((str = reader.readLine()) != null) {\n                System.out.println(str);\n            }\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "Program executes successfully and produces no output", "Program executes successfully and prints &#39;Welcome!&#39; on to the console"], "explanation": "<p><strong>UKOCP15283: </strong></p><p>First of all I would like to tell you that Windows shortcut and symbolic links are different.&nbsp; </p><p>Shortcut is just a regular file and symbolic link is a File System object.&nbsp; </p><p><br></p><p>To create symbolic link used in this question, I used below command: </p><p>C:\\TEMP&gt;mklink msg .\\Parent\\Child\\Message.txt&nbsp; </p><p><br></p><p>And below message was displayed on to the console for the successful creation of symbolic link 'symbolic link created for msg &lt;&lt;===&gt;&gt; .\\Parent\\Child\\Message.txt'.&nbsp; </p><p> </p><p>Files class has methods such as newInputStream(...), newOutputStream(...), newBufferedReader(...) and newBufferedWriter(...) for files reading and writing. </p><p>Variable 'path' infers to Path type and variable 'reader' infers to BufferedReader type.</p><p>Given code doesn't cause any compilation error. </p><p><br></p><p>path refers to 'C\\TEMP\\msg', which is a symbolic link and hence Files.newBufferedReader(path) works with 'C:\\TEMP\\Parent\\Child\\Message.txt'. </p><p><br></p><p>Given code successfully reads the file and prints 'Welcome!' on to the console. </p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP15283C:\\ is accessible for reading/writing and below is the content of 'C:\\TEMP' folder:C:\\TEMP\n\u2502   msg\n\u2502\n\u2514\u2500\u2500\u2500Parent\n    \u2514\u2500\u2500\u2500Child\n            Message.txt'msg' is a symbolic link file for 'C:\\TEMP\\Parent\\Child\\Message.txt'. Message.txt contains following text:Welcome!Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var path = Paths.get(\"C:\", \"TEMP\", \"msg\");\n\n        try (var reader = Files.newBufferedReader(path)) {\n            String str = null;\n            while ((str = reader.readLine()) != null) {\n                System.out.println(str);\n            }\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880926, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP69512</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_FORWARD_ONLY, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.moveToInsertRow();\n            rs.updateInt(1, 105);\n            rs.updateString(2, \"Chris\");\n            rs.updateString(3, \"Lee\");\n            rs.updateDouble(4, 16000);\n            rs.refreshRow(); //Line n1\n            rs.insertRow(); //Line n2\n            rs.last();\n            System.out.println(rs.getInt(1)); //Line n3\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP69512: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type and variable 'stmt' infers to Statement type. Variables 'rs' infers to ResultSet type.</p><p><br></p><p>Given query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000    \n102 Sean    Smith   15000    \n103 Regina  Williams    15500    \n104 Natasha George  14600    </pre><p><br></p><p>rs.refreshRow() method throws SQLException, </p><p>- if a database access error occurs</p><p>- this method is called on a closed result set</p><p>- the result set type is TYPE_FORWARD_ONLY</p><p>- this method is called when the cursor is on the insert row</p><p><br></p><p>As, result set type is ResultSet.TYPE_FORWARD_ONLY, hence Line n1 throws SQLException.</p><p><br></p><p>`rs.moveToInsertRow();` It moves the cursor to the insert row. </p><p>Also note, if the cursor is at insert row and refreshRow() or updateRow() or deleteRow() method is called, then SQLException is thrown.</p>", "answers": ["105", "104", "An exception is thrown by Line n1", "An exception is thrown by Line n2", "An exception is thrown by Line n3"]}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP69512Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_FORWARD_ONLY, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            var rs = stmt.executeQuery(query);\n            rs.moveToInsertRow();\n            rs.updateInt(1, 105);\n            rs.updateString(2, \"Chris\");\n            rs.updateString(3, \"Lee\");\n            rs.updateDouble(4, 16000);\n            rs.refreshRow(); //Line n1\n            rs.insertRow(); //Line n2\n            rs.last();\n            System.out.println(rs.getInt(1)); //Line n3\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880928, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP66015</strong></p><p><br></p><p>Given structure of LOG table: </p><p><code>LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))</code></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1001, 'Login Successful')\");\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1002, 'Login Failure')\");\n\n            con.setAutoCommit(false);\n\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1003, 'Not Authorized')\");\n        }\n    }\n}</pre><p> </p><p>Also assume:</p><p>URL, username and password are correct. </p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p>LOG table doesn't have any records.</p><p><br></p><p>What is the result?</p>", "answers": ["Records for IDs 1001, 1002 and 1003 will be successfully inserted in the database table", "Records for IDs 1001 and 1002 will be successfully inserted in the database table", "Records for ID 1003 will be successfully inserted in the database table", "No records will be inserted in the database table"], "explanation": "<p><strong>UKOCP66015: </strong></p><p>Variables 'url', 'user' and 'password' infer to String type. Variable 'con' infers to Connection type and&nbsp; variable 'stmt' infers to Statement type.</p><p><br></p><p>According to javadoc of java.sql.Connection, \"By default a Connection object is in auto-commit mode, which means that it automatically commits changes after executing each statement. If auto-commit mode has been disabled, the method commit must be called explicitly in order to commit changes; otherwise, database changes will not be saved\". </p><p><br></p><p>First 2 executeUpdate(...) method invocation inserts the records in the database table. So records for IDs 1001 and 1002 are available in the database table.&nbsp; </p><p><br></p><p>After that 'con.setAutoCommit(false);' is invoked which disables the auto-commit mode. The next stmt.executeUpdate(...) statement doesn't commit the row in the database unless 'con.commit();' OR 'con.setAutoCommit(true);' is invoked. </p><p><br></p><p>Record for ID 1003 is not committed to the database table.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP66015Given structure of LOG table: LOG (ID integer, MESSAGE varchar(1000), PRIMARY KEY (ID))Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);\n        ) {\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1001, 'Login Successful')\");\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1002, 'Login Failure')\");\n\n            con.setAutoCommit(false);\n\n            stmt.executeUpdate(\"INSERT INTO LOG VALUES(1003, 'Not Authorized')\");\n        }\n    }\n} Also assume:URL, username and password are correct. SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.LOG table doesn't have any records.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880930, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP74086</strong></p><p><br></p><p>Below is the content of 'C:\\Message.properties' file:</p><pre class=\"prettyprint linenums\">key1=Good Morning!\nkey2=Good Evening!</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.FileInputStream;\nimport java.io.IOException;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var prop = new Properties ();\n        var fis = new FileInputStream (\"C:\\\\Message.properties\");\n        prop.load(fis);\n        System.out.println(prop.get(\"key1\")); //Line n1\n        System.out.println(prop.get(\"key2\", \"Good Day!\")); //Line n2\n        System.out.println(prop.getProperty(\"key3\", \"Good Day!\")); //Line n3\n        System.out.println(prop.getProperty(\"key4\")); //Line n4\n    }\n}</pre><p><br></p><p>There is full permission to list/create/delete files and directories in C:.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP74086: </strong></p><p>java.util.Properties extends Hashtable&lt;Object, Object&gt;, which is a map to store key value pairs.</p><p><br></p><p>load method accepts InputStream object and loads the key value pairs (present in InputStream object) to internal map of Properties class. </p><p><br></p><p>There are 2 overloaded versions of getProperty() method: </p><p>1. String getProperty(String key) =&gt; Returns value of the specified key and null if value is not found. </p><p><br></p><p>2. String getProperty(String key, String defaultValue) =&gt; Returns value of the specified key and defaultValue if value is not found. </p><p><br></p><p>Hence, no issues with Line n3 and Line n4.</p><p><br></p><p>Also, as java.util.Properties extends Hashtable&lt;Object, Object&gt;, hence it has access to get\u200b(Object key) method of Hashtable. No issues with Line n1 as well.</p><p><br></p><p>There is no get(Object, Object) method available in Hashtable class, hence Line n2 causes compilation error.</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 causes compilation error", "<p>Given code produces below output: </p><p>Good Morning!</p><p>Good Evening!</p><p>Good Day!</p><p>null</p>"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "12.2 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP74086Below is the content of 'C:\\Message.properties' file:key1=Good Morning!\nkey2=Good Evening!Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.FileInputStream;\nimport java.io.IOException;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var prop = new Properties ();\n        var fis = new FileInputStream (\"C:\\\\Message.properties\");\n        prop.load(fis);\n        System.out.println(prop.get(\"key1\")); //Line n1\n        System.out.println(prop.get(\"key2\", \"Good Day!\")); //Line n2\n        System.out.println(prop.getProperty(\"key3\", \"Good Day!\")); //Line n3\n        System.out.println(prop.getProperty(\"key4\")); //Line n4\n    }\n}There is full permission to list/create/delete files and directories in C:.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880932, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP23306</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(2021, 11, 4);\n        var formatter = DateTimeFormatter.ofPattern(\"DD-MM-uuuu\");\n        System.out.println(formatter.format(date));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["04-11-2021", "11-04-2021", "04-11-21", "11-04-21", "None of the other options"], "explanation": "<p><strong>UKOCP23306: </strong></p><p>Variable 'date' infers to LocalDate type and variable 'formatter' infers to DateTimeFormatter type.</p><p>D represents day-of-year; DD is for representing single digit number as 2 digits (4 as 04) and DDD is for representing single digit and 2-digit numbers as 3 digits (4 as 004, 14 as 014). </p><p>If you calculate, day of the year for 4th Nov 2021, it will be of 3-digit value as year has 365 days and date is in November month. </p><p><br></p><p>'M' is for month and 'u' is for year.</p><p>Output of above code will be: nnn-11-2021 (where nnn is some 3-digit value).</p><p>Correct answer is: 'None of the other options'</p><p><br></p><p>If you get confused with pattern letters in lower case and upper case, then easy way to remember is that Bigger(Upper case) letters represent something bigger. M represents month &amp; m represents minute, D represents day of the year &amp; d represents day of the month.</p>", "feedbacks": ["", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["e"], "section": "12.4 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP23306Given code: package com.udayankhattry.ocp;\n\nimport java.time.*;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(2021, 11, 4);\n        var formatter = DateTimeFormatter.ofPattern(\"DD-MM-uuuu\");\n        System.out.println(formatter.format(date));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 55880934, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP79754</strong></p><p><br></p><p>Below is the code of ChessRule annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\n@Repeatable(ChessRules.class)\npublic @interface ChessRule {\n    String name() default \"Pawn\";\n    String [] moves();\n}</pre><p><br></p><p>Below is the code of ChessRules annotation:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\npublic @interface ChessRules {\n    ChessRule[] value();\n}</pre><p><br></p><p>And the code of Chess.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\n@ChessRule(moves = \"forward\") //Line n1\n@ChessRule(name = \"Knights\", moves = {\"L Shape\"}) //Line n2\n@ChessRule(name = \"Bishop\", moves = {\"Diagonal Lines\", \"In any direction\"}) //Line n3\n@ChessRule(moves = {\"Diagonal Lines\", \"In any direction\"}, name = \"Queen\") //Line n4\n@ChessRule(name = \"Queen\", moves = {\"forward\", \"backward\"}) //Line n5\npublic class Chess {\n\n}</pre><p><br></p><p>Which of the following statements are correct?</p>", "feedbacks": ["", "", "", "", "", ""], "explanation": "<p><strong>UKOCP79754: </strong></p><p>Annotation ChessRule compiles successfully, `@Repeatable(ChessRules.class)` annotation indicates that containing annotation type is ChessRules, so repeating @ChessRule annotations is stored in an @ChessRules annotation.</p><p> </p><p>ChessRules annotation is the containing annotation type, which has 'value' attribute of ChessRule[] type. Hence, ChessRules annotation also compiles successfully. </p><p><br></p><p>Let's check all the lines of Chess.java file: </p><p>@ChessRule(moves = \"forward\"), //Line n1</p><p>\u2713&nbsp; As attribute 'name' is declared as default, hence no need to include it here. Also, we are assigning just one value \"forward\" to attribute 'moves', therefore {} can be omitted.</p><p><br></p><p>@ChessRule(name = \"Knights\", moves = {\"L Shape\"}), //Line n2</p><p>\u2713&nbsp; Attribute 'name' is of String type and \"Knights\" is assigned to it. Attribute 'moves' is of String [] type and just one value \"L Shape\" is assigned to it.</p><p><br></p><p>@ChessRule(name = \"Bishop\", moves = {\"Diagonal Lines\", \"In any direction\"}), //Line n3</p><p>\u2713&nbsp; Attribute 'name' is of String type and \"Bishop\" is assigned to it. Attribute 'moves' is of String [] type and just two values {\"Diagonal Lines\", \"In any direction\"} are assigned to it.</p><p><br></p><p>@ChessRule(moves = {\"Diagonal Lines\", \"In any direction\"}, name = \"Queen\"), //Line n4</p><p>\u2713&nbsp; Attribute 'name' is of String type and \"Queen\" is assigned to it. Attribute 'moves' is of String [] type and just two values {\"Diagonal Lines\", \"In any direction\"} are assigned to it. Attributes can be written in any order.</p><p><br></p><p>@ChessRule(name = \"Queen\", moves = {\"forward\", \"backward\"}) //Line n5</p><p>\u2713&nbsp; &nbsp;Attribute 'name' is of String type and \"Queen\" is assigned to it. Attribute 'moves' is of String [] type and just two values {\"forward\", \"backward\"} are assigned to it.</p><p><br></p><p>@ChessRule annotation can appear multiple time, so Test class also compiles successfully.</p><p><br></p><p>Please note: You are not supposed to specify containing annotation type explicitly, Java compiler adds it for you.</p><p>@ChessRules({</p><p>@ChessRule(moves = \"forward\"), </p><p>@ChessRule(name = \"Knights\", moves = {\"L Shape\"}),</p><p>@ChessRule(name = \"Bishop\", moves = {\"Diagonal Lines\", \"In any direction\"}),</p><p>@ChessRule(moves = {\"Diagonal Lines\", \"In any direction\"}, name = \"Queen\"),</p><p>@ChessRule(name = \"Queen\", moves = {\"forward\", \"backward\"})</p><p>})</p><p>public class Chess{}</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Line n4 causes compilation error", "Line n5 causes compilation error", "Given code compiles successfully"], "relatedLectureIds": ""}, "correct_response": ["f"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP79754Below is the code of ChessRule annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\n@Repeatable(ChessRules.class)\npublic @interface ChessRule {\n    String name() default \"Pawn\";\n    String [] moves();\n}Below is the code of ChessRules annotation:package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.TYPE)\npublic @interface ChessRules {\n    ChessRule[] value();\n}And the code of Chess.java file:package com.udayankhattry.ocp;\n\n@ChessRule(moves = \"forward\") //Line n1\n@ChessRule(name = \"Knights\", moves = {\"L Shape\"}) //Line n2\n@ChessRule(name = \"Bishop\", moves = {\"Diagonal Lines\", \"In any direction\"}) //Line n3\n@ChessRule(moves = {\"Diagonal Lines\", \"In any direction\"}, name = \"Queen\") //Line n4\n@ChessRule(name = \"Queen\", moves = {\"forward\", \"backward\"}) //Line n5\npublic class Chess {\n\n}Which of the following statements are correct?", "related_lectures": []}, {"_class": "assessment", "id": 55880936, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP82911</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\n\npublic class AirTicket {\n    private final String name;\n    private final LocalDate dob;\n    private final String ssNo;\n    private final String from;\n    private final String to;\n\n    public AirTicket(String name, LocalDate dob, String ssNo, String from, String to) {\n        this.name = name;\n        this.dob = dob;\n        this.ssNo = ssNo;\n        this.from = from;\n        this.to = to;\n    }\n\n    //Getter methods available\n    \n    //Other public methods\n}</pre><p><br></p><p>Developer of AirTicket class intends to make it immutable. </p><p>Users should be able to create and use instances of AirTicket class from outside the declaring package, what needs to be done?</p>", "answers": ["Add &#39;final&#39; modifier to AirTicket class", "Add &#39;final&#39; modifier to the constructor", "Return the copy of LocalDate object from the getter method of &#39;dob&#39;", "Change modifier of the constructor from &#39;public&#39; to &#39;private&#39;"], "explanation": "<p><strong>UKOCP82911: </strong></p><p>Add 'final' modifier to AirTicket class</p><p>\u2713&nbsp; Immutable classes should not be subclassable. This will stop other classes to subclass AirTicket class and change its functionality.</p><p><br></p><p>Add 'final' modifier to the constructor</p><p>\u2717&nbsp; This causes compilation error</p><p><br></p><p>Return the copy of LocalDate object from the getter method of 'dob'</p><p>\u2717&nbsp; Not needed, as LocalDate instances are immutable.</p><p><br></p><p>Change modifier of the constructor from 'public' to 'private'</p><p>\u2717&nbsp; As instances of AirTicket class are created from outside the declaring package, hence just making constructor 'private' will break this feature. If you make constructor private, then you will have to provide static builder methods to create an instance of AirTicket class.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 6-1 / MUTABLE-1: Prefer immutability for value types</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP82911Given code: package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\n\npublic class AirTicket {\n    private final String name;\n    private final LocalDate dob;\n    private final String ssNo;\n    private final String from;\n    private final String to;\n\n    public AirTicket(String name, LocalDate dob, String ssNo, String from, String to) {\n        this.name = name;\n        this.dob = dob;\n        this.ssNo = ssNo;\n        this.from = from;\n        this.to = to;\n    }\n\n    //Getter methods available\n    \n    //Other public methods\n}Developer of AirTicket class intends to make it immutable. Users should be able to create and use instances of AirTicket class from outside the declaring package, what needs to be done?", "related_lectures": []}, {"_class": "assessment", "id": 55880938, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP19227</strong></p><p><br></p><p>On Windows platform, you have below modular jar file for 'com.udayankhattry.modularity' module:</p><p>C:\\third-party\\test.jar</p><p><br></p><p>Which of the following commands executed from C:\\ describes the module 'com.udayankhattry.modularity'?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP19227: </strong></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional. </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>--describe-module or -d: It should be followed by module name and it describes the specified module. </p><p>If you pass the system module name, then it describe passed system module, e.g. </p><p>java -d java.sql</p><p><br></p><p>But to use it with application modules, module path needs to be specified. Hence, below options are correct:</p><p>java -p third-party -d com.udayankhattry.modularity (given option)</p><p>or </p><p>java -p third-party\\test.jar -d com.udayankhattry.modularity</p><p><br></p><p>Commands `java -d com.udayankhattry.modularity` and `java --describe-module com.udayankhattry.modularity` complain for missing module as -p option is missing.</p><p><br></p><p>Command `java -p third-party\\test.jar -m com.udayankhattry.modularity` will try to execute the Main-class specified in MANIFEST.MF file of test.jar.</p>", "answers": ["<p><code>java -d com.udayankhattry.modularity</code> </p>", "<p><code>java --describe-module com.udayankhattry.modularity</code> </p>", "<p><code>java -p third-party\\test.jar -m com.udayankhattry.modularity</code> </p>", "<p><code>java -p third-party -d com.udayankhattry.modularity</code> </p>"], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP19227On Windows platform, you have below modular jar file for 'com.udayankhattry.modularity' module:C:\\third-party\\test.jarWhich of the following commands executed from C:\\ describes the module 'com.udayankhattry.modularity'?", "related_lectures": []}, {"_class": "assessment", "id": 55880940, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP42492</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n\\---src\n    \\---library\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                +---books\n                |       Book.java\n                |\n                \\---members\n                        Member.java</pre><p><br></p><p>Below are the file contents:-</p><p>C:\\src\\library\\com\\udayankhattry\\books\\Book.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.books; \n\npublic class Book {\n    //Lots of valid codes\n}</pre><p><br></p><p>C:\\src\\library\\com\\udayankhattry\\members\\Member.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.members;\n\npublic class Member {\n    //Lots of valid codes\n}</pre><p><br></p><p>C:\\src\\library\\module-info.java:</p><pre class=\"prettyprint linenums\">module library {\n    //INSERT CODE HERE\n}</pre><p><br></p><p>The author of this module wants to export the package 'com.udayankhattry.books' to 'bookhouse' and 'onlinestore' modules only and the package 'com.udayankhattry.members' to 'test' module only. </p><p><br></p><p>Which of the following options, when inserted in module-info.java file, will fulfill his requirements?</p>", "feedbacks": ["", "", "", "", "", "", ""], "explanation": "<p><strong>UKOCP42492: </strong></p><p>If a particular package needs to be exported to specific module(s), then qualified exports are used. Syntax of qualified exports is: </p><p>exports &lt;package_name&gt; to &lt;comma_separated_list_of_modules&gt;;</p><p><br></p><p>Hence to export the package 'com.udayankhattry.members' to 'test' module only, export directive will be: </p><p>exports com.udayankhattry.members to test;</p><p><br></p><p>and to export the package 'com.udayankhattry.books' to 'bookhouse' and 'onlinestore' modules only, export directive will be: </p><p>exports com.udayankhattry.books to bookhouse, onlinestore;</p><p><br></p><p>Note, the keyword is 'exports' and not 'export'.</p><p><br></p><p><code>exports com.udayankhattry.books;</code> =&gt; Package 'com.udayankhattry.books' will be exported to all the modules and not only to 'bookhouse' and 'onlinestore' modules.</p><p><br></p><p>Also note that having multiple exports directive for same package is note allowed, below code causes compilation error: </p><pre class=\"prettyprint linenums\">exports com.udayankhattry.books to bookhouse;\nexports com.udayankhattry.books to onlinestore;</pre><p><br></p><p>Therefore correct option is: </p><pre class=\"prettyprint linenums\">exports com.udayankhattry.books to bookhouse, onlinestore;\nexports com.udayankhattry.members to test;</pre>", "answers": ["<pre class=\"prettyprint linenums\">exports com.udayankhattry.books to bookhouse;\nexports com.udayankhattry.books to onlinestore;\nexports com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">exports com.udayankhattry.books to bookhouse, onlinestore;\nexports com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">export com.udayankhattry.books to bookhouse, onlinestore;\nexports com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">export com.udayankhattry.books to bookhouse, onlinestore;\nexport com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">export com.udayankhattry.books to bookhouse;\nexport com.udayankhattry.books to onlinestore;\nexport com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">exports com.udayankhattry.books to bookhouse &amp; onlinestore;\nexports com.udayankhattry.members to test;</pre>", "<pre class=\"prettyprint linenums\">exports com.udayankhattry.books;\nexports com.udayankhattry.members to test;</pre>"], "relatedLectureIds": ""}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP42492Given below the directory/file structure on Windows platform: C:\n\\---src\n    \\---library\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                +---books\n                |       Book.java\n                |\n                \\---members\n                        Member.javaBelow are the file contents:-C:\\src\\library\\com\\udayankhattry\\books\\Book.java: package com.udayankhattry.books; \n\npublic class Book {\n    //Lots of valid codes\n}C:\\src\\library\\com\\udayankhattry\\members\\Member.java: package com.udayankhattry.members;\n\npublic class Member {\n    //Lots of valid codes\n}C:\\src\\library\\module-info.java:module library {\n    //INSERT CODE HERE\n}The author of this module wants to export the package 'com.udayankhattry.books' to 'bookhouse' and 'onlinestore' modules only and the package 'com.udayankhattry.members' to 'test' module only. Which of the following options, when inserted in module-info.java file, will fulfill his requirements?", "related_lectures": []}, {"_class": "assessment", "id": 55880942, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP11765</strong></p><p><br></p><p>Module X needs Module Y during compilation and not during runtime. </p><p>Which of the directive needs to be declared in the module descriptor file of module X?</p>", "answers": ["<p><code>requires Y;</code> </p>", "<p><code>requires transitive Y;</code> </p>", "<p><code>requires compile Y;</code> </p>", "<p><code>requires static Y;</code> </p>"], "explanation": "<p><strong>UKOCP11765: </strong></p><p>If some dependency is needed during compile-time only, then 'requires static' is used.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP11765Module X needs Module Y during compilation and not during runtime. Which of the directive needs to be declared in the module descriptor file of module X?", "related_lectures": []}, {"_class": "assessment", "id": 55880944, "assessment_type": "multi-select", "prompt": {"question": "<p><strong>Question ID: UKOCP73963</strong></p><p><br></p><p>You have 3 jar files available in a legacy application: </p><p>1. client.jar</p><p>2. services.jar</p><p>3. database.jar</p><p><br></p><p>client.jar depends on services.jar and services.jar depends on database.jar. </p><p><br></p><p>client.jar contains entry class: com.udayankhattry.test.Main</p><p><br></p><p>And the command executed from C:\\</p><p><code>java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.Main</code></p><p><br></p><p>It prints LEAP YEAR on to the console.</p><p><br></p><p>You have modularized the client.jar and added below module descriptor: </p><pre class=\"prettyprint linenums\">module com.udayankhattry.client {\n    requires services;\n}</pre><p><br></p><p>Which of the following commands, executed from C:\\ on Java 11, will print LEAP YEAR on to the console?</p><p>Choose 3 options.</p>", "relatedLectureIds": "", "answers": ["<p><code>java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.Main</code> </p>", "<p><code>java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code> </p>", "<p><code>java -p jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.Main</code> </p>", "<p><code>java -p jars\\client.jar;jars\\services.jar;jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code> </p>", "<p><code>java -p jars\\client.jar;jars\\services.jar -cp jars\\database.jar com.udayankhattry.test.Main</code> </p>", "<p><code>java -p jars\\client.jar;jars\\services.jar -cp jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code> </p>"], "explanation": "<p><strong>UKOCP73963: </strong></p><p><code>java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.Main</code></p><p>\u2713&nbsp; All the jars loaded in classpath are assigned to unnamed module. It works similar to legacy system.</p><p><br></p><p><code>java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code></p><p>\u2717&nbsp; -m option searches for the named module 'com.udayankhattry.client' but client.jar was loaded as unnamed module.</p><p><br></p><p><code>java -p jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.Main</code></p><p>\u2717&nbsp; Modular jar loaded via module path and accessed using -m option.</p><p><br></p><p><code>java -p jars\\client.jar;jars\\services.jar;jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code></p><p>\u2713&nbsp; client.jar is named module: name is com.udayankhattry.client</p><p>services.jar is an automatic module: name is services, it exports all its packages and it requires all other modules(named, automatic, unnamed).</p><p>database.jar is an automatic module: name is database, it exports all its packages and it requires all other modules(named, automatic, unnamed).</p><p><br></p><p>Module descriptor of client.jar has `requires services;`, which will work fine as module name of services.jar is services.</p><p>As, both services.jar and database.jar are automatic modules, hence services reads all the packages of database, which is the given dependency.</p><p><br></p><p><code>java -p jars\\client.jar;jars\\services.jar -cp jars\\database.jar com.udayankhattry.test.Main</code></p><p>\u2717&nbsp; client.jar contains entry class: com.udayankhattry.test.Main and client.jar is loaded via module path, hence -m option is needed</p><p><br></p><p><code>java -p jars\\client.jar;jars\\services.jar -cp jars\\database.jar -m com.udayankhattry.client/com.udayankhattry.test.Main</code></p><p>\u2713&nbsp; client.jar is named module: name is com.udayankhattry.client</p><p>services.jar is an automatic module: name is services, it exports all its packages and it requires all other modules(named, automatic, unnamed).</p><p>database.jar is an unnamed module: it exports all its packages</p><p><br></p><p>Module descriptor of client.jar has `requires services;`, which will work fine as module name of services.jar is services.</p><p>Module services (automatic) reads all the packages of database.jar (unnamed module).</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["a", "d", "f"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP73963You have 3 jar files available in a legacy application: 1. client.jar2. services.jar3. database.jarclient.jar depends on services.jar and services.jar depends on database.jar. client.jar contains entry class: com.udayankhattry.test.MainAnd the command executed from C:\\java -cp jars\\client.jar;jars\\services.jar;jars\\database.jar com.udayankhattry.test.MainIt prints LEAP YEAR on to the console.You have modularized the client.jar and added below module descriptor: module com.udayankhattry.client {\n    requires services;\n}Which of the following commands, executed from C:\\ on Java 11, will print LEAP YEAR on to the console?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 55880872, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP30118</strong></p><p><br></p><p>Below is the code of Test.java file:</p><pre class=\"prettyprint linenums\">public class Test {\n    enum TrafficLight {\n        RED, YELLOW, GREEN;\n    }\n\n    public static void main(String[] args) {\n        TrafficLight tl = TrafficLight.valueOf(args[0]);\n        switch(tl) {\n            case RED:\n                System.out.println(\"STOP\");\n                break;\n            case YELLOW:\n                System.out.println(\"SLOW\");\n                break;\n            case GREEN:\n                System.out.println(\"GO\");\n                break;\n        }\n    }\n}</pre><p><br></p><p>What will be the output if Test class is executed by the commands: </p><p><code>javac Test.java</code></p><p><code>java Test GREEN AMBER</code> </p>", "answers": ["GO", "IllegalArgumentException is thrown at runtime", "NullPointerException is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP30118: </strong></p><p>args[0] refers to \"GREEN\" and args[1] refers to \"AMBER\".</p><p><br></p><p>TrafficLight.valueOf(args[0]); -&gt; TrafficLight.valueOf(\"GREEN\");</p><p><br></p><p>GREEN is a valid enum constant, hence case label for GREEN is executed and \"GO\" is printed to the console.</p>", "feedbacks": ["", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["a"], "section": "3.8 Java OO: Enumerations", "question_plain": "Question ID: UKOCP30118Below is the code of Test.java file:public class Test {\n    enum TrafficLight {\n        RED, YELLOW, GREEN;\n    }\n\n    public static void main(String[] args) {\n        TrafficLight tl = TrafficLight.valueOf(args[0]);\n        switch(tl) {\n            case RED:\n                System.out.println(\"STOP\");\n                break;\n            case YELLOW:\n                System.out.println(\"SLOW\");\n                break;\n            case GREEN:\n                System.out.println(\"GO\");\n                break;\n        }\n    }\n}What will be the output if Test class is executed by the commands: javac Test.javajava Test GREEN AMBER", "related_lectures": []}, {"_class": "assessment", "id": 55880848, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP52338</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \" \"; //single space\n        boolean b1 = str.isEmpty();\n        boolean b2 = str.isBlank();\n        System.out.println(b1 + \" : \" + b2); //Line n1\n        \n        str.strip(); //Line n2\n        b1 = str.isEmpty();\n        b2 = str.isBlank();\n        System.out.println(b1 + \" : \" + b2); //Line n3\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>false : true</p><p>true : true</p>", "<p>false : false</p><p>true : true</p>", "<p>true : false</p><p>true : false</p>", "<p>false : true</p><p>false : true</p>", "<p>false : true</p><p>true : false</p>"], "explanation": "<p><strong>UKOCP52338: </strong></p><p>isEmpty() method of String class returns true if and only if length() is 0.</p><p>isBlank() method of String class (available since Java 11) returns true if the string is empty or contains only white space codepoints, otherwise false.</p><p><br></p><p>strip() method of String class (available since Java 11) returns a string whose value is this string, with all leading and trailing white space removed.</p><p><br></p><p>To find out what is white space character in Java, check Character.isWhitespace\u200b(int) method, you will find below: </p><p>A character is a Java whitespace character if and only if it satisfies one of the following criteria:</p><p>It is a Unicode space character (SPACE_SEPARATOR, LINE_SEPARATOR, or PARAGRAPH_SEPARATOR) but is not also a non-breaking space ('\\u00A0', '\\u2007', '\\u202F').</p><p>It is '\\t', U+0009 HORIZONTAL TABULATION.</p><p>It is '\\n', U+000A LINE FEED.</p><p>It is '\\u000B', U+000B VERTICAL TABULATION.</p><p>It is '\\f', U+000C FORM FEED.</p><p>It is '\\r', U+000D CARRIAGE RETURN.</p><p>It is '\\u001C', U+001C FILE SEPARATOR.</p><p>It is '\\u001D', U+001D GROUP SEPARATOR.</p><p>It is '\\u001E', U+001E RECORD SEPARATOR.</p><p>It is '\\u001F', U+001F UNIT SEPARATOR. </p><p><br></p><p>White space character in java includes space character along with above characters. </p><p><br></p><p>Let's check the code:</p><p>'str' refers to \" \" and its length is 1.</p><p>`str.isEmpty()` returns false, as length() is not 0.</p><p>`str.isBlank()` returns true, as it contains only white space character.</p><p><br></p><p>So, Line n1 prints false : true on to the console.</p><p><br></p><p>At Line n2, `str.strip();` returns an empty string \"\". As String is immutable, hence a new String object is created and 'str' still refers to \" \". </p><p><br></p><p>As, there is no change in 'str', Line n3 also prints false : true on to the console.</p>", "feedbacks": ["", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP52338Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \" \"; //single space\n        boolean b1 = str.isEmpty();\n        boolean b2 = str.isBlank();\n        System.out.println(b1 + \" : \" + b2); //Line n1\n        \n        str.strip(); //Line n2\n        b1 = str.isEmpty();\n        b2 = str.isBlank();\n        System.out.println(b1 + \" : \" + b2); //Line n3\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880850, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP83084</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"HavePatience\");\n        sb.delete(4, 5).insert(4, \" P\").toString().toUpperCase();\n        System.out.println(sb);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["HAVE PTIENCE", "HAVE PATIENCE", "Have Patience", "Have Ptience", "HavePatience", "HAVEPATIENCE", "<p>Haveatience</p>", "<p>HAVEATIENCE</p>"], "explanation": "<p><strong>UKOCP83084: </strong></p><p>sb --&gt; {\"HavePatience\"}</p><p>sb.delete(4, 5) --&gt; {\"Haveatience\"}</p><p>sb.insert(4, \" P\") -&gt; {\"Have Patience\"}</p><p>sb.toString() -&gt; Creates a new String object \"Have Patience\"</p><p>\"Have Patience\".toUpperCase() -&gt; Creates another String object \"HAVE PATIENCE\" but the String object is not referred and used.</p><p><br></p><p>Method invocation on sb modifies the same object, so after insert(4, \" P\") method invocation, 'sb' refers to {\"Have Patience\"}. </p><p><br></p><p>StringBuilder class overrides toString() method, which returns the contents of StringBuilder object in the form of String.</p><p>`System.out.println(sb);` invokes the sb.toString() method, which returns \"Have Patience\" and the same is printed on to the console.</p>", "feedbacks": ["", "", "", "", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP83084Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"HavePatience\");\n        sb.delete(4, 5).insert(4, \" P\").toString().toUpperCase();\n        System.out.println(sb);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 55880852, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51029</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        int num = 10;\n        if(num++ == num++) {\n            System.out.println(\"EQUAL \" + num);\n        } else {\n            System.out.println(\"NOT EQUAL \" + num);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP51029: </strong></p><p>Given boolean expression: </p><p>(num++ == num++) //num=10</p><p>(10 == num++) //Left side operand is evaluated first, value 10 is used in the expression and variable num is incremented by 1, so num=11</p><p>(10 == 11) //Right side operand is evaluated next, value 11 is used in the expression and variable num is incremented by 1, so num = 12</p><p>Above expression evaluates to false, hence else block is executed and NOT EQUAL 12 is printed on to the console.</p>", "answers": ["EQUAL 12", "EQUAL 11", "NOT EQUAL 12", "NOT EQUAL 11"], "relatedLectureIds": ""}, "correct_response": ["c"], "section": "2.1 Controlling Program Flow: if/else", "question_plain": "Question ID: UKOCP51029Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String [] args) {\n        int num = 10;\n        if(num++ == num++) {\
