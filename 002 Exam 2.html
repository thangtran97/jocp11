  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 48798016, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP51023</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        byte b1 = 10; //Line n1\n        int i1 = b1; //Line n2\n        byte b2 = i1; //Line n3\n        System.out.println(b1 + i1 + b2);\n    }\n}</pre><p><br></p><p>What is the result of compiling and executing Test class?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP51023: </strong></p><p>Let us first check Line n1: byte b1 = 10;</p><p>Above statement compiles successfully, even though 10 is an int literal (32 bits) and b1 is of byte primitive type which can store only 8 bits of data. </p><p>Here java does some background task, if value of int literal can be easily fit to byte primitive type (-128 to 127), then int literal is implicitly casted to byte type. </p><p>So above statement is internally converted to:</p><p>byte b1 = (byte)10;</p><p><br></p><p>But if you specify any out of range value then it would not be allowed, e.g.</p><p>byte b = 128; // It would cause compilation failure as 128 is out of range value for byte type.</p><p><br></p><p>There is no issue with Line n2 as byte type (8 bits) can be easily assigned to int type (32 bits).</p><p><br></p><p>For line n3, `byte b2 = i1;`, expression on right hand side (i1) is neither a within range literal value nor constant expression, hence it causes compilation failure.</p><p>To compile successfully, this expression needs to be explicitly casted, such as: `byte b2 = (byte)i1;`</p>", "answers": ["Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "30 is printed on to the console"]}, "correct_response": ["c"], "section": "1.1 Working with data types: Primitive types", "question_plain": "Question ID: UKOCP51023Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        byte b1 = 10; //Line n1\n        int i1 = b1; //Line n2\n        byte b2 = i1; //Line n3\n        System.out.println(b1 + i1 + b2);\n    }\n}What is the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798018, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP50163</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int m = 20;\n        int var = --m * m++ + m-- - --m;\n        System.out.println(\"m = \" + m);\n        System.out.println(\"var = \" + var);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>m = 25</p><p>var = 363</p>", "<p>m = 363</p><p>var = 363</p>", "<p>m = 18</p><p>var = 363</p>", "Compilation error"], "explanation": "<p><strong>UKOCP50163: </strong></p><p>Given statement: </p><p>int var = --m * m++ + m-- - --m; </p><p>int var = --m * (m++) + (m--) - --m; // Postfix operator has higher precedence than other available operators</p><p>int var = (--m) * (m++) + (m--) - (--m); //Then comes prefix operators</p><p>int var = ((--m) * (m++)) + (m--) - (--m); //* comes next</p><p>int var = (((--m) * (m++)) + (m--)) - (--m); //+ is next</p><p>Right hand side is left with just one operator '-', it is a binary operator, hence let's solve the left hand side first.</p><p>int var = ((19 * (m++)) + (m--)) - (--m); //m = 19 </p><p>int var = ((19 * 19) + (m--)) - (--m); //m = 20 </p><p>int var = (361 + 20) - (--m); //m = 19 </p><p>int var = 381 - (--m); //m = 19 </p><p>int var = 381 - 18; //m = 18 </p><p>int var = 363 // m = 18 </p><p>So, </p><p>m = 18 </p><p>var = 363 </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP50163Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int m = 20;\n        int var = --m * m++ + m-- - --m;\n        System.out.println(\"m = \" + m);\n        System.out.println(\"var = \" + var);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798020, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP76305</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/ x = 7, y = 200;\n        System.out.println(String.valueOf(x + y).length());\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print 3 on to the console? </p><p>Select 3 options.</p>", "answers": ["byte", "short", "int", "long", "float", "double", "<p>var</p>"], "explanation": "<p><strong>UKOCP76305: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>Compound declarations are allowed in Java for primitive type and reference type but not for var type. Hence, var cannot be used to replace /*INSERT*/.</p><p><br></p><p>Range of byte data type is from -128 to 127, hence if byte is used to replace /*INSERT*/, then y = 200 would cause compilation error as 200 is out of range value for byte type. Hence, byte cannot be used to replace /*INSERT*/.</p><p><br></p><p>short, int, long, float &amp; double can replace /*INSERT*/ without causing any error. x + y will evaluate to 207 for short, int and long types whereas, x&nbsp; + y will evaluate to 207.0 for float and double types. </p><p>String class has overloaded valueOf methods for int, char, long, float, double, boolean, char[] and Object types. valueOf method returns the corresponding String object and length() method returns number of characters in the String object.</p><p>So, `String.valueOf(x + y).length()` in case of short, int and long returns 3, on the other hand, in case of float and double it would return 5.</p><p><br></p><p>Hence, only 3 options (short, int and long) print expected output on to the console.</p><p><br></p><p>For more information on local variable type inference, please check the URL: http://openjdk.java.net/jeps/286</p>", "feedbacks": ["", "", "", "", "", "", ""]}, "correct_response": ["b", "c", "d"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP76305Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        /*INSERT*/ x = 7, y = 200;\n        System.out.println(String.valueOf(x + y).length());\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print 3 on to the console? Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798022, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP55873</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"Friends are treasures\");\n        sb.delete(0, 100);\n        System.out.println(sb.length());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["21", "0", "16", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP55873: </strong></p><p>'delete' method accepts 2 parameters: delete(int start, int end), where start is inclusive and end is exclusive. </p><p>This method throws StringIndexOutOfBoundsException for following scenarios:</p><p>A. start is negative</p><p>B. start is greater than sb.length()</p><p>C. start is greater than end</p><p><br></p><p>If end is greater than the length of StringBuilder object, then StringIndexOutOfBoundsException is not thrown and end is set to sb.length().</p><p>So, in this case, `sb.delete(0, 100);` is equivalent to `sb.delete(0, sb.length());` and this deletes all the characters from the StringBuilder object. </p><p>Hence, `System.out.println(sb.length());` prints 0 on to the console.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP55873Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(\"Friends are treasures\");\n        sb.delete(0, 100);\n        System.out.println(sb.length());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798024, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP30528</strong></p><p><br></p><p>What will be the output of compiling and executing the Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 2;\n        switch (x) {\n            default:\n                System.out.println(\"Still no idea what x is\");\n            case 1:\n                System.out.println(\"x is equal to 1\");\n                break;\n            case 2:\n                System.out.println(\"x is equal to 2\");\n                break;\n            case 3: \n                System.out.println(\"x is equal to 3\");\n                break;\n        }\n    }\n}</pre>", "answers": ["x is equal to 2", "Compilation error", "<p>Still no idea what x is</p><p>x is equal to 1</p>", "Produces no output"], "explanation": "<p><strong>UKOCP30528: </strong></p><p>Even though default block is available at the top but matching case is present. So control goes inside matching case and prints \"x is equal to 2\" on to the console. After that break; statement takes the control out of the switch-case block.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP30528What will be the output of compiling and executing the Test class?package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 2;\n        switch (x) {\n            default:\n                System.out.println(\"Still no idea what x is\");\n            case 1:\n                System.out.println(\"x is equal to 1\");\n                break;\n            case 2:\n                System.out.println(\"x is equal to 2\");\n                break;\n            case 3: \n                System.out.println(\"x is equal to 3\");\n                break;\n        }\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 48798026, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP43823</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String [][] countries = {{\"SINGAPORE\", \"AUSTRALIA\"}, {\"CHINA\", \"RUSSIA\"}};\n        /*INSERT*/\n    }\n}</pre><p><br></p><p>For the class Test, which options, if used to replace /*INSERT*/, will print \"SINGAPORE AUSTRALIA CHINA RUSSIA \" on to the console?</p><p>Choose 2 options.</p>", "answers": ["<pre class=\"prettyprint linenums\">for(int i = 0; i &lt; countries.length; i++) \n    for(int j = 0; j &lt; countries[i].length ; j++)\n        System.out.print(countries[i][j] + \" \");</pre>", "<pre class=\"prettyprint linenums\">for(int i = 1; i &lt;= countries.length; i++) \n    for(int j = 1; j &lt;= countries[i].length ; j++)\n        System.out.print(countries[i][j] + \" \");</pre>", "<pre class=\"prettyprint linenums\">for(int i = 1; i &lt; countries.length; i++) \n    for(int j = 1; j &lt; countries[i].length ; j++)\n        System.out.print(countries[i][j] + \" \");</pre>", "<pre class=\"prettyprint linenums\">for(String [] arr : countries) \n    for(String country : arr)\n        System.out.print(country + \" \");</pre>"], "explanation": "<p><strong>UKOCP43823: </strong></p><p>Easy question on iterating through 2-dimensional array. Starting index should be 0 and not 1. As for loops contain one statement, hence curly brackets can be ignored.</p><p>for-each loop's syntax is correct.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a", "d"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP43823Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String [][] countries = {{\"SINGAPORE\", \"AUSTRALIA\"}, {\"CHINA\", \"RUSSIA\"}};\n        /*INSERT*/\n    }\n}For the class Test, which options, if used to replace /*INSERT*/, will print \"SINGAPORE AUSTRALIA CHINA RUSSIA \" on to the console?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798028, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP34906</strong></p><p><br></p><p>Consider below code of TestStyle.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Style {\n    String pattern = \"*\";\n}\n\npublic class TestStyle {\n    public static void main(String[] args) {\n        var style = new Style(); //Line n1\n        System.out.println(style.pattern.repeat(5).length()); //Line n2\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing TestStyle class?</p>", "answers": ["0", "1", "5", "null", "An exception is thrown at runtime", "Compilation error at Line n1", "<p>Compilation error at Line n2</p>"], "explanation": "<p><strong>UKOCP34906: </strong></p><p>Style class has an instance variable 'pattern', which is initialized to \"*\" for all the instances. </p><p><br></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p><br></p><p>At Line n1, variable 'style' infers to Style type. An instance of Style class is created, pattern instance variable is initialized to \"*\" and variable 'style' refers to this instance. </p><p><br></p><p>Instance method 'repeat()' was added to String class in Java 11 and it has the signature: `public String repeat(int count) {}`</p><p>It returns the new String object whose value is the concatenation of this String repeated 'count' times. For example, </p><p>\"A\".repeat(3); returns \"AAA\".</p><p><br></p><p>Expression at Line n2: style.pattern.repeat(5).length()</p><p>=&gt; \"*\".repeat(5).length() //style.pattern refers to String object \"*\". </p><p>=&gt; \"*****\".length() //\"*\".repeat(5) returns \"*****\".</p><p>=&gt; 5 //\"*****\".length() returns 5.</p><p><br></p><p>Line n2 prints 5 on to the console.</p>", "feedbacks": ["", "", "", "", "", "", ""]}, "correct_response": ["c"], "section": "3.1 Java Object-Oriented Approach: Declare, Instantiate & GC", "question_plain": "Question ID: UKOCP34906Consider below code of TestStyle.java file:package com.udayankhattry.ocp;\n\nclass Style {\n    String pattern = \"*\";\n}\n\npublic class TestStyle {\n    public static void main(String[] args) {\n        var style = new Style(); //Line n1\n        System.out.println(style.pattern.repeat(5).length()); //Line n2\n    }\n}What will be the result of compiling and executing TestStyle class?", "related_lectures": []}, {"_class": "assessment", "id": 48798030, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP54504</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Greet {\n    public void sayHello() {\n        System.out.println(\"Hello!\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Greet obj = new Greet() {\n            public void SayHello() {\n                System.out.println(\"HELLO!\");\n            }\n        };\n        obj.sayHello();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "Runtime error", "Hello!", "HELLO!"], "explanation": "<p><strong>UKOCP54504: </strong></p><p>It is a valid anonymous inner class syntax. But anonymous inner class code doesn't override sayHello() method of Greet class, rather it defines a new method SayHello (S in upper case). </p><p>Anonymous inner class allows to define methods not available in its super class, in this case SayHello() method. </p><p>`obj.sayHello();` statement invokes the sayHello method of super class, Greet and thus \"Hello!\" gets printed on to the console.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP54504Given code: package com.udayankhattry.ocp;\n\nclass Greet {\n    public void sayHello() {\n        System.out.println(\"Hello!\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Greet obj = new Greet() {\n            public void SayHello() {\n                System.out.println(\"HELLO!\");\n            }\n        };\n        obj.sayHello();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798032, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP19766</strong></p><p><br></p><p>What will be the result of compiling and executing Test class?</p><pre class=\"prettyprint linenums\">//Test.java\npackage com.udayankhattry.ocp;\n\nclass Student {\n    String name;\n    int marks;\n    \n    Student(String name, int marks) {\n        this.name = name;\n        this.marks = marks;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Student student = new Student(\"James\", 25);\n        int marks = 25;\n        review(student, marks);\n        System.out.println(marks + \"-\" + student.marks);\n    }\n    \n    private static void review(Student stud, int marks) {\n        marks = marks + 10;\n        stud.marks+=marks;\n    }\n}</pre>", "answers": ["25-25", "35-25", "35-60", "25-60"], "explanation": "<p><strong>UKOCP19766: </strong></p><p>In below statements: student&lt;main&gt; means student inside main method. </p><p>On execution of main method: student&lt;main&gt; --&gt; {\"James\", 25}, marks&lt;main&gt; = 25. </p><p>On execution of review method: stud&lt;review&gt; --&gt; {\"James\", 25} (same object referred by student&lt;main&gt;), marks&lt;review&gt; = 25 (this marks is different from the marks defined in main method). marks&lt;review&gt; = 35 and stud.marks = 60. So at the end of review method: stud&lt;review&gt; --&gt; {\"James\", 60}, marks&lt;review&gt; = 35. </p><p>Control goes back to main method: student&lt;main&gt; --&gt; {\"James\", 60}, marks&lt;main&gt; = 25. Changes done to reference variable are visible in main method but changes done to primitive variable are not reflected in main method.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP19766What will be the result of compiling and executing Test class?//Test.java\npackage com.udayankhattry.ocp;\n\nclass Student {\n    String name;\n    int marks;\n    \n    Student(String name, int marks) {\n        this.name = name;\n        this.marks = marks;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Student student = new Student(\"James\", 25);\n        int marks = 25;\n        review(student, marks);\n        System.out.println(marks + \"-\" + student.marks);\n    }\n    \n    private static void review(Student stud, int marks) {\n        marks = marks + 10;\n        stud.marks+=marks;\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 48798034, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP88395</strong></p><p><br></p><p>Consider below code of Apple.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Apple {\n    public String color;\n    \n    public Apple(String color) {\n        /*INSERT*/\n    }\n    \n    public static void main(String [] args) {\n        Apple apple = new Apple(\"GREEN\");\n        System.out.println(apple.color);\n    }\n}</pre><p><br></p><p>For the class Apple, which option, if used to replace /*INSERT*/, will print GREEN on to the console?</p>", "answers": ["color = color;", "this.color = color;", "color = GREEN;", "this.color = GREEN;"], "explanation": "<p><strong>UKOCP88395: </strong></p><p>Instance variable color is shadowed by the parameter variable color of parameterized constructor. So, color = color will have no effect, because short-hand notation within constructor body will always refer to LOCAL variable. To refer to instance variable, this reference is needed. Hence `this.color = color;` is correct. </p><p><br></p><p>`color = GREEN;` and `this.color = GREEN;` cause compilation error as GREEN is not within double quotes(\"\"). </p><p><br></p><p>NOTE: `color = \"GREEN\";` will only assign \"GREEN\" to local variable and not instance variable but `this.color = \"GREEN\";` will assign \"GREEN\" to instance variable. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP88395Consider below code of Apple.java file: package com.udayankhattry.ocp;\n\npublic class Apple {\n    public String color;\n    \n    public Apple(String color) {\n        /*INSERT*/\n    }\n    \n    public static void main(String [] args) {\n        Apple apple = new Apple(\"GREEN\");\n        System.out.println(apple.color);\n    }\n}For the class Apple, which option, if used to replace /*INSERT*/, will print GREEN on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 48798036, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP88383</strong></p><p><br></p><p>Consider below code of TestBook.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Book {\n    private String name;\n    private String author;\n    \n    Book() {}\n    \n    Book(String name, String author) {\n        name = name;\n        author = author;\n    }\n    \n    String getName() {\n        return name;\n    }\n    \n    String getAuthor() {\n        return author;\n    }\n}\n\npublic class TestBook {\n    public static void main(String[] args) {\n        private Book book = new Book(\"Head First Java\", \"Kathy Sierra\");\n        System.out.println(book.getName());\n        System.out.println(book.getAuthor());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "answers": ["Compilation error in Book class", "Compilation error in TestBook class", "<p>null</p><p>null</p>", "<p>Head First Java</p><p>Kathy Sierra</p>"], "explanation": "<p><strong>UKOCP88383: </strong></p><p>Variable 'book' in main(String[]) method of TestBook class cannot be declared private as it is a local variable. Hence, there is a compilation error in TestBook class.&nbsp; </p><p>Only final modifier can be used with local variables.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP88383Consider below code of TestBook.java file:package com.udayankhattry.ocp;\n\nclass Book {\n    private String name;\n    private String author;\n    \n    Book() {}\n    \n    Book(String name, String author) {\n        name = name;\n        author = author;\n    }\n    \n    String getName() {\n        return name;\n    }\n    \n    String getAuthor() {\n        return author;\n    }\n}\n\npublic class TestBook {\n    public static void main(String[] args) {\n        private Book book = new Book(\"Head First Java\", \"Kathy Sierra\");\n        System.out.println(book.getName());\n        System.out.println(book.getAuthor());\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 48798038, "assessment_type": "multi-select", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP42179</strong></p><p><br></p><p>Given code of LogHelper.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nabstract class Helper {\n    int num = 100;\n    String operation = null;\n    \n    protected abstract void help();\n    \n    void log() {\n        System.out.println(\"Helper-log\");\n    }\n}\n\npublic class LogHelper extends Helper {\n    private int num = 200;\n    protected String operation = \"LOGGING\";\n    \n    void help() {\n        System.out.println(\"LogHelper-help\");\n    }\n    \n    void log() {\n        System.out.println(\"LogHelper-log\");\n    }\n    \n    public static void main(String [] args) {\n        new LogHelper().help();\n    }\n}</pre><p><br></p><p>Which of the following changes, done independently, allows the code to compile and on execution prints LogHelper-help?</p><p>Choose 3 options.</p>", "answers": ["Remove the private modifier from the num variable of LogHelper class", "Remove the protected modifier from the operation variable of LogHelper class", "Remove the protected modifier from the help() method of Helper class", "Add the protected modifier to the log() method of Helper class", "Add the protected modifier to the help() method of LogHelper class", "Add the public modifier to the help() method of LogHelper class", "<p>Add the public modifier to the log() method of LogHelper class</p>", "<p>Add the protected modifier to the log() method of LogHelper class</p>"], "explanation": "<p><strong>UKOCP42179: </strong></p><p>Let us first find out the issue: </p><p>As instance variables are hidden by subclasses and not overridden, hence overriding rules are not for the instance variables. There are no issues with variables 'num' and 'operation'.</p><p>log() method is declared with default modifier in both the classes, hence no issue with log() method as well. </p><p>abstract method help() is declared with protected modifier in Helper class and in LogHelper class, it is overridden with default modifier and this causes compilation error. So below solutions to resolved this issue: </p><p>1. Remove the protected modifier from the help() method of Helper class: Both the overridden and overriding methods will have same default modifier, which is allowed</p><p>OR</p><p>2. Add the protected modifier to the help() method of LogHelper class: Both the overridden and overriding methods will have same protected modifier, which is allowed</p><p>OR</p><p>3. Add the public modifier to the help() method of LogHelper class: Overridden method will have protected modifier and overriding method will have public modifier, which is allowed</p>", "feedbacks": ["", "", "", "", "", "", "", ""]}, "correct_response": ["c", "e", "f"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP42179Given code of LogHelper.java file: package com.udayankhattry.ocp;\n\nabstract class Helper {\n    int num = 100;\n    String operation = null;\n    \n    protected abstract void help();\n    \n    void log() {\n        System.out.println(\"Helper-log\");\n    }\n}\n\npublic class LogHelper extends Helper {\n    private int num = 200;\n    protected String operation = \"LOGGING\";\n    \n    void help() {\n        System.out.println(\"LogHelper-help\");\n    }\n    \n    void log() {\n        System.out.println(\"LogHelper-log\");\n    }\n    \n    public static void main(String [] args) {\n        new LogHelper().help();\n    }\n}Which of the following changes, done independently, allows the code to compile and on execution prints LogHelper-help?Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 48798040, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP23426</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Lock {\n    public void open() {\n        System.out.println(\"LOCK-OPEN\");\n    }\n}\n\nclass Padlock extends Lock {\n    public void open() {\n        System.out.println(\"PADLOCK-OPEN\");\n    }\n}\n\nclass DigitalPadlock extends Padlock {\n    public void open() {\n        /*INSERT*/\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Lock lock = new DigitalPadlock();\n        lock.open();\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print LOCK-OPEN on to the console? </p>", "answers": ["<p><code>super.open();</code> </p>", "<p><code>super.super.open();</code> </p>", "<p><code>((Lock)super).open();</code> </p>", "<p><code>(Lock)super.open();</code> </p>", "None of the other options"], "explanation": "<p><strong>UKOCP23426: </strong></p><p>super.open(); =&gt; Using super keyword, you can access methods and variables of immediate parent class, hence if you replace /*INSERT*/ with `super.open();`, then open() method of Padlock class will be invoked. </p><p><br></p><p>super.super.open(); =&gt; super.super is not allowed in java, it causes compilation error. </p><p><br></p><p>((Lock)super).open(); =&gt; Not possible to cast super keyword in java, it causes compilation error. </p><p><br></p><p>(Lock)super.open(); =&gt; super.open(); will be evaluated first as dot (.) operator has higher precedence than cast. super.open(); returns void and hence it cannot be casted to Lock. It also causes compilation error.</p><p><br></p><p>In fact, it is not possible to directly reach to 2 levels, super keyword allows to access methods and variables of immediate parent class only (just 1 level up). Hence, correct answer is: 'None of the other options'</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["e"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP23426Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Lock {\n    public void open() {\n        System.out.println(\"LOCK-OPEN\");\n    }\n}\n\nclass Padlock extends Lock {\n    public void open() {\n        System.out.println(\"PADLOCK-OPEN\");\n    }\n}\n\nclass DigitalPadlock extends Padlock {\n    public void open() {\n        /*INSERT*/\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Lock lock = new DigitalPadlock();\n        lock.open();\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print LOCK-OPEN on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 48798042, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP10517</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface M {\n    public static void log() {\n        System.out.println(\"M\");\n    }\n}\n\nabstract class A {\n    public static void log() { \n        System.out.println(\"N\");\n    }\n}\n\nclass MyClass extends A implements M {}\n\npublic class Test {\n    public static void main(String[] args) {\n        M obj1 = new MyClass();\n        obj1.log(); //Line n1\n        \n        A obj2 = new MyClass();\n        obj2.log(); //Line n2\n        \n        MyClass obj3 = new MyClass();\n        obj3.log(); //Line n3\n    }\n}</pre><p><br></p><p>Which of the following statements is correct?</p>", "answers": ["There is a compilation error in interface M", "There is a compilation error in class A", "Line n1 causes compilation error", "Line n2 causes compilation error", "Line n3 causes compilation error", "Given code compiles successfully"], "explanation": "<p><strong>UKOCP10517: </strong></p><p>As per Java 8, default and static methods were added in the interface. Interface M defines static method log(), there is no compilation error in interface M.</p><p>Also the scope of static log() method of M is limited to interface M and it can be invoked by using Interface name only, M.log().</p><p><br></p><p>Abstract class A also defines the static log() method. Abstract class can have 0 or more abstract methods. Hence, no compilation error in class A as well.</p><p><br></p><p>Super type reference variable can refer to an instance of Sub type, therefore the statement `M obj1 = new MyClass();` compiles successfully.</p><p>obj1 is of M type, hence `obj1.log();` tries to tag the static method of M but static log() method of M can only be invoked by using M.log();. </p><p>Therefore, Line n1 causes compilation error.</p><p><br></p><p>Scope of static log() method of A is not limited to class A only but MyClass also gets A.log() method in its scope.</p><p>There are different ways in which static method of an abstract class can be accessed:</p><p>1. By using the name of the abstract class: A.log(); //Preferred way</p><p>2. By using the reference variable of abstract class: A o1 = null; o1.log();</p><p>3. By using the name of the subclass: MyClass.log();</p><p>4. By using the reference variable of the subclass: MyClass o2 = null; o2.log();</p><p>Hence, Line n2 and Line n3 compile successfully.</p>", "feedbacks": ["", "", "", "", "", ""]}, "correct_response": ["c"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP10517Given code of Test.java file: package com.udayankhattry.ocp;\n\ninterface M {\n    public static void log() {\n        System.out.println(\"M\");\n    }\n}\n\nabstract class A {\n    public static void log() { \n        System.out.println(\"N\");\n    }\n}\n\nclass MyClass extends A implements M {}\n\npublic class Test {\n    public static void main(String[] args) {\n        M obj1 = new MyClass();\n        obj1.log(); //Line n1\n        \n        A obj2 = new MyClass();\n        obj2.log(); //Line n2\n        \n        MyClass obj3 = new MyClass();\n        obj3.log(); //Line n3\n    }\n}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 48798044, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP55892</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(new RuntimeException()); //Line n1\n        System.out.println(new RuntimeException(\"HELLO\")); //Line n2\n        System.out.println(new RuntimeException(new RuntimeException(\"HELLO\"))); //Line n3\n    }\n}</pre><p><br></p><p>Does above code compile successfully?</p>", "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP55892: </strong></p><p>Throwable is the root class of the exception hierarchy and it contains some useful constructors: </p><p><br></p><p>1. public Throwable() {...} : No-argument constructor</p><p>2. public Throwable(String message) {...} : Pass the detail message</p><p>3. public Throwable(String message, Throwable cause) {...} : Pass the detail message and the cause</p><p>4. public Throwable(Throwable cause) {...} : Pass the cause</p><p><br></p><p>Exception and RuntimeException classes also provide similar constructors. </p><p><br></p><p>Hence all 3 statements Line n1, Line n2 and Line n3 compile successfully.</p><p><br></p><p>Throwable class also contains methods, which are inherited by all the subclasses (Exception, RuntimeException etc.)</p><p>1. public String getMessage() {...} : Returns the detail message (E.g. detail message set by 2nd and 3rd constructor)</p><p>2. public String toString() {} : </p><p>Returns a short description of this throwable. The result is the concatenation of:</p><p>the name of the class of this object</p><p>\": \" (a colon and a space)</p><p>the result of invoking this object's getLocalizedMessage() method </p><p><br></p><p>If getLocalizedMessage returns null, then just the class name is returned.</p><p><br></p><p>Because of the toString() method, </p><p>Line n1 prints \"java.lang.RuntimeException\".</p><p>Line n2 prints \"java.lang.RuntimeException: HELLO\"</p><p>Line n3 prints \"java.lang.RuntimeException: java.lang.RuntimeException: HELLO\"</p>", "feedbacks": ["", ""]}, "correct_response": ["a"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP55892Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(new RuntimeException()); //Line n1\n        System.out.println(new RuntimeException(\"HELLO\")); //Line n2\n        System.out.println(new RuntimeException(new RuntimeException(\"HELLO\"))); //Line n3\n    }\n}Does above code compile successfully?", "related_lectures": []}, {"_class": "assessment", "id": 48798046, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP31480</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.SQLException;\n\npublic class Test {\n    private static void getReport() throws SQLException {\n        try {\n            throw new SQLException();\n        } catch (Exception e) {\n            throw null; //Line n1\n        }\n    }\n\n    public static void main(String[] args) {\n        try {\n            getReport(); //Line n2\n        } catch(SQLException e) {\n            System.out.println(\"REPORT ERROR\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["REPORT ERROR is printed on to the console and program terminates successfully", "Program ends abruptly", "Line n1 causes compilation failure", "Line n2 causes compilation failure"], "explanation": "<p><strong>UKOCP31480: </strong></p><p>Classes in Exception framework are normal java classes, hence null can be used wherever instances of Exception classes are used, so Line n1 compiles successfully. </p><p>No issues with Line n2 as method getReport() declares to throw SQLException and main(String []) method code correctly handles it. </p><p><br></p><p>Program compiles successfully but on execution, NullPointerException is thrown, stack trace is printed on to the console and program ends abruptly. </p><p><br></p><p>If you debug the code, you would find that internal routine for throwing null exception causes NullPointerException.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP31480Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.SQLException;\n\npublic class Test {\n    private static void getReport() throws SQLException {\n        try {\n            throw new SQLException();\n        } catch (Exception e) {\n            throw null; //Line n1\n        }\n    }\n\n    public static void main(String[] args) {\n        try {\n            getReport(); //Line n2\n        } catch(SQLException e) {\n            System.out.println(\"REPORT ERROR\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798048, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP18038</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\n\nclass Parent {\n    Parent() throws IOException {\n        System.out.print(\"HAKUNA\");\n    }\n}\n\nclass Child extends Parent {\n    Child() throws Exception {\n        System.out.println(\"MATATA\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        new Child();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error in both Parent and Child classes", "Compilation error only in Parent class", "Compilation error only in Child class", "Test class executes successfully and prints HAKUNAMATATA on to the console", "Test class executes successfully and prints MATATAHAKUNA on to the console"], "explanation": "<p><strong>UKOCP18038: </strong></p><p>It is legal for the constructors to have throws clause. </p><p>Constructors are not inherited by the Child class so there is no method overriding rules related to the constructors but as one constructor invokes other constructors implicitly or explicitly by using this(...) or super(...), hence exception handling becomes interesting. </p><p><br></p><p>Java compiler adds super(); as the first statement inside Child class's constructor:</p><pre class=\"prettyprint linenums\">Child() throws Exception {\n    super(); //added by the compiler\n    System.out.println(\"MATATA\");\n}</pre><p><br></p><p>super(); invokes the constructor of Parent class (which declares to throw IOException), but as no-argument constructor of Child class declares to throw Exception (super class of IOException), hence IOException is also handled. There is no compilation error and output is: HAKUNAMATATA</p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["d"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP18038Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\n\nclass Parent {\n    Parent() throws IOException {\n        System.out.print(\"HAKUNA\");\n    }\n}\n\nclass Child extends Parent {\n    Child() throws Exception {\n        System.out.println(\"MATATA\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        new Child();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798050, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP78068</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Resource implements AutoCloseable {\n    public void close() {\n        System.out.println(\"CLOSE\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(Resource r = null) {\n            System.out.println(\"HELLO\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["HELLO", "<p>HELLO</p><p>CLOSE</p>", "Compilation error", "NullPointerException is thrown at runtime"], "explanation": "<p><strong>UKOCP78068: </strong></p><p>For null resources, close() method is not called and hence NullPointerException is not thrown at runtime.&nbsp; </p><p><br></p><p>HELLO is printed on to the console. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP78068Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Resource implements AutoCloseable {\n    public void close() {\n        System.out.println(\"CLOSE\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(Resource r = null) {\n            System.out.println(\"HELLO\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798052, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP49525</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        byte[] arr1 = { 5, 10, 15, 20 };\n        byte[] arr2 = { 5, 10, 15, 17 };\n        System.out.println(Arrays.________(arr1, arr2));\n    }\n}</pre><p><br></p><p>Given options to fill the blanks:</p><p>1. compare</p><p>2. mismatch</p><p>3. equals</p><p><br></p><p>How many of the above options can fill the blank space, such that 3 is printed on to the console?</p>", "answers": ["Only one option", "Only two options", "All three options", "None of the given options"], "explanation": "<p><strong>UKOCP49525: </strong></p><p>Arrays.equals(...) method returns boolean value and hence it is not the correct option. </p><p><br></p><p>Arrays class has following overloaded compare methods for primitive type arrays:</p><p>int compare\u200b(boolean[] a, boolean[] b)</p><p>int compare\u200b(byte[] a, byte[] b)</p><p>int compare\u200b(short[] a, short[] b)</p><p>int compare\u200b(char[] a, char[] b)</p><p>int compare\u200b(int[] a, int[] b)</p><p>int compare\u200b(long[] a, long[] b)</p><p>int compare\u200b(float[] a, float[] b)</p><p>int compare\u200b(double[] a, double[] b)</p><p><br></p><p>All of these compare methods of Arrays class compare the arrays lexicographically and return below values:</p><p>0:&nbsp; if the first and second array are equal and contain the same elements in the same order</p><p>&lt;0: if the first array is lexicographically less than the second array</p><p>&gt;0: if the first array is lexicographically greater than the second array</p><p><br></p><p>For comparing the array contents, these methods take help of static compare(x, y) method defined in respective Wrapper classes. For example, Arrays.compare(byte[] a, byte[] b) uses Byte.compare(byte x, byte y) to compare array contents.</p><p>So, for the exam, you need to have an idea of how static compare(...) methods are implemented in these wrapper classes:</p><p>For Character, Byte &amp; Short; compare method returns x - y.</p><p>For Integer and Long; compare method returns -1 if x &lt; y, it returns 1 if x &gt; y and it returns 0 if x == y.</p><p>For Float and Double; logic is almost same as Integer type but logic is bit complex for finding equality of two floats or two doubles (not part of the exam).</p><p>For Boolean; compare method returns 0 if x == y, 1 if x is true and -1 if x is false.</p><p><br></p><p>For the given code, if compare is used to fill the blank space, then</p><p>System.out.println(Arrays.compare(arr1, arr2)); would return 3, which is the result of Byte.compare((byte)20, (byte)17).</p><p><br></p><p><br></p><p>Arrays class has following overloaded mismatch methods for primitive type arrays:</p><p>int mismatch\u200b(boolean[] a, boolean[] b)</p><p>int mismatch\u200b(byte[] a, byte[] b)</p><p>int mismatch\u200b(short[] a, short[] b)</p><p>int mismatch\u200b(char[] a, char[] b)</p><p>int mismatch\u200b(int[] a, int[] b)</p><p>int mismatch\u200b(long[] a, long[] b)</p><p>int mismatch\u200b(float[] a, float[] b)</p><p>int mismatch\u200b(double[] a, double[] b)</p><p><br></p><p>Above methods find and return the index of the first mismatch between two primitive arrays, otherwise return -1 if no mismatch is found. The index will be in the range of 0 (inclusive) up to the length (inclusive) of the smaller array. It throws NullPointerException, if either array is null.</p><p><br></p><p>For the given code, if mismatch is used to fill the blank space, then</p><p>System.out.println(Arrays.mismatch(arr1, arr2)); would return 3, as there is a mismatch at 4th element, which is index 3.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP49525Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        byte[] arr1 = { 5, 10, 15, 20 };\n        byte[] arr2 = { 5, 10, 15, 17 };\n        System.out.println(Arrays.________(arr1, arr2));\n    }\n}Given options to fill the blanks:1. compare2. mismatch3. equalsHow many of the above options can fill the blank space, such that 3 is printed on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 48798054, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP33167</strong></p><p><br></p><p>Does below code compile successfully?</p><p><br></p><pre class=\"prettyprint linenums\">class A{}\ninterface M{}\ninterface N{}\n\nclass B extends A {}\nclass C extends A implements M {}\nclass D extends A implements M, N {}\n\nclass Generic&lt;T extends M &amp; N &amp; A&gt; {}</pre>", "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP33167: </strong></p><p>If multiple bounds are available and one of the bounds is a class, then it must be specified first.&nbsp; </p><p><br></p><p>class Generic&lt;T extends M &amp; N &amp; A&gt; {} =&gt; A is specified at last and hence compilation error.</p>", "feedbacks": ["", ""]}, "correct_response": ["b"], "section": "5.2 Use generics, including wildcards", "question_plain": "Question ID: UKOCP33167Does below code compile successfully?class A{}\ninterface M{}\ninterface N{}\n\nclass B extends A {}\nclass C extends A implements M {}\nclass D extends A implements M, N {}\n\nclass Generic&lt;T extends M &amp; N &amp; A&gt; {}", "related_lectures": []}, {"_class": "assessment", "id": 48798056, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP33176</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"P\");\n        list.add(\"O\");\n        list.add(\"T\");\n\n        List&lt;String&gt; subList = list.subList(1, 2); //Line n1\n        subList.set(0, \"E\"); //Line n2\n        System.out.println(String.join(\"\", list));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["PET", "POT", "Compilation error", "An exception is thrown by Line n2"], "explanation": "<p><strong>UKOCP33176: </strong></p><p>list --&gt; [P, O, T]</p><p><br></p><p>sublist method is declared in List interface:</p><p>List&lt;E&gt; subList(int fromIndex, int toIndex)</p><p>fromIndex is inclusive and toIndex is exclusive</p><p>It returns a view of the portion of this list between the specified fromIndex and toIndex. The returned list is backed by this list, so non-structural changes in the returned list are reflected in this list and vice-versa.</p><p>If returned list (or view) is structurally modified, then modification are reflected in this list as well but if this list is structurally modified, then the semantics of the list returned by this method become undefined.</p><p>If fromIndex == toIndex, then returned list is empty.</p><p>If fromIndex &lt; 0 OR toIndex &gt; size of the list OR fromIndex &gt; toIndex, then IndexOutOfBoundsException is thrown.</p><p><br></p><p>list.subList(1, 2) --&gt; [O] (fromIndex is inclusive and endIndex is exclusive, so start index is 1 and end index is also 1). subList --&gt; [O].</p><p>At Line n2, `subList.set(0, \"E\");` =&gt; sublist --&gt; [E]. This change is also reflected in the backed list, therefore after this statement, list --&gt; [P, E, T]</p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and has below declarations:</p><p>1. public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, \"A\", \"B\"); throws NullPointerException</p><p>String [] arr = null; String.join(\"-\", arr); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>String str = null; String.join(\"-\", str); returns \"null\"</p><p>String.join(\"::\", new String[] {\"James\", null, \"Gosling\"}); returns \"James::null::Gosling\"</p><p><br></p><p>2. public static String join\u200b(CharSequence delimiter, Iterable&lt;? extends CharSequence&gt; elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter.</p><p>For example,</p><p>String.join(\".\", List.of(\"A\", \"B\", \"C\")); returns \"A.B.C\"</p><p>String.join(\".\", List.of(\"HELLO\")); returns \"HELLO\"</p><p><br></p><p>If delimiter is null or elements refer to null, then NullPointerException is thrown. e.g.,</p><p>String.join(null, List.of(\"HELLO\")); throws NullPointerException</p><p>List&lt;String&gt; list = null; String.join(\"-\", list); throws NullPointerException</p><p><br></p><p>But if single element is null, then \"null\" is considered. e.g.,</p><p>List&lt;String&gt; list = new ArrayList&lt;&gt;(); list.add(\"A\"); list.add(null); String.join(\"::\", list); returns \"A::null\"</p><p>Please note: String.join(\"-\", null); causes compilation error as compiler is unable to tag this call to specific join(...) method. It is an ambiguous call.</p><p><br></p><p>`System.out.println(String.join(\"\", list));` prints PET on to the console.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP33176Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = new ArrayList&lt;&gt;();\n        list.add(\"P\");\n        list.add(\"O\");\n        list.add(\"T\");\n\n        List&lt;String&gt; subList = list.subList(1, 2); //Line n1\n        subList.set(0, \"E\"); //Line n2\n        System.out.println(String.join(\"\", list));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798058, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP35306</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; days = new ArrayList&lt;&gt;();\n        days.add(\"SUNDAY\");\n        days.add(\"SUNDAY\");\n        days.add(\"MONDAY\");\n        System.out.println(days.size());\n        days.clear();\n        System.out.println(days.size());\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>3</p><p>3</p>", "<p>3</p><p>0</p>", "<p>2</p><p>0</p>", "<p>2</p><p>2</p>", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP35306: </strong></p><p>ArrayList can have duplicate elements, so after addition, list is: [SUNDAY, SUNDAY, MONDAY]. days.size() returns 3, so 3 is printed on to the console.&nbsp; </p><p>days.clear(); removes all the elements from the days list, in fact days list will be empty after successful execution of days.clear(); </p><p>2nd System.out.println statement prints 0 on to the console. </p>", "feedbacks": ["", "", "", "", ""]}, "correct_response": ["b"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP35306Consider below code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; days = new ArrayList&lt;&gt;();\n        days.add(\"SUNDAY\");\n        days.add(\"SUNDAY\");\n        days.add(\"MONDAY\");\n        System.out.println(days.size());\n        days.clear();\n        System.out.println(days.size());\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798060, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP38804</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(); //Line n1\n        var list2 = List.of(\"A\"); //Line n2\n        list1 = list2; //Line n3\n        System.out.println(list1.size()); //Line n4\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["0", "1", "An exception is thrown at runtime", "Compilation error"], "explanation": "<p><strong>UKOCP38804: </strong></p><p>There are 12 overloaded of methods in List interface:</p><p>List.of()</p><p>List.of(E e1)</p><p>List.of\u200b(E e1, E e2)</p><p>List.of(E e1, E e2, E e3)</p><p>List.of(E e1, E e2, E e3, E e4)</p><p>List.of(E e1, E e2, E e3, E e4, E e5)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9)</p><p>List.of(E e1, E e2, E e3, E e4, E e5, E e6, E e7, E e8, E e9, E e10)</p><p>List.of(E... elements)</p><p><br></p><p>These create an unmodifiable list containing specified elements. </p><p>These methods throw NullPointerException - if an element is null</p><p><br></p><p>For Line n1, list1 is of List&lt;Object&gt; type as of() method has no argument.</p><p>For Line n2, list2 is of List&lt;String&gt; type as of() method specify single argument of String type.</p><p><br></p><p>In generics syntax, parameterized types are not polymorphic, this means List&lt;Object&gt; is not super type of List&lt;String&gt;. Therefore, Line n3 causes compilation error.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["d"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP38804Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list1 = List.of(); //Line n1\n        var list2 = List.of(\"A\"); //Line n2\n        list1 = list2; //Line n3\n        System.out.println(list1.size()); //Line n4\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798062, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP45111</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        NavigableMap&lt;Integer, String&gt; map = new TreeMap&lt;&gt;();\n        map.put(25, \"Pune\");\n        map.put(32, \"Mumbai\");\n        map.put(11, \"Sri Nagar\");\n        map.put(39, \"Chennai\");\n\n        System.out.println(map.headMap(25));\n        System.out.println(map.tailMap(25));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>{11=Sri Nagar, 25=Pune}</p><p>{25=Pune, 32=Mumbai, 39=Chennai}</p>", "<p>{11=Sri Nagar}</p><p>{32=Mumbai, 39=Chennai}</p>", "<p>{11=Sri Nagar}</p><p>{25=Pune, 32=Mumbai, 39=Chennai}</p>", "<p>{11=Sri Nagar, 25=Pune}</p><p>{32=Mumbai, 39=Chennai}</p>"], "explanation": "<p><strong>UKOCP45111: </strong></p><p>If you don't use 2nd parameter for headMap() and tailMap() methods to indicate whether keys are inclusive or exclusive, </p><p>then by default 'toKey' used in headMap() method is exclusive and 'fromKey' used in tailMap() method is inclusive. </p><p><br></p><p>You can confirm this by checking the definition of headMap() and tailMap() methods in TreeMap class.</p><p><br></p><p>Methods defined in TreeMap class: </p><pre class=\"prettyprint linenums\">public SortedMap&lt;K,V&gt; headMap(K toKey) {\n    return headMap(toKey, false);\n}\n\npublic SortedMap&lt;K,V&gt; tailMap(K fromKey) {\n    return tailMap(fromKey, true);\n}</pre>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "5.3 Collection API(List, Set, Map, Deque)", "question_plain": "Question ID: UKOCP45111Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        NavigableMap&lt;Integer, String&gt; map = new TreeMap&lt;&gt;();\n        map.put(25, \"Pune\");\n        map.put(32, \"Mumbai\");\n        map.put(11, \"Sri Nagar\");\n        map.put(39, \"Chennai\");\n\n        System.out.println(map.headMap(25));\n        System.out.println(map.tailMap(25));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798064, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP10036</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"#####\", \"#\", \"##\", \"####\", \"###\");\n        Comparator&lt;String&gt; comp = Comparator.comparing(s -&gt; s);\n        Collections.sort(list, comp.reversed());\n        printCodes(list);\n\n    }\n\n    private static void printCodes(List&lt;String&gt; list) {\n        for (String str : list) {\n            System.out.println(str);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>#####</p><p>#</p><p>##</p><p>####</p><p>###</p>", "<p>###</p><p>####</p><p>##</p><p>#</p><p>#####</p>", "<p>#####</p><p>####</p><p>###</p><p>##</p><p>#</p>", "<p>#</p><p>##</p><p>###</p><p>####</p><p>#####</p>"], "explanation": "<p><strong>UKOCP10036: </strong></p><p>Comparator.comparing(s -&gt; s); compares the passed Strings only. As all the characters in the String are '#', this means strings are sorted on the basis of their lengths. Comparator referred by comp sorts on the basis of strings' lengths. Default reversed() method just reverses the ordering of the Comparator referred by comp, which means sorts the strings in descending order of their lengths.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "5.4 Sort collections and arrays", "question_plain": "Question ID: UKOCP10036Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.Collections;\nimport java.util.Comparator;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;String&gt; list = Arrays.asList(\"#####\", \"#\", \"##\", \"####\", \"###\");\n        Comparator&lt;String&gt; comp = Comparator.comparing(s -&gt; s);\n        Collections.sort(list, comp.reversed());\n        printCodes(list);\n\n    }\n\n    private static void printCodes(List&lt;String&gt; list) {\n        for (String str : list) {\n            System.out.println(str);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 48798066, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP60385</strong></p><p><br></p><p>For the given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Formatter&lt;T&gt; {\n    T format(T t);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(formatString(\"hello\", /*INSERT*/));\n        System.out.println(formatString(\"hELP\", /*INSERT*/));\n    }\n    \n    private static String formatString(String str, Formatter&lt;String&gt; formatter) {\n        return formatter.format(str);\n    }\n}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/ such that on executing Test class, passed Strings are formatted in Camel case? The output should be: </p><p>Hello</p><p>Help</p><p><br></p><p>Consider that passed string should be continuous, without any white-spaces in between. Select one option from below.</p>", "answers": ["<p><code>s -&gt; s.substring(0, 1).toUpperCase() + s.substring(1).toLowerCase()</code> </p>", "<p><code>s -&gt; s.substring(0, 1).toUpperCase() + s.substring(1, 5).toLowerCase()</code> </p>", "<p><code>s -&gt; s.toCamelCase()</code> </p>", "Other three options are not correct"], "explanation": "<p><strong>UKOCP60385: </strong></p><p>Passed string's first character should be converted to upper case and rest of the characters should be converted to lower case. Combination of substring method with toUpperCase and toLowerCase method does the trick. </p><p>s.substring(1, 5) will throw StringIndexOutOfBoundsException for \"hELP\". There is no toCamelCase() method defined in String class.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["a"], "section": "6.1 Lambda Expressions", "question_plain": "Question ID: UKOCP60385For the given code:package com.udayankhattry.ocp;\n\ninterface Formatter&lt;T&gt; {\n    T format(T t);\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        System.out.println(formatString(\"hello\", /*INSERT*/));\n        System.out.println(formatString(\"hELP\", /*INSERT*/));\n    }\n    \n    private static String formatString(String str, Formatter&lt;String&gt; formatter) {\n        return formatter.format(str);\n    }\n}Which of the following options can replace /*INSERT*/ such that on executing Test class, passed Strings are formatted in Camel case? The output should be: HelloHelpConsider that passed string should be continuous, without any white-spaces in between. Select one option from below.", "related_lectures": []}, {"_class": "assessment", "id": 48798068, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP41610</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;String&gt; obj = process(\"  abc d\")::toUpperCase;\n        System.out.println(\"&gt;\" + obj.create() + \"&lt;\");\n    }\n\n    private static String process(String str) {\n        return str.trim();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error", "&gt;  ABC D&lt;", "&gt;ABC D&lt;", "&gt;ABCD&lt;"], "explanation": "<p><strong>UKOCP41610: </strong></p><p>This is the case of \"Reference to an Instance Method of a Particular Object\". </p><p>create() method doesn't specify and parameter and toUpperCase() method of String class also doesn't accept any argument. </p><p>So, left side of method reference syntax, can be any of the following: </p><p>A String reference variable, A String literal, An expression resulting to String object, a method call which returns String or String constructor call. </p><p>In this case, process method returns String object, so it can be used in method reference syntax. </p><p>Note: trim() method trims the leading and trailing white spaces and not the spaces in between. </p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP41610Given code: package com.udayankhattry.ocp;\n\ninterface Creator&lt;T&gt; {\n    T create();\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Creator&lt;String&gt; obj = process(\"  abc d\")::toUpperCase;\n        System.out.println(\"&gt;\" + obj.create() + \"&lt;\");\n    }\n\n    private static String process(String str) {\n        return str.trim();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798114, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP17530</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"*\", \"**\", \"***\", \"****\", \"*****\", \"******\"};\n        Predicate&lt;String&gt; pr1 = s -&gt; s.length() &lt; 4;\n        print(arr, pr1);\n    }\n    \n    private static void print(String [] arr, Predicate&lt;String&gt; predicate) {\n        for(String str : arr) {\n            if(predicate.test(str)) {\n                System.out.println(str);\n            }\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>****</p><p>*****</p><p>******</p>", "<p>*</p><p>**</p><p>***</p>", "<p>*</p><p>**</p><p>***</p><p>****</p>", "<p>*</p><p>**</p><p>***</p><p>****</p><p>*****</p><p>******</p>"], "explanation": "<p><strong>UKOCP17530: </strong></p><p>Lambda expression for Predicate is: s -&gt; s.length() &lt; 4. This means return true if passed string's length is &lt; 4.&nbsp; </p><p>So first three array elements are printed.</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP17530Given code: package com.udayankhattry.ocp;\n\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] arr = {\"*\", \"**\", \"***\", \"****\", \"*****\", \"******\"};\n        Predicate&lt;String&gt; pr1 = s -&gt; s.length() &lt; 4;\n        print(arr, pr1);\n    }\n    \n    private static void print(String [] arr, Predicate&lt;String&gt; predicate) {\n        for(String str : arr) {\n            if(predicate.test(str)) {\n                System.out.println(str);\n            }\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798070, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP20702</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.LinkedHashMap;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        Map&lt;String, Integer&gt; map = new LinkedHashMap&lt;&gt;();\n        map.put(\"*\", 1);\n        map.put(\"$\", 3);\n        map.put(\"#\", 5);\n\n        map.forEach((p,q) -&gt; System.out.println(p.repeat(q)));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>*</p><p>$</p><p>#</p>", "<p>*</p><p>$$</p><p>###</p>", "<p>*</p><p>$$$</p><p>#####</p>", "None of the other options"], "explanation": "<p><strong>UKOCP20702: </strong></p><p>interface Map&lt;K, V&gt; has below forEach method: </p><p>default void forEach(BiConsumer&lt;? super K, ? super V&gt; action) {...}</p><p><br></p><p>Given lambda expression, `(p,q) -&gt; System.out.println(p.repeat(q))` is correct implementation of BiConsumer&lt;String, Integer&gt;. Variable 'p' is of String type and variable 'q' is of Integer type.</p><p><br></p><p>String class has repeat(count) method, which returns a string whose value is the concatenation of this string repeated count times. For example, \"AB\".repeat(3) returns \"ABABAB\"</p><p><br></p><p>So, for the given code, \"*\" will be repeated once, \"$\" will be repeated thrice and \"#\" will be repeated five times. Therefore, given code produces below output:</p><p>*</p><p>$$$</p><p>#####</p>", "feedbacks": ["", "", "", ""]}, "correct_response": ["c"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP20702Given code: package com.udayankhattry.ocp;\n\nimport java.util.LinkedHashMap;\nimport java.util.Map;\n\npublic class Test {\n    public static void main(String[] args) {\n        Map&lt;String, Integer&gt; map = new LinkedHashMap&lt;&gt;();\n        map.put(\"*\", 1);\n        map.put(\"$\", 3);\n        map.put(\"#\", 5);\n\n        map.forEach((p,q) -&gt; System.out.println(p.repeat(q)));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 48798072, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP84792</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\n\nclass Division {\n    int num;\n    int den;\n    int res;\n\n    Division(int num, int den) {\n        this.num = num;\n        this.den = den;\n    }\n\n    void divide() {\n        try {\n            res = num / den;\n        } catch(RuntimeException e) {}\n    }\n\n    public String toString() {\n        if (den == 0)\n            return num + \"/\" + den + \" = \" + \"Infinity\";\n        else\n            return num + \"/\" + den + \" = \" + res;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = List.of(new Division(100, 4), new Division(27, 0), new Division(25, 5));\n        list.forEach(d -&gt; d.divide()); //Line n1\n        list.forEach(d -&gt; System.out.println(d)); //Line n2\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["<p>100/4 = 25</p><p>27/0 = Infinity</p><p>25/5 = 5</p>", "<p>100/4 = 25</p><p>27/0 = 0</p><p>25/5 = 5</p>", "Compilation error", "On execution Test class throws an exception"], "explanation": "<p><strong>UKOCP84792: </strong></p><p>There is no compilation error in the given code. </p><p><br></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>Given statement: </p><p>var list = List.of(new Division(100, 4), new Division(27, 0), new Division(25, 5)); =&gt; list refers to a List of Division type. </p><p><br></p><p>Static List.of() overloaded methods were added in Java 9 and these return an unmodifiable list containing passed elements. So, above list object referred by 'list' is unmodifiable. It is not allowed to invoke add/remove/set methods on the list object returned by List.of() method (no compilation error but an exception is thrown at runtime on invoking add/remove/set methods on list reference) but 3 Division instances are modifiable. </p><p><br></p><p>Iterable&lt;T&gt; interface has forEach(Consumer&lt;? super T&gt;) method. List&lt;E&gt; extends Collection&lt;E&gt; &amp; Collection&lt;E&gt; extends Iterable&lt;E&gt;, therefore forEach(Consumer&lt;? super T&gt;) can easily be invoked on reference variable of List&lt;E&gt; type.</p><p>As Consumer is a Functional Interface, hence a lambda expression can be passed as argument to forEach() method.&nbsp; </p><p>f
