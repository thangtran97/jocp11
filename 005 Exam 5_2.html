  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 94384859, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Exception is thrown at runtime", "A\\B\\C\\Book.java", "A\\B\\C", "F:\\A\\B\\C\\Book.java"], "question": "<p><strong>Question ID: UKOCP40235</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        System.out.println(path.subpath(1,5));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP40235: </strong></p><p>Root folder or drive is not considered in count and indexing. In the given path A is at 0th index, B is at 1st index, C is at 2nd index and Book.java is at 3rd index. </p><p><br></p><p>In 'subpath(int beginIndex, int endIndex)' method beginIndex in inclusive and endIndex is exclusive. So, in the given question, starting index is 1 and end index is 4. In the given path there is no element at the 4th index, hence an exception is thrown at runtime. </p><p><br></p><p>In fact, subpath(int beginIndex, int endIndex) throws IllegalArgumentException if 'beginIndex &gt;= No. of path elements', 'endIndex &gt; No. of path elements' and 'endIndex &lt;= beginIndex'. </p>"}, "correct_response": ["a"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP40235Given code: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        System.out.println(path.subpath(1,5));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384835, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP71497</strong></p><p><br></p><p>Given: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.function.Supplier;\n\nclass Document {\n    void printAuthor() {\n        System.out.println(\"Document-Author\");\n    }\n}\n\nclass RFP extends Document {\n    @Override\n    void printAuthor() {\n        System.out.println(\"RFP-Author\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        check(Document::new);\n        check(RFP::new);\n    }\n    \n    private static void check(______________ supplier) {\n        supplier.get().printAuthor();\n    }\n}</pre><p><br></p><p>Given options to fill the blanks:</p><p><code>Supplier&lt;Document&gt;</code></p><p><code>Supplier&lt;? extends Document&gt;</code></p><p><code>Supplier&lt;? super Document&gt;</code></p><p><code>Supplier&lt;RFP&gt;</code></p><p><code>Supplier&lt;? extends RFP&gt;</code></p><p><code>Supplier&lt;? super RFP&gt;</code></p><p><code>Supplier</code></p><p><br></p><p>How many of the above options can fill the blank space, such that output is:</p><p>Document-Author</p><p>RFP-Author</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP71497: </strong></p><p>Blank space of check(______________ supplier) method needs to be filled such that check(...) method compiles, two statements invoking check(...) method compile and output is:</p><p>Document-Author</p><p>RFP-Author</p><p><br></p><p>'Document::new' is same as '() -&gt; {return new Document();}' and 'RFP::new' is same as '() -&gt; {return new RFP();}' and as these are the implementations of get method of Supplier interface, hence let's check all the options one by one:</p><p>1. Supplier&lt;Document&gt;:- Method parameter will be initialized as: </p><p>Supplier&lt;Document&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;Document&gt; supplier = () -&gt; {return new RFP();};</p><p>No issues as get() method either returns Document or RFP instance.</p><p><br></p><p>2. Supplier&lt;? extends Document&gt;:- Method parameter will be initialize as: </p><p>Supplier&lt;? extends Document&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? extends Document&gt; supplier = () -&gt; {return new RFP();};</p><p><br></p><p>If target type is a wildcard-parameterized functional interface, then type inference of lambda expression is based on following from the JLS:</p><p>If T is a wildcard-parameterized functional interface type and the lambda expression is implicitly typed, then the ground target type is the non-wildcard parameterization of T.</p><p>Based on above JLS statement, ground target type of above lambda expression will be: Supplier&lt;Document&gt; and this means above expression is equivalent to: </p><p>Supplier&lt;? extends Document&gt; supplier = (Supplier&lt;Document&gt;)() -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? extends Document&gt; supplier = (Supplier&lt;Document&gt;)() -&gt; {return new RFP();};</p><p>No issues as get() method either returns Document or RFP instance.</p><p><br></p><p>3. Supplier&lt;? super Document&gt;:- Method parameter will be initialize as: </p><p>Supplier&lt;? super Document&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? super Document&gt; supplier = () -&gt; {return new RFP();};</p><p>Based on above JLS statement, ground target type of above lambda expression will be: Supplier&lt;Document&gt; and this means above expression is equivalent to: </p><p>Supplier&lt;? super Document&gt; supplier = (Supplier&lt;Document&gt;)() -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? super Document&gt; supplier = (Supplier&lt;Document&gt;)() -&gt; {return new RFP();};</p><p>There is no issue with lambda expressions (method invocation) but get() method would return an Object type and invoking printAuthor() method on Object type is not possible. Hence compilation error.</p><p><br></p><p>4. Supplier&lt;RFP&gt;:- Method parameter will be initialized as: </p><p>Supplier&lt;RFP&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;RFP&gt; supplier = () -&gt; {return new RFP();};</p><p>1st statement causes compilation failure.</p><p><br></p><p>5. Supplier&lt;? extends RFP&gt;:- Method parameter will be initialized as: </p><p>Supplier&lt;? extends RFP&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? extends RFP&gt; supplier = () -&gt; {return new RFP();};</p><p>Based on above JLS statement, ground target type of above lambda expression will be: Supplier&lt;RFP&gt; and this means above expression is equivalent to: </p><p>Supplier&lt;? extends RFP&gt; supplier = (Supplier&lt;RFP&gt;)() -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? extends RFP&gt; supplier = (Supplier&lt;RFP&gt;)() -&gt; {return new RFP();};</p><p>2nd statement compiles successfully but 1st statement fails to compile. </p><p><br></p><p>6. Supplier&lt;? super RFP&gt;:- Method parameter will be initialized as: </p><p>Supplier&lt;? super RFP&gt; supplier = () -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? super RFP&gt; supplier = () -&gt; {return new RFP();};</p><p>Based on above JLS statement, ground target type of above lambda expression will be: Supplier&lt;RFP&gt; and this means above expression is equivalent to: </p><p>Supplier&lt;? super RFP&gt; supplier = (Supplier&lt;RFP&gt;)() -&gt; {return new Document();};</p><p>or</p><p>Supplier&lt;? super RFP&gt; supplier = (Supplier&lt;RFP&gt;)() -&gt; {return new RFP();};</p><p>1st statement fails to compile. There is no issue with the lambda expression of 2nd statement (method invocation) but get() method would return an Object type and invoking printAuthor() method on Object type is not possible. Hence compilation error.</p><p><br></p><p>7. Supplier:- Doesn't compile as raw type's get() method returns Object type, so printAuthor() method can't be invoked.</p><p><br></p><p>Hence out of given 7 options, only two options 'Supplier&lt;Document&gt;' and 'Supplier&lt;? extends Document&gt;' will give the desired output.</p>", "answers": ["Only one option", "Only two options", "Only three options", "More than three options"]}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP71497Given: package com.udayankhattry.ocp;\n\nimport java.util.function.Supplier;\n\nclass Document {\n    void printAuthor() {\n        System.out.println(\"Document-Author\");\n    }\n}\n\nclass RFP extends Document {\n    @Override\n    void printAuthor() {\n        System.out.println(\"RFP-Author\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        check(Document::new);\n        check(RFP::new);\n    }\n    \n    private static void check(______________ supplier) {\n        supplier.get().printAuthor();\n    }\n}Given options to fill the blanks:Supplier&lt;Document&gt;Supplier&lt;? extends Document&gt;Supplier&lt;? super Document&gt;Supplier&lt;RFP&gt;Supplier&lt;? extends RFP&gt;Supplier&lt;? super RFP&gt;SupplierHow many of the above options can fill the blank space, such that output is:Document-AuthorRFP-Author", "related_lectures": []}, {"_class": "assessment", "id": 94384837, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["BooleanConsumer", "BooleanSupplier", "BooleanPredicate", "BooleanFunction"], "question": "<p><strong>Question ID: UKOCP49593</strong></p><p><br></p><p>Which of the following is the only Functional interface available for boolean primitive type?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP49593: </strong></p><p>There is only BooleanSupplier available in JDK 11.</p>"}, "correct_response": ["b"], "section": "6.3 Lambda Expressions: Built-in FI", "question_plain": "Question ID: UKOCP49593Which of the following is the only Functional interface available for boolean primitive type?", "related_lectures": []}, {"_class": "assessment", "id": 94384839, "assessment_type": "multiple-choice", "prompt": {"answers": ["[100, 7, 50, 17, 10, 5]", "[100, 50, 10]", "[7, 17, 5]", "Compilation error", "Runtime Exception"], "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP48211: </strong></p><p>removeIf(Predicate&lt;? super E&gt; filter) method was added as a default method in Collection&lt;E&gt; interface in JDK 8 and it removes all the elements of this collection that satisfy the given predicate. </p><p>Interface java.util.function.Predicate&lt;T&gt; declares below non-overriding abstract method:</p><p>boolean test(T t);</p><p><br></p><p>Lambda expression passed to removeIf(Predicate) method is: `a -&gt; a % 10 == 0` and is a valid lambda expression for Predicate&lt;Integer&gt; interface.</p><p><br></p><p>Predicate's test method returns true for all the Integers divisible by 10, so all the list elements which are divisible by 10 (100, 50 and 10] are successfully removed by removeIf(Predicate) method. </p><p><br></p><p>`System.out.println(list);` prints remaining elements of the list and hence output is: [7, 17, 5]</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP48211</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(100);\n        list.add(7);\n        list.add(50);\n        list.add(17);\n        list.add(10);\n        list.add(5);\n        \n        list.removeIf(a -&gt; a % 10 == 0);\n        \n        System.out.println(list);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["c"], "section": "6.4 Lambda Expressions: Collection API", "question_plain": "Question ID: UKOCP48211Given code: package com.udayankhattry.ocp;\n\nimport java.util.ArrayList;\nimport java.util.List;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = new ArrayList&lt;&gt;();\n        list.add(100);\n        list.add(7);\n        list.add(50);\n        list.add(17);\n        list.add(10);\n        list.add(5);\n        \n        list.removeIf(a -&gt; a % 10 == 0);\n        \n        System.out.println(list);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384841, "assessment_type": "multiple-choice", "prompt": {"answers": ["2.4.5.", "1.1.1.", "1.2.3.", "1.2.3.4.5.", "1.1.1.1.1."], "feedbacks": ["", "", "", "", ""], "question": "<p><strong>Question ID: UKOCP49537</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = Arrays.asList(-80, 100, -40, 25, 200);\n        Predicate&lt;Integer&gt; predicate = num -&gt; {\n            int ctr = 1;\n            boolean result = num &gt; 0;\n            System.out.print(ctr++ + \".\");\n            return result;\n        };\n\n        list.stream()\n            .filter(predicate)\n            .count();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP49537: </strong></p><p>count() is terminal operation and as filter is used, hence it needs all the elements of the stream to return the result. So, all the stream elements will be processed.</p><p><br></p><p>list.stream() =&gt; [-80, 100, -40, 25, 200]. </p><p>NOTE: a new instance of Predicate is used, hence every time ctr will be initialize to 1. </p><p>For -80, Output is '1.' but predicate returns false, hence element is not included. </p><p>For 100, '1.' is appended to previous output, so on console you will see '1.1.' and predicate returns true, hence element is included. </p><p>You don't have to count the filtered elements as result of count() is not printed. </p><p>As 5 elements in the stream so final output will be: '1.1.1.1.1.'</p>"}, "correct_response": ["e"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP49537Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.List;\nimport java.util.function.Predicate;\n\npublic class Test {\n    public static void main(String[] args) {\n        List&lt;Integer&gt; list = Arrays.asList(-80, 100, -40, 25, 200);\n        Predicate&lt;Integer&gt; predicate = num -&gt; {\n            int ctr = 1;\n            boolean result = num &gt; 0;\n            System.out.print(ctr++ + \".\");\n            return result;\n        };\n\n        list.stream()\n            .filter(predicate)\n            .count();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384843, "assessment_type": "multiple-choice", "prompt": {"answers": ["Optional.empty", "Optional[null]", "Optional[0]", "NullPointerException is thrown at runtime"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP42931: </strong></p><p>Optional&lt;T&gt; class has below method: </p><p>public static &lt;T&gt; Optional&lt;T&gt; ofNullable(T value) {...} </p><p>It returns an Optional describing the given value, if non-null, otherwise returns an empty Optional.</p><p><br></p><p>In this case, as passed argument is null, ofNullable method creates an empty Optional object.</p><p>Optional.empty is printed on to the console for empty Optional.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP42931</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Optional.ofNullable(null);\n        System.out.println(optional);\n    }\n}</pre><p><br></p><p>What is the result?</p>"}, "correct_response": ["a"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP42931Given code: package com.udayankhattry.ocp;\n\nimport java.util.Optional;\n\npublic class Test {\n    public static void main(String[] args) {\n        Optional&lt;Integer&gt; optional = Optional.ofNullable(null);\n        System.out.println(optional);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384845, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "feedbacks": ["", "", "", ""], "answers": ["<p>Seoul</p><p>Tokyo</p><p>Paris</p><p>London</p><p>Hong Kong</p><p>Singapore</p>", "<p>Hong Kong</p><p>London</p><p>Paris</p><p>Seoul</p><p>Singapore</p><p>Tokyo</p>", "<p>Tokyo</p><p>Singapore</p><p>Seoul</p><p>Paris</p><p>London</p><p>Hong Kong</p>", "Compilation error"], "question": "<p><strong>Question ID: UKOCP85607</strong></p><p><br></p><p>Given code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] cities = {\"Seoul\", \"Tokyo\", \"Paris\", \"London\",\n            \"Hong Kong\", \"Singapore\"};\n        Arrays.stream(cities)\n            .sorted((s1,s2) -&gt; s2.compareTo(s1))\n            .forEach(System.out::println);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP85607: </strong></p><p>Arrays class has overloaded stream(...) method to convert arrays to Stream. </p><p>sorted(...) method of Stream interface is also overloaded: sorted() =&gt; sorts on natural order and sorted(Comparator) =&gt; sorts on passed Comparator. </p><p><br></p><p>sorted((s1,s2) -&gt; s2.compareTo(s1)) =&gt; sorts on descending order.&nbsp; </p><p><br></p><p>forEach(System.out::println); =&gt; Prints all the Stream data.</p>"}, "correct_response": ["c"], "section": "6.5 Stream API: filter, transform and process data", "question_plain": "Question ID: UKOCP85607Given code:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        String [] cities = {\"Seoul\", \"Tokyo\", \"Paris\", \"London\",\n            \"Hong Kong\", \"Singapore\"};\n        Arrays.stream(cities)\n            .sorted((s1,s2) -&gt; s2.compareTo(s1))\n            .forEach(System.out::println);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384847, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "answers": ["15", "Runtime Exception", "Compilation error"], "explanation": "<p><strong>UKOCP66404: </strong></p><p>Generic Stream&lt;T&gt; interface has following methods: </p><p>Optional&lt;T&gt; min(Comparator&lt;? super T&gt; comparator);</p><p>Optional&lt;T&gt; max(Comparator&lt;? super T&gt; comparator);</p><p><br></p><p>Primitive Stream interfaces (IntStream, LongStream &amp; DoubleStream) has methods min(), max(), sum(), average() and summaryStatistics().&nbsp; </p><p><br></p><p>In this case, as stream is a generic interface, hence stream.sum() causes compilation error.</p>", "question": "<p><strong>Question ID: UKOCP66404</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Integer&gt; stream = Arrays.asList(1,2,3,4,5).stream();\n        System.out.println(stream.sum());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": ""}, "correct_response": ["c"], "section": "6.6 Stream API: Primitive Streams", "question_plain": "Question ID: UKOCP66404Given code: package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\nimport java.util.stream.Stream;\n\npublic class Test {\n    public static void main(String[] args) {\n        Stream&lt;Integer&gt; stream = Arrays.asList(1,2,3,4,5).stream();\n        System.out.println(stream.sum());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384849, "assessment_type": "multiple-choice", "prompt": {"answers": ["[{S001, OCA, 87}, {S002, OCA, 82}, {S003, OCA, 60}, {S004, OCA, 88}]", "[]", "[{S001, OCA, 87}, {S002, OCA, 82}, {S001, OCP, 79}, {S002, OCP, 89}, {S003, OCA, 60}, {S004, OCA, 88}]", "[{S001, OCP, 79}, {S002, OCP, 89}]"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP69923: </strong></p><p>Rest of the code is very simple, let us concentrate on partitioning code. </p><p><br></p><p>Collectors.partitioningBy(s -&gt; s.equals(\"OCA\")) =&gt; s in this lambda expression is of Certification type and not String type. </p><p>This means predicate `s -&gt; s.equals(\"OCA\")` will return false for \"OCA\". None of the certification object will return true and hence no element will be stored against 'true'. </p><p>[] will be printed in the output.</p><p>All the elements, in this case, will be stored against false.</p><p><br></p><p>Correct predicate will be: `s -&gt; s.getTest().equals(\"OCA\")`. </p><p>For above predicate, output for `System.out.println(map.get(true));` will be: </p><p>[{S001, OCA, 87}, {S002, OCA, 82}, {S003, OCA, 60}, {S004, OCA, 88}]</p>", "question": "<p><strong>Question ID: UKOCP69923</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\nclass Certification {\n    String studId;\n    String test;\n    int marks;\n\n    Certification(String studId, String test, int marks) {\n        this.studId = studId;\n        this.test = test;\n        this.marks = marks;\n    }\n\n    public String toString() {\n        return \"{\" + studId + \", \" + test + \", \" + marks + \"}\";\n    }\n\n    public String getStudId() {\n        return studId;\n    }\n\n    public String getTest() {\n        return test;\n    }\n\n    public int getMarks() {\n        return marks;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Certification c1 = new Certification(\"S001\", \"OCA\", 87);\n        Certification c2 = new Certification(\"S002\", \"OCA\", 82);\n        Certification c3 = new Certification(\"S001\", \"OCP\", 79);\n        Certification c4 = new Certification(\"S002\", \"OCP\", 89);\n        Certification c5 = new Certification(\"S003\", \"OCA\", 60);\n        Certification c6 = new Certification(\"S004\", \"OCA\", 88);\n\n        Stream&lt;Certification&gt; stream = Stream.of(c1, c2, c3, c4, c5, c6);\n        Map&lt;Boolean, List&lt;Certification&gt;&gt; map =\n            stream.collect(Collectors.partitioningBy(s -&gt; s.equals(\"OCA\")));\n        System.out.println(map.get(true));\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "6.7 Stream API: reduction, grouping and partitioning", "question_plain": "Question ID: UKOCP69923Given code: package com.udayankhattry.ocp;\n\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\nimport java.util.stream.Stream;\n\nclass Certification {\n    String studId;\n    String test;\n    int marks;\n\n    Certification(String studId, String test, int marks) {\n        this.studId = studId;\n        this.test = test;\n        this.marks = marks;\n    }\n\n    public String toString() {\n        return \"{\" + studId + \", \" + test + \", \" + marks + \"}\";\n    }\n\n    public String getStudId() {\n        return studId;\n    }\n\n    public String getTest() {\n        return test;\n    }\n\n    public int getMarks() {\n        return marks;\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Certification c1 = new Certification(\"S001\", \"OCA\", 87);\n        Certification c2 = new Certification(\"S002\", \"OCA\", 82);\n        Certification c3 = new Certification(\"S001\", \"OCP\", 79);\n        Certification c4 = new Certification(\"S002\", \"OCP\", 89);\n        Certification c5 = new Certification(\"S003\", \"OCA\", 60);\n        Certification c6 = new Certification(\"S004\", \"OCA\", 88);\n\n        Stream&lt;Certification&gt; stream = Stream.of(c1, c2, c3, c4, c5, c6);\n        Map&lt;Boolean, List&lt;Certification&gt;&gt; map =\n            stream.collect(Collectors.partitioningBy(s -&gt; s.equals(\"OCA\")));\n        System.out.println(map.get(true));\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384851, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "answers": ["-1", "0", "4", "2", "6"], "question": "<p><strong>Question ID: UKOCP87326</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.stream.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var stream = Stream.of(\"SON\", \"WIFE\", \"MOTHER\", \"FATHER\", \"UNCLE\", \"DAUGHTER\");\n        var map = stream.parallel()\n                    .collect(Collectors.groupingByConcurrent(s -&gt; s.length() &gt; 4));\n        System.out.println(map.get(false).size());\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP87326: </strong></p><p>Variable 'stream' infers to Stream&lt;String&gt; and variable 'map' infers to ConcurrentMap&lt;Boolean, List&lt;String&gt;&gt;. </p><p>Please note, Collectors.groupingByConcurrent(...) returns a concurrent and unordered Collector whereas, Collectors.groupingBy(...) returns a non-concurrent and ordered (based on encounter order) Collector.</p><p>All the stream values will be divided among two keys: true and false. </p><p>Strings with length &gt; 4 will be stored against true and Strings with length &lt;= 4 will be stored against false. </p><p>Therefore, map object will have below entries: </p><p>{false=[SON, WIFE], true=[MOTHER, FATHER, UNCLE, DAUGHTER]} [Please note order of elements will be different]</p><p>Output of `System.out.println(map.get(false).size());` will be 2.</p>"}, "correct_response": ["d"], "section": "6.8 Stream API: Parallel Streams", "question_plain": "Question ID: UKOCP87326Given code: package com.udayankhattry.ocp;\n\nimport java.util.stream.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var stream = Stream.of(\"SON\", \"WIFE\", \"MOTHER\", \"FATHER\", \"UNCLE\", \"DAUGHTER\");\n        var map = stream.parallel()\n                    .collect(Collectors.groupingByConcurrent(s -&gt; s.length() &gt; 4));\n        System.out.println(map.get(false).size());\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384853, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP61187</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.CopyOnWriteArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new CopyOnWriteArrayList&lt;String&gt;();\n        list.add(\"Melon\");\n        list.add(\"Apple\");\n        list.add(\"Banana\");\n        list.add(\"Mango\");\n        for(String s : list) {\n            list.removeIf(str -&gt; str.startsWith(\"M\"));\n            System.out.println(s);\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP61187: </strong></p><p>Variable 'list' infers to CopyOnWriteArrayList&lt;String&gt; type.</p><p>removeIf method accepts Predicate, hence no compilation error. </p><p>Enhanced for loop uses an internal iterator and as CopyOnWriteArrayList is used, add/set/remove operations while iterating doesn't cause any exception. </p><p><br></p><p>In first iteration, removeIf method removes 'Melon' and 'Mango' from the list. On every modification, a fresh copy of underlying array is created, leaving the iterator object unchanged. 'Melon' is printed on to the console. </p><p><br></p><p>In 2nd iteration, removeIf method doesn't remove anything as list doesn't contain any element starting with 'M'. But iterator still has 4 elements. 2nd iteration prints 'Apple' on to the console. And so on.</p><p><br></p><p>Output is: </p><p>Melon</p><p>Apple</p><p>Banana</p><p>Mango</p>", "answers": ["<p>Melon</p><p>Apple</p><p>Banana</p><p>Mango</p>", "<p>Apple</p><p>Banana</p>", "<p>Melon</p><p>Apple</p><p>Banana</p>", "An exception is thrown at runtime", "Compilation error"]}, "correct_response": ["a"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP61187Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.CopyOnWriteArrayList;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = new CopyOnWriteArrayList&lt;String&gt;();\n        list.add(\"Melon\");\n        list.add(\"Apple\");\n        list.add(\"Banana\");\n        list.add(\"Mango\");\n        for(String s : list) {\n            list.removeIf(str -&gt; str.startsWith(\"M\"));\n            System.out.println(s);\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384855, "assessment_type": "multiple-choice", "prompt": {"answers": ["10 10", "10 12", "10 a", "10", "Runtime Exception"], "feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP39225</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">public class Test {\n    public static void main(String[] args) {\n        var console = System.console();\n        if(console != null) {\n            console.format(\"%d %x\", 10);\n        }\n    }\n}</pre><p><br></p><p>And the command:</p><p><code>java Test.java</code></p><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP39225: </strong></p><p>Starting with JDK 11, it is possible to launch single-file source-code Programs. </p><p>If you execute 'java --help' command, you would find below option was added for Java 11:</p><p>java [options] &lt;sourcefile&gt; [args]</p><p>&nbsp; &nbsp; (to execute a single source-file program)</p><p>&nbsp; &nbsp; </p><p>Single-file program is the file where the whole program fits in a single source file and it is very useful in the early stages of learning Java. </p><p><br></p><p>The effect of `java Test.java` command is that the source file is compiled into memory and the first class found in the source file is executed. Hence `java Test.java` is equivalent to (but not exactly same as): </p><p><br></p><p>javac -d &lt;memory&gt; Test.java</p><p>java -cp &lt;memory&gt; Test</p><p><br></p><p>console.format(\"%d %x\", 10); =&gt; There are 2 format specifiers (%d and %x) in the format string but only one argument (10) is passed. </p><p>MissingFormatArgumentException is thrown at runtime. </p><p><br></p><p>NOTE: console.format(...) and console.printf(...) methods are same. In fact, printf(...) method invokes format(...) method. </p>"}, "correct_response": ["e"], "section": "9.1 Java I/O API: Read and write console data", "question_plain": "Question ID: UKOCP39225Given code of Test.java file: public class Test {\n    public static void main(String[] args) {\n        var console = System.console();\n        if(console != null) {\n            console.format(\"%d %x\", 10);\n        }\n    }\n}And the command:java Test.javaWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384857, "assessment_type": "multiple-choice", "prompt": {"answers": ["Yes", "No"], "feedbacks": ["", ""], "explanation": "<p><strong>UKOCP43703: </strong></p><p>It is very interesting question and frequently asked in interviews as well. </p><p><br></p><p>Variable 'fis' infers to FileInputStream, variable 'fos' infers to FileOutputStream and variable 'arr' infers to byte[] type.</p><p><br></p><p>Initially length of 'arr' is 500000 and all the elements are initialized with 0. </p><p>There are 2 options:&nbsp; </p><p>1. 'orig.png' file's size is way less than 500000, say 100000 bytes only. This means only 100000 array elements will be replaced and rest will remain 0. </p><p>fos.write(arr); =&gt; Writes whole array to the stream/file, which means along with 100000 data bytes, 400000 extra bytes will also be written. In this case above code can't produce exact copy.&nbsp; </p><p><br></p><p>2. 'copy.png' file's size is not multiple of 500000, say 700000 bytes only. </p><p>1st invocation of 'fis.read(arr)' will populate all 500000 elements with data and 'fos.write(arr);' will correctly write first 500000 bytes to 'copy.png' file. </p><p>2nd invocation of 'fis.read(arr)' will replace 200000 elements with remaining data and leaving 300000 with the data read from previous read operation. This means 'fos.write(arr);' on 2nd invocation will write 300000 extra bytes. So for this case as well, above code cannot produce exact copy. </p><p><br></p><p>Solution is very simple. Use the overloaded version of write method. </p><p><br></p><p>res stores the number of bytes read into the arr. So to get exact copy replace line 12 with `fos.write(arr, 0, res);`.</p>", "question": "<p><strong>Question ID: UKOCP43703</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        try (var fis = new FileInputStream(\"F:\\\\orig.png\");\n             var fos = new FileOutputStream(\"F:\\\\copy.png\")) {\n            int res;\n            var arr = new byte[500000]; //Line 10\n            while((res = fis.read(arr)) != -1){ //Line 11\n                fos.write(arr); //Line 12\n            }\n        }\n    }\n}</pre><p>F: is accessible for reading/writing and contains 'orig.png' file. </p><p><br></p><p>Will above code create exact copy of 'orig.png' file?</p>", "relatedLectureIds": ""}, "correct_response": ["b"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP43703Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        try (var fis = new FileInputStream(\"F:\\\\orig.png\");\n             var fos = new FileOutputStream(\"F:\\\\copy.png\")) {\n            int res;\n            var arr = new byte[500000]; //Line 10\n            while((res = fis.read(arr)) != -1){ //Line 11\n                fos.write(arr); //Line 12\n            }\n        }\n    }\n}F: is accessible for reading/writing and contains 'orig.png' file. Will above code create exact copy of 'orig.png' file?", "related_lectures": []}, {"_class": "assessment", "id": 94384833, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "answers": ["One definition only", "Two definitions only", "Three definitions only", "All four definitions"], "explanation": "<p><strong>UKOCP70198: </strong></p><p>Following points are deduced by the given code:</p><p>1. By looking at the statement, ObjectCreator&lt;Integer&gt; obj = Integer::valueOf; you can say that interface name should be ObjectCreator and it should be a generic interface.&nbsp; </p><p>2. Expression obj.create(\"603\") tells that single abstract method (SAM) of interface should be named as \"create\" and it should specify one String parameter. </p><p>3. As obj.create(\"603\") is used as an argument of println method, this means return type of create method can't be void. It should return some object. </p><p>4. Integer.valueOf(String) method of Integer class converts String to an Integer, so static method reference Integer::valueOf refers to this method. This means obj.create(\"603\") should return an Integer object.</p><p><br></p><p>Based on above deduction correct options are: 2, 3 and 4.</p>", "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP70198</strong></p><p><br></p><p>Consider below code:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        ObjectCreator&lt;Integer&gt; obj = Integer::valueOf;\n        System.out.println(obj.create(\"603\"));\n    }\n}</pre><p><br></p><p>and the given definitions of Functional interface:</p><p>1. </p><pre class=\"prettyprint linenums\">interface ObjectCreator {\n    Integer create(String str);\n}</pre><p>2. </p><pre class=\"prettyprint linenums\">interface ObjectCreator&lt;T&gt; {\n    T create(String str);\n}</pre><p>3. </p><pre class=\"prettyprint linenums\">interface ObjectCreator&lt;T extends Integer&gt; {\n    T create(String str);\n}</pre><p>4. </p><pre class=\"prettyprint linenums\">interface ObjectCreator&lt;T extends Number&gt; {\n    T create(String str);\n}</pre><p><br></p><p>How many of the above functional interface definitions can be used here, so that the output of above code is: 603?</p>"}, "correct_response": ["c"], "section": "6.2 Lambda Expressions: Method References", "question_plain": "Question ID: UKOCP70198Consider below code:package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        ObjectCreator&lt;Integer&gt; obj = Integer::valueOf;\n        System.out.println(obj.create(\"603\"));\n    }\n}and the given definitions of Functional interface:1. interface ObjectCreator {\n    Integer create(String str);\n}2. interface ObjectCreator&lt;T&gt; {\n    T create(String str);\n}3. interface ObjectCreator&lt;T extends Integer&gt; {\n    T create(String str);\n}4. interface ObjectCreator&lt;T extends Number&gt; {\n    T create(String str);\n}How many of the above functional interface definitions can be used here, so that the output of above code is: 603?", "related_lectures": []}, {"_class": "assessment", "id": 94384861, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP29442: </strong></p><p>Path is an abstract path and farthest element can be a file or directory.&nbsp; </p><p><br></p><p>Variable 'src' infers to Path type and refers to Path object, F:\\\\A\\\\B\\\\C\\\\Book.java and its farthest element, 'Book.java' is a file (and it exists).&nbsp; &nbsp;</p><p><br></p><p>Variable 'tgt' infers to Path type and refers to Path object, F:\\\\A\\\\B and its farthest element, 'B' is a directory (and it exists).&nbsp; </p><p><br></p><p>Files.copy(src, tgt) copies the farthest element. 'Book.java' can't be copied to 'B' as it is a directory and it is not allowed to have file and directory of same name to be present at same location. Hence, java.nio.file.FileAlreadyExistsException is thrown at runtime.&nbsp; </p><p><br></p><p>If you change tgt to Paths.get(\"F:\\\\A\\\\C\\\\\"); then 'Files.copy(src, tgt);' will successfully copy 'Book.java' to 'C' ('C' will be a file in that case, containing the contents from 'Book.java' file). </p>", "answers": ["java.io.FileNotFoundException is thrown at runtime", "java.nio.file.FileAlreadyExistsException is thrown at runtime", "Program terminates successfully without copying &#39;Book.java&#39; file", "&#39;Book.java&#39; will be copied successfully to &#39;F:\\A\\B\\&#39; directory"], "question": "<p><strong>Question ID: UKOCP29442</strong></p><p><br></p><p>Below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.java</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        var tgt = Paths.get(\"F:\\\\A\\\\B\");\n        Files.copy(src, tgt);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>"}, "correct_response": ["b"], "section": "9.5 Java I/O API: java.nio.file API: Files", "question_plain": "Question ID: UKOCP29442Below is the directory structure for F:F:.\n\u2514\u2500\u2500\u2500A\n    \u2514\u2500\u2500\u2500B\n        \u2514\u2500\u2500\u2500C\n                Book.javaGiven code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var src = Paths.get(\"F:\\\\A\\\\B\\\\C\\\\Book.java\");\n        var tgt = Paths.get(\"F:\\\\A\\\\B\");\n        Files.copy(src, tgt);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 94384863, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["An exception is thrown at runtime", "Record corresponding to ID 101 is deleted successfully", "Record corresponding to ID 102 is deleted successfully", "Record corresponding to ID 103 is deleted successfully", "Record corresponding to ID 104 is deleted successfully"], "question": "<p><strong>Question ID: UKOCP42037</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement();\n             var rs = stmt.executeQuery(query);) {\n            rs.absolute(3);\n            rs.relative(-1);\n            rs.deleteRow();\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP42037: </strong></p><p>Variables 'url', 'user', 'password' and 'query' infer to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>`con.createStatement();` would return the Statement object of type TYPE_FORWARD_ONLY and have a concurrency level of CONCUR_READ_ONLY. Hence, by default ResultSet is not updatable.&nbsp; </p><p><br></p><p>`rs.deleteRow();` throws an exception at runtime. </p><p><br></p><p>To update the ResultSet in any manner (insert, update or delete), the ResultSet must come from a Statement that was created with a ResultSet type of ResultSet.CONCUR_UPDATABLE. </p><p><br></p><p>NOTE: If you want to successfully delete the row, then replace `con.createStatement();` with `con.createStatement(ResultSet.TYPE_SCROLL_SENSITIVE, ResultSet.CONCUR_UPDATABLE);` </p><p>OR </p><p>`con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_UPDATABLE);`</p><p><br></p><p>If you use, `con.createStatement(ResultSet.TYPE_FORWARD_ONLY, ResultSet.CONCUR_UPDATABLE);`, then </p><p>`rs.absolute(3);` and `rs.relative(-1);` would throw an exception at runtime.</p>"}, "correct_response": ["a"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP42037Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var user = \"root\";\n        var password = \"password\";\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, user, password);\n             var stmt = con.createStatement();\n             var rs = stmt.executeQuery(query);) {\n            rs.absolute(3);\n            rs.relative(-1);\n            rs.deleteRow();\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384865, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["101", "102", "103", "104"], "question": "<p><strong>Question ID: UKOCP83804</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.afterLast();\n            rs.relative(-1);\n            rs.previous();\n            System.out.println(rs.getInt(1));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL, username and password are correct.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP83804: </strong></p><p>Variable 'url' infers to String type, variable 'prop' infers to Properties type, variable 'query' infers to String type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>As credentials are passed as java.util.Properties so user name should be passed as \"user\" property and password should be passed as \"password\" property. </p><p><br></p><p>In the given code, correct property names 'user' and 'password' are used. As URL and DB credentials are correct, hence no issues in connecting the database.&nbsp; </p><p><br></p><p>Given query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000    \n102 Sean    Smith   15000    \n103 Regina  Williams    15500    \n104 Natasha George  14600    </pre><p><br></p><p>`rs.afterLast();` moves the cursor after 4th record.&nbsp; </p><p>`rs.relative(-1);` moves the cursor to the 4th record.&nbsp; </p><p>`rs.previous();` moves the cursor to the 3rd record. </p><p>`rs.getInt(1)` returns 103.</p>"}, "correct_response": ["c"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP83804Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);)\n        {\n            rs.afterLast();\n            rs.relative(-1);\n            rs.previous();\n            System.out.println(rs.getInt(1));\n        }\n    }\n}Also assume: URL, username and password are correct.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384867, "assessment_type": "multi-select", "prompt": {"explanation": "<p><strong>UKOCP78441: </strong></p><p>Question only talks about successful creation of Locale instance. </p><p><br></p><p>Locale class has 3 public overloaded constructors: </p><p>Locale(String language)</p><p>Locale(String language, String country)</p><p>Locale(String language, String country, String variant)</p><p><br></p><p>But constructor with no-argument and constructor that accepts another Locale instance are not available. Hence `new Locale();` and `new Locale(loc1);` cause compilation error.&nbsp; </p><p><br></p><p>Passing blank string is OK and Locale objects are successfully created. </p><p><br></p><p>NOTE: If you pass null as argument to any of the overloaded constructors, then NullPointerException will be thrown and Locale objects will not be created in that case. </p>", "answers": ["<p><code>Locale loc1 = new Locale();</code> </p>", "<p><code>Locale loc2 = new Locale(loc1);</code> </p>", "<p><code>Locale loc3 = new Locale(\"\");</code> </p>", "<p><code>Locale loc4 = new Locale(\"\", \"\");</code> </p>", "<p><code>Locale loc5 = new Locale(\"\", \"\", \"\");</code> </p>"], "question": "<p><strong>Question ID: UKOCP78441</strong></p><p><br></p><p>Which of the following statements successfully create a Locale instance? </p><p>Choose 3 options.</p>", "feedbacks": ["", "", "", "", ""], "relatedLectureIds": ""}, "correct_response": ["c", "d", "e"], "section": "12.1 Localization: Locale, ResourceBundle", "question_plain": "Question ID: UKOCP78441Which of the following statements successfully create a Locale instance? Choose 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 94384869, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Date is: 1987-09-01", "Date is: 1987-01-09", "Date is: 01-09-1987", "Given code executes successfully but output does not match with the given options", "Runtime exception"], "question": "<p><strong>Question ID: UKOCP82939</strong></p><p><br></p><p>Consider below code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(1987, 9, 1);\n        var str = date.format(DateTimeFormatter.ISO_DATE_TIME);\n        System.out.println(\"Date is: \" + str);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "feedbacks": ["", "", "", "", ""], "explanation": "<p><strong>UKOCP82939: </strong></p><p>Variable 'date' infers to LocalDate type and variable 'str' infers to String type.&nbsp; </p><p>LocalDate object doesn't contain time part but ISO_DATE_TIME looks for time portion and throws exception at runtime.</p><p>For the exam, you may check following DateTimeFormatter types: BASIC_ISO_DATE, ISO_DATE, ISO_LOCAL_DATE, ISO_TIME, ISO_LOCAL_TIME, ISO_DATE_TIME, ISO_LOCAL_DATE_TIME. </p>"}, "correct_response": ["e"], "section": "12.4 Localization: number, date & message formatters", "question_plain": "Question ID: UKOCP82939Consider below code: package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.format.DateTimeFormatter;\n\npublic class Test {\n    public static void main(String [] args) {\n        var date = LocalDate.of(1987, 9, 1);\n        var str = date.format(DateTimeFormatter.ISO_DATE_TIME);\n        System.out.println(\"Date is: \" + str);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384871, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "answers": ["@TrafficLight", "@TrafficLight()", "@TrafficLight(&quot;RED&quot;)", "@TrafficLight({&quot;GREEN&quot;})", "@TrafficLight(&quot;RED&quot;, &quot;ORANGE&quot;, &quot;GREEN&quot;)", "@TrafficLight({new String(&quot;Test&quot;)})", "<p>@TrafficLight(null)</p>"], "question": "<p><strong>Question ID: UKOCP10878</strong></p><p><br></p><p>Given code of TrafficLight annotation: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(ElementType.TYPE)\npublic @interface TrafficLight {\n    String [] value();\n}</pre><p><br></p><p>And code of TrafficSignal.java file: </p><pre class=\"prettyprint linenums\">/*INSERT*/\npublic class TrafficSignal{}</pre><p><br></p><p>Which of the following options can replace /*INSERT*/, such that TrafficSignal.java compiles successfully?</p><p>Choose 2 options.</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP10878: </strong></p><p>@TrafficLight</p><p>\u2717&nbsp; TrafficLight annotation has one non-default attribute 'value'. It must be specified here.</p><p><br></p><p>@TrafficLight()</p><p>\u2717&nbsp; TrafficLight annotation has one non-default attribute 'value'. It must be specified here.</p><p><br></p><p>@TrafficLight(\"RED\")</p><p>\u2713&nbsp; If the name of the attribute is 'value', then only its name can be omitted. 'value' refers to and String [] object, in this case, as there is just one element \"RED\" in the array, hence {} can also be omitted.</p><p><br></p><p>@TrafficLight({\"GREEN\"})</p><p>\u2713&nbsp; If the name of the attribute is 'value', then only its name can be omitted. 'value' refers to and String [] object, which contains just one element \"GREEN\".</p><p><br></p><p>@TrafficLight(\"RED\", \"ORANGE\", \"GREEN\")</p><p>\u2717&nbsp; If the name of the attribute is 'value', then only its name can be omitted. As, array object has 3 elements, hence {} are compulsory. Correct annotation is: @TrafficLight({\"RED\", \"ORANGE\", \"GREEN\"})</p><p><br></p><p>@TrafficLight({new String(\"RED\")})</p><p>\u2717&nbsp; Attribute value must be constant, `new String(\"RED\")` is not constant.</p><p><br></p><p>@TrafficLight(null)</p><p>\u2717&nbsp; Attribute value must be constant, null in not constant.</p>"}, "correct_response": ["c", "d"], "section": "13 Annotations: Create, apply, and process annotations", "question_plain": "Question ID: UKOCP10878Given code of TrafficLight annotation: package com.udayankhattry.ocp;\n\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.CLASS)\n@Target(ElementType.TYPE)\npublic @interface TrafficLight {\n    String [] value();\n}And code of TrafficSignal.java file: /*INSERT*/\npublic class TrafficSignal{}Which of the following options can replace /*INSERT*/, such that TrafficSignal.java compiles successfully?Choose 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 94384873, "assessment_type": "multiple-choice", "prompt": {"answers": ["List object referred by variable &#39;list&#39; is immutable", "New items can be added to the List object referred by variable &#39;list&#39;", "Existing items can be removed from the List object referred by variable &#39;list&#39;", "None of the other options"], "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP29029: </strong></p><p>java.util.Arrays.asList operates directly on the supplied array without copying. </p><p>You are not allowed to add or remove items from the list, but items can be changed. </p><p>list.remove(LocalDate.of(2023, Month.DECEMBER, 25)); //Throws UnsupportedOperationException</p><p>list.add(null); //Throws UnsupportedOperationException</p><p>list.set(0, null); //Allowed</p><p><br></p><p>As you can change the contents of List object, hence it is not immutable.</p><p><br></p><p>Check below link and section: </p><p>https://www.oracle.com/java/technologies/javase/seccodeguide.html</p><p>Guideline 6-12 / MUTABLE-12: Do not expose modifiable collections</p>", "question": "<p><strong>Question ID: UKOCP29029</strong></p><p><br></p><p>Consider below code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.Month;\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = Arrays.asList(\n                LocalDate.of(2023, Month.DECEMBER, 25), \n                LocalDate.of(2024, Month.JANUARY, 26)\n        );\n    }\n}</pre><p><br></p><p>Which of the following statement is correct?</p>", "relatedLectureIds": ""}, "correct_response": ["d"], "section": "10.1 Secure Coding in Java SE Application", "question_plain": "Question ID: UKOCP29029Consider below code: package com.udayankhattry.ocp;\n\nimport java.time.LocalDate;\nimport java.time.Month;\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        var list = Arrays.asList(\n                LocalDate.of(2023, Month.DECEMBER, 25), \n                LocalDate.of(2024, Month.JANUARY, 26)\n        );\n    }\n}Which of the following statement is correct?", "related_lectures": []}, {"_class": "assessment", "id": 94384875, "assessment_type": "multiple-choice", "prompt": {"answers": ["Compilation error in module-info.java file", "Compilation error in Main.java file", "An exception is thrown at runtime", "MODULE:REQUIRES:EXPORTS is printed on to the console"], "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP67783</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---source_files\n|   \\---com.udayan.test\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Main.java\n|\n\\---class_files</pre><p><br></p><p>Below is the code of C:\\source_files\\com.udayan.test\\module-info.java file: </p><pre class=\"prettyprint linenums\">module com.udayan.test {\n}</pre><p><br></p><p>and below is the code of C:\\source_files\\com.udayan.test\\com\\udayankhattry\\ocp\\Main.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        var module = \"MODULE\"; //Line n1\n        var requires = \"REQUIRES\"; //Line n2\n        var exports = \"EXPORTS\"; //Line n3\n        \n        System.out.println(String.join(\":\", module, requires, exports)); //Line n4\n    }\n}</pre><p><br></p><p>And the below two commands executed from C:\\</p><p><code>javac -d class_files --module-source-path source_files --module com.udayan.test</code></p><p><code>java -p class_files --module com.udayan.test/com.udayankhattry.ocp.Main</code></p><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP67783: </strong></p><p>Modules related keywords such as module, requires, exports etc. are restrictive keywords and these are treated as keywords inside module-info.java file only and can be used as valid identifiers in other java files.</p><p><br></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>At Line n1, module infers to String type.</p><p>At Line n2, requires infers to String type.</p><p>At Line n3, exports infers to String type. </p><p><br></p><p>Hence, Line n1, Line n2 and Line n3 compile successfully.</p><p><br></p><p>Static overloaded method join(...) was added in JDK 1.8 and one of the overloaded methods has below declarations:</p><p>public static String join(CharSequence delimiter, CharSequence... elements) {...}: It returns a new String composed of copies of the CharSequence elements joined together with a copy of the specified delimiter. </p><p>For example,</p><p>String.join(\".\", \"A\", \"B\", \"C\"); returns \"A.B.C\"</p><p>String.join(\"+\", new String[]{\"1\", \"2\", \"3\"}); returns \"1+2+3\"</p><p>String.join(\"-\", \"HELLO\"); returns \"HELLO\"</p><p><br></p><p>Hence, Line n4 compiles successfully. </p><p><br></p><p>It is also valid to have empty body for the module description file:</p><p>module com.udayan.test {</p><p>}</p><p><br></p><p>Module name is 'com.udayan.test' and it implicitly requires java.base module. There is no compilation error in module-info.java file as well. </p><p><br></p><p>Format of javac command is: </p><p>javac &lt;options&gt; &lt;source files&gt;</p><p><br></p><p>Below are the important options (related to modules) of javac command:</p><p>--module-source-path &lt;module-source-path&gt;: </p><p>Specify where to find input source files for multiple modules. In this case, module source path is 'source_files' directory. </p><p><br></p><p>--module &lt;module-name&gt;, -m &lt;module-name&gt;: </p><p>Compile only the specified module. This will compile all *.java file specified in the module. Multiple module names are separated by comma.</p><p><br></p><p>-d &lt;directory&gt;: </p><p>Specify where to place generated class files. In this case, it is 'class_files' directory.</p><p><br></p><p>--module-path &lt;path&gt;, -p &lt;path&gt;: </p><p>Specify where to find compiled/packaged application modules. It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries. For example, javac -p mods;singlemodule;connector.jar represents a module path which contains all the modules inside 'mods' directory, exploded module 'singlemodule' and modular jar 'connector.jar'. </p><p>It is not used in this case as given module is not dependent upon other compiled/packaged application modules.</p><p><br></p><p><br></p><p>Format of the java command related to module is: </p><p>java [options] -m &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>java [options] --module &lt;module&gt;[/&lt;mainclass&gt;] [args...]</p><p>&nbsp; &nbsp; &nbsp;(to execute the main class in a module)</p><p>&nbsp; &nbsp; &nbsp;</p><p>--module or -m: It corresponds to module name. -m should be the last option used in the command. -m is followed by module-name, then by optional mainclass and any command-line arguments. If module is packaged in the jar and 'Main-Class' attribute is set, then passing classname after -m &lt;module&gt; is optional.&nbsp; </p><p>&nbsp; &nbsp; &nbsp; </p><p>And below is the important option (related to modules) of java command:</p><p>--module-path or -p: It represents the list of directories containing modules or paths to individual modules. A platform dependent path separator (; on Windows and : on Linux/Mac) is used for multiple entries.</p><p>For example, java -p out;singlemodule;connector.jar represents a module path which contains all the modules inside 'out' directory, exploded module 'singlemodule' and modular jar 'connector.jar'.</p><p><br></p><p>There is no issues with the commands as well; MODULE:REQUIRES:EXPORTS is printed on to the console.</p>"}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP67783Given below the directory/file structure on Windows platform: C:\n+---source_files\n|   \\---com.udayan.test\n|       |   module-info.java\n|       |\n|       \\---com\n|           \\---udayankhattry\n|               \\---ocp\n|                       Main.java\n|\n\\---class_filesBelow is the code of C:\\source_files\\com.udayan.test\\module-info.java file: module com.udayan.test {\n}and below is the code of C:\\source_files\\com.udayan.test\\com\\udayankhattry\\ocp\\Main.java file: package com.udayankhattry.ocp;\n\npublic class Main {\n    public static void main(String... args) {\n        var module = \"MODULE\"; //Line n1\n        var requires = \"REQUIRES\"; //Line n2\n        var exports = \"EXPORTS\"; //Line n3\n        \n        System.out.println(String.join(\":\", module, requires, exports)); //Line n4\n    }\n}And the below two commands executed from C:\\javac -d class_files --module-source-path source_files --module com.udayan.testjava -p class_files --module com.udayan.test/com.udayankhattry.ocp.MainWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384877, "assessment_type": "multiple-choice", "prompt": {"relatedLectureIds": "", "answers": ["Compilation error for missing module elizabeth_hospital", "Code compiles but with a warning for missing module elizabeth_hospital", "Code compiles without any warning", "Compilation error in Medicines.java file"], "explanation": "<p><strong>UKOCP34870: </strong></p><p>There is no compilation error in Medicines.java file. </p><p><br></p><p>By looking at the contents of module descriptor file (module-info.java), it can be said that:</p><p>- Name of the module is: medicines</p><p>- exports com.allopathic to elizabeth_hospital; =&gt; This is known as qualified export, in which package 'com.allopathic' is made available to only named module 'elizabeth_hospital'. </p><p>If the module name, to which package is exported to (elizabeth_hospital in this case), is not available, then compiler displays the warning but compiles the code. </p><p><br></p><p>After executing the given javac command, you will have below directory/file structure:</p><pre class=\"prettyprint linenums\">C:\n+---out\n|   \\---medicines\n|       |   module-info.class\n|       |\n|       \\---com\n|           \\---allopathic\n|                   Medicines.class\n|\n\\---src\n    \\---medicines\n        |   module-info.java\n        |\n        \\---com\n            \\---allopathic\n                    Medicines.java</pre>", "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP34870</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---out\n\\---src\n    \\---medicines\n        |   module-info.java\n        |\n        \\---com\n            \\---allopathic\n                    Medicines.java</pre><p><br></p><p>Below are the codes of Java files:- </p><p>C:\\src\\medicines\\module-info.java:</p><pre class=\"prettyprint linenums\">module medicines {\n    exports com.allopathic to elizabeth_hospital;\n}</pre><p>Please note that module 'elizabeth_hospital' is not available.</p><p><br></p><p>C:\\src\\medicines\\com\\allopathic\\Medicines.java:</p><pre class=\"prettyprint linenums\">package com.allopathic;\n\npublic class Medicines {\n    public static java.util.List&lt;String&gt; getAll() {\n        return null;\n    }    \n}</pre><p><br></p><p>And the command executed from C:\\</p><p><code>javac -d out --module-source-path src -m medicines</code></p><p><br></p><p>What is the result?</p>"}, "correct_response": ["b"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP34870Given below the directory/file structure on Windows platform: C:\n+---out\n\\---src\n    \\---medicines\n        |   module-info.java\n        |\n        \\---com\n            \\---allopathic\n                    Medicines.javaBelow are the codes of Java files:- C:\\src\\medicines\\module-info.java:module medicines {\n    exports com.allopathic to elizabeth_hospital;\n}Please note that module 'elizabeth_hospital' is not available.C:\\src\\medicines\\com\\allopathic\\Medicines.java:package com.allopathic;\n\npublic class Medicines {\n    public static java.util.List&lt;String&gt; getAll() {\n        return null;\n    }    \n}And the command executed from C:\\javac -d out --module-source-path src -m medicinesWhat is the result?", "related_lectures": []}, {"_class": "assessment", "id": 94384879, "assessment_type": "multiple-choice", "prompt": {"answers": ["<p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">open module stringutility {\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires com.udayankhattry.ocp;</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">module stringutility {\n    exports com.udayankhattry.ocp;\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires stringutility;</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">module stringutility {\n    open com.udayankhattry.ocp;\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires stringutility;</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">module stringutility {\n    opens com.udayankhattry.ocp to test;\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires stringutility;</code> </p>", "<p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">module stringutility {\n    opens com.udayankhattry.ocp to all;\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires stringutility;</code> </p>"], "feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP66431</strong></p><p><br></p><p>Given below the directory/file structure on Windows platform: </p><pre class=\"prettyprint linenums\">C:\n+---out\n|   \n\\---multi_module\n    +---stringutility\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---ocp\n    |                   StringUtil.java\n    |\n    \\---test\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---ocp\n                    \\---test\n                            TestStringUtil.java</pre><p><br></p><p>Below are the file details:-</p><p>C:\\multi_module\\stringutility\\module-info.java: </p><p>/*INSERT-1*/</p><p><br></p><p>C:\\multi_module\\stringutility\\com\\udayankhattry\\ocp\\StringUtil.java: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class StringUtil {\n    public static String reverse(String src) {\n        return new StringBuilder(src).reverse().toString();\n    }\n    \n    private void log(){\n        System.out.println(\"DONE\");\n    }\n}</pre><p><br></p><p>C:\\multi_module\\test\\module-info.java: </p><pre class=\"prettyprint linenums\">module test {\n    /*INSERT-2*/\n}</pre><p><br></p><p>C:\\multi_module\\test\\com\\udayankhattry\\ocp\\test\\TestStringUtil.java:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp.test;\n\npublic class TestStringUtil {\n    public static void main(String[] args) throws Exception {\n        //Calling private StringUtil.log() method through reflection\n        var c = Class.forName(\"com.udayankhattry.ocp.StringUtil\");\n        var m = c.getDeclaredMethod(\"log\");\n        m.setAccessible(true);\n        m.invoke(c.getDeclaredConstructor().newInstance());\n    }\n}</pre><p><br></p><p>And the below command executed from C:\\</p><p><code>javac -d out --module-source-path multi_module -m stringutility,test</code></p><p><code>java -p out -m test/com.udayankhattry.ocp.test.TestStringUtil</code></p><p><br></p><p>Which of the following changes needs to be done such that above commands successfully execute and prints DONE on to the console?</p>", "explanation": "<p><strong>UKOCP66431: </strong></p><p>To print \"DONE\", private StringUtil.log() method needs to be invoked using reflection, which is done by the code of TestStringUtil. You are not supposed to know, how reflection code works but you should know, what needs to be done to support reflection in modules. </p><p><br></p><p>To invoke log() method using reflection API, Module 'stringutility' should use opens/open.</p><p><br></p><p>/*INSERT-1*/ can be replaced with either of the following: </p><pre class=\"prettyprint linenums\">open module stringutility {\n} </pre><p>All packages in 'stringutility' module are open for reflection</p><p><br></p><p>or</p><p><br></p><pre class=\"prettyprint linenums\">module stringutility {\n    opens com.udayankhattry.ocp;\n}</pre><p><br></p><p>or </p><p><br></p><pre class=\"prettyprint linenums\">module stringutility {\n    opens com.udayankhattry.ocp to test;\n}</pre><p><br></p><p>And as, module 'test' reads the module 'stringutility' hence it should use requires.</p><p><br></p><p>/*INSERT-2*/ can be replaced with: </p><p><code>requires stringutility;</code></p><p><br></p><p>Hence, only correct option is: </p><p>Replace /*INSERT-1*/ with:</p><pre class=\"prettyprint linenums\">module stringutility {\n    opens com.udayankhattry.ocp to test;\n}</pre><p>and </p><p>Replace /*INSERT-2*/ with:</p><p><code>requires stringutility;</code></p><p><br></p><p>Please note, 'open' is used before the keyword module and 'opens' is used before the package list.</p><p>Also, `opens com.udayankhattry.ocp to all;` is valid and code would compile with warning but would fail at runtime, as it opens the 'com.udayankhattry.ocp' package to named module 'all'.</p>"}, "correct_response": ["d"], "section": "7 Java Platform Module System", "question_plain": "Question ID: UKOCP66431Given below the directory/file structure on Windows platform: C:\n+---out\n|   \n\\---multi_module\n    +---stringutility\n    |   |   module-info.java\n    |   |\n    |   \\---com\n    |       \\---udayankhattry\n    |           \\---ocp\n    |                   StringUtil.java\n    |\n    \\---test\n        |   module-info.java\n        |\n        \\---com\n            \\---udayankhattry\n                \\---ocp\n                    \\---test\n                            TestStringUtil.javaBelow are the file details:-C:\\multi_module\\stringutility\\module-info.java: /*INSERT-1*/C:\\multi_module\\stringutility\\com\\udayankhattry\\ocp\\StringUtil.java: package com.udayankhattry.ocp;\n\npublic class StringUtil {\n    public static String reverse(String src) {\n        return new StringBuilder(src).reverse().toString();\n    }\n    \n    private void log(){\n        System.out.println(\"DONE\");\n    }\n}C:\\multi_module\\test\\module-info.java: module test {\n    /*INSERT-2*/\n}C:\\multi_module\\test\\com\\udayankhattry\\ocp\\test\\TestStringUtil.java:package com.udayankhattry.ocp.test;\n\npublic class TestStringUtil {\n    public static void main(String[] args) throws Exception {\n        //Calling private StringUtil.log() method through reflection\n        var c = Class.forName(\"com.udayankhattry.ocp.StringUtil\");\n        var m = c.getDeclaredMethod(\"log\");\n        m.setAccessible(true);\n        m.invoke(c.getDeclaredConstructor().newInstance());\n    }\n}And the below command executed from C:\\javac -d out --module-source-path multi_module -m stringutility,testjava -p out -m test/com.udayankhattry.ocp.test.TestStringUtilWhich of the following changes needs to be done such that above commands successfully execute and prints DONE on to the console?", "related_lectures": []}, {"_class": "assessment", "id": 94384881, "assessment_type": "multiple-choice", "prompt": {"answers": ["<p><code>jdeps --generate-module-info mod-descriptors libraries\\message-printer-1.0x.jar</code> </p>", "<p><code>jlink --generate-module-info mod-descriptors libraries\\message-printer-1.0x.jar</code> </p>", "<p><code>javac --generate-module-info mod-descriptors libraries\\message-printer-1.0x.jar</code> </p>", "<p><code>java --generate-module-info mod-descriptors libraries\\message-printer-1.0x.jar</code> </p>"], "feedbacks": ["", "", "", ""], "question": "<p><strong>Question ID: UKOCP62836</strong></p><p><br></p><p>You have a non-modular jar file (C:\\libraries\\message-printer-1.0x.jar) and you would like to generate module-info.java file automatically for this jar. </p><p>Which of the following commands, executed from C:\\, can generate module-info.java file?</p>", "relatedLectureIds": "", "explanation": "<p><strong>UKOCP62836: </strong></p><p>jdeps --generate-module-info mod-descriptors libraries\\message-printer-1.0x.jar</p><p><br></p><p>It generates \"mod-descriptors\" directory containing module-info.java file: </p><pre class=\"prettyprint linenums\">C:\n+---libraries\n|       message-printer-1.0x.jar\n|\n\\---mod-descriptors\n    \\---message.printer\n            module-info.java</pre><p><br></p><p>Please note, 'module-info.java'
