  <script>
    const quizData = {"pass_percent": 68, "questions": [{"_class": "assessment", "id": 71526764, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP75006</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 7;\n        boolean res = x++ == 7 &amp;&amp; ++x == 9 || x++ == 9;\n        System.out.println(\"x = \" + x);\n        System.out.println(\"res = \" + res);\n    }\n}</pre><p><br></p><p>What is the result?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP75006: </strong></p><p>Given statement: </p><p>boolean res = x++ == 7 &amp;&amp; ++x == 9 || x++ == 9; </p><p>boolean res = (x++) == 7 &amp;&amp; ++x == 9 || (x++) == 9; // Postfix operator has higher precedence than other available operators</p><p>boolean res = (x++) == 7 &amp;&amp; (++x) == 9 || (x++) == 9; //Then comes prefix operators</p><p>boolean res = ((x++) == 7) &amp;&amp; ((++x) == 9) || ((x++) == 9); //== operator comes next</p><p>boolean res = (((x++) == 7) &amp;&amp; ((++x) == 9)) || ((x++) == 9); //&amp;&amp; has higher precedence over ||</p><p>Right hand side is left with just one operator '||', it is a binary operator, hence let's solve the left hand side first.</p><p>boolean res = ((7 == 7) &amp;&amp; ((++x) == 9)) || ((x++) == 9); //x = 8</p><p>boolean res = (true &amp;&amp; ((++x) == 9)) || ((x++) == 9); //x = 8</p><p>boolean res = (true &amp;&amp; (9 == 9)) || ((x++) == 9); //x = 9</p><p>boolean res = (true &amp;&amp; true) || ((x++) == 9); //x = 9</p><p>boolean res = true || ((x++) == 9); //x = 9, || is a short-circuit operator, given expression evaluates to true without evaluating `((x++) == 9)`</p><p>boolean res = true; //x = 9 </p><p>So,</p><p>x = 9</p><p>res = true</p>", "answers": ["<p>x = 10</p><p>res = true</p>", "<p>x = 9</p><p>res = true</p>", "<p>x = 10</p><p>res = false</p>", "Compilation error"]}, "correct_response": ["b"], "section": "1.3 Working with data types: operators, parentheses", "question_plain": "Question ID: UKOCP75006Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int x = 7;\n        boolean res = x++ == 7 &amp;&amp; ++x == 9 || x++ == 9;\n        System.out.println(\"x = \" + x);\n        System.out.println(\"res = \" + res);\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526762, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP76324</strong></p><p><br></p><p>Range of short data type is from -32768 to 32767</p><p>Which of the following code segments, written inside main method will compile successfully? </p><p>Select 3 options.</p>", "answers": ["<p><code>short s1 = 10;</code> </p>", "<p><code>short s2 = 32768;</code> </p>", "<pre class=\"prettyprint linenums\">final int i3 = 10;\nshort s3 = i3; </pre>", "<pre class=\"prettyprint linenums\">final int i4 = 40000;\nshort s4 = i4;</pre>", "<pre class=\"prettyprint linenums\">final int i5 = 10;\nshort s5 = i5 + 100;</pre>", "<pre class=\"prettyprint linenums\">final int m = 25000;\nfinal int n = 25000;\nshort s6 = m + n; </pre>", "<pre class=\"prettyprint linenums\">int i7 = 10;\nshort s7 = i7; </pre>"], "explanation": "<p><strong>UKOCP76324: </strong></p><p>Let's check all the statements one by one:</p><p><br></p><p><code>short s1 = 10;</code></p><p>\u2713 Above statement compiles successfully, even though 10 is an int literal (32 bits) and s1 is of short primitive type which can store only 16 bits of data. </p><p>Here java does some background task, if value of int literal can be easily fit to short primitive type (-32768 to 32767), then int literal is implicitly casted to short type. </p><p>So above statement is internally converted to:</p><p><code>short s1 = (short)10;</code></p><p><br></p><p><code>short s2 = 32768;</code></p><p>\u2717 It causes compilation failure as 32768 is out of range value.</p><p><br></p><pre class=\"prettyprint linenums\">final int i3 = 10;\nshort s3 = i3; </pre><p>\u2713 Above code compiles successfully. If you are working with final variable and the value is within the range, then final variable is implicitly casted to target type, as in this case i3 is implicitly casted to short.</p><p><br></p><pre class=\"prettyprint linenums\">final int i4 = 40000;\nshort s3 = i4; </pre><p>\u2717 It causes compilation failure as 40000 is out of range value.</p><p><br></p><pre class=\"prettyprint linenums\">final int i5 = 10;\nshort s5 = i5 + 100; </pre><p>\u2713 Above code compiles successfully. If you are working with constant expression and the resultant value of the constant expression is within the range, then resultant value is implicitly casted. In this case, resultant value 110 is implicitly casted.</p><p><br></p><pre class=\"prettyprint linenums\">final int m = 25000;\nfinal int n = 25000;\nshort s6 = m + n; </pre><p>\u2717 m + n is a constant expression but resultant value 50000 is out of range for short type, hence it causes compilation failure.</p><p><br></p><pre class=\"prettyprint linenums\">int i7 = 10;\nshort s7 = i7; </pre><p>\u2717 Compilation error as i7 is non-final variable and hence cannot be implicitly casted to short type.</p>"}, "correct_response": ["a", "c", "e"], "section": "1.1 Working with data types: Primitive types", "question_plain": "Question ID: UKOCP76324Range of short data type is from -32768 to 32767Which of the following code segments, written inside main method will compile successfully? Select 3 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526798, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP60757</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            System.out.print(Arrays.compare(new char[] { 'A' }, null));\n        } catch (Exception ex) {\n            System.out.print('A');\n        }\n\n        try {\n            System.out.print(Arrays.mismatch(null, new int[] { 1 }));\n        } catch (Exception ex) {\n            System.out.print('B');\n        }\n\n        try {\n            System.out.print(Arrays.equals(new short[] { 10 }, null));\n        } catch (Exception ex) {\n            System.out.print('C');\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing above code?</p>", "answers": ["ABC", "10false", "ABfalse", "1Bfalse", "A0false", "A0C", "<p>10C</p>"], "explanation": "<p><strong>UKOCP60757: </strong></p><p>Arrays class has following overloaded compare methods for primitive type arrays:</p><p>int compare\u200b(boolean[] a, boolean[] b)</p><p>int compare\u200b(byte[] a, byte[] b)</p><p>int compare\u200b(short[] a, short[] b)</p><p>int compare\u200b(char[] a, char[] b)</p><p>int compare\u200b(int[] a, int[] b)</p><p>int compare\u200b(long[] a, long[] b)</p><p>int compare\u200b(float[] a, float[] b)</p><p>int compare\u200b(double[] a, double[] b)</p><p><br></p><p>All of these compare methods of Arrays class compare the arrays lexicographically and return below values:</p><p>0:&nbsp; if the first and second array are equal and contain the same elements in the same order</p><p>&lt;0: if the first array is lexicographically less than the second array</p><p>&gt;0: if the first array is lexicographically greater than the second array</p><p><br></p><p>Please note: </p><p>If a is null and b is not null, then compare method returns -1.</p><p>If b is null and a is not null, then compare method returns 1.</p><p>If both a and b are null, then compare method returns 0.</p><p><br></p><p>Therefore, System.out.print(Arrays.compare(new char[] { 'A' }, null)); prints 1 on to the console.</p><p><br></p><p><br></p><p>Arrays class has following overloaded mismatch methods for primitive type arrays:</p><p>int mismatch\u200b(boolean[] a, boolean[] b)</p><p>int mismatch\u200b(byte[] a, byte[] b)</p><p>int mismatch\u200b(short[] a, short[] b)</p><p>int mismatch\u200b(char[] a, char[] b)</p><p>int mismatch\u200b(int[] a, int[] b)</p><p>int mismatch\u200b(long[] a, long[] b)</p><p>int mismatch\u200b(float[] a, float[] b)</p><p>int mismatch\u200b(double[] a, double[] b)</p><p><br></p><p>Above methods find and return the index of the first mismatch between two primitive arrays, otherwise return -1 if no mismatch is found. The index will be in the range of 0 (inclusive) up to the length (inclusive) of the smaller array. It throws NullPointerException, if either array is null.</p><p><br></p><p>Therefore, System.out.print(Arrays.mismatch(null, new int[] { 1 })); throws NullPointerException and hence corresponding catch block executes and prints B on to the console. </p><p><br></p><p><br></p><p>Arrays class has following overloaded equals methods for primitive type arrays:</p><p>boolean equals\u200b(boolean[] a, boolean[] b)</p><p>boolean equals\u200b(byte[] a, byte[] b)</p><p>boolean equals\u200b(short[] a, short[] b)</p><p>boolean equals\u200b(char[] a, char[] b)</p><p>boolean equals\u200b(int[] a, int[] b)</p><p>boolean equals\u200b(long[] a, long[] b)</p><p>boolean equals\u200b(float[] a, float[] b)</p><p>boolean equals\u200b(double[] a, double[] b)</p><p><br></p><p>Above methods return true if both of the arrays are null or both contain the same elements in the same order, otherwise return false.</p><p><br></p><p>Therefore, System.out.print(Arrays.equals(new short[] { 10 }, null)); prints false on to the console.</p><p><br></p><p>1Bfalse is the output of given code. </p>"}, "correct_response": ["d"], "section": "5.1 Arrays", "question_plain": "Question ID: UKOCP60757Consider below code of Test.java file:package com.udayankhattry.ocp;\n\nimport java.util.Arrays;\n\npublic class Test {\n    public static void main(String[] args) {\n        try {\n            System.out.print(Arrays.compare(new char[] { 'A' }, null));\n        } catch (Exception ex) {\n            System.out.print('A');\n        }\n\n        try {\n            System.out.print(Arrays.mismatch(null, new int[] { 1 }));\n        } catch (Exception ex) {\n            System.out.print('B');\n        }\n\n        try {\n            System.out.print(Arrays.equals(new short[] { 10 }, null));\n        } catch (Exception ex) {\n            System.out.print('C');\n        }\n    }\n}What will be the result of compiling and executing above code?", "related_lectures": []}, {"_class": "assessment", "id": 71526796, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP22028</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Resource implements AutoCloseable {\n    public void close() {\n        System.out.println(\"CLOSE\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(Resource r = null) {\n            r = new Resource();\n            System.out.println(\"HELLO\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP22028: </strong></p><p>Variable r is implicitly final and hence can't be re-initialized. </p><p><br></p><p>'r = new Resource();' causes compilation error. </p>", "answers": ["HELLO", "<p>HELLO</p><p>CLOSE</p>", "Compilation error", "NullPointerException is thrown at runtime"]}, "correct_response": ["c"], "section": "4.2 Exceptions: try-with-resource", "question_plain": "Question ID: UKOCP22028Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Resource implements AutoCloseable {\n    public void close() {\n        System.out.println(\"CLOSE\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        try(Resource r = null) {\n            r = new Resource();\n            System.out.println(\"HELLO\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526794, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP42123</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\n\nclass Super {\n    Super() throws RuntimeException {\n        System.out.print(\"CARPE \");\n    }\n}\n\nclass Sub extends Super {\n    Sub() throws IOException {\n        System.out.print(\"DIEM \");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        new Sub();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP42123: </strong></p><p>It is legal for the constructors to have throws clause. </p><p>Constructors are not inherited by the Sub class so there is no method overriding rules related to the constructors but as one constructor invokes other constructors implicitly or explicitly by using this(...) or super(...), hence exception handling becomes interesting. </p><p><br></p><p>Java compiler adds super(); as the first statement inside Sub class's constructor:</p><pre class=\"prettyprint linenums\">Sub() throws IOException {\n    super(); //added by the compiler\n    System.out.println(\"DIEM\");\n}</pre><p><br></p><p>super(); invokes the constructor of Super class (which declares to throw RuntimeException), as RuntimeException is unchecked exception, therefore no handling is necessary in the constructor of Sub class. </p><p>Sub class's constructor declares to throw IOException but main(String []) method handles it. </p><p><br></p><p>There is no compilation error and output is: CARPE DIEM </p>", "answers": ["Compilation error in both Super and Sub classes", "Compilation error only in Super class", "Compilation error only in Sub class", "Test class executes successfully and prints CARPE DIEM  on to the console", "Test class executes successfully and prints DIEM CARPE  on to the console"]}, "correct_response": ["d"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP42123Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\n\nclass Super {\n    Super() throws RuntimeException {\n        System.out.print(\"CARPE \");\n    }\n}\n\nclass Sub extends Super {\n    Sub() throws IOException {\n        System.out.print(\"DIEM \");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws Exception {\n        new Sub();\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526792, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP67875</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.SQLException;\n\npublic class Test {\n    private static void availableSeats() throws SQLException {\n        throw null; //Line n1\n    }\n\n    public static void main(String[] args) {\n        try {\n            availableSeats(); //Line n2\n        } catch(SQLException e) {\n            System.out.println(\"SEATS NOT AVAILABLE\");\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["SEATS NOT AVAILABLE is printed on to the console and program terminates successfully", "Program ends abruptly", "Line n1 causes compilation failure", "Line n2 causes compilation failure"], "explanation": "<p><strong>UKOCP67875: </strong></p><p>Classes in Exception framework are normal java classes, hence null can be used wherever instances of Exception classes are used, so Line n1 compiles successfully. </p><p>No issues with Line n2 as method availableSeats() declares to throw SQLException and main(String []) method code correctly handles it. </p><p><br></p><p>Program compiles successfully but on execution, NullPointerException is thrown, stack trace is printed on to the console and program ends abruptly. </p><p><br></p><p>If you debug the code, you would find that internal routine for throwing null exception causes NullPointerException.</p>"}, "correct_response": ["b"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP67875Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.SQLException;\n\npublic class Test {\n    private static void availableSeats() throws SQLException {\n        throw null; //Line n1\n    }\n\n    public static void main(String[] args) {\n        try {\n            availableSeats(); //Line n2\n        } catch(SQLException e) {\n            System.out.println(\"SEATS NOT AVAILABLE\");\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526790, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP41258</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Error obj = new Error();\n        boolean flag1 = obj instanceof RuntimeException; //Line n1\n        boolean flag2 = obj instanceof Exception; //Line n2\n        boolean flag3 = obj instanceof Error; //Line n3\n        boolean flag4 = obj instanceof Throwable; //Line n4\n        System.out.println(flag1 + \":\" + flag2 + \":\" + flag3 + \":\" + flag4);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "false:false:true:true", "false:true:true:true", "true:true:true:true", "false:false:true:false"], "explanation": "<p><strong>UKOCP41258: </strong></p><p>class Error extends Throwable, so `obj instanceof Error;` and `obj instanceof Throwable;` return true. </p><p>But Error class is not related to Exception and RuntimeException classes in multilevel inheritance and that is why Line n1 and Line n2 cause compilation error.</p>"}, "correct_response": ["a"], "section": "4.1 Exceptions: try/catch/finally, Custom Exceptions", "question_plain": "Question ID: UKOCP41258Given code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        Error obj = new Error();\n        boolean flag1 = obj instanceof RuntimeException; //Line n1\n        boolean flag2 = obj instanceof Exception; //Line n2\n        boolean flag3 = obj instanceof Error; //Line n3\n        boolean flag4 = obj instanceof Throwable; //Line n4\n        System.out.println(flag1 + \":\" + flag2 + \":\" + flag3 + \":\" + flag4);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526788, "assessment_type": "multiple-choice", "prompt": {"question": "<p><strong>Question ID: UKOCP11849</strong></p><p><br></p><p>Consider below code snippet:</p><pre class=\"prettyprint linenums\">interface ILog {\n    default void log() {\n        System.out.println(\"ILog\");\n    }\n}\n\nabstract class Log {\n    public static void log() { \n        System.out.println(\"Log\");\n    }\n}\n\nclass MyLogger extends Log implements ILog {}</pre><p><br></p><p>Which of the following statements is correct?</p>", "relatedLectureIds": "", "feedbacks": ["", "", "", ""], "explanation": "<p><strong>UKOCP11849: </strong></p><p>As per Java 8, default and static methods were added in the interface. Interface ILog defines default method log(), there is no compilation error in interface ILog. </p><p><br></p><p>Abstract class Log defines the static log() method. Abstract class can have 0 or more abstract methods. Hence, no compilation error in class Log as well.</p><p><br></p><p>Default methods of an interface are implicitly public and are inherited by the implementer class. Class MyLogger implements ILog interface and therefore it inherits the default log() method of ILog interface. </p><p>Also, the scope of static log() method of abstract class Log is not limited to class Log only but MyLogger also gets Log.log() method in its scope. </p><p>So, MyLogger class has instance method log() [inherited from ILog interface] and static method log() [from Log class] and this causes conflict. Static and non-static methods with same signature are not allowed in one scope, therefore class MyLogger fails to compile.</p>", "answers": ["There is no compilation error in the above code", "There is a compilation error in interface ILog", "There is a compilation error in abstract class Log", "There is a compilation error in MyLogger class"]}, "correct_response": ["d"], "section": "3.7 Java OO: Interfaces", "question_plain": "Question ID: UKOCP11849Consider below code snippet:interface ILog {\n    default void log() {\n        System.out.println(\"ILog\");\n    }\n}\n\nabstract class Log {\n    public static void log() { \n        System.out.println(\"Log\");\n    }\n}\n\nclass MyLogger extends Log implements ILog {}Which of the following statements is correct?", "related_lectures": []}, {"_class": "assessment", "id": 71526786, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP43019</strong></p><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Super {\n    final int NUM = -1; //Line n1\n}\n\nclass Sub extends Super {\n    /*INSERT*/\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Sub obj = new Sub();\n        obj.NUM = 200; //Line n2\n        System.out.println(obj.NUM); //Line n3\n    }\n}</pre><p><br></p><p>Above code causes compilation error, which modifications, done independently, enable the code to compile and on execution print 200 on to the console? </p><p>Choose 4 options.</p>", "explanation": "<p><strong>UKOCP43019: </strong></p><p>Variable NUM is declared in Super class and class Sub extends Super, hence NUM can be accessed by using obj.NUM.</p><p>But as NUM Is final, hence it cannot be reassigned, therefore Line n2 causes compilation error. Let's check all the options one by one:</p><p><br></p><p>Remove final modifier from Line n1 </p><p>\u2713 Valid option and in this case output is 200.</p><p><br></p><p>Replace /*INSERT*/ with byte NUM; </p><p>\u2717 In this case, class Sub hides the variable NUM of Super class but Line n2 will still not compile as byte range is from -128 to 127 and 200 is out of range value.</p><p><br></p><p>Replace /*INSERT*/ with short NUM; </p><p>\u2713 In this case, class Sub hides the variable NUM of Super class and 200 can be easily assigned to short type. In this case output is 200.</p><p><br></p><p>Replace /*INSERT*/ with int NUM; </p><p>\u2713 In this case, class Sub hides the variable NUM of Super class and 200 can be easily assigned to int type. In this case output is 200.</p><p><br></p><p>Replace /*INSERT*/ with float NUM; </p><p>\u2717 In this case, class Sub hides the variable NUM of Super class and 200 can be easily assigned to float type. But output in this case will be 200.0 and not 200.</p><p><br></p><p>Replace /*INSERT*/ with double NUM; </p><p>\u2717 In this case, class Sub hides the variable NUM of Super class and 200 can be easily assigned to double type. But output in this case will be 200.0 and not 200.</p><p><br></p><p>Replace /*INSERT*/ with boolean NUM; </p><p>\u2717 In this case, class Sub hides the variable NUM of Super class but Line n2 will still not compile as boolean type in java allows 2 values true and false. 200 is not compatible with boolean type.</p><p><br></p><p>Replace /*INSERT*/ with Object NUM; </p><p>\u2713 In this case, class Sub hides the variable NUM of Super class and at Line n2, value 200 is boxed to Integer, which is then assigned to obj.NUM. So, obj.NUM refers to an instance of Integer class. Line n3 invokes toString() method of Integer class and hence 200 is printed on to the console. </p>", "answers": ["Remove final modifier from Line n1", "Replace /*INSERT*/ with byte NUM;", "Replace /*INSERT*/ with short NUM;", "Replace /*INSERT*/ with int NUM;", "Replace /*INSERT*/ with float NUM;", "Replace /*INSERT*/ with double NUM;", "<p>Replace /*INSERT*/ with boolean NUM;</p>", "<p>Replace /*INSERT*/ with Object NUM;</p>"]}, "correct_response": ["a", "c", "d", "h"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP43019Given code of Test.java file: package com.udayankhattry.ocp;\n\nclass Super {\n    final int NUM = -1; //Line n1\n}\n\nclass Sub extends Super {\n    /*INSERT*/\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Sub obj = new Sub();\n        obj.NUM = 200; //Line n2\n        System.out.println(obj.NUM); //Line n3\n    }\n}Above code causes compilation error, which modifications, done independently, enable the code to compile and on execution print 200 on to the console? Choose 4 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526784, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP63076</strong></p><p><br></p><p>Consider below code fragment: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nabstract class Food {\n    protected abstract double getCalories();\n}\n\nclass JunkFood extends Food {\n    double getCalories() {\n        return 200.0;\n    }\n}</pre><p><br></p><p>Which 3 modifications, done independently, enable the code to compile?</p>", "explanation": "<p><strong>UKOCP63076: </strong></p><p>abstract methods cannot be declared with private modifier as abstract methods need to be overridden in child classes. </p><p>abstract methods can be declared with either public, protected and package (no access modifier) modifier and hence overriding method cannot be declared which private modifier in the child class. That is why getCalories() method in Food and JunkFood classes cannot be declared private.</p><p><br></p><p>Access modifier of overriding method should either be same as the access modifier of overridden method or it should be less restrictive than the access modifier of overridden method. Hence below solutions will work: </p><p>1. Remove the protected access modifier from the getCalories() method of Food class: By doing this, both the overridden and overriding methods will have same access modifier (no access modifier)</p><p>or</p><p>2. Make the getCalories() method of JunkFood class protected: By doing this, both the overridden and overriding methods will have same access modifier (protected)</p><p>or</p><p>3. Make the getCalories() method of JunkFood class public: By doing this, access modifier of overriding method (which is public) is less restrictive than the access modifier of overridden method (which is protected)</p>", "answers": ["Make the getCalories() method of Food class public", "Remove the protected access modifier from the getCalories() method of Food class", "Make the getCalories() method of Food class private", "Make the getCalories() method of JunkFood class protected", "Make the getCalories() method of JunkFood class public", "Make the getCalories() method of JunkFood class private"]}, "correct_response": ["b", "d", "e"], "section": "3.6 Java OO: Inheritance & Polymorphism", "question_plain": "Question ID: UKOCP63076Consider below code fragment: package com.udayankhattry.ocp;\n\nabstract class Food {\n    protected abstract double getCalories();\n}\n\nclass JunkFood extends Food {\n    double getCalories() {\n        return 200.0;\n    }\n}Which 3 modifications, done independently, enable the code to compile?", "related_lectures": []}, {"_class": "assessment", "id": 71526780, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP58507</strong></p><p><br></p><p>Consider below code of Greetings.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Greetings {\n    String msg = null;\n    \n    public Greetings() {\n        this(\"Good Morning!\");\n    }\n    \n    public Greetings(String str) {\n        msg = str;\n    }\n    \n    public void display() {\n        System.out.println(msg);\n    }\n    \n    public static void main(String [] args) {\n        Greetings g1 = new Greetings();\n        Greetings g2 = new Greetings(\"Good Evening!\");\n        g1.display();\n        g2.display();\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Greetings class?</p>", "explanation": "<p><strong>UKOCP58507: </strong></p><p>Greetings g1 = new Greetings(); invokes no-argument constructor. </p><p>No-argument constructor calls parameterized constructor with the argument \"Good Morning!\"</p><p>Parameterized constructor assigns \"Good Morning!\" to msg variable of the object referred by g1.</p><p>Greetings g2 = new Greetings(\"Good Evening!\"); invokes parameterized constructor, which assigns \"Good Evening!\" to msg variable of the object referred by g2.</p><p>g1.display(); prints Good Morning!</p><p>g2.display(); prints Good Evening!</p>", "answers": ["<p>null</p><p>Good Evening!</p>", "<p>Good Morning!</p><p>Good Evening!</p>", "<p>Good Morning!</p><p>null</p>", "<p>null</p><p>null</p>"]}, "correct_response": ["b"], "section": "3.4 Java OO: Constructors & Initializers", "question_plain": "Question ID: UKOCP58507Consider below code of Greetings.java file: package com.udayankhattry.ocp;\n\npublic class Greetings {\n    String msg = null;\n    \n    public Greetings() {\n        this(\"Good Morning!\");\n    }\n    \n    public Greetings(String str) {\n        msg = str;\n    }\n    \n    public void display() {\n        System.out.println(msg);\n    }\n    \n    public static void main(String [] args) {\n        Greetings g1 = new Greetings();\n        Greetings g2 = new Greetings(\"Good Evening!\");\n        g1.display();\n        g2.display();\n    }\n}What will be the result of compiling and executing Greetings class?", "related_lectures": []}, {"_class": "assessment", "id": 71526778, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP75077</strong></p><p><br></p><p>Consider below code of TestSquare.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Square {\n    int length;\n    Square sq;\n    \n    Square(int length) {\n        this.length = length;\n    }\n    \n    void setInner(Square sq) {\n        this.sq = sq;\n    }\n    \n    int getLength() {\n        return this.length;\n    }\n}\n\npublic class TestSquare {\n    public static void main(String[] args) {\n        Square sq1 = new Square(10); //Line n1\n        Square sq2 = new Square(5); //Line n2\n        sq1.setInner(sq2); //Line n3\n        System.out.println(sq1.sq.length); //Line n4\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing TestSquare class?</p>", "answers": ["It prints 0 on to the console", "It prints 5 on to the console", "It prints 10 on to the console", "It prints null on to the console", "Compilation error", "An exception is thrown at runtime"], "explanation": "<p><strong>UKOCP75077: </strong></p><p>As both the classes: Square and TestSquare are in the same file, hence variables 'length' and 'sq' can be accessed using dot operator. Given code compiles successfully. </p><p><br></p><p>Line n1 creates an instance of Square class and 'sq1' refers to it. sq1.length = 10 and sq1.sq = null. </p><p>Line n2 creates an instance of Square class and 'sq2' refers to it. sq2.length = 5 and sq2.sq = null. </p><p><br></p><p>On execution of Line n3, sq1.sq = sq2.</p><p><br></p><p>Line n4: System.out.println(sq1.sq.length); =&gt; System.out.println(sq2.length); =&gt; Prints 5 on to the console. </p>"}, "correct_response": ["b"], "section": "3.3 Java OO: Fields & methods", "question_plain": "Question ID: UKOCP75077Consider below code of TestSquare.java file: package com.udayankhattry.ocp;\n\nclass Square {\n    int length;\n    Square sq;\n    \n    Square(int length) {\n        this.length = length;\n    }\n    \n    void setInner(Square sq) {\n        this.sq = sq;\n    }\n    \n    int getLength() {\n        return this.length;\n    }\n}\n\npublic class TestSquare {\n    public static void main(String[] args) {\n        Square sq1 = new Square(10); //Line n1\n        Square sq2 = new Square(5); //Line n2\n        sq1.setInner(sq2); //Line n3\n        System.out.println(sq1.sq.length); //Line n4\n    }\n}What will be the result of compiling and executing TestSquare class?", "related_lectures": []}, {"_class": "assessment", "id": 71526776, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP27389</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nclass Logger {\n    public void log() {\n        System.out.println(\"GO FOR IT\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Logger obj = new Logger() {\n            public void Log() {\n                System.out.println(\"LET IT BE\");\n            }\n        };\n        obj.Log();\n    }\n}  </pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP27389: </strong></p><p>Anonymous inner class allows to define methods not available in its super class. Anonymous inner class in this case doesn't override the method of super class but it provides a new method Log [L in upper case]. </p><p><br></p><p>obj is of Logger type, `obj.Log();` statement tries to invoke the Log() method of Logger class, which is not available and hence it causes compilation error. </p>", "answers": ["Compilation error", "Runtime error", "GO FOR IT", "LET IT BE"]}, "correct_response": ["a"], "section": "3.2 Java Object-Oriented Approach: Nested Class", "question_plain": "Question ID: UKOCP27389Given code: package com.udayankhattry.ocp;\n\nclass Logger {\n    public void log() {\n        System.out.println(\"GO FOR IT\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        Logger obj = new Logger() {\n            public void Log() {\n                System.out.println(\"LET IT BE\");\n            }\n        };\n        obj.Log();\n    }\n}  What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526774, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP25197</strong></p><p><br></p><p>Consider below code of Test.java file:</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    static var arr = new Boolean[1];\n    public static void main(String[] args) {\n        if(arr[0]) {\n            System.out.println(true);\n        } else {\n            System.out.println(false);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP25197: </strong></p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p><br></p><p>As the name suggests, Local variable Type inference is applicable only for local variables and not for instance or class variables. Hence, `static var arr = new Boolean[1];` causes compilation error.</p>", "answers": ["true", "false", "Compilation error", "An exception is thrown at runtime"]}, "correct_response": ["c"], "section": "3.1 Java Object-Oriented Approach: Declare, Instantiate & GC", "question_plain": "Question ID: UKOCP25197Consider below code of Test.java file:package com.udayankhattry.ocp;\n\npublic class Test {\n    static var arr = new Boolean[1];\n    public static void main(String[] args) {\n        if(arr[0]) {\n            System.out.println(true);\n        } else {\n            System.out.println(false);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526772, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP39335</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {2, 1, 0};\n        for(int i : arr) {\n            System.out.println(arr[i]);\n        }\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["<p>2</p><p>1</p><p>0</p>", "<p>0</p><p>1</p><p>2</p>", "Compilation error", "An Exception is thrown at runtime"], "explanation": "<p><strong>UKOCP39335: </strong></p><p>Inside for-each loop, System.out.println(arr[i]); is used instead of System.out.println(i);&nbsp; </p><p>When loop executes 1st time, i stores the first array element, which is 2 but System.out.println statement prints arr[2] which is 0. Loop executes in this manner and prints 0 1 2 on to the console. </p>"}, "correct_response": ["b"], "section": "2.3 Controlling Program Flow: Loops", "question_plain": "Question ID: UKOCP39335Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int [] arr = {2, 1, 0};\n        for(int i : arr) {\n            System.out.println(arr[i]);\n        }\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526770, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP50130</strong></p><p><br></p><p>What will be the output of compiling and executing the Test class?</p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int a = 5;\n        int x = 10;\n        switch(x) {\n            case 10:\n                a *= 2;\n            case 20:\n                a *= 3;\n            case 30:\n                a *= 4;\n        }\n        System.out.println(a);\n    }\n}</pre>", "explanation": "<p><strong>UKOCP50130: </strong></p><p>Matching case block 'case 10:' is found, a *= 2; is executed, which means a = a * 2; =&gt; a = 5 * 2; =&gt; a = 10;&nbsp; </p><p>No break statement, hence it enters in fall-through.&nbsp; </p><p>a *= 3; is executed, which means a = a * 3; =&gt; a = 10 * 3; =&gt; a = 30;&nbsp; </p><p>a *= 4; is executed, which means a = a * 4; =&gt; a = 30 * 4; =&gt; a = 120;</p>", "answers": ["5", "10", "30", "120"]}, "correct_response": ["d"], "section": "2.2 Controlling Program Flow: switch-case", "question_plain": "Question ID: UKOCP50130What will be the output of compiling and executing the Test class?package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        int a = 5;\n        int x = 10;\n        switch(x) {\n            case 10:\n                a *= 2;\n            case 20:\n                a *= 3;\n            case 30:\n                a *= 4;\n        }\n        System.out.println(a);\n    }\n}", "related_lectures": []}, {"_class": "assessment", "id": 71526768, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP78974</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(5);\n        sb.append(\"0123456789\");\n        sb.delete(8, 1000);\n        System.out.println(sb);\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "answers": ["Compilation error", "An exception is thrown at runtime", "01234567", "89"], "explanation": "<p><strong>UKOCP78974: </strong></p><p>`new StringBuilder(5);` creates a StringBuilder instance, whose internal char array's length is 5 but the internal char array's length is adjusted when characters are added/removed from the StringBuilder instance. `sb.append(\"0123456789\");` successfully appends \"0123456789\" to the StringBuilder's instance referred by sb.</p><p>delete method accepts 2 parameters: delete(int start, int end), where start is inclusive and end is exclusive. </p><p>This method throws StringIndexOutOfBoundsException for following scenarios:</p><p>A. start is negative</p><p>B. start is greater than sb.length()</p><p>C. start is greater than end</p><p><br></p><p>If end is greater than the length of StringBuilder object, then StringIndexOutOfBoundsException is not thrown and end is set to sb.length().</p><p>So, in this case, `sb.delete(8, 1000);` is equivalent to `sb.delete(8, sb.length());` and this deletes characters at 8th index (8) and 9th index (9). So remaining characters are: \"01234567\".</p><p><br></p><p>StringBuilder class overrides toString() method, which prints the text stored in StringBuilder instance. Hence, `System.out.println(sb);` prints 01234567 on to the console.</p>"}, "correct_response": ["c"], "section": "1.5 Working with data types: StringBuilder class", "question_plain": "Question ID: UKOCP78974Consider below code of Test.java file: package com.udayankhattry.ocp;\n\npublic class Test {\n    public static void main(String[] args) {\n        StringBuilder sb = new StringBuilder(5);\n        sb.append(\"0123456789\");\n        sb.delete(8, 1000);\n        System.out.println(sb);\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526766, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP11824</strong></p><p><br></p><p>Consider below code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \"*\";\n        /*INSERT*/\n        System.out.println(str);\n    }\n}</pre><p><br></p><p>Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print ***** on to the console? </p><p>Select 2 options.</p>", "explanation": "<p><strong>UKOCP11824: </strong></p><p>Instance method 'repeat()' has been added to String class in Java 11 and it has the signature: `public String repeat(int count) {}`</p><p>It returns the new String object whose value is the concatenation of this String repeated 'count' times. For example, </p><p>\"A\".repeat(3); returns \"AAA\".</p><p><br></p><p>In this question, 'str' refers to \"*\". Let's check all the options: </p><p>`str.repeat(5);`: returns a new String Object \"*****\" but as String is immutable, so there is no change is the String object referred by 'str'. It will not give expected output.</p><p>`str = str.repeat(5);`: returns a new String Object \"*****\" and 'str' refers to this newly created object. It will print the expected output.</p><p>`String.repeat(str, 5);`: repeat is an instance method and not static. It causes compilation error.</p><p>`str = String.repeat(str, 5);`: repeat is an instance method and not static. It causes compilation error.</p><p>`str *= 5;`: Operator '*=' is not defined for String type and hence it causes compilation error.</p><p>`str = str * 5;`: Operator '*' is not defined for String type and hence it causes compilation error.</p><p>`for(var var = 0; var &lt; 4; var++) { str += \"*\"; }`: </p><p>Local variable Type inference was added in JDK 10. </p><p>Reserved type name var is allowed in JDK 10 onwards for local variable declarations with initializers, enhanced for-loop indexes, and index variables declared in traditional for loops. For example,</p><p>var x = \"Java\"; //x infers to String</p><p>var m = 10; //m infers to int</p><p>The identifier var is not a keyword, hence var can still be used as variable name, method name or package name but it cannot be used as a class or interface name.</p><p>It is a valid loop syntax in which var infers to int type, loop executes 4 times and at the end 'str' refers to \"*****\". It will also print expected output on to the console. </p><p><br></p><p>for(int i = 0; i &lt; 5; i++) { str += \"*\"; }: Loop syntax is correct but this loop executes 5 times and at the end 'str' refers to \"******\". It will not print expected output.</p>", "answers": ["<p><code>str.repeat(5);</code> </p>", "<p><code>str = str.repeat(5);</code> </p>", "<p><code>String.repeat(str, 5);</code> </p>", "<p><code>str = String.repeat(str, 5);</code> </p>", "<p><code>str *= 5;</code> </p>", "<p><code>str = str * 5;</code> </p>", "<pre class=\"prettyprint linenums\">for(var var = 0; var &lt; 4; var++) {\n    str += \"*\";\n}</pre>", "<pre class=\"prettyprint linenums\">for(int i = 0; i &lt; 5; i++) {\n    str += \"*\";\n}</pre>"]}, "correct_response": ["b", "g"], "section": "1.4 Working with data types: String class", "question_plain": "Question ID: UKOCP11824Consider below code of Test.java file: package com.udayankhattry.ocp; \n\npublic class Test {\n    public static void main(String[] args) {\n        String str = \"*\";\n        /*INSERT*/\n        System.out.println(str);\n    }\n}Which of the following options, if used to replace /*INSERT*/, will compile successfully and on execution will print ***** on to the console? Select 2 options.", "related_lectures": []}, {"_class": "assessment", "id": 71526782, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP65282</strong></p><p><br></p><p>Choose the option that meets the following specification: </p><p>Create a well encapsulated class Clock with one instance variable model. </p><p>The value of model should be accessible and modifiable outside Clock.</p>", "explanation": "<p><strong>UKOCP65282: </strong></p><p>Encapsulation is all about having private instance variable and providing public getter and setter methods. </p><p>Out of the given 4 options, below option provides a well encapsulated Clock class: </p><pre class=\"prettyprint linenums\">public class Clock {\n    private String model;\n    public String getModel() { return model; }\n    public void setModel(String val) { model = val; }\n}</pre>", "answers": ["<pre class=\"prettyprint linenums\">public class Clock {\n    public String model;\n}</pre>", "<pre class=\"prettyprint linenums\">public class Clock {\n    public String model;\n    public String getModel() { return model; }\n    public void setModel(String val) { model = val; }\n}</pre>", "<pre class=\"prettyprint linenums\">public class Clock {\n    private String model;\n    public String getModel() { return model; }\n    public void setModel(String val) { model = val; }\n}</pre>", "<pre class=\"prettyprint linenums\">public class Clock {\n    public String model;\n    private String getModel() { return model; }\n    private void setModel(String val) { model = val; }\n}</pre>"]}, "correct_response": ["c"], "section": "3.5 Java OO: Variable Scope, Encapsulation & Immutable obj", "question_plain": "Question ID: UKOCP65282Choose the option that meets the following specification: Create a well encapsulated class Clock with one instance variable model. The value of model should be accessible and modifiable outside Clock.", "related_lectures": []}, {"_class": "assessment", "id": 71526832, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP73163</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyThread implements Runnable {\n    private String str;\n\n    MyThread(String str) {\n        this.str = str;\n    }\n\n    public void run() {\n        System.out.println(str.toUpperCase());\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws ExecutionException, InterruptedException{\n        var es = Executors.newSingleThreadExecutor();\n        var thread = new MyThread(\"ocp\");\n        var future = es.submit(thread);\n        var tmp = (Integer) future.get(); //Line 22\n        System.out.println(tmp);\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "answers": ["Compilation error is caused by Line 22", "ClassCastException is thrown at runtime by Line 22", "<p>ocp</p><p>null</p>", "<p>OCP</p><p>null</p>", "<p>OCP</p><p>OCP</p>"], "explanation": "<p><strong>UKOCP73163: </strong></p><p>Method submit is overloaded in ExecutorService interface to accept both Callable and Runnable: </p><p>&lt;T&gt; Future&lt;T&gt; submit(Callable&lt;T&gt; task): Submits a value-returning task for execution and returns a Future representing the pending results of the task. The Future's get method will return the task's result upon successful completion. </p><p>and </p><p>&lt;T&gt; Future&lt;T&gt; submit\u200b(Runnable task, T result): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return the given result upon successful completion.</p><p>and</p><p>Future&lt;?&gt; submit(Runnable task): Submits a Runnable task for execution and returns a Future representing that task. The Future's get method will return null upon successful completion.</p><p><br></p><p>Variable 'es' infers to ExecutorService type, variable 'thread' infers to MyThread type, variable future infers to Future&lt;?&gt; type and variable 'tmp' infers to Integer type. </p><p>get() method throws 2 checked exceptions: InterruptedException and ExecutionException. And future.get() returns Object and it can be type-casted to Integer, so no compilation error. </p><p><br></p><p>`es.submit(thread);`&nbsp; executes the run() method, which print 'OCP' on to the console.</p><p>`future.get();` returns null and null can easily be assigned to Integer. </p><p>Hence `System.out.println(tmp);` prints null on to the console. </p>"}, "correct_response": ["d"], "section": "8.1 Concurrency: Executors", "question_plain": "Question ID: UKOCP73163Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass MyThread implements Runnable {\n    private String str;\n\n    MyThread(String str) {\n        this.str = str;\n    }\n\n    public void run() {\n        System.out.println(str.toUpperCase());\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws ExecutionException, InterruptedException{\n        var es = Executors.newSingleThreadExecutor();\n        var thread = new MyThread(\"ocp\");\n        var future = es.submit(thread);\n        var tmp = (Integer) future.get(); //Line 22\n        System.out.println(tmp);\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526834, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP40261</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Player extends Thread {\n    CyclicBarrier cb;\n\n    public Player(CyclicBarrier cb) {\n        this.cb = cb;\n    }\n\n    public void run() {\n        try {\n            cb.await();\n        } catch (InterruptedException | BrokenBarrierException e) {}\n    }\n}\n\nclass Match implements Runnable {\n    public void run() {\n        System.out.println(\"Match is starting...\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var match = new Match();\n        var cb = new CyclicBarrier(2, match);\n        var es = Executors.newFixedThreadPool(1);\n        es.execute(new Player(cb));\n        es.execute(new Player(cb));\n        es.shutdown();\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP40261: </strong></p><p>Variable 'match' infers to Match type, variable 'cb' infers to CyclicBarrier type and variable 'es' infers to ExecutorService type. </p><p>ExecutorService can handle 1 thread, but 2 threads are submitted. The first thread calls await() and wait endlessly.&nbsp; </p><p><br></p><p>CyclicBarrier needs 2 threads to call await() method but as this is not going to happen, hence the program waits endlessly. 'Match is starting...' is never printed on to the console and program waits indefinitely.&nbsp; </p><p><br></p><p>NOTE: To trip the CyclicBarrier, replace `Executors.newFixedThreadPool(1);` with `Executors.newFixedThreadPool(2);`. </p>", "answers": ["&#39;Match is starting...&#39; is printed on to the console and program doesn&#39;t terminate", "&#39;Match is starting...&#39; is printed on to the console and program terminates successfully", "&#39;Match is starting...&#39; is never printed on to the console and program waits indefinitely"]}, "correct_response": ["c"], "section": "8.3 Concurrency: CyclicBarrier", "question_plain": "Question ID: UKOCP40261Given code: package com.udayankhattry.ocp;\n\nimport java.util.concurrent.*;\n\nclass Player extends Thread {\n    CyclicBarrier cb;\n\n    public Player(CyclicBarrier cb) {\n        this.cb = cb;\n    }\n\n    public void run() {\n        try {\n            cb.await();\n        } catch (InterruptedException | BrokenBarrierException e) {}\n    }\n}\n\nclass Match implements Runnable {\n    public void run() {\n        System.out.println(\"Match is starting...\");\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) {\n        var match = new Match();\n        var cb = new CyclicBarrier(2, match);\n        var es = Executors.newFixedThreadPool(1);\n        es.execute(new Player(cb));\n        es.execute(new Player(cb));\n        es.shutdown();\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526836, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP16109</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var dir = new File(\"F:\" + System.getProperty(\"path.separator\") + \"A\");\n        dir.mkdir();\n    }\n}</pre><p><br></p><p>F: is accessible for reading/writing and currently doesn't contain any files/directories. </p><p>Will above code create directory 'A' inside F:?</p>", "answers": ["Yes", "No"], "explanation": "<p><strong>UKOCP16109: </strong></p><p>Variable 'dir' infers to File type.</p><p>System.getProperty(\"path.separator\") returns the path-separator, semicolon(;) on Windows system and colon(:) on Linux system. </p><p><br></p><p>So, above code will definitely not create directory named, 'A'. On windows system, it created directory with name ';A'. </p><p><br></p><p>You can get file separator by using below code: </p><p>System.getProperty(\"file.separator\")&nbsp; OR File.separator. </p>"}, "correct_response": ["b"], "section": "9.2 Java I/O API: Read and write file data", "question_plain": "Question ID: UKOCP16109Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\npublic class Test {\n    public static void main(String[] args) {\n        var dir = new File(\"F:\" + System.getProperty(\"path.separator\") + \"A\");\n        dir.mkdir();\n    }\n}F: is accessible for reading/writing and currently doesn't contain any files/directories. Will above code create directory 'A' inside F:?", "related_lectures": []}, {"_class": "assessment", "id": 71526838, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP50033</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Product implements Serializable {\n    public static final ObjectStreamField[] serialPersistentFields = {\n        new ObjectStreamField(\"name\", String.class),\n        new ObjectStreamField(\"geners\", String[].class)\n    };\n\n    private void readObject(ObjectInputStream s)\n                    throws IOException, ClassNotFoundException {\n        ObjectInputStream.GetField fields = s.readFields();\n        System.out.println(fields.get(\"name\", \"NOVELS\"));\n        System.out.println(((String[])fields.get(\"geners\", new String[]{\"F\", \"M\", \"T\"}))[1]);\n    }\n\n    private void writeObject(ObjectOutputStream s) throws IOException {\n        ObjectOutputStream.PutField fields = s.putFields();\n        fields.put(\"name\", \"BOOK\");\n        fields.put(\"geners\", new String [] {\"Fiction\", \"Mystery\", \"Thriller\"});\n\n        s.writeFields();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var product = new Product();\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"J:\\\\product.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"J:\\\\product.ser\")))\n        {\n            oos.writeObject(product);\n\n            var s = (Product)ois.readObject();\n        }\n    }\n}</pre><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP50033: </strong></p><p>If you use 'serialPersistentFields', then it must be declared with private, static &amp; final modifiers. Even if one modifier is changed or is missing, an exception is thrown at runtime.</p>", "answers": ["<p>BOOK</p><p>Mystery</p>", "<p>NOVELS</p><p>M</p>", "<p>BOOK</p><p>Fiction</p>", "<p>NOVELS</p><p>F</p>", "An exception is thrown at runtime"]}, "correct_response": ["e"], "section": "9.3 Java I/O API: Serialization", "question_plain": "Question ID: UKOCP50033Given code: package com.udayankhattry.ocp;\n\nimport java.io.*;\n\nclass Product implements Serializable {\n    public static final ObjectStreamField[] serialPersistentFields = {\n        new ObjectStreamField(\"name\", String.class),\n        new ObjectStreamField(\"geners\", String[].class)\n    };\n\n    private void readObject(ObjectInputStream s)\n                    throws IOException, ClassNotFoundException {\n        ObjectInputStream.GetField fields = s.readFields();\n        System.out.println(fields.get(\"name\", \"NOVELS\"));\n        System.out.println(((String[])fields.get(\"geners\", new String[]{\"F\", \"M\", \"T\"}))[1]);\n    }\n\n    private void writeObject(ObjectOutputStream s) throws IOException {\n        ObjectOutputStream.PutField fields = s.putFields();\n        fields.put(\"name\", \"BOOK\");\n        fields.put(\"geners\", new String [] {\"Fiction\", \"Mystery\", \"Thriller\"});\n\n        s.writeFields();\n    }\n}\n\npublic class Test {\n    public static void main(String[] args) throws IOException, ClassNotFoundException {\n        var product = new Product();\n        try (var oos = new ObjectOutputStream(new FileOutputStream((\"J:\\\\product.ser\")));\n             var ois = new ObjectInputStream(new FileInputStream(\"J:\\\\product.ser\")))\n        {\n            oos.writeObject(product);\n\n            var s = (Product)ois.readObject();\n        }\n    }\n}What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526840, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP89942</strong></p><p><br></p><p>F: is accessible for reading/writing and below is the directory structure for F:</p><pre class=\"prettyprint linenums\">F:.\n\u251c\u2500\u2500\u2500Parent\n\u2502   \u2514\u2500\u2500\u2500Child\n\u2502           Message.txt\n\u2502\n\u251c\u2500\u2500\u2500Shortcut\n\u2502       Child.lnk\n\u2502\n\u2514\u2500\u2500\u2500Other\n    \u2514\u2500\u2500\u2500Logs </pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path1 = Paths.get(\"F:\", \"Other\", \"Logs\");\n        var path2 = Paths.get(\"..\", \"..\", \"Shortcut\", \"Child.lnk\", \"Message.txt\");\n\n        var path3 = path1.resolve(path2).normalize();\n        var path4 = path1.resolveSibling(path2).normalize();\n\n        System.out.println(path3.equals(path4));\n    }\n}</pre><p><br></p><p>What will be the result of compiling and executing Test class?</p>", "explanation": "<p><strong>UKOCP89942: </strong></p><p>According to Javadoc of normalize method:</p><p>1. It removes all the redundant name elements.</p><p>2. \".\" represents current directory in Windows/Linux environment, hence it is considered redundant.</p><p>3. \"..\" represents parent directory in Windows/Linux environment. If a \"..\" is preceded by a non-\"..\" name, then both names are considered redundant. </p><p><br></p><p>Variables 'path1', 'path2', 'path3' and 'path4' infer to Path type. </p><p>path1 --&gt; [F:\\Other\\Logs].&nbsp; </p><p>path2 --&gt; [..\\..\\Shortcut\\Child.lnk\\Message.txt].&nbsp; </p><p><br></p><p>path1.resolve(path2) --&gt; [F:\\Other\\Logs\\..\\..\\Shortcut\\Child.lnk\\Message.txt].&nbsp; </p><p>To normalize, let's remove all the redundant name elements. \"Logs\" and \"..\" are redundant, therefore '[F:\\Other\\..\\Shortcut\\Child.lnk\\Message.txt]' is returned.</p><p>Again, \"Other\" and \"..\" are redundant, therefore '[F:\\Shortcut\\Child.lnk\\Message.txt]' is returned.</p><p>path3 --&gt; [F:\\Shortcut\\Child.lnk\\Message.txt].&nbsp; </p><p><br></p><p>path1.resolveSibling(path2) --&gt; [F:\\Other\\..\\..\\Shortcut\\Child.lnk\\Message.txt].</p><p>To normalize, let's remove all the redundant name elements. \"other\" and \".\" are redundant, therefore '[F:\\..\\Shortcut\\Child.lnk\\Message.txt]' is returned. </p><p>Again, \"..\" is preceded by a non-\"..\" name, but \"F:\" represents root, therefore only \"..\" is removed, it returns '[F:\\Shortcut\\Child.lnk\\Message.txt]'.</p><p>You may verify this by executing below statement:&nbsp; System.out.println(Paths.get(\"F:\\\\..\\\\..\\\\..\\\\..\").normalize()); </p><p>It prints \"F:\\\"&nbsp; </p><p><br></p><p>path4 --&gt; [F:\\Shortcut\\Child.lnk\\Message.txt]. </p><p><br></p><p>No exception is thrown at runtime. </p><p><br></p><p>As path3 and path4 refer to same location, hence path3.equals(path4) returns true. </p>", "answers": ["An exception is thrown at runtime", "true", "false"]}, "correct_response": ["b"], "section": "9.4 Java I/O API: java.nio.file API: Path & Paths", "question_plain": "Question ID: UKOCP89942F: is accessible for reading/writing and below is the directory structure for F:F:.\n\u251c\u2500\u2500\u2500Parent\n\u2502   \u2514\u2500\u2500\u2500Child\n\u2502           Message.txt\n\u2502\n\u251c\u2500\u2500\u2500Shortcut\n\u2502       Child.lnk\n\u2502\n\u2514\u2500\u2500\u2500Other\n    \u2514\u2500\u2500\u2500Logs Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) {\n        var path1 = Paths.get(\"F:\", \"Other\", \"Logs\");\n        var path2 = Paths.get(\"..\", \"..\", \"Shortcut\", \"Child.lnk\", \"Message.txt\");\n\n        var path3 = path1.resolve(path2).normalize();\n        var path4 = path1.resolveSibling(path2).normalize();\n\n        System.out.println(path3.equals(path4));\n    }\n}What will be the result of compiling and executing Test class?", "related_lectures": []}, {"_class": "assessment", "id": 71526842, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP55707</strong></p><p><br></p><p>Given code: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var files = Files.list(Paths.get(System.getProperty(\"user.home\")));\n        files.forEach(System.out::println);\n    }\n}</pre><p><br></p><p>System.getProperty(\"user.home\") returns the HOME directory of the User (Both in windows and Linux).</p><p>What is the result?</p>", "answers": ["It will only print the paths of directories and files under HOME directory", "It will print the paths of directories, sub-directories and files under HOME directory", "It will only print the paths of files (not directories) under HOME directory", "It will print the paths of files (not directories) under HOME directory and its sub-directories"], "explanation": "<p><strong>UKOCP55707: </strong></p><p>Variable 'files' infers to Stream&lt;Path&gt; type.</p><p>Files.list(Path) returns the object of Stream&lt;Path&gt; containing all the paths (files and directories) of current directory. It is not recursive. </p><p><br></p><p>For recursive access, use overloaded Files.walk() methods. </p>"}, "correct_response": ["a"], "section": "9.6 Java I/O API: Use Stream API with NIO.2", "question_plain": "Question ID: UKOCP55707Given code: package com.udayankhattry.ocp;\n\nimport java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Paths;\n\npublic class Test {\n    public static void main(String[] args) throws IOException {\n        var files = Files.list(Paths.get(System.getProperty(\"user.home\")));\n        files.forEach(System.out::println);\n    }\n}System.getProperty(\"user.home\") returns the HOME directory of the User (Both in windows and Linux).What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526844, "assessment_type": "multiple-choice", "prompt": {"feedbacks": ["", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP88274</strong></p><p><br></p><p>Given structure of EMPLOYEE table: </p><p><code>EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))</code></p><p><br></p><p>EMPLOYEE table contains below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Given code of Test.java file: </p><pre class=\"prettyprint linenums\">package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.relative(1);\n            System.out.println(rs.getString(2));\n        }\n    }\n}</pre><p><br></p><p>Also assume: </p><p>URL is correct and db credentials are: root/password.</p><p>SQL query is correct and valid.</p><p>The JDBC 4.2 driver jar is configured in the classpath.</p><p><br></p><p>What is the result?</p>", "explanation": "<p><strong>UKOCP88274: </strong></p><p>Variable 'url' infers to String type, variable 'prop' infers to Properties type. Variable 'con' infers to Connection type, variable 'stmt' infers to Statement type and variable 'rs' infers to ResultSet type.</p><p><br></p><p>As credentials are passed as java.util.Properties so user name should be passed as \"user\" property and password should be passed as \"password\" property. </p><p><br></p><p>In the given code, correct property names 'user' and 'password' are used. As URL and DB credentials are correct, hence no issues in connecting the database.&nbsp; </p><p><br></p><p>Given sql query returns below records: </p><pre class=\"prettyprint linenums\">101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600</pre><p><br></p><p>Initially the cursor stays just before the first record.</p><p><br></p><p>`rs.relative(1);` moves the cursor to the first record.</p><p><br></p><p>Column index starts with 1 and not 0, so `rs.getString(2)` returns 'John'.</p>", "answers": ["John", "Sean", "Smith", "An exception is thrown at runtime"]}, "correct_response": ["a"], "section": "11.1 JDBC: Statement, Connection, ResultSet", "question_plain": "Question ID: UKOCP88274Given structure of EMPLOYEE table: EMPLOYEE (ID integer, FIRSTNAME varchar(100), LASTNAME varchar(100), SALARY real, PRIMARY KEY (ID))EMPLOYEE table contains below records: 101 John    Smith   12000\n102 Sean    Smith   15000\n103 Regina  Williams    15500\n104 Natasha George  14600Given code of Test.java file: package com.udayankhattry.ocp;\n\nimport java.sql.*;\nimport java.util.Properties;\n\npublic class Test {\n    public static void main(String[] args) throws SQLException {\n        var url = \"jdbc:mysql://localhost:3306/ocp\";\n        var prop = new Properties();\n        prop.put(\"user\", \"root\");\n        prop.put(\"password\", \"password\");\n        var query = \"Select ID, FIRSTNAME, LASTNAME, SALARY FROM EMPLOYEE ORDER BY ID\";\n\n        try (var con = DriverManager.getConnection(url, prop);\n             var stmt = con.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\n             var rs = stmt.executeQuery(query);) {\n            rs.relative(1);\n            System.out.println(rs.getString(2));\n        }\n    }\n}Also assume: URL is correct and db credentials are: root/password.SQL query is correct and valid.The JDBC 4.2 driver jar is configured in the classpath.What is the result?", "related_lectures": []}, {"_class": "assessment", "id": 71526846, "assessment_type": "multi-select", "prompt": {"feedbacks": ["", "", "", "", "", ""], "relatedLectureIds": "", "question": "<p><strong>Question ID: UKOCP29061</strong></p><p><br></p><p>
